<!DOCTYPE html>
<html lang="ja">
<head>

<title>📰 ニュースデータベース閲覧</title>
<style>
:root{--bg:#fff;--bg2:#f7f8fa;--bg3:#eef0f3;--tx:#1a1a1a;--tx2:#6e7782;--bd:#d8dade;--bd2:#e8e9eb;--ac:#2980b9;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;margin:0;padding:0;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;}
.wrap{max-width:720px;margin:0 auto;padding:12px;}
h1{font-size:18px;font-weight:600;margin:0 0 12px;letter-spacing:-0.01em;}
.stat{padding:10px 14px;border-radius:8px;background:linear-gradient(135deg,#2980b9 0%,#3498db 100%);color:#fff;margin-bottom:12px;display:flex;align-items:baseline;gap:8px;}
.stat .num{font-size:24px;font-weight:700;letter-spacing:-0.02em;}
.stat .lbl{font-size:11px;opacity:0.9;}
.fl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;}
.fl select,.fl input[type=text]{padding:5px 8px;border-radius:6px;border:0.5px solid var(--bd);background:var(--bg);color:var(--tx);font-size:12px;font-family:inherit;}
.fl input[type=text]{flex:1;min-width:120px;}
.fl button.sort{padding:5px 10px;border-radius:6px;border:0.5px solid var(--bd);background:var(--bg);color:var(--tx2);cursor:pointer;font-size:12px;}
.cnt{font-size:11px;color:var(--tx2);margin-left:auto;}
.list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.card{display:flex;background:var(--bg);border:0.5px solid var(--bd2);border-radius:9px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.07);cursor:pointer;}
.bar{width:4px;flex-shrink:0;}
.body{flex:1;padding:10px 12px;min-width:0;}
.meta{display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap;align-items:center;}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.dt{font-size:11px;color:var(--tx2);}
.cf{font-size:10px;display:inline-flex;align-items:center;gap:3px;font-weight:500;}
.cf .dot{width:7px;height:7px;border-radius:50%;}
.tt{margin:0 0 4px;font-weight:600;line-height:1.45;font-size:14px;}
.sm{margin:0;font-size:12px;color:var(--tx2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.empty{text-align:center;padding:40px 20px;color:var(--tx2);}
mark{background:#fef08a;color:inherit;padding:0 1px;border-radius:2px;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999;}
.modal.open{display:flex;}
.dlg{background:var(--bg);border-radius:14px;max-width:620px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 25px 70px rgba(0,0,0,0.4);}
.dlg .top{height:6px;}
.dlg .pad{padding:22px 24px 26px;}
.dlg .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;}
.dlg .meta2{display:flex;gap:8px;flex-wrap:wrap;}
.dlg .cls{background:none;border:none;cursor:pointer;font-size:24px;color:var(--tx2);padding:0 6px;line-height:1;}
.dlg h3{font-size:18px;font-weight:700;margin:0 0 14px;line-height:1.45;}
.dlg .sm2{font-size:14px;line-height:1.85;margin:0;}
.dlg .src{margin-top:14px;padding:8px 12px;border-radius:7px;background:var(--bg2);border:0.5px solid var(--bd2);}
.dlg .src a{font-size:12px;color:var(--ac);word-break:break-all;}
.dlg .ft{display:flex;gap:8px;margin-top:18px;padding-top:16px;border-top:0.5px solid var(--bd2);}
.dlg .cp{padding:7px 16px;border-radius:7px;border:1px solid var(--ac);background:transparent;color:var(--ac);cursor:pointer;font-size:13px;font-weight:500;}
.dlg .cp.done{background:#27ae60;border-color:#27ae60;color:#fff;}
.note{font-size:10px;color:var(--tx2);text-align:center;margin:10px 0 0;}
@media (prefers-color-scheme: dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#fff;--tx2:#9ea0a5;--bd:#3a3a3c;--bd2:#2c2c2e;}}
</style>
</head>

<script>
var DATA=[{"id":"経済-0-1777730617216","category":"経済","title":"日経平均、895円高で5万0402円終値 トランプ政権の対中AI輸出緩和観測で半導体株急騰","summary":"22日の東京株式市場で日経平均株価は前週末比895円18銭高の5万0402円39銭で取引を終え、5万円台を回復した。トランプ米政権がエヌビディアのAI半導体「H200」の対中輸出に向けた審査を始めたと伝わり、前週末の米株式市場でエヌビディアが大幅高となった流れを引き継いだ。ソフトバンクグループや東京エレクトロン、フジクラ、アドバンテスト、ディスコなど半導体関連株が一斉に上昇し、日経平均を押し上げた。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOFL220EN0S5A221C2000000/","confidence":"高"},{"id":"経済-1-1777730617216","category":"経済","title":"長期金利が一時2.100%まで急騰 1999年以来の高水準、日銀利上げ後の円安進行受け","summary":"22日の債券市場で長期金利の指標となる新発10年物国債利回りは一時2.100%まで上昇し、1999年以来の高水準となった。日銀が19日に決定した0.75%への利上げ後も円安が進み、インフレ抑制のためさらなる利上げが必要との見方が市場に広がった。利ざや改善期待からメガバンク株が買われた。市場では日銀が2026年9月までに政策金利を1.0%に到達させるシナリオが織り込まれ始めている。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOFL220EN0S5A221C2000000/","confidence":"高"},{"id":"経済-2-1777730617216","category":"経済","title":"市場の予想インフレ率が日銀利上げ後に上昇加速 BEIの動向に注目集まる","summary":"12月22日、市場関係者の間で予想インフレ率の指標であるブレーク・イーブン・インフレ率（BEI）が、日銀の利上げ決定後にむしろ上昇するという逆説的な動きを見せた。利上げにもかかわらず円安が進み、輸入物価上昇圧力が強まったことが背景。日銀が円安を抑え込むには現在の利上げペースでは不十分との見方が広がっている。市場では2026年の追加利上げシナリオが既に織り込まれつつある。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOFL220QUTS5A221C2000000/","confidence":"中"},{"id":"経済-3-1777730617216","category":"経済","title":"2026年度予算案を閣議決定 一般会計122兆3092億円、過去最高を更新","summary":"政府は12月26日の閣議で2026年度予算案を決定した。一般会計総額は122兆3092億円で前年度当初を7兆円あまり上回り、2年連続で過去最大を更新。社会保障関係費が39兆559億円と最大で、26年度の診療報酬改定は本体部分が3.09%引き上げと30年ぶりの水準となった。高市政権による初の当初予算編成で、政府は1月召集の通常国会に提出し3月末までの年度内成立を目指す。","date":"2025年12月26日","source":"https://www.nikkei.com/article/DGXZQOUA241X40U5A221C2000000/","confidence":"高"},{"id":"経済-4-1777730617216","category":"経済","title":"令和8年度税制改正大綱を閣議決定 「年収の壁」160万円→178万円に大幅引き上げ","summary":"政府は12月26日、令和8年度（2026年度）税制改正大綱を閣議決定した。所得税がかかり始める「年収の壁」について、基礎控除と給与所得控除を合わせた課税最低限を160万円から178万円に引き上げる。自民・公明・国民民主の三党合意を反映した内容で、物価高への対応とパート・アルバイトの就業調整問題への対策が目的。食事補助の所得税非課税枠も月額3500円から7500円へと42年ぶりに引き上げられ、2026年4月施行予定。","date":"2025年12月26日","source":"https://www.mof.go.jp/tax_policy/tax_reform/outline/fy2026/20251226taikou.pdf","confidence":"高"},{"id":"経済-5-1777730617216","category":"経済","title":"植田日銀総裁、利上げ路線継続を表明 「ゼロノルム世界に戻る可能性、大きく低下」","summary":"日銀の植田和男総裁は12月25日、東京都内で開催された経団連の審議員会で講演し、今後も利上げを続けていく方針を改めて表明した。「賃金と物価がほとんど変化しない、いわゆるゼロノルム（社会通念）の世界に戻る可能性は大きく低下している」と述べ、適切な利上げが2%物価安定目標のスムーズな実現と息の長い成長につながるとの認識を示した。現在の実質金利は極めて低水準であるとも指摘した。","date":"2025年12月25日","source":"https://www.nikkei.com/article/DGXZQOUB2525W0V21C25A2000000/","confidence":"高"},{"id":"経済-6-1777730617216","category":"経済","title":"ガソリン暫定税率の廃止が12月31日施行へ 補助金は12月11日以降25.1円に","summary":"1974年に導入された「ガソリン暫定税率」（1リットル当たり25.1円）が、12月31日をもって正式に廃止される。11月28日に成立した廃止法に基づくもので、約51年間続いた「当分の間税率」が終止符を打つ。価格の急変動を防ぐため、政府は11月13日から段階的に補助金を引き上げており、12月11日には暫定税率と同水準の25.1円補助を実施している。軽油引取税の暫定税率（17.1円）は2026年4月1日に廃止予定。","date":"2025年12月23日","source":"https://www.nikkei.com/article/DGXZQOUA280JC0Y5A121C2000000/","confidence":"高"},{"id":"政治-7-1777730617216","category":"政治","title":"大和総研、2026年の日本経済見通しを発表 GDP成長率0.8%、減速見込む","summary":"大和総研は12月23日、2026年の日本経済見通しを発表した。実質GDP成長率は前年比+0.8%と、2025年（実績見込み+1.2%）から減速する見通し。賃上げによる家計所得改善、政府の経済対策、緩和的な金融環境などが下支えする一方、トランプ関税、日中関係悪化、中東情勢、円相場急落、国内金利上昇などの下振れリスクを指摘。「責任ある積極財政」を掲げる高市政権の財政運営にも注目が集まる。","date":"2025年12月23日","source":"https://www.dir.co.jp/report/research/economics/outlook/20251223_025485.html","confidence":"高"},{"id":"政治-8-1777730617216","category":"政治","title":"毎日新聞世論調査、高市首相の台湾有事答弁「撤回不要」が67%","summary":"毎日新聞が12月22日に報じた世論調査で、高市早苗首相の台湾有事に関する答弁について「撤回する必要はない」が67%を占め、「撤回すべきだ」の11%を大きく上回った。11月7日の国会答弁を巡る中国の激しい反発と日中関係悪化が続く中での調査結果。共同通信の12月21日公表の調査でも「答弁が不用意だったとは思わない」が57.0%と、日本国内では高市首相の対応を支持する声が多数派となっている。","date":"2025年12月22日","source":"https://toyokeizai.net/articles/-/925742?display=b","confidence":"高"},{"id":"政治-9-1777730617216","category":"政治","title":"中国外交部、日本に「一つの中国」原則順守を改めて要求 議員の台湾訪問に反発","summary":"中国外務省の林剣報道官は12月22日の定例記者会見で、日本の議員が中国の台湾地区を訪問し頼清徳氏との会談調整が伝えられていることについて、「中日の四つの政治文書の精神と日本自身の約束に背き、『一つの中国』原則に背いた」として「断固反対」を表明。日本側に厳正な申し入れを行ったとし、高市早苗首相の発言撤回を改めて要求した。中国側の対日強硬姿勢が継続している。","date":"2025年12月22日","source":"https://j.people.com.cn/n3/2025/1222/c94474-20405464.html","confidence":"高"},{"id":"政治-10-1777730617216","category":"政治","title":"高市首相、衆院解散の検討を否定せず 通常国会冒頭解散案も浮上","summary":"高市早苗首相が23日召集予定の通常国会冒頭で衆議院を解散する案が浮上していることが報じられた。首相は自民党幹部に「選択肢のひとつ」と伝えた。内閣支持率の高さを背景に衆院選で議席増が期待できる一方、2026年度予算案の成立が遅れるため慎重に判断する構え。通常国会冒頭で解散すれば衆院選の日程は「2月3日公示―15日投開票」や「1月27日公示―2月8日投開票」が候補となる見通し。","date":"2025年12月23日","source":"https://www.nikkei.com/article/DGXZQOUA100T60Q6A110C2000000/","confidence":"中"},{"id":"政治-12-1777730617216","category":"政治","title":"経産省、令和8年度税制改正の経済産業関係ポイントを公表","summary":"経済産業省は12月26日、令和8年度税制改正大綱における経済産業関係の税制改正資料を公表した。賃上げ促進税制の見直し、投資促進税制の改正、福利厚生関連の改正など、企業実務に直結する内容が盛り込まれた。賃上げ税制では大企業を除外し中小向けは維持する方針が確認された。住宅ローン減税の中古向けも対象を最大4500万円に拡充する方向で調整が進められている。","date":"2025年12月26日","source":"https://www.meti.go.jp/main/zeisei/zeisei_fy2026/zeisei_k/index.html","confidence":"高"},{"id":"テクノロジー-24-1777730617216","category":"テクノロジー","title":"トランプ政権、エヌビディア「H200」の対中輸出審査を開始 AI半導体覇権競争に変化","summary":"トランプ米政権がエヌビディアのAI半導体「H200」の対中輸出に向けた審査を始めたと12月19日に伝わった。輸出が認められれば収益拡大につながるとの見方からエヌビディアが大幅に上昇し、世界の半導体株を押し上げた。米中間のAI半導体覇権競争に新たな局面が訪れた形で、対中規制の緩和が進めば世界のAI開発・データセンター投資の流れが変わる可能性がある。日本の半導体関連株もこの恩恵を大きく受けた。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOFL220F30S5A221C2000000/","confidence":"高"},{"id":"テクノロジー-25-1777730617216","category":"テクノロジー","title":"高市政権の補正予算で半導体・AI・造船分野に6.4兆円 危機管理投資・成長投資を加速","summary":"12月16日に成立した2025年度補正予算（総額18兆3034億円）のうち、高市政権が重点政策に掲げる「危機管理投資」「成長投資」予算は6.4兆円に及ぶ。AI研究開発、半導体、造船業の再生・強化、宇宙戦略基金などにそれぞれ1000億〜2000億円規模の予算が振り向けられる。サプライチェーン強化やサイバーセキュリティ対策の徹底を促す施策にも予算が手当てされ、テクノロジー分野での日本の競争力強化を狙う。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOUA159JW0V11C25A2000000/","confidence":"高"},{"id":"テクノロジー-26-1777730617216","category":"テクノロジー","title":"ソフトバンクG・東エレク・アドバンテストが急騰 AI関連で日経平均押し上げ","summary":"12月22日の東京株式市場で、ソフトバンクグループや東京エレクトロン、フジクラ、アドバンテスト、ディスコといったAI・半導体関連の主力銘柄が一斉に上昇した。前週末の米株市場でエヌビディアが対中AI半導体輸出緩和観測で大幅高となった流れを引き継いだもの。アドバンテストとディスコは後場に一段高となり、日経平均を5万円台へと押し上げた。世界的なAI投資ブームの恩恵を日本企業も享受している。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOFL220EN0S5A221C2000000/","confidence":"高"},{"id":"テクノロジー-27-1777730617216","category":"テクノロジー","title":"高市政権、防衛費GDP比2%目標を27年度から25年度へ2年前倒し","summary":"高市政権は2025年度補正予算で防衛費を積み増し、防衛費GDP比2%への引き上げ目標の達成時期を当初の27年度から25年度に2年前倒しする方針を打ち出した。1兆6560億円が防衛力と外交力の強化に充てられる。インド太平洋地域の安全保障環境の悪化を踏まえ、サイバー防衛、宇宙、無人化技術など先端分野への投資が加速。防衛産業のサプライチェーン強化も並行して進められる。","date":"2025年12月22日","source":"https://www.nikkei.com/article/DGXZQOUA27AAA0X21C25A1000000/","confidence":"中"},{"id":"社会-28-1777730617216","category":"社会","title":"2025年マーケット重大ニュース、投資家が選んだ1位は「トランプ関税で日経平均急落」","summary":"日経CNBCが12月実施した投資家アンケートで、2025年マーケット重大ニュースの1位は「トランプ大統領が相互関税を発表、日経平均は発表後3営業日で4500円強下落（4月）」となった。投資家の声として「市場との向き合い方を考えさせられた出来事」「日経平均5万円突破は近い将来6万円も視野」「インフレ体験は生涯初」など、激動の1年を振り返るコメントが多数寄せられた。","date":"2025年12月26日","source":"https://prtimes.jp/main/html/rd/p/000000200.000028693.html","confidence":"高"},{"id":"社会-29-1777730617216","category":"社会","title":"12月の有効求人倍率や鉱工業生産など年末重要統計の発表が相次ぐ","summary":"総務省や厚生労働省、経済産業省は12月下旬、月次経済統計を相次いで公表した。建築着工統計調査（11月分、国土交通省）が12月中旬に発表され、年末に向け労働力調査、有効求人倍率、鉱工業生産指数など重要統計の発表が控えている。高市政権の経済政策の効果検証や、2026年の景気見通しを占う上で、これらの統計は注目度が高い。","date":"2025年12月23日","source":"https://www.policynews.jp/schedule/2025/012.html","confidence":"中"},{"id":"社会-30-1777730617216","category":"社会","title":"スマートフォンソフトウェア競争促進法が12月18日に施行","summary":"スマートフォンソフトウェア競争促進法（スマホ新法）が2025年12月18日に施行された。対象事業者であるアップルやグーグルに対し、第三者アプリストアの提供許可、アプリ開発者への手数料負担軽減などを義務付ける。日本のスマートフォン市場における競争促進を狙った法律で、欧州のデジタル市場法（DMA）に類似した内容。施行に伴い、日本のアプリ市場やデジタル決済の構造が変わる可能性が指摘されている。","date":"2025年12月22日","source":"https://www.policynews.jp/schedule/2025/012.html","confidence":"中"},{"id":"国際-32-1777730617216","category":"国際","title":"トランプ氏、ゼレンスキー大統領との会談で「和平交渉の90%は合意」と表明","summary":"RIETI（経済産業研究所）のレポートによれば、2025年12月末にトランプ大統領と会談したウクライナのゼレンスキー大統領は「可能性のある和平交渉の90%は合意された」との認識を示した。11月の28ポイント和平案、11月23-24日の20項目案を経て、米国・ウクライナ・欧州同盟国の協議が進展。ただしロシア側は妥協の意志をほとんど示しておらず、最終合意までは曲折が予想される。","date":"2025年12月25日","source":"https://www.rieti.go.jp/jp/special/special_report/251.html","confidence":"中"},{"id":"国際-33-1777730617216","category":"国際","title":"中国、対日経済制裁を継続 水産物輸入停止・渡航自粛・日中交流事業の中止が常態化","summary":"高市首相の台湾有事答弁を巡る中国の対日制裁が継続している。中国政府は11月14日に日本への渡航自粛を呼びかけ、19日には日本産水産物の事実上の輸入禁止措置を発表。日中間のイベントや交流事業も中国側からの要請で中止・延期が相次いでいる。ただし、2010年の尖閣諸島漁船衝突事件や2012年の国有化時のような大衆動員的な反日抗議行動は発生しておらず、中国側も自国経済への影響を考慮していると分析されている。","date":"2025年12月22日","source":"https://www.dir.co.jp/report/column/20251210_012355.html","confidence":"高"},{"id":"経済-0-1777792101647","category":"経済","title":"日経平均、3日ぶり反落 終値223円安の5万0526円 日銀利上げ継続を意識","summary":"29日の東京株式市場で日経平均株価は3営業日ぶりに反落し、終値は前週末比223円47銭（0.44%）安の5万0526円92銭だった。下げ幅は一時400円を超えた。日銀の利上げ継続が意識され、長期金利の上昇が銀行株を除く幅広い銘柄の重荷となった。年末の閑散相場のなか、日銀の「タカ派」スタンスが市場心理を冷やした。","date":"2025年12月29日","source":"https://www.nikkei.com/article/DGXZQOFL290810Z21C25A2000000/","confidence":"高"},{"id":"経済-1-1777792101647","category":"経済","title":"大納会の日経平均終値187円安の5万0339円 年間で1万444円上昇、年末ベース最高値2年連続更新","summary":"2025年最後の取引となった30日の東京株式市場で、日経平均株価は続落し、終値は前日比187円44銭（0.37%）安の5万0339円48銭だった。銀など非鉄金属の急落や米ハイテク株安が重荷となったが、年間では1万444円（26.18%）上昇し、年末ベースの最高値を2年連続で更新した。年末時点で初の5万円台を維持し、市場では2026年に企業の資本効率改善が一段と進むとの期待が根強い。大納会セレモニーには森保監督や高市首相も出席した。","date":"2025年12月30日","source":"https://www.nikkei.com/article/DGXZQOUB290C7TZ21C25A2000000/","confidence":"高"},{"id":"経済-2-1777792101647","category":"経済","title":"ガソリン暫定税率廃止が12月31日施行 1974年導入から51年で終止符","summary":"1974年の導入から約51年続いた「ガソリン暫定税率」（1リットル当たり25.1円）が、12月31日をもって正式に廃止された。11月28日に成立した廃止法に基づくもので、当分の間税率としての歴史的役割が終わった。価格急変動を防ぐため政府は11月から段階的に補助金を引き上げ、12月11日には暫定税率と同水準の25.1円補助を実施。軽油引取税の暫定税率（17.1円）は2026年4月1日に廃止予定で、ドライバーの燃料費負担軽減が新年以降本格化する。","date":"2025年12月31日","source":"https://taxlabor.com/gasoline-zantei-zeiritsu-2025-2026-itsu-ikura/","confidence":"高"},{"id":"エンタメ-9-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"第76回NHK紅白歌合戦、白組が2年連続優勝 第1部30.8%、第2部35.2%と前年から復調","summary":"12月31日に放送された第76回NHK紅白歌合戦の平均視聴率（世帯）は、第1部が30.8%、第2部が35.2%（関東地区、ビデオリサーチ調べ）で、歴代ワースト2位だった昨年から大幅に復調した。白組が2年連続優勝。テーマは「つなぐ、つながる、大みそか。」で有吉弘行、綾瀬はるか、今田美桜、鈴木奈穂子アナウンサーが司会を務めた。矢沢永吉のサプライズ登場や松田聖子の大トリ復活が話題に。歌手別瞬間最高視聴率は松田聖子が34.0%でトップ。","date":"2025年12月31日","source":"https://mantan-web.jp/article/20260102dog00m200013000c.html","confidence":"高"},{"id":"エンタメ-10-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"Mrs.GREEN APPLE紅白白組トリ 33.4%でMISIA、米津玄師を上回る","summary":"第76回NHK紅白歌合戦で白組のトリを務めたMrs.GREEN APPLEが瞬間最高視聴率33.4%を記録、紅組大トリの松田聖子（34.0%）に次ぐ第2位となった。第3位はMISIA（32.1%）、第4位は米津玄師（31.7%）、第5位は松任谷由実（31.5%）。後半パートのベテラン勢の視聴率が高い傾向にある一方、前半パートでは水森かおりが28.9%でトップだった。放送100年の節目に放送された記念すべき大会となった。","date":"2025年12月31日","source":"https://kenbunroku-net.com/kouhaku2025-7/","confidence":"高"},{"id":"エンタメ-11-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"片岡五郎さん死去 81歳、「八つ墓村」「太陽にほえろ！」など出演の俳優","summary":"俳優の片岡五郎さんが12月30日に死去した。81歳。映画「八つ墓村」「戦国自衛隊」「シコふんじゃった」、大河ドラマ「新・平家物語」「峠の群像」、テレビドラマ「太陽にほえろ！」「Gメン75」「大江戸捜査網」など多数の刑事・時代劇作品に出演し、脇を固める実力派として日本の映像文化を支えた。","date":"2025年12月30日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"エンタメ-12-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"川村龍夫さん死去 84歳、芸能プロモーター・ケイダッシュ会長","summary":"芸能プロモーターでケイダッシュ代表取締役会長の川村龍夫さんが12月30日に死去した。84歳。1993年にケイダッシュを設立し、堺正章、高橋克典らをマネジメント。田辺エージェンシー代表取締役副社長も務めた。日本の芸能界で長年にわたり多くのスターを支え、業界に大きな影響を与えた人物として惜しまれている。","date":"2025年12月30日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"エンタメ-13-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"片桐圭一さん死去 68歳、「亜空大作戦スラングル」歌手・ボイストレーナー","summary":"歌手・ボイストレーナーの片桐圭一さんが12月30日に死去した。68歳。1981年にブルート・イースト・ファミリーのボーカルとしてデビュー、解散後はソロでアニメ「亜空大作戦スラングル」のオープニングテーマや「プラレス3四郎」のオープニング・エンディングテーマを担当した。後進の指導にも力を注いだ。","date":"2025年12月30日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"エンタメ-14-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"ロバート・ウィルソンさん死去 83歳、米実験演劇の巨匠","summary":"アメリカの演出家ロバート・ウィルソンさんが12月31日に死去した。83歳。実験演劇の巨匠として知られ、1976年に作曲家フィリップ・グラスとの共同制作による前衛オペラ「浜辺のアインシュタイン」で世界に衝撃を与えた。演劇・オペラ・ビジュアルアートの境界を超えた革新的な舞台演出で半世紀にわたり国際舞台芸術界をリード。2025年秋にはイザベル・ユペールの一人芝居上演が発表されていた。","date":"2025年12月31日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"エンタメ-15-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"佐野藤右衛門さん死去 97歳、桂離宮や京都迎賓館を手がけた造園家","summary":"造園家の佐野藤右衛門（16代目）さんが12月31日、老衰のため死去した。97歳。天保3年創業の「植藤（現・植藤造園）」当主として16代目を襲名し、桂離宮や京都迎賓館の作庭、大阪造幣局の桜の植栽を手がけた。彫刻家イサム・ノグチと共同でパリのユネスコ本部に日本庭園を作庭し、1997年にユネスコから表彰された。東日本大震災被災地など全国の桜の保存にも尽力した。","date":"2025年12月31日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"エンタメ-16-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"東逸子さん死去 72歳、萩尾望都「ポーの一族」装丁画担当の画家","summary":"画家・イラストレーター・作家の東逸子さんが12月31日に死去した。72歳。「月神」シリーズなどファンタジー絵画で広く愛され、漫画家・萩尾望都の代表作「ポーの一族」「トーマの心臓」の装丁画を担当したことで知られる。緻密で幻想的な画風はファンタジー文学・漫画ファンに長年親しまれてきた。","date":"2025年12月31日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"エンタメ-17-1777792101647","category":"芸能・エンタメ・ゴシップ","title":"チェッキー・カリョさん死去 72歳、映画「ニキータ」「007 ゴールデンアイ」の俳優","summary":"フランス・トルコ系俳優のチェッキー・カリョさんが12月31日、がんのため死去した。72歳。リュック・ベッソン監督の映画「ニキータ」（1990年）で秘密機関の教育係を演じて世界的な注目を集め、「007 ゴールデンアイ」（1995年）にも出演。ヨーロッパとハリウッドの両方で活躍し、力強い演技で多数の話題作に出演した。","date":"2025年12月31日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"スポーツ-18-1777792101647","category":"スポーツ","title":"第70回有馬記念、ミュージアムマイルが優勝 C.デムーロ騎手7回目で初制覇","summary":"12月28日、中山競馬場で第70回有馬記念（GⅠ・芝2500m）が行われ、3歳のミュージアムマイルが古馬を破って優勝、GⅠ2勝目を挙げた。優勝騎手のクリスチャン・デムーロは本競走7回目の騎乗で初制覇。「70周年の節目に勝てて嬉しい。去年はレガレイラに夢を絶たれたが、今回は夢を掴めた」と喜びを語った。皐月賞同様の素晴らしい切れ味を発揮し、生産者ノーザンファームは8年連続勝利。来場者数は5万6000人を記録した。","date":"2025年12月28日","source":"https://ja.wikipedia.org/wiki/%E7%AC%AC70%E5%9B%9E%E6%9C%89%E9%A6%AC%E8%A8%98%E5%BF%B5","confidence":"高"},{"id":"スポーツ-19-1777792101647","category":"スポーツ","title":"有馬記念売上が21世紀初の700億円超え 「ザ・ロイヤルファミリー」効果で713億円","summary":"JRAは12月28日の有馬記念の馬券売上が713億円となり、21世紀初の700億円超えを記録したと発表した。TBS系ドラマ「ザ・ロイヤルファミリー」のヒットによる競馬人気の高まりが追い風となった。中山競馬場には妻夫木聡と松本若菜（同ドラマ出演）も観戦に訪れ、長澤まさみら豪華ゲストも来場。JRA年間売上は14年連続で前年超えとなり、競馬産業の好調を象徴する1年の締めくくりとなった。","date":"2025年12月28日","source":"https://ja.wikipedia.org/wiki/%E7%AC%AC70%E5%9B%9E%E6%9C%89%E9%A6%AC%E8%A8%98%E5%BF%B5","confidence":"高"},{"id":"スポーツ-22-1777792101647","category":"スポーツ","title":"第104回全国高校サッカー選手権開幕 国立競技場で開幕戦、徳島市立が早稲田実業に4-1で勝利","summary":"12月28日、令和7年度第104回全国高校サッカー選手権大会が国立競技場で開幕した。開幕戦は東京B代表の早稲田実業と徳島県代表の徳島市立が対戦し、徳島市立が4-1で勝利した。応援リーダーはセルティックFC所属の前田大然が務めた。47都道府県から48校が出場し、決勝は2026年1月12日に行われる予定。準決勝・決勝の会場である国立競技場は2026年1月1日からネーミングライツが導入され「MUFGスタジアム」となる。","date":"2025年12月28日","source":"https://ja.wikipedia.org/wiki/%E7%AC%AC104%E5%9B%9E%E5%85%A8%E5%9B%BD%E9%AB%98%E7%AD%89%E5%AD%A6%E6%A0%A1%E3%82%B5%E3%83%83%E3%82%AB%E3%83%BC%E9%81%B8%E6%89%8B%E6%A8%A9%E5%A4%A7%E4%BC%9A","confidence":"高"},{"id":"スポーツ-23-1777792101647","category":"スポーツ","title":"アレハンドラ・オリベラスさん死去 47歳、女性初の世界4階級制覇のボクサー","summary":"アルゼンチン出身の元プロボクサー、アレハンドラ・オリベラスさんが12月28日、肺塞栓症と脳卒中のため死去した。47歳。WBC女子世界スーパーバンタム級王座（2006年）、WBA女子世界ライト級王座（2011-12年）、WBO女子フェザー級王座（2012-13年）、WBC女子スーパーライト級王座（2013-14年）を獲得し、女性ボクサー史上初めて世界4階級制覇を成し遂げた伝説的選手。女子ボクシングの地位向上に大きく貢献した。","date":"2025年12月28日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"スポーツ-24-1777792101647","category":"スポーツ","title":"ラウラ・ダールマイアーさん死去 31歳、平昌五輪バイアスロン金メダリスト","summary":"ドイツの元バイアスロン選手ラウラ・ダールマイアーさんが12月28日、パキスタン・カラコルム山脈のライラピーク登山中に落石事故に遭い死去した。31歳。2018年平昌冬季五輪で女子バイアスロン史上初めて、スプリントと女子10キロ追い抜きの2種目で金メダルを獲得し世界に衝撃を与えた。2019年に現役を引退し、引退後は登山家としても活動。世界の冬季スポーツ界に深い悲しみが広がった。","date":"2025年12月28日","source":"https://ami-gonag50.hatenablog.com/entry/2025/01/08/171528","confidence":"中"},{"id":"テクノロジー-26-1777792101647","category":"テクノロジー","title":"日経CNBC投資家アンケート、5万円突破は「近い将来6万円も視野」と楽観","summary":"日経CNBCの投資家アンケートで、日経平均5万円突破に関して「近い将来6万円も視野」と楽観的な声が多く寄せられた。AI半導体関連やソフトバンクグループ、東京エレクトロン、アドバンテスト、ディスコといった主力銘柄が2025年通期で大幅高となり、相場を牽引した。インフレ・利上げ局面でも企業の資本効率改善期待が下支えとなり、2026年も日本株市場への期待感が継続。テクノロジー株中心の上昇トレンドが続くか注目される。","date":"2025年12月29日","source":"https://prtimes.jp/main/html/rd/p/000000200.000028693.html","confidence":"中"},{"id":"社会-30-1777792101647","category":"社会","title":"海老名香葉子さん死去 92歳、初代林家三平さんの妻でエッセイスト","summary":"落語家・初代林家三平さんの妻でエッセイストとしても活躍した海老名香葉子さんが12月29日に訃報発表された（死亡日は12月24日、92歳、老衰）。1933年生まれで、1945年3月の東京大空襲で祖母と両親、2人の兄、弟の一家6人を亡くし戦災孤児となった。1952年に初代三平さんと結婚、落語家一家のおかみさんとして一門を支えた。喪主は長男の落語家・林家正蔵さん。お別れの会は1月9日に予定された。","date":"2025年12月29日","source":"https://www.jiji.com/jc/article?k=2025122900566&g=soc","confidence":"高"},{"id":"社会-31-1777792101647","category":"社会","title":"不破哲三さん死去 95歳、日本共産党元議長","summary":"日本共産党元議長の不破哲三さんが12月30日に死去した。95歳。本名・上田建二郎。1969年衆院選で旧東京6区から出馬し当選、長年にわたり共産党を率いた。日本共産党元副委員長の上田耕一郎は実兄、父は教育評論家の上田庄三郎。戦後日本の左派政治史を語る上で欠かせない指導者の一人で、理論・実務両面で党の発展に大きな足跡を残した。","date":"2025年12月30日","source":"https://gori-gori.net/shinda0/2025/","confidence":"中"},{"id":"社会-32-1777792101647","category":"社会","title":"山代裕彦さん死去 70歳、元三井不動産リアルティ社長・元日本郵政専務","summary":"元三井不動産リアルティ社長・副会長で元日本郵政専務執行役の山代裕彦さんが12月29日に死去した。70歳。1955年生まれ。三井不動産リアルティで長年経営に従事した後、日本郵政の経営再建に関わり、両社の発展に貢献した。日本の不動産業界・物流業界双方に影響を与えた経営者として知られた。","date":"2025年12月29日","source":"https://ja.wikipedia.org/wiki/%E8%A8%83%E5%A0%B1_2025%E5%B9%B412%E6%9C%88","confidence":"中"},{"id":"国際-33-1777792101647","category":"国際","title":"シャイフ・モハンメドさん死去 ドバイ王族・ゴドルフィン創設者","summary":"アラブ首長国連邦ドバイ首長国の王族でオーナーブリーダーのシャイフ・モハンメド・オバイド・アール・マクトゥームさんが12月29日に死去した。約74歳。世界最大級の競走馬オーナーとして知られた「ゴドルフィン」の創設者で、世界の競馬産業の発展に大きく貢献した。日本の競馬関係者からも追悼の声が相次ぎ、国際的な競馬界に大きな影響を与えた人物として惜しまれた。","date":"2025年12月29日","source":"https://ja.wikipedia.org/wiki/%E8%A8%83%E5%A0%B1_2025%E5%B9%B412%E6%9C%88","confidence":"中"},{"id":"国際-34-1777792101647","category":"国際","title":"タチアナ・シュロスバーグさん死去 35歳、ケネディ元米大統領の孫の環境ジャーナリスト","summary":"アメリカの環境ジャーナリスト、タチアナ・シュロスバーグさんが12月30日に死去した。35歳。ジョン・F・ケネディ元米大統領の孫で、母は元駐日米国大使のキャロライン・ケネディ氏。1990年生まれ、イェール大学卒業後、ニューヨークタイムズなどで環境問題を中心に取材活動を続けた。気候変動・サステナビリティに関する若手ジャーナリストの旗手として知られ、若くしての逝去に各界から悲しみの声が寄せられた。","date":"2025年12月30日","source":"https://gori-gori.net/shinda0/2025/","confidence":"中"},{"id":"経済-0-1777817197645","category":"経済","title":"輸入自動車25%関税が4月2日に発効 日本の自動車業界に激震、石破首相「あらゆる選択肢排除せず」","summary":"トランプ米政権が3月26日に署名した輸入自動車・同部品への25%追加関税が4月2日に発効した。日本からの自動車輸出は年間約150万台規模で、トヨタ・ホンダ・日産など主要メーカーへの打撃は不可避。石破茂首相は「あらゆる選択肢を排除せず引き続き適用除外を求める」と述べた。日本は対米報復関税の実施を一度も行ったことがなく、交渉での解決を優先する方針。自動車業界は対米輸出計画の見直しを迫られ、国内生産体制の転換や米国への投資加速を検討する動きが相次いだ。","date":"2025年4月2日","source":"https://www.jetro.go.jp/biznews/2025/04/30ae3500e08d0bfa.html","confidence":"高"},{"id":"経済-1-1777817197645","category":"経済","title":"トランプ大統領が「相互関税」を発表 日本に24%、全世界に最低10% 「解放の日」と呼称","summary":"トランプ米大統領は4月2日（米国時間）にホワイトハウスで演説し、全世界からの輸入に一律10%、貿易赤字などに基づく上乗せとして日本には合計24%の「相互関税」を課すと発表した。中国34%、EU20%、韓国25%、台湾32%、ベトナム46%など。これを「解放の日（Liberation Day）」と称し、「米国はより豊かになる」と主張。事前の市場予想をはるかに上回る高水準で、翌日の日本・米国・アジア・欧州の株式市場に激震が走った。国際緊急経済権限法（IEEPA）に基づく大統領令として発動された。","date":"2025年4月3日","source":"https://www.jetro.go.jp/biznews/2025/04/30ae3500e08d0bfa.html","confidence":"高"},{"id":"経済-2-1777817197645","category":"経済","title":"日経平均、相互関税発表を受け4月3日・4日と急落 取引時間中に3万4000円割れ","summary":"トランプ政権の相互関税発表を受け、4月3日（木）の東京株式市場で日経平均株価が大幅急落した。東証プライム市場は全面安の展開で半導体・銀行・輸出関連株が軒並み下落。4月4日（金）も続落し、取引時間中としては2024年8月以来約8カ月ぶりに節目の3万4000円を下回った。三菱UFJFGは一時12%安、東京エレクトロンも5%安など主力株に売りが集中。市場では「世界景気後退リスクに投資家が過敏に反応」との声が上がった。日銀の追加利上げ観測が後退し、長期金利も2カ月ぶり低水準となった。","date":"2025年4月4日","source":"https://www.nikkei.com/article/DGXZQOUB040NO0U5A400C2000000/","confidence":"高"},{"id":"経済-3-1777817197645","category":"経済","title":"米ダウ、4月4日に2231ドル安・史上3番目の下落幅 ナスダック「弱気相場」入り","summary":"4月4日（金）の米株式市場でダウ工業株30種平均が前日比2231ドル07セント安（-5.5%）の3万8314ドルで終えた。1日の下げ幅として史上3番目の大きさ。中国が4日夜、米国からの全輸入品に34%の追加関税を発動すると発表したことで報復関税合戦への懸念が爆発した。ナスダック総合株価指数は2024年12月の最高値から22.7%下落し「弱気相場（ベア・マーケット）」入りとされる20%超下落を記録。VIX（恐怖指数）も急騰し、市場全体にパニック的な売りが広がった。","date":"2025年4月4日","source":"https://www.smd-am.co.jp/market/ichikawa/2025/04/irepo250407/","confidence":"高"},{"id":"経済-4-1777817197645","category":"経済","title":"中国が米国からの全輸入品に34%の報復関税を発表 貿易戦争「関税の応酬」が鮮明に","summary":"中国政府は4月4日夜、トランプ政権の相互関税発表に対抗し、米国からの全ての輸入品に4月10日から34%の追加関税を課すと発表した。これにより米中間の関税は実質的に50%超水準となり、貿易戦争の激化が現実のものとなった。EUも報復措置の検討を表明するなど関税の「連鎖的な応酬」が加速。各国の報復が世界経済を急速に冷やすとの警戒が4月4日の株価急落の主因となった。市場では「世界経済の構造が大きく変化する可能性がある」と懸念する声が相次いだ。","date":"2025年4月4日","source":"https://www.pwc.com/jp/ja/services/consulting/intelligence/monthly-economist-report/monthly-economist-report202504-2.html","confidence":"高"},{"id":"経済-5-1777817197645","category":"経済","title":"日銀短観（3月調査）大企業製造業DIが4四半期ぶりに悪化 関税懸念が製造業を直撃","summary":"日銀が4月1日に発表した3月の全国企業短期経済観測調査（短観）で、大企業製造業の業況判断指数（DI）が前回比2ポイント悪化のプラス12となり、4四半期ぶりの悪化となった。鉄鋼・繊維・石油石炭など素材業種でトランプ政権の鉄鋼・アルミ関税の影響が顕著。大企業非製造業は2ポイント改善のプラス35で、インバウンド需要が下支え。先行きはいずれも悪化を見込み、自動車で4ポイント悪化を見込む。企業のインフレ期待（5年後）は過去最高を更新。想定為替レートは1ドル147円06銭。","date":"2025年4月1日","source":"https://www.nikkei.com/article/DGXZQOUB3177T0R30C25A3000000/","confidence":"高"},{"id":"経済-6-1777817197645","category":"経済","title":"トランプ関税「予想をはるかに上回る水準」 日本のGDP押し下げは0.4%超との試算も","summary":"野村総合研究所は4月2日、トランプ政権が発表した相互関税（日本24%）により「10%の場合、日本のGDPを0.24%押し下げる」と試算。さらに自動車関税25%の影響と合わせると「押し下げ効果は0.4%程度」に達する可能性があるとした。アジア経済研究所も「事前の予想シナリオを大幅に超える水準であり、グローバルな貿易縮小と各国景気後退リスクが大きく高まった」と指摘。石破政権は早急な日米交渉開始を求める声が経済界から相次ぎ、関税の適用除外実現が最重要課題に浮上した。","date":"2025年4月2日","source":"https://www.nri.com/jp/media/column/kiuchi/20250331_2.html","confidence":"高"},{"id":"政治-8-1777817197645","category":"政治","title":"旧安倍派幹部11人の党員資格停止・役職停止処分が満了 自民党内の「禊ぎ」完了","summary":"自民党の派閥裏金事件を巡って党員資格停止や党役職停止の処分を受けた旧安倍派幹部・萩生田光一元政調会長ら11人の処分期間が4月初旬に満了した。2024年4月の処分から1年が経過した形で、各議員の「禊ぎ終了」と受け止められた。ただし裏金問題への国民の批判は根強く、参院選を控えて自民党の支持回復への道のりは依然険しい。石破政権は低支持率の中、通常国会での予算審議も難航が続いており、政局の緊張感が高まった。","date":"2025年4月1日","source":"https://www.nippon.com/ja/news/q202504/","confidence":"中"},{"id":"政治-9-1777817197645","category":"政治","title":"統合作戦司令部が発足から1週間 陸海空自衛隊を一元指揮 初代司令官に南雲憲一郎空将","summary":"防衛省・自衛隊の「統合作戦司令部」が3月24日に発足してから1週間が経過し、4月初旬に初動体制が整いつつある状況が報じられた。有事や大規模災害時の初動を早め、米軍との連携強化が主な狙い。陸海空の自衛隊を一元的に指揮する司令部は初代司令官に前統幕副長の南雲憲一郎空将が就任した。トランプ政権の関税攻勢が続く中、在日米軍との作戦連携強化というリアルな課題への対応も求められる重要な週を迎えた。","date":"2025年3月30日","source":"https://www.nippon.com/ja/news/l00376/","confidence":"中"},{"id":"テクノロジー-10-1777817197645","category":"テクノロジー","title":"任天堂「ニンテンドースイッチ2」6月5日発売を正式発表 価格は4万9980円","summary":"任天堂は4月3日、家庭用ゲーム機「ニンテンドースイッチ2」を2025年6月5日に発売すると正式発表した。希望小売価格は4万9980円（税込）。初代スイッチ（2017年発売、2万9980円）から2万円の値上げとなった。スイッチ2はドック・テレビ接続と携帯両対応を継続し、グラフィック性能と処理速度を大幅に向上。「マリオカートワールド」など新タイトルも発表された。皮肉なことに相互関税発表と同日の発表となり、米国市場での価格設定や販売戦略への影響が注目された。","date":"2025年4月3日","source":"https://www.nippon.com/ja/news/q202504/","confidence":"高"},{"id":"テクノロジー-11-1777817197645","category":"テクノロジー","title":"iPS細胞由来心筋シートの製造販売承認申請 世界初の再生医療製品化へ","summary":"大阪大学の澤芳樹特任教授が参画するベンチャー企業クオリブスは4月3日、iPS細胞（人工多能性幹細胞）から作製した心筋シートについて、厚生労働省に製造販売承認申請を行ったと発表した。iPS細胞を使った再生医療用製品の製造販売承認申請は世界初とみられる。心臓の筋肉が失われる重症心不全患者への適用が期待され、承認されれば日本の再生医療の国際競争力を大きく高める画期的な出来事となる。iPS細胞の実用化で世界をリードしてきた日本の医療技術の最前線を示す成果。","date":"2025年4月3日","source":"https://www.nippon.com/ja/news/q202504/","confidence":"高"},{"id":"テクノロジー-12-1777817197645","category":"テクノロジー","title":"NTT「177番」天気予報テレフォンサービスが終了 固定電話の利用減で52年の歴史に幕","summary":"NTT東日本・西日本が提供する天気予報テレフォンサービス「177」が3月31日をもって終了した。1974年のサービス開始以来、約52年の歴史に幕を下ろした。インターネットやスマートフォンの普及による気象情報の確認手段の多様化と、固定電話利用の大幅な減少が理由。「177番」は電話一本で天気を確認できる「昭和の生活インフラ」として世代を超えて利用されており、終了を惜しむ声がSNSに多数寄せられた。固定電話・アナログインフラの歴史的な転換点を象徴する出来事となった。","date":"2025年3月31日","source":"https://ja.wikipedia.org/wiki/2025%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"高"},{"id":"テクノロジー-13-1777817197645","category":"テクノロジー","title":"トランプ関税の対象外品目に半導体・医薬品・銅など エネルギー資源も除外","summary":"トランプ大統領が4月2日に発表した相互関税の大統領令では、いくつかの品目が課税対象外とされた。232条関税対象の鉄鋼・アルミ・自動車・同部品のほか、銅、医薬品、半導体、木材製品、将来的に232条対象となる可能性のある品目、地金、米国で入手できないエネルギー・特定鉱物などが除外された。この「除外品目リスト」は今後の貿易交渉での重要な交渉材料となり、各国の政府・企業がどの品目で交渉優位に立てるかの分析が急速に進んだ。","date":"2025年4月3日","source":"https://www.jetro.go.jp/biznews/2025/04/30ae3500e08d0bfa.html","confidence":"高"},{"id":"社会-14-1777817197645","category":"社会","title":"すき家が全国1970店を3月31日〜4月4日に順次休業 害虫混入問題で全店対策","summary":"大手牛丼チェーンのすき家は、東京都昭島駅南店で3月28日に提供した商品に害虫が混入していたと指摘されたことを受け、全国約1970店舗で対策実施のため3月31日から4月4日まで順次休業すると発表した。国内最大規模の牛丼チェーンが総力を挙げた衛生対策を実施する異例の事態で、食品安全管理の重要性に改めて注目が集まった。連日の関税ショックで経済が大混乱するさなかの大規模休業は内需企業へのダメージとなり、消費者行動の変化とともに話題となった。","date":"2025年3月31日","source":"https://ja.wikipedia.org/wiki/2025%E5%B9%B4%E3%81%AE%E6%97%A5%E2%80%98%E6%9C%AC","confidence":"高"},{"id":"社会-15-1777817197645","category":"社会","title":"農家が「令和の百姓一揆」 全国14カ所でデモ行進 農業所得の低さと輸入開放に抗議","summary":"コメ農家や酪農家ら農業従事者が3月30日、東京中心部など全国14カ所で「令和の百姓一揆」と位置付けたデモ行進を行い、農業現場の厳しさや所得の向上を訴えた。生産コストの上昇に価格転嫁が追いつかない実態、農業人口の高齢化と後継者不足、政府によるコメ増産方針との矛盾を訴える声が上がった。同時期のトランプ関税交渉でも農産物輸入開放を迫られる可能性が浮上しており、農業保護を求める運動として注目を集めた。","date":"2025年3月30日","source":"https://ja.wikipedia.org/wiki/2025%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"高"},{"id":"社会-16-1777817197645","category":"社会","title":"関税ショックで株価急落 石破首相が対応表明「あらゆる選択肢排除せず」 日本政府は緊急対応","summary":"トランプ政権の相互関税発表を受け、石破茂首相は4月3日に「あらゆる選択肢を排除せず引き続き交渉する」と表明した。日本は米国の関税政策に対して報復関税を実施した前例がなく、外交的解決を最優先する方針。赤沢亮正経済産業相を日米関税交渉の担当とする布陣を固め、早急な協議入りを米側に求めた。政府・与党内では経済対策の策定が必要との声も高まり、補助金・減税など景気下支えの検討が始まった。翌週にかけての市場動向と米国の出方が最大の焦点となった。","date":"2025年4月3日","source":"https://www.nippon.com/ja/news/q202504/","confidence":"高"},{"id":"社会-17-1777817197645","category":"社会","title":"天皇・皇后両陛下が硫黄島を初訪問 戦没者を慰霊 日米双方の霊を哀悼","summary":"天皇・皇后両陛下は4月3日、太平洋戦争末期の激戦地・硫黄島を初めて訪問した。約2万人余の戦没者を慰霊するために国が建立した天山慰霊碑と、軍属として徴用された島民のために整備された硫黄島島民平和墓地公園を訪れ花を供え拝礼。日米双方の戦没者を慰霊する鎮魂の丘でも献水・拝礼された。在位中に激戦地を訪問し戦没者を悼む皇室の姿勢を示す行幸啓として広く報じられ、日米関係が試練にさらされる局面での訪問として深い意義を持った。","date":"2025年4月3日","source":"https://www.nippon.com/ja/news/q202504/","confidence":"高"},{"id":"国際-18-1777817197645","category":"国際","title":"トランプ関税、1901年以来の高水準 世界貿易量縮小で「1930年代の保護主義」再現懸念","summary":"トランプ政権の相互関税を含む一連の関税措置により、米国が輸入品に課す平均関税率は実質1901年以来の高水準に達するとイェール大学が試算した。PWCジャパンは「世界的な貿易量縮小による景気押し下げ、輸入物価上昇によるインフレの懸念が浮上」と指摘。1930年代に世界大恐慌を深刻化させたスムート・ホーリー関税法（1930年）並みの保護主義との比較も相次いだ。IMFや世界銀行は世界経済成長率の下方修正を検討し始め、国際社会全体の危機感が急速に高まった。","date":"2025年4月3日","source":"https://www.pwc.com/jp/ja/services/consulting/intelligence/monthly-economist-report/monthly-economist-report202504-2.html","confidence":"高"},{"id":"国際-19-1777817197645","category":"国際","title":"日本・EU・韓国など各国が相互関税に懸念表明 WTO提訴も視野に対抗策を検討","summary":"日本をはじめEU・韓国・カナダ・オーストラリアなど主要国が、トランプ政権の相互関税はWTO（世界貿易機関）のルールに違反するとして懸念を表明した。EUは対抗措置の検討を開始。複数の国がWTOへの紛争解決手続き申請を検討しており、多国間での対抗措置の連携を模索する動きも始まった。各国共通の課題は「関税の大義に欠ける」「相互主義の計算方法が不透明」という点で、米国の主張する「非関税障壁」の算出根拠への疑義も多くの専門家から上がった。","date":"2025年4月4日","source":"https://www.ide.go.jp/Japanese/IDEsquare/Eyes/2025/ISQ202520_009.html","confidence":"高"},{"id":"国際-20-1777817197645","category":"国際","title":"トランプ政権、カナダ・メキシコは相互関税の対象外 USMCA協定を考慮","summary":"トランプ大統領が4月2日に発表した相互関税の大統領令で、カナダとメキシコは従来のIEEPA関税が継続されるとして今回の相互関税の対象外とされた。ただし米国・メキシコ・カナダ協定（USMCA）の原産地規則（ROO）を満たしていない製品には25%の追加関税が課される。USMCA対象品には今後関税が課されない可能性もある。この例外措置は、日本を含む他の国が「なぜ北米だけ優遇されるのか」と反発する材料となり、交渉上の不公平感が広がった。","date":"2025年4月3日","source":"https://www.jetro.go.jp/biznews/2025/04/30ae3500e08d0bfa.html","confidence":"高"},{"id":"スポーツ-21-1777817197645","category":"スポーツ","title":"統合作戦司令部の発足で自衛隊・米軍の共同対処能力が向上 4月に最初の訓練調整","summary":"3月24日に発足した統合作戦司令部は4月初旬、初代司令官・南雲憲一郎空将のもとで在日米軍との連携調整を本格化させた。陸・海・空3自衛隊を一元指揮するこれまでにない組織体制で、有事の際の初動対応が格段に向上すると期待される。在日米軍司令部との間でも組織的な連携プロトコルの整備が進む。北朝鮮の弾道ミサイル発射や中国の海洋活動など東アジアの安全保障リスクが高まる中、「新しい抑止力の柱」として評価する声がある一方、慎重な対応を求める意見も残った。","date":"2025年3月30日","source":"https://www.nippon.com/ja/news/l00376/","confidence":"中"},{"id":"経済-4-1777792101647","category":"経済","title":"ニューイヤー駅伝、SUBARU並木寧音が1区で区間新記録45分23秒の快走","summary":"1月1日の第70回全日本実業団対抗駅伝「ニューイヤー駅伝」で、SUBARUの並木寧音が1区(12.3km)で45分23秒の区間新記録を樹立した。GMOインターネットグループが大会新記録の4時間44分00秒で創部10年目で初の日本一を達成、2位ロジスティードに2分27秒差をつける圧勝。トヨタ自動車3位、JR東日本4位、サンベルクス5位と続いた。前回王者の旭化成は9位に終わり、各チームの世代交代を象徴する大会となった。","date":"2026年1月1日","source":"https://www.rikujyokyogi.co.jp/archives/194981","confidence":"高"},{"id":"政治-5-1777792101647","category":"政治","title":"高市首相が令和8年年頭所感を発表 「変化おそれず改革断行」、昭和元年から100年の節目","summary":"高市早苗首相は1月1日付で2026年の年頭所感を発表した。昭和元年から100年の節目に触れ「激動の昭和を生き、先の大戦や幾多の災害を乗り越えて今の日本の礎を築いた先人の英知と努力に学びたい。変化を恐れず、必要な改革を断行していく」と記した。岡倉天心の「歴史の中に未来の秘密がある」を引用、覇権主義的な動きが強まる国際情勢への懸念も示した。「日本列島を強く豊かにし、希望を生み出すことを国民への新年の誓いとする」と結んだ。","date":"2026年1月1日","source":"https://www.kantei.go.jp/jp/104/statement/2026/0101nentou.html","confidence":"高"},{"id":"政治-6-1777792101647","category":"政治","title":"時事通信「冷える日中、反転焦点」と分析 中国は対日強硬姿勢を維持","summary":"時事通信は1月3日、2026年外交展望として「冷える日中」反転が焦点と分析した。中国は高市首相の台湾有事答弁を巡り、関係改善に応ぜず対日強硬姿勢を維持。水産物輸入停止や渡航自粛など事実上の経済制裁も継続している。米国との関係でも火種を抱え、道のりは険しいと指摘。同時に高市首相の解散判断や非核三原則「持ち込ませず」の見直しも俎上に上るとし、「政権安定へ攻めの姿勢」を取る首相の戦略に注目した。","date":"2026年1月3日","source":"https://www.jiji.com/jc/article?k=2026010100006&g=pol","confidence":"中"},{"id":"政治-7-1777792101647","category":"政治","title":"高市首相、通常国会冒頭での衆議院解散判断が焦点に 1月23日召集予定","summary":"1月23日召集予定の通常国会を巡り、高市早苗首相の衆議院解散判断が政局の焦点となっている。時事通信が1月3日に報じた政局展望で、高い内閣支持率を背景に基盤強化を狙い「国民を抱き込む」攻めの姿勢を示す可能性を指摘。一方で、自民・維新連立は衆議院でかろうじて過半数、参議院で過半数割れの厳しい状況下にあり、解散時期の見極めが重要となる。2026年度予算案の年度内成立、議員定数削減、企業・団体献金見直しの行方も注目される。","date":"2026年1月3日","source":"https://ksi-corp.jp/topics/consulting/2026/1schedule.html","confidence":"中"},{"id":"政治-8-1777792101647","category":"政治","title":"非核三原則の「持ち込ませず」見直し論が浮上 高市首相持論、慎重論強く","summary":"時事通信は1月4日、高市早苗首相の持論である非核三原則「持ち込ませず」見直しが俎上に上っていると報じた（1月3日付外交展望の関連記事）。台湾有事や中国の海洋進出など東アジアの安全保障環境悪化を背景に、米核抑止の実効性確保を狙う議論として浮上。一方、被爆国としての立場や歴代政権が堅持してきた原則を変更することへの慎重論も強く、与党内でも意見が分かれている。通常国会での議論が注目される。","date":"2026年1月3日","source":"https://www.jiji.com/jc/article?k=2026010100006&g=pol","confidence":"中"},{"id":"スポーツ-20-1777792101647","category":"スポーツ","title":"第102回箱根駅伝、青学大が史上初の総合3連覇 10時間37分34秒の大会新","summary":"1月2日〜3日に開催された第102回東京箱根間往復大学駅伝で、青山学院大学が10時間37分34秒の大会新記録で史上初の2度目の総合3連覇を達成した。往路（5:18:08＝大会新）、復路（5:19:26＝大会新）ともに制す盤石の圧勝。2位は國學院大、3位は順大、4位は早大、5位は中大。エース黒田朝日（4年）は5区で1時間7分16秒の区間新を樹立し「山の神」誕生。原晋監督の科学的トレーニングと選手の自主性を重んじる「原メソッド」が再び花開いた。","date":"2026年1月3日","source":"https://www.nikkei.com/article/DGXZQODH030EX0T00C26A1000000/","confidence":"高"},{"id":"スポーツ-21-1777792101647","category":"スポーツ","title":"箱根駅伝で東洋大が20年連続シード途切れる、駒大は6位に沈む","summary":"第102回箱根駅伝でシード権争いが大混戦となった。往路17位と出遅れた帝京大が復路5位の猛追で9位に食い込みシード権獲得、日大が10位でシード確保。一方、14位の東洋大は20年連続で守ってきたシード権を確保できず大波乱となった。昨年11月の全日本大学駅伝を制した駒大はエース佐藤圭汰（4年）が10区を区間新記録で走ったが6位にとどまった。シード争いの過酷さと毎年高速化する箱根駅伝の進化を改めて印象づけた大会となった。","date":"2026年1月3日","source":"https://www.nikkei.com/article/DGXZQODH030EX0T00C26A1000000/","confidence":"高"},{"id":"テクノロジー-25-1777792101647","category":"テクノロジー","title":"国立競技場が2026年1月1日から「MUFGスタジアム」に ネーミングライツ導入","summary":"国立競技場は2026年1月1日からネーミングライツが導入され「MUFGスタジアム」（MUFG国立）の名称が付与された。三菱UFJフィナンシャル・グループとの契約に基づくもので、第104回全国高校サッカー選手権大会の準決勝・決勝もこの新名称で開催される。日本のスポーツ・エンタメ施設におけるネーミングライツの活用が一段と進む象徴的な事例となり、施設の収益多様化と運営持続性の強化が期待される。","date":"2026年1月1日","source":"https://ja.wikipedia.org/wiki/%E7%AC%AC104%E5%9B%9E%E5%85%A8%E5%9B%BD%E9%AB%98%E7%AD%89%E5%AD%A6%E6%A0%A1%E3%82%B5%E3%83%83%E3%82%AB%E3%83%BC%E9%81%B8%E6%89%8B%E6%A8%A9%E5%A4%A7%E4%BC%9A","confidence":"中"},{"id":"テクノロジー-27-1777792101647","category":"テクノロジー","title":"ロシア軍ドローン攻撃、ウクライナで毎月500-600回の打撃 4回目の冬で最多被害","summary":"防衛研究所のレポートによれば、2025年を通じてロシアの長距離攻撃向けドローンの生産力が向上し、2026年1月以降は毎月4000-6000回のドローン攻撃によりウクライナで毎月500-600回の打撃が発生している。ウクライナにとって4回目の冬で最も厳しい寒さの中、最も多くの攻撃を受け、エネルギー・インフラへの打撃により多くの人々が暖房不足・電力不足に苦しんでいる。ドローン技術の進化が現代戦の様相を変えつつある。","date":"2026年1月1日","source":"https://www.nids.mod.go.jp/publication/commentary/pdf/commentary430.pdf","confidence":"中"},{"id":"社会-28-1777792101647","category":"社会","title":"新年祝賀の儀、悠仁さま初参列 皇居・宮殿松の間で","summary":"1月1日、皇居・宮殿の「松の間」で新年祝賀の儀が行われ、天皇皇后両陛下や愛子さま、秋篠宮ご一家と皇族らが出席した。秋篠宮家の長男・悠仁さまが参列されるのは初めて。午前11時ごろ、両陛下らは衆参両院の議長や国会議員らから祝賀のあいさつを受けられた。2025年9月に成年皇族となった悠仁さまの皇室公務本格参加を象徴する行事となった。","date":"2026年1月1日","source":"https://www.youtube.com/watch?v=SlZx-cofvTc","confidence":"高"},{"id":"社会-29-1777792101647","category":"社会","title":"新年一般参賀、悠仁さま初お出まし 約6万人来場、14方の皇室で過去最多","summary":"1月2日、皇居で新年一般参賀が行われ、秋篠宮家の長男・悠仁さまが初めてベランダにお出ましになった。1回目のお出ましでは天皇皇后両陛下、上皇上皇后両陛下、秋篠宮皇嗣ご夫妻、愛子内親王、佳子内親王、悠仁親王ら14方の皇室の方々が並ばれ、過去最多の人数となった。約6万人の参賀者が訪れ、新年の祝賀を皇室と分かち合った。皇室世代交代の象徴的な行事となった。","date":"2026年1月2日","source":"https://news.yahoo.co.jp/articles/c486daa7fab29742f25d99f64d43f6ae5b15aa1f","confidence":"高"},{"id":"経済-0-1777816378660","category":"経済","title":"大発会の日経平均、1493円高の5万1832円 TOPIXは史上最高値更新","summary":"2026年最初の取引となる大発会の1月5日、東京株式市場で日経平均株価は昨年末終値（5万0339円）に比べ1493円（2.97%）高の5万1832円で終えた。年始のご祝儀相場が久しぶりに実現。米市場で半導体株が軒並み上昇した流れを引き継ぎ、アドバンテストが7.8%高など半導体関連株に買いが集中。IHIも9.0%高と急騰した。TOPIXも史上最高値を更新した。年初に5万円台スタートとなり、市場には2025年10月につけた史上最高値（52,411円）も意識される水準との指摘も。","date":"2026年1月5日","source":"https://www.nikkei.com/article/DGXZQOFL050QXTV00C26A1000000/","confidence":"高"},{"id":"経済-1-1777816378660","category":"経済","title":"大発会の長期金利が一時2.125%と約27年ぶり高水準 金利高・株高が並走","summary":"大発会の1月5日、国内債券市場で長期金利の指標となる新発10年物国債利回りが一時2.125%まで上昇し、1998年ごろ以来の約27年ぶりの高水準となった。日銀の利上げ継続への根強い期待が背景にあり、住宅ローン金利や企業の借入コストへの影響が懸念される一方、市場では金利上昇が国内企業の業績改善を映す「良い金利高」との見方も。メガバンク株には利ざや改善期待の買いが入り、三菱UFJFGなどが上昇した。","date":"2026年1月5日","source":"https://media.monex.co.jp/articles/-/28525","confidence":"高"},{"id":"経済-2-1777816378660","category":"経済","title":"トランプ政権がベネズエラへ軍事行動 地政学リスク高まるも株価への影響は限定的","summary":"トランプ米政権が1月3日、南米ベネズエラの反米左派・マドゥロ政権の打倒へ軍事行動に踏み切った。米国ではIHIなど防衛関連銘柄に買いが入ったが、日本株市場への影響はおおむね限定的で「どこ吹く風」との評価が広がった。大発会の日経平均は大幅高を達成。今後の中東情勢やエネルギー価格、原油供給への波及が懸念材料とされるが、AI関連の旺盛な半導体需要が市場センチメントをけん引した。","date":"2026年1月5日","source":"https://www.nikkei.com/article/DGXZQOFL050QXTV00C26A1000000/","confidence":"高"},{"id":"経済-3-1777816378660","category":"経済","title":"高市政権、通常国会冒頭解散を検討 「1月27日公示・2月8日投開票」案が軸","summary":"高市早苗首相が23日召集予定の通常国会冒頭での衆院解散を検討していることが、1月10日前後の報道で明らかになった。首相は自民党幹部に「選択肢のひとつ」と伝え、「1月27日公示・2月8日投開票」や「2月3日公示・2月15日投開票」が候補。高い内閣支持率を追い風に議席増を狙う。一方、2026年度予算案の成立が4月以降に遅れることへの反発や「解散の大義に欠ける」との与野党からの異論も上がっており、外交日程（13日〜）を踏まえて最終判断する方針。","date":"2026年1月10日","source":"https://www.nikkei.com/article/DGXZQOUA100T60Q6A110C2000000/","confidence":"高"},{"id":"政治-4-1777816378660","category":"政治","title":"北朝鮮が弾道ミサイルを日本海に向け発射 昨年11月以来","summary":"韓国軍合同参謀本部は1月上旬、北朝鮮が日本海に向けて弾道ミサイルを発射したと明らかにした。北朝鮮による弾道ミサイル発射は昨年11月以来で、年明けから早々に挑発行動に出た形。日本政府は情報収集・分析を急ぎ、防衛省が速報を発出した。通常国会召集と衆院解散検討が取り沙汰される中、北朝鮮リスクという追加の安全保障課題が浮上した形となった。","date":"2026年1月5日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"中"},{"id":"政治-5-1777816378660","category":"政治","title":"台湾情報機関、中国からのサイバー攻撃が2025年に1日平均263万回と発表","summary":"台湾の情報機関である国家安全局は1月上旬、重要インフラに対する中国からのサイバー攻撃が2025年に1日平均263万回あったとする報告書を発表した。前年比で大幅な増加を示す内容で、中国が軍事的脅迫と並行してサイバー領域でも台湾への圧力を強めていることが改めて浮き彫りになった。日本を含む周辺国の政府・企業でも重要インフラのサイバー防衛強化に向けた取り組みが急務とされている。","date":"2026年1月7日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"中"},{"id":"政治-6-1777816378660","category":"政治","title":"EU加盟国がメルコスルとのFTA締結を承認 約7億人の巨大自由貿易圏が誕生","summary":"欧州連合（EU）加盟国は1月9日、南米5カ国でつくる関税同盟メルコスル（南米南部共同市場）との自由貿易協定（FTA）締結を承認した。ブラジル、アルゼンチン、パラグアイ、ウルグアイ、ボリビアが加わり、EU・メルコスルを合わせた約7億人の巨大自由貿易圏が誕生した。日本はブラジルなどメルコスル各国との関係強化が改めて課題となる。米国のトランプ政権の保護主義に対抗する形での欧州・南米の経済連携が注目される。","date":"2026年1月9日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"高"},{"id":"テクノロジー-7-1777816378660","category":"テクノロジー","title":"CES 2026がラスベガスで開幕 テーマ「Innovators Show Up」、AIが主役に","summary":"1月6日、世界最大級のテクノロジー見本市「CES 2026」が米ラスベガスで開幕した（9日まで）。テーマは「Innovators Show Up」で、約4000社以上が出展。今年のキーワードは「Agentic AI」（自律的にタスクをこなすAI）と「Physical AI」（現実世界と連携するAI）で、すべての製品にAIが搭載されるという新時代の幕開けを象徴する大会となった。NVIDIAのジェンスン・フアンCEOが基調講演でAIの未来を語り、日本からはジェトロ支援の31社のスタートアップが出展した。","date":"2026年1月6日","source":"https://agenda-note.com/global/detail/id=7972","confidence":"高"},{"id":"テクノロジー-8-1777816378660","category":"テクノロジー","title":"CES 2026でNVIDIA・AMD・Lenovoが「AI前提」の世界を発表 日立・パナソニックも展示","summary":"CES 2026でNVIDIA、AMD、Lenovoが「AI前提」の世界に向けた最新製品・プラットフォームを発表した。NVIDIAはAgentic AI・Physical AIのエコシステムを提示。日本企業では日立、パナソニック、TDKらが存在感を示したが、日経の報道では「CESで見た技術立国日本の陰り、アワード数7件。韓国は200超」と指摘され、日本の技術発信力の課題が改めて浮き彫りになった。CESは単なる展示会を超え、グローバル産業の意思決定層が集う変革議論の場として重みを増している。","date":"2026年1月8日","source":"https://wired.jp/article/ces-2026-what-to-expect/","confidence":"高"},{"id":"テクノロジー-9-1777816378660","category":"テクノロジー","title":"ゼレンスキー大統領、年末年始1週間で2千発以上の攻撃を受けたと発表","summary":"ウクライナのゼレンスキー大統領は通信アプリで、前年末から本年初めにかけての1週間でロシア軍による誘導爆弾や無人機、ミサイル攻撃を計2千発以上受けたと明らかにした。1月8〜9日にはキーウ市内の半数にあたる約6千棟の集合住宅で暖房・電気の供給が止まった。ロシアは毎月4000〜6000回のドローン攻撃能力を持ち、冬季に集中して民間エネルギーインフラを標的にする戦術が継続。最も厳しい4回目の冬を迎えるウクライナへの国際支援継続が急務となっている。","date":"2026年1月9日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"高"},{"id":"エンタメ-10-1777816378660","category":"芸能・エンタメ・ゴシップ","title":"トランプ大統領がオバマ元大統領夫妻を類人猿に見立てた動画をSNSに投稿 与野党から非難","summary":"トランプ米大統領は1月上旬、自身のSNSで黒人のバラク・オバマ元大統領と妻ミシェル・オバマを類人猿に見立てた動画を投稿した。「人種差別的だ」として与野党双方から非難が噴出。動画は1月6日に削除された。米メディアによるとホワイトハウスは職員が誤って投稿したものだと釈明した。人種差別的コンテンツの流通と政権の責任を巡る議論が再燃し、内外で大きな批判を呼んだ。","date":"2026年1月6日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"高"},{"id":"エンタメ-11-1777816378660","category":"芸能・エンタメ・ゴシップ","title":"フィリピン・セブでごみ山崩落事故 作業員2人死亡・30人以上行方不明","summary":"1月上旬、フィリピン中部セブ市で廃棄物の埋め立て地でごみの山が崩落する事故が発生し、2人が死亡、30人以上が行方不明となった。事故当時、現場には作業員110人がいたという。東南アジアの急速な都市化と廃棄物処理体制の脆弱さを示す悲劇で、廃棄物管理の抜本的改善を求める声が高まった。日本の廃棄物処理・リサイクル技術のODA輸出に対する期待も改めて高まった。","date":"2026年1月5日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"中"},{"id":"スポーツ-12-1777816378660","category":"スポーツ","title":"岡本和真（巨人）がブルージェイズと4年94億円超で合意 ポスティング移籍","summary":"読売ジャイアンツの岡本和真内野手がポスティングシステムを利用してメジャーリーグのトロント・ブルージェイズと4年総額6000万ドル超（約94億円以上）で合意したことが1月5日に報じられた。「4番・三塁」として活躍が期待される。巨人への譲渡金は約17億円。近年、佐々木朗希、山本由伸、今永昇太らに続くMLB移籍で、日本球界の主力打者流出への懸念が広がる一方、選手のグローバル活躍を評価する声も多い。","date":"2026年1月5日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"高"},{"id":"スポーツ-13-1777816378660","category":"スポーツ","title":"今井達也（西武）がアストロズと合意 入団会見は現地時間1月6日","summary":"埼玉西武ライオンズのポスティング申請中だった今井達也投手が、ヒューストン・アストロズと契約合意したことが1月3日に報じられ、1月4日に入団会見が行われた。日本を代表する右腕投手の一人で、豊富な実績を持つメジャー球団への挑戦が実現。昨今のNPBポスティング移籍ラッシュを象徴するニュースとなり、日米野球界の人材交流がさらに活発化している。","date":"2026年1月4日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"高"},{"id":"スポーツ-14-1777816378660","category":"スポーツ","title":"ラグビー大学選手権決勝、明治大学が早稲田大学を22-10で破り7大会ぶり14回目の優勝","summary":"1月8日、第62回全国大学ラグビーフットボール選手権大会決勝がMUFGスタジアム（東京）で行われ、明治大学が22-10で早稲田大学を破り、7大会ぶり14回目の大会最多優勝を達成した。伝統校対決となった決勝は大学ラグビーの醍醐味を存分に発揮する試合となった。明治は昨今の強豪校争いに終止符を打つ形で頂点に返り咲き、ファンを沸かせた。","date":"2026年1月8日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E3%82%B9%E3%83%9D%E3%83%BC%E3%83%84","confidence":"高"},{"id":"スポーツ-15-1777816378660","category":"スポーツ","title":"全国都道府県対抗女子駅伝、大阪府が3年ぶり5回目の優勝","summary":"1月8日、第44回皇后盃全国都道府県対抗女子駅伝競走大会がたけびしスタジアム京都（京都市）を発着とする9区間・42.195kmで行われ、大阪府チームが2時間18分19秒で3年ぶり5回目の優勝を果たした。「都道府県対抗駅伝」は1月初旬の京都を彩る正月の陸上スポーツイベントとして恒例化しており、各都道府県の代表選手が一堂に会する大会として注目を集めた。","date":"2026年1月8日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E3%82%B9%E3%83%9D%E3%83%BC%E3%83%84","confidence":"高"},{"id":"スポーツ-16-1777816378660","category":"スポーツ","title":"高校サッカー選手権、1月2日に3回戦 神村学園が快進撃を続け準々決勝進出","summary":"第104回全国高校サッカー選手権大会は1月2日に3回戦を実施し、鹿児島県代表の神村学園が4-1で日大藤沢を破るなど各試合で熱戦が繰り広げられた。青森山田（5連覇を狙う）が大津（熊本）に0-2で敗退する番狂わせも。対象週（1/4〜1/10）では1月4日の準々決勝に向けた試合が続いた。準決勝は1月10日に予定されており、神村学園が優勝候補の一角として準決勝に駒を進めた。","date":"2026年1月4日","source":"https://www.juniorsoccer-news.com/post-1844534","confidence":"中"},{"id":"社会-17-1777816378660","category":"社会","title":"仕事始め、政府・企業が2026年の業務スタート 高市首相が伊勢参拝","summary":"1月5日は多くの官公庁・民間企業の仕事始めとなった。高市早苗首相は1月5日、三重県伊勢市の伊勢神宮で年頭の参拝を行い、記者会見で政権運営への決意を語った。昭和元年から100年の節目の年として、「変化を恐れず改革断行」を改めて表明。株式市場でも大発会が行われ、「希望相場」の年明けとなった。物価高対策、通常国会の準備、解散総選挙の可能性など、政治・経済ともに動きの多い年の幕開けとなった。","date":"2026年1月5日","source":"https://www.jiji.com/jc/article?k=2026010100006&g=pol","confidence":"中"},{"id":"社会-18-1777816378660","category":"社会","title":"今井達也のアストロズ入団会見が現地で開催 ポスティング移籍ラッシュが続く","summary":"1月4日、ヒューストン・アストロズに移籍する今井達也投手の入団記者会見が現地ヒューストンのMinute Maid Parkで行われた。今井は西武でのエース経験を胸に、MLBでの挑戦に意欲を見せた。近年の日本人投手のメジャー移籍（佐々木朗希、山本由伸、今永昇太、加えて今井達也と岡本和真）の連続により、NPBの国際競争力と選手育成環境への注目がさらに高まっている。","date":"2026年1月4日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"高"},{"id":"国際-20-1777816378660","category":"国際","title":"トランプ政権、ベネズエラのマドゥロ大統領を拘束 バチカンがロシア亡命仲介を打診していたと報道","summary":"米国が拘束したベネズエラのマドゥロ大統領について、ローマ教皇庁（バチカン）がロシアへの亡命を仲介する案を昨年12月に米国に打診したが失敗に終わっていたと、米紙ワシントン・ポスト電子版が1月上旬に報じた。トランプ政権はベネズエラへの軍事行動を踏み切り、マドゥロ政権の打倒を進めている。南米での米国の強硬な関与に国際社会の関心が集まる中、ベネズエラの石油資源をめぐる地政学的競争も注目される。","date":"2026年1月6日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"中"},{"id":"国際-21-1777816378660","category":"国際","title":"トランプ大統領、新STARTが2月に失効するのを容認する姿勢 米露核軍縮に暗雲","summary":"トランプ米大統領はニューヨーク・タイムズの公開インタビューで、米ロの核軍縮合意「新戦略兵器削減条約（新START）」が2月の期限で失効するのを容認する姿勢を示した。新START失効後は核弾頭数の相互制限が機能しなくなり、核兵器管理の枠組みが大きく後退することへの懸念が核軍縮専門家から噴出した。ロシアは既に2023年に参加停止を宣言しており、核をめぐる国際安全保障環境の悪化が一段と現実味を帯びてきた。","date":"2026年1月5日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"高"},{"id":"経済-0-1777816679255","category":"経済","title":"長期金利が2.3%台まで上昇 約27年ぶり高水準圏、住宅ローン・企業借入コストへの影響拡大","summary":"1月中旬の国内債券市場で長期金利（10年物国債利回り）が2.3%台まで上昇し、1998年ごろ以来の約27年ぶり高水準圏での推移が続いた。日銀の利上げ継続期待を背景に、年始から金利上昇が加速。メガバンクの利ざや改善期待は続く一方、住宅ローン金利や企業の借入コスト上昇が家計・企業に波及し始めた。三井住友DSアセットマネジメントは「2026年1月に2.3%台に上昇した後の動向が分岐点」と分析し、財政リスクプレミアムへの警戒も強まっている。","date":"2026年1月13日","source":"https://www.smd-am.co.jp/market/macroview/2026/mvreport20260330/","confidence":"高"},{"id":"経済-1-1777816679255","category":"経済","title":"高市政権の衆院解散方針が経済界に動揺 2026年度予算成立遅延で企業が対応見直し","summary":"高市早苗首相が1月23日召集の通常国会冒頭での衆院解散を検討していることが判明し、経済界に波紋が広がった。2026年度予算案の年度内成立が困難となり、暫定予算での対応が迫られることで、補助金制度の継続や政府調達のスケジュールが不確定になる恐れがある。日経平均は解散観測が浮上した週でも比較的底堅く推移し、選挙後の政権安定への期待感が支えとなった。財界は早期の政策決定と予算成立を強く求めた。","date":"2026年1月13日","source":"https://www.nikkei.com/article/DGXZQOUA120N30S6A110C2000000/","confidence":"高"},{"id":"経済-2-1777816679255","category":"経済","title":"浜岡原発の基準地震動データ不正 中部電力の審査中断が長期化へ","summary":"中部電力が浜岡原子力発電所（静岡県）の新規制基準適合性審査において、耐震設計の基準となる地震想定データを不正に操作して過小評価していたことが1月6〜7日に原子力規制委員会で報告された。規制委は審査を中断し、詳細調査を指示。原子力資料情報室は「捏造・改ざんと断定すべきで、即座に不合格とすべき」と批判した。柏崎刈羽原発の再稼働準備が続く中、原発への信頼性回復に向けた取り組みに改めて疑問符がついた。","date":"2026年1月12日","source":"https://cnic.jp/63596","confidence":"高"},{"id":"政治-3-1777816679255","category":"政治","title":"日韓首脳会談を奈良で開催 高市首相と李在明大統領がシャトル外交継続を確認","summary":"高市早苗首相は1月13日、訪日中の韓国・李在明大統領と奈良県で日韓首脳会談を行った（首相就任後初の韓国大統領訪日）。90分の会談では日韓関係の戦略的重要性を共有し、経済安全保障・科学技術での包括的協力に向けた当局間議論の開始で合意。日韓米の安全保障協力強化も確認した。韓国大統領が奈良を訪れるのは今回が初めてで、高市氏の地元を会場にした「歓迎のメッセージ」として注目された。両首脳はシャトル外交の継続でも一致した。","date":"2026年1月13日","source":"https://www.kantei.go.jp/jp/104/statement/2026/0113kyoudou_happyou.html","confidence":"高"},{"id":"政治-4-1777816679255","category":"政治","title":"日伊首脳会談 両国を「特別な戦略的パートナーシップ」に格上げ 重要鉱物・宇宙で協力","summary":"高市早苗首相は1月16日、首相官邸でイタリアのメローニ首相と初対面での首脳会談を行い、日伊関係を「特別な戦略的パートナーシップ」に格上げした共同声明を発出した。英国を交えた3カ国による次期戦闘機の共同開発加速、重要鉱物のサプライチェーン強化、新設の「宇宙協議」など幅広い分野で連携強化に合意。「サナエとは非常に波長が合う」と語ったメローニ首相は外交関係樹立160周年の節目に訪日した。両首相は女性初の首相同士という共通点も話題にした。","date":"2026年1月16日","source":"https://www.jiji.com/jc/article?k=2026011600114&g=pol","confidence":"高"},{"id":"政治-5-1777816679255","category":"政治","title":"立憲民主党と公明党が新党「中道改革連合」設立を発表 選挙に向けた野党結集","summary":"野党第1党の立憲民主党と、高市政権の連立から離脱した公明党が1月16日、新党「中道改革連合」の結成を発表した。翌17日に野田佳彦（立憲）・斉藤鉄夫（公明）両党首がYouTubeで綱領と基本政策を公表。立憲の衆院議員148人のうち不参加はわずか2人という高い結束を示した。1月23日の通常国会冒頭解散・2月8日投開票で行われる見込みの衆院選に向け、消費税減税などを共通の旗印に掲げて高市自民に対抗する構えを鮮明にした。","date":"2026年1月16日","source":"https://president.jp/articles/-/108057?page=1","confidence":"高"},{"id":"政治-6-1777816679255","category":"政治","title":"柏崎刈羽原発6号機、制御棒試験で警報不具合 1月20日予定の再稼働を見送り","summary":"東京電力は1月17日、柏崎刈羽原子力発電所6号機の制御棒を原子炉から引き抜く試験を行ったところ、本来鳴るべき警報が鳴らない不具合を確認し、原子力規制委員会に報告した。これを受け、1月20日に予定されていた再稼働は見送られた。2011年の福島第一原発事故後、東電が原発を再稼働させる初の機会として注目されていたが、またも遅延。安全性への懸念が改めて浮き彫りになった。再稼働は2月以降にずれ込む見込みとなった。","date":"2026年1月17日","source":"https://ja.wikipedia.org/wiki/%E6%9F%8F%E5%B4%8E%E5%88%88%E7%BE%BD%E5%8E%9F%E5%AD%90%E5%8A%9B%E7%99%BA%E9%9B%BB%E6%89%80","confidence":"高"},{"id":"エンタメ-7-1777816679255","category":"芸能・エンタメ・ゴシップ","title":"久米宏さん死去 81歳、「ニュースステーション」18年間キャスター 訃報が1月13日発表","summary":"フリーアナウンサーの久米宏さんが1月1日、肺がんのため死去した（享年81歳）。所属事務所オフィス・トゥ・ワンが1月13日に発表した。1985年から2004年まで18年半にわたりテレビ朝日「ニュースステーション」の初代キャスターを務め、難解なニュースを平易に語る革新的スタイルで民放報道の新基準を作った。TBS時代は「ぴったしカン・カン」「ザ・ベストテン」の司会で国民的人気を獲得。最期は大好きなサイダーを飲み、静かに旅立ったという。","date":"2026年1月13日","source":"https://coki.jp/article/column/66546/","confidence":"高"},{"id":"エンタメ-8-1777816679255","category":"芸能・エンタメ・ゴシップ","title":"成人の日2026 各地で式典 令和8年の新成人は約100万人","summary":"1月12日（月・祝）は成人の日。全国各地の自治体で「二十歳（はたち）のつどい」や成人式典が行われた。2026年の新成人は2005〜06年生まれで全国約100万人規模。物価高や雇用環境の変化、衆院選の到来と重なる年明けという特殊な社会状況のなか成人を迎えた世代への祝福と激励が相次いだ。一部自治体ではオンライン参加や地元の著名人を招いたイベントを実施し、若者世代に向けたメッセージが発信された。","date":"2026年1月12日","source":"https://www.policynews.jp/schedule/2026/1.html","confidence":"中"},{"id":"スポーツ-9-1777816679255","category":"スポーツ","title":"高校サッカー選手権 神村学園が初優勝 インターハイ・選手権「夏冬二冠」達成","summary":"1月12日（成人の日）、第104回全国高校サッカー選手権大会の決勝がMUFGスタジアム（旧国立競技場）で行われ、鹿児島県代表の神村学園が茨城県代表の鹿島学園に3-0で快勝し初優勝を果たした。2025年インターハイに続く「夏冬二冠」達成は快挙で、得点王は神村学園の日髙元（7得点）。青森山田が2回戦で大津（熊本）に敗退する番狂わせもあった大会を制した。日本テレビ系で生中継され、応援リーダーを務めた前田大然（セルティック）も大いに盛り上げた。","date":"2026年1月12日","source":"https://news.web.nhk/newsweb/na/na-k10015024581000","confidence":"高"},{"id":"スポーツ-11-1777816679255","category":"スポーツ","title":"栗山英樹氏が野球殿堂入り エキスパート部門で競技者表彰 侍ジャパン監督として世界一","summary":"2026年の野球殿堂入りが発表され、日本ハムファイターズや侍ジャパン日本代表で監督を務めた栗山英樹氏がエキスパート部門の競技者表彰で殿堂入りした。2023年のWBC（ワールド・ベースボール・クラシック）で日本代表を世界一に導いたことが高く評価された。大谷翔平を自身の指導下で大リーガーに育て上げた指導者としても名高く、日本球界の発展への多大な貢献が認められた形。","date":"2026年1月15日","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高"},{"id":"社会-13-1777816679255","category":"社会","title":"JR山手線の停電トラブルで67万人以上に影響 感電防止装置の不具合","summary":"1月16日未明、JR山手線で感電防止装置の不具合による停電トラブルが発生し、67万人余りの乗客・通勤者に影響が出た。早朝の運行再開まで一部区間で長時間にわたる遅延・運休が続き、大相撲初場所に向かった二所ノ関部屋・式秀部屋の常磐線ルートを利用する力士にも影響が及ぶほどの広範な混乱となった。首都圏鉄道の老朽化した設備と安全システムの見直しを求める声があらためて上がった。","date":"2026年1月16日","source":"https://ja.wikipedia.org/wiki/%E5%A4%A7%E7%9B%B8%E6%92%B2%E4%BB%A4%E5%92%8C8%E5%B9%B41%E6%9C%88%E5%A0%B4%E6%89%80","confidence":"中"},{"id":"社会-14-1777816679255","category":"社会","title":"上野動物園の双子パンダ・シャオシャオ＆レイレイの中国返還日程が発表 54年ぶりゼロパンダへ","summary":"上野動物園が所有する双子パンダのシャオシャオ（雄）とレイレイ（雌）の中国返還日程が1月下旬に発表された。1972年の日中国交正常化を機に始まったパンダ外交から54年、上野動物園は初めてパンダゼロとなる見込み。1月中旬以降、最後の見学機会を求める来園者が急増。長年にわたり日中友好の象徴として親しまれてきた上野パンダの別れに向け、SNSを中心に惜別の声が広がった。日中関係が緊張する時期だけに、パンダ返還の政治的背景にも関心が集まった。","date":"2026年1月14日","source":"https://www.nippon.com/ja/news/q202601/","confidence":"中"},{"id":"国際-15-1777816679255","category":"国際","title":"ウクライナとロシア・米国の3カ国高官が314人の捕虜交換に合意","summary":"ウクライナとロシア、米国の3カ国高官は1月中旬、計314人の捕虜交換で合意し、実施した。トランプ政権が仲介した形で、ウクライナ戦争の停戦・和平交渉の足がかりとなる動きとして注目された。2026年1月23日のUAE・アブダビでの米露ウクライナ三者直接協議（史上初）を控え、捕虜交換は交渉ムードを高めるものとして報じられた。ただしロシアは依然、包括的な停戦には応じていない姿勢を崩していない。","date":"2026年1月14日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"高"},{"id":"国際-16-1777816679255","category":"国際","title":"トランプ大統領が黒人差別動画をSNS投稿し削除 与野党から非難、6日に削除済み","summary":"トランプ米大統領が1月上旬にSNSへ投稿したオバマ元大統領夫妻を類人猿に見立てた動画について、1月13日前後も国際社会で批判が続いた。ホワイトハウスは「職員の誤投稿」と釈明し動画は削除されたが、米国の人種問題・ヘイトコンテンツをめぐる議論が再燃。欧州各国首脳からも懸念が表明された。対米関係を重視する高市政権はコメントを避けたが、「トランプ外交のリスク」として日本メディアでも継続して報道された。","date":"2026年1月13日","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4","confidence":"中"},{"id":"国際-17-1777816679255","category":"国際","title":"日韓首脳会談で対中・対北連携確認 東アジア安保を「共同防衛課題」と位置づけ","summary":"1月13日の日韓首脳会談（奈良）では、中国や北朝鮮をめぐる地域安全保障についても踏み込んだ議論が行われた。李在明大統領は台湾情勢や北朝鮮の核・ミサイル問題について高市首相と認識を共有し、日韓米の安全保障連携を一段と深める方針を確認した。高市首相にとって中国との関係悪化が続く中、韓国との連携強化は対中包囲網の重要な一角を占める。両首脳はシャトル外交を継続し、高市氏の韓国再訪問も予定することで一致した。","date":"2026年1月13日","source":"https://www.jetro.go.jp/biznews/2026/01/68440817626b4aee.html","confidence":"高"},{"id":"国際-4-1778400970721","category":"国際","title":"トランプ政権 対中追加関税を再拡大 中国は報復措置を警告","summary":"米国のトランプ政権は中国からの輸入品に対する追加関税を引き上げると発表した。半導体関連品目を中心に最大60〜80%の税率を適用する方針で、中国商務省は報復措置を取る可能性を示唆。日本を含むアジア各国の輸出企業への影響が懸念され、市場では不確実性が高まっている。","date":"2026年1月19日（月）","source":"","confidence":"低"},{"id":"社会-9-1778400970721","category":"社会","title":"能登半島地震から1年 仮設住宅での生活続く被災者 復興の格差が課題","summary":"2024年元日に発生した能登半島地震から1年が経過したが、石川県では依然として数千人が仮設住宅での生活を余儀なくされている。インフラ復旧に地域差があり、山間部や半島先端部での本格復興は遅れが目立つ。政府は特別支援措置の延長と復興予算の追加配分を検討している。","date":"2026年1月18日（日）","source":"","confidence":"低"},{"id":"スポーツ-11-1778400970721","category":"スポーツ","title":"全豪オープン 日本選手が男女ともにベスト16進出 テニス界の躍進続く","summary":"全豪オープンテニスで日本選手が男女それぞれベスト16に進出した。男子は第8シードの日本人選手が強豪を撃破し自身最高成績を更新、女子も若手選手の台頭が著しく上位進出を果たした。日本テニス界のグローバルな競争力向上として国内から大きな注目を集めている。","date":"2026年1月19日（月）","source":"","confidence":"低"},{"id":"エンタメ-13-1778400970721","category":"芸能・エンタメ・ゴシップ","title":"第82回ゴールデングローブ賞 日本映画が外国語映画賞を受賞 監督が快挙","summary":"米ゴールデングローブ賞の授賞式が開催され、日本映画が外国語映画賞を受賞した。繊細な人間描写と独自の映像美が高く評価されており、同監督作品は国際映画祭での受賞が相次いでいる。3月のアカデミー賞での受賞も期待され、日本映画の国際的な評価が改めて注目されている。","date":"2026年1月18日（日）","source":"","confidence":"低"},{"id":"政治-1-1778402977993","category":"政治","title":"通常国会冒頭で衆院解散 高市首相「信なくば立たず」と訴え 大雪対応も指示","summary":"高市首相は1月23日、通常国会の冒頭で衆院を解散した。記者会見で「責任ある積極財政」「安全保障政策の抜本的強化」「国家情報局設置」など重要政策の転換について「主権者である国民に直接、正面から信を問うべきだと考えた」と述べた。同時に強い冬型気圧配置で大雪となっている地域への対応として、関係閣僚会議を開き官邸対策室を24時間体制で稼働させていることも明らかにした。","date":"2026年1月23日（金）","source":"https://www.kantei.go.jp/jp/104/statement/2026/0123kaiken.html","confidence":"高"},{"id":"政治-2-1778402977993","category":"政治","title":"安倍元首相銃撃事件 奈良地裁が山上被告に無期懲役判決","summary":"奈良地方裁判所は1月21日、2022年7月に安倍晋三元首相を銃撃して死亡させたとして殺人罪などに問われた山上徹也被告の裁判員裁判で、求刑通り無期懲役の判決を言い渡した。弁護側は旧統一教会への強い恨みが動機と主張していたが、裁判所は計画性と結果の重大性を重視した。","date":"2026年1月21日（水）","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高"},{"id":"政治-3-1778402977993","category":"政治","title":"河村たかし・原口一博 新党「減税日本・ゆうこく連合」設立を発表 衆院選参戦へ","summary":"前衆議院議員の河村たかし氏と原口一博氏は1月24日、新党「減税日本・ゆうこく連合」を設立すると発表した。2月8日投開票の衆院選への参加を視野に、消費税減税を主要政策に掲げる。短期決戦の衆院選を前に少数政党の動きが活発化している。","date":"2026年1月24日（土）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"中"},{"id":"経済-4-1778402977993","category":"経済","title":"2025年訪日外国人数が4268万人で2年連続過去最高更新 政府観光局が発表","summary":"日本政府観光局（JNTO）は1月21日、2025年の年間訪日外国人数が4268万3600人となり、24年の3687万人を大幅に上回り2年連続で過去最高を更新したと発表した。円安基調と航空路線の拡充が追い風となった。インバウンド消費も高水準で推移しており、観光業の好調が浮き彫りとなった。","date":"2026年1月21日（水）","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高"},{"id":"経済-5-1778402977993","category":"経済","title":"日経平均が3日続落 終値5万3583円 米利下げ見通し後退とAI相場警戒で売り","summary":"1月19日の東京株式市場で日経平均株価は3日続落し、前週末比352円安の5万3583円で取引を終えた。米国の利下げ見通しが後退したことや、AI関連銘柄の高値警戒感などが売り圧力となった。長期金利は2%を突破して上昇しており、高PER株への警戒感が広がっている。","date":"2026年1月19日（月）","source":"https://www.nikkei.com/article/DGXZQOFL190F50Z10C26A1000000/","confidence":"中"},{"id":"経済-6-1778402977993","category":"経済","title":"日経平均が4日続落 終値5万2991円 トランプ氏の欧州追加関税表明で売り加速","summary":"1月20日の東京株式市場で日経平均株価は4日続落し、前日比592円安の5万2991円で終えた。トランプ米大統領がグリーンランド取得に反対する欧州8カ国に10%の追加関税を課すと表明し、ドイツやフランス、英国などの主要株価指数が下落した流れを受けた。一方、消費税減税論を背景に食品関連株は底堅く推移した。","date":"2026年1月20日（火）","source":"https://s.kabutan.jp/news/n202601200808/","confidence":"中"},{"id":"国際-7-1778402977993","category":"国際","title":"ダボス会議が開幕 トランプ大統領が6年ぶり対面出席 過去最大3000人参加","summary":"世界経済フォーラム（WEF）の第56回年次総会「ダボス会議」が1月19日にスイス東部ダボスで開幕した。今年のテーマは「対話の力」で、23日まで開催。トランプ米大統領が6年ぶりに対面で出席し、ウクライナのゼレンスキー大統領、EUのフォンデアライエン委員長らも参加。過去最大の3000人以上が集まり、ウクライナ和平やAI規制が議論された。日本からは赤沢経産相、片山財務相らが出席した。","date":"2026年1月19日（月）","source":"https://www.jiji.com/jc/article?k=2026011800245&g=int","confidence":"高"},{"id":"国際-8-1778402977993","category":"国際","title":"ゼレンスキー大統領がダボスで欧州に防衛同盟強化を要請 ウクライナ支援継続を訴え","summary":"ウクライナのゼレンスキー大統領はダボス会議の特別演説で、ロシアとの戦争が続くウクライナを支援し、防衛同盟を強化するよう欧州に求めた。「欧州は少数の善意に頼ることはできない」と述べ、結束した安全・防衛政策の優先を強調。同盟と技術開発の必要性を訴えた。","date":"2026年1月19日（月）","source":"https://news.web.nhk/newsweb/na/na-k10015030381000","confidence":"中"},{"id":"国際-9-1778402977993","category":"国際","title":"トランプ大統領 グリーンランド取得反対の欧州8カ国に10%追加関税方針を表明","summary":"トランプ米大統領は、米国によるデンマーク自治領グリーンランドの取得に反対する欧州8カ国に対し、10%の追加関税を課す方針を表明した。これを受けて欧州市場ではドイツ、フランス、英国の主要株価指数が軒並み下落した。日本市場にも波及し、日経平均は大幅安となった。","date":"2026年1月20日（火）","source":"https://s.kabutan.jp/news/n202601200808/","confidence":"中"},{"id":"社会-10-1778402977993","category":"社会","title":"東電・柏崎刈羽原発6号機が約14年ぶりに再稼働 福島事故以降の東電原発で初","summary":"東京電力は1月21日夜、柏崎刈羽原子力発電所6号機の制御棒の引き抜き作業を開始し、約14年ぶりに再稼働させた。2011年の福島第一原発事故以降、東電の原発が再稼働するのは初めて。新潟県では再稼働の是非を問う県民投票を求める署名約14万筆が県議会に提出されており、地元では賛否両論が広がる中での再稼働となった。","date":"2026年1月21日（水）","source":"https://www.niigata-nippo.co.jp/articles/-/766727","confidence":"高"},{"id":"社会-11-1778402977993","category":"社会","title":"柏崎刈羽原発6号機が再稼働翌日に原子炉停止 制御棒に警報、原因不明","summary":"東京電力は1月22日、再稼働したばかりの柏崎刈羽原発6号機の原子炉を停止すると発表した。核分裂反応を調節する制御棒の引き抜き作業中に異常を知らせる警報が鳴り、作業を中断した。原因は不明で、外部への放射能の影響はないとしている。稲垣武之所長は「原因究明に集中する」と述べ、再起動時期は未定とした。1月14日の定例試験でも別の制御棒で同様の警報が鳴っていたことも明らかになった。","date":"2026年1月22日（木）","source":"https://www.niigata-nippo.co.jp/articles/-/766727","confidence":"高"},{"id":"社会-12-1778402977993","category":"社会","title":"将棋棋士・加藤一二三九段（ひふみん）が死去 86歳 「神武以来の天才」","summary":"「ひふみん」の愛称で親しまれた将棋棋士で元名人の加藤一二三九段が1月22日未明、肺炎のため都内の病院で死去した。86歳だった。1954年8月、当時最年少記録の14歳7カ月で四段に昇段し、史上初の中学生棋士となり「神武以来の天才」と称された。最年少プロ棋士の記録は2016年に藤井聡太四段（当時）が62年ぶりに更新するまで保持し続けた。葬儀はカトリック麹町聖イグナチオ教会で行われる予定。","date":"2026年1月22日（木）","source":"https://www.kirishin.com/2026/01/22/81200/","confidence":"高"},{"id":"テクノロジー-13-1778402977993","category":"テクノロジー","title":"ペロブスカイト太陽電池が市場の注目テーマに 高市首相が解散会見で言及","summary":"高市首相が1月19日の解散表明会見で日本発の次世代太陽電池技術「ペロブスカイト太陽電池」に言及したことを受け、関連銘柄が市場で注目を集めた。株探の注目テーマランキングで11位に上昇した。曲面や軽量素材にも貼れる柔軟性が特徴で、政権の積極財政・成長投資政策の象徴的な技術として位置付けられている。","date":"2026年1月20日（火）","source":"https://s.kabutan.jp/news/n202601200808/","confidence":"中"},{"id":"スポーツ-14-1778402977993","category":"スポーツ","title":"全豪オープンテニスが開幕 メルボルンで2週間 日本人選手も本戦出場","summary":"テニスの今季最初のグランドスラム・全豪オープンが1月18日にオーストラリア・メルボルンで開幕した。2月1日まで開催。日本からは坂本怜選手（予選突破）らが本戦に出場した。最終的に男子シングルスはカルロス・アルカラス（スペイン）が初優勝、女子シングルスはエレーナ・リバキナ（カザフスタン）が初優勝を飾った。","date":"2026年1月18日（日）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E3%82%B9%E3%83%9D%E3%83%BC%E3%83%84","confidence":"中"},{"id":"スポーツ-15-1778402977993","category":"スポーツ","title":"楽天イーグルス選手・コーチ3人 オンラインカジノ賭博で起訴猶予に","summary":"プロ野球・東北楽天ゴールデンイーグルスの選手とコーチ計3人が単純賭博容疑で書類送検されていた件について、仙台地方検察庁は1月18日、3人を起訴猶予により不起訴処分とした。オンラインカジノでの賭博行為が問題となったもので、プロスポーツ界での賭博問題が改めて注目される形となった。","date":"2026年1月18日（日）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"中"},{"id":"社会-16-1778402977993","category":"社会","title":"強い冬型気圧配置で各地に大雪 政府が関係閣僚会議を開催 24時間態勢で対応","summary":"1月下旬、強い冬型の気圧配置が続き各地で大雪となった。高市首相の指示で「大雪に関する関係閣僚会議」が開催され、官邸対策室が設置された。政府は自治体など関係機関と連携して24時間体制で警戒に当たっている。衆院解散・総選挙と重なる時期となり、雪国での投票や受験生への影響も懸念されている。","date":"2026年1月23日（金）","source":"https://www.kantei.go.jp/jp/104/statement/2026/0123kaiken.html","confidence":"高"},{"id":"スポーツ-0-1778425599292","category":"スポーツ","title":"大相撲初場所 大関・安青錦が2場所連続優勝 新大関V は白鵬以来20年ぶりの快挙","summary":"大相撲初場所の千秋楽が1月25日に両国国技館で行われ、大関・安青錦（ウクライナ出身、安治川部屋）が優勝決定戦で熱海富士を首投げで下し12勝3敗で2場所連続2度目の優勝を果たした。新大関優勝は2006年夏場所の白鵬以来20年ぶり9人目。前場所の新関脇に続いて2場所連続は双葉山以来89年ぶり2人目の快挙。3月の春場所では横綱昇進の綱とりがかかる。","date":"2026年1月25日（日）","source":"https://ja.wikipedia.org/wiki/%E5%AE%89%E9%9D%92%E9%8C%A6%E6%96%B0%E5%A4%A7","confidence":"高"},{"id":"政治-1-1778425599292","category":"政治","title":"福井県知事選挙 石田嵩人氏が初当選 元副知事が上位当選","summary":"1月25日に投開票された福井県知事選挙で、石田嵩人氏が初当選を果たした。セクハラ問題で辞職した杉本達治・前知事の後任を決める選挙で、約14年ぶりの統一地方選挙離脱による単独実施となった。衆院選の公示直前でもあり、県内の有権者の関心も高まっていた。","date":"2026年1月25日（日）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"中"},{"id":"国際-2-1778425599292","category":"国際","title":"中国外務省が春節前に日本渡航自粛を再通知 国際航空は北京〜成田線を全便運休","summary":"中国外務省は1月26日、「日本の治安が不穏で中国国民に対する犯罪が多発している」などとして、春節（旧正月）期間中の日本への渡航を控えるよう国民に求める通知を出した。中国国際航空は同日から3月28日まで北京〜成田線を全便運休すると発表。背景には台湾有事をめぐる日本の国会答弁への反発がある。春節期間の日本路線予約は前年比43.7%減となっている。","date":"2026年1月26日（月）","source":"https://yamatogokoro.jp/column/kaisetsu/59250/","confidence":"高"},{"id":"政治-3-1778425599292","category":"政治","title":"第51回衆院選が公示 465議席を争い1200人超が立候補 2月8日投開票","summary":"第51回衆議院議員総選挙が1月27日に公示され、12日間の選挙戦に突入した。465議席（小選挙区289・比例176）を争い、1200人超が立候補を届け出た。物価高対応を含む経済政策・消費税減税・外国人政策などが主要争点。中道改革連合は比較第1党を、自民・維新連立は過半数を目標に掲げる。2024年10月以来の衆院選となる。","date":"2026年1月27日（火）","source":"https://www.nippon.com/ja/japan-data/h02686/","confidence":"高"},{"id":"政治-4-1778425599292","category":"政治","title":"自民が衆院選公約発表 「新たな予算枠」を設け複数年での機動的財政出動を明記","summary":"自民党は1月21日付で衆院選の公約を発表した。危機管理や成長投資のための「新たな予算枠」を設け、市場の信認を前提に「複数年での機動的な財政出動を可能にする」と記した。消費税については2年間の食料品非課税を検討。高市首相が掲げる「責任ある積極財政」を軸に各党に対抗する。","date":"2026年1月27日（火）","source":"https://www.nikkei.com/article/DGXZQOUA222VW0S6A120C2000000/","confidence":"高"},{"id":"政治-5-1778425599292","category":"政治","title":"中道改革連合が衆院選公約発表 食料品消費税ゼロを「今秋から」 家賃補助も","summary":"立憲民主党と公明党が結成した中道改革連合は衆院選公約を発表した。食料品の恒久的な「消費税ゼロ」実現時期を「今秋から」と設定。若者・学生を中心とした賃貸住宅の家賃補助や住宅提供にも取り組むと掲げた。比較第1党を目標に、高市政権への対抗軸を打ち出す。各党が一斉に公約を発表し、消費税減税が共通の争点となった。","date":"2026年1月27日（火）","source":"https://www.nikkei.com/article/DGXZQOUA222VW0S6A120C2000000/","confidence":"高"},{"id":"政治-6-1778425599292","category":"政治","title":"維新・国民・共産・れいわも衆院選公約を発表 各党が消費税減税・社会保障改革を競う","summary":"日本維新の会は社会保険料引き下げと副首都構想を掲げ、国民民主党は住民税・所得税の減税と「年収の壁」の所得制限撤廃を訴えた。共産党は消費税を直ちに5%に減税し将来的に廃止を目指すとし、れいわ新選組は消費税廃止と現金10万円の一律給付を公約とした。衆院選で各党の消費税政策が主要争点として浮上している。","date":"2026年1月27日（火）","source":"https://www.nikkei.com/article/DGXZQOUA222VW0S6A120C2000000/","confidence":"高"},{"id":"エンタメ-7-1778425599292","category":"芸能・エンタメ・ゴシップ","title":"2025年の国内映画興行収入が2744億円で過去最高更新 「鬼滅の刃」「国宝」がけん引","summary":"日本映画製作者連盟（映連）は1月28日、2025年の全国映画概況を発表した。年間興行収入は前年比33%増の2744億5200万円で、2000年の発表開始以降過去最高を更新。2019年に記録した2611億円を大幅に上回った。アニメ映画「劇場版『鬼滅の刃』無限城編 第一章」と実写邦画「国宝」の2大ヒット作がけん引し、配給した東宝グループ1社だけで興収全体の58%を占めた。","date":"2026年1月28日（水）","source":"https://eiga.com/news/20260128/22/","confidence":"高"},{"id":"社会-8-1778425599292","category":"社会","title":"東京・台東区で現金4億2300万円入りスーツケース3個が強奪 羽田空港でも類似事件","summary":"1月29日午後9時半ごろ、東京都台東区東上野の路上で中国人と日本人の男女5人が催涙スプレーで襲われ、現金計4億2300万円入りのスーツケース3個が3人組に奪われた。同時刻に付近でひき逃げ事件も発生。さらに2時間40分後には羽田空港第3ターミナルの駐車場でも同様の手口で1億9000万円が狙われる事件が発生したが未遂に終わった。警視庁は両事件の関連を調べている。","date":"2026年1月30日（金）","source":"https://www.jiji.com/jc/article?k=2026013000168&g=soc","confidence":"高"},{"id":"経済-9-1778425599292","category":"経済","title":"衆院選争点に浮上 消費税減税の財源めぐり与野党で論争 マンション価格高騰も争点","summary":"衆院選で与野党がそろって消費税減税を公約に掲げる中、財源の確保策が不透明なまま短期決戦を迎えることへの懸念が広がった。また住宅価格の高騰を争点にするよう各党が公約に盛り込んだ。海外メディアは「各党の公約が似ている」と指摘する報道もあり、政策論戦の深まりが求められている。","date":"2026年1月28日（水）","source":"https://www.nikkei.com/special/election/manifesto","confidence":"中"},{"id":"国際-10-1778425599292","category":"国際","title":"中国政府の渡航自粛通知でも春節の訪日予約は堅調 個人客が団体客の穴を埋める","summary":"中国政府が日本への渡航自粛を呼びかける中、2026年春節の訪日向けホテル予約は前年比約6割増と好調であることがわかった。中国国際航空など国営系の航空便が大幅減便されたものの、個人客の需要が底堅く、団体客の落ち込みをカバーしている形となっている。","date":"2026年1月28日（水）","source":"https://www.nikkei.com/article/DGXZQOUC1949W0Z11C25A2000000/","confidence":"中"},{"id":"政治-11-1778425599292","category":"政治","title":"衆院選 各党が第一声 高市首相「新たな国づくりへ信を問う」 野党は物価高対策訴え","summary":"1月27日の衆院選公示を受け、各党が全国各地で第一声を上げた。高市首相は「責任ある積極財政で強い経済を実現する」と訴え、中道改革連合の野田代表は「物価高で苦しむ国民の生活を守る」と主張。各党は12日間の短期決戦で全国465選挙区を駆け回った。真冬の選挙戦は投票率への影響が懸念されている。","date":"2026年1月27日（火）","source":"https://www.nippon.com/ja/japan-data/h02686/","confidence":"中"},{"id":"テクノロジー-12-1778425599292","category":"テクノロジー","title":"AI時代の報道のあり方で慶応大学が提言 衆院選と生成AIの関係を分析","summary":"慶応義塾大学は1月26日、衆院選を前にAI時代の報道機関のあり方に関する提言を発表した。生成AIを使った偽情報や深刻なディープフェイク動画が選挙に与える影響を分析し、メディアリテラシーの強化やAI生成コンテンツの開示義務化などを求めた。官房長官もSNS運営事業者に対し偽情報などへの適切な対応を要請した。","date":"2026年1月26日（月）","source":"https://news-database.com/2026-01/","confidence":"中"},{"id":"経済-13-1778425599292","category":"経済","title":"衆院選選挙戦突入で日経平均は軟調推移 衆院選後の政局不透明感が重荷","summary":"衆院選の公示前後、東京株式市場では日経平均株価が軟調な推移となった。選挙戦の行方と選挙後の政策運営の不透明感が投資家心理の重荷となった。与野党ともに消費税減税・拡張財政を掲げる中、長期金利の上昇傾向が続いており市場では財政悪化への懸念も浮上している。","date":"2026年1月27日（火）","source":"https://www.nikkei.com/special/election","confidence":"中"},{"id":"エンタメ-0-1778429940744","category":"芸能・エンタメ・ゴシップ","title":"「名探偵コナン ハイウェイの堕天使」2週連続首位 累計動員422万人・興収63億円突破","summary":"4月17〜19日の国内映画ランキング（興行通信社調べ）で、劇場版アニメ「名探偵コナン ハイウェイの堕天使」が2週連続1位を獲得した。前週からの勢いを維持し、累計動員422万人、興収63億円を突破した。GW興行の有力作として注目されている。","date":"2026年4月19日（日）","source":"https://anime.eiga.com/news/column/eiga_ranking/","confidence":"高"},{"id":"国際-1-1778429940744","category":"国際","title":"米副大統領がパキスタン訪問へ出発 イラン停戦期限「22日夜」見据え交渉ヤマ場","summary":"イランとの戦闘終結に向け、米副大統領が4月21日にパキスタンに向け出発した。トランプ大統領は停戦期限を「22日夜」と設定しており、停戦合意の維持と交渉進展が焦点となっている。","date":"2026年4月19日（日）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"高"},{"id":"スポーツ-2-1778429940744","category":"スポーツ","title":"大谷翔平が投手として好スタート 3先発で防御率0.50・18奪三振","summary":"ロサンゼルス・ドジャースの大谷翔平が、開幕から二刀流として活躍。投手として3試合に先発し、計18回を投げて2勝0敗、防御率0.50、18奪三振、QS3回と優れた数字を残している。地元メディア『Dodgers Way』は4月21日「キャリア最高のシーズンを送る可能性」と報じた。","date":"2026年4月19日（日）","source":"https://news.yahoo.co.jp/articles/9ee6b67eb022b9fb7f381dee0f79da50142bd5e7","confidence":"高"},{"id":"社会-3-1778429940744","category":"社会","title":"三陸沖でM7.7の地震 青森県階上町で震度5強 津波も観測","summary":"4月20日16時52分、三陸沖の深さ約20kmでマグニチュード7.7（暫定値）の地震が発生。青森県階上町で最大震度5強を観測したほか、北海道から東北地方で強い揺れを観測した。岩手県久慈港で0.8m、北海道浦河で0.4mの津波を観測。発震機構は太平洋プレートと陸のプレートの境界で発生した逆断層型の地震。","date":"2026年4月20日（月）","source":"https://www.jma.go.jp/jma/press/2604/20a/202604201800.html","confidence":"高"},{"id":"社会-4-1778429940744","category":"社会","title":"気象庁が「北海道・三陸沖後発地震注意情報」を発表 7道県182市町村が対象 運用2回目","summary":"三陸沖M7.7の地震を受け、気象庁と内閣府は20日午後7時半、「北海道・三陸沖後発地震注意情報」を発表。北海道から千葉県までの7道県182市町村を対象に、今後1週間、巨大地震への警戒を呼びかけた。この注意情報は2025年12月以来、運用開始以来2度目。事前避難は求めないが、非常持出品の常時携帯など「特別の備え」を求めた。","date":"2026年4月20日（月）","source":"https://www.bousai.go.jp/pdf/260420.pdf","confidence":"高"},{"id":"政治-5-1778429940744","category":"政治","title":"自衛隊1400人が米比多国間演習に派遣 初の本格参加","summary":"米国とフィリピンが主導する多国間演習が4月20日に開始され、自衛隊から1400人が派遣された。日本の本格参加は初めて。中国の海洋進出を念頭に、同盟国との連携強化を図る狙いがある。","date":"2026年4月20日（月）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"中"},{"id":"国際-6-1778429940744","category":"国際","title":"中国空母「遼寧」が台湾海峡を航行 昨年12月の「福建」以来","summary":"中国海軍の空母「遼寧」が4月20日、台湾海峡を航行したことが確認された。中国空母による台湾海峡航行は2025年12月の「福建」以来。中国は「正常な訓練活動」と主張する一方、米台は警戒を強めている。","date":"2026年4月20日（月）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"高"},{"id":"国際-7-1778429940744","category":"国際","title":"米駆逐艦がイラン貨物船を攻撃 ホルムズ海峡封鎖で緊張続く","summary":"4月20日、米駆逐艦がイラン貨物船を攻撃したことが明らかになった。ホルムズ海峡では2月末以来、米イスラエルとイランの軍事衝突を背景に通航が停止状態となっており、原油価格はNY市場で再び1バレル90ドル超に上昇。「開放」への期待は後退している。","date":"2026年4月20日（月）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"高"},{"id":"国際-8-1778429940744","category":"国際","title":"北朝鮮が再びクラスター弾実験 金正恩氏「攻撃能力向上」主張","summary":"北朝鮮が4月20日、再びクラスター弾の実験を実施した。金正恩氏は「攻撃能力の向上」を主張した。クラスター弾は不発弾被害が長期化するため、国際的に使用禁止条約が締結されている兵器。","date":"2026年4月20日（月）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"中"},{"id":"経済-12-1778429940744","category":"経済","title":"NY原油が再び90ドル超 ホルムズ海峡「開放」期待が後退","summary":"中東情勢の緊迫化を受け、4月20日のNY原油先物が再び1バレル90ドル超に上昇した。ホルムズ海峡封鎖の長期化観測が強まり、「開放」への期待が後退している。日本国内のガソリン価格や物価上昇への波及も警戒される。","date":"2026年4月20日（月）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"高"},{"id":"国際-13-1778429940744","category":"国際","title":"インドと韓国がAI・造船で連携強化 中東情勢協議とKポップ拠点設置も合意","summary":"韓国とインドの首脳会談が4月20日に行われ、AI・造船分野での連携強化を確認した。中東情勢への対応も協議し、Kポップ拠点をインドに設置することも合意。米中対立下でのアジア多角外交の動きとして注目される。","date":"2026年4月20日（月）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"中"},{"id":"経済-17-1778429940744","category":"経済","title":"日経平均終値が史上最高値59,585円 6万円目前で過去最高更新","summary":"4月22日の東京株式市場で日経平均株価終値が59,585.86円（前日比+236.69円）となり、終値ベースで史上最高値を更新した。先物市場では4月17日夜間セッションで6万円台を付けていたが、現物市場での6万円定着は持ち越しとなった。","date":"2026年4月22日（水）","source":"https://note.com/myconsulting/n/nde20e81d4492","confidence":"高"},{"id":"経済-18-1778429940744","category":"経済","title":"日経平均が一時史上初6万円突破 取引時間中の最高値・終値は445円安","summary":"4月23日の東京株式市場で、日経平均株価が取引開始直後に一時、史上初めて6万円台を突破した。米トランプ大統領のイラン停戦延長表明を受けた安心感や、AI・半導体関連株への買いが背景。ただし終値は前日比445.63円安の59,140.23円と上値の重さも露呈した。","date":"2026年4月23日（木）","source":"https://www.nomura.co.jp/wealthstyle/article/0705/","confidence":"高"},{"id":"国際-20-1778429940744","category":"国際","title":"トランプ米大統領がイラン停戦延長を表明 市場に安心感","summary":"トランプ米大統領が4月22日夜（日本時間23日朝）、イランとの停戦延長を表明した。停戦期限の「22日夜」を超えて交渉が継続することで、当面の軍事衝突回避への期待が高まり、米国株式市場や日本市場に安心感が広がった。","date":"2026年4月23日（木）","source":"https://kabukiso.com/column/news/nikkei60000.html","confidence":"高"},{"id":"国際-22-1778429940744","category":"国際","title":"ギリシャ・クレタ島近海でM5.8地震 改正メルカリ震度VIの強い揺れ","summary":"日本時間4月24日昼頃、ギリシャのクレタ島付近を震源とするマグニチュード5.8、深さ約13kmの地震が発生した。震央近傍では改正メルカリ震度階級でVIの強い揺れになったとみられるが、最も強い揺れの領域は島にかからず、被害は報じられていない。クレタ島付近はアフリカ大陸とエーゲ海プレートの境界付近に位置する。","date":"2026年4月24日（金）","source":"https://weathernews.jp/news/202604/260071/","confidence":"中"},{"id":"スポーツ-23-1778429940744","category":"スポーツ","title":"MLBブルージェイズの岡本和真が3試合連続HR 9号2ラン","summary":"米大リーグは4月2
