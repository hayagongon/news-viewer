026-03-24","source":"https://www.jiji.com/jc/article?k=2026032400821&g=eco","confidence":"高","snippet":"トヨタ自動車がグループ源流企業の豊田自動織機を「約5兆9000億円で買収し、日本企業同士のM&Aとして過去最大」となりました。買い付けは「1株2万600円で実施され、議決権ベースで63.60%の応募があり」豊田織機は上場廃止予定です。"},{"id":"2026-03-22-eco-002","category":"経済","title":"ソニー・ホンダモビリティ、EV「AFEELA 1」の開発・発売を中止","summary":"ソニー・ホンダモビリティは3月25日、開発中だった電気自動車「AFEELA 1」および第2弾モデルの開発・発売を中止すると発表した。2026年3月12日にホンダが四輪電動化戦略の見直しを発表したことで、ホンダからの提供を前提としていた技術やアセットの活用が困難になったことが主因。ソニー・ホンダモビリティは2022年に設立され、CES 2023でAFEELA 1を発表していた。","date":"2026-03-25","source":"https://www.shm-afeela.com/ja/news/2026-03-25/","confidence":"高","snippet":"2026年3月12日に発表されたHondaの四輪電動化戦略の見直しに伴い、当初の事業計画策定時にHondaからの提供を前提としていた技術やアセットの活用が困難な状況となりました。"},{"id":"2026-03-22-eco-003","category":"経済","title":"ローム・東芝・三菱電機がパワー半導体統合で基本合意、統合すれば世界2位へ","summary":"ローム・東芝デバイス&ストレージ・三菱電機の3社は3月27日、パワー半導体事業の統合に向けた協議開始の基本合意書を締結した。3社のパワー半導体事業を統合した場合の世界シェアは約11.3%となり、onsemiの7.9%を抜いて世界第2位になる見込み。経産省も後押しする国策的な再編で、中国・欧米の競合に対抗する狙い。","date":"2026-03-27","source":"https://www.global.toshiba/jp/news/corporate/2026/03/news-20260327-01.html","confidence":"高","snippet":"三菱電機も加わった当該事業の事業・経営統合が、世界市場で競争し得る事業規模や技術基盤を実現し、もって、我が国の半導体事業として幅広い顧客層と広範な産業分野の発展に大きく貢献するものであるという考えから、三社は協議開始に合意した。"},{"id":"2026-03-22-eco-004","category":"経済","title":"ユニクロがMLBドジャースとパートナーシップ締結、グラウンドに「ユニクロフィールド」の名称","summary":"ファーストリテイリング傘下のユニクロは3月26日、MLB・ロサンゼルス・ドジャースとの歴史的パートナーシップ締結を発表した。ドジャースタジアムのグラウンドが「UNIQLO Field at Dodger Stadium（ユニクロフィールド・アット・ドジャースタジアム）」と命名された。バックスクリーン上部などにユニクロロゴが表示される。ユニクロにとって米国での初の本格的なスポーツパートナーシップ契約。","date":"2026-03-26","source":"https://www.uniqlo.com/jp/ja/contents/corp/press-release/2026/03/26032610_news.html","confidence":"高","snippet":"ドジャースとユニクロ、歴史的パートナーシップを締結。「UNIQLO Field at Dodger Stadium」が誕生し、ユニクロにとって米国での初の本格的スポーツパートナーシップとなった。"},{"id":"2026-03-22-eco-005","category":"経済","title":"2026年春闘・連合第1回集計で賃上げ率5.26%、3年連続5%超を達成","summary":"連合（日本労働組合総連合会）が3月23日に発表した2026年春季生活闘争の第1回集計結果によると、ベースアップと定期昇給を合わせた賃上げ率の加重平均は5.26%となった。前年同時点（5.46%）を下回ったものの、3年連続で5%超の高水準を維持。300人未満の中小組合でも5.05%と5%台を記録した。","date":"2026-03-23","source":"https://www.jiji.com/jc/article?k=2026032300750&g=eco","confidence":"高","snippet":"基本給を底上げするベースアップ（ベア）と定期昇給を合わせた賃上げ率の加重平均は５．２６％だった。前年同時点の５．４６％を下回ったものの、５％を超える高水準を維持した。"},{"id":"2026-03-22-soc-001","category":"社会","title":"東京・池袋サンシャインシティのポケモンセンターで女性店員(21)刺殺、男も死亡","summary":"3月26日、東京・豊島区のサンシャインシティ内にある「ポケモンセンタートウキョー」で、20代の男が女性店員（21歳）を刃物で刺して殺害し、その後自らの首を刺して死亡した。警察は「2人の関係を巡って過去に相談が寄せられていた」としており、ストーカー事件とみられる。商業施設内での凶行に大きな衝撃が広がった。","date":"2026-03-26","source":"https://www.nikkei.com/article/DGXZQOUD26AL40W6A320C2000000/","confidence":"高","snippet":"男は20代くらいで、女性を刺した後に自らの首を刃物で刺し、まもなく死亡した。警察は2人の関係を巡って過去に相談が寄せられていたとしており、何らかのトラブルが背景にあった可能性があるとしている。"},{"id":"2026-03-22-soc-002","category":"社会","title":"「紀州のドン・ファン」事件の控訴審で大阪高裁が元妻・須藤早貴被告に2審も無罪判決","summary":"「紀州のドン・ファン」と呼ばれた和歌山県の資産家・野崎幸助さん（死亡時77歳）を覚醒剤で殺害したとして殺人罪などに問われた元妻・須藤早貴被告の控訴審で、大阪高裁は3月23日、1審・和歌山地裁の無罪判決を支持し、検察側の控訴を棄却した。検察は4月6日に最高裁へ上告した。","date":"2026-03-23","source":"https://news.web.nhk/newsweb/na/na-k10015081741000","confidence":"高","snippet":"「紀州のドン・ファン」と呼ばれた和歌山県の資産家が急性覚醒剤中毒で死亡したことをめぐり、殺人などの罪に問われた元妻の2審の判決で、大阪高等裁判所は、1審に続いて無罪を言い渡しました。"},{"id":"2026-03-22-soc-003","category":"社会","title":"旭川いじめ自殺訴訟で和解成立、旭川市が遺族に7000万円を支払い","summary":"2021年に北海道旭川市でいじめを受けた中学2年・広瀬爽彩さん（当時14歳）が凍死した問題で、遺族が約1億1500万円の損害賠償を旭川市に求めた訴訟が3月26日に旭川地裁で和解した。市が7000万円を支払う内容。当初市は「いじめに至っていない」としていたが、第三者委員会が性的動画の要求など6項目をいじめと認定していた。弁護団は「勝訴的和解」と強調。","date":"2026-03-26","source":"https://www.jiji.com/jc/article?k=2026032600737&g=soc","confidence":"高","snippet":"旭川市が遺族に7000万円を支払う内容で和解が成立。遺族側弁護団は「勝訴的和解だ」と強調し、いじめ自殺を巡る訴訟の賠償金としては異例の高額だとした。"},{"id":"2026-03-22-soc-004","category":"社会","title":"陸上自衛官が刃物を持って中国大使館に侵入・逮捕、「大使に意見伝えたかった」","summary":"3月24日午前9時ごろ、東京都港区の中国大使館の敷地内に男が侵入しているのを大使館職員が発見。警視庁公安部は建造物侵入容疑で、陸上自衛隊えびの駐屯地（宮崎県）所属の3等陸尉・村田晃大容疑者（23歳）を逮捕した。容疑者は「大使に意見を伝えたかった、受け入れられなければ自決しようと思った」と供述。敷地内から刃渡り18センチの包丁が発見された。けが人はなく、中国側は日本政府に厳重抗議した。","date":"2026-03-24","source":"https://www.jiji.com/jc/article?k=2026032401028&g=soc","confidence":"高","snippet":"24日午前9時ごろ、東京都港区の中国大使館の敷地内に男が侵入しているのを大使館職員が発見した。警視庁公安部は建造物侵入容疑で、陸上自衛隊に所属する3等陸尉村田晃大容疑者（23）を逮捕した。"},{"id":"2026-03-22-spo-001","category":"スポーツ","title":"坂本花織がフィギュア世界選手権4度目の優勝・現役引退、日本勢女子単独最多","summary":"フィギュアスケート世界選手権（チェコ・プラハ）の女子フリーが3月28日に行われ、ミラノ・コルティナ五輪銀メダリストの坂本花織が自己ベストのフリー158.97点・合計238.28点で優勝した。4度目の世界女王は日本女子選手の単独最多記録。現役最後の試合を最高の形で飾った。同大会での2位は千葉百音（228.47点）と日本勢がワン・ツーフィニッシュを果たした。","date":"2026-03-28","source":"https://www.jiji.com/jc/article?k=2026032800203&g=spo","confidence":"高","snippet":"今大会を最後に現役を退くミラノ・コルティナ五輪銀メダリストの坂本花織が、現役最終戦で優勝を達成し、日本勢単独最多となる4度目の世界女王の称号を手にした。"},{"id":"2026-03-22-spo-002","category":"スポーツ","title":"プロ野球2026年シーズン開幕、新人2投手が74年ぶり同日開幕初勝利の歴史的快挙","summary":"プロ野球2026年のレギュラーシーズンが3月27日に開幕。この開幕戦で、巨人の新人・竹丸和幸とロッテの新人・毛利海大の2人が開幕投手として登板しそれぞれ初勝利を挙げた。2人の新人が開幕投手として同日に初勝利を飾るのは1952年以来74年ぶり2度目の歴史的快挙。毛利は5回4安打無失点でロッテの新人開幕勝利は1950年以来76年ぶり。竹丸はNPB史上1958年南海・杉浦以来68年ぶりの新人開幕勝利。","date":"2026-03-27","source":"https://www.draft-kaigi.jp/rookies/marines-rookies/86437/","confidence":"高","snippet":"毛利海大は5回4安打無失点の力投でプロ初勝利を挙げ、ロッテの新人開幕勝利は1950年以来76年ぶりとなった。同じシーズンに新人2人が開幕投手を務めて両者が白星を挙げるのは、1952年以来74年ぶり3度目の出来事。"},{"id":"2026-03-22-ent-001","category":"芸能・エンタメ・ゴシップ","title":"RIP SLYMEが25周年記念日のラストライブ（3/22）をもって活動休止","summary":"日本のヒップホップグループ「RIP SLYME」（RYO-Z・ILMARI・PES・SU・FUMIYA）が、メジャーデビュー25周年にあたる3月22日に東京・TOYOTA ARENA TOKYOでのラストライブをもって活動を休止した。8年のブランクを経て2025年3月に5人で再始動し、約1年の活動に区切りをつけた。活動休止に先立ち、3月6日より14日間限定のライブ&ドキュメンタリー映画も公開されていた。","date":"2026-03-22","source":"https://www.oricon.co.jp/news/2442781/full/","confidence":"高","snippet":"5人で新たに始まった活動の1年間を経て、20～22日にTOYOTA ARENA TOKYOで行われるライブをもって活動を終える。"},{"id":"2026-03-22-ent-002","category":"芸能・エンタメ・ゴシップ","title":"漫画『チェンソーマン』第2部が最終回（232話）を迎え3年8ヶ月の連載に幕","summary":"藤本タツキ氏による漫画『チェンソーマン』第2部が3月25日、「少年ジャンプ＋」で配信された第232話「ありがとうチェンソーマン」をもって完結した。2022年7月の連載開始から約3年8ヶ月。コミックス累計発行部数は3000万部超。最終回では「チェンソーマンが存在しない世界」にリセットされる展開で、賛否両論の議論がネット上で起きた。完結を記念して49話分が4月8日まで無料公開された。","date":"2026-03-25","source":"https://news.denfaminicogamer.jp/news/260325f","confidence":"高","snippet":"本日3月25日、藤本タツキ氏が手がけるマンガ『チェンソーマン』第二部が、「少年ジャンプ＋」にて配信された第232話をもって最終回を迎えた。"},{"id":"2026-03-22-tec-001","category":"テクノロジー","title":"OpenAIが動画生成AI「Sora」のサービス終了を発表、わずか半年で撤退","summary":"OpenAIは3月24日、2025年末にリリースした動画生成AIアプリ「Sora」のサービス終了を発表した。アプリは2026年4月26日に、APIは9月24日に終了予定。リリース直後は5日間で100万DLを達成したが、その後ユーザー数が急減し、ディズニーとの10億ドル規模の提携破談や1日当たり数百万ドルの赤字を背景に経営資源を新モデルに集中させる判断に至った。","date":"2026-03-24","source":"","confidence":"中"},{"id":"2026-05-17-pol-001","category":"政治","title":"グテレス国連事務総長が来日、高市首相と会談し安保理改革・北朝鮮問題で連携確認","summary":"国連のアントニオ・グテレス事務総長が5月17〜20日の日程で訪日し、5月18日午後に高市早苗首相と約15分間会談した。日本の国連加盟70周年に際し、東京でアジア初となる国連システム幹部会が開催されている。高市首相はUN80イニシアティブを含む国連改革の必要性を訴えた。両者は核・ミサイル問題と拉致問題を含む北朝鮮への対応、中東情勢について協力することで一致。グテレス氏は日本の国連貢献への謝意を示し「日本は信頼できるパートナー」と述べた。","date":"2026-05-18","source":"https://www.unic.or.jp/news_press/info/54464/","confidence":"高","snippet":"グテーレス国連事務総長は、核・ミサイル問題及び拉致問題を含む北朝鮮や中東情勢への対応等について引き続き協力していくことで一致し、「日本は信頼できるパートナー」とのコメントを示した。"},{"id":"2026-05-17-pol-002","category":"政治","title":"日韓首脳会談、高市首相が安東を訪問しシャトル外交 エネルギー安保・重要鉱物で連携合意","summary":"高市早苗首相は5月19日、李在明大統領の故郷・韓国南東部の安東を訪問し日韓首脳会談を実施した。韓国大統領府は高市首相を「国賓に準ずる待遇」で歓迎。両首脳はエネルギー安全保障協力（原油・LNG相互融通）と重要鉱物サプライチェーン強化で合意し、日米韓3カ国での北朝鮮対応の緊密な連携も確認した。シャトル外交の一環で、前回1月の会談は高市首相の地元・奈良で開催されており、互いの故郷を訪問し合うことで個人的な信頼関係を深める形となった。","date":"2026-05-19","source":"https://www.nikkei.com/article/DGXZQOGM171HE0X10C26A5000000/","confidence":"高","snippet":"韓国大統領府は「高市首相は国賓に準ずる待遇で歓迎する」と発表。両首脳はエネルギー安全保障協力と重要鉱物サプライチェーン強化、日米韓3カ国での北朝鮮対応の緊密な連携を確認した。"},{"id":"2026-05-17-pol-003","category":"政治","title":"今国会初の党首討論を開催、高市首相と野党党首が国政課題で論戦","summary":"5月20日、国会で今国会初となる党首討論（クエスチョンタイム）が開催された。高市早苗首相と野党各党首が国政上の主要課題について論戦。物価高対策や外交・安全保障政策などが主な争点となった。","date":"2026-05-20","source":"","confidence":"中","snippet":""},{"id":"2026-05-17-pol-004","category":"政治","title":"民事裁判の完全オンライン化が5月21日から施行、書面提出・期日参加を電子化","summary":"改正民事訴訟法に基づき、5月21日から民事裁判の手続きが完全にオンライン化された。訴状・準備書面など書面提出がウェブ上で完結し、口頭弁論などの期日参加もオンラインで可能になった。裁判所のDX推進と利便性向上が狙いで、弁護士・企業法務担当者の業務効率化にもつながる見通し。","date":"2026-05-21","source":"https://www.nikkei.com/article/DGXZQOUD158ZO0V10C26A5000000/","confidence":"高","snippet":"改正民事訴訟法が5月21日に全面施行され、訴状提出から判決送達まですべての手続きがオンライン化された。訴訟費用は電子納付に統一される。"},{"id":"2026-05-17-eco-001","category":"経済","title":"みずほ銀行が楽天銀行に10.52%出資・資本業務提携を締結、メガバンク×ネット銀行の新モデル","summary":"みずほフィナンシャルグループは5月20日、楽天銀行への出資（議決権比率10.52%）を含む資本業務提携を発表した。みずほ銀行が楽天銀行の主要株主となる。既存の楽天カードへの出資（15%分）を楽天銀行株に交換する形で実施し、完了は10月1日の見込み。業務面では、みずほ銀行がオリジネートする債権の楽天銀行による取得、小規模法人・個人事業主向け決済・融資の協業、住宅ローン効率化などで連携する。","date":"2026-05-20","source":"https://www.bloomberg.com/jp/news/articles/2026-05-20/TFBQ1NT96OSH00","confidence":"高","snippet":"みずほ銀行の出資は議決権比率で10.52%となり、メガバンクとデジタルバンクによる「新たな信用創造モデルを確立することを目的」とした提携で、みずほ銀行が楽天銀行の主要株主になる予定。"},{"id":"2026-05-17-eco-002","category":"経済","title":"マツダが新型CX-5を9年ぶりにフルモデルチェンジ・日本発売、330万円〜430万円","summary":"マツダは5月21日、主力SUV「CX-5」をフルモデルチェンジして日本で発売した。2017年の先代モデルから9年ぶりの全面刷新となる。グレードはS・G・Lの3種類で価格は330万円〜430万6500円。パワートレインは2.5Lマイルドハイブリッドに統一（ディーゼルは廃止）。マツダ初のGoogle搭載インフォテイメントシステムと15.6インチ大型タッチパネルを採用した。","date":"2026-05-21","source":"https://newsroom.mazda.com/ja/publicity/release/2026/202605/260521a.html","confidence":"高","snippet":"新型「MAZDA CX-5」の販売を開始。S・G・Lの3グレード設定で価格は330万円〜430万6500円。マツダ初のGoogle搭載インフォテイメントシステムを採用した。"},{"id":"2026-05-17-eco-003","category":"経済","title":"トヨタがミニバン「ノア・ヴォクシー」を台湾工場で生産・逆輸入へ、10月から納期短縮狙う","summary":"トヨタ自動車は5月21日、ミニバン「ノア」「ヴォクシー」を台湾の工場で生産し日本に逆輸入することを明らかにした。10月頃から開始し、年間10万台規模を想定。台湾で「カローラ」などを手がける工場に日本向け専用ラインを設ける。両車種は国内でも生産を継続する。人気車種で納車待ちが相次いでいる状況の改善が狙い。","date":"2026-05-21","source":"https://news.yahoo.co.jp/articles/80ce47a6a1b569de5a2dd80b8bdbc3c69ed05d93","confidence":"高","snippet":"トヨタ自動車が、ミニバン「ノア」と「ヴォクシー」を台湾の工場で作り日本へ「逆輸入」する。10月頃から開始し、年間10万台程度の生産を想定し、国内で納車待ちが相次いでいる状況の改善を図る。"},{"id":"2026-05-17-eco-004","category":"経済","title":"アサヒグループHD、サイバー攻撃影響で25年12月期決算の開示を7月8日に延期","summary":"アサヒグループホールディングスは5月22日、サイバー攻撃を受けた影響により2025年12月期の連結決算開示を当初予定から延期し、7月8日に行うと発表した。財務データの正確性確認に時間を要するため。サイバー攻撃による大手食品・飲料メーカーの決算遅延は異例の事態となった。","date":"2026-05-22","source":"https://www.nikkei.com/article/DGXZQOUB224940S6A520C2000000/","confidence":"高","snippet":"アサヒグループホールディングスはサイバー攻撃によるシステム障害の影響で、2025年12月期決算の開示を7月8日に延期すると発表した。"},{"id":"2026-05-17-soc-001","category":"社会","title":"栃木・上三川の強盗殺人で指示役の夫婦ら逮捕、闇バイト高校生4人含む計6人を検挙","summary":"栃木県上三川町で発生した強盗殺人事件で、警察は5月17日、指示役とみられる夫婦を含む計6人を逮捕した。実行犯には闇バイトで募集された高校生4人が含まれており、未成年の犯罪組織への関与が社会問題となっている。捜査当局は指示役の夫婦が犯行を計画・指示したとみている。","date":"2026-05-17","source":"https://www.jiji.com/jc/article?k=2026051700167&g=soc","confidence":"高","snippet":"指示役とみられる横浜市の無職夫婦（竹前海斗28歳、美結25歳）が新たに逮捕され、すでに逮捕されていた高校生4人と合わせて計6人が検挙された（栃木・上三川町強盗殺人）。"},{"id":"2026-05-17-soc-002","category":"社会","title":"沖縄近海でM5.9の地震、与論島（鹿児島）で最大震度5強 津波の心配なし","summary":"5月20日午前11時46分ごろ、沖縄本島近海を震源とするマグニチュード5.9の地震が発生した。震源の深さは約50km。鹿児島県与論島で最大震度5強、沖永良部島のチネン地区で震度5弱を記録した。気象庁によれば沖縄本島近海を震源とする地震で与論島が震度5強以上を観測したのは統計開始以来初めて。津波の心配はなかった。","date":"2026-05-20","source":"https://weathernews.jp/news/202605/200141/","confidence":"高","snippet":"震源は沖縄本島近海、マグニチュード5.9、深さ約50km。与論島で最大震度5強を記録。沖縄本島近海を震源とする地震で与論島が震度5強以上を観測したのは統計開始以来初めて。"},{"id":"2026-05-17-soc-003","category":"社会","title":"ポケモンカード購入にマイナンバーカード認証を導入へ、転売対策で8月から運用予定","summary":"株式会社ポケモンは5月21日、ポケモンカードゲームの一部商品の優先抽選販売および公式大会参加申し込みにおいて、マイナンバーカードを用いた本人確認システムを8月から導入すると発表した。スマートフォンでマイナカードのICチップを読み取り、会員サービス「プレイヤーズクラブ」のアカウントを認証する仕組み。不正購入・複数アカウント問題・転売対策が目的で、マイナンバー（個人番号）そのものは収集しないとしている。","date":"2026-05-21","source":"https://www.itmedia.co.jp/news/articles/2605/21/news107.html","confidence":"高","snippet":"ポケモンは5月21日、ポケモンカードゲームの販売やイベント参加の申し込みにおいて、マイナンバーカードを用いた本人確認システムを導入すると発表。不正や転売対策が目的で8月ごろに運用を始める予定。"},{"id":"2026-05-17-soc-004","category":"社会","title":"サントリーHD前会長・新浪剛史氏、違法サプリ輸入疑いで不起訴処分 福岡地検","summary":"福岡地検は5月22日、大麻成分を含む違法サプリメントを輸入した疑いで麻薬取締法違反容疑として書類送検されていたサントリーホールディングス前会長の新浪剛史氏（67）と知人女性を不起訴処分とした。地検は「捜査によって得られた鑑定証拠を慎重に検討した結果」として不起訴理由を説明した。新浪氏は事件への関与を否定しており、5月にサントリーHD会長を辞任していた。","date":"2026-05-22","source":"https://www.nikkei.com/article/DGXZQOUD2263I0S6A520C2000000/","confidence":"高","snippet":"福岡地検は麻薬取締法違反容疑で書類送検されていたサントリーホールディングス前会長の新浪剛史氏（67）と知人女性をいずれも不起訴とした。地検は「捜査によって得られた鑑定証拠を慎重に検討した結果」と説明した。"},{"id":"2026-05-17-soc-005","category":"社会","title":"同志社国際高の辺野古研修を文科省が「政治的中立性」違反と初認定、私学助成金減額へ","summary":"文部科学省は5月22日、同志社国際高校（京都）が実施した沖縄・辺野古沖研修旅行について、政治的中立性を定めた教育基本法第14条に違反するとの見解を示した。現行の教育基本法制定後、文科省が政治的中立性を理由に同法違反を認定するのは史上初。複数の教員が「抗議船」と知りながら生徒を乗せ、多様な見解を示さなかった点を問題視した。京都府知事は私学助成金の減額を検討する方針を示した。","date":"2026-05-22","source":"https://www.nikkei.com/article/DGXZQOUD220K80S6A520C2000000/","confidence":"高","snippet":"現行の教育基本法が制定されて以降、文科省が政治的中立性を理由に同法違反を認定するのは初めてとなる。京都府知事は研修旅行を巡る対応が不適切だったとして同高に対する私学助成金の減額を検討する方針を示した。"},{"id":"2026-05-17-spo-001","category":"スポーツ","title":"大谷翔平、元チームのエンゼルス戦で5打数3安打2打点 ドジャースが10-1大勝","summary":"5月17日のMLBドジャース対エンゼルス戦で、大谷翔平が5打数3安打2打点の活躍を見せ、ドジャースが10-1で快勝した。大谷がかつて所属したエンゼルスとの対戦で存在感を示す活躍となった。","date":"2026-05-17","source":"https://www.tsp21.com/sports/mlb/score/20260517.html","confidence":"高","snippet":"2026年5月17日 ドジャース 10-1 エンゼルス。大谷翔平は5打数3安打2打点の成績を収めた。"},{"id":"2026-05-17-spo-002","category":"スポーツ","title":"全米プロゴルフ選手権、イングランドのアーロン・ライが逆転V 107年ぶり英国人優勝","summary":"5月14〜17日に米ペンシルベニア州アロニミンクゴルフクラブで開催された全米プロゴルフ選手権（第108回PGAチャンピオンシップ）で、アーロン・ライ（イングランド）が最終日65を叩き出し通算9アンダーで逆転優勝した。1919年のジム・バーンズ以来107年ぶりのイングランド人優勝という歴史的快挙。松山英樹は通算イーブンパーの26位タイにとどまった。","date":"2026-05-17","source":"https://news.golfdigest.co.jp/news/results/pga/article/191211/1/","confidence":"高","snippet":"アーロン・ライ（イングランド）が1イーグル6バーディ、3ボギーの「65」をマークして通算9アンダーまで伸ばし、1919年のジム・バーンズ以来107年ぶりのイングランド人によるワナメーカー・トロフィー獲得という歴史的勝利となった。"},{"id":"2026-05-17-spo-003","category":"スポーツ","title":"宇野昌磨・本田真凜がアイスダンスでペアを組み現役復帰、2028年五輪出場を目標に","summary":"フィギュアスケートの宇野昌磨（元平昌五輪銀・北京五輪銅メダリスト）と本田真凜（元世界ジュニア選手権金メダリスト）が5月22日、アイスダンスチームを結成して現役復帰することを発表した。2024年10月に結成を決意し、ともに練習を続けてきた。2026-27シーズンから競技復帰し、2028年ロサンゼルス五輪への出場を目標に掲げる。","date":"2026-05-22","source":"https://www.olympics.com/ja/news/marin-honda-shoma-uno-ice-dance","confidence":"高","snippet":"宇野昌磨と本田真凜が「2024年10月にアイスダンスチーム結成を決意し、オリンピック出場を目標を掲げアイスダンスと向き合い続けてきた」と発表。新シーズン（2026-27シーズン）から競技復帰するとしている。"},{"id":"2026-05-17-ent-001","category":"芸能・エンタメ・ゴシップ","title":"声優・藤原貴弘さん死去、43歳 「僕のヒーローアカデミア」などに出演","summary":"アニメ「僕のヒーローアカデミア」などに出演していた声優の藤原貴弘さんが、5月14日に43歳で死去していたことが5月21日に所属事務所から発表された。死因は非公表。藤原さんは「僕のヒーローアカデミア」のほか複数の人気作品に出演しており、ファンから悼む声が多数寄せられた。","date":"2026-05-21","source":"https://www.oricon.co.jp/news/2456058/full/","confidence":"高","snippet":"声優の藤原貴弘さんが5月14日に43歳で死去し、5月21日に所属事務所が発表した。「僕のヒーローアカデミア」などに出演していた。"},{"id":"2026-05-17-ent-002","category":"芸能・エンタメ・ゴシップ","title":"長州小力、西口プロレスと契約解除 無免許運転・信号無視の書類送検受け","summary":"ピン芸人の長州小力（54）が所属していた西口プロレスは5月21日、長州小力との契約を同日付で解除すると発表した。4月に無免許運転・赤信号無視で道交法違反容疑として書類送検されたことを受けたもの。西口プロレス側は「重大な規律違反およびコンプライアンス上の問題を重く受け止めた」と声明。長州小力のタレント活動は継続するとされる。","date":"2026-05-21","source":"https://www.oricon.co.jp/news/2448932/full/","confidence":"高","snippet":"西口プロレスが5月21日付で長州小力との契約を解除。「重大な規律違反およびコンプライアンス上の問題を重く受け止め、組織としての姿勢を明確にするため、誠に遺憾ではございますが、本日付をもちまして同選手との契約を解除いたしました」と発表。"},{"id":"2026-05-17-ent-003","category":"芸能・エンタメ・ゴシップ","title":"映画「スター・ウォーズ/マンダロリアン&グローグー」が日米同時公開、7年ぶりのSW映画館上映","summary":"「スター・ウォーズ」シリーズ最新作「スター・ウォーズ／マンダロリアン・アンド・グローグー」が5月22日（金）に日米同時公開された。スター・ウォーズとしては2019年の「スカイウォーカーの夜明け」以来約7年ぶりの映画館上映となる。ジョン・ファヴロー監督作品で、Xトレンド入りするほどの盛り上がりを見せた。前夜祭は5/21に全国5都市7劇場で実施。","date":"2026-05-22","source":"https://starwars.disney.co.jp/movie/mandalorian-grogu","confidence":"高","snippet":"2026年5月22日より日米同時公開。前夜祭は公開前日5月21日（木）19時00分、全国5都市7劇場で日本最速上映が決定。スター・ウォーズとして映画館に帰ってくる。"},{"id":"2026-05-17-tec-001","category":"テクノロジー","title":"Google I/O 2026、AI検索を「25年ぶりの最大刷新」 Gemini 3.5 Flash搭載でエージェント機能追加","summary":"Googleは5月20日のGoogle I/O 2026で、検索の「過去25年間で最大規模のアップデート」を発表した。デフォルトAIモデルが「Gemini 3.5 Flash」にアップグレードされ、テキスト・画像・動画・ファイルを組み合わせた検索が可能になる。新たにエージェント機能（24時間稼働で情報監視・通知、飲食店予約の自動実行）と、結婚式計画などの長期タスク向けパーソナルダッシュボードも追加される。","date":"2026-05-20","source":"https://gigazine.net/news/20260520-google-search-io-2026-ai/","confidence":"高","snippet":"検索インターフェースは「過去25年間で最大規模のアップデート」を受け、テキスト・画像・動画・ファイルを組み合わせた検索が可能になります。デフォルトのAIモデルが「Gemini 3.5 Flash」にアップグレードされた。"},{"id":"2026-05-17-tec-002","category":"テクノロジー","title":"NVIDIA FY2027 Q1決算、売上高816億ドル（前年比85%増）で過去最高 次期は910億ドル見通し","summary":"NVIDIAは5月20日、FY2027第1四半期（2026年2〜4月期）決算を発表した。売上高は816億1500万ドル（前年同期比85%増）で過去最高を更新。次四半期（2026年5〜7月期）の売上高見通しは約910億ドル（前年比95%増）で、市場予想平均の約870億ドルを上回った。AIデータセンター向け半導体の旺盛な需要が続いており、ジェンスン・フアンCEOは「世界にいずれ数十億のAIエージェントが生まれる」と述べた。","date":"2026-05-20","source":"https://www.nikkei.com/article/DGXZQOGN160GB0W6A510C2000000/","confidence":"高","snippet":"FY2027 Q1売上高は816億1500万ドル（前年同期比85%増）で過去最高。次四半期見通しは約910億ドル（前年比95%増）で市場予想平均の約870億ドルを上回る見込みと発表した。"},{"id":"2026-05-17-tec-003","category":"テクノロジー","title":"川崎重工がNVIDIAなどとシリコンバレーにフィジカルAI拠点「KPAC San Jose」を開設","summary":"川崎重工業は5月22日、NVIDIA・Microsoft・富士通・Analog Devicesと連携し、米カリフォルニア州サンノゼに「Kawasaki Physical AI Center San Jose（KPAC San Jose）」を開設したと発表した。ロボット・産業機械向けのフィジカルAI（現実世界に作用するAI）の研究開発拠点として、シリコンバレーのAI技術エコシステムに参加する。","date":"2026-05-22","source":"https://robotstart.info/article/2026/05/22/381921.html","confidence":"高","snippet":"川崎重工業は2026年5月22日、米カリフォルニア州サンノゼに「Kawasaki Physical AI Center San Jose」を開設し、NVIDIA・Microsoft・富士通・Analog Devicesとの協業を推進すると発表した。"},{"id":"2026-05-17-int-001","category":"国際","title":"上海の日系オフィスビル内日本料理店で日本人ら3人が刺傷、犯人は精神疾患歴の59歳男","summary":"5月19日昼ごろ、上海市浦東新区の日系オフィスビル「上海環球金融中心」内の日本料理店で、果物ナイフを持った男が客3人（日本人成人男性2人・中国人女性1人）に切り付ける事件が発生した。全員命に別条はなく、犯人の59歳男性は警察官に取り押さえられた。当局によれば「訳の分からないことを話しており、精神疾患の治療歴がある」という。日本大使館は在留邦人に注意喚起し、中国政府に真相解明と厳正な処罰を求めた。","date":"2026-05-19","source":"https://www.jiji.com/jc/article?k=2026051900961&g=int","confidence":"高","snippet":"上海市浦東新区の日系オフィスビル内で、果物ナイフを持った男が3人に切り付ける事件が発生。日本人成人男性2人と中国人女性1人が被害を受けたが全員命に別条なし。犯人の59歳男性は「精神疾患の治療歴がある」と当局が明かした。"},{"id":"2026-05-23-政治-001","category":"政治","title":"朝鮮総連が全体大会、今後10年を「新たな闘争期」と位置づけ","summary":"在日本朝鮮人総連合会（朝鮮総連）は5月23日、東京で全体大会を開催し、今後10年を「新たな闘争期」と位置づけた活動方針を決議した。在日コリアンの権利擁護と日朝関係正常化に向けた取り組みを継続する方針を確認した。","date":"2026年5月23日（土）","source":"","confidence":"中"},{"id":"2026-05-23-経済-001","category":"経済","title":"JX金属、東邦チタニウム完全子会社化へ　5月28日に上場廃止予定","summary":"JX金属は株式交換により連結子会社の東邦チタニウムを完全子会社化する手続きを進めており、東邦チタニウム株の最終売買日は5月27日、上場廃止は5月28日の予定。効力発生は6月1日。半導体素材分野での開発連携強化と親子上場問題の解消が目的。","date":"2026年5月23日（土）","source":"https://www.jx-nmm.com/newsrelease/2026/20260424_01.html","confidence":"高","snippet":"株式交換により、JX金属が完全親会社、東邦チタニウムが完全子会社となる。従来の両社の関係では実現し得なかった多様なシナジーの創出が可能となると見込んでいる。"},{"id":"2026-05-23-経済-002","category":"経済","title":"USEN、飲食店特化の「AI店長」販売開始　POSデータ活用でAIが経営分析・アドバイス","summary":"USENは5月22日、飲食店向けAIサービス「USEN AI店長」と「ドリンク残量検知サービス」の2製品を販売開始した。AI店長はPOSレジデータをもとにAIが経営分析とアドバイスを提供。ドリンク残量検知はAIカメラがグラスの残量をリアルタイムで検知し最適なおかわりタイミングを通知する。","date":"2026年5月22日（金）","source":"https://www.itmedia.co.jp/news/articles/2605/22/news123.html","confidence":"高","snippet":"飲食店経営に特化したAIがPOSレジに蓄積された店舗データをもとに分析・アドバイス。周辺のイベント情報や天気といった外的要因との因果関係を読み解くだけでなく、今後どうすべきかの提案機能も備える。"},{"id":"2026-05-23-社会-001","category":"社会","title":"沖縄本島で線状降水帯発生　梅雨前線で大雨・気象庁が災害警戒呼びかけ","summary":"気象庁は5月23日夜、沖縄本島付近で線状降水帯が発生したと発表した。梅雨前線の影響で同地域に激しい雨が集中しており、土砂災害や浸水被害への厳重な警戒を呼びかけた。","date":"2026年5月23日（土）","source":"","confidence":"中"},{"id":"2026-05-23-社会-002","category":"社会","title":"天皇・皇后両陛下、9月に熊本訪問へ　熊本地震10年で宮内庁が調整","summary":"宮内庁は5月23日、天皇・皇后両陛下が9月に熊本県を訪問する方向で調整していることを明らかにした。2016年4月の熊本地震から10年の節目にあたり、被災地へのお見舞いが目的とみられる。","date":"2026年5月23日（土）","source":"https://kumanichi.com/articles/1924779","confidence":"中","snippet":"宮内庁は5月23日、天皇・皇后両陛下が9月末に熊本県を訪問する方向で調整していることを明らかにした。2016年の熊本地震から10年の節目に合わせた訪問となる。"},{"id":"2026-05-23-スポーツ-001","category":"スポーツ","title":"大谷翔平、8試合連続ヒットもドジャース1-5敗戦　犠飛の1打点のみ","summary":"ブリュワーズ戦（日本時間5月23日）で大谷翔平は3打数1安打1四球1打点。7回に1死一・三塁で左犠飛を放ちチーム唯一の打点を記録したが、ドジャースは1-5で敗れた。8試合連続ヒットを継続中。","date":"2026年5月23日（土）","source":"https://spread-sports.jp/archives/387528","confidence":"高","snippet":"3打数1安打1四球1打点。第4打席（7回表）「1死一、三塁の好機で左犠飛」を打ち、チーム唯一の打点を記録。試合はドジャースが1-5で敗れた。"},{"id":"2026-05-23-スポーツ-002","category":"スポーツ","title":"村上宗隆、満塁3点適時二塁打などで3打点　ホワイトソックス9-4で快勝","summary":"ホワイトソックスの村上宗隆は5月23日（日本時間）のジャイアンツ戦で、4回に二死満塁から走者一掃の3点適時二塁打を放つなど3打数1安打1四球3打点の活躍。チームは9-4で勝利し、今季26勝24敗でAL中地区2位を維持した。","date":"2026年5月23日（土）","source":"https://news.web.nhk/newsweb/na/na-k10015129711000","confidence":"高","snippet":"4回に二死満塁の場面で走者一掃の3点適時二塁打を放つなど、3打数1安打1四球3打点の活躍でチームの勝利に貢献した。ホワイトソックスは9-4で勝利。"},{"id":"2026-05-23-スポーツ-003","category":"スポーツ","title":"ロッテが9回に一挙5得点で逆転、楽天に3連勝　益田が今季初勝利","summary":"5月23日のプロ野球パ・リーグ、ロッテ対楽天（楽天モバイルパーク）で、ロッテは2-6の劣勢から9回表に一挙5得点を挙げ逆転勝利。小川・友杉の適時打で追い上げ、相手の暴投で同点後、西川の適時打で勝ち越した。投手では益田が今季初勝利。","date":"2026年5月23日（土）","source":"https://news.mynavi.jp/article/20260523-4377614/","confidence":"高","snippet":"ロッテは2-6で迎えた9回表に小川と友杉の適時打などで一挙5得点を挙げ逆転勝利。益田が今季初勝利を上げ、敗れた楽天は3番手の藤平が大誤算となった。"},{"id":"2026-05-23-スポーツ-004","category":"スポーツ","title":"将棋・叡王戦　斎藤慎太郎八段が勝利し最終局へ","summary":"5月23日に行われた将棋の叡王戦で斎藤慎太郎八段が勝利し、シリーズを最終局まで持ち込んだ。","date":"2026年5月23日（土）","source":"","confidence":"中"},{"id":"2026-05-23-芸能-001","category":"芸能・エンタメ・ゴシップ","title":"あのちゃんが「あのちゃんねる」降板宣言　テレビ朝日が公式謝罪","summary":"タレントのあのが5月23日、SNSで冠番組「あのちゃんねる」（テレビ朝日）の降板を宣言した。5月18日放送で「嫌いな芸能人」として鈴木紗理奈を実名で挙げ炎上したことに端を発し、「意見を伝えても改善されなかった」と番組制作への不信感を表明。テレビ朝日はスタッフの配慮不足を認め公式サイトで謝罪した。","date":"2026年5月23日（土）","source":"https://news.yahoo.co.jp/articles/a8a363693bfe70e3ff5e539858d32cdc09c55816","confidence":"高","snippet":"あのは「これまで何度も『この表現は嫌です』など意見を伝えたが、改善されず不本意な状況が続いたことから降板を申し出た」と説明。テレビ朝日は「スタッフの配慮不足を認め、責任のすべては番組制作側にある」と謝罪した。"},{"id":"2026-05-23-芸能-002","category":"芸能・エンタメ・ゴシップ","title":"King & Prince、デビュー8周年記念日に未配信楽曲78曲を一斉配信","summary":"King & Princeは5月23日のデビュー8周年記念日に、これまでストリーミング未配信だったシングルカップリング曲やアルバム収録曲など全78曲の一斉配信を開始した。これにより同グループの全楽曲が主要配信サービスで聴けるようになる。","date":"2026年5月23日（土）","source":"https://www.universal-music.co.jp/king-and-prince/news/2026-04-23-2/","confidence":"高","snippet":"King & Princeのデビュー8周年記念日に、シングルカップリング曲やアルバム収録曲など、これまで配信されていなかった全78曲が一斉配信開始。ストリーミングサービス及びダウンロードサービスで聴取可能となる。"},{"id":"2026-05-24-政治-001","category":"政治","title":"自民・小林政調会長、皇族身分付与の「配偶者・子」案に反対　皇室典範改正で各党論戦","summary":"5月24日のNHK日曜討論で、自民党の小林鷹之政務調査会長は皇族数確保策として浮上する「旧皇族の配偶者・子への皇族身分付与」案に反対の立場を改めて表明した。「配偶者や子への身分付与は皇室の本質にかかわる」と述べ、男系による皇族確保を優先する姿勢を示した。衆議院議長が近く取りまとめ案を提示する見通し。","date":"2026年5月24日（日）","source":"","confidence":"中"},{"id":"2026-05-24-スポーツ-001","category":"スポーツ","title":"ドジャース11-3大勝、大谷翔平2安打1打点・佐々木朗希が今季3勝目","summary":"5月24日（日本時間）のMLBブリュワーズ対ドジャース戦で、ドジャースが11-3で大勝した。大谷翔平は5打数2安打1打点で打率.276。先発の佐々木朗希は5回4安打2失点4奪三振で今季3勝3敗となった。","date":"2026年5月24日（日）","source":"https://topics.smt.docomo.ne.jp/article/sdaa/sports/sdaa-sdaa.jp-article-61982","confidence":"高","snippet":"大谷は「5打数、2安打、1打点」を記録しました。佐々木朗希は「5.0回を投げ、4安打、2失点、4奪三振」という成績を収めました。防御率は4.93で、この試合で3勝3敗となっています。"},{"id":"2026-05-24-スポーツ-002","category":"スポーツ","title":"Bリーグファイナル GAME2　長崎ヴェルカが66-60で琉球に勝利、シリーズ1勝1敗タイ","summary":"5月24日、横浜アリーナで「りそなグループ B.LEAGUE FINALS 2025-26」GAME2が行われ、長崎ヴェルカが66-60で琉球ゴールデンキングスを破った。ジョンソンが第3クォーターだけで12得点を含む25得点を記録し勝利を牽引。シリーズは1勝1敗のタイとなり、年間王者は5月26日のGAME3で決定する。","date":"2026年5月24日（日）","source":"https://basketballking.jp/news/japan/20260524/614705.html","confidence":"高","snippet":"長崎は「第3クォーターだけで12得点を挙げる活躍」を見せたジョンソンがチームを牽引。スティールからのファストブレイクを連続で決め、52-38と14点リードで最終クォーターへ進みました。"},{"id":"2026-05-24-スポーツ-003","category":"スポーツ","title":"日本プロゴルフ選手権で細野勇策が15アンダー優勝　日本人レフティ35年ぶり国内メジャー制覇","summary":"5月24日、第93回日本プロゴルフ選手権大会（センコーグループカップ、滋賀県蒲生GC）でプロ5年目の細野勇策（23）が通算15アンダーで優勝し、国内ツアー初優勝を国内メジャーで飾った。日本人左利きゴルファーによる国内メジャー優勝は1991年の羽川豊以来35年ぶり。","date":"2026年5月24日（日）","source":"https://news.golfdigest.co.jp/news/results/jgto/article/191391/1/","confidence":"高","snippet":"「羽川さんに『早く勝って』と言われていて」細野勇策が35年ぶり日本人レフティV 国内メジャーでツアー初優勝。23歳のプロ5年目にして国内メジャー初制覇を成し遂げた。"},{"id":"2026-05-24-芸能-001","category":"芸能・エンタメ・ゴシップ","title":"石橋貴明、食道がん療養1年で復帰見通し立たず　40年来のマネージャーも退社","summary":"2025年4月に食道がんを公表し芸能活動を休止したとんねるずの石橋貴明（63）が、療養1年を経た現在も復帰の見通しが立っていないことが5月24日に報じられた。約40年にわたり支えてきたマネージャーが事務所を退社したほか、フジテレビの名物プロデューサーも離職し「後ろ盾がなくなった状態」とされる。都内を一人で歩く姿が目撃されており、髪は真っ白になっていたという。","date":"2026年5月24日（日）","source":"https://news.yahoo.co.jp/articles/1ce9f280a768136c087040508d26f86106864c7f","confidence":"高","snippet":"芸能関係者は「貴明さんの具体的な復帰プランは聞こえてこない」とコメントしており、復帰の見通しは立っていない状況。フジテレビの前社長・港浩一氏の辞任や番組プロデューサー石田弘氏の離職で「後ろ盾がなくなった状態」となっている。"},{"id":"2026-05-24-芸能-002","category":"芸能・エンタメ・ゴシップ","title":"木村文乃、第2子誕生をInstagramで発表　「賑やかで慌ただしく愛おしい日々」","summary":"女優の木村文乃（38）が5月24日、自身のInstagramを更新し第2子の誕生を発表した。手料理の写真を紹介した後に「この度、第二子が誕生しました。賑やかで慌ただしく愛おしい日々を過ごしています」と報告。子供の性別・名前は非公開。2023年の再婚・第1子出産から約3年での2人目誕生となる。","date":"2026年5月24日（日）","source":"https://news.infoseek.co.jp/article/ntv_2026052407122686/","confidence":"高","snippet":"「この度、第二子が誕生しました。賑やかで慌ただしく愛おしい日々を過ごしています」と述べられています。第2子について性別や名前などの具体的な情報は公開されていません。"},{"id":"2026-05-24-テクノロジー-001","category":"テクノロジー","title":"DeepSeek、V4 Proの75%割引を恒久化　AI価格競争がさらに激化","summary":"中国AI企業のDeepSeekは、期間限定としていた旗艦モデル「DeepSeek V4 Pro」のAPI料金75%割引を永久化すると発表した。割引後の価格は入力トークン0.435ドル/百万・出力0.87ドル/百万で、旧価格の4分の1に相当する。これによりOpenAI・Anthropicなど競合との価格競争がさらに激化する見通しで、AI業界全体の料金引き下げ圧力が高まっている。","date":"2026年5月24日（日）","source":"https://thenextweb.com/news/deepseek-v4-pro-75-percent-price-cut-permanent","confidence":"高","snippet":"DeepSeek made its 75% discount permanent. The AI price war just escalated. After its promotional pricing period ends on May 31, the lower rates will remain permanent instead of returning to the original prices."},{"id":"2026-03-15-pol-001","category":"政治","title":"高市首相・トランプ大統領が初の日米首脳会談 対米投資11兆円・アラスカ産原油増産で合意","summary":"高市早苗首相はワシントンを訪問し、ホワイトハウスでトランプ大統領と就任後初の日米首脳会談を行った。会談では対米投融資第2弾として11兆円規模の投資で合意したほか、アラスカ産原油の生産拡大に日米が連携して取り組む方針でも一致した。ホルムズ海峡での有事に際しては「可能な限りで協力する」とも表明した。","date":"2026-03-19","source":"https://www.kantei.go.jp/jp/105/statement/2026/0319kaiken.html","confidence":"高","snippet":"高市首相はホワイトハウスでトランプ大統領と首脳会談。対米投資11兆円規模で合意するとともに、アラスカ産原油の生産拡大に日米で取り組む方針を確認。ホルムズ海峡への「可能な限りの協力」も表明した。"},{"id":"2026-03-15-pol-002","category":"政治","title":"日本含む7カ国首脳がイランに商船妨害の即時停止要求 ホルムズ海峡をめぐる共同声明","summary":"高市首相訪米に合わせて開かれた会合で、日本を含む7カ国首脳がイランに対し、ドローンやミサイルによる攻撃とホルムズ海峡での商船航行妨害の即時中止を求める共同声明を発表した。声明はイランの最高指導者ハーメネイー師が空爆で死亡した後の中東情勢悪化を受けて発出されたもので、商船の安全な航行確保を強く求めた。","date":"2026-03-19","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"日本を含む7カ国首脳がイランに対し、ドローンやミサイルによる攻撃と商船航行妨害の即時中止を求める声明を発表した。"},{"id":"2026-03-15-pol-003","category":"政治","title":"シンガポールのウォン首相が訪日 高市首相と首脳会談 安保・経済連携を強化","summary":"シンガポールのウォン・シュウトン首相が3月17日から19日にかけて訪日し、高市首相と首脳会談を行った。両首脳は経済安全保障・デジタル分野での連携強化で一致。中東情勢やホルムズ海峡問題での協調についても意見を交わした。3月は他にもブータン・フランス首脳との会談が続く外交ラッシュの月となった。","date":"2026-03-17","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"中","snippet":"シンガポールのウォン・シュウトン首相が3月17日から19日にかけて訪日し、高市首相と首脳会談を行った。両首脳は経済安全保障・デジタル分野での連携強化で一致した。"},{"id":"2026-03-15-pol-004","category":"政治","title":"参院予算委が2026年度予算案の本格審議入り 通商・エネルギー政策が主要テーマに","summary":"参議院予算委員会は16日、2026年度予算案の審議に入った。同予算案は3月13日に衆院を通過済みで、参院での審議が本格化した。米トランプ政権の関税政策や日米通商交渉の行方、ホルムズ海峡情勢を踏まえたエネルギー政策などが主要テーマとして論戦が繰り広げられた。","date":"2026-03-16","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"中","snippet":"参議院予算委員会は3月16日、2026年度予算案の審議に入った。米トランプ政権の関税政策や日米通商交渉などが主要テーマとなる。"},{"id":"2026-03-15-eco-001","category":"経済","title":"春闘集中回答日 トヨタが6年連続満額回答・最大月2万1580円 大手企業で高水準の賃上げ相次ぐ","summary":"3月18日の春季労使交渉（春闘）集中回答日、トヨタ自動車が6年連続で満額回答し、賃上げ額は最大月2万1580円となった。日立製作所も5年連続満額回答。パナソニック・三菱電機・マツダなど大手でも過去最高水準の賃上げが相次いだ。金属労協（JCM）の集中回答日時点での平均賃上げ額は1万5450円（5.1%）と2014年以降で最高額を記録した。","date":"2026-03-18","source":"https://www.nikkei.com/article/DGXZQOFD172S10X10C26A3000000/","confidence":"高","snippet":"トヨタ自動車は春季労使交渉で満額回答。6年連続で賃上げ額は最大月2万1580円。金属労協の集中回答日時点での回答額平均は1万5450円（5.1%）で、比較可能な2014年以降で最高額となった。"},{"id":"2026-03-15-eco-002","category":"経済","title":"公示地価2026 全国平均2.8%上昇・バブル崩壊後最高 東京商業地は12%超の伸び","summary":"国土交通省が3月17日に発表した2026年1月1日時点の公示地価は、全国平均（全用途）が前年比2.8%上昇し、バブル崩壊後の1992年以降で最高の伸びとなった。5年連続の上昇で、三大都市圏では4.6%の上昇。東京都の商業地は12.2%上昇し、インバウンドに人気の台東区浅草周辺では20%超の上昇を記録した。住宅地も全国平均2.1%上昇した。","date":"2026-03-17","source":"https://www.nikkei.com/article/DGXZQOCC135R80T10C26A3000000/","confidence":"高","snippet":"国土交通省発表の2026年公示地価は全国平均（全用途）が前年比2.8%上昇し、バブル崩壊後最高。東京都の商業地は12.2%上昇し、浅草周辺など訪日客に人気のエリアで20%超の上昇地点も。"},{"id":"2026-03-15-eco-003","category":"経済","title":"三菱商事 米シェールガス大手ヘイインズビルを約1.2兆円で買収完了 LNG基盤を強化","summary":"三菱商事は米国子会社を通じてヘイインズビル・リソーシズ（ルイジアナ州・テキサス州東部のシェールガス開発会社）の発行済株式100%を取得し、買収を完了した。投資総額は約1兆1941億円で、三菱商事として過去最大規模のM&A案件。LNG輸出ターミナルに近い戦略的立地を確保し、エネルギー分野での脱炭素戦略の一環としてLNG供給基盤を大幅に強化する。","date":"2026-03-15","source":"https://co-ad.jp/blog/ma_trends/6218/","confidence":"中","snippet":"三菱商事は米国子会社を通じてヘイインズビル・リソーシズの発行済株式100%を取得。約1兆1941億円の投資で、ルイジアナ州とテキサス州東部のシェールガス権益を確保し、LNG事業基盤を大幅に強化した。"},{"id":"2026-03-15-soc-001","category":"社会","title":"京都アニメーション放火事件 大阪高裁が死刑判決を確定 青葉死刑囚の控訴取り下げ有効と判断","summary":"大阪高裁は3月17日、2019年の京都アニメーション放火事件で一審死刑判決を受けた青葉真司死刑囚の控訴取り下げを有効と判断し、死刑判決が確定した。事件では36人が死亡し、日本の戦後最悪の放火殺人事件とされる。精神障害を抱える被告の控訴取り下げの意思能力が争点となっていたが、裁判所は有効と認定した。","date":"2026-03-17","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"大阪高裁が青葉真司死刑囚の控訴取り下げを有効と判断し、死刑判決が確定した。2019年に京都アニメーションで36人が犠牲となった放火事件。"},{"id":"2026-03-15-soc-002","category":"社会","title":"沖縄・辺野古沖で平和学習中の同志社国際高校生ら乗船の船が転覆 女子生徒と牧師の2人死亡","summary":"沖縄県名護市辺野古沖で16〜17日、同志社国際高校の2年生262人が修学旅行中に乗船した船2隻が転覆・沈没した。17歳の女子生徒1人と同行の金井創牧師が死亡し、16人が重軽傷を負った。船は辺野古基地を海上から見学する平和学習の途中で、波浪注意報が発令されていたにもかかわらず出港していたことへの批判も上がった。","date":"2026-03-17","source":"https://www.kyoto-np.co.jp/articles/-/1677305","confidence":"高","snippet":"沖縄県名護市辺野古沖で船2隻が転覆。同志社国際高校の修学旅行生ら262人が乗船。17歳の女子生徒1人と同行の牧師が死亡し16人が負傷。波浪注意報下での出港だった。"},{"id":"2026-03-15-soc-003","category":"社会","title":"ガソリン価格が史上最高値を更新 レギュラー1リットル190.8円 中東情勢の緊迫化で高騰","summary":"資源エネルギー庁が3月17日に発表したレギュラーガソリンの全国平均価格は1リットル190.8円となり、統計史上最高値を更新した。米・イスラエルによるイラン軍事行動を受けたホルムズ海峡の航行制限が原油輸入に影響し、原油価格が上昇していることが背景。家計への打撃が広がっており、政府は補助金延長も検討している。","date":"2026-03-17","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"レギュラーガソリン1リットル当たりの全国平均価格は190.8円で史上最高値となった。米・イスラエルのイラン軍事行動によるホルムズ海峡の航行制限が原油輸入に影響。"},{"id":"2026-03-15-soc-004","category":"社会","title":"数学者・広中平祐氏が94歳で死去 日本人3人目のフィールズ賞受賞者","summary":"代数幾何学の難問「代数多様体の特異点解消」を証明し1970年にフィールズ賞を受賞した世界的数学者・広中平祐（ひろなか へいすけ）京都大学名誉教授が、3月17日に94歳で死去した。1931年山口県生まれ。ハーバード大学教授も務め、日本人として3人目のフィールズ賞受賞者として知られた。","date":"2026-03-17","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"代数幾何学の難問を解いてフィールズ賞を受賞した世界的数学者・広中平祐京都大学名誉教授が94歳で死去した。"},{"id":"2026-03-15-soc-005","category":"社会","title":"国内45年ぶり新種の鳥「トカラムシクイ」を確認 鹿児島・トカラ列島で発見","summary":"鹿児島県のトカラ列島で繁殖する渡り鳥が新種として「トカラムシクイ（学名：Phylloscopus tokaraensis）」と認定され、国際的な学術誌に掲載された。国内での新学名報告は45年ぶりとなる快挙。鳴き声や羽毛の色、遺伝子解析で既知のムシクイ類との違いが確認された。","date":"2026-03-17","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"鹿児島県・トカラ列島で繁殖する渡り鳥が新種として認定され、国内での新学名報告は45年ぶりとなった。"},{"id":"2026-03-15-spo-001","category":"スポーツ","title":"WBC2026 侍ジャパンが準々決勝でベネズエラに5-8で逆転負け 2連覇・4強入りならず","summary":"野球のWBC（ワールドベースボールクラシック）2026で、日本代表（侍ジャパン）は準々決勝を米フロリダ州マイアミのローンデポ・パークでベネズエラと戦い5-8で逆転負けを喫した。大谷翔平が1回に先制ソロ本塁打、森下翔太が3回にスリーランを放ちリードしたが、5〜6回のベネズエラの集中打に屈した。日本の2連覇は途絶え、初の4強入りも逃した。","date":"2026-03-15","source":"https://www.tv-tokyo.co.jp/sports/articles/2026/03/041345.html","confidence":"高","snippet":"日本は序盤に大谷翔平・森下翔太の本塁打でリードするも、5回・6回にベネズエラが集中打で逆転。最終スコアは5-8で日本が敗退し、2連覇と初の4強入りの両方が途絶えた。"},{"id":"2026-03-15-spo-002","category":"スポーツ","title":"WBC2026決勝 ベネズエラがアメリカを下し悲願の初優勝 WBC史上初の南米チャンピオン","summary":"WBC（ワールドベースボールクラシック）2026の決勝がマイアミで行われ、ベネズエラがアメリカを破り大会史上初の優勝を飾った。ベネズエラは準々決勝で日本を8-5で退け、決勝まで勝ち上がった。WBC史上初の南米チャンピオンの誕生となり、日本・韓国・プエルトリコ・ドミニカ共和国・アメリカ・キューバ以外の初制覇となった。","date":"2026-03-18","source":"https://www.nikkei.com/article/DGXZQODH165110W6A310C2000000/","confidence":"高","snippet":"WBC2026でベネズエラが初優勝。日本は8強で敗退した。ベネズエラは大会史上初の南米チャンピオンとなった。"},{"id":"2026-03-15-ent-001","category":"芸能・エンタメ・ゴシップ","title":"BTS 約4年ぶりに全員が活動再開 ソウル光化門広場での復帰公演に10万人超・Netflix全世界配信","summary":"韓国の人気グループBTSが3月21日、ソウルの光化門広場で復帰公演「BTS THE COMEBACK LIVE｜ARIRANG」を開催した。兵役休止から全7人が約3年9ヶ月ぶりに再集結し、約10万4000人が観客として参加。Netflixが初の単独アーティストライブ配信として190カ国以上に中継した。前日20日にリリースした新アルバム「ARIRANG」は発売当日に約398万枚を売り上げ、自己記録を更新した。","date":"2026-03-21","source":"https://ototoy.jp/news/129196","confidence":"高","snippet":"BTS全7人が約3年9ヶ月ぶりに再集結した光化門広場公演に約10万4000人が参加。NetflixがWORLD初となる単独アーティストLIVEを190カ国以上に配信。新アルバム「ARIRANG」は発売日に約398万枚の自己最高記録を達成。"},{"id":"2026-03-15-tec-001","category":"テクノロジー","title":"ソフトバンク孫正義会長 米オハイオ州に5000億ドル（約80兆円）のAIデータセンター投資構想発表 日米21社参画","summary":"ソフトバンクグループの孫正義会長は3月20日、米オハイオ州パイクタウンシップに5000億ドル（約80兆円）規模のAI向けデータセンターを建設する投資構想を発表した。単一拠点への投資としては人類史上最大規模とされ、孫会長は「この一拠点だけで既存のAIデータセンター全体よりも大きくなる」と語った。日米21社のエネルギー・金融機関が参画する組織が新たに発足した。","date":"2026-03-20","source":"https://www.nikkei.com/article/DGXZQOGN2035V0Q6A320C2000000/","confidence":"高","snippet":"孫正義会長が米オハイオ州に5000億ドル（約80兆円）のAIデータセンター投資構想を発表。「単一拠点への投資としては史上最大規模」。エネルギー・金融機関など日米21社が参画する組織が発足した。"},{"id":"2026-03-15-tec-002","category":"テクノロジー","title":"楽天「Rakuten AI 3.0」提供開始 7000億パラメータの国産最大LLM 日本語でGPT-4o超えの性能","summary":"楽天グループは3月17日、国産最大規模の大規模言語モデル「Rakuten AI 3.0」の提供を開始した。GENIACプロジェクト（経済産業省・NEDO支援）の一環で開発された約7000億パラメータのMoE（Mixture of Experts）アーキテクチャを採用。日本語の複数ベンチマークでGPT-4oを上回る性能を発揮し、Apache 2.0ライセンスで商用利用も無償で可能。Hugging Face上でダウンロードできる。","date":"2026-03-17","source":"https://corp.rakuten.co.jp/news/press/2026/0317_01.html","confidence":"高","snippet":"GENIACプロジェクトの一環として開発された国内最大規模のAIモデル「Rakuten AI 3.0」の提供を開始。約7000億パラメータのMoEアーキテクチャを採用し、日本語ベンチマークでGPT-4oを上回る性能。Apache 2.0ライセンスで商用・無償利用が可能。"},{"id":"2026-03-15-tec-003","category":"テクノロジー","title":"国産通話アプリ「POPOPO」発表 川上量生・庵野秀明ら参加のITベンチャー アバター通話を提供","summary":"「ニコニコ動画」創設者の川上量生氏や「エヴァンゲリオン」監督の庵野秀明氏らが参加する国産ITベンチャーが3月18日、アバターを使ったプライベート通話アプリ「POPOPO」を発表した。実名や顔を公開せずにアバターで通話できるサービスで、プライバシーを重視したコミュニケーションツールとして注目を集めた。","date":"2026-03-18","source":"","confidence":"中"},{"id":"2026-03-15-int-001","category":"国際","title":"米・イスラエルのイラン軍事行動が継続 ホルムズ海峡封鎖で世界のエネルギー輸送に深刻影響","summary":"2月28日に始まった米国とイスラエルによるイラン軍事行動から約3週間が経過した3月中旬時点で、戦闘はイラン本土・レバノン・イエメン周辺に拡大を続けていた。ハーメネイー師の死亡後、IRGC司令官ら要人の殺害も相次いだ。ホルムズ海峡では商船の通航制限が続き、原油・LNG輸送に支障が生じ、アジアや欧州を含む国際物流とエネルギー市場に波及。日本のガソリン価格が史上最高値を更新するなど国内経済にも打撃を与えている。","date":"2026-03-17","source":"https://www.jetro.go.jp/biznews/2026/03/700780f3729fbc18.html","confidence":"高","snippet":"米国とイスラエルはイランの国家中枢と軍事能力などを中心に攻撃。ホルムズ海峡では商船通航の制限が続き、原油や液化天然ガスの輸送に支障が生じ、アジアや欧州を含む国際物流とエネルギー市場に影響が波及している。"},{"id":"2026-03-08-pol-001","category":"政治","title":"衆院本会議が2026年度予算案を賛成多数で可決・参院に送付","summary":"衆議院本会議は3月13日、2026年度（令和8年度）一般会計総額112兆8665億円の予算案を与党の賛成多数で可決し、参議院に送付した。衆院予算委員会では3月8日の地方公聴会（岩手・鹿児島）を皮切りに、3月9〜10日の集中審議・公聴会、3月13日の締めくくり質疑と採決を経て衆院通過を果たした。憲法の衆院優越規定により、参院が30日以内に議決しない場合は衆院の議決が国会の議決となる。","date":"2026-03-13","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"高","snippet":"予算案は3月13日に衆院を通過済みで、憲法の衆院優越規定により参院が30日以内に議決しない場合は自動成立する見通し。"},{"id":"2026-03-08-pol-002","category":"政治","title":"石川県知事選で前金沢市長・山野之義氏が初当選 能登復興加速を掲げ","summary":"石川県知事選挙が3月8日に投開票され、前金沢市長の山野之義氏が初当選した。石川県は2024年1月の能登半島地震・2025年9月の能登半島豪雨と相次ぐ大規模災害からの復興が最大の課題で、山野氏は「復興の加速と県全体の活性化」を訴えた。投票率は前回を上回り、復興に対する県民の高い関心を示した。","date":"2026-03-08","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"石川県知事選で前金沢市長の山野之義氏が初当選。能登半島地震・豪雨からの復興加速が最大の争点だった。"},{"id":"2026-03-08-pol-003","category":"政治","title":"訪日外国人向け電子渡航認証「JESTA」創設の入管難民法改正案を閣議決定","summary":"政府は3月10日、訪日外国人向けの電子渡航認証制度「JESTA（ジェスタ）」の創設を盛り込んだ出入国管理及び難民認定法（入管難民法）改正案を閣議決定し、国会に提出した。米国のESTAに倣うもので、ビザ免除対象の外国人が渡航前にオンラインで申請・認証を受ける仕組み。インバウンド需要が急拡大する中、入国管理の適正化と観光促進の両立を図る狙いがある。","date":"2026-03-10","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"政府が訪日外国人向け電子渡航認証制度「JESTA」創設の入管難民法改正案を閣議決定。ビザ免除国の外国人が渡航前にオンライン申請する米国ESTAに倣った仕組み。"},{"id":"2026-03-08-pol-004","category":"政治","title":"ブータンのトブゲー首相が訪日・高市首相と初の日ブータン首脳会談","summary":"ブータン王国のシェリング・トブゲー首相が3月12日に訪日し、高市早苗首相と首脳会談を行った。両首脳は日ブータン外交関係樹立45周年を機に、経済・教育・環境分野での協力深化で一致した。ブータンは「国民総幸福量（GNH）」を国策とすることで知られ、日本との伝統的な友好関係が深い。会談後に複数の協力文書に署名した。","date":"2026-03-12","source":"","confidence":"中"},{"id":"2026-03-08-eco-001","category":"経済","title":"ホンダが2026年3月期に最大6900億円の最終赤字・上場来初 EV戦略を全面見直し","summary":"ホンダは3月12日、2026年3月期の連結最終損益が最大6900億円（従来予想は3000億円の黒字）の赤字に転落する見通しを発表した。上場以来初の赤字転落。北米EV市場の急速な悪化を受けて一部モデルの開発・発売を中止し、設備減損損失を計上したことが主因。三部敏宏社長は「事業環境は想定をはるかに上回るスピードで変化した」と述べ、2040年にEVとFCVの販売比率100%を目指す目標も「現実的に困難」と見直しを明言。今期・27年3月期合計のEV関連損失は最大2兆5000億円に達する可能性があるとした。経営責任として三部社長らが月額報酬の3割（3ヶ月分）を自主返上した。","date":"2026-03-12","source":"https://www.jiji.com/jc/article?k=2026031200937&g=eco","confidence":"高","snippet":"ホンダは2026年3月期の純損益が最大6900億円の赤字に転落する見通しを発表した。上場来初の赤字転落で、三部社長は「2040年全EV化目標の達成は現実的に困難だろう」と述べた。社長らは月額報酬の3割を3ヶ月自主返上する。"},{"id":"2026-03-08-eco-002","category":"経済","title":"JAL・ANA、中東直行路線を全便運休・欧州便も大幅迂回 燃油サーチャージを最高水準に","summary":"日本航空（JAL）は3月7日までに羽田〜ドーハ便など中東直行便を全て運休。全日本空輸（ANA）も中東ハブ経由路線を見直し、欧州便はアラスカ・北極圏経由の「北回りルート」またはトルコ・中央アジア経由の「南回りルート」で迂回運航に切り替えた。ホルムズ海峡危機に伴う航空保険料の急騰と安全確保が背景。両社は3月から燃油特別付加運賃（サーチャージ）を過去最高水準に引き上げ、国際線旅客の負担が大幅に増加した。迂回による飛行時間の延長（欧州便で最大3〜4時間増）も生じている。","date":"2026-03-07","source":"https://www.dangan-lucky.com/entry/jal-ana-middle-east-flight-status","confidence":"高","snippet":"JALは羽田－ドーハ便を3/7まで欠航。欧州便は迂回ルートで運航。ANAも欧州路線を北回りまたは南回りで迂回し、中東危険地帯を回避して運航している。"},{"id":"2026-03-08-eco-003","category":"経済","title":"中東情勢悪化でLNG調達難 東京ガス・大阪ガスなど都市ガス大手が代替調達に奔走","summary":"ホルムズ海峡の事実上の封鎖を受け、カタール産LNG（液化天然ガス）に依存してきた国内の都市ガス大手各社が深刻な調達難に直面している。東京ガス・大阪ガスなどはオーストラリア産・米国産LNGへの切り替えや備蓄取り崩しで急場をしのいでいるが、危機が長期化した場合の調達不足リスクは拭えない。資源エネルギー庁が代替調達の調整に乗り出しており、一部ガス会社では4月以降のガス料金引き上げが避けられない情勢となっている。","date":"2026-03-09","source":"","confidence":"中","snippet":""},{"id":"2026-03-08-soc-001","category":"社会","title":"東日本大震災から15年 政府主催追悼復興祈念式 今も2519人が行方不明","summary":"東日本大震災の発生から15年を迎えた3月11日、政府は福島県で「東日本大震災追悼復興祈念式」を開催した。高市早苗首相は追悼の辞を述べ、「今も2519人が行方不明のまま」と語り、4月から始まる「第3期復興・創生期間」（5年間）で課題解決に全力を尽くすと表明。防災庁の設置準備加速も宣言した。被災3県（岩手・宮城・福島）各地でも黙祷や追悼式が行われ、遺族らが犠牲者に手を合わせた。震災による死者・行方不明者は計2万2318人（震災関連死を含めると約3万人超）。","date":"2026-03-11","source":"https://www.kantei.go.jp/jp/105/statement/2026/0311tsuitou.html","confidence":"高","snippet":"震災発生から15年が経過し、今もなお行方不明の方がいらっしゃいます。4月から「第３期復興・創生期間」が始まり、次の5年間で課題解決に全力で取り組む方針を表明。防災庁の設置準備を加速させ、「災害に強い国づくり」を進めることを述べた。"},{"id":"2026-03-08-soc-002","category":"社会","title":"中東情勢悪化で原油先物が1バレル119ドルに急騰 灯油・LPガス不足懸念が全国に広がる","summary":"ホルムズ海峡の事実上の封鎖を受け、3月9日の原油先物（ブレント）は1バレル119ドルまで急騰した。これに伴い石油系燃料の供給不安が広がり、全国のガソリンスタンドや灯油販売店では一部で品薄・買い占めが報告された。政府は国家石油備蓄（約145日分）の一部放出の検討を開始。電力会社・ガス会社も緊急の代替調達を進めており、企業や家庭の光熱費負担が急速に増大している。日本の石油輸入の約9割を中東に依存しているため、危機長期化のシナリオが国民生活を直撃する深刻な懸念となっている。","date":"2026-03-09","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"中東情勢の急激な悪化により、原油先物相場は1バレル119ドルまで急騰。国内では灯油・ガスの品薄が報告され、政府は国家石油備蓄の放出を検討。"},{"id":"2026-03-08-soc-003","category":"社会","title":"ホルムズ危機で中東・欧州旅行のキャンセル急増 卒業旅行シーズンに影響","summary":"ホルムズ海峡危機に伴う航空路線の大幅変更・燃油サーチャージ引き上げを受け、3月の卒業・春休み旅行シーズンに中東・欧州方面の旅行キャンセルが相次いでいる。旅行各社によると中東方面の予約キャンセル率は8〜9割に達し、欧州方面も燃油サーチャージ急騰と迂回による運賃上昇でキャンセルが増加。一方、影響が少ない東南アジアや国内旅行への振り替え需要が高まっている。大学生の卒業旅行や企業の春季海外研修にも影響が広がった。","date":"2026-03-10","source":"","confidence":"中","snippet":""},{"id":"2026-03-08-spo-001","category":"スポーツ","title":"WBC2026 侍ジャパンがオーストラリアに4-3で辛勝・1次ラウンド3連勝（東京ドーム）","summary":"野球のWBC（ワールドベースボールクラシック）2026の1次ラウンド（プールC）が東京ドームで行われ、3月8日は日本がオーストラリアと対戦した。日本は4-3の僅差で辛勝し、開幕から3連勝（対チャイニーズ・タイペイ13-0、対韓国8-6に続く）。接戦での勝利に東京ドームが沸いた。","date":"2026-03-08","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"日本はPOOL Cで3月8日のオーストラリア戦を4-3で制し、3連勝。1次ラウンドを4戦全勝で首位通過し準々決勝へ進出した。"},{"id":"2026-03-08-spo-002","category":"スポーツ","title":"WBC2026 侍ジャパンがチェコに9-0の圧勝・1次ラウンド4戦全勝で首位通過","summary":"WBC2026の1次ラウンド最終戦（3月10日、東京ドーム）で日本はチェコを9-0と圧倒し、4戦全勝でプールCを首位通過した。合計スコアは4試合で35得点6失点の圧倒的な攻撃力と投手陣の安定感を示した。侍ジャパンは準々決勝に進出し、マイアミで行われる決勝トーナメントに臨む。","date":"2026-03-10","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"日本はPOOL C（東京）で4戦全勝し、準々決勝進出を決めた。チェコ戦は9-0の大勝で、1次ラウンドを35得点6失点で突破した。"},{"id":"2026-03-08-ent-001","category":"芸能・エンタメ・ゴシップ","title":"新劇場版「銀魂 -吉原大炎上-」公開4週目も好調・累計観客100万人超が射程圏に","summary":"2026年2月13日に公開された「新劇場版 銀魂 -吉原大炎上-」が公開4週目も好調な観客動員を維持し、3月上旬時点での累計観客動員数は80万人超、累計興行収入は12億円台に達した。週末ランキングでも上位をキープし、「銀魂」劇場版シリーズ歴代最高ペースで推移。公開から1ヶ月以上が経過してもロングランを続けており、3月末には100万人突破も視野に入った。","date":"2026-03-10","source":"https://mantan-web.jp/article/20260216dog00m200069000a.html","confidence":"中","snippet":"公開3日間で興収4億円・観客26万人超の好スタートを切った新劇場版銀魂は公開後も好調なペースを維持し、銀魂劇場版シリーズ歴代最高の成績で推移している。"},{"id":"2026-03-08-tec-001","category":"テクノロジー","title":"デジタル庁「源内」で国産LLM7モデルを選定 全府省庁18万人に展開・AI行政を本格化","summary":"デジタル庁は3月6日、全府省庁・外局等39機関の政府職員約18万人を対象とした生成AI利用環境「ガバメントAI（源内）」で試用する国産大規模言語モデル（LLM）7件の選定結果を発表した。選定されたのはNTTデータ「tsuzumi 2」、KDDI/ELYZA「Llama-3.1-ELYZA-JP-70B」、ソフトバンク「Sarashina2 mini」、NEC「cotomi v3」、富士通「Takane 32B」、Preferred Networks「PLaMo 2.0 Prime」、カスタマークラウド「CC Gov-LLM」の7モデル。2026年5月から大規模実証を開始し、2026年8月から試用開始、2027年4月に正式調達を検討する。外資系AIへの依存が経済安全保障上のリスクになりうるとの認識が背景にある。","date":"2026-03-06","source":"https://www.itmedia.co.jp/aiplus/articles/2603/06/news097.html","confidence":"高","snippet":"デジタル庁が全府省庁の約18万人を対象とした生成AI基盤「源内」で試用する国産LLMとして7モデルを選定。2026年8月から試用開始し、2027年1月に評価結果の一部を公表予定。"},{"id":"2026-03-08-int-001","category":"国際","title":"トランプ大統領が日本・英・仏・独・伊にホルムズ海峡への軍艦派遣を要求","summary":"米国のトランプ大統領は3月14日、日本・英国・フランス・ドイツ・イタリアの同盟5カ国に対し、ホルムズ海峡の航行自由確保のために軍艦を派遣するよう公式に要求した。イランとの戦闘が続く中、海峡の商船航行を確保するための多国間の海軍プレゼンスが必要と判断した。日本政府は憲法上の制約も踏まえ対応を検討。高市首相は「可能な限りで協力する」と述べるにとどまり、護衛艦派遣の可否について与野党間で論議となった。","date":"2026-03-14","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"米トランプ大統領が日本を含む5カ国にホルムズ海峡への軍艦派遣を要求。日本政府は憲法上の制約も踏まえ対応を検討。高市首相は「可能な限りで協力する」と述べた。"},{"id":"2026-03-01-pol-001","category":"政治","title":"カナダのカーニー首相が訪日・高市首相と会談 日加関係を「包括的戦略的パートナーシップ」に格上げ","summary":"カナダのマーク・カーニー首相が3月6〜7日に訪日し、高市早苗首相と首相官邸で約25分の首脳会談と75分のワーキングディナーを行った。両首脳は日カナダ外交関係樹立60周年を機に両国関係を「包括的戦略的パートナーシップ」に格上げすることで一致し、初の日加首脳共同声明に署名した。安全保障・サイバー協力・重要鉱物サプライチェーン・AI・量子技術・海洋安全保障など幅広い分野で協力文書3件を締結。ホルムズ海峡危機下でのカナダ産LNGの安定供給継続も確認された。","date":"2026-03-06","source":"https://www.kantei.go.jp/jp/105/actions/202603/06canada.html","confidence":"高","snippet":"高市首相とカーニー首相は、日カナダの協力関係が安全保障、経済安全保障を含む経済、文化・人物交流等あらゆる分野で広がっていることを踏まえ、両国関係を「包括的戦略的パートナーシップ」へ格上げすることで一致。初となる日加首脳共同声明に署名した。"},{"id":"2026-03-01-pol-002","category":"政治","title":"政府が核最終処分場の候補地として南鳥島への文献調査を申し入れ 国有地・無人島を活用","summary":"経済産業省と原子力発電環境整備機構（NUMO）は3月3日、高レベル放射性廃棄物（核のゴミ）の最終処分場の候補地として、東京から約1900km南東に位置する南鳥島（東京都小笠原村）に対する文献調査の申し入れを行った。同島は国有地で民間人は居住しておらず、地権者同意の問題が生じない利点がある。最終処分場選定は長年の懸案で、適地があれば国有地でも調査を推進する方針に転換したもの。過去には北海道寿都町・神恵内村のみが文献調査に応じていた。","date":"2026-03-03","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"国は核のゴミ最終処分場の候補地として、南鳥島での文献調査を申し入れた。同島は国有地で民間人は住んでいない。"},{"id":"2026-03-01-pol-003","category":"政治","title":"衆院予算委員会が省庁別審査を開始 中東情勢・エネルギー政策が論点に","summary":"衆議院予算委員会は3月4日から6日にかけて、2026年度予算案の省庁別審査（分科会審査）を実施した。先週に引き続き2026年度予算の最終審議段階で、3月9日の集中審議・3月13日の採決に向けた重要な局面。審議では直近の米・イスラエルによるイラン攻撃（2/28〜）に伴うホルムズ海峡危機やエネルギー政策・石油備蓄の対応を巡る質疑が相次いだ。","date":"2026-03-04","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"高","snippet":"2026年3月4日（水）〜6日（金）に衆院予算委員会の省庁別審査が実施。3月9日の集中審議を経て、3月13日に締めくくり質疑と採決が予定されていた。"},{"id":"2026-03-01-eco-001","category":"経済","title":"ニデック不適切会計問題で第三者委員会「最も責めを負うべきは永守重信氏」と報告書を公表","summary":"モーター大手のニデックは3月3日、不適切会計を巡る第三者委員会の調査報告書（全413ページ）を公表した。報告書は「会計不正を指示・主導した事実は発見されなかった」としながらも、創業者の永守重信氏について「一部の会計不正を容認したとの評価は免れない。最も責めを負うべきは永守氏と言わざるを得ない」と結論づけた。業績目標達成への「強すぎるプレッシャー」が不正の背景で、減損損失は2500億円規模に及ぶ見通し。永守氏は2025年12月に代表取締役を辞任し名誉会長に、2026年2月26日には名誉会長も辞任していた。","date":"2026-03-03","source":"https://www.nikkei.com/article/DGXZQOUF025J00S6A300C2000000/","confidence":"高","snippet":"ニデックは不適切会計に関する第三者委員会調査報告書を公表。「最も責めを負うべきなのは、永守氏であると言わざるを得ない」と報告書は結論づけた。減損損失は2500億円規模の見通し。"},{"id":"2026-03-01-eco-002","category":"経済","title":"米・イスラエルのイラン攻撃でホルムズ海峡が封鎖 日本の石油・LNG輸入に緊急事態","summary":"2月28日に開始した米国とイスラエルによるイランへの大規模軍事攻撃の影響で、ホルムズ海峡が事実上の封鎖状態となった。世界の原油供給の約20%とLNGの相当量が通過するこの海峡の閉鎖は、日本の石油輸入の約9割を中東に依存する日本経済に深刻な打撃を与えている。タンカーの海峡通過は当初70%減少し、150隻超が海峡外で投錨。経済産業省は3月初旬から国家石油備蓄（約145日分）の放出検討と代替調達の調整を開始。原油先物（ブレント）は1バレル100ドルを超え、週を追うごとに上昇した。","date":"2026-03-01","source":"https://www.jetro.go.jp/biznews/2026/03/700780f3729fbc18.html","confidence":"高","snippet":"米・イスラエルのイラン攻撃によりホルムズ海峡が封鎖。タンカー交通は当初約70%減少し、150隻以上が海峡外で投錨。世界の日量原油供給の約20%とLNGに影響。"},{"id":"2026-03-01-eco-003","category":"経済","title":"日加首脳会談でLNGカナダの安定供給継続を確認 中東危機の代替エネルギー源として注目","summary":"3月6日の日加首脳会談では、ホルムズ海峡危機を踏まえたエネルギー安全保障も主要議題となった。カーニー首相と高市首相はブリティッシュ・コロンビア州のLNGカナダプロジェクト（年産1400万トン）からの日本向け供給継続を確認。中東産LNGに代わる重要な調達源として位置づけられ、今後の増産検討でも連携していくことが合意された。また「G7初の小型モジュール炉（SMR）建設」プロジェクトの推進でも協力することが共同声明に盛り込まれた。","date":"2026-03-06","source":"https://www.jetro.go.jp/biznews/2026/03/298c7189f50f5e74.html","confidence":"高","snippet":"日加首脳会談でLNGカナダの生産継続とG7初の小型モジュール炉建設などの既存プロジェクト継続を確認。中東危機下でカナダ産LNGの安定調達が重要課題となっている。"},{"id":"2026-03-01-eco-004","category":"経済","title":"春闘2026 UAゼンセンなど主要産別が要求額を決定 物価高対応で昨年上回る賃上げ要求","summary":"2026年春闘において、UAゼンセン（流通・製造業）など主要産別が3月上旬までに組合要求額を正式決定した。ホルムズ危機に伴う物価高騰や昨年比での実質賃金低下を踏まえ、各産別は昨年を上回る賃上げ要求を掲げた。自動車・電機などの大手組合も交渉を本格化させており、3月18日の集中回答日に向けた交渉が続く。","date":"2026-03-03","source":"","confidence":"中"},{"id":"2026-03-01-soc-001","category":"社会","title":"旧統一教会の解散命令が確定 東京高裁が即時抗告を棄却 宗教法人格を正式喪失","summary":"東京高等裁判所は3月4日、世界平和統一家庭連合（旧統一教会）が宗教法人法に基づく解散命令に不服申し立てた即時抗告を棄却し、一審・東京地裁（2025年3月）の解散命令決定を維持した。高額献金を求める反社会的な宗教活動による民法上の不法行為で解散命令が確定するのは日本初。被害者は1500人以上・被害総額204億円以上と認定。宗教法人格を失い清算法人となったが、教団は直後に最高裁への特別抗告を申し立てた。日本弁護士連合会は「1980年代からの霊感商法・献金被害の根本的解決に向けた大きな一歩」と評価する会長談話を発表した。","date":"2026-03-04","source":"https://www.nichibenren.or.jp/document/statement/year/2026/260304.html","confidence":"高","snippet":"東京高裁は旧統一教会の解散を命じた地裁決定を支持し、即時抗告を退けた。民法上の不法行為を理由にした宗教法人解散は日本初。宗教法人格を喪失し清算手続きへ。"},{"id":"2026-03-01-soc-002","category":"社会","title":"ノーベル文学賞作家・大江健三郎の未発表小説2篇が死後に発見 東京大学が発表","summary":"東京大学文学部大江健三郎文庫は3月3日、2023年に89歳で逝去したノーベル文学賞作家・大江健三郎氏（1935〜2023年）の未発表小説2篇が発見されたと発表した。「暗い部屋からの旅行」（1955年5月執筆・原稿400字詰め82枚・現存最古作品）と「旅への試み」（1957年5月執筆・原稿42枚）で、東大在学中の下宿先の遺族が昨年11月に文庫に連絡し、筆跡鑑定と内容確認で真筆と確認された。デビュー作「死者の奢り」とほぼ同時期の作品で、後の代表作を想起させるモチーフが含まれているという。全文は3月6日発売の文芸誌「群像」2026年4月号に掲載される。","date":"2026-03-03","source":"https://www.jiji.com/jc/article?k=2026030300058&g=soc","confidence":"高","snippet":"東京大学が、大江健三郎氏の未発表小説2篇（「暗い部屋からの旅行」1955年執筆・現存最古、「旅への試み」1957年執筆）の発見を発表。東大在学中の下宿先の遺族が昨年11月に連絡し、真筆と確認された。"},{"id":"2026-03-01-soc-003","category":"社会","title":"ホルムズ海峡封鎖でガソリン・灯油が急騰 国内でエネルギー不安広がる","summary":"2月28日のホルムズ海峡事実上の封鎖を受け、国内のガソリン・灯油価格が急騰し始めた。石油元売り各社は週次の卸値を引き上げ、全国のガソリンスタンドではレギュラーガソリンが1リットル175〜180円台に達した（前週比5〜8円高）。一部地域では灯油の品薄も報告され、政府は石油備蓄の状況確認を急ぐとともに、補助金制度の緊急対応も検討。インフレ下での追い打ちとなるエネルギー価格高騰が家庭・産業界の懸念を高めた。","date":"2026-03-02","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"ホルムズ海峡封鎖を受け国内ガソリン・灯油価格が急騰。一部地域で品薄報告。政府は石油備蓄の確認と補助金の緊急対応を検討。"},{"id":"2026-03-01-spo-001","category":"スポーツ","title":"WBC2026開幕・侍ジャパンが初戦でチャイニーズ・タイペイに13-0の7回コールド圧勝","summary":"野球のワールドベースボールクラシック（WBC）2026が3月5日に開幕し、日本代表・侍ジャパンは6日、東京ドームでの1次ラウンド（プールC）初戦でチャイニーズ・タイペイと対戦した。日本は2回だけで10得点を挙げる猛攻を見せ、13-0の7回コールドゲームで圧勝した。大谷翔平は第1打席で満塁本塁打（グランドスラム）を放ち4打点。東京ドームの5万人超の観衆が沸いた。","date":"2026-03-06","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"WBC2026の日本初戦（3月6日）でチャイニーズ・タイペイを13-0で下した。大谷翔平が第1打席から満塁本塁打を放ち、2回だけで10点を奪う圧倒的な内容だった。"},{"id":"2026-03-01-spo-002","category":"スポーツ","title":"WBC2026 日韓戦・侍ジャパンが韓国に8-6で逆転勝利 東京ドームが大歓声","summary":"WBC2026の1次ラウンド第2戦（3月7日、東京ドーム）は日韓戦となり、日本が8-6で勝利し開幕2連勝を飾った。日本は序盤に2点リードされる苦しい展開となったが、中盤以降に打線が爆発して逆転。WBCで最大のライバルとされる韓国を下し、東京ドームが歓声に包まれた。","date":"2026-03-07","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"WBC2026の日本対韓国戦（3月7日）は8-6で日本が勝利。侍ジャパンは開幕2連勝となった。"},{"id":"2026-03-01-spo-003","category":"スポーツ","title":"高木美帆がスピードスケート世界選手権後の現役引退を表明 五輪女子最多の通算10メダル","summary":"スピードスケートの高木美帆選手（31歳、TOKIOインカラミ）は3月4日、Instagramでオランダ・ヘーレンフェインで3月5〜8日に開催されるISU世界オールラウンド・スプリントスピードスケート選手権大会を「私のスケート人生の一区切りにしようと思っている」と投稿し、現役引退の意向を表明した。夏季五輪も含めた日本女子最多となる五輪通算10個のメダル（金3・銀4・銅3、ミラノ冬季五輪では銅3個）を誇る日本スポーツ界のレジェンド。ワールドカップの通算38勝も男女通じて日本史上最多。","date":"2026-03-04","source":"https://www.nikkei.com/article/DGXZQOKC0409O0U6A300C2000000/","confidence":"高","snippet":"高木美帆選手（31）が3/4にインスタグラムで世界選手権（3/5〜8）後の引退を表明。五輪通算10個のメダルを誇り、夏季を含む日本女子最多。ワールドカップ通算38勝も日本史上最多。"},{"id":"2026-03-01-ent-001","category":"芸能・エンタメ・ゴシップ","title":"京都アニメーション社長・八田英明氏が76歳で死去 放火事件から会社再建に尽力","summary":"「けいおん！」「響け！ユーフォニアム」など数々のヒット作を生み出した京都アニメーション（京アニ）の創業者で社長の八田英明氏が2月に76歳で死去し、3月2日頃に報道された。1985年に設立した京アニを下請けから自社制作のアニメスタジオへ成長させ「日常系」というジャンルを切り開いた。2019年7月に36人が犠牲となった放火殺人事件後は、社員の生活保障と会社再建に全身全霊で取り組み、新作の公開や新スタジオ建設を進めてきた。後任社長は長男で共同代表取締役の八田真一郎氏が就任した。","date":"2026-03-02","source":"https://news.web.nhk/newsweb/na/na-k10015064191000","confidence":"高","snippet":"京都アニメーションの社長・八田英明さんが76歳で死去。事件後も新作映画やアニメを公開し、同社再興に尽くした。「けいおん！」「涼宮ハルヒの憂鬱」などのヒット作を送り出した。"},{"id":"2026-03-01-ent-002","category":"芸能・エンタメ・ゴシップ","title":"新劇場版「銀魂 -吉原大炎上-」公開3週で累計70万人・興収10億円超 シリーズ歴代最高ペース","summary":"2026年2月13日公開の「新劇場版 銀魂 -吉原大炎上-」が公開から約3週が経過した3月1日時点で、累計観客動員数70万人超・興行収入10億円超を達成した。公開初週末（3日間）で4億円・26万人という好スタートを切り、その後もロングランを続けている。銀魂劇場版シリーズ歴代最高ペースで推移しており、このままいけば3月末に100万人突破も視野に入ってきた。","date":"2026-03-01","source":"https://mantan-web.jp/article/20260216dog00m200069000a.html","confidence":"中","snippet":"2/13公開の新劇場版銀魂は公開3日間で興収4億円・観客26万人超の好スタート。シリーズ歴代最高ペースでのロングランが続いている。"},{"id":"2026-03-01-tec-001","category":"テクノロジー","title":"MWC 2026バルセロナ開幕 AIとモバイルの融合が最大テーマ・ロボットスマホや次世代通信を展示","summary":"世界最大のモバイル・テクノロジー見本市「MWC（Mobile World Congress）2026」がスペイン・バルセロナで3月2〜5日に開催された。AIとモバイルの融合が最大テーマで、Lenovo がThinkPadシリーズ6機種を一挙発表、Qualcommが最新モバイルチップを公開、Honorが人型ロボットとAIを融合した「Robot Phone（ロボットスマホ）」を披露した。日本からはNTTグループ・KDDI・ソフトバンク・楽天が出展し、AIデータセンターが支える次世代ネットワーク・宇宙通信・6Gを世界にアピールした。","date":"2026-03-02","source":"https://www.nikkei.com/article/DGXZQOGR231W40T20C26A2000000/","confidence":"高","snippet":"MWC 2026バルセロナにてAIとモバイルの融合が最大テーマに。Lenovo・Qualcomm・Honorが新製品を大量発表。NTTグループ・KDDI・ソフトバンク・楽天グループも出展。"},{"id":"2026-03-01-int-001","category":"国際","title":"米国とイスラエルがイランへの大規模軍事攻撃を開始 ハーメネイー師が死亡・ホルムズ海峡封鎖","summary":"米国とイスラエルは2026年2月28日、「エピック・フューリー作戦」などのコードネームでイランへの大規模軍事攻撃を開始した。イランの核施設・防空システム・軍事基地を標的とした攻撃の過程で、最高指導者アリー・ハーメネイー師が死亡した。イランは報復として湾岸諸国の米軍基地などにミサイル攻撃を実施。ホルムズ海峡では商船の航行が事実上禁止され、タンカー交通は70%減少した。世界エネルギー供給の約20%が通過するホルムズ封鎖は、1970年代のオイルショック以来の規模のエネルギー危機を引き起こした。","date":"2026-02-28","source":"https://www.jetro.go.jp/biznews/2026/03/700780f3729fbc18.html","confidence":"高","snippet":"米・イスラエルのイラン攻撃でホルムズ海峡が封鎖。タンカー交通は当初約70%減少し150隻以上が海峡外で投錨。世界の日量原油供給の約20%とLNGに影響。1970年代以来最大のエネルギー供給障害とされている。"},{"id":"2026-02-22-pol-001","category":"政治","title":"第221回特別国会で代表質問開始、野党が積極財政・憲法改正を論戦","summary":"高市早苗首相の施政方針演説を受け、2月24日から衆参両院で代表質問が始まった。野党・中道改革連合の小川淳也新代表が積極財政の財源確保策を問い、憲法改正への慎重姿勢を求めた。衆院選で躍進した参政党とチームみらいも初めて代表質問に立ち、衆院選後の新たな政治地図が反映された3日間の論戦となった。","date":"2026-02-24","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/topics/shitsugi221-1.html","confidence":"高","snippet":"与野党合意により24日から代表質問が始まり、3日間で衆参各党の代表が高市首相の施政方針に対して論戦を繰り広げた。"},{"id":"2026-02-22-eco-001","category":"経済","title":"ラピダス、民間32社から計1676億円調達—ホンダ・キヤノンなど、政府が筆頭株主に","summary":"国策半導体メーカー・ラピダスは2月27日、ホンダ、キヤノン、富士フイルムなど民間32社から計1676億円の出資を受けると発表した。政府も1000億円を出資し筆頭株主となり、「黄金株」による拒否権も保持。官民合計2676億円を調達し、2ナノメートル世代の先端半導体の国内量産を目指す。","date":"2026-02-27","source":"https://www.nikkei.com/article/DGXZQOUA270F80X20C26A2000000/","confidence":"高","snippet":"ラピダスへの民間出資は当初の想定を上回る1676億円となり、赤沢経産相が正式に発表した。政府が筆頭株主となり黄金株も保持する。"},{"id":"2026-02-22-eco-002","category":"経済","title":"みずほFGが事務職5000人分をAIで置き換え—10年かけて配置転換","summary":"みずほフィナンシャルグループは2月27日、今後10年間で全国約1万5000人の事務職の業務を最大5000人分削減し、AIに置き換えると発表した。口座開設書類の確認やデータ入力などをAIが担い、削減分の職員は個人向け営業などに配置転換する。三大メガバンクの中で最も大胆なAI転換策として注目されている。","date":"2026-02-27","source":"https://www.nikkei.com/article/DGXZQOUB270ZC0X20C26A2000000/","confidence":"高","snippet":"今後10年で全国に約1万5000人いる事務職の業務を最大5000人分減らし、解雇はせず個人向け営業など他部門に再配置する見通し。"},{"id":"2026-02-22-eco-003","category":"経済","title":"マンダム、TOB成立でMBO完了—5月に上場廃止へ","summary":"化粧品メーカーのマンダムは2月26日、CVC傘下のカロン・ホールディングスによるTOBが成立し、MBOが完了したと発表した。総額約1256億円で東証プライム市場から非公開化し、5月15日に上場廃止となる見通し。TOBは2025年9月から実施され、72%以上の株主が応募した。","date":"2026-02-26","source":"https://www.nihon-ma.co.jp/news/20260226_4917-11/","confidence":"高","snippet":"マンダムのTOBが成立し、CVC傘下で非公開化へ。5月15日に上場廃止となる予定。"},{"id":"2026-02-22-eco-004","category":"経済","title":"伊藤忠商事、サンフロンティア不動産に約320億円の資本参加—TOBで約20%取得","summary":"伊藤忠商事は2月25日、不動産会社サンフロンティア不動産に対してTOBを発表した。1株2800円（前日終値比約9%プレミアム）でTOBを実施し、第三者割当増資と合わせて約320億円を投じて株式の約20%を取得。上場は維持し、都市部オフィス再生やホテル・観光分野での事業シナジーを見込む。","date":"2026-02-25","source":"https://www.nihon-ma.co.jp/news/20260225_8001-156/","confidence":"高","snippet":"伊藤忠商事がサンフロンティア不動産にTOBを実施。1株2800円で約20%の株式を取得し、資本業務提携を通じて不動産・観光分野での事業拡大を目指す。"},{"id":"2026-02-22-soc-001","category":"社会","title":"日野町事件で再審開始確定—無期懲役確定後の死後再審は戦後初","summary":"1984年に滋賀県で起きた「日野町事件」で最高裁第2小法廷は2月24日、検察の特別抗告を棄却し、阪原弘さん（2011年獄中死）の再審開始を確定させた。無期懲役以上が確定した事件での死後再審は戦後初。捜査資料の写真のすり替えが決め手となり、大津地裁で行われる再審では無罪の公算が大きい。","date":"2026-02-24","source":"https://www.jiji.com/jc/article?k=2026022500554&g=soc","confidence":"高","snippet":"裁判官3人全員一致で高裁の再審開始決定を支持。無期懲役以上が確定した戦後事件で本人死亡後の再審開始は初めてのケースとなった。"},{"id":"2026-02-22-soc-002","category":"社会","title":"2025年の出生数70万5,809人—10年連続で過去最少を更新","summary":"厚生労働省は2月26日、2025年の出生数（速報値）が70万5,809人で、10年連続で過去最少を更新したと発表した。前年比でさらに落ち込みが続いており、少子化対策の抜本的な見直しを求める声が高まっている。高市内閣は4月からの教育無償化を公約しており、少子化への実効性が問われる。","date":"2026-02-26","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"厚生労働省の人口動態統計（速報値）で、2025年の出生数は70万5809人で、10年連続で過去最少を更新した。"},{"id":"2026-02-22-soc-003","category":"社会","title":"佐賀県警・元科捜研職員がDNA鑑定を不正繰り返す、在宅起訴","summary":"佐賀地検は2月27日、佐賀県警の科学捜査研究所（科捜研）の元職員・富永武浩被告（42）を、虚偽公文書作成・証拠隠滅の罪で在宅起訴した。2017年から約7年間、性犯罪などの9件のDNA型鑑定を行ったとする虚偽書類を作成するなど不正を繰り返していた。捜査や裁判への直接影響はないとされるが、科学鑑定の信頼性を揺るがす事件として波紋を呼んでいる。","date":"2026-02-27","source":"https://www.nikkei.com/article/DGXZQOUD2782A0X20C26A2000000/","confidence":"高","snippet":"九件のDNA型鑑定を行ったという虚偽のワークシートを作成するなど、2017年から7年以上にわたって不正を繰り返し、懲戒免職となっていた。"},{"id":"2026-02-22-spo-001","category":"スポーツ","title":"ミラノ冬季五輪が閉幕—日本は金5・銀7・銅12の計24個、冬季最多メダル","summary":"2026年ミラノ・コルティナ冬季オリンピックが2月22日に閉幕した（日本時間23日）。日本は金5・銀7・銅12の計24個のメダルを獲得し、冬季五輪史上最多を大幅に更新。スノーボードで9個（木村葵来・村瀬心椛・深田茉莉ら）、フィギュアスケートで6個（三浦璃来＆木原龍一ペア金など）を獲得。高木美帆はスピードスケートで3個の銅を加え夏冬通じた通算メダル数10個（日本女子最多）を達成した。","date":"2026-02-22","source":"https://www.nikkei.com/article/DGXZQODH221F80S6A220C2000000/","confidence":"高","snippet":"金5、銀7、銅12の計24個のメダルを獲得し、過去最多を大幅に更新。スノーボードで9個、フィギュアスケートで6個のメダルを獲得した。"},{"id":"2026-02-22-spo-002","category":"スポーツ","title":"王貞治ソフトバンク球団会長、台湾総統から野球交流の功績で勲章","summary":"王貞治ソフトバンクホークス球団会長が2月26日、台湾の頼清徳総統から野球を通じた日台交流への長年の貢献をたたえ、勲章を授与された。王会長は台湾系として日台の架け橋となってきた功績が評価された。","date":"2026-02-26","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"台湾の頼清徳総統は王貞治氏に、野球交流への貢献をたたえ勲章を授与した。"},{"id":"2026-02-22-ent-001","category":"芸能・エンタメ・ゴシップ","title":"LUNA SEA ドラマー・真矢が56歳で死去—脳腫瘍との闘病の末","summary":"ロックバンド「LUNA SEA」のドラマー・真矢（本名：山田真哉）が2月17日、56歳で死去した。2020年に大腸がんのステージ4と診断され7度の手術を経ながら活動を続け、2025年9月には脳腫瘍を公表していた。妻はモーニング娘。元メンバーの石黒彩。「35年以上刻んできたビートと音楽への深い愛は永遠に止まらない」とメンバーが声明を発表。訃報は2月23日に広く報道された。","date":"2026-02-17","source":"https://www.jiji.com/jc/article?k=2026022300336&g=soc","confidence":"高","snippet":"昨年9月には約5年間の闘病を告白していた真矢さんが、脳腫瘍のため2月17日に56歳で死去した。"},{"id":"2026-02-22-ent-002","category":"芸能・エンタメ・ゴシップ","title":"映画ドラえもん45作目「新・のび太の海底鬼岩城」公開3日間で初登場1位","summary":"「映画ドラえもん 新・のび太の海底鬼岩城」が2月27日に公開された。1983年の第4作目のリメイクで、シリーズ第45作目。公開3日間で観客動員62万1103人、興行収入7億7968万円を記録し、映画ランキングで初登場1位となった。監督は矢嶋哲生、脚本は村山功。","date":"2026-02-27","source":"https://dora-world.com/contents/4029","confidence":"高","snippet":"公開3日間で観客動員数62万1103人、興行収入7億7968万1350円を記録し、映画観客動員ランキングで初登場1位となった。"},{"id":"2026-02-22-ent-003","category":"芸能・エンタメ・ゴシップ","title":"ポケモン誕生30周年—「Pokémon Day」に公式特設サイトと記念映像を公開","summary":"1996年2月27日に初代「ポケットモンスター 赤・緑」が発売されてから30周年を迎えた「Pokémon Day」（2月27日）に、公式特設サイトがオープンし、記念映像がYouTubeで公開された。ANAや日本プロ野球12球団とのコラボ、LEGO×ポケモンの初コラボ商品なども発表。毎月テーマを変えて30周年を盛り上げる1年間の企画がスタートした。","date":"2026-02-27","source":"https://www.pokemon.co.jp/info/2026/02/260227_cm01.html","confidence":"高","snippet":"2月27日は「Pokémon Day」で、ポケモンが30周年を迎えた。公式サイトに特集ページがオープンし、30周年を彩るニュースが続々と発表されます。"},{"id":"2026-02-22-tec-001","category":"テクノロジー","title":"国交省、航空機内でのモバイルバッテリー使用・充電を禁止—4月から持ち込みも2個制限","summary":"国土交通省は2月27日、航空機内でのモバイルバッテリーへの充電・他機器への給電を原則禁止とし、持ち込みを1人2個（160Wh以下）に制限するルール改正案を発表した。2026年4月24日から全便に適用する。世界的にリチウム電池による機内火災が増加しており、ICAO（国際民間航空機関）の安全基準改正に基づく措置。JAL・ANAも順次対応する。","date":"2026-02-27","source":"https://news.web.nhk/newsweb/na/na-k10015054951000","confidence":"高","snippet":"リチウム電池関連の機内火災増加を受け、4月24日から航空機内でのモバイルバッテリーへの充電および他の電子機器への充電を禁止する。持ち込みは1人2個までに制限。"},{"id":"2026-02-22-int-001","category":"国際","title":"中国が日本防衛企業など20社に軍民両用品輸出禁止—三菱重工・川崎重工・JAXAなど対象","summary":"中国商務省は2月24日、三菱重工業傘下の三菱造船、川崎重工業、IHI、JAXAなど日本の企業・団体計20社に対して軍民両用製品の輸出を禁止すると発表した。さらに20社を「注視リスト」に追加し審査を厳格化した。日本政府は強く抗議し即時撤回を要請。中国が日本の防衛関連企業を輸出禁止対象にするのは初めてで、第2次高市内閣に対する圧力とも受け取られている。","date":"2026-02-24","source":"https://www.nikkei.com/article/DGXZQOGM241R80U6A220C2000000/","confidence":"高","snippet":"中国商務省は三菱造船など日本の20企業・団体を対象としたデュアルユース品目の輸出を禁止すると発表。日本政府は強く抗議し措置の撤回を要請した。"},{"id":"2026-05-28-政治-001","category":"政治","title":"高市首相 フィリピン大統領と会談し経済連携協定見直し検討へ","summary":"高市総理大臣とフィリピンのマルコス大統領が首脳会談を実施し、重要鉱物などのサプライチェーン強化を目的に経済連携協定（EPA）の見直しに向けた検討を進めることで合意する見通しとなった。マルコス大統領は5月26日から29日まで来日しており、戦略的パートナーシップの強化を両国で確認した。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133431000","confidence":"高","snippet":"重要鉱物などのサプライチェーンの強じん化を図るため、EPA＝経済連携協定の見直しに向けた検討を進めることで一致する見通しです。"},{"id":"2026-05-28-政治-002","category":"政治","title":"「国家情報局」設置法成立 「対外情報庁」など検討加速 政府","summary":"「国家情報局」を設置する法律が成立し、政府は治安・安全保障に関する情報収集と分析のさらなる強化を図る方針を示した。海外での情報収集活動を行う「対外情報庁」の創設など、情報機関の再編に向けた検討を加速させることにしている。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133391000","confidence":"高","snippet":"「国家情報局」を設置する法律の成立を受けて、政府は治安や安全保障に関する情報の収集と分析のさらなる強化を図る方針で、海外で情報収集活動を行う「対外情報庁」の創設などに向け検討を加速させることにしています。"},{"id":"2026-05-28-政治-003","category":"政治","title":"皇位継承 衆参議長らが会談 6月上旬にかけて各党と調整続く見通し","summary":"衆参両院の議長・副議長が安定的な皇位継承について会談し、取りまとめ案の作成に向けて「各党・各会派のできるだけ幅広い賛同を得る必要がある」との認識を共有した。6月上旬にかけて各党とのすり合わせを含めた調整が続く見通し。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133401000","confidence":"高","snippet":"衆参両院の議長・副議長はとりまとめ案の作成にあたりできるだけ幅広い賛同を得たい考えで、来月上旬にかけて各党などとのすり合わせも含めた調整が続く見通し"},{"id":"2026-05-28-経済-001","category":"経済","title":"経産省局長らがモスクワ訪問 日本企業同行し資産保全を要望","summary":"経済産業省の荒井勝喜通商政策局長と外務省の石川誠己欧州局審議官がモスクワを訪問し、ロシア政府関係者と面会した。日本企業も同行し、ウクライナ侵攻後もロシアに拠点を持つ100社以上の日本企業の資産保全について協議した。侵攻前と比べてロシア進出企業は約3分の2に減少している。","date":"2026年5月28日（木）","source":"https://www.jiji.com/jc/article?k=2026052800104&g=eco","confidence":"高","snippet":"経産省の荒井勝喜通商政策局長と外務省の石川誠己欧州局審議官がモスクワでロシア政府関係者らと面会。ウクライナへ侵攻したロシアに進出している日本企業の資産保全が目的"},{"id":"2026-05-28-経済-002","category":"経済","title":"ナフサ品薄・値上げ相次ぐ イラン攻撃から3か月、企業の不安拭えず","summary":"米国・イスラエルのイラン攻撃から3か月が経過し、ホルムズ海峡の封鎖に伴うナフサ（プラスチック・塗料の原料）の供給不足が続いている。イトーヨーカ堂が包装材変更、カルビーやカゴメがパッケージ簡素化で対応。大王製紙やユニ・チャームが紙おむつの値上げを発表するなど企業の影響は広範囲に及ぶ。政府は代替調達を推進しているが企業の不安は解消されていない。","date":"2026年5月28日（木）","source":"https://www.jiji.com/jc/article?k=2026052700940&g=eco","confidence":"高","snippet":"米イスラエルによるイラン攻撃から3ヶ月経過し、ホルムズ海峡の事実上の封鎖により、石油製品ナフサの供給混乱が発生。政府は年明けまでの必要量確保を強調しているが、商品の品薄や値上げが相次ぎ、企業の不安が払拭されていない。"},{"id":"2026-05-28-社会-001","category":"社会","title":"栃木強盗殺人 指示役の40代男、バール調達し成田から中国へ出国か","summary":"栃木県上三川町の民家で女性が殺害された強盗殺人事件で、指示役とされる40代男が竹前海斗容疑者（28）の逮捕後に成田空港から中国へ出国していたことが判明した。男は竹前容疑者と知人関係にあり、凶器のバールを調達していたことも明らかに。栃木県警は「空港を変えて海外逃亡を図った可能性」があるとみており、背後に匿名・流動型犯罪グループ（トクリュウ）の関与を疑い捜査を続けている。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133461000","confidence":"高","snippet":"男は竹前容疑者と知人関係にあり、凶器のバールを調達していたことも判明した。栃木県警は、この男が「空港を変えて海外逃亡を図った可能性」があるとみており、背後に匿名・流動型犯罪グループ（トクリュウ）がいるとして捜査を続けています。"},{"id":"2026-05-28-社会-002","category":"社会","title":"防災気象情報が大幅見直し 5月28日から「レベル付き」警戒情報に移行","summary":"5月28日午後から日本の防災気象情報が全面的に見直され、種類と名称が変更された。河川氾濫・大雨・土砂災害・高潮の4種類に警戒レベル（1〜5）が付与され、従来の「大雨警報」は「レベル3大雨警報」に変更。また警報と特別警報の間に新たに「レベル4危険警報」が設けられ、「危険な場所から全員避難する目安」として機能する。「洪水」カテゴリは廃止され「氾濫」と「大雨」に整理された。","date":"2026年5月28日（木）","source":"https://tenki.jp/forecaster/gureweather/2026/05/27/39070.html","confidence":"高","snippet":"5月28日午後からこれまで運用されてきた防災気象情報が大きく見直され、種類や名前が変更になります。警報と特別警報の間に「レベル4危険警報」が新設されました。"},{"id":"2026-05-28-スポーツ-001","category":"スポーツ","title":"WRCラリージャパン2026開幕 名古屋城周辺でOPセレモニー 勝田貴元が地元V狙う","summary":"FIA世界ラリー選手権第7戦「フォーラムエイト・ラリージャパン2026」が5月28日に名古屋城周辺でのオープニングセレモニーで開幕した。17カ国64名のクルーが愛知・岐阜のステージで5月31日まで競う。今季2勝を挙げてドライバーズランキング2位につける勝田貴元（トヨタGRヤリス）が地元大会での悲願の優勝を目指す。WRC2クラスにはランチアが初参戦するなど見どころも多い。","date":"2026年5月28日（木）","source":"https://www.as-web.jp/rally/1319857","confidence":"高","snippet":"勝田貴元選手（トヨタGRヤリス・ラリー1）は既に今季2勝を挙げており、母国ラリージャパンでの優勝を期待される状況にあります。一方、WRC2クラスではランチアの初登場など、日本勢との戦いも注視される点として挙げられています。"},{"id":"2026-05-28-スポーツ-002","category":"スポーツ","title":"全仏オープン 青山修子・穂積絵莉の日本ペア2組が女子ダブルス2回戦進出","summary":"パリで開催中の全仏オープンテニス2026（5月24日〜6月7日）の女子ダブルスで、青山修子がE.S.リャンと組んで6-2・6-3で勝利し2回戦進出。穂積絵莉もF.H.ウーとペアを組み6-3・6-0の快勝で続いた。日本人ペア2組がそろって2回戦に駒を進めた。","date":"2026年5月28日（木）","source":"https://www.sportzorg24.tv/fo2026-japanese-player/","confidence":"中","snippet":"青山修子選手がE.S.リャン選手とペアを組み、「6-2, 6-3」で勝利し2回戦へ進出。穂積絵莉選手がF.H.ウー選手とのペアで「6-3, 6-0」で勝利し2回戦へ進出"},{"id":"2026-05-28-芸能-001","category":"芸能・エンタメ・ゴシップ","title":"阿部寛・木村拓哉・玉木宏が33年ぶり共演 秋ドラマ「あなたそばにいてくれますか」発表","summary":"阿部寛と木村拓哉（キムタク）が主演する新ドラマ「あなたそばにいてくれますか」が9月18日から放送開始されることが発表された。玉木宏も出演予定で、阿部寛とキムタクの共演は1993年の「君がいなくちゃ」以来約33年ぶり。当時は初回視聴率27.0%・最高31.9%を記録した社会現象級ドラマで、大物俳優の再共演に注目が集まっている。","date":"2026年5月28日（木）","source":"https://www.oricon.co.jp/news/2456958/","confidence":"高","snippet":"2人が一緒に出演するのは、1993年開始のドラマ「君がいなくちゃ」の約33年ぶり。当時の視聴率は初回27.0%、最高視聴率31.9%を記録した社会現象級のドラマでした。"},{"id":"2026-05-28-芸能-002","category":"芸能・エンタメ・ゴシップ","title":"是枝裕和監督「箱の中の羊」あす29日公開 カンヌでパルムドール候補・9分スタンディングオベーション","summary":"是枝裕和監督が綾瀬はるかと千鳥・大悟をW主演に迎えた映画「箱の中の羊」が5月29日に全国公開される。第79回カンヌ国際映画祭のコンペティション部門に正式出品され、公式上映後に9分間のスタンディングオベーションが起きてパルムドール（最高賞）候補として注目を集めた。亡き息子の姿をしたヒューマノイドを迎え入れる夫婦の物語を描いた近未来SF。","date":"2026年5月28日（木）","source":"https://press.moviewalker.jp/news/article/1398946/","confidence":"中","snippet":"是枝裕和監督、綾瀬はるか、千鳥・大悟らがカンヌへ！レッドカーペットから公式上映、会見までをレポート。カンヌ国際映画祭の公式上映後には長時間のスタンディングオベーションが起き、パルムドール候補として注目を集めた。"},{"id":"2026-05-28-テクノロジー-001","category":"テクノロジー","title":"MetaがFacebook・Instagram・WhatsAppにAIサブスク「Meta One」シリーズを発表","summary":"Metaは、Facebook、Instagram、WhatsAppを対象とした新しいサブスクリプションサービスを発表した。基本プランの「Plus」（各3.99〜2.99ドル）からAI機能を搭載した「Meta One Plus」（7.99〜49.99ドル）まで複数のティアで提供される。Say Hi機能を含むキャンペーン管理や高度なメッセージング機能のほか、AI連携でユーザー体験を強化する。","date":"2026年5月28日（木）","source":"https://www.itmedia.co.jp/news/articles/2605/28/news076.html","confidence":"高","snippet":"料金はInstagram PlusとFacebook Plusが各3.99ドル、WhatsApp Plusが2.99ドルで、AI機能搭載の「Meta One Plus」は7.99ドルから49.99ドルの範囲で設定されています。"},{"id":"2026-05-28-テクノロジー-002","category":"テクノロジー","title":"YouTubeがAI生成コンテンツに自動ラベル適用を開始 段階的に展開","summary":"YouTubeは、クリエイターがAI生成を報告したコンテンツに自動でラベルを表示する機能を2026年5月から段階的に展開すると発表した。YouTube自社のAIツール（Veo・Dream Screen）で作成したコンテンツや、C2PAメタデータで確認できるAI生成コンテンツにも自動ラベルが付与される。AI生成コンテンツの透明性向上と視聴者への正確な情報提供が目的。","date":"2026年5月28日（木）","source":"https://www.itmedia.co.jp/news/articles/2605/28/news074.html","confidence":"高","snippet":"クリエイターがコンテンツのいずれかにAI生成がされているとYouTubeに報告した場合、YouTube Studioのラベルステータスを変更できます。YouTubeが提供するVeoやDream Screenなどのツール使用、またはC2PAメタデータで確認できるAI生成コンテンツには自動ラベルが適用されます。"},{"id":"2026-05-28-テクノロジー-003","category":"テクノロジー","title":"Xiaomiが新スマートフォン「17T」シリーズを発表 日本でも予約受付開始","summary":"Xiaomiはウィーンで開催したグローバル発表会で新スマートフォン「Xiaomi 17T」シリーズを発表した。モバイルイメージング光学技術の大幅な進化を特徴とし、デザインとユーザー体験も刷新。日本市場でも5月28日から予約受付が開始された。","date":"2026年5月28日（木）","source":"","confidence":"中","snippet":""},{"id":"2026-05-28-国際-001","category":"国際","title":"米国・イラン合意案 「60日停戦後30日でホルムズ海峡開放」核協議も再開へ","summary":"中東外交筋によると、米国とイランの間で「60日間の停戦後、30日間かけてホルムズ海峡の機雷を除去して航行を再開する」合意案が浮上していることが明らかになった。2026年2月の米・イスラエルによるイラン攻撃以来続くホルムズ海峡の封鎖により世界のエネルギー輸送が深刻な打撃を受けており、合意成立への期待が高まっている。","date":"2026年5月28日（木）","source":"https://www.nikkei.com/article/DGXZQOGR25A970V20C26A5000000/","confidence":"中","snippet":"米国とイランの合意案は「60日停戦後30日でホルムズ海峡開放」という内容。Middle East diplomatic sources revealed these details on May 25, 2026, as the Strait of Hormuz remains effectively closed since the February military strikes."},{"id":"2026-02-15-pol-001","category":"政治","title":"高市早苗氏、第105代首相に選出—自民・維新連立の第2次高市内閣発足","summary":"第221回特別国会が2月18日に召集され、自民党の高市早苗総裁が第105代内閣総理大臣に指名された。2月8日の衆院選で自民党が316議席を獲得した後、日本維新の会と連立を組む形で第2次高市内閣が発足した。内閣の目玉は「責任ある積極財政」と食料品消費税ゼロの検討で、2月20日の施政方針演説に向けて準備が進められた。","date":"2026-02-18","source":"https://www.kantei.go.jp/jp/105/statement/2026/0218kaiken.html","confidence":"高","snippet":"第221回特別国会で自民党の高市早苗総裁が第105代内閣総理大臣に指名され、日本維新の会との連立による第2次高市内閣が発足した。"},{"id":"2026-02-15-pol-002","category":"政治","title":"高市首相が初の施政方針演説—食料品消費税「2年間ゼロ」検討加速・量子宇宙など17分野に投資","summary":"高市早苗首相は2月20日、就任後初の施政方針演説を行い「責任ある積極財政」を掲げた。食料品の消費税を2年間ゼロにすることの検討加速を表明するとともに、量子・宇宙・AI・創薬など17の戦略分野に官民投資を集中させる方針を示した。憲法改正についても「強い意欲」を示し、夏の参院選を視野に議論加速を呼び掛けた。","date":"2026-02-20","source":"https://www.kantei.go.jp/jp/105/statement/2026/0220shiseihoshin.html","confidence":"高","snippet":"現在軽減税率が適用されている飲食料品については、特例公債に頼ることなく、2年間に限り、消費税をゼロ税率とすることについて、スケジュールや財源の在り方など、その実現に向けた諸課題に関する検討を加速する。"},{"id":"2026-02-15-pol-003","category":"政治","title":"石川県知事選が告示—馳浩現職に新人2名が挑戦、能登復興・保守分裂が争点","summary":"石川県知事選挙が2月19日に告示され、3月8日の投開票に向けた戦いが始まった。自民・維新が推薦する現職の馳浩氏（64）に対し、国民民主党県連が支持する新人の山野之義氏（63）と日本共産党推薦の黒梅明氏（78）が挑む三つ巴の選挙となった。能登半島地震からの復興対応が最大の争点で、与党内保守分裂も注目を集めた。","date":"2026-02-19","source":"https://www.nikkei.com/article/DGXZQOCC188710Y5A211C2000000/","confidence":"高","snippet":"石川県知事選挙に現職の馳浩氏、新人の山野之義氏、黒梅明氏の3氏が立候補した。保守分裂となり、能登復興が争点に。"},{"id":"2026-02-15-eco-001","category":"経済","title":"日米対米投資の第1号案件が確定—トランプ大統領がSNSで発表、約5兆5000億円枠の第1弾","summary":"トランプ米大統領は2月17日、日米が合意した総額5500億ドル（約84兆円）の対米投資枠組みの第1号案件として、①オハイオ州のガス発電施設（333億ドル）、②テキサス州の石油輸出施設（21億ドル）、③ジョージア州の人工ダイヤモンド製造施設（6億ドル）の3事業をSNSで発表した。翌18日に日米両政府が正式確認し、日本の産業界が投資に参加する形で始動した。","date":"2026-02-18","source":"https://www.bloomberg.com/jp/news/articles/2026-02-17/TAMEF2KK3NYB00","confidence":"高","snippet":"日本の対米投資「1号案件」をトランプ氏がSNSで発表。「これらのプロジェクトは規模が極めて大きく、ある特別な言葉なしには実現できなかった。その言葉は関税だ」とコメント。"},{"id":"2026-02-15-soc-001","category":"社会","title":"大阪・道頓堀で17歳刺殺—21歳男を殺人容疑で緊急逮捕","summary":"2月14日深夜、大阪市中央区の道頓堀近くで17歳の少年3人が刺された。1人が死亡し2人が重傷を負った。大阪府警は15日、21歳の無職・岩崎龍我容疑者を殺人の疑いで緊急逮捕した。容疑者は「殺意はなかった。向かってきたので刺した」と供述。被害者の鎌田隆之亮さん（17歳）は胸などを複数回刺され外傷性ショックで死亡した。","date":"2026-02-15","source":"https://www.nikkei.com/article/DGXZQOUD143760U6A210C2000000/","confidence":"高","snippet":"大阪・道頓堀で17歳刺され死亡、2人けが。大阪府警は15日、21歳の岩崎龍我容疑者を殺人の疑いで緊急逮捕した。容疑者は「殺意なかった」と供述。"},{"id":"2026-02-15-soc-002","category":"社会","title":"「ルフィ」幹部・藤田聖也被告に無期懲役—狛江女性殺害など7件の広域強盗で東京地裁判決","summary":"フィリピンから遠隔指示した広域強盗グループの幹部・藤田聖也被告（41）に対し、東京地裁は2月16日、求刑通り無期懲役の判決を言い渡した。2022〜23年に東京都狛江市の90歳女性が死亡した事件を含む1都3県7件の強盗に関与した。裁判所は「遠隔操作による組織的広域連続強盗という新たな犯罪類型の先駆け」と述べた。","date":"2026-02-16","source":"https://www.jiji.com/jc/article?k=2026021600574&g=soc","confidence":"高","snippet":"「組織の利益のために必要不可欠な役割を果たした」として、東京地裁の戸苅左近裁判長が求刑通り無期懲役を言い渡した。"},{"id":"2026-02-15-soc-003","category":"社会","title":"最高裁大法廷が警備業法欠格条項を違憲判断—成年後見利用者の就業禁止は憲法違反","summary":"最高裁大法廷（裁判長・今崎幸彦長官）は2月18日、成年後見制度を利用する人の警備員就業を禁じた旧警備業法の欠格条項について、憲法22条（職業選択の自由）に違反すると初めて判断した。戦後14例目の違憲判決。障害・認知症などを抱える就業者の権利保護として画期的な意義を持つが、国の賠償責任は否定された。","date":"2026-02-18","source":"https://www.nikkei.com/article/DGXZQOUD1253Y0S6A210C2000000/","confidence":"高","snippet":"最高裁大法廷は、成年後見制度を利用する人の就業を制限した旧警備業法の欠格条項について、憲法22条（職業選択の自由）に反すると初めて判断。戦後14例目の違憲判決となった。"},{"id":"2026-02-15-soc-004","category":"社会","title":"iPS細胞由来の再生医療製品が世界初の承認了解—心不全・パーキンソン病の2製品","summary":"厚生労働省の薬事・食品衛生審議会専門部会は2月19日、iPS細胞を使った再生医療等製品として世界初となる2製品の条件・期限付き製造販売を了承した。クオリプスが開発した心不全向け心筋細胞シート「リハート」と、住友ファーマのパーキンソン病向けドパミン神経細胞製品「アムシェプリ」。山中伸弥教授が確立したiPS細胞技術の実用化に向けた大きな一歩となった。","date":"2026-02-19","source":"https://news.yahoo.co.jp/articles/0dfa3d9d88b6665aec7eaa81b9e8c323398b2714","confidence":"高","snippet":"高市首相「大変喜ばしく思う。日本のみならず世界で必要とされている患者の皆さまに早く届くことを願う」。iPS細胞として多能性幹細胞製品で世界初の承認了解となった。"},{"id":"2026-02-15-soc-005","category":"社会","title":"広陵高校野球部の暴力疑惑、第三者委員会が「事実を裏付ける証拠なく認定困難」と結論","summary":"広島県の広陵高校硬式野球部で元部員が監督らによる暴力・暴言被害をSNSに投稿した問題について、第三者委員会は2月16日、「事実を裏付ける証拠や証言が得られず、いずれも認めることは困難」との調査結果を発表した。88件に上る被害申告を事実認定できないとの結論に、SNS上では批判が相次いだ。","date":"2026-02-16","source":"","confidence":"中"},{"id":"2026-02-15-spo-001","category":"スポーツ","title":"三浦璃来・木原龍一組がフィギュアスケートペアで金メダル—SP5位から大逆転、日本ペア史上初","summary":"ミラノ・コルティナ冬季五輪フィギュアスケートペアで2月16日、日本代表の三浦璃来・木原龍一組（「りくりゅう」）がフリーで世界歴代最高得点158.13点をマークし、合計231.24点で金メダルを獲得した。ショートプログラムで首位から6.9点差の5位から劇的逆転。日本ペア史上初のオリンピック金メダルであり、フィギュアスケートペア種目での日本勢初の表彰台となった。","date":"2026-02-16","source":"https://www.olympics.com/ja/milano-cortina-2026/news/figure-skating-pear-free-skating-result","confidence":"高","snippet":"ショートプログラム5位から大逆転で金メダルを獲得。フリースケーティングで世界歴代最高得点158.13点をマークし、合計231.24点で1位となった。日本ペア史上初のオリンピック金メダル。"},{"id":"2026-02-15-spo-002","category":"スポーツ","title":"深田茉莉がスノーボード女子スロープスタイルで金メダル—19歳48日、冬季女子最年少の快挙","summary":"ミラノ・コルティナ冬季五輪スノーボード女子スロープスタイルで2月19日、深田茉莉（19）が金メダル、村瀬心椛（23）が銅メダルを獲得した。深田は19歳48日での金メダルで、日本の冬季五輪で女子最年少金メダリストとなった。日本勢がワン・ツーフィニッシュに近い形でメダルを独占し、この種目で日本の強さを示した。","date":"2026-02-19","source":"https://www.olympics.com/ja/milano-cortina-2026/news/team-japan-day-by-day-highlights","confidence":"高","snippet":"深田茉莉が金メダル、村瀬心椛が銅メダルを獲得した。深田は19歳48日での金メダル獲得となり、日本冬季五輪で女子最年少金メダリストとなった。"},{"id":"2026-02-15-spo-003","category":"スポーツ","title":"高木美帆がスピードスケート女子団体パシュートで銅—夏冬通算10個目、日本女子史上初の偉業","summary":"ミラノ・コルティナ冬季五輪スピードスケート女子団体パシュートの3位決定戦で、日本チームが2月18日に銅メダルを獲得した。高木美帆は夏季・冬季五輪を通じて日本女子史上初の通算10個目のメダルを達成した。複数種目・複数大会でメダルを積み重ねてきた高木の長年にわたる功績が改めて評価された。","date":"2026-02-18","source":"https://www.joc.or.jp/milano_cortina2026/","confidence":"高","snippet":"高木美帆が女子団体パシュート3位決定戦で銅メダルを獲得し、夏季冬季を含めて日本女子では史上初となる通算10個目のメダルを獲得した。"},{"id":"2026-02-15-tec-001","category":"テクノロジー","title":"NVIDIAが日本語特化小型LLM「Nemotron-Nano-9B-v2-Japanese」公開—10B未満モデルで国内評価1位","summary":"NVIDIAは2月17日、日本語に特化した小型言語モデル「NVIDIA-Nemotron-Nano-9B-v2-Japanese」をHugging Face上でオープン公開した。日本最大規模のLLM評価「Nejumi Leaderboard 4」で10B未満モデル1位を獲得。商用利用可能なNVIDIA Nemotronオープンライセンスで提供され、単一GPUで動作し128Kトークンを処理。推論速度はQwen3-8Bの最大6倍とされる。","date":"2026-02-17","source":"https://huggingface.co/blog/nvidia/nemotron-nano-9b-v2-japanese-ja","confidence":"高","snippet":"Nemotron-Nano-9B-v2-Japaneseは、日本で最も包括的なLLM評価プラットフォームである「Nejumi Leaderboard 4」において、10B未満のモデルカテゴリで1位を獲得しました。"},{"id":"2026-02-15-tec-002","category":"テクノロジー","title":"GoogleがAIモデル「Gemini 3.1 Pro」を発表—推論性能が前世代の2倍超、ARC-AGI-2で77.1%","summary":"Googleは2月19日（米国時間）にAI基盤モデル「Gemini 3.1 Pro」のプレビューを発表し、日本では翌2月20日に報道が広まった。Geminiシリーズ初の「.1」刻みアップデートで、推論ベンチマーク「ARC-AGI-2」のスコアが前世代（Gemini 3 Pro）の31.1%から77.1%へと2倍超に向上。価格据え置きのままでGeminiアプリとAPIで利用可能となった。","date":"2026-02-20","source":"https://k-tai.watch.impress.co.jp/docs/news/2087531.html","confidence":"高","snippet":"グーグル「Gemini 3.1 Pro」リリース。2026年2月20日に発表。ARC-AGI-2での成績が77.1%（Gemini 3 Pro: 31.1%）と前世代比で2倍以上のスコア向上を実現。推論性能が「3 Pro」の2倍以上。"},{"id":"2026-02-15-tec-003","category":"テクノロジー","title":"ByteDanceのAI動画「Seedance 2.0」がコナン・ウルトラマンを無断生成—業界団体が申し入れ、政府も対応","summary":"TikTok運営元のByteDanceが公開した動画生成AI「Seedance 2.0」で、コナン・ウルトラマンなど日本の人気アニメキャラクターが無断で動画生成される問題が相次いだ。日本の業界団体がByteDanceに問い合わせたところ「速やかに対応する」と回答。小野田紀美AI戦略担当相も実態把握に着手すると表明。米国ではディズニー・パラマウントなどが法的警告書を送付した。","date":"2026-02-16","source":"https://www.itmedia.co.jp/aiplus/articles/2602/16/news065.html","confidence":"高","snippet":"AI「Seedance 2.0」で日本のアニメ無断利用→業界団体がTikTokに問い合わせ→「速やかに対応」と回答。コナンやウルトラマンがAI動画に使われる問題が発覚し、政府も実態把握に着手した。"},{"id":"2026-02-15-ent-001","category":"芸能・エンタメ・ゴシップ","title":"浜辺美波・目黒蓮主演映画「ほどなく、お別れです」が2週連続興行1位—累計動員86万人超え","summary":"浜辺美波と目黒蓮がW主演する映画「ほどなく、お別れです」（三木孝浩監督）が、2月13〜15日の週末興行ランキングで2週連続1位を達成した。公開から7日間（2/6〜12）で動員86万人・興収11.76億円を突破し、公開24日間（3/1時点）では動員223万人・興収30億円超えの大ヒットとなった。葬儀社インターン生と凄腕プランナーの物語が幅広い世代に刺さった。","date":"2026-02-16","source":"https://www.oricon.co.jp/news/2439559/full/","confidence":"高","snippet":"目黒蓮の人気がヒットの後押しに。浜辺美波とのW主演作『ほどなく、お別れです』が動員45万人＆興収6.3億円超えの好スタートで初登場1位。その後2週連続首位をキープした。"},{"id":"2026-02-15-ent-002","category":"芸能・エンタメ・ゴシップ","title":"NHK大河ドラマ「豊臣兄弟！」が衆院選明けに再開—第6話の世帯視聴率11.8%","summary":"2月8日の衆院選開票特番のため1回休止していたNHK大河ドラマ「豊臣兄弟！」（仲野太賀主演）が2月15日に第6話で再開した。世帯視聴率は11.8%（個人6.9%）を記録し、初回13.5%から高い水準を維持。仲野太賀が演じる豊臣秀長と、秀吉（北村匠海）の関係を描く展開がSNSで話題を呼び、冬の大河として安定した人気を集めている。","date":"2026-02-15","source":"https://www.doramareview.jp/historical/2402.html","confidence":"高","snippet":"大河ドラマ「豊臣兄弟！」第6話は2026年2月15日放送。世帯視聴率11.8%、個人視聴率6.9%を記録した。衆院選休止明けでも高い数字を維持した。"},{"id":"2026-05-29-政治-001","category":"政治","title":"2025年国勢調査の速報値発表——日本の総人口1億2304万人、5年で309万人減","summary":"総務省は29日、2025年10月1日時点の国勢調査速報値を公表した。日本の総人口は1億2304万9524人で、前回2020年調査より309万6575人（2.5%）減少した。東京都と沖縄県を除く全都道府県で人口が減少し、北海道の減少幅が最大。世帯数は5712万4507世帯で過去最多となった一方、1世帯あたり人数は2.15人で1970年以降最少となった。国連推計で日本は人口規模の国際順位が11位から12位に後退した。","date":"2026年5月29日（金）","source":"https://www.nikkei.com/article/DGXZQOUA262CH0W6A520C2000000/","confidence":"高","snippet":"日本の総人口は1億2304万9524人で、2020年の前回調査から309万6575人減少（2.5%減）。東京都と沖縄県以外の全道府県で人口が減った。"},{"id":"2026-05-29-政治-002","category":"政治","title":"国家情報会議設置法が参院で可決・成立——内閣情報調査室を「国家情報局」に格上げ","summary":"参議院本会議は27日、国家情報会議設置法を可決・成立させた。高市首相が掲げるインテリジェンス改革の「第1弾」で、首相を議長とする国家情報会議と、内閣情報調査室を格上げした国家情報局が新設される。自民・公明の連立与党に加え、日本維新の会・国民民主党も賛成した。3月13日の閣議決定から約2か月半での立法化となった。","date":"2026年5月27日（水）","source":"https://rocket-boys.co.jp/security-measures-lab/japan-establishes-national-intelligence-agency/","confidence":"高","snippet":"国家情報会議設置法が2026年5月27日、参議院本会議で可決され、成立しました。高市首相が掲げるインテリジェンス改革の「第1弾」として位置づけられています。"},{"id":"2026-05-29-政治-003","category":"政治","title":"気象庁が防災気象情報を改定——5月29日から「危険警報」新設・警戒レベル明示の新運用開始","summary":"気象庁と国土交通省は29日、防災気象情報の体系を大幅に見直した新たな運用を開始した。大雨警報や土砂災害警戒情報などに「レベル3」「レベル4」などの警戒レベル数字を付けて発表する形式に統一。従来の警報と特別警報の間に「危険警報」が新設され、住民が取るべき避難行動を直感的に理解しやすくした。今後は自治体の避難情報発令基準とも連動する。","date":"2026年5月29日（金）","source":"https://www.jma.go.jp/jma/kishou/know/bosai/keiho-update2026/index.html","confidence":"高","snippet":"気象庁は2026年5月29日から、自治体が発令する警戒レベルと連動した新たな防災気象情報の運用を開始。警戒レベルの数字を情報名に付けて発表する形式に変更した。"},{"id":"2026-05-29-経済-002","category":"経済","title":"中部電力系EV充電会社ミライズエネチェンジが民事再生申請——EV普及遅れで負債47億円","summary":"中部電力ミライズとENECHANGEの合弁EV充電会社「ミライズエネチェンジ」は19日、東京地裁に民事再生法の適用を申請した。EV充電器「エネチェンジEVチャージ」を全国展開していたが、EV普及が想定を大幅に下回り充電器の稼働率が低水準にとどまったことが経営悪化の主因。2026年3月期の売上高は約9100万円にとどまる一方、当期純損失は約66億円。負債は4社合計で約89億円にのぼる。","date":"2026年5月19日（火）","source":"https://www.nikkei.com/article/DGXZQOFD196TG0Z10C26A5000000/","confidence":"高","snippet":"EV普及が当初見通しを下回り、充電器の稼働率が低水準にとどまったこと。充電器の設置台数が計画の7割に留まり、設置コストが膨らんだ。"},{"id":"2026-05-29-社会-001","category":"社会","title":"声優・熱海和輝容疑者を逮捕——15歳少女への性的暴行容疑、所属事務所は契約解除","summary":"警視庁は27日、声優として活動する熱海和輝容疑者（31）を不同意性交等の容疑で逮捕した。東京・豊島区池袋のホテルで知人の15歳少女に性的暴行を加えた疑い。熱海容疑者は児童保護施設の職員も務めており、施設で知り合った被害者に約30回の性的行為を行ったとされる。取り調べに「間違いない」と容疑を認めている。所属事務所マウスプロモーションは21日付で契約を解除していた。","date":"2026年5月27日（水）","source":"https://times.abema.tv/articles/-/10248610","confidence":"高","snippet":"東京・豊島区池袋のホテルで、15歳の少女に対する暴力行為の容疑で逮捕されました。容疑者は警視庁の調査に対して「間違いない」と容疑を認めています。"},{"id":"2026-05-29-スポーツ-001","category":"スポーツ","title":"プロ野球セ・パ交流戦が各地で開幕——5月29日は6試合が一斉に行われる","summary":"2026年度のプロ野球セ・パ交流戦（5月26日〜6月14日）が続行中で、29日（金）は6試合が全国各地で行われた。日本ハムvs巨人（エスコンF）、楽天vsヤクルト（楽天モバイル宮城）、西武vsDeNA（ベルーナドーム）、ロッテvs阪神（ZOZOマリン）、オリックスvs中日（京セラD大阪）、ソフトバンクvs広島（みずほPayPay）の6カードで熱戦が繰り広げられた。","date":"2026年5月29日（金）","source":"https://npb.jp/interleague/2026/schedule_detail.html","confidence":"中"},{"id":"2026-05-29-芸能-001","category":"芸能・エンタメ・ゴシップ","title":"「劇場版モノノ怪 第三章 蛇神」公開——人気アニメ劇場版3部作が完結","summary":"2006年放送のアニメ「モノノ怪」を原作とした劇場版3部作の完結編「劇場版モノノ怪 第三章 蛇神」が29日より全国公開された。大奥を舞台に薬売りと最恐モノノ怪・蛇神との闘いを描く全87分。総監督は中村健治、薬売り役の神谷浩史をはじめ種﨑敦美・入野自由・津田健次郎らが出演する。前章「火鼠」から約1年越しでシリーズが完結した。","date":"2026年5月29日（金）","source":"https://eiga.com/movie/103594/","confidence":"高","snippet":"大奥を根底から揺るがす最恐のモノノ怪・蛇神と主人公・薬売りの壮絶な闘いを描き出します。2026年5月29日公開、上映時間87分。"},{"id":"2026-05-29-芸能-002","category":"芸能・エンタメ・ゴシップ","title":"「スター・ウォーズ/マンダロリアン・アンド・グローグー」日本での興収10億円突破——公開6日で","summary":"5月22日公開の映画「スター・ウォーズ/マンダロリアン・アンド・グローグー」が28日時点で日本での興行収入10億1554万円、観客動員60万4800人を突破した。公開3日間で動員・興収ともに国内1位を記録し、スター・ウォーズシリーズ約7年ぶりの劇場最新作としてグローグーのキャラクター人気が爆発。世界興行収入も260億円を超える大ヒットスタートを切っている。","date":"2026年5月28日（木）","source":"https://starwars.disney.co.jp/movie/mandalorian-grogu/news/20260528_01","confidence":"高","snippet":"公開からわずか6日間で興行収入が10億1,554万4,400円、観客動員数は60万4,800人を記録。スター・ウォーズシリーズ約7年ぶりの劇場最新作として国内初登場首位を獲得した。"},{"id":"2026-05-29-テクノロジー-001","category":"テクノロジー","title":"国内最大の無線通信展「ワイヤレスジャパン2026」が東京で閉幕——6G・ローカル5G・Wi-Fi 7の最新動向集結","summary":"5月27〜29日、東京ビッグサイトで国内最大級の無線通信専門展「ワイヤレスジャパン×ワイヤレス・テクノロジー・パーク2026」が開催された。6G・NTN（非地上系ネットワーク）・ローカル5G・Wi-Fi 7など最新ワイヤレス技術のデモや展示が一堂に集結。総務省電波部長による最新の電波政策解説や国内通信キャリア4社のネットワーク戦略に関する基調講演も行われた。","date":"2026年5月29日（金）","source":"https://wjwtp.jp/2026/","confidence":"中"},{"id":"2026-05-29-テクノロジー-002","category":"テクノロジー","title":"Google CloudがAIエージェント実行基盤「Agent Executor」をオープンソースで公開","summary":"Googleは21日、AIエージェントの実行・再開・分散デプロイを可能にするオープンソースランタイム「Agent Executor」をGitHubで公開した。長時間実行後の自動再開、セキュアサンドボックスによる隔離、分散環境でのセッション一貫性保持などが主な特徴。AIエージェントを本番環境で安定的に運用するための標準基盤として、企業向けエージェントプラットフォームでの活用を想定している。","date":"2026年5月21日（木）","source":"https://cloud.google.com/blog/products/ai-machine-learning/agent-executor-googles-distributed-agent-runtime","confidence":"高","snippet":"Agent Executorは開発者の実際のフィードバックを基に改善するため、オープンソースで公開されています。エージェントの実行、再開、分散デプロイのためのオープンソースのランタイム標準です。"},{"id":"2026-05-30-政治-001","category":"政治","title":"参院選挙区「一票の格差」最大3.2倍 国勢調査速報値で判明、合区解消改憲論が加速か","summary":"2025年国勢調査の速報値が5月29日に公表され、参院選挙区の「一票の格差」が最大3.189倍に達することが判明した。現行の合区制度では格差是正に限界があるとして、与党を中心に憲法改正による合区解消を求める声が加速している。一方、遠隔地同士の「飛び地選挙区」となる懸念も浮上し、2026年秋の参院選に向けた制度改革論議が本格化する見通し。","date":"2026年5月30日（土）","source":"https://www.jiji.com/jc/article?k=2026052901065&g=pol","confidence":"高","snippet":"2025年国勢調査の速報値が29日に公表され、参院選挙区の「1票の格差」は最大で3.189倍となった。自民など与党は「地域のつながりを考慮しない合区という手法は限界だ」と述べ、憲法改正による合区解消を求める声が相次いだ。","notes":""},{"id":"2026-05-30-社会-001","category":"社会","title":"千葉県北東部でM3.9の地震 最大震度3 津波の心配なし","summary":"2026年5月30日午前6時38分ごろ、千葉県北東部を震源とするマグニチュード3.9の地震が発生し、千葉県長南町で最大震度3を観測した。茂原市・東金市・大網白里市など複数の市町村でも震度2〜1を観測したが、気象庁は「この地震による津波の心配はない」と発表した。","date":"2026年5月30日（土）","source":"https://news.web.nhk/newsweb/na/na-k10015135761000","confidence":"高","snippet":"30日午前6時38分ごろ千葉県で震度3の揺れを観測する地震がありました。この地震による津波の心配はありません。","notes":""},{"id":"2026-05-30-社会-002","category":"社会","title":"台風6号「チャンミー」6月1〜2日に沖縄直撃の恐れ 「強い」勢力で接近、暴風・警報級大雨に警戒","summary":"台風6号「チャンミー」は5月30日午前6時時点でフィリピンの東を時速15キロで北西に進んでいる。発達しながら北上を続け、6月1〜2日ごろにかけて暴風域を伴う「強い」勢力（中心気圧965hPa・最大風速35m/s予想）で沖縄地方を直撃する恐れがある。沖縄では暴風・大しけ・警報級の大雨が見込まれ、進路によっては警報級の高潮も懸念される。","date":"2026年5月30日（土）","source":"https://www.okinawatimes.co.jp/articles/-/1848185","confidence":"高","snippet":"台風6号は30日午前6時、フィリピンの東にあって、時速15キロで北西へ進んでいる。今後、発達しながら北上を続け、6月1日から2日ごろにかけて暴風域を伴う「強い」勢力で沖縄地方を直撃する恐れがある。","notes":""},{"id":"2026-05-30-社会-003","category":"社会","title":"秋田県に「気象防災速報（竜巻注意）」 新情報の運用開始以降、全国初の発令","summary":"秋田地方気象台は5月30日午前6時42分、秋田県沿岸・内陸に対して竜巻などの激しい突風が発生しやすい状況として「気象防災速報（竜巻注意）」を発表した。気象庁が新しい防災気象情報の運用を開始して以降、全国で初めての発令となった。同日午前7時36分にも第2号が発表され、住民に対し頑丈な建物への避難などを呼びかけた。","date":"2026年5月30日（土）","source":"https://tenki.jp/forecaster/deskpart/2026/05/30/39110.html","confidence":"高","snippet":"秋田県沿岸、内陸では、竜巻などの激しい突風が発生しやすい気象状況になっています。","notes":""},{"id":"2026-05-30-スポーツ-001","category":"スポーツ","title":"UCLチャンピオンズリーグ決勝 PSG対アーセナルが今夜ブダペストで開催 PSGが連覇か、アーセナル20年ぶりの戴冠か","summary":"2025-26シーズンのUEFAチャンピオンズリーグ決勝が5月30日（現地時間午後6時）、ハンガリー・ブダペストのプシュカーシュ・アレーナで開催される。対戦カードはパリ・サンジェルマン（PSG）対アーセナルで、PSGは昨季王者として連覇を狙い、アーセナルは2006年以来20年ぶりのCL決勝進出で悲願の初戴冠を目指す。日本時間は5月31日午前1時キックオフ。","date":"2026年5月30日（土）","source":"https://www.soccer-king.jp/news/world/cl/20260507/2156666.html","confidence":"高","snippet":"2025-26シーズンのUEFAチャンピオンズリーグ決勝の対戦カードが決定し、パリ・サンジェルマンとアーセナルが対戦する。PSGは前シーズンの優勝クラブで連覇を狙い、アーセナルは2006年以来となる20年ぶりのCL決勝進出を果たした。","notes":""},{"id":"2026-05-30-芸能-001","category":"芸能・エンタメ・ゴシップ","title":"劇場版総集編「呪術廻戦 懐玉・玉折」本日より見放題配信開始 観客動員56.5万人の大ヒット作","summary":"劇場版総集編「呪術廻戦 懐玉・玉折」が5月30日よりPrime Video・Netflix・ABEMA・Hulu・U-NEXTなど16のサービスで見放題配信を開始した。五条悟と夏油傑の決別を描いた本作は劇場公開で観客動員56.5万人・興行収入8.5億円を突破するアニメ総集編として異例の大ヒットを記録。ABEMAでは同日午前0時より配信が始まり、5月20日からはTVアニメ全59話の無料放送も行われている。","date":"2026年5月30日（土）","source":"https://www.famitsu.com/article/202605/75160","confidence":"高","snippet":"5月30日よりPrime VideoやNetflixなど、動画配信サービスにて見放題配信を開始する。観客動員数は56.5万人、興行収入は8.5億円を突破するなど、アニメの総集編としては異例の大ヒットを記録。","notes":""},{"id":"政治-1780568282233-8v96z","category":"政治","title":"高市首相がトランプ大統領と電話会談、台湾有事発言の抑制を求められたと米紙が報道","summary":"高市早苗首相は11月25日、トランプ米大統領と電話会談し、中国との関係などについて協議した。その後、米ウォール・ストリート・ジャーナルは「トランプ大統領は台湾有事を巡る発言に関して抑制するよう求めた」と報じた。","date":"2025年11月25日（火）","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"高市早苗首相がトランプ米大統領と電話会談。中国との関係について協議。米WSJは「トランプ大統領は台湾有事を巡る発言に関して抑制するよう求めた」と報道。","notes":""},{"id":"政治-1780568282238-ojdtn","category":"政治","title":"2025年度補正予算案を閣議決定、一般会計18.3兆円の大型規模","summary":"政府は11月28日、一般会計総額18兆3034億円に上る2025年度補正予算案を閣議決定した。物価高対策や子育て世帯への給付金、AI・半導体などの成長分野への投資、防衛力強化などが盛り込まれた。24年度補正予算の13.9兆円を上回る大型予算となる。","date":"2025年11月28日（金）","source":"https://www.nikkei.com/article/DGXZQOUA251OR0V21C25A1000000/","confidence":"高","snippet":"政府は一般会計の総額が18兆3034億円に上る2025年度補正予算案を閣議決定した。","no
