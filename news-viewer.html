iz","category":"芸能・エンタメ・ゴシップ","title":"斉藤由貴の「7年W不倫」報道 — 妻子ある医師との関係を週刊文春がスクープ","summary":"女優・斉藤由貴と妻子ある50代医師との7年にわたる不倫関係を週刊文春が2017年8月3日号で報道。直後にフラッシュが不適切な写真を掲載し、斉藤は9月に「でも、もう、終わりにしました」という謝罪コメントを発表した。","date":"2017年8月","source":"https://www.cinematoday.jp/news/N0094357","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1781175815692-aoh32","category":"テクノロジー","title":"WannaCryランサムウェアが世界150か国で同時感染","summary":"2017年5月12日、Windowsの脆弱性を悪用したランサムウェア「WannaCry」が世界150か国以上で同時多発的に感染拡大。病院・企業・政府機関のシステムが暗号化され身代金を要求された。英国NHSでは手術が中止されるなど医療機関への影響が深刻で、北朝鮮の関与が疑われた。","date":"2017年5月","source":"https://nostaly.net/15278.html","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1781175815693-zxbnf","category":"テクノロジー","title":"iPhone X発売 — 全面有機ELディスプレイ・Face ID搭載、スマホの転換点に","summary":"アップルがiPhone誕生10周年モデルとして2017年11月3日（日本）に「iPhone X」を発売。ホームボタンを廃して全面有機ELディスプレイを採用し顔認証「Face ID」を初搭載。価格は初めて10万円を超え、スマートフォンの高級化・デザイン転換点となった。","date":"2017年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1781175815694-vor3c","category":"テクノロジー","title":"ビットコインが年末に200万円超に急騰 — 仮想通貨バブルが社会現象に","summary":"2017年初に10万円程度だったビットコインの価格が年末に230万円超に急騰し、仮想通貨ブームが社会現象化。個人投資家が続々参入し「億り人」という言葉が生まれた。翌2018年1月にはコインチェックの仮想通貨大量流出事件（約580億円）が起き、ブームに急ブレーキがかかった。","date":"2017年12月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1781175815695-e7ng6","category":"国際","title":"トランプ大統領就任 — 「アメリカ・ファースト」就任演説が世界に衝撃","summary":"2017年1月20日、ドナルド・トランプが第45代アメリカ大統領に就任。就任演説で「アメリカ・ファースト」を宣言し、移民規制・TPP離脱・パリ協定離脱などを相次いで表明。ワシントンでは大規模な抗議デモが発生し、世界中から驚きと懸念の声が上がった。","date":"2017年1月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1781175815696-ss5ug","category":"国際","title":"北朝鮮・金正男がマレーシア空港で化学兵器VXにより暗殺","summary":"金正恩の異母兄・金正男が2017年2月13日、マレーシア・クアラルンプール国際空港で女性2人に化学兵器「VX神経剤」を顔に塗られ殺害された。北朝鮮政府の指示による暗殺とみられ、国際社会が強く非難した。","date":"2017年2月","source":"https://nostaly.net/15278.html","confidence":"高","snippet":"","notes":""},{"id":"国際-1781175815697-8vann","category":"国際","title":"韓国・朴槿恵大統領が弾劾裁判で罷免 — 崔順実ゲート事件","summary":"親友・崔順実による国政介入・汚職疑惑（崔順実ゲート事件）で2016年12月に国会が弾劾訴追した朴槿恵大統領に対し、2017年3月10日に韓国憲法裁判所が弾劾を全員一致で認容し罷免が決定。韓国憲政史上初の大統領罷免となり、4月に逮捕・起訴された。","date":"2017年3月","source":"https://www.nikkei.com/topics/22A40688","confidence":"高","snippet":"","notes":""},{"id":"国際-1781175815698-zclal","category":"国際","title":"フランス大統領選でマクロンが当選 — 39歳の新党リーダーが極右を破る","summary":"2017年5月7日のフランス大統領選決選投票で、新興政治運動「アン・マルシュ！」を率いる39歳のエマニュエル・マクロンが極右政党・国民戦線のマリーヌ・ルペンを大差で破り当選。既成政党を退けた新星の勝利は世界的に注目された。","date":"2017年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1781175815699-bkjyt","category":"国際","title":"ラスベガス銃乱射事件 — 野外コンサート会場に発砲、58人死亡・米史上最悪","summary":"2017年10月1日夜、ラスベガスの野外コンサート会場付近のホテル32階から男が自動小銃で観客に向けて発砲。死者58人・負傷者800人超と当時の米国史上最多の銃乱射事件となった。犯人は64歳の白人男性で動機は不明のまま自殺した。","date":"2017年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1781175815700-d8vrg","category":"国際","title":"#MeToo運動 — ワインスタイン問題から世界規模の性暴力告発へ","summary":"2017年10月、ハリウッドの大物プロデューサー、ハーヴェイ・ワインスタインによる多数の女優へのセクハラ・性的暴行をニューヨーク・タイムズ等が報道。これを機に「#MeToo」のハッシュタグで性被害体験を告白するSNS運動が世界規模に拡大し、映画・政界・スポーツ界など各分野で告発が相次いだ。","date":"2017年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"politics-1781225943738-txb10","category":"政治","title":"オバマ米大統領が現職として初めて被爆地・広島を訪問し慰霊","summary":"2016年5月27日、バラク・オバマ大統領がG7伊勢志摩サミット後に広島・平和記念公園を訪問。現職米大統領として史上初。安倍首相と並んで被爆者と言葉を交わし、核なき世界への誓いを演説した。","date":"2016年5月","source":"https://www.nippon.com/ja/behind/l00180/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781225943739-ozv7d","category":"政治","title":"参院選で与党が圧勝、改憲勢力が3分の2を超える","summary":"2016年7月10日投開票の参院選で自民・公明の連立与党が合計70議席を獲得。改憲に前向きな「改憲勢力」が非改選を含め参院の3分の2を超え、憲法改正の発議要件を初めて満たした。","date":"2016年7月","source":"https://www.nippon.com/ja/behind/l00180/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781225943739-xjccp","category":"政治","title":"小池百合子が東京都知事選で圧勝、日本初の女性都知事に就任","summary":"2016年7月31日投開票の東京都知事選で自民党の推薦を受けずに出馬した小池百合子氏が増田寛也氏らを大差で破り初当選。東京都初、日本でも歴代最多の支持を集めた女性首長となり「都民ファースト」を掲げた。","date":"2016年7月","source":"https://www.nippon.com/ja/behind/l00180/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781225943739-4ajyy","category":"政治","title":"天皇陛下が「生前退位」の意向を示すお気持ちを初めて表明","summary":"2016年8月8日、天皇陛下がビデオメッセージで「象徴としての務めを果たすことが困難になることを前もって憂慮している」と述べ、生前退位の強い意向を示した。現憲法下で前例のない退位に向け特措法議論が始まった。","date":"2016年8月","source":"https://www.nippon.com/ja/behind/l00180/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781225943739-e38y6","category":"政治","title":"安倍首相が現職首相として初めてハワイ・真珠湾を訪問","summary":"2016年12月26・27日、安倍晋三首相がオバマ大統領とともにハワイ・真珠湾の戦没者慰霊碑「アリゾナ記念館」を訪問。現職の日本首相として初の公式訪問で、「未来志向の和解」を世界に発信した。","date":"2016年12月","source":"https://www.nippon.com/ja/behind/l00180/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781225943739-n06f5","category":"経済","title":"経営再建中のシャープが台湾・鴻海精密工業に買収されることが決定","summary":"2016年3月31日、鴻海（ホンハイ）精密工業がシャープへの3888億円の出資（議決権66%取得）を決定。経営危機に陥っていたシャープが台湾企業の傘下に入ることとなり、日本の大手電機メーカーへの外資買収として話題になった。","date":"2016年3月","source":"https://www.nikkei.com/article/DGXKASDZ30HML_Q6A330C1MM8000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781225943739-c6r69","category":"経済","title":"三菱自動車が燃費データ不正を認める→日産が資本業務提携し傘下に","summary":"2016年4月20日、三菱自動車が軽自動車4車種（計62万5000台）の燃費試験データを不正操作し、実際より良く見せていたと発表。株価が暴落し経営危機に。5月12日に日産自動車が2373億円を出資し経営権を握り事実上の傘下入りとなった。","date":"2016年4月","source":"https://www.mitsubishi-motors.co.jp/info/20160420/index.html","confidence":"高","snippet":"","notes":""},{"id":"economy-1781225943739-icw65","category":"経済","title":"「パナマ文書」が流出、世界各国の首脳や富裕層のタックスヘイブン利用が露呈","summary":"2016年4月3日、パナマの法律事務所「モサック・フォンセカ」から1150万件の機密文書が流出。世界100以上のメディアが共同調査し、各国の首脳・富裕層・企業がタックスヘイブンを利用した租税回避をしていた実態が明るみに出た。","date":"2016年4月","source":"https://www.newsweekjapan.jp/stories/world/2016/05/post-5061.php","confidence":"高","snippet":"","notes":""},{"id":"economy-1781225943739-of2yv","category":"経済","title":"LINEが東証・NYSE（ニューヨーク証券取引所）に同時上場","summary":"2016年7月14日（NYSE）・15日（東証）にLINE株式会社が日米同時上場。東証初値は4900円で時価総額1兆円超、日本最大のIPOとなった。国内最大のSNSの上場として注目を集めた。","date":"2016年7月","source":"https://www.nikkei.com/article/DGXLASFL14HPC_U6A710C1000000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781225943739-uf2eh","category":"社会","title":"相模原の障害者施設「津久井やまゆり園」で元職員が入所者19人を刺殺・戦後最悪の大量殺傷事件","summary":"2016年7月26日未明、神奈川県相模原市の知的障害者施設「津久井やまゆり園」に元職員の植松聖（当時26歳）が侵入し、入所者19人を刃物で刺殺、26人に重軽傷を負わせた。戦後最悪の大量殺傷事件として社会に深刻な衝撃を与えた。","date":"2016年7月","source":"https://www.jiji.com/jc/v7?id=sagamihara2016","confidence":"高","snippet":"","notes":""},{"id":"society-1781225943739-h8esv","category":"社会","title":"大隅良典がオートファジーの仕組みの解明でノーベル医学生理学賞を受賞","summary":"2016年10月3日、東京工業大学の大隅良典栄誉教授（71歳）が細胞内の不要なタンパク質などを分解・再利用する「オートファジー（自食作用）」のメカニズム解明によりノーベル医学生理学賞を受賞。前年の大村智氏に続く日本人の連続受賞となった。","date":"2016年10月","source":"https://scienceportal.jst.go.jp/newsflash/20161003_04/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781225943739-k2cs4","category":"スポーツ","title":"リオ五輪で日本が金12・銀8・銅21の合計41個と過去最多メダルラッシュ","summary":"2016年8月のブラジル・リオデジャネイロ五輪で日本は金12・銀8・銅21の計41個のメダルを獲得し、海外開催の大会として過去最多を更新。多競技にわたる活躍が「メダルラッシュ」と呼ばれた。","date":"2016年8月","source":"https://www.joc.or.jp/games/olympic/riodejaneiro/japan/winnerslist/index.html","confidence":"高","snippet":"","notes":""},{"id":"sports-1781225943739-drhr6","category":"スポーツ","title":"内村航平率いる体操男子が3大会ぶり団体総合金メダルを獲得","summary":"リオ五輪体操男子団体総合決勝で日本が274.094点で優勝し、2004年アテネ大会以来3大会ぶりの金メダル。唯一全6種目に出場した内村航平を軸に、加藤凌平・田中佑典らが安定した演技で競り勝った。","date":"2016年8月","source":"https://www.nikkei.com/article/DGXLSSXK20205_Z00C16A8000000/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781225943739-0gv7n","category":"スポーツ","title":"伊調馨が女子レスリングで女子個人4連覇の快挙","summary":"リオ五輪女子レスリング58kg級で伊調馨が残り5秒で逆転優勝し、オリンピック女子個人競技で史上初の4連覇を達成。日本でも大きな話題となり、後に指導者によるパワハラ問題で騒動になった。","date":"2016年8月","source":"https://www.ssf.or.jp/knowledge/history/olympic/11.html","confidence":"高","snippet":"","notes":""},{"id":"sports-1781225943739-fp43u","category":"スポーツ","title":"吉田沙保里が決勝でまさかの敗戦→銀メダルで号泣が日本中の話題に","summary":"リオ五輪女子レスリング53kg級で3大会連続金を狙った吉田沙保里が、米国のヘレン・マルーリスに敗れ銀メダル。号泣する姿が「4連覇を逃した」と日本中の同情を集め、翌日の朝刊各紙のトップを飾った。","date":"2016年8月","source":"https://www.info.city.tsu.mie.jp/www/contents/1471497356632/index.html","confidence":"高","snippet":"","notes":""},{"id":"sports-1781225943739-plq7o","category":"スポーツ","title":"高橋礼華・松友美佐紀がバドミントン女子ダブルスで日本勢初の金メダル","summary":"リオ五輪バドミントン女子ダブルス決勝で「タカマツペア」こと高橋礼華・松友美佐紀がデンマーク組に逆転勝利し、バドミントン全種目を通じた日本勢初の金メダルを獲得。2016年8月18日。","date":"2016年8月","source":"https://www.jiji.com/jc/v4?id=16riotakamatsu0001","confidence":"高","snippet":"","notes":""},{"id":"sports-1781225943739-93agx","category":"スポーツ","title":"広島カープが25年ぶりのセ・リーグ優勝、鈴木誠也の「神ってる」が流行語大賞に","summary":"2016年9月10日、広島東洋カープが1991年以来25年ぶりのセ・リーグ優勝を達成。緒方孝市監督が鈴木誠也の連続サヨナラ本塁打を表現した「神ってる」が2016年流行語大賞の年間大賞に選ばれた。","date":"2016年9月","source":"https://npb.jp/news/detail/20160910_01.html","confidence":"高","snippet":"","notes":""},{"id":"tech-1781225943739-85h3j","category":"テクノロジー","title":"GoogleのAI「AlphaGo」が囲碁世界王者イ・セドル9段に4勝1敗で圧勝","summary":"2016年3月9〜15日、Google DeepMindが開発したAI「AlphaGo」が韓国の囲碁世界王者イ・セドル9段と5番勝負を行い4勝1敗で圧勝。「囲碁でAIが人間に勝つには10年以上かかる」という常識を覆し、AI研究の転換点となった。","date":"2016年3月","source":"https://japan.googleblog.com/2016/03/google-deepmind.html","confidence":"高","snippet":"","notes":""},{"id":"tech-1781225943739-96oee","category":"テクノロジー","title":"スマホゲーム「ポケモンGO」日本配信開始→公園・神社が人だかりで社会現象化","summary":"2016年7月22日、Niantic・ポケモンの位置情報スマホゲーム「Pokémon GO」が日本で配信開始。公園・神社・観光地に老若男女が殺到し社会現象に。配信初日サーバーダウン、「ながらスマホ」による事故も続出した。","date":"2016年7月","source":"https://www.nikkei.com/article/DGXLASFL14H8K_S6A720C1000000/","confidence":"高","snippet":"","notes":""},{"id":"tech-1781225943739-3eo2d","category":"テクノロジー","title":"DeNA「WELQ」が医療ガセ情報を大量掲載し炎上→全10サイト閉鎖","summary":"2016年11月、DeNAが運営する医療情報キュレーションサイト「WELQ」が根拠不明の医療情報を大量生産しSEOを操作していると炎上。著作権侵害も多数指摘され12月に全10サイトを閉鎖。キュレーションメディアの信頼性問題を社会に問い直した。","date":"2016年11月","source":"https://k-tai.watch.impress.co.jp/docs/news/1033876.html","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781225943739-xvgqn","category":"芸能・エンタメ・ゴシップ","title":"ガリガリ君が約25年ぶりに10円値上げ→赤城乳業が謝罪CMを制作し話題に","summary":"2016年4月から「ガリガリ君」が60円→70円に値上げ（1991年以来25年ぶり）。赤城乳業が社員総出で頭を下げる「お詫びCM」を制作・放映し、値上げにもかかわらず好感度が上昇。「謝罪しながら値上げ」の手法が話題となった。","date":"2016年4月","source":"https://www.j-cast.com/2016/04/02263113.html?p=all","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781225943739-wzyi9","category":"芸能・エンタメ・ゴシップ","title":"映画「シン・ゴジラ」公開・批評家絶賛で最終興収82.5億円のヒット","summary":"2016年7月29日公開。庵野秀明が総監督・脚本を担当し、東日本大震災や原発事故の記憶を重ねた社会派怪獣映画として批評家から絶賛。最終興収82.5億円を記録し邦画実写では10年代最大のヒット作の一つとなった。","date":"2016年7月","source":"https://www.cinematoday.jp/news/N0087623","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781225943739-f6euz","category":"芸能・エンタメ・ゴシップ","title":"映画「君の名は。」公開・興収250億超の社会現象に","summary":"2016年8月26日公開。新海誠監督のアニメーション映画が口コミで爆発的に広まり最終興収250.3億円と歴代邦画4位の記録。社会人・中高年層まで幅広い層が劇場に押し寄せ、主題歌RADWIMPSも大ヒットした。","date":"2016年8月","source":"https://www.cinematoday.jp/news/N0088660","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781225943739-ztrjd","category":"芸能・エンタメ・ゴシップ","title":"TBS「逃げるは恥だが役に立つ」最終回・「恋ダンス」が社会現象に","summary":"2016年10月期TBSドラマ「逃げるは恥だが役に立つ」（主演：新垣結衣・星野源）がヒット。エンディングの「恋ダンス」が公式YouTube6百万回超を記録し、各局アナウンサーやタレントが続々と踊る社会現象を巻き起こした。最終回は視聴率20%超。","date":"2016年12月","source":"https://natalie.mu/music/news/206227","confidence":"高","snippet":"","notes":""},{"id":"international-1781225943739-cxn3s","category":"国際","title":"英国でEU離脱（ブレグジット）の国民投票実施→離脱派が僅差で勝利し世界に衝撃","summary":"2016年6月23日、英国でEU残留・離脱を問う国民投票が実施され、離脱51.9%・残留48.1%で離脱派が勝利。キャメロン首相が翌日辞任を表明。世界の株式市場が急落し、グローバル化への反動として歴史的事件となった。","date":"2016年6月","source":"https://www.nikkei.com/article/DGXLASGM24H55_U6A620C1000000/","confidence":"高","snippet":"","notes":""},{"id":"international-1781225943739-i5e8b","category":"国際","title":"トランプが米大統領選でヒラリーを破り当選、世界中が驚く番狂わせ","summary":"2016年11月8日の米大統領選でドナルド・トランプ共和党候補が民主党のヒラリー・クリントン前国務長官を破り当選。事前の世論調査でヒラリー優勢が伝えられていた中での「世紀の番狂わせ」で、世界中に衝撃が走った。","date":"2016年11月","source":"https://www.nikkei.com/article/DGXLASGM09H4P_Z01C16A1GX1000/","confidence":"高","snippet":"","notes":""},{"id":"international-1781225943739-k3hd0","category":"国際","title":"韓国・崔順実ゲート発覚→朴槿恵大統領の弾劾訴追案が国会で可決","summary":"2016年10月、朴槿恵大統領の親友・崔順実が国政に不当介入していた「崔順実ゲート」が発覚。大規模なろうそくデモが続く中、12月9日に国会で弾劾訴追案が賛成234・反対56で可決。大統領は職務停止となった（2017年3月に罷免確定）。","date":"2016年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781227981449-4bxcw","category":"政治","title":"渋谷区が日本初の同性パートナーシップ条例を可決→証明書発行開始","summary":"2015年3月31日、渋谷区議会が同性カップルを「結婚に相当する関係」と認めるパートナーシップ条例を可決。自治体による同性カップルの公的認証は全国初。同年11月5日より証明書の発行が始まり、LGBTの権利向上のシンボル的出来事となった。","date":"2015年3月","source":"https://www.nikkei.com/article/DGXLASDG31H7P_R30C15A3CZ8000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781227981457-w9fl6","category":"政治","title":"大阪都構想が住民投票で0.8ポイント差の僅差で否決→橋下徹氏が政界引退表明","summary":"2015年5月17日、大阪市を廃止して5つの特別区を設置する「大阪都構想」の賛否を問う住民投票が実施され、反対70.6万票・賛成69.5万票の0.8ポイント差で否決。橋下徹大阪市長はその夜に政界引退を表明した。","date":"2015年5月","source":"https://www.nikkei.com/article/DGXLASDG17H4S_X10C15A5MM8000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781227981464-0a0wg","category":"政治","title":"安倍首相が「戦後70年談話」を閣議決定・発表","summary":"2015年8月14日、安倍晋三首相が戦後70年の節目に「安倍談話」を閣議決定。「侵略」「植民地支配」「反省」「おわび」の4つのキーワードを盛り込んだが、「お詫びの気持ち」の表現をめぐり国内外で論議を呼んだ。","date":"2015年8月","source":"https://www.nippon.com/ja/behind/l00142/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781227981471-oycym","category":"政治","title":"安保関連法（集団的自衛権行使容認）が参院で強行採決・成立","summary":"2015年9月19日、集団的自衛権の限定的行使を可能にする安全保障関連法が参院本会議で与党などの賛成多数で可決・成立。SEALDsを中心とした反対デモが国会前を包囲し、戦後最大規模の安保論争となった。","date":"2015年9月","source":"https://www.nippon.com/ja/behind/l00142/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781227981478-5f5x7","category":"政治","title":"マイナンバー制度が施行、全国民への通知カード郵送が開始","summary":"2015年10月5日にマイナンバー法が施行され、国民一人ひとりに12桁の番号を割り振るマイナンバー制度がスタート。同年11月から全国の世帯に通知カードの郵送が始まったが、未着・誤配が続出し混乱も起きた。","date":"2015年10月","source":"https://www.nippon.com/ja/behind/l00142/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781227981485-x8jmp","category":"政治","title":"TPP（環太平洋パートナーシップ協定）が日米など12ヵ国で大筋合意","summary":"2015年10月5日、日本・米国・オーストラリアなど太平洋を囲む12ヵ国がTPPの大筋合意に達した。農産物の関税撤廃・削減が焦点となり、国内農業界を中心に賛否両論が渦巻いた（その後米国離脱で発効せず）。","date":"2015年10月","source":"https://www.nippon.com/ja/behind/l00142/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781227981492-8s2hl","category":"経済","title":"格安航空スカイマークが民事再生法を申請し経営破綻","summary":"2015年1月28日、国内3位の格安航空会社スカイマークが東京地裁に民事再生手続きの開始を申し立て。負債は710億円。A380型機の購入キャンセルによる解約違約金問題が経営悪化の引き金となったが運航は継続された。","date":"2015年1月","source":"https://www.nikkei.com/article/DGXKASDZ14HZV_Y5A120C1MM8000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781227981499-exvir","category":"経済","title":"東芝が7年間・1562億円の不正会計を認め、歴代3社長が相次ぎ辞任","summary":"2015年7月21日、東芝が2008〜2014年度の累計で1562億円に上る利益のかさ上げ（不適切会計）を行っていたと第三者委員会が認定。田中久雄・西田厚聰・佐々木則夫の歴代3社長が責任を取り辞任した。","date":"2015年7月","source":"https://www.nikkei.com/article/DGXZZO89536830R20C15A7000000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781227981506-q2786","category":"経済","title":"日本郵政・ゆうちょ銀行・かんぽ生命の郵政3社が東証に同時上場","summary":"2015年11月4日、日本郵政・ゆうちょ銀行・かんぽ生命保険の3社が東京証券取引所に同時上場。売り出し総額は1.4兆円超で日本最大級のIPO。上場初日は3社ともに公開価格を上回る初値をつけた。","date":"2015年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781227981513-dujqh","category":"社会","title":"北陸新幹線（東京〜金沢）が開業、所要時間を大幅短縮","summary":"2015年3月14日、北陸新幹線の長野〜金沢間が延伸開業。東京〜金沢間の最速所要時間が従来の約3時間50分から2時間28分に短縮された。金沢・富山への旅行者が急増し、「北陸観光ブーム」が起きた。","date":"2015年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781227981520-tlave","category":"社会","title":"日本年金機構がサイバー攻撃を受け約125万件の個人情報が流出","summary":"2015年6月1日、日本年金機構は標的型メール攻撃によりウイルスに感染し、基礎年金番号・氏名・生年月日・住所などを含む個人情報約125万件が流出したと公表。年金番号の変更作業が全国で実施された。","date":"2015年6月","source":"https://xtech.nikkei.com/atcl/nxt/column/18/00215/031100027/","confidence":"高","snippet":"","notes":""},{"id":"society-1781227981527-0uwpb","category":"社会","title":"選挙権年齢を「18歳以上」に引き下げる公職選挙法改正が成立","summary":"2015年6月17日、選挙権年齢を従来の「20歳以上」から「18歳以上」に引き下げる公職選挙法改正が成立。翌2016年参院選から適用され、約240万人の若者が新たに有権者となった。","date":"2015年6月","source":"https://www.nippon.com/ja/behind/l00142/","confidence":"高","snippet":"","notes":""},{"id":"society-1781227981534-s7u03","category":"社会","title":"川内原発（鹿児島）が新規制基準下で全国初の再稼働","summary":"2015年8月11日、九州電力の川内原子力発電所1号機（鹿児島県）が福島原発事故後に策定された新規制基準のもとで全国初の再稼働を実施。「原発ゼロ」は約2年で解消されたが、反対住民・専門家から安全性への懸念が続いた。","date":"2015年8月","source":"https://www.nikkei.com/article/DGXLASFB10HH1_R10C15A8000000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781227981541-o76gp","category":"社会","title":"中国人観光客の「爆買い」が社会現象化、ドラッグストア・家電量販店に長蛇の列","summary":"2015年、円安を背景に訪日中国人観光客が急増。炊飯器・温水洗浄便座・化粧品などを大量購入する「爆買い」が話題となり、2015年の流行語大賞にも選ばれた。訪日外国人消費額が初めて3兆円を突破した。","date":"2015年","source":"https://www.rbbtoday.com/article/2015/12/01/137499.html","confidence":"高","snippet":"","notes":""},{"id":"society-1781227981548-90xel","category":"社会","title":"大村智・梶田隆章が同年のノーベル賞W受賞、日本人2部門同時受賞は快挙","summary":"2015年、北里大学の大村智特別栄誉教授がノーベル医学生理学賞（寄生虫感染症治療薬の開発）、東京大学の梶田隆章教授がノーベル物理学賞（ニュートリノが質量を持つことの発見）を受賞。同年の日本人2部門同時受賞は異例の快挙。","date":"2015年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781227981555-ant3c","category":"社会","title":"探査機「あかつき」が5年越しの挑戦で金星軌道投入に成功","summary":"2015年12月7日、JAXAの金星探査機「あかつき」が2010年の軌道投入失敗から5年越しのリカバリーで金星周回軌道への投入に成功。日本初の惑星探査機として金星の気象・大気の観測が始まった。","date":"2015年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781227981562-ee77j","category":"スポーツ","title":"ラグビーW杯でジャパンが南アフリカに「ブライトンの奇跡」と呼ばれる逆転勝利","summary":"2015年9月19日、イングランド・ブライトンでのラグビーW杯1次リーグで日本代表が過去2度の優勝国・南アフリカを34-32で撃破。終了間際のカーン・ヘスケスの逆転トライで「スポーツ史上最大の番狂わせ」と世界中から称賛された。","date":"2015年9月","source":"https://www.nippon.com/ja/japan-topics/today09190/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781227981569-upwsq","category":"スポーツ","title":"羽生結弦がNHK杯で世界初の300点超え322.40点を達成","summary":"2015年11月28日、長野で開催されたGPシリーズNHK杯で羽生結弦が合計322.40点を叩き出しフィギュアスケート史上初めて300点の壁を突破。続く12月のGPファイナルでも330.43点とさらに更新し、圧倒的な強さを見せた。","date":"2015年11月","source":"https://www.nippon.com/ja/japan-topics/today11280/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781227981576-d8lk8","category":"スポーツ","title":"ヤクルト山田哲人・ソフトバンク柳田悠岐がプロ野球史上初のW「トリプルスリー」達成","summary":"2015年のプロ野球シーズン、ヤクルトの山田哲人と福岡ソフトバンクの柳田悠岐が同年に「打率3割・30本塁打・30盗塁」のトリプルスリーを同時達成。セ・パ両リーグでの同時達成は65年ぶりの快挙で、流行語大賞に選ばれた。","date":"2015年9月","source":"https://www.j-cast.com/2015/09/18245657.html?p=all","confidence":"高","snippet":"","notes":""},{"id":"tech-1781227981583-xyeop","category":"テクノロジー","title":"首相官邸屋上にドローンが落下→航空法改正でドローン規制が一気に強化","summary":"2015年4月22日、首相官邸の屋上にドローンが落下しているのが発見された。微量の放射性物質が付着していたとも報じられ社会に衝撃が走る。これをきっかけにドローン規制の議論が加速し、同年12月に航空法が改正された。","date":"2015年4月","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781227981590-6huh4","category":"テクノロジー","title":"国産初の小型ジェット旅客機「MRJ」が半世紀ぶりに初飛行成功","summary":"2015年11月11日、三菱航空機が開発した国産初の小型ジェット旅客機「MRJ（三菱リージョナルジェット）」が名古屋空港から初飛行に成功。YS-11以来半世紀ぶりの国産旅客機として注目を集めた（後に事業凍結）。","date":"2015年11月","source":"https://business.nikkei.com/atcl/report/15/110879/111100136/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781227981597-bfmpe","category":"芸能・エンタメ・ゴシップ","title":"渡辺謙が米国人モデルとの不倫を認め謝罪会見","summary":"2015年3月末に週刊文春がジュエリーデザイナーとの不倫を報道。渡辺謙は7月15日に記者会見を開き「おおむね事実です」と認めて謝罪。ハリウッドでも活躍する日本を代表する俳優の不倫として大きく報じられた。","date":"2015年7月","source":"https://www.oricon.co.jp/news/2094215/full/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781227981604-p7y3b","category":"芸能・エンタメ・ゴシップ","title":"「安心してください、穿いてますよ」とにかく明るい安村がR-1ぐらんぷりでブレーク","summary":"2015年2月のR-1ぐらんぷり（フジテレビ）で、お笑い芸人・とにかく明るい安村が全裸に見えるポーズとともに「安心してください、穿いてますよ」を連発し一気にブレーク。流行語大賞トップ10に選ばれ2015年のブレイク芸人1位に輝いた。","date":"2015年2月","source":"https://www.oricon.co.jp/news/2064302/full/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781227981611-hypq8","category":"芸能・エンタメ・ゴシップ","title":"福山雅治が吹石一恵との結婚を発表→「福山ロス」が話題に","summary":"2015年9月28日（吹石の誕生日）、福山雅治が俳優・吹石一恵との結婚を発表。「国民的独身男」として知られる福山の結婚に女性ファンが号泣し、事務所の株価が急落。「福山ロス（ましゃロス）」という言葉が生まれ流行語候補となった。","date":"2015年9月","source":"https://home.kingsoft.jp/news/ent/reallive/30955.html","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781227981618-0srxm","category":"芸能・エンタメ・ゴシップ","title":"映画「バック・トゥ・ザ・フューチャー2」が設定した未来「2015年10月21日」が現実に到来し話題","summary":"1989年公開の映画「バック・トゥ・ザ・フューチャー2」でデロリアンが飛んだ未来の日付「2015年10月21日」がついに現実に到来。空飛ぶ車や自動ひも締めスニーカーなど予言的中・外れをSNSで比較する「BTTFの日」がトレンド1位になった。","date":"2015年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781227981625-e8i2y","category":"芸能・エンタメ・ゴシップ","title":"TBSドラマ「下町ロケット」（主演・阿部寛）が平均視聴率17.8%の大ヒット","summary":"2015年10月期のTBSドラマ「下町ロケット」（原作・池井戸潤、主演・阿部寛）が初回から高視聴率を記録し、最高視聴率は22.3%、平均17.8%の大ヒット作に。中小企業の技術力と大企業の理不尽を描いた熱いドラマとして幅広い世代に支持された。","date":"2015年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781227981632-vfrxw","category":"芸能・エンタメ・ゴシップ","title":"映画「スター・ウォーズ/フォースの覚醒」公開・全米興収歴代1位（当時）を記録","summary":"2015年12月18日公開。エピソード4以来38年ぶりに正統な続編が制作されたスター・ウォーズシリーズ第7弾で、全米興収歴代1位（当時）を達成。日本でも興収116億円超のメガヒットとなり「スターウォーズ旋風」が吹き荒れた。","date":"2015年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781227981639-cvtrr","category":"国際","title":"ネパールで大地震（M7.8）→死者約9,000人の大惨事","summary":"2015年4月25日、ネパールでマグニチュード7.8の大地震が発生。カトマンズ盆地を中心に広範囲で建物が倒壊し、死者は最終的に約9,000人に達した。エベレスト雪崩でも多数が犠牲となり、各国が救援活動を展開した。","date":"2015年4月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781227981646-8qp75","category":"国際","title":"韓国でMERS（中東呼吸器症候群）が拡大→観光客が激減し経済に打撃","summary":"2015年5〜6月、中東由来の感染症MERS（中東呼吸器症候群）が韓国で急拡大。死者38人・感染者186人を記録し、訪韓観光客が激減。韓国経済への深刻な影響と初動の対応不備への批判が集まった。","date":"2015年6月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781227981653-htdsq","category":"国際","title":"ギリシャがIMFへの返済を不履行、事実上のデフォルト状態に","summary":"2015年7月1日、ギリシャが国際通貨基金（IMF）への約15億ユーロの返済を履行できず先進国初のIMF返済不履行となった。EU・ECBとの緊縮財政をめぐる協議が難航し、ユーロ危機の再燃と「グレグジット」の懸念が世界市場に広まった。","date":"2015年7月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781227981660-qz0ry","category":"国際","title":"パリで同時多発テロ→130人死亡、ISが犯行声明","summary":"2015年11月13日夜（日本時間14日）、フランス・パリのバタクラン劇場・スタジアム周辺・カフェ等で銃撃・自爆テロが同時多発し130人が死亡・350人以上が負傷。IS（イスラム国）が犯行声明を出し、西洋社会全体に衝撃が走った。","date":"2015年11月","source":"https://www.oasis-academy.jp/blog/file-3-20240328","confidence":"高","snippet":"","notes":""},{"id":"international-1781227981667-hpi20","category":"国際","title":"欧州で空前の難民危機→シリアなどから年間100万人超が流入し社会問題化","summary":"2015年、シリア内戦・IS支配地域からの難民・移民がトルコ経由でギリシャ・ハンガリーなど欧州各国に殺到。年間100万人超が流入し、各国の受け入れ態勢が崩壊。溺死した幼児の写真が世界に衝撃を与え、欧州の移民政策論争に火がついた。","date":"2015年","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781230768773-j22ol","category":"政治","title":"消費税率を17年ぶりに5→8%へ引き上げ→駆け込み需要の後に消費が急失速","summary":"2014年4月1日、消費税率が5%から8%へ引き上げられた。1997年以来17年ぶりの増税で、増収分は社会保障費に充てるとされた。直前まで「駆け込み需要」で家電・住宅が急増したが、増税後は消費が急失速し景気悪化を招いた。","date":"2014年4月","source":"https://www.nikkei.com/article/DGXNASFS3102X_R30C14A3MM8000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781230768781-x12ky","category":"政治","title":"安倍政権が集団的自衛権の行使容認を閣議決定→憲法解釈変更に大きな反発","summary":"2014年7月1日、安倍内閣は憲法9条の解釈を変更し、集団的自衛権の限定的行使を容認する閣議決定を行った。「日本が攻撃されていなくても他国防衛のために武力行使できる」という解釈変更に野党・憲法学者・国民の多くから反発が起きた。","date":"2014年7月","source":"https://www.nikkei.com/article/DGXNASFS0103O_R00C14A7MM8000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781230768788-qfs30","category":"政治","title":"小渕優子経産相・松島みどり法相が政治資金問題で同日ダブル辞任","summary":"2014年10月20日、小渕優子経済産業相（関連政治団体の不透明な収支問題）と松島みどり法相（地元選挙区でうちわを配布した公選法違反疑惑）が同日に辞任。2閣僚が一度に辞任するという事態に安倍内閣は大きなダメージを受けた。","date":"2014年10月","source":"https://www.nikkei.com/article/DGXLASFS20008_Q4A021C1MM0000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781230768795-7u8xu","category":"政治","title":"特定秘密保護法が施行→「漏洩は最高懲役10年」に報道・市民団体が猛反発","summary":"2014年12月10日、2013年12月に成立した特定秘密保護法が施行された。防衛・外交・スパイ防止・テロ防止の4分野で「特定秘密」を指定し、漏洩者に最高懲役10年を科す内容。「秘密国家化」「知る権利の侵害」と報道各社・市民団体から強い批判が続いた。","date":"2014年12月","source":"https://current.ndl.go.jp/car/27624","confidence":"高","snippet":"","notes":""},{"id":"politics-1781230768802-251kp","category":"政治","title":"第47回衆院選で自公が大勝→「安倍一強」体制が確立","summary":"2014年12月14日、安倍首相が「アベノミクス解散」として断行した第47回衆院選が行われ、自民党が291議席・公明党が35議席を獲得し与党が圧勝。野党は分裂状態で惨敗し、第3次安倍内閣が発足。「安倍一強」と呼ばれる長期政権体制が確立した。","date":"2014年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"economy-1781230768809-2rxux","category":"経済","title":"日本マクドナルドが中国製期限切れ肉問題から異物混入と続き経営危機に","summary":"2014年7月、中国・上海の食品工場で期限切れ鶏肉を使用していたと発覚し、日本マクドナルドが中国産チキン商品を販売停止。さらに12月には国内で歯・ビニール等の異物混入事件が相次ぎ報告された。信頼失墜で売上が急落し、2015年に創業以来初の通期赤字を計上した。","date":"2014年7月","source":"https://www.nikkei.com/article/DGXNASDZ2506K_V20C14A7TI0000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768816-yt25t","category":"社会","title":"AKB48握手会で男が刃物を振り回し川栄李奈・入山杏奈ら3名が負傷","summary":"2014年5月25日、岩手県滝沢市の握手会会場でのこぎりの刃を改造した刃物を持った男が乱入し、川栄李奈・入山杏奈の2メンバーと男性スタッフ計3名が骨折等の重傷を負った。握手会の警備体制が問題視され、以後の会場警備が大幅強化された。","date":"2014年5月","source":"https://www.nikkei.com/article/DGXNASFK2500V_V20C14A5000000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768823-90bhz","category":"社会","title":"都議会で塩村文夏都議への「早く結婚しろ」セクハラ野次→欧米でも批判報道","summary":"2014年6月18日、東京都議会本会議で塩村文夏都議（みんなの党）が少子化・不妊治療支援を質問中、「自分が早く結婚したらいいじゃないか」「産めないのか」との野次が飛んだ。翌週に自民・鈴木章浩都議が名乗り出て謝罪。欧米メディアも批判的に報道し国際問題に発展した。","date":"2014年6月","source":"https://ja.wikipedia.org/wiki/%E6%9D%B1%E4%BA%AC%E9%83%BD%E8%AD%B0%E4%BC%9A%E3%82%84%E3%81%98%E5%95%8F%E9%A1%8C","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768830-yq3wr","category":"社会","title":"ベネッセが顧客情報最大3504万件を流出→史上最大規模の個人情報漏洩","summary":"2014年7月9日、進研ゼミ・こどもちゃれんじを運営するベネッセコーポレーションが顧客情報の大規模流出を公表。流出件数は最大3504万件に上り、子どもの氏名・生年月日・保護者の住所・電話番号が含まれていた。委託先の元社員が不正持ち出しをして名簿業者に売却していた。","date":"2014年7月","source":"https://ja.wikipedia.org/wiki/%E3%83%99%E3%83%8D%E3%83%83%E3%82%BB%E5%80%8B%E4%BA%BA%E6%83%85%E5%A0%B1%E6%B5%81%E5%87%BA%E4%BA%8B%E4%BB%B6","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768837-m20tv","category":"社会","title":"広島市で集中豪雨による大規模土砂災害→死者77名","summary":"2014年8月20日未明、広島市安佐北・安佐南区で1時間100mmを超える記録的集中豪雨が発生し、土石流107ヵ所・がけ崩れ59ヵ所など計166ヵ所で土砂災害が多発。死者77名（関連死含む）・負傷者68名の甚大な被害をもたらし、急斜面に密集した住宅地の脆弱性が問題視された。","date":"2014年8月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781230768844-2gaqk","category":"社会","title":"デング熱が代々木公園を震源に69年ぶり国内感染→全国162人に拡大","summary":"2014年8月、東京・代々木公園周辺で海外渡航歴のない国内感染のデング熱患者が確認された。69年ぶりの国内感染として大きな話題となり、最終的に全国162名にのぼった。公園内が一時閉鎖され、ヒトスジシマカへの注意が喚起された。","date":"2014年8月","source":"https://idsc.tmiph.metro.tokyo.lg.jp/diseases/dengue/dengue2014/iasr1/","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768851-zpqza","category":"社会","title":"御嶽山が突然噴火→登山者58名死亡・戦後最悪の火山災害","summary":"2014年9月27日11時52分、多くの登山者で賑わう土曜の昼間に長野・岐阜県境の御嶽山が突然水蒸気噴火した。噴石・火山灰が山頂付近の登山者を直撃し、58名が死亡・5名が行方不明のまま（2024年時点）。火山観測・警報の限界が露呈した戦後最悪の火山災害となった。","date":"2014年9月","source":"https://ja.wikipedia.org/wiki/2014%E5%B9%B4%E3%81%AE%E5%BE%A1%E5%B6%BD%E5%B1%B1%E5%99%B4%E7%81%AB","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768858-tvuln","category":"社会","title":"危険ドラッグ（脱法ハーブ）使用者の池袋暴走死亡事故が社会に衝撃","summary":"2014年6月24日、東京・池袋駅西口付近で危険ドラッグ（脱法ハーブ）を吸引した男が車で暴走し、女性1名が死亡・6名が重軽傷。大阪でも同様の事故が相次いだ。政府は緊急対策として「脱法ドラッグ」の呼称を「危険ドラッグ」に変更し、規制を大幅強化した。","date":"2014年6月","source":"https://ja.wikipedia.org/wiki/%E6%B1%A0%E8%A2%8B%E5%8D%B1%E9%99%BA%E3%83%89%E3%83%A9%E3%83%83%E3%82%B0%E5%90%B8%E5%BC%95RV%E6%9A%B4%E8%B5%B0%E6%AD%BB%E4%BA%A1%E4%BA%8B%E6%95%85","confidence":"高","snippet":"","notes":""},{"id":"society-1781230768865-uvl1m","category":"社会","title":"マタハラ（マタニティハラスメント）が社会問題化→流行語大賞トップ10入り","summary":"2014年、妊娠・出産を理由に職場で解雇・降格・嫌がらせを受ける「マタハラ（マタニティハラスメント）」が大きな社会問題として注目された。最高裁が「マタハラは違法」と初判断を示し（2014年10月）、流行語大賞トップ10にも選出。女性活躍推進の議論を加速させた。","date":"2014年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781230768872-dmo8x","category":"スポーツ","title":"羽生結弦がソチ五輪フィギュア男子で日本男子初の金メダル・SPで史上初100点超え","summary":"2014年2月14日、ロシア・ソチで開催の冬季五輪フィギュアスケート男子シングルで羽生結弦（当時19歳）が金メダルを獲得。日本男子では史上初の五輪金メダル。ショートプログラムでは史上初となる100点超え（101.45点）の世界最高得点を樹立し、当時19歳の若さでの戴冠が世界を驚かせた。","date":"2014年2月","source":"https://www.nippon.com/ja/japan-topics/today02140/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781230768879-lmvlx","category":"スポーツ","title":"浅田真央がソチ五輪SPで転倒も翌日フリーで自己ベスト142.71点の完璧演技→感動の6位","summary":"2014年2月のソチ五輪フィギュア女子で浅田真央はショートプログラムで3回転アクセル転倒などミスが重なり16位と大きく出遅れた。しかし翌日のフリーでは3回転アクセルを含む6種類計8本のジャンプを全て成功させ自己ベスト142.71点を記録。10位を抜いて6位に躍進した演技は世界中の人々の心を打った。","date":"2014年2月","source":"https://www.nippon.com/ja/column/g00155/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781230768886-mnxrq","category":"スポーツ","title":"錦織圭がUSオープン準優勝→アジア人男子として史上初の四大大会決勝進出","summary":"2014年9月8日（現地）、テニスの全米オープン決勝で錦織圭がマリン・チリッチ（クロアチア）と対戦。準優勝にはなったものの、アジア人男子として史上初のグランドスラム決勝進出という歴史的快挙を達成。日本中で錦織フィーバーが起き、テニス人気が再燃した。","date":"2014年9月","source":"https://www.jiji.com/jc/d4?p=hsm100-jpp017826279&d=d4_ftee","confidence":"高","snippet":"","notes":""},{"id":"sports-1781230768893-wlnzr","category":"スポーツ","title":"FIFA W杯ブラジル大会→日本グループリーグ敗退、ドイツが準決勝でブラジルを1-7で粉砕し優勝","summary":"2014年6〜7月のFIFAワールドカップブラジル大会。日本代表はグループCでコートジボワール・ギリシャ・コロンビアと対戦し1分2敗でグループリーグ敗退。大会最大の衝撃はドイツが準決勝で開催国ブラジルを7-1で粉砕した試合。ドイツは決勝でもアルゼンチンを1-0で下して優勝した。","date":"2014年6月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781230768900-bvpfl","category":"芸能・エンタメ・ゴシップ","title":"「笑っていいとも！」が31年半・8054回の歴史に幕→タモリが涙した感動の最終回","summary":"2014年3月31日、1982年10月から続いたフジテレビの生放送昼番組「森田一義アワー 笑っていいとも！」が最終回を迎えた。放送31年半・8054回という長寿番組の終幕に列島が感慨にふけった。最終回「グランドフィナーレ」では過去の出演者が多数登場し、タモリも涙を見せた。","date":"2014年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781230768907-yn78b","category":"芸能・エンタメ・ゴシップ","title":"映画「アナと雪の女王」公開→主題歌「ありのままで」が社会現象化・興収255億円","summary":"2014年3月14日に日本公開されたディズニーアニメ映画「アナと雪の女王」が空前のヒット。主題歌「レット・イット・ゴー〜ありのままで〜」がテレビで繰り返し流れ、松たか子・May Jの歌声が日本中で口ずさまれる社会現象に。日本興収は255億円で当時歴代3位に入る大ヒットとなった。","date":"2014年3月","source":"https://theriver.jp/frozen-10th-anniversary/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781230768914-3lfnj","category":"芸能・エンタメ・ゴシップ","title":"「妖怪ウォッチ」がゲーム・アニメ・おもちゃで社会現象化→年間ヒット商品1位","summary":"2014年、レベルファイブのゲーム「妖怪ウォッチ」を原作にアニメ・妖怪メダルなどの玩具が展開され社会現象化。妖怪メダルの争奪戦が店頭で起き、「ようかい体操第一」がNHK紅白歌合戦にも登場。日経トレンディのヒット商品ランキングで年間1位・2位を独占した。","date":"2014年","source":"https://www.oricon.co.jp/news/2044030/full/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781230768921-j61xr","category":"芸能・エンタメ・ゴシップ","title":"昭和映画の象徴・俳優の高倉健が83歳で死去","summary":"2014年11月10日、俳優の高倉健が悪性リンパ腫のため83歳で死去。「網走番外地」「幸福の黄色いハンカチ」「鉄道員（ぽっぽや）」など日本映画史を代表する名作に主演し、「昭和の男」を体現した国民的スターの訃報に日本列島は悲しみに包まれた。","date":"2014年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781230768928-n6knr","category":"芸能・エンタメ・ゴシップ","title":"宇多田ヒカルがイタリア人男性との再婚を発表（離婚から6年）","summary":"2014年2月3日、宇多田ヒカルが公式サイトで「イタリア人の男性」との結婚を発表。2008年に映画監督の紀里谷和明と離婚してから約6年ぶりの再婚。相手の名前はプライバシー保護を理由に非公開とされた。","date":"2014年2月","source":"https://natalie.mu/music/news/109126","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781230768935-1f88p","category":"芸能・エンタメ・ゴシップ","title":"日本エレキテル連合「ダメよ〜ダメダメ」が流行語大賞年間大賞に・「集団的自衛権」と同時受賞","summary":"2014年12月1日、新語・流行語大賞の年間大賞にお笑いコンビ「日本エレキテル連合」の「ダメよ〜ダメダメ」と「集団的自衛権」の2語が選ばれた。朱美ちゃんコントで「ダメよ〜ダメダメ」を連発するネタが社会現象化。異例の2語同時受賞で話題となった。","date":"2014年12月","source":"https://www.oricon.co.jp/news/2045284/full/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781230768942-l96o4","category":"芸能・エンタメ・ゴシップ","title":"三船美佳が高橋ジョージのDV告白・離婚調停を申し立て","summary":"2014年、女優の三船美佳が夫・高橋ジョージから継続的に言語的・心理的DV（モラルハラスメント）を受けていたとして離婚調停を申し立て話題となった。「お前には人間としての価値がない」などの発言を告白。最終的に離婚が成立したのは2016年3月。","date":"2014年","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781230768949-tunrb","category":"テクノロジー","title":"iPhone 6 / 6 Plusが発売→スマートフォン大型化の時代が到来","summary":"2014年9月19日（日本）、アップルが画面サイズ4.7インチ（6）と5.5インチ（6 Plus）の「iPhone 6/6 Plus」を発売。それまでの4インチから大型化し「大きすぎる」と批判されていたAndroid端末と同等サイズになった。発売直後から日本各地のApple Storeに長蛇の列ができ、スマホの大型化が一気に加速した。","date":"2014年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768956-0wbfw","category":"国際","title":"マレーシア航空MH370便が失踪→乗客乗員239人が今も行方不明・航空史上最大のミステリー","summary":"2014年3月8日未明、クアラルンプールを出発した乗客乗員239人乗りのマレーシア航空MH370便が飛行中にレーダーから突然消えた。広大な海域が捜索されたがいまだ機体はほぼ発見されておらず、航空史上最大の謎として今も未解決のまま残っている。","date":"2014年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768963-8x0c7","category":"国際","title":"ロシアがウクライナのクリミア半島を一方的に併合→欧米が制裁・冷戦後最大の危機","summary":"2014年3月、ウクライナの政変に乗じてロシア軍がクリミア半島に侵攻。住民投票を経て3月18日にプーチン大統領がクリミアのロシア編入を宣言した。国連総会は「無効」決議を採択し米欧はロシアに制裁を発動。冷戦後の安全保障秩序を根底から揺るがす事態となった。","date":"2014年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768970-bd9ap","category":"国際","title":"韓国でセウォル号が沈没→修学旅行中の高校生ら304人が死亡・朴槿恵政権に批判噴出","summary":"2014年4月16日朝、韓国・珍島沖でフェリー「セウォル号」が転覆・沈没した。乗客476人中304人が死亡し、犠牲者の大半は修学旅行中の高校生（約250人）。「海に留まれ」という船内放送が生死を分けたと指摘され、初動対応の失敗や救助体制の不備で朴槿恵政権への批判が爆発した。","date":"2014年4月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768977-ys4hl","category":"国際","title":"イスラム国（IS）がカリフ制国家樹立を宣言→「斬首動画」で世界に衝撃","summary":"2014年6月29日、イラク・シリアにまたがる地域を支配するイスラム武装組織「ISIL」がカリフ制国家（イスラム国）の樹立を宣言した。欧米人ジャーナリスト等の「斬首動画」をSNSで拡散し世界を震撼させた。各国が有志連合を組んで空爆を開始し、2015年には日本人2名が人質に取られた。","date":"2014年6月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768984-2vsu2","category":"国際","title":"マレーシア航空MH17便がウクライナ上空で撃墜→乗客乗員298人全員死亡","summary":"2014年7月17日、アムステルダム発クアラルンプール行きのマレーシア航空MH17便がウクライナ東部上空でミサイルにより撃墜され、乗客乗員298人全員が死亡した。国際調査機関はロシア軍のミサイルシステムによる撃墜と断定。ロシアは関与を否定し国際的な対立が深まった。","date":"2014年7月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768991-k6ucx","category":"国際","title":"エボラ出血熱が西アフリカで大流行→WHOが国際的公衆衛生上の緊急事態を宣言","summary":"2014年8月8日、世界保健機関（WHO）が西アフリカ（ギニア・シエラレオネ・リベリア）で急拡大するエボラ出血熱に対し「国際的に懸念される公衆衛生上の緊急事態」を宣言。最終的に死者は1万人を超え、西アフリカ史上最悪の感染症流行となった。","date":"2014年8月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781230768998-3kmwq","category":"国際","title":"香港「雨傘運動」→催涙弾に傘で抗議する民主化デモが79日間続く","summary":"2014年9月26日、香港で行政長官選挙への民主的普通選挙実現を求める大規模デモ（雨傘運動）が始まった。警察の催涙弾に対し市民が傘を広げる映像が世界中に拡散。セントラル（中環）などの中心部が占拠され、12月15日の解散まで79日間続いた。中国政府は「外国勢力の介入」として批判した。","date":"2014年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781231893599-t06z8","category":"政治","title":"第2次安倍内閣が「アベノミクス・三本の矢」を始動→金融緩和・財政出動・成長戦略","summary":"2013年1月、安倍晋三首相が率いる第2次安倍内閣（2012年12月発足）が経済政策「アベノミクス」を本格始動。①大胆な金融緩和 ②機動的な財政政策 ③民間投資を喚起する成長戦略の「三本の矢」を掲げ、4月には黒田日銀総裁が「異次元の金融緩和」を実施した。","date":"2013年1月","source":"https://www.nippon.com/ja/behind/l00082/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781231893606-ukwyf","category":"政治","title":"安倍政権がTPP交渉参加を正式表明→農業団体・農村地帯が「聖域なき関税撤廃」に猛反対","summary":"2013年3月15日、安倍首相が環太平洋パートナーシップ協定（TPP）への交渉参加を正式に表明。農業団体や農村部選出議員から「コメや農産物の関税撤廃で日本農業が壊滅する」と強烈な反対運動が起きたが、安倍政権はTPP交渉に参加した。","date":"2013年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781231893613-wef76","category":"政治","title":"参院選で自民が圧勝→民主政権時代から続いた「ねじれ国会」が6年ぶりに解消","summary":"2013年7月21日、第23回参院選が行われ、自民党が65議席を獲得して圧勝。公明党と合わせ参院でも過半数を確保し、2007年から続いた衆参の多数派が異なる「ねじれ国会」が6年ぶりに解消された。安倍政権はこれ以降、法案の成立を加速させた。","date":"2013年7月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781231893620-j9l6d","category":"政治","title":"国家安全保障会議（NSC）設置→首相主導の安全保障体制に","summary":"2013年12月4日、日本版NSCとも呼ばれる国家安全保障会議（NSC）が設置された。安倍首相・官房長官・外相・防衛相の「4大臣会合」を中心に、外交・安全保障の重要事項を首相が主導して判断できる体制が整備された。特定秘密保護法と合わせて安保政策の重大な転換とされた。","date":"2013年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781231893627-znmbm","category":"政治","title":"安倍首相が靖国神社を参拝→中韓が猛反発し米国も「失望」と異例の批判","summary":"2013年12月26日、安倍晋三首相が靖国神社を参拝した。現職首相の参拝は小泉純一郎元首相以来7年4カ月ぶり。中国・韓国は強く反発し外交問題に発展。米国務省が同盟国の行動に「失望」という異例の表現で批判し、国際的に孤立する場面も生じた。","date":"2013年12月","source":"https://www.nippon.com/ja/behind/l00054/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781231893634-jpnzq","category":"経済","title":"みずほ銀行が反社会的勢力への融資200件超を金融庁に報告せず隠蔽→会長が辞任・頭取も引責","summary":"2013年9月、みずほ銀行が信販会社経由で暴力団関係者ら反社会的勢力に対し200件超・総額約2億円の融資を行っていたことが週刊誌のスクープで発覚。さらに銀行内で問題を把握しながら金融庁に報告していなかった隠蔽が明らかになり、塚本隆史会長が11月に辞任した。","date":"2013年9月","source":"https://www.fsa.go.jp/news/25/ginkou/20130927-3.html","confidence":"高","snippet":"","notes":""},{"id":"economy-1781231893641-5wqg1","category":"経済","title":"訪日外国人が初めて年間1000万人を突破→「インバウンド観光」元年に","summary":"2013年12月、日本への訪日外国人旅行者数が年間で初めて1000万人を突破し、最終的に1036万人を記録した。円安・LCC就航拡大・アジアからの観光需要増が重なった結果で、観光立国の節目となった。以降の爆買いブームなどインバウンド消費拡大の起点となった年。","date":"2013年12月","source":"https://www.nippon.com/ja/features/h00046/","confidence":"高","snippet":"","notes":""},{"id":"society-1781231893648-mjcpk","category":"社会","title":"大阪・桜宮高校バスケ部顧問による体罰で生徒が自殺→全国の部活体罰問題に波及","summary":"2013年1月、大阪市立桜宮高校バスケットボール部の男子生徒（高校2年）が顧問教師の常習的な体罰を苦に自殺したことが発覚した。橋下大阪市長が「体育科の入試中止」を要求したことで社会的な大論争に発展し、全国の学校部活動における体罰問題が一気に注目された。","date":"2013年1月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893655-lsstz","category":"社会","title":"富士山がユネスコ世界文化遺産に登録・「和食」も同年12月に登録","summary":"2013年6月22日、富士山がユネスコの世界文化遺産に登録された。同年12月4日には「和食：日本人の伝統的な食文化」も無形文化遺産に登録され、日本文化が世界に認められた年として記憶された。富士山登録後は登山者・観光客が急増し、弾丸登山などの問題も浮上した。","date":"2013年6月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893662-r7j6t","category":"社会","title":"高知・四万十市（江川崎）で観測史上最高気温41.0度を記録","summary":"2013年8月12日、高知県四万十市の江川崎観測点で気温41.0度を記録し、国内観測史上最高気温を更新した。それまでの記録（2007年、熊谷市・多治見市の40.9度）を約6年ぶりに塗り替えた。猛暑の中、各地でも記録的な高温が相次いだ。","date":"2013年8月","source":"https://www.nikkei.com/article/DGXNASDG1203K_S3A810C1EA2000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781231893669-asg27","category":"社会","title":"竜巻が埼玉・越谷などを直撃→市街地を破壊し死傷者が発生","summary":"2013年9月2日、埼玉県越谷市・松伏町などを竜巻が直撃し、住宅・車両・電柱など広範囲が被害を受けた。死者1名・重軽傷者74名、全半壊住宅127棟という大きな被害となった。約半世紀ぶりに関東で記録された竜巻による死亡事故として大きく報じられた。","date":"2013年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893676-xswyw","category":"社会","title":"東京・三鷹ストーカー殺人→元交際相手の女子高生を刺殺し性的動画をネットで拡散","summary":"2013年10月8日、東京都三鷹市で元交際相手の高校3年生の女性が犯人の男に刺殺された。犯人は交際中に撮影した性的な動画をインターネット上に公開し「リベンジポルノ」として拡散。「ストーカー規制法の網の目」とSNSを悪用した犯罪として社会に衝撃を与え、翌年のリベンジポルノ防止法制定につながった。","date":"2013年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893683-m3jo3","category":"社会","title":"JR北海道で脱線事故が多発→レール検査記録の改ざんが33カ所で常態化と発覚","summary":"2013年9月、函館本線大沼駅付近で貨物列車の脱線事故が発生。続く調査でレール幅の検査データを改ざんしていたことが判明し、さらに全44保線事業所のうち33カ所で検査記録の改ざんが常態化していたことが12月に発覚した。国土交通省は異例の特別保安監査を実施した。","date":"2013年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893690-meoz5","category":"社会","title":"非公認ゆるキャラ「ふなっしー」が全国区でブレーク→ハイテンションな動きで大人気に","summary":"2013年、千葉県船橋市の非公認ゆるキャラ「ふなっしー」が全国区で大ブレーク。市の公認を拒否されながらも独自に活動を続け、激しい動きと高いテンションのキャラクターがメディアで話題になった。ゆるキャラグランプリには出場できないにもかかわらず最大の人気キャラとなった。","date":"2013年","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893697-y4jls","category":"社会","title":"「ブラック企業」問題が社会問題化→ユニクロ・ワタミが批判の的に・流行語大賞トップ10","summary":"2013年、過酷な労働環境を持つ「ブラック企業」問題が社会的に大きく注目された。ユニクロ（ファーストリテイリング）・ワタミなどが相次いで批判を受け、厚生労働省が「ブラック企業」と疑われる企業への集中調査を実施した。「ブラック企業」は2013年の新語・流行語大賞トップ10に選出された。","date":"2013年","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781231893704-l3k3g","category":"社会","title":"「黒子のバスケ脅迫事件」→書店・大学図書館などに毒物混入予告脅迫状が相次ぐ","summary":"2013年、人気漫画「黒子のバスケ」（集英社）の作者に個人的な恨みを抱いた男が、出版社・書店・学校図書館・球技大会に毒物混入を予告する脅迫状を多数送りつけた。各地のイベント・蔵書の撤去が相次ぎ社会に衝撃を与えた。犯人は2014年2月に逮捕された。","date":"2013年","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781231893711-hhvcx","category":"スポーツ","title":"楽天イーグルスが創設9年目で悲願の初優勝・日本一→田中将大が24勝0敗1セーブの前人未到の記録","summary":"2013年シーズン、東北楽天ゴールデンイーグルスのエース田中将大（マー君）が24勝0敗1セーブという驚異的な無敗記録を樹立。球団は2003年創設から9年目で初のパ・リーグ優勝を達成し、日本シリーズでは読売巨人軍を4勝3敗で下して球団初の日本一に輝いた。","date":"2013年11月","source":"https://www.rakuteneagles.jp/special/2013japan-champion/story/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781231893718-127df","category":"スポーツ","title":"安藤美姫がフィギュア世界選手権後に未婚での出産を7月に公表→「父親は誰か」で大炎上","summary":"安藤美姫は2013年3月のフィギュアスケート世界選手権（カナダ）に出場し、同年4月に未婚のまま長女を出産していた。公表は2013年7月1日の「報道ステーション」インタビュー。父親については「本人が希望するため非公開」として明かさず、「父親は誰か」をめぐる憶測が大きな炎上を招いた。","date":"2013年7月","source":"https://www.nikkei.com/article/DGKDZO56864950S3A700C1CR8000/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781231893725-9xu0p","category":"芸能・エンタメ・ゴシップ","title":"アニメ「進撃の巨人」放映開始→国内外で爆発的ヒット・社会現象化","summary":"2013年4月7日、諫山創原作のアニメ「進撃の巨人」（WIT STUDIO制作）の放映が開始。「人類vs巨人」という独創的な世界観が若者を中心に爆発的に支持され、関連商品の売上も急増。海外のアニメファンにも広く波及し、日本アニメの世界的評価を高めた。","date":"2013年4月","source":"https://www.witstudio.co.jp/works/2013/04/42.html","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781231893732-os74c","category":"芸能・エンタメ・ゴシップ","title":"AKB48選抜総選挙で指原莉乃が初の1位→HKT48からの1位は衝撃","summary":"2013年6月8日、横浜日産スタジアムで開催されたAKB48第5回選抜総選挙で、HKT48（博多）所属の指原莉乃が150,570票を獲得して初めて1位を獲得した。それまでの前田敦子・大島優子の「2強時代」を覆し、AKBグループの中心を大きく揺るがす結果となった。","date":"2013年6月","source":"https://natalie.mu/music/news/92395","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781231893739-g529g","category":"芸能・エンタメ・ゴシップ","title":"AKB48「恋するフォーチュンクッキー」→企業・自治体・自衛隊が次々パロディ動画を制作","summary":"2013年8月21日発売のAKB48「恋するフォーチュンクッキー」のMVが大きな話題になり、企業・自治体・自衛隊・学校など300以上の団体がパロディPR動画を制作してYouTubeに投稿する社会現象が起きた。振付も覚えやすく子どもから大人まで踊り、2013年の紅白にも登場した。","date":"2013年8月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781231893746-yhauo","category":"芸能・エンタメ・ゴシップ","title":"映画「風立ちぬ」公開後に宮崎駿監督が引退宣言→スタジオジブリの行方に衝撃","summary":"2013年7月20日に公開された宮崎駿監督の映画「風立ちぬ」がヒット。同年9月6日、スタジオジブリが宮崎の長編映画からの引退を正式に発表した。「千と千尋」「もののけ姫」など日本アニメを牽引してきた巨匠の引退宣言に映画界・ファンが衝撃を受けた。","date":"2013年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781231893753-vp24s","category":"芸能・エンタメ・ゴシップ","title":"橋本環奈「奇跡の一枚」がSNSで大拡散→一夜で「1000年に1人の美少女」として全国区に","summary":"2013年11月2日、2ちゃんねるへの投稿をきっかけに福岡のローカルアイドル「Rev. from DVL」の橋本環奈（当時14歳）の写真が大拡散。同年5月3日の博多どんたく関連イベントで撮影されたいわゆる「奇跡の一枚」が「天使すぎる」「1000年に1人の美少女」として話題となり一夜で全国区の有名人となった。","date":"2013年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781231893760-7opnp","category":"芸能・エンタメ・ゴシップ","title":"林修先生「今でしょ！」が東進CM発→流行語大賞年間大賞に（「じぇじぇじぇ」「倍返し」「お・も・て・な・し」と4語同時受賞）","summary":"東進ハイスクールのCMで、予備校講師・林修が放った「いつやるか？今でしょ！」というフレーズが大流行。テレビ・SNSで急速に拡散しバラエティ番組でも引っ張りだこになった。2013年の新語・流行語大賞年間大賞を「じぇじぇじぇ」（あまちゃん）「倍返し」（半沢直樹）「お・も・て・な・し」（東京五輪招致プレゼン）と4語同時受賞した。","date":"2013年","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781231893767-rtshc","category":"テクノロジー","title":"iPhone 5sが発売→世界初の指紋認証「Touch ID」搭載・生体認証スマホのトレンドに","summary":"2013年9月20日（日本）、アップルがiPhone 5sを発売。ホームボタンに内蔵された世界初の指紋認証機能「Touch ID」が話題を呼んだ。同時発売の廉価版「iPhone 5c」もあったが、5sの完成度が際立つと評価され、指紋認証がスマートフォンの標準機能となる潮流をつくった。","date":"2013年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781231893774-rtf8n","category":"テクノロジー","title":"LINEが国内ユーザー5000万人突破→スタンプ文化が日本に定着し社会インフラ化","summary":"2013年、無料通話・メッセージアプリ「LINE」が日本国内のユーザー数5000万人を突破した。絵文字を発展させたオリジナルの「スタンプ」文化が若者の間で定着し、既存のキャリアメールを急速に代替。企業・自治体・政府機関も公式アカウントを開設し、社会インフラとして定着した。","date":"2013年","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781231893781-igotw","category":"国際","title":"中国からのPM2.5が日本列島を直撃→大気汚染の深刻化に健康被害の懸念が拡大","summary":"2013年1〜3月、中国の大気汚染物質PM2.5が偏西風に乗って日本列島に飛来し、各地で観測値が急上昇した。「危険」レベルを超える地域も現れ、マスク着用や外出自粛の呼びかけが相次いだ。中国国内でも「空気黙示録」と呼ばれる深刻な汚染状態が連日報じられた。","date":"2013年1月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781231893788-f6ahk","category":"国際","title":"北朝鮮が3回目の地下核実験を強行→国連安保理が追加制裁決議","summary":"2013年2月12日、北朝鮮が核兵器の小型化を示すとする3回目の地下核実験を実施したと発表した。日本・米国・韓国が強く非難し、国連安保理は中国・ロシアも賛成する形で追加制裁決議2094を全会一致で採択した。","date":"2013年2月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781231893795-y31km","category":"国際","title":"ローマ法王ベネディクト16世が約600年ぶりに生前退位→フランシスコ法王が就任","summary":"2013年2月11日、ローマ教皇ベネディクト16世が健康上の理由を挙げて退位を表明した。教皇の生前退位は15世紀以来約600年ぶりの歴史的な出来事。3月13日にアルゼンチン出身のホルヘ・マリオ・ベルゴリオが第266代ローマ教皇「フランシスコ」に選出・就任した。","date":"2013年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781231893802-wsjzc","category":"国際","title":"バングラデシュの縫製工場ビル「ラナプラザ」が崩壊→死者1100人超・ファストファッションの闇が露呈","summary":"2013年4月24日、バングラデシュ・ダッカ近郊の縫製工場入居ビル「ラナプラザ」（8階建て）が崩壊し、死者1,132人・行方不明者約500人・負傷者2,500人超の大惨事となった。ビルの安全上の問題を警告されながら操業が続けられていたことが判明。低価格衣料を下請け生産する工場の劣悪な労働環境・安全管理の問題が世界的に問われた。","date":"2013年4月","source":"https://www.jetro.go.jp/biznews/2023/04/5a4f2b573713d8dd.html","confidence":"高","snippet":"","notes":""},{"id":"international-1781231893809-yzn78","category":"国際","title":"スノーデン元CIA職員が米NSAの世界規模の盗聴プログラム「PRISM」を暴露→国際問題に","summary":"2013年6月6日、元CIA職員エドワード・スノーデンが英紙ガーディアンを通じて米国家安全保障局（NSA）の極秘盗聴プログラム「PRISM」を暴露した。グーグル・フェイスブック・アップルなど9社のサーバーへのアクセスや同盟国指導者の通信傍受が明らかになり、「監視国家」として米国への国際的信頼が大きく揺らいだ。","date":"2013年6月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781231893816-k93k1","category":"国際","title":"フィリピンに超大型台風ハイエン（ヨランダ）が直撃→死者約6,300人・壊滅的被害","summary":"2013年11月8日（現地時間）、フィリピン中部に超大型台風ハイエン（フィリピン名ヨランダ）が上陸。最大瞬間風速90m/sに及ぶ観測史上最強クラスの台風が各地を壊滅させ、死者約6,300人・行方不明約1,000人という未曾有の被害をもたらした。レイテ島・タクロバン市が特に甚大な被害を受けた。","date":"2013年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781231893823-n3crd","category":"国際","title":"南アフリカの反アパルトヘイト闘士ネルソン・マンデラ元大統領が95歳で死去","summary":"2013年12月5日、南アフリカのネルソン・マンデラ元大統領が95歳で死去した。27年間の獄中生活を経て大統領（在任1994〜1999年）となり、アパルトヘイト（人種隔離政策）撤廃と「虹の国」南アフリカの民主化を実現した偉大な指導者の死に、世界中から追悼の声が集まった。","date":"2013年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781232990315-ig4iv","category":"政治","title":"野田首相「近いうちに解散」→12月衆院選で自民が圧勝・第2次安倍内閣発足","summary":"野田佳彦首相が「近いうちに解散」発言から一転、11月に衆院解散を宣言。12月16日の衆院選で自民党が294議席を獲得して圧勝し、民主党は230議席から57議席に激減した。12月26日、安倍晋三首相率いる第2次安倍内閣が発足し、「政権奪還」が実現した。","date":"2012年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781232990322-pvzcq","category":"政治","title":"消費税増税法案が民主・自民・公明の「3党合意」で成立→2014年に8%、2015年に10%へ","summary":"2012年6月に民主・自民・公明3党が合意し、消費税を2014年4月に8%・2015年10月に10%へ段階的に引き上げる「社会保障と税の一体改革」関連法案が衆院を通過。同年8月10日に参院でも可決成立した。「国民に信を問わずに決めるのか」と党内で強い反発が起き、小沢離党のきっかけとなった。","date":"2012年8月","source":"https://www.bloomberg.com/jp/news/articles/2012-08-10/M8HZ176K50YK01","confidence":"高","snippet":"","notes":""},{"id":"politics-1781232990329-v3m2r","category":"政治","title":"尖閣諸島を政府が国有化→中国全土で大規模な反日デモ・暴動が勃発","summary":"2012年9月11日、野田政権が尖閣諸島を地権者から買い上げ国有化した。中国各地で大規模な反日デモが起き、9月18日には125都市以上でデモが発生。日系企業・店舗への破壊・略奪も発生し、日中関係は国交正常化以来最悪水準に悪化した。","date":"2012年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781232990336-evvj4","category":"政治","title":"橋下徹が「日本維新の会」を結成→石原慎太郎が都知事辞職して合流し国政に進出","summary":"2012年9月28日、橋下徹が率いる大阪維新の会を基盤に「日本維新の会」が国政政党として発足。11月17日に石原慎太郎が東京都知事を突然辞職して太陽の党を率いて合流し、石原が代表に就任した。12月衆院選で54議席を獲得し第3勢力に躍進した。","date":"2012年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781232990343-bc03k","category":"政治","title":"小沢一郎が民主党を離党→新党「国民の生活が第一」を結成","summary":"消費税増税法案採決への反発を理由に小沢一郎・元民主党代表ら52人の衆参議員が2012年7月2日に離党届を提出。7月11日に「国民の生活が第一」という新党を結成した。民主党の大規模分裂が始まり、長期政権崩壊への序章となった。","date":"2012年7月","source":"https://www.nikkei.com/article/DGXNASFS0200M_S2A700C1000000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781232990350-66pv6","category":"経済","title":"シャープが経営危機→台湾・鴻海グループとの資本業務提携交渉を発表","summary":"液晶事業の低迷でシャープが巨額赤字に陥り、2012年3月27日に台湾の鴻海（ホンハイ）グループとの約670億円規模の資本提携を発表した。しかし株価下落により鴻海側が出資を見送るなど交渉が難航し長期化。かつての「世界のシャープ」が経営危機に瀕したことで日本の製造業への衝撃が走った。","date":"2012年3月","source":"https://www.nikkei.com/article/DGKDASDD270QB_X20C12A3TJ0000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781232990357-8tvbw","category":"経済","title":"ソニー・パナソニック・NECなど電機大手が軒並み過去最大級の赤字・大規模リストラを発表","summary":"2012年3月期決算でパナソニックが7721億円（過去最大）、ソニーが約5200億円（4期連続）の最終赤字を計上。NECも大幅損失を計上し、各社が数千〜数万人規模のリストラを相次いで発表した。3社合計の赤字は1兆円超にのぼり、日本の電機産業の凋落が広く認識された。","date":"2012年","source":"https://www.nikkei.com/article/DGXNASDD110R2_R10C12A5TJ0000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781232990364-8ds7r","category":"経済","title":"東京スカイツリーが開業→高さ634mで世界一の電波塔・東京の新ランドマークに","summary":"2012年5月22日、東京都墨田区に高さ634m（ムサシ）の「東京スカイツリー」が開業した。自立式電波塔として世界一の高さを誇り、開業直後から連日長蛇の行列が続く大人気観光地となった。足元には商業施設「東京ソラマチ」も同時開業し新たな観光エリアが生まれた。","date":"2012年5月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781232990371-70vvo","category":"社会","title":"関越自動車道ツアーバス事故→7名死亡・運転手の異常な長時間労働が発覚","summary":"2012年4月29日未明、群馬県藤岡市の関越自動車道で走行中の夜行高速バスが防音壁に衝突し7名が死亡、38名が重軽傷を負った。運転手が複数の会社を掛け持ちする異常な長時間労働状態にあったことが判明し、格安ツアーバス業界の安全管理問題が一気に社会問題化した。","date":"2012年4月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781232990378-2372p","category":"社会","title":"大飯原発（関西電力）が再稼働→官邸前で最大20万人の反原発デモ","summary":"野田首相が「国民の生活を守るため」として関西電力大飯原発3・4号機の再稼働を2012年6月16日に正式決定。毎週金曜日に首相官邸前で抗議デモが開催され、7月29日の「脱原発国会大包囲」では主催者発表で20万人が参加した。東日本大震災後の原発問題への社会的関心の高まりを象徴した。","date":"2012年6月","source":"https://www.afpbb.com/articles/-/2892264","confidence":"高","snippet":"","notes":""},{"id":"society-1781232990385-6pstg","category":"社会","title":"韓国・李明博大統領が竹島に上陸→日韓関係が急激に悪化・天皇批判発言も重なる","summary":"2012年8月10日、韓国の李明博大統領が現職大統領として初めて竹島（韓国名：独島）に上陸した。日本政府は強く抗議し大使を一時帰国させた。さらに李大統領が天皇陛下への批判発言を行ったことで日韓関係は著しく悪化した。","date":"2012年8月","source":"https://www.nikkei.com/article/DGXNASGM1002H_Q2A810C1000000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781232990392-erw7x","category":"社会","title":"尼崎連続殺人事件・角田美代子が逮捕→洗脳した複数家族に近親者を殺害させた凄惨な事件","summary":"2012年11月、兵庫県尼崎市で複数の家族を「洗脳支配」下に置き、近親者同士で殺害させ遺体を埋めていた角田美代子（当時64歳）が逮捕された。計8人の死亡が確認されるなど日本の事件史上まれに見る支配犯罪として社会を震撼させた。角田本人は同年12月12日に留置場内で自殺した。","date":"2012年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781232990399-2cge4","category":"社会","title":"「脱法ハーブ（危険ドラッグ）」が社会問題化→吸引による死亡事故・危険運転が相次ぐ","summary":"2012年頃から、麻薬・大麻に似た作用を持つ「脱法ハーブ（合法ハーブ）」を吸引した人による交通事故・暴力事件が急増した。法の網をかいくぐる形で店頭販売が続き、規制が後手に回る実態が報じられ社会問題となった。","date":"2012年","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781232990406-ygr2j","category":"社会","title":"沖縄・オスプレイ配備に約10万人が反対デモ→基地問題への怒りが可視化","summary":"米海兵隊の新型輸送機「MV-22オスプレイ」が沖縄の普天間飛行場へ配備されることに反対し、2012年9月9日に沖縄県民大会が開催された。主催者発表で約10万3千人が参加し、基地問題への沖縄県民の根強い怒りが改めて全国・世界に発信された。","date":"2012年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781232990413-0n945","category":"社会","title":"中央自動車道・笹子トンネル天井崩落事故→9名死亡・老朽インフラ問題を直撃","summary":"2012年12月2日、山梨県・中央自動車道上り線の笹子トンネルで天井のコンクリート板が約138mにわたって崩落し、走行中の車3台が下敷きになって9人が死亡した。高度成長期に建設された老朽インフラの維持管理問題が一気に社会的議題となった。","date":"2012年12月","source":"https://www.nikkei.com/article/DGKKZO66842030R01C20A2EAC000/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781232990420-s5sq5","category":"スポーツ","title":"ロンドンオリンピック→日本が史上最多38個のメダル（金7・銀14・銅17）","summary":"2012年ロンドン五輪で日本は金7・銀14・銅17の計38個という2004年アテネの37個を上回る過去最多のメダルを獲得した。柔道・レスリング・体操・卓球・バドミントンなど多競技にわたる活躍で「メダルラッシュ」と大きく報じられた。","date":"2012年8月","source":"https://www.joc.or.jp/games/olympic/london/japan/winnerslist/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781232990427-gvrzc","category":"スポーツ","title":"体操・内村航平がロンドン五輪の個人総合で金メダル→「体操ニッポン」の復活","summary":"内村航平が体操競技の個人総合で金メダルを獲得した。前年の世界選手権に続く連覇で「完璧な演技」と高く評価され、「体操界の王者」としての地位を確立した。団体でも銀メダルを獲得し、日本体操の復活を印象づけた。","date":"2012年8月","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781232990434-h96cj","category":"スポーツ","title":"レスリング・吉田沙保里がロンドン五輪で3連覇→「霊長類最強女子」の称号","summary":"吉田沙保里がレスリング女子55kg級でカナダのトーニャ・バービークを破って金メダルを獲得し、アテネ・北京に続く五輪3連覇を達成。「霊長類最強女子」の異名で世界的な注目を集め、ロンドン五輪の日本の象徴的存在となった。","date":"2012年8月","source":"https://response.jp/article/2012/08/10/179535.html","confidence":"高","snippet":"","notes":""},{"id":"sports-1781232990441-3wr7k","category":"スポーツ","title":"サッカー男子日本代表がロンドン五輪で4強入り→韓国との3位決定戦に0-2で敗れ4位","summary":"ロンドン五輪サッカー男子でグループリーグでスペインを1-0で撃破する大金星を挙げた日本代表（関塚ジャパン）が44年ぶりの4強入りを達成。しかし準決勝でメキシコに1-3で敗れ、3位決定戦で韓国に0-2で敗れメダルには届かなかった。","date":"2012年8月","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781232990448-1xz26","category":"スポーツ","title":"香川真司がマンチェスター・ユナイテッドへ移籍→欧州最高峰クラブでリーグ優勝に貢献","summary":"2012年6月5日、香川真司がドルトムントからマンチェスター・ユナイテッドへの移籍が発表された。プレミアリーグでも活躍し、2012〜13シーズンのリーグ優勝に貢献。日本人選手が欧州最高峰のビッグクラブで結果を出したとして国内でも大きく注目された。","date":"2012年6月","source":"https://www.nikkei.com/article/DGXNSSXKC0584_V00C12A6000000/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781232990455-s8rwt","category":"芸能・エンタメ・ゴシップ","title":"スギちゃん「ワイルドだろぉ」が大流行→2012年流行語大賞年間大賞に","summary":"ワイルドなキャラクターで「〜だぜぇ」「ワイルドだろぉ」というフレーズが爆発的に流行し、バラエティ番組で引っ張りだこになったスギちゃんが、2012年ユーキャン新語・流行語大賞の年間大賞を受賞した。翌年以降は急速に忘れられたことも話題になった。","date":"2012年","source":"https://www.oricon.co.jp/news/2019302/full/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781232990462-iw8gr","category":"芸能・エンタメ・ゴシップ","title":"AKB48第4回選抜総選挙→大島優子が108,837票で1位・前田敦子は辞退し8月に卒業","summary":"2012年6月6日、東京・日本武道館で開催されたAKB48第4回選抜総選挙で大島優子が108,837票を獲得して1位に返り咲いた。卒業宣言していた前田敦子は出馬辞退。AKBを長年牽引してきた前田敦子は同年8月27日に最後の公演を終え卒業し、一時代の終わりとして大きく報じられた。","date":"2012年6月","source":"https://eiga.com/news/20120606/13/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781232990469-uw3yi","category":"芸能・エンタメ・ゴシップ","title":"映画「テルマエ・ロマエ」（阿部寛主演）が公開→興行収入59億円の大ヒット","summary":"ヤマザキマリ原作のマンガを実写化した「テルマエ・ロマエ」が2012年4月28日公開。古代ローマの浴場設計士が現代日本の風呂文化にタイムスリップするユニークな設定と阿部寛のはまり役が話題を呼び、最終興行収入59億円（動員約469万人）の大ヒットとなった。","date":"2012年4月","source":"https://eiga.com/news/20120613/3/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781232990476-m5y1j","category":"芸能・エンタメ・ゴシップ","title":"NHK朝ドラ「梅ちゃん先生」が平均視聴率20.7%の大ヒット→堀北真希が主演","summary":"2012年4月2日〜9月29日に放映されたNHK連続テレビ小説「梅ちゃん先生」（堀北真希主演）が関東地区平均視聴率20.7%を記録する大ヒットとなった。昭和の下町を舞台にした医師・梅子の奮闘が幅広い世代に受け、朝の国民的番組として話題を集めた。","date":"2012年4月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781232990483-7g9e0","category":"芸能・エンタメ・ゴシップ","title":"ドラマ「ドクターX〜外科医・大門未知子〜」第1シリーズが大ヒット→「私、失敗しないので」","summary":"米倉涼子主演のドラマ「ドクターX〜外科医・大門未知子〜」が2012年10月18日〜12月13日に放映され（全8話）、独立系外科医・大門未知子の「私、失敗しないので」が流行語に。平均視聴率19.1%・最高視聴率24.4%を記録し、民放連続ドラマ1位の大ヒット作となった。","date":"2012年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781232990490-len3p","category":"芸能・エンタメ・ゴシップ","title":"アニメ「ソードアート・オンライン」放映開始→ライトノベル原作アニメブームの牽引役に","summary":"川原礫原作のライトノベルをアニメ化した「ソードアート・オンライン（SAO）」が2012年7月から放映開始。MMORPGのゲーム世界に閉じ込められた主人公を描く世界観が国内外で爆発的に支持され、ライトノベル原作アニメが商業・文化的に主流となる潮流をつくった。","date":"2012年7月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781232990497-0cgdx","category":"芸能・エンタメ・ゴシップ","title":"映画「BRAVE HEARTS 海猿」が大ヒット→累計動員570万人・興行収入72億円","summary":"伊藤英明主演のシリーズ完結作「BRAVE HEARTS 海猿」が2012年7月13日公開。海上保安官たちの命を懸けた救助を描いた人気シリーズの集大成として累計動員570万人・興行収入72億円を記録し、3週連続で映画ランキング1位を達成する大ヒットとなった。","date":"2012年7月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781232990504-z8b8e","category":"芸能・エンタメ・ゴシップ","title":"のりピー（酒井法子）が執行猶予満了後に芸能界復帰→舞台主演で活動再開","summary":"2009年の覚醒剤取締法違反事件で有罪判決を受け芸能界を離れていた酒井法子が、2012年11月に3年間の執行猶予期間が終了した後、12月から舞台に主演して活動を再開した。「どんな顔で出てくるのか」と注目が集まり、関係者・ファンの反応が大きく報じられた。","date":"2012年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781232990511-tu7ln","category":"芸能・エンタメ・ゴシップ","title":"ももいろクローバーZが「ももいろクリスマス2012」をさいたまスーパーアリーナで開催→社会現象的人気に","summary":"「ももクロ」こと「ももいろクローバーZ」が2012年12月24〜25日にさいたまスーパーアリーナで「ももいろクリスマス2012」を開催し、各日1万6千人を動員した。ライブBlu-rayがオリコンDVD週間チャート1・2位を独占（10代アーティスト初）。AKBと異なるライブ重視路線が熱狂的な支持を集めた。","date":"2012年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781232990518-16vhi","category":"テクノロジー","title":"iPhone 5が日本で発売→LTE対応・長蛇の行列","summary":"2012年9月21日、アップルの「iPhone 5」がau・ソフトバンクから日本で発売。日本では初めてLTE（4G）通信に対応し大幅に速度が向上。全国の販売店に前日から徹夜の行列が並ぶ光景がニュースになり、スマートフォン普及を加速させた。","date":"2012年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781232990525-tsojk","category":"テクノロジー","title":"Facebookが株式上場→初日から株価急落・投資家への情報優遇が問題化","summary":"2012年5月18日、Facebookがナスダック市場に時価総額約10兆円規模で上場。世紀の大型上場として注目されたが初日から株価が急落し、大口機関投資家への情報優遇が問題化して投資家からの集団訴訟に発展。「世紀の上場の失敗」と皮肉られた。","date":"2012年5月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781232990532-xxexl","category":"国際","title":"オバマ米大統領が大統領選で再選→SNS・データ分析を活用した選挙戦が注目","summary":"2012年11月6日の米大統領選でバラク・オバマ大統領が共和党のミット・ロムニー候補を破り再選を果たした。オバマ陣営のSNS・ビッグデータを活用した選挙戦略が世界的に注目され、デジタル選挙の先進事例として各国の選挙手法に影響を与えた。","date":"2012年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781232990539-ugkjv","category":"国際","title":"習近平が中国共産党総書記に就任→「習近平時代」の幕開け","summary":"2012年11月、中国共産党第18回全国代表大会（18大）で習近平が党総書記・中央軍事委員会主席に就任した。翌2013年3月には国家主席にも就任し、その後の強権的な政治手法と長期政権化はこの就任を起点とした。","date":"2012年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781232990546-knpln","category":"国際","title":"シリア内戦が激化→国連が「内戦状態」と認定・難民が数十万人規模に","summary":"アサド政権と反政府勢力の戦闘が全土に拡大し、国連停戦監視団が撤退。国連は2012年6月に「内戦状態」と認定した。この年だけで約3万人以上が死亡し、数十万人の難民がトルコ・ヨルダン・レバノンへ流出。国際社会の対応の遅れも批判を浴びた。","date":"2012年6月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781232990553-dkmno","category":"国際","title":"北朝鮮が「光明星3号2号機」（銀河3号ロケット）の発射に成功→事実上の長距離弾道ミサイル技術を誇示","summary":"2012年12月12日、北朝鮮が「衛星打ち上げ」と称して光明星3号2号機を銀河3号ロケットで発射し、軌道投入に成功したと発表。NORADも成功を確認した。北朝鮮初の人工衛星軌道投入成功は事実上の長距離弾道ミサイル技術習得とみなされ、日本・米国・韓国が強く非難した。","date":"2012年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781317806931-ml307","category":"政治","title":"菅直人首相が震災・原発対応の混乱で批判を受け退陣→野田佳彦内閣が発足","summary":"東日本大震災・福島第一原発事故への対応をめぐり野党やマスコミから「菅おろし」と呼ばれる激しい退陣要求が高まり、菅直人首相は2011年8月30日に内閣総辞職した。同年9月2日、財務大臣を務めていた野田佳彦が首相に就任し新内閣を発足させた。","date":"2011年9月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781317806939-ya59p","category":"政治","title":"大阪府知事・市長のダブル選挙で橋下徹が大阪市長に当選→大阪維新の会が躍進","summary":"2011年11月27日投開票の大阪市長・府知事ダブル選挙で、府知事だった橋下徹が知事を辞職して市長選に立候補し当選。府知事選では維新幹事長の松井一郎が当選した。「大阪都構想」実現を掲げる大阪維新の会が地方政治の枠を超えて全国的に注目される存在となった。","date":"2011年11月","source":"https://www.nikkei.com/article/DGKKZO38172680W8A121C1EAC000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781317806946-1d8b8","category":"政治","title":"政府の原発事故対応「ただちに健康に影響はない」発言が後に問題視される","summary":"東日本大震災直後の福島第一原発事故をめぐり、政府・官房長官らが繰り返した「ただちに健康に影響を及ぼすものではない」という説明が、情報公開の不透明さの象徴として後に大きく批判された。SPEEDIによる放射性物質拡散予測の公表の遅れも問題視された。","date":"2011年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"politics-1781317806953-0yis9","category":"政治","title":"東日本大震災復興基本法が成立→復興庁設置に向けた議論が本格化","summary":"2011年6月20日、東日本大震災からの復興の基本方針を定める「東日本大震災復興基本法」が国会で成立した（同月24日施行）。復興施策を一元的に担う「復興庁」の設置に向けた検討が本格化し、復興財源としての特別税の議論も進んだ。","date":"2011年6月","source":"https://www.nikkei.com/article/DGXNASFS20020_Q1A620C1000000/","confidence":"高","snippet":"","notes":""},{"id":"politics-1781317806960-m195u","category":"政治","title":"野田首相がAPECでTPP交渉参加検討を表明→国内で賛否が激化","summary":"2011年11月11日、野田佳彦首相がホノルルでのAPEC首脳会議を前に記者会見し、環太平洋パートナーシップ協定（TPP）交渉参加に向けて関係国との協議に入ると表明した。農業団体を中心に「聖域なき関税撤廃で農業が壊滅する」と強い反対論が起こり、国内が二分された。","date":"2011年11月","source":"","confidence":"中","snippet":"","notes":""},{"id":"economy-1781317806967-9p04x","category":"経済","title":"東京電力が実質国有化への道→原子力損害賠償支援機構が設立","summary":"福島第一原発事故による巨額の賠償負担を抱えた東京電力を支援するため、2011年に「原子力損害賠償支援機構」が設立された。政府が資金援助の枠組みを整え、東電は事実上の管理下に置かれることになり、経営責任や電気料金への影響が大きな議論となった。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"economy-1781317806974-0r8a6","category":"経済","title":"オリンパス事件→歴代経営陣による巨額損失の長年の隠蔽が発覚","summary":"2011年8月に月刊誌FACTAが報じ、同年10月に就任直後の英国人社長マイケル・ウッドフォードが解任・内部告発したことで、オリンパスがM&Aを利用して過去のバブル期の投資損失を約20年にわたり隠蔽していたことが発覚した。歴代経営陣が刑事責任を問われる事態に発展した。","date":"2011年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"economy-1781317806981-51oj1","category":"経済","title":"大王製紙の井川意高前会長が子会社から総額106億円を不正に借り入れカジノに流用→逮捕","summary":"大王製紙の創業家出身で当時会長の井川意高が、2010年4月から2011年9月にかけて子会社7社から総額106億円を不正に借り入れ、海外カジノでの遊興費に流用したことが発覚。大王製紙は11月に特別背任で刑事告発し、井川は2011年11月22日に東京地検特捜部に逮捕された。","date":"2011年11月","source":"https://www.nikkei.com/article/DGXNASDG2201N_S1A121C1000000/","confidence":"高","snippet":"","notes":""},{"id":"economy-1781317806988-o0j2m","category":"経済","title":"歴史的な円高で一時1ドル=75円台→輸出企業の業績が圧迫される","summary":"東日本大震災後の円買いやギリシャ財政危機の影響で円高が進行し、2011年10月31日の東京外国為替市場で円相場が一時1ドル=75円32銭まで上昇し戦後最高値を更新した。トヨタ・ソニーなど輸出企業の業績が圧迫され、政府・日銀は大規模な為替介入に踏み切った。","date":"2011年10月","source":"https://www.nikkei.com/article/DGKKZO51572160Q9A031C1EAC000/","confidence":"高","snippet":"","notes":""},{"id":"society-1781317806995-9fdru","category":"社会","title":"福島第一原発事故でメルトダウン→政府が避難区域を設定し「炉心溶融」を後に公式に認める","summary":"東日本大震災で発生した福島第一原発事故では、1〜3号機で炉心溶融（メルトダウン）が発生。政府は警戒区域・計画的避難区域などを設定し住民の避難が長期化した。事故直後は「炉心溶融」という表現が避けられたが、後に東京電力・政府が正式に「メルトダウン」を認めた。","date":"2011年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781317807002-od2na","category":"社会","title":"「焼肉酒家えびす」集団食中毒事件→腸管出血性大腸菌O111で5人死亡","summary":"2011年4月、富山・福井・神奈川などの焼肉酒家えびすの店舗でユッケを食べた181人が腸管出血性大腸菌O111による食中毒となり、5人が死亡、24人が重症となった。生食用牛肉の安全管理体制の不備が問題視され、後に牛肝臓の生食提供禁止などの規制強化につながった。","date":"2011年4月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781317807009-1boho","category":"社会","title":"九州新幹線が全線開業→震災翌日でニュースが大震災一色に","summary":"2011年3月12日、九州新幹線が博多〜鹿児島中央間で全線開業した。本来であれば祝賀ムードで大きく報じられるはずだったが、前日に発生した東日本大震災の影響で開業セレモニーは中止・縮小され、報道はほぼ震災関連で占められた。","date":"2011年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781317807016-27nhd","category":"社会","title":"地上波テレビがアナログ放送を完全終了→デジタル放送に完全移行","summary":"2011年7月24日正午、東北3県（岩手・宮城・福島）を除く日本全国で地上アナログテレビ放送が完全終了し、地上デジタル放送への移行が完了した。震災の影響を受けた東北3県は2012年3月末まで移行が延期された。","date":"2011年7月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781317807023-uquua","category":"社会","title":"「絆」が2011年流行語大賞年間大賞に選出→震災後の日本を象徴する言葉に","summary":"東日本大震災を経て、被災地への支援や人と人とのつながりを表す言葉として広く使われた「絆」が、2011年のユーキャン新語・流行語大賞の年間大賞に選ばれた。震災後の日本社会の連帯意識を象徴する言葉として定着した。","date":"2011年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"society-1781317807030-rcnpi","category":"社会","title":"震災がれきの広域処理をめぐり受け入れ自治体で住民の反対運動が相次ぐ","summary":"東日本大震災で発生した膨大な災害がれきの処理を被災地以外の自治体でも分担する「広域処理」が政府により呼びかけられたが、放射性物質への懸念から受け入れを表明した自治体で住民説明会が紛糾するなど反対運動が相次ぎ、復興の遅れの一因として問題視された。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781317807037-vky8b","category":"スポーツ","title":"サッカー日本代表がアジアカップで優勝→ザッケローニ新監督初年度での快挙","summary":"2011年1月に開催されたAFCアジアカップカタール大会で、ザッケローニ新監督率いる日本代表が決勝でオーストラリアを延長戦で下し、史上最多4回目の優勝を果たした。新監督就任初年度でのタイトル獲得として大きく報じられた。","date":"2011年1月","source":"","confidence":"中","snippet":"","notes":""},{"id":"sports-1781317807044-nsv07","category":"スポーツ","title":"福岡ソフトバンクホークスが日本シリーズで日本一に→中日との激戦を制す","summary":"2011年の日本シリーズは中日ドラゴンズ（セ・リーグ優勝）と福岡ソフトバンクホークス（パ・リーグ優勝）が対戦し、ソフトバンクが4勝3敗で8年ぶり5度目の日本一に輝いた。シリーズMVPは小久保裕紀が獲得した。","date":"2011年11月","source":"https://npb.jp/nippons/2011/","confidence":"高","snippet":"","notes":""},{"id":"sports-1781317807051-obn3b","category":"スポーツ","title":"プロ野球の開幕が東日本大震災の影響で18日間延期→3月25日から4月12日へ","summary":"東日本大震災の発生を受け、当初3月25日に予定されていたプロ野球の開幕戦が4月12日へと約18日間延期された。計画停電下でのナイター開催の是非などをめぐりセ・パ両リーグの対応が分かれる場面もあったが、最終的に12球団がチャリティーオープン戦などを通じて震災復興支援に取り組んだ。","date":"2011年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807058-2h9oi","category":"芸能・エンタメ・ゴシップ","title":"AKB48第3回選抜総選挙→前田敦子が139,892票で1位に返り咲き","summary":"2011年6月9日、日本武道館で開票されたAKB48第3回選抜総選挙で、前田敦子が139,892票を獲得して2年連続の1位に返り咲いた。前回2位だった悔しさをバネに首位に返り咲いたことが「涙の復活」として大きく報じられた。","date":"2011年6月","source":"https://eiga.com/news/20110609/20/","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781317807065-8zqki","category":"芸能・エンタメ・ゴシップ","title":"子役・芦田愛菜と鈴木福が主演ドラマ「マルモのおきて」で大人気→国民的子役に","summary":"2011年に放映されたフジテレビ系ドラマ「マルモのおきて」で、当時6〜7歳の芦田愛菜と鈴木福が兄妹役として共演し国民的な人気を獲得。主題歌「マル・マル・モリ・モリ！」も大ヒットし、2人は紅白歌合戦に出場するなど社会現象になった。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807072-98aw8","category":"芸能・エンタメ・ゴシップ","title":"フジテレビの「韓流偏重」に抗議するデモがお台場本社前で発生→ネット発の抗議運動が拡大","summary":"俳優・高岡蒼佑が「韓流ドラマばかりのフジテレビは見ない」と発言したことが発端となり、2011年8月7日（約2500人参加）と8月21日にフジテレビ本社前で「韓流偏重」に抗議するデモが行われた。2ちゃんねるやツイッターの呼びかけで集まったネット発の抗議運動として注目された。","date":"2011年8月","source":"https://www.j-cast.com/2011/08/07103785.html","confidence":"高","snippet":"","notes":""},{"id":"entertainment-1781317807079-ixqni","category":"芸能・エンタメ・ゴシップ","title":"少女時代・KARAなどK-POPアーティストが日本で大ブレイク→「第2次韓流ブーム」","summary":"2011年、少女時代やKARAといった韓国の女性グループが日本でCDデビューし、紅白歌合戦にも出演するなど大きな人気を獲得した。テレビでは韓流ドラマ・K-POPの放送量が急増し、いわゆる「第2次韓流ブーム」が到来したと報じられた。一方でこれに対する反発がフジテレビ抗議デモにもつながった。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807086-td3l7","category":"芸能・エンタメ・ゴシップ","title":"歌舞伎俳優・市川海老蔵が暴行事件後の謹慎を経て舞台に復帰","summary":"2010年末に六本木で一般人男性に暴行を受け重傷を負った市川海老蔵が、芸能活動を一時自粛していたが、2011年に歌舞伎の舞台へ復帰した。事件をめぐる夜遊び・交友関係の報道が続いた中での復帰として大きく注目された。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807093-zvnks","category":"芸能・エンタメ・ゴシップ","title":"AKB48「ヘビーローテーション」など主要シングルが大ヒット→国民的アイドルに定着","summary":"2010年末発売の「ヘビーローテーション」をはじめ、2011年にリリースされたAKB48のシングルが軒並りミリオンセラーを記録。CD販売だけでなく握手会・総選挙といったビジネスモデルが確立し、AKB48グループは「国民的アイドル」としての地位を不動のものにした。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807100-huo3o","category":"芸能・エンタメ・ゴシップ","title":"木村拓哉主演ドラマ「南極大陸」が放映→豪華キャストと巨額制作費が話題に","summary":"2011年10月期にフジテレビ系で放映された木村拓哉主演のドラマ「南極大陸」は、南極観測隊と樺太犬を描いた感動作として注目された。1話あたり1億円規模ともいわれる巨額の制作費や豪華キャストが話題になった。","date":"2011年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807107-dlsei","category":"芸能・エンタメ・ゴシップ","title":"嵐が国民的人気アイドルとしての地位を確立→震災復興支援活動でも注目される","summary":"2011年、嵐はドラマ・音楽・CMなど多方面で活躍し国民的アイドルグループとしての地位を確立した。東日本大震災の発生後は、メンバーが復興支援のチャリティー活動・キャンペーンに積極的に取り組む姿勢が広く報じられ、グループのイメージ向上にもつながった。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807114-0fznz","category":"芸能・エンタメ・ゴシップ","title":"紅白歌合戦で東日本大震災の復興をテーマにした演出・楽曲が話題に","summary":"2011年12月31日放送の第62回NHK紅白歌合戦は、東日本大震災からの復興をテーマに構成され、被災地からの中継や復興応援ソングのパフォーマンスが組み込まれた。「震災後初めての年末」を象徴する特別な紅白として大きく報じられた。","date":"2011年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"entertainment-1781317807121-mpzyu","category":"芸能・エンタメ・ゴシップ","title":"市川海老蔵・小林麻央夫妻に関する報道が相次ぐ→人気夫婦として注目を集める","summary":"2010年末の暴行事件後に活動を自粛していた市川海老蔵と、その妻でフリーアナウンサーの小林麻央夫妻について、海老蔵の活動再開や夫婦の様子をめぐる報道が2011年も継続的に行われ、芸能ニュースとして高い関心を集めた。","date":"2011年","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781317807128-sc0cg","category":"テクノロジー","title":"アップル創業者スティーブ・ジョブズが死去→世界中で追悼の声","summary":"2011年10月5日、アップル創業者のスティーブ・ジョブズが膵臓がんのため56歳で死去した。iPhone・iPad・Macなどで世界のテクノロジー業界に革命をもたらした人物の死は世界中で大きく報じられ、各国メディアが特集を組んで追悼した。","date":"2011年10月","source":"","confidence":"中","snippet":"","notes":""},{"id":"tech-1781317807135-4d14t","category":"テクノロジー","title":"東日本大震災でTwitterが安否確認・情報インフラとして急速に普及","summary":"東日本大震災発生時、固定電話・携帯電話が輻輳して使えなくなる中、Twitterが安否確認や被災地情報の共有手段として急速に普及した。著名人や行政機関による情報発信も活発化し、SNSが災害時の重要な情報インフラとして広く認識されるきっかけとなった。","date":"2011年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781317807142-nv2rm","category":"国際","title":"「アラブの春」でチュニジア・エジプトの長期独裁政権が相次いで崩壊","summary":"2010年末にチュニジアで始まった反政府デモが「アラブの春」として中東・北アフリカ全体に広がり、2011年1月にチュニジアのベンアリ大統領が23年間の独裁政権を放棄して国外逃亡。続いて2月にはエジプトのムバラク大統領が30年にわたる長期政権を退陣に追い込まれた。","date":"2011年1月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781317807149-hg2g8","category":"国際","title":"米軍がオサマ・ビンラディンを殺害→9.11首謀者の最期","summary":"2011年5月2日（現地時間）、米軍特殊部隊がパキスタンのアボタバードでアルカイダ指導者オサマ・ビンラディンを殺害した。オバマ大統領が国民向けに緊急演説を行い発表。米国同時多発テロ事件の首謀者として10年近く逃亡を続けていた人物の最期として世界に大きく報じられた。","date":"2011年5月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781317807156-ho50e","category":"国際","title":"リビアのカダフィ大佐が反体制派に殺害される→42年間の独裁政権が崩壊","summary":"「アラブの春」の影響でリビアでも内戦が発生し、NATOの軍事介入もあって反体制派が首都トリポリを制圧。2011年10月20日、カダフィ大佐は出身地シルトで反体制派に拘束され殺害された。42年間続いた独裁政権はこれにより崩壊した。","date":"2011年10月","source":"https://www.bloomberg.com/jp/news/articles/2011-10-20/LTDOHD0UQVI901","confidence":"高","snippet":"","notes":""},{"id":"international-1781317807163-bqjx4","category":"国際","title":"ノルウェーで連続テロ事件→77人が死亡する爆破・銃撃事件","summary":"2011年7月22日、ノルウェーで極右思想の男によるテロ事件が発生。オスロの官庁街での爆破で8人、近郊ウトヤ島での銃乱射で69人が死亡し、計77人が犠牲となった。平和な北欧国家を襲った大規模テロとして世界に衝撃を与えた。","date":"2011年7月","source":"https://www.jcp.or.jp/akahata/aik11/2011-07-24/2011072401_07_1.html","confidence":"高","snippet":"","notes":""},{"id":"international-1781317807170-q7p6c","category":"国際","title":"北朝鮮の金正日総書記が死去→金正恩への権力継承が始まる","summary":"2011年12月17日、北朝鮮の金正日総書記が心筋梗塞のため死去した（69歳）。2日後の12月19日に朝鮮中央テレビが特別放送で死去を発表し、三男の金正恩中央軍事委員会副委員長への権力継承が示唆された。北朝鮮の今後の体制を巡り世界が注目した。","date":"2011年12月","source":"","confidence":"中","snippet":"","notes":""},{"id":"international-1781317807177-2en31","category":"国際","title":"米軍が東日本大震災で「トモダチ作戦」を展開→大規模な災害支援","summary":"東日本大震災発生直後、在日米軍は「Operation Tomodachi（トモダチ作戦）」と名付けた大規模な災害救援活動を展開した。空母ロナルド・レーガンなど艦船・航空機を投入し、物資輸送・捜索救助・燃料補給支援などを行い、日米同盟の重要性を再認識させる出来事として報じられた。","date":"2011年3月","source":"","confidence":"中","snippet":"","notes":""},{"id":"国際-1751100000001-a2k9p","category":"国際","title":"ハイチ大地震、死者31万人超の壊滅的被害","summary":"2010年1月12日、ハイチ首都ポルトープランス近郊でM7.1の大地震が発生。首都を中心に建物が倒壊し、ハイチ政府の最終発表で死者約31万6000人という近代最大級の地震被害となった。日本からも自衛隊や国際緊急援助隊が派遣された。","date":"2010年1月","source":"https://www.bousai.go.jp/kaigirep/hakusho/h22/bousai2010/html/honbun/2b_4s_1_03.htm","confidence":"高","snippet":"","notes":""},{"id":"経済-1751100000002-b3m4q","category":"経済","title":"JAL（日本航空）経営破綻、負債2兆3221億円で会社更生法申請","summary":"2010年1月19日、日本航空が東京地裁に会社更生法の適用を申請し経営破綻。負債総額2兆3221億円は製造業以外では戦後最大。稲盛和夫氏が会長に就任し再建を主導、翌2012年には再上場を果たした。","date":"2010年1月","source":"https://www.nikkei.com/article/DGKKZO11709300V10C17A1KB3000/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751100000003-c5n6r","category":"スポーツ","title":"高橋大輔、バンクーバー五輪で銅メダル　日本・アジア人男子初の冬季五輪フィギュア表彰台","summary":"2010年2月19日、カナダ・バンクーバー冬季五輪のフィギュアスケート男子で高橋大輔が銅メダルを獲得。日本人男子として初めて、またアジア人男子としても史上初の冬季五輪フィギュアスケートメダルとなった。","date":"2010年2月","source":"https://www.rbbtoday.com/article/2010/02/19/65802.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000004-d7p8s","category":"芸能・エンタメ・ゴシップ","title":"NHK朝ドラ「ゲゲゲの女房」が大ヒット、最終週視聴率23.6%で流行語大賞に","summary":"2010年3月29日〜9月25日放送のNHK連続テレビ小説「ゲゲゲの女房」（武良布枝原作、松下奈緒主演）が初回14.8%から最終週23.6%へV字回復。2010年ユーキャン新語・流行語大賞年間大賞に「ゲゲゲの〜」が選ばれた。","date":"2010年3月","source":"https://www.oricon.co.jp/news/82598/full/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751100000005-e9q0t","category":"社会","title":"宮崎県で口蹄疫が大流行、約29万7808頭を殺処分","summary":"2010年4月に宮崎県で口蹄疫が発生し急速に拡大。過去最大規模の感染となり、約29万7808頭の家畜が殺処分された。7月4日に終息宣言が出されたが、畜産農家への被害は甚大で国や県が多額の補償を実施した。","date":"2010年4月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000006-f1r2u","category":"芸能・エンタメ・ゴシップ","title":"沢尻エリカ、夫・高城剛との「離婚意思」を公表　正式離婚は2013年","summary":"2010年4月27日、女優・沢尻エリカが映画監督の高城剛との離婚の意思を公表した。「別居状態が続いている」とするコメントを発表し話題を集めたが、正式な離婚成立は2013年。その後芸能活動を再開し復帰を果たした。","date":"2010年4月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751100000007-g3s4v","category":"政治","title":"普天間基地の辺野古移設を日米合意、鳩山首相が「県外移設」公約を撤回し辞任","summary":"2010年5月28日、日米両政府が普天間基地の移設先を「名護市辺野古周辺」と明記した共同声明を発表。鳩山由紀夫首相は「最低でも県外」という総選挙での公約を撤回し、6月2日に辞意を表明。普天間問題が鳩山内閣崩壊の引き金となった。","date":"2010年5月","source":"https://www.nikkei.com/article/DGKKZO72310090X20C21A5EAC000/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751100000008-h5t6w","category":"テクノロジー","title":"iPad・iPhone4が日本で発売、スマートフォン普及が加速","summary":"2010年5月に初代iPadが日本で発売、同年6月24日にはiPhone 4が日本でも発売された。iPhone 4はカメラの高画質化やFaceTimeを搭載し、スマートフォンの認知が一気に広まるきっかけとなった。","date":"2010年5月","source":"https://dime.jp/genre/1529073/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751100000009-i7u8x","category":"政治","title":"菅直人内閣発足、鳩山辞任を受け民主党政権が続投","summary":"2010年6月4日、鳩山由紀夫首相の辞任を受けて菅直人が民主党代表に選出され、第94代内閣総理大臣に就任。「有言実行内閣」をスローガンに掲げ発足したが、直後の参院選で大敗してねじれ国会を抱えることになった。","date":"2010年6月","source":"https://www.nikkei.com/article/DGKKZO59914320T00C20A6EAC000/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751100000010-j9v0y","category":"スポーツ","title":"W杯南アフリカ大会で日本が海外開催初のベスト16、パラグアイにPK負け","summary":"2010年6月、南アフリカW杯で日本代表はカメルーン・デンマークに勝利しグループ突破。6月29日のラウンド16ではパラグアイと0-0でPK戦にもつれ込み、駒野友一がPKを外して3-5で敗退。海外W杯で初のベスト16進出となった。","date":"2010年6月","source":"https://www.jfa.jp/samuraiblue/worldcup_history/2010/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751100000011-k1w2z","category":"テクノロジー","title":"探査機「はやぶさ」が7年ぶりに地球帰還、世界初の小惑星サンプル採取に成功","summary":"2010年6月13日、小惑星探査機「はやぶさ」が約60億kmの旅を経て地球に帰還。カプセルがオーストラリアのウーメラ砂漠に着地し、小惑星「イトカワ」の微粒子が世界で初めて地球に持ち帰られた。数々のトラブルを乗り越えた帰還に日本中が感動した。","date":"2010年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000012-l3x4a","category":"芸能・エンタメ・ゴシップ","title":"AKB48第2回選抜総選挙、大島優子が1位で「神7」確立","summary":"2010年6月9日に開票されたAKB48第2回選抜総選挙で大島優子が1位を獲得。前田敦子・篠田麻里子らが上位に並び「神7」と呼ばれるメンバー構成が話題に。ファン参加型イベントとしてAKB48の人気をさらに押し上げた。","date":"2010年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751100000013-m5y6b","category":"スポーツ","title":"宮里藍、米女子ゴルフツアーで日本人初の世界ランキング1位を達成","summary":"2010年6月、宮里藍が米女子ゴルフツアー「ショップライト・クラシック」優勝後に世界ランキング1位となり、日本人初の記録を樹立。同年5勝を挙げ、シーズン最多勝利の日本人選手となった。","date":"2010年6月","source":"https://www.lpga.or.jp/news/info/39627","confidence":"高","snippet":"","notes":""},{"id":"政治-1751100000014-n7z8c","category":"政治","title":"参院選で民主党が大敗、「ねじれ国会」で菅政権が行き詰まり","summary":"2010年7月11日の参議院議員通常選挙で民主党は44議席にとどまり、51議席を獲得した自民党に大敗。菅直人首相が選挙直前に「消費税10%」に言及したことも影響した。衆参がねじれた「ねじれ国会」が菅政権の足枷となった。","date":"2010年7月","source":"https://imidas.jp/jijikaitai/c-40-065-10-07-g055","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000015-o9a0d","category":"芸能・エンタメ・ゴシップ","title":"岡村隆史（ナインティナイン）がうつ症状で活動休止、4ヶ月後に復帰","summary":"2010年7月15日、お笑いタレント・岡村隆史（ナインティナイン）がうつ状態による体調不良を理由に活動を休止。相方・矢部浩之の説得もあり休養し、11月27日放送の「めちゃ×2イケてるッ！」で約4ヶ月ぶりに復帰した。","date":"2010年7月","source":"https://renote.net/articles/199263","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000016-p1b2e","category":"芸能・エンタメ・ゴシップ","title":"宇多田ヒカルが「人間活動」宣言で無期限活動休止","summary":"2010年8月9日、宇多田ヒカルが公式サイトで「人間活動に専念するため」として音楽活動の無期限休止を宣言。「Flavor Of Life」などで一時代を築いたJ-POPの女王が突然の休止を表明し、ファンに衝撃が走った。活動再開は2016年。","date":"2010年8月","source":"https://www.oricon.co.jp/news/78897/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000017-q3c4f","category":"芸能・エンタメ・ゴシップ","title":"KARA・少女時代が日本デビュー、K-POPブームが本格化","summary":"2010年8月、韓国ガールズグループのKARAがシングル「ミスター」で、少女時代が「Gee」で相次いで日本デビュー。KARAは「バンビーナ」のヒップダンスが話題を呼び、少女時代はオリコン初登場2位を記録。第二次韓流ブームの幕開けとなった。","date":"2010年8月","source":"https://natalie.mu/music/news/33158","confidence":"高","snippet":"","notes":""},{"id":"国際-1751100000018-r5d6g","category":"国際","title":"チリ鉱山崩落、閉じ込められた33人が69日ぶりに全員生還","summary":"2010年8月5日、チリ北部のコピアポ鉱山で落盤事故が発生し作業員33人が地下約700mに閉じ込められた。世界中が固唾をのんで見守る中、10月13日に救出カプセル「フェニックス」で全員が生還。奇跡の救出劇として世界中で報道された。","date":"2010年8月","source":"https://www.nikkei.com/article/DGXNAS3MM1M01_T11C10A0MM0000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751100000019-s7e8h","category":"社会","title":"大阪地検・証拠改ざん事件、前田恒彦主任検事を逮捕","summary":"2010年9月21日、大阪地検特捜部の前田恒彦主任検事が、厚生労働省の郵便不正事件捜査に関連し証拠のフロッピーディスクのデータを改ざんしたとして証拠隠滅容疑で逮捕された。検察組織の信頼を揺るがす大スキャンダルとなり、特捜部長・副部長も逮捕された。","date":"2010年9月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751100000020-t9f0i","category":"政治","title":"尖閣沖で中国漁船が巡視船に衝突、映像がYouTubeに流出し政府が激震","summary":"2010年9月7日、尖閣諸島沖で中国漁船が海上保安庁の巡視船に衝突。政府は船長を逮捕したが外交圧力を受け処分保留で釈放。11月4日には「sengoku38」を名乗る海保職員がYouTubeに衝突映像を流出させ、政府の情報隠蔽姿勢に批判が集中した。","date":"2010年9月","source":"https://www.nikkei.com/article/DGXNASDG04066_U0A101C1CC1000/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000021-u1g2j","category":"芸能・エンタメ・ゴシップ","title":"押尾学、保護責任者遺棄罪で懲役2年6月の実刑判決","summary":"2010年9月17日、東京地裁は俳優・押尾学に対し、2009年に女性が知人女性に合成麻薬を渡して死亡させた事件に絡む保護責任者遺棄罪で懲役2年6月の実刑判決を言い渡した。当初報道された保護責任者遺棄致死は認められなかった。","date":"2010年9月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751100000022-v3h4k","category":"芸能・エンタメ・ゴシップ","title":"市川海老蔵、深夜の飲酒トラブルで左頬陥没骨折・出演自粛","summary":"2010年11月25日未明、歌舞伎俳優・市川海老蔵が東京都内のバーで複数の男性に暴行され、左頬陥没骨折などの重傷を負った。12月7日に妻・小林麻央と涙の記者会見を開き、舞台の出演を自粛。翌年に復帰した。","date":"2010年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1751100000023-w5i6l","category":"国際","title":"北朝鮮が韓国・延坪島を砲撃、民間人を含む4人死亡","summary":"2010年11月23日、北朝鮮が韓国西方の延坪島に向け約170発の砲撃を行い、韓国軍兵士2人と民間人2人の計4人が死亡、多数が負傷した。民間人が居住する韓国の島への砲撃は朝鮮戦争以来初めてで、朝鮮半島の緊張が一気に高まった。","date":"2010年11月","source":"https://www.jcp.or.jp/akahata/aik10/2010-11-24/2010112401_02_1.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1751100000024-x7j8m","category":"社会","title":"「食べるラー油」ブーム、桃屋の商品が品薄に　日経トレンディのヒット商品1位","summary":"2010年、桃屋の「辛そうで辛くない少し辛いラー油」が大ブレイク。「食べる」という新コンセプトが話題を呼び、品薄状態が続いた。日経トレンディ「2010年ヒット商品ベスト30」で第1位に選ばれ、エスビー食品など各社の類似品が続々登場した。","date":"2010年","source":"https://news.mynavi.jp/article/20101102-a070/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751100000025-y9k0n","category":"社会","title":"「イクメン」「女子会」「〜なう」が流行語、2010年を代表するキーワードに","summary":"2010年の新語・流行語大賞トップ10に「イクメン」「女子会」「〜なう。」が選出された。「イクメン」（育児を積極的にする男性）はつるの剛士、「〜なう」（Twitterの「今◯◯中」表現）はティーンの高校生が受賞。新しいライフスタイルや通信文化を映した言葉として定着した。","date":"2010年","source":"https://internet.watch.impress.co.jp/docs/news/410961.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1751100000026-z1l2o","category":"経済","title":"中国GDPが日本を抜き世界2位、42年ぶりに日本が3位転落","summary":"2010年の名目GDPで中国（5兆8786億ドル）が日本（5兆4742億ドル）を上回り、中国が世界第2位の経済大国となることが確定した（確定発表は2011年2月）。日本は1968年以来42年ぶりに世界3位となり、日中の経済力逆転が現実のものとなった。","date":"2010年","source":"https://www.nikkei.com/article/DGXNASGM1905R_Q1A120C1MM0000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000001-a1b2c","category":"社会","title":"年越し派遣村、リーマンショック後の派遣切りで日比谷公園に499人","summary":"2008年12月31日〜2009年1月5日、リーマンショック後の景気悪化で職と住居を失った派遣労働者らが日比谷公園に設置された「年越し派遣村」に最終的に499人が入村。「派遣切り」が社会問題化し、延べ約1700人のボランティアが支援した。","date":"2009年1月","source":"https://imidas.jp/hotkeyword/detail/F-00-306-09-01-H008.html","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000002-d3e4f","category":"国際","title":"オバマ大統領就任、米史上初の黒人大統領「チェンジ」旋風","summary":"2009年1月20日、民主党のバラク・オバマが第44代米大統領に就任。アフリカ系アメリカ人として初めて大統領に就いた。「チェンジ」を旗印に大統領選を制し、就任演説は世界で同時中継された。同年10月にはノーベル平和賞も受賞した。","date":"2009年1月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000003-g5h6i","category":"政治","title":"中川昭一財務相、G7後の「泥酔会見」でろれつ回らず辞任","summary":"2009年2月17日、麻生内閣の中川昭一財務相がローマのG7会議後の記者会見で目が虚ろで発言がしどろもどろ。「風邪薬のせい」と釈明したが映像が世界中に流れ大炎上。同日夜に辞表を提出した。当時の麻生内閣の求心力低下を招いた。","date":"2009年2月","source":"https://www.jcp.or.jp/akahata/aik07/2009-02-18/2009021801_01_0.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000004-j7k8l","category":"社会","title":"高速道路「ETC休日1000円」割引スタート、渋滞が社会問題化","summary":"2009年3月28日、政府の景気対策として高速道路のETC搭載車向け「休日1000円乗り放題」割引が開始（東名阪を除く）。行楽地への車が殺到し各地で記録的渋滞が発生。2011年6月まで実施された。","date":"2009年3月","source":"https://imidas.jp/genre/detail/L-121-0105.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1751200000005-m9n0o","category":"経済","title":"g.u.（ジーユー）の「990円ジーンズ」が大ヒット、デフレ象徴商品に","summary":"2009年3月10日、ユニクロのセカンドブランドg.u.（ジーユー）が990円ジーンズを発売。デフレ経済下の格安ファッションが話題を呼び、年間100万本を超える大ヒットに。「安くてもかわいい」とファッションの概念を変えた商品として注目された。","date":"2009年3月","source":"https://www.walkerplus.com/article/3691/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751200000006-p1q2r","category":"スポーツ","title":"WBC第2回大会で日本が連覇、イチロー決勝の勝ち越し打","summary":"2009年3月23日、ロサンゼルスでのWBC決勝で日本が韓国と対戦。延長10回2死二三塁からイチローがセンター前に2点タイムリーを放ち5-3で勝利、大会連覇を達成。試合後イチローは「神様が降りてきた」と語った。","date":"2009年3月","source":"https://spaia.jp/column/baseball/samurai_japan/2939","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000007-s3t4u","category":"芸能・エンタメ・ゴシップ","title":"SMAP草なぎ剛、泥酔全裸で公園を走り公然わいせつで逮捕","summary":"2009年4月23日深夜、SMAP・草なぎ剛が東京ミッドタウン横の檜町公園で全裸で騒いでいたところを近隣住民の通報で現行犯逮捕。麻生首相が「最低」と批判するなど大騒動に。5月1日に不起訴（起訴猶予）処分。5月28日に活動再開した。","date":"2009年4月","source":"https://www.j-cast.com/2009/05/01040565.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000008-v5w6x","category":"芸能・エンタメ・ゴシップ","title":"スーザン・ボイル、「ブリテンズ・ゴット・タレント」で衝撃デビュー・世界中が泣いた","summary":"2009年4月11日、英国のオーディション番組「ブリテンズ・ゴット・タレント」に現れた素人くさい見た目の47歳女性・スーザン・ボイルが「夢やぶれて」を歌い始めた瞬間、審査員と観客が驚愕。動画がYouTubeで爆発的に拡散し日本でも大きな話題となった。","date":"2009年4月","source":"https://www.worldfolksong.com/popular/musical/les-miserables/susan-boyle.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000009-y7z8a","category":"芸能・エンタメ・ゴシップ","title":"「こども店長」加藤清史郎、トヨタCMで国民的人気に　流行語大賞トップテン","summary":"2009年4月5日から放送開始のトヨタ自動車CMで小学生・加藤清史郎が演じる「こども店長」が大人気に。赤いジャケット姿でディーラーを仕切る姿が可愛いと話題となり、2009年新語・流行語大賞のトップテンに選出された。","date":"2009年4月","source":"https://www.oricon.co.j
