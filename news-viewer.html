var DATA=[{"id":"国際-1779292623663-drtmi","category":"国際","title":"トランプ大統領が中国を訪問——習近平主席と首脳会談、大豆・牛肉購入や貿易委員会の設立を協議","summary":"ドナルド・トランプ米大統領は5月13日に北京に到着し、14〜15日の日程で習近平国家主席と首脳会談を行った。会談では貿易摩擦の解消策として中国による米国産大豆・牛肉・航空機の購入約束と、両国間の貿易委員会の設立が協議された。ルビオ国務長官、ベッセント財務長官、ヘグセス国防長官らが同行。大きな合意には至らなかったが米中関係の安定化を確認した。","date":"2026年5月14日（木）","source":"https://news.yahoo.co.jp/articles/affe3ef370dea4d2b1ea062443905a22126a11f8","confidence":"高"},{"id":"政治-1779292623666-811jg","category":"政治","title":"ベッセント米財務長官が訪日——高市首相・片山財務相・茂木外相らと米中首脳会談前に日米連携を確認","summary":"スコット・ベッセント米財務長官は5月11〜15日の日程で日本を訪れ、12日に高市早苗首相を表敬訪問した。片山さつき財務相、赤澤亮正経産相、茂木敏充外相とも相次いで会談し、日米投資プログラム・重要鉱物・サプライチェーン強靭化・AIサイバー脅威への対応などを協議。米中首脳会談（5/14〜15）を前に日米の緊密な連携を確認した。","date":"2026年5月12日（火）","source":"https://www.jetro.go.jp/biznews/2026/05/655bddeb59589e1f.html","confidence":"高"},{"id":"政治-1779292623666-tnmah","category":"政治","title":"国家情報会議創設法案が参院で本格審議入り——インテリジェンス機能の司令塔創設へ、4月に衆院通過","summary":"政府のインテリジェンス（情報収集・分析）機能を一元管理する司令塔「国家情報会議」を創設する法案が、4月23日の衆院通過に続き、5月8日から参院で審議入りした。高市内閣が今通常国会の重点法案に位置づけており、与野党が組織のあり方や文民統制のあり方をめぐって論戦を繰り広げた。","date":"2026年5月11日（月）","source":"https://www.policynews.jp/schedule/2026/005.html","confidence":"高"},{"id":"政治-1779292623666-psxox","category":"政治","title":"新潟県知事選が告示——5月31日投開票に向け、現職と新人が政策論争","summary":"任期満了に伴う新潟県知事選挙が5月14日に告示され、5月31日の投開票に向けて選挙戦がスタートした。エネルギー政策・農業振興・人口減少対策などを争点に、現職と新人候補が舌戦を繰り広げた。参院選を前に各党が力を入れる重要な地方選挙として全国から注目が集まった。","date":"2026年5月14日（木）","source":"https://www.policynews.jp/schedule/2026/005.html","confidence":"高"},{"id":"経済-1779292623666-d6n11","category":"経済","title":"第一三共が2026年3月期決算を発表——ADC供給計画見直しで約950億円の損失計上、税引前利益25.9%減","summary":"第一三共は5月11日に発表を延期していた2026年3月期連結決算を発表した。抗体薬物複合体（ADC）製品の供給計画見直しに伴い、製造委託先への損失補償引当金として約757億円、小田原工場のADC関連設備の減損・補償金として約193億円の合計約950億円を計上。税引前利益は前期比25.9%減の約2,634億円となり、市場予想を下回った。","date":"2026年5月11日（月）","source":"https://nk.jiho.jp/article/301961","confidence":"高"},{"id":"経済-1779292623666-y9qvt","category":"経済","title":"JX金属が東邦チタニウムを株式交換で完全子会社化——5月28日付で東証上場廃止","summary":"JX金属は連結子会社の東邦チタニウムを株式交換により完全子会社化することを決定し、東邦チタニウムの東証スタンダード市場への上場は5月28日付で廃止されることとなった。航空機・半導体向けなどチタン需要の高まりを背景に、グループとして製造・調達を一元管理し競争力を高める狙い。","date":"2026年5月中旬","source":"https://masouken.com/%E8%B2%B7%E5%8F%8E%E3%81%AE%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9","confidence":"中"},{"id":"経済-1779292623666-e09f9","category":"経済","title":"マブチモーターが食品機械メーカー・マスダックを完全子会社化——精密モーター技術を食品分野に応用","summary":"精密小型モーター大手のマブチモーターは、食品機械メーカーの株式会社マスダックの発行済み全株式を取得し完全子会社化することを決定した。モーター制御技術と食品機械製造の融合による高付加価値製品の開発を目指し、事業領域を広げる戦略的なM&Aとなる。","date":"2026年5月中旬","source":"https://masouken.com/%E8%B2%B7%E5%8F%8E%E3%81%AE%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9","confidence":"中"},{"id":"社会-1779292623666-0rklt","category":"社会","title":"辺野古沖転覆事故——海上保安庁が生徒撮影の動画を解析、事故直前の状況を分析","summary":"2026年3月16日に名護市辺野古沖で研修旅行中の同志社国際高校生らを乗せた船2隻が転覆し、女子生徒と船長が死亡した事故で、海上保安庁は5月16日、乗船していた生徒が撮影した動画を解析し事故直前の海況や船の状態を調査していることが明らかになった。波浪注意報が出ていた中での出港判断の妥当性が引き続き焦点となっている。","date":"2026年5月16日（土）","source":"https://www.qab.co.jp/news/20260415290427.html","confidence":"中"},{"id":"社会-1779292623666-a8wc2","category":"社会","title":"栃木・上三川の住宅で強盗殺人——指示役の28歳男性ら夫婦を逮捕","summary":"栃木県上三川町の住宅で69歳の女性が殺害された事件で、栃木県警は指示役とされる28歳の男性とその妻（25）を強盗殺人容疑で逮捕した。組織的な関与が疑われており、警察は共犯者の全容解明を進めている。高齢者をターゲットにした組織的犯罪への警戒が改めて強まっている。","date":"2026年5月中旬","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"社会-1779292623666-s2i46","category":"社会","title":"福島・磐越道でマイクロバス横転——高校生1人死亡、68歳運転手を自動車運転処罰法違反で逮捕","summary":"福島県郡山市内の磐越自動車道で生徒を乗せたマイクロバスが横転する事故が発生し、高校生1人が死亡した。福島県警は乗客の安全を怠ったとして68歳の男性運転手を自動車運転処罰法違反（過失致死）の容疑で逮捕した。部活動・学校行事でのバス移動における安全管理のあり方が問われている。","date":"2026年5月中旬","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"社会-1779292623666-dwji8","category":"社会","title":"水俣病の公式確認から70年——国・熊本県・チッソが参加する式典を開催","summary":"1956年5月1日に水俣病が公式に確認されてから2026年で70年の節目を迎えた。熊本県水俣市では5月1日を中心に政府・熊本県・原因企業チッソの代表が参加する慰霊式が開かれ、被害者団体への補償と地域の環境再生・教訓の継承について確認された。未認定患者問題など残る課題の解決も引き続き求められた。","date":"2026年5月11日（月）","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"スポーツ-1779292623666-f6rdd","category":"スポーツ","title":"サッカー日本代表が2026年W杯メンバー26人を発表——遠藤航・久保建英ら欧州組中心に選出","summary":"日本サッカー協会は5月15日、6月11日開幕のFIFAワールドカップ2026（北中米大会）に挑む日本代表メンバー26人を発表した。GK3人・DF9人・MF/FW14人の編成で、遠藤航（リバプール）・久保建英（レアル・ソシエダード）・冨安健洋（アヤックス）など欧州主要クラブで活躍する選手が大多数を占めた。大会は6月11日から7月19日まで行われる。","date":"2026年5月15日（金）","source":"https://www.jfa.jp/samuraiblue/news/00036338/","confidence":"高"},{"id":"スポーツ-1779292623666-2cw8i","category":"スポーツ","title":"大相撲夏場所が国技館で開幕——横綱・豊昇龍が綱の重みを背負い初日に登場","summary":"大相撲令和8年夏場所（5月10〜24日、両国国技館）が5月10日に初日を迎えた。1月の初場所で優勝し第74代横綱に昇進した豊昇龍が、横綱として初の東京本場所に臨む。前頭・大関陣との上位対決が見どころで、2場所連続優勝を目指す豊昇龍の横綱としての資質が問われる15日間となる。","date":"2026年5月10日（日）","source":"https://times.abema.tv/articles/-/10242099","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-8pav7","category":"芸能・エンタメ・ゴシップ","title":"声優・山崎和佳奈さんが死去——「名探偵コナン」毛利蘭役を約30年、4月18日逝去・61歳","summary":"「名探偵コナン」の毛利蘭役などで知られる声優の山崎和佳奈さんが4月18日に死去していたと、5月15日に所属事務所・青二プロダクションが発表した。61歳だった。病名は非公表。1996年のコナン放送開始から約30年にわたって毛利蘭を担当し、2月から病気療養中だった。同役は3月14日放送回より岡村明美が代役を務めている。","date":"2026年5月15日（金）","source":"https://www.nikkei.com/article/DGXZQOUD156SR0V10C26A5000000/","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-25p7e","category":"芸能・エンタメ・ゴシップ","title":"王林がモデル・佐藤ショーン玲央と熱愛——事務所も交際を否定せず、結婚の可能性も報道","summary":"タレントの王林（25）がモデルの佐藤ショーン玲央との交際が複数のメディアで報じられ、王林の所属事務所は「否定しない」との立場を示した。王林はバラエティでの活躍に加えSNSでも高い人気を誇り、熱愛報道に多くのファンが反応した。","date":"2026年5月15日（金）","source":"https://www.oricon.co.jp/entertainment/","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-9jx1e","category":"芸能・エンタメ・ゴシップ","title":"B'z・稲葉浩志の軽井沢別荘建設で近隣トラブル——週刊新潮が報道、警察が出動","summary":"週刊新潮は5月13日発売号で、ロックバンドB'zのボーカル稲葉浩志が軽井沢に建設中の約10億円とされる別荘をめぐり、工事の騒音・工期の問題で近隣住民とトラブルになったと報道。警察が現場に出動する事態となったとされる。稲葉側の公式なコメントは出ていない。","date":"2026年5月13日（水）","source":"https://www.shinchosha.co.jp/shukanshincho/","confidence":"中"},{"id":"テクノロジー-1779292623667-6at27","category":"テクノロジー","title":"Nintendo Switch 2が5月25日から59,980円に値上げ——半導体高騰・円安・関税で1万円アップ","summary":"任天堂は5月8日、Nintendo Switch 2（国内版）の価格を5月25日から現行の49,980円から59,980円へ1万円値上げすると発表した。理由は半導体メモリ価格の高騰・円安・関税によるコスト増（年間約1,000億円超）。Nintendo Switch Online料金も7月1日から値上げ。値上げ前の駆け込み購入が各店舗で相次いだ。","date":"2026年5月11日（月）","source":"https://www.nintendo.co.jp/corporate/release/en/2026/260508.html","confidence":"高"},{"id":"テクノロジー-1779292623667-qesfy","category":"テクノロジー","title":"デジタル庁が行政向け生成AI「ガバメントAI・源内」を開発——全省庁の業務効率化を目指す","summary":"デジタル庁は行政職員が業務で生成AIを安全に活用するため、AIアプリと連携した政府専用の生成AIシステム「ガバメントAI・源内」を開発した。文書作成・情報収集・法令照会などの業務効率化を目指し、全省庁での段階的な展開を進める。セキュリティとハルシネーション対策を重視した設計となっている。","date":"2026年5月中旬","source":"https://www.digital.go.jp/news/","confidence":"中"},{"id":"テクノロジー-1779292623667-exba0","category":"テクノロジー","title":"Anthropicが企業評価額9,000億ドル超での大型資金調達交渉——AI産業への投資が加速","summary":"Claude（クロード）を開発する米AI企業Anthropicが、企業評価額9,000億ドル（約140兆円）超での新規資金調達を目指して大手投資家と交渉中であることが報じられた。OpenAIのGPTと並ぶ高性能AIとして企業・行政で採用が拡大しており、AI産業全体への投資規模が急速に膨らんでいる実態が浮き彫りになった。","date":"2026年5月中旬","source":"https://note.com/yume_verse_/n/n349efe2d3521","confidence":"中"}];

function dn(l){var p=pd(l);if(!p)return 0;return Number(p.y)*10000+Number(p.mo)*100+Number(p.d);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function hl(t,q){if(!q||!q.trim())return esc(t);var kw=q.trim();var lo=t.toLowerCase();var lk=kw.toLowerCase();var o="",i=0,idx,n=0;while((idx=lo.indexOf(lk,i))!==-1&&n<50){if(idx>i)o+=esc(t.slice(i,idx));o+="<mark>"+esc(t.slice(idx,idx+kw.length))+"</mark>";i=idx+kw.length;n++;}if(i<t.length)o+=esc(t.slice(i));return o;}
function uniq(a){return Array.from(new Set(a));}
function filtered(){var qt=st.q.trim().toLowerCase();return DATA.filter(function(n){var p=pd(n.date);return(st.fCat==="すべて"||n.category===st.fCat)&&(st.fYear==="すべて"||(p&&p.y===st.fYear))&&(st.fMonth==="すべて"||(p&&p.mo===st.fMonth))&&(!qt||n.title.toLowerCase().indexOf(qt)>=0||n.summary.toLowerCase().indexOf(qt)>=0);}).sort(function(a,b){var c=st.sort==="desc"?dn(b.date)-dn(a.date):dn(a.date)-dn(b.date);return c!==0?c:a.category.localeCompare(b.category);});}
function render(){
  document.getElementById("totalNum").textContent=DATA.length;
  var years=uniq(DATA.map(function(n){var p=pd(n.date);return p?p.y:null;}).filter(Boolean)).sort(function(a,b){return b.localeCompare(a);});
  var months=uniq(DATA.filter(function(n){if(st.fYear==="すべて")return true;var p=pd(n.date);return p&&p.y===st.fYear;}).map(function(n){var p=pd(n.date);return p?p.mo:null;}).filter(Boolean)).sort(function(a,b){return Number(a)-Number(b);});
  var fCatEl=document.getElementById("fCat");
  fCatEl.innerHTML='<option value="すべて">カテゴリ</option>';
  CATS.forEach(function(c){fCatEl.innerHTML+='<option value="'+c+'"'+(st.fCat===c?" selected":"")+'>'+c+'</option>';});
  var fYearEl=document.getElementById("fYear");
  fYearEl.innerHTML='<option value="すべて">年</option>';
  years.forEach(function(y){fYearEl.innerHTML+='<option value="'+y+'"'+(st.fYear===y?" selected":"")+'>'+y+'年</option>';});
  var fMonthEl=document.getElementById("fMonth");
  fMonthEl.innerHTML='<option value="すべて">月</option>';
  months.forEach(function(m){fMonthEl.innerHTML+='<option value="'+m+'"'+(st.fMonth===m?" selected":"")+'>'+m+'月</option>';});
  document.getElementById("q").value=st.q;
  document.getElementById("sortBtn").textContent=st.sort==="desc"?"↓新しい順":"↑古い順";
  var f=filtered();
  document.getElementById("cnt").textContent=f.length+"件 / 全"+DATA.length+"件";
  var list=document.getElementById("list");
  if(f.length===0){list.innerHTML='<div class="empty">条件に一致するニュースがありません</div>';return;}
  var html="";
  f.forEach(function(item,idx){
    var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
    html+='<div class="card" data-idx="'+idx+'"><div class="bar" style="background:'+c+'"></div><div class="body"><div class="meta"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">'+esc((item.date||"").replace(/（.）/,""))+'</span><span class="cf" style="color:'+cfc+'"><span class="dot" style="background:'+cfc+'"></span>'+esc(cf)+'</span>'+(hasSrc?'<span style="color:#2980b9;font-size:10px">🔗</span>':"")+' </div><p class="tt">'+hl(item.title,st.q)+'</p><p class="sm">'+hl(item.summary,st.q)+'</p></div></div>';
  });
  list.innerHTML=html;
  Array.prototype.forEach.call(document.querySelectorAll(".card"),function(el){
    el.addEventListener("click",function(){openDetail(f[Number(el.getAttribute("data-idx"))]);});
  });
}
function openDetail(item){
  var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
  var dlg=document.getElementById("dlg");
  dlg.innerHTML='<div class="top" style="background:'+c+'"></div><div class="pad"><div class="hd"><div class="meta2"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">📅 '+esc((item.date||"").replace(/（.）/,""))+'</span></div><button class="cls" id="closeBtn">×</button></div><h3>'+hl(item.title,st.q)+'</h3><div class="sm2">'+hl(item.summary,st.q)+'</div>'+(hasSrc?'<div class="src"><div style="font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600">📎 ソース</div><a href="'+esc(item.source)+'" target="_blank" rel="noopener noreferrer">'+esc(item.source)+'</a></div>':"")+' <div class="ft"><button class="cp" id="cpBtn">📋 内容をコピー</button></div><p class="note">背景クリック または ×で閉じる</p></div>';
  document.getElementById("modal").classList.add("open");
  document.getElementById("closeBtn").addEventListener("click",closeDetail);
  document.getElementById("cpBtn").addEventListener("click",function(){
    var txt="【"+item.category+"】"+item.title+"\n"+(item.date||"")+"\n\n"+item.summary+(hasSrc?"\n\nソース: "+item.source:"");
    if(navigator.clipboard)navigator.clipboard.writeText(txt);
    var b=document.getElementById("cpBtn");b.textContent="コピー済み ✓";b.classList.add("done");
    setTimeout(function(){if(document.getElementById("cpBtn")){document.getElementById("cpBtn").textContent="📋 内容をコピー";document.getElementById("cpBtn").classList.remove("done");}},1800);
  });
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.getElementById("dlg").innerHTML="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeDetail();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDetail();});
document.getElementById("fCat").addEventListener("change",function(e){st.fCat=e.target.value;render();});
document.getElementById("fYear").addEventListener("change",function(e){st.fYear=e.target.value;st.fMonth="すべて";render();});
document.getElementById("fMonth").addEventListener("change",function(e){st.fMonth=e.target.value;render();});
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});
document.getElementById("sortBtn").addEventListener("click",function(){st.sort=st.sort==="desc"?"asc":"desc";render();});
render();
</script>
</body>
</html>
