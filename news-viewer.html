{"id":"2026-03-15-soc-004","category":"社会","title":"数学者・広中平祐氏が94歳で死去 日本人3人目のフィールズ賞受賞者","summary":"代数幾何学の難問「代数多様体の特異点解消」を証明し1970年にフィールズ賞を受賞した世界的数学者・広中平祐（ひろなか へいすけ）京都大学名誉教授が、3月17日に94歳で死去した。1931年山口県生まれ。ハーバード大学教授も務め、日本人として3人目のフィールズ賞受賞者として知られた。","date":"2026-03-17","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"代数幾何学の難問を解いてフィールズ賞を受賞した世界的数学者・広中平祐京都大学名誉教授が94歳で死去した。"},{"id":"2026-03-15-soc-005","category":"社会","title":"国内45年ぶり新種の鳥「トカラムシクイ」を確認 鹿児島・トカラ列島で発見","summary":"鹿児島県のトカラ列島で繁殖する渡り鳥が新種として「トカラムシクイ（学名：Phylloscopus tokaraensis）」と認定され、国際的な学術誌に掲載された。国内での新学名報告は45年ぶりとなる快挙。鳴き声や羽毛の色、遺伝子解析で既知のムシクイ類との違いが確認された。","date":"2026-03-17","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"鹿児島県・トカラ列島で繁殖する渡り鳥が新種として認定され、国内での新学名報告は45年ぶりとなった。"},{"id":"2026-03-15-spo-001","category":"スポーツ","title":"WBC2026 侍ジャパンが準々決勝でベネズエラに5-8で逆転負け 2連覇・4強入りならず","summary":"野球のWBC（ワールドベースボールクラシック）2026で、日本代表（侍ジャパン）は準々決勝を米フロリダ州マイアミのローンデポ・パークでベネズエラと戦い5-8で逆転負けを喫した。大谷翔平が1回に先制ソロ本塁打、森下翔太が3回にスリーランを放ちリードしたが、5〜6回のベネズエラの集中打に屈した。日本の2連覇は途絶え、初の4強入りも逃した。","date":"2026-03-15","source":"https://www.tv-tokyo.co.jp/sports/articles/2026/03/041345.html","confidence":"高","snippet":"日本は序盤に大谷翔平・森下翔太の本塁打でリードするも、5回・6回にベネズエラが集中打で逆転。最終スコアは5-8で日本が敗退し、2連覇と初の4強入りの両方が途絶えた。"},{"id":"2026-03-15-spo-002","category":"スポーツ","title":"WBC2026決勝 ベネズエラがアメリカを下し悲願の初優勝 WBC史上初の南米チャンピオン","summary":"WBC（ワールドベースボールクラシック）2026の決勝がマイアミで行われ、ベネズエラがアメリカを破り大会史上初の優勝を飾った。ベネズエラは準々決勝で日本を8-5で退け、決勝まで勝ち上がった。WBC史上初の南米チャンピオンの誕生となり、日本・韓国・プエルトリコ・ドミニカ共和国・アメリカ・キューバ以外の初制覇となった。","date":"2026-03-18","source":"https://www.nikkei.com/article/DGXZQODH165110W6A310C2000000/","confidence":"高","snippet":"WBC2026でベネズエラが初優勝。日本は8強で敗退した。ベネズエラは大会史上初の南米チャンピオンとなった。"},{"id":"2026-03-15-ent-001","category":"芸能・エンタメ・ゴシップ","title":"BTS 約4年ぶりに全員が活動再開 ソウル光化門広場での復帰公演に10万人超・Netflix全世界配信","summary":"韓国の人気グループBTSが3月21日、ソウルの光化門広場で復帰公演「BTS THE COMEBACK LIVE｜ARIRANG」を開催した。兵役休止から全7人が約3年9ヶ月ぶりに再集結し、約10万4000人が観客として参加。Netflixが初の単独アーティストライブ配信として190カ国以上に中継した。前日20日にリリースした新アルバム「ARIRANG」は発売当日に約398万枚を売り上げ、自己記録を更新した。","date":"2026-03-21","source":"https://ototoy.jp/news/129196","confidence":"高","snippet":"BTS全7人が約3年9ヶ月ぶりに再集結した光化門広場公演に約10万4000人が参加。NetflixがWORLD初となる単独アーティストLIVEを190カ国以上に配信。新アルバム「ARIRANG」は発売日に約398万枚の自己最高記録を達成。"},{"id":"2026-03-15-tec-001","category":"テクノロジー","title":"ソフトバンク孫正義会長 米オハイオ州に5000億ドル（約80兆円）のAIデータセンター投資構想発表 日米21社参画","summary":"ソフトバンクグループの孫正義会長は3月20日、米オハイオ州パイクタウンシップに5000億ドル（約80兆円）規模のAI向けデータセンターを建設する投資構想を発表した。単一拠点への投資としては人類史上最大規模とされ、孫会長は「この一拠点だけで既存のAIデータセンター全体よりも大きくなる」と語った。日米21社のエネルギー・金融機関が参画する組織が新たに発足した。","date":"2026-03-20","source":"https://www.nikkei.com/article/DGXZQOGN2035V0Q6A320C2000000/","confidence":"高","snippet":"孫正義会長が米オハイオ州に5000億ドル（約80兆円）のAIデータセンター投資構想を発表。「単一拠点への投資としては史上最大規模」。エネルギー・金融機関など日米21社が参画する組織が発足した。"},{"id":"2026-03-15-tec-002","category":"テクノロジー","title":"楽天「Rakuten AI 3.0」提供開始 7000億パラメータの国産最大LLM 日本語でGPT-4o超えの性能","summary":"楽天グループは3月17日、国産最大規模の大規模言語モデル「Rakuten AI 3.0」の提供を開始した。GENIACプロジェクト（経済産業省・NEDO支援）の一環で開発された約7000億パラメータのMoE（Mixture of Experts）アーキテクチャを採用。日本語の複数ベンチマークでGPT-4oを上回る性能を発揮し、Apache 2.0ライセンスで商用利用も無償で可能。Hugging Face上でダウンロードできる。","date":"2026-03-17","source":"https://corp.rakuten.co.jp/news/press/2026/0317_01.html","confidence":"高","snippet":"GENIACプロジェクトの一環として開発された国内最大規模のAIモデル「Rakuten AI 3.0」の提供を開始。約7000億パラメータのMoEアーキテクチャを採用し、日本語ベンチマークでGPT-4oを上回る性能。Apache 2.0ライセンスで商用・無償利用が可能。"},{"id":"2026-03-15-tec-003","category":"テクノロジー","title":"国産通話アプリ「POPOPO」発表 川上量生・庵野秀明ら参加のITベンチャー アバター通話を提供","summary":"「ニコニコ動画」創設者の川上量生氏や「エヴァンゲリオン」監督の庵野秀明氏らが参加する国産ITベンチャーが3月18日、アバターを使ったプライベート通話アプリ「POPOPO」を発表した。実名や顔を公開せずにアバターで通話できるサービスで、プライバシーを重視したコミュニケーションツールとして注目を集めた。","date":"2026-03-18","source":"","confidence":"中"},{"id":"2026-03-15-int-001","category":"国際","title":"米・イスラエルのイラン軍事行動が継続 ホルムズ海峡封鎖で世界のエネルギー輸送に深刻影響","summary":"2月28日に始まった米国とイスラエルによるイラン軍事行動から約3週間が経過した3月中旬時点で、戦闘はイラン本土・レバノン・イエメン周辺に拡大を続けていた。ハーメネイー師の死亡後、IRGC司令官ら要人の殺害も相次いだ。ホルムズ海峡では商船の通航制限が続き、原油・LNG輸送に支障が生じ、アジアや欧州を含む国際物流とエネルギー市場に波及。日本のガソリン価格が史上最高値を更新するなど国内経済にも打撃を与えている。","date":"2026-03-17","source":"https://www.jetro.go.jp/biznews/2026/03/700780f3729fbc18.html","confidence":"高","snippet":"米国とイスラエルはイランの国家中枢と軍事能力などを中心に攻撃。ホルムズ海峡では商船通航の制限が続き、原油や液化天然ガスの輸送に支障が生じ、アジアや欧州を含む国際物流とエネルギー市場に影響が波及している。"},{"id":"2026-03-08-pol-001","category":"政治","title":"衆院本会議が2026年度予算案を賛成多数で可決・参院に送付","summary":"衆議院本会議は3月13日、2026年度（令和8年度）一般会計総額112兆8665億円の予算案を与党の賛成多数で可決し、参議院に送付した。衆院予算委員会では3月8日の地方公聴会（岩手・鹿児島）を皮切りに、3月9〜10日の集中審議・公聴会、3月13日の締めくくり質疑と採決を経て衆院通過を果たした。憲法の衆院優越規定により、参院が30日以内に議決しない場合は衆院の議決が国会の議決となる。","date":"2026-03-13","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"高","snippet":"予算案は3月13日に衆院を通過済みで、憲法の衆院優越規定により参院が30日以内に議決しない場合は自動成立する見通し。"},{"id":"2026-03-08-pol-002","category":"政治","title":"石川県知事選で前金沢市長・山野之義氏が初当選 能登復興加速を掲げ","summary":"石川県知事選挙が3月8日に投開票され、前金沢市長の山野之義氏が初当選した。石川県は2024年1月の能登半島地震・2025年9月の能登半島豪雨と相次ぐ大規模災害からの復興が最大の課題で、山野氏は「復興の加速と県全体の活性化」を訴えた。投票率は前回を上回り、復興に対する県民の高い関心を示した。","date":"2026-03-08","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"石川県知事選で前金沢市長の山野之義氏が初当選。能登半島地震・豪雨からの復興加速が最大の争点だった。"},{"id":"2026-03-08-pol-003","category":"政治","title":"訪日外国人向け電子渡航認証「JESTA」創設の入管難民法改正案を閣議決定","summary":"政府は3月10日、訪日外国人向けの電子渡航認証制度「JESTA（ジェスタ）」の創設を盛り込んだ出入国管理及び難民認定法（入管難民法）改正案を閣議決定し、国会に提出した。米国のESTAに倣うもので、ビザ免除対象の外国人が渡航前にオンラインで申請・認証を受ける仕組み。インバウンド需要が急拡大する中、入国管理の適正化と観光促進の両立を図る狙いがある。","date":"2026-03-10","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"政府が訪日外国人向け電子渡航認証制度「JESTA」創設の入管難民法改正案を閣議決定。ビザ免除国の外国人が渡航前にオンライン申請する米国ESTAに倣った仕組み。"},{"id":"2026-03-08-pol-004","category":"政治","title":"ブータンのトブゲー首相が訪日・高市首相と初の日ブータン首脳会談","summary":"ブータン王国のシェリング・トブゲー首相が3月12日に訪日し、高市早苗首相と首脳会談を行った。両首脳は日ブータン外交関係樹立45周年を機に、経済・教育・環境分野での協力深化で一致した。ブータンは「国民総幸福量（GNH）」を国策とすることで知られ、日本との伝統的な友好関係が深い。会談後に複数の協力文書に署名した。","date":"2026-03-12","source":"","confidence":"中"},{"id":"2026-03-08-eco-001","category":"経済","title":"ホンダが2026年3月期に最大6900億円の最終赤字・上場来初 EV戦略を全面見直し","summary":"ホンダは3月12日、2026年3月期の連結最終損益が最大6900億円（従来予想は3000億円の黒字）の赤字に転落する見通しを発表した。上場以来初の赤字転落。北米EV市場の急速な悪化を受けて一部モデルの開発・発売を中止し、設備減損損失を計上したことが主因。三部敏宏社長は「事業環境は想定をはるかに上回るスピードで変化した」と述べ、2040年にEVとFCVの販売比率100%を目指す目標も「現実的に困難」と見直しを明言。今期・27年3月期合計のEV関連損失は最大2兆5000億円に達する可能性があるとした。経営責任として三部社長らが月額報酬の3割（3ヶ月分）を自主返上した。","date":"2026-03-12","source":"https://www.jiji.com/jc/article?k=2026031200937&g=eco","confidence":"高","snippet":"ホンダは2026年3月期の純損益が最大6900億円の赤字に転落する見通しを発表した。上場来初の赤字転落で、三部社長は「2040年全EV化目標の達成は現実的に困難だろう」と述べた。社長らは月額報酬の3割を3ヶ月自主返上する。"},{"id":"2026-03-08-eco-002","category":"経済","title":"JAL・ANA、中東直行路線を全便運休・欧州便も大幅迂回 燃油サーチャージを最高水準に","summary":"日本航空（JAL）は3月7日までに羽田〜ドーハ便など中東直行便を全て運休。全日本空輸（ANA）も中東ハブ経由路線を見直し、欧州便はアラスカ・北極圏経由の「北回りルート」またはトルコ・中央アジア経由の「南回りルート」で迂回運航に切り替えた。ホルムズ海峡危機に伴う航空保険料の急騰と安全確保が背景。両社は3月から燃油特別付加運賃（サーチャージ）を過去最高水準に引き上げ、国際線旅客の負担が大幅に増加した。迂回による飛行時間の延長（欧州便で最大3〜4時間増）も生じている。","date":"2026-03-07","source":"https://www.dangan-lucky.com/entry/jal-ana-middle-east-flight-status","confidence":"高","snippet":"JALは羽田－ドーハ便を3/7まで欠航。欧州便は迂回ルートで運航。ANAも欧州路線を北回りまたは南回りで迂回し、中東危険地帯を回避して運航している。"},{"id":"2026-03-08-eco-003","category":"経済","title":"中東情勢悪化でLNG調達難 東京ガス・大阪ガスなど都市ガス大手が代替調達に奔走","summary":"ホルムズ海峡の事実上の封鎖を受け、カタール産LNG（液化天然ガス）に依存してきた国内の都市ガス大手各社が深刻な調達難に直面している。東京ガス・大阪ガスなどはオーストラリア産・米国産LNGへの切り替えや備蓄取り崩しで急場をしのいでいるが、危機が長期化した場合の調達不足リスクは拭えない。資源エネルギー庁が代替調達の調整に乗り出しており、一部ガス会社では4月以降のガス料金引き上げが避けられない情勢となっている。","date":"2026-03-09","source":"https://www.jetro.go.jp/biz/areareports/2026/190b55f892c6980c.html","confidence":"中"},{"id":"2026-03-08-soc-001","category":"社会","title":"東日本大震災から15年 政府主催追悼復興祈念式 今も2519人が行方不明","summary":"東日本大震災の発生から15年を迎えた3月11日、政府は福島県で「東日本大震災追悼復興祈念式」を開催した。高市早苗首相は追悼の辞を述べ、「今も2519人が行方不明のまま」と語り、4月から始まる「第3期復興・創生期間」（5年間）で課題解決に全力を尽くすと表明。防災庁の設置準備加速も宣言した。被災3県（岩手・宮城・福島）各地でも黙祷や追悼式が行われ、遺族らが犠牲者に手を合わせた。震災による死者・行方不明者は計2万2318人（震災関連死を含めると約3万人超）。","date":"2026-03-11","source":"https://www.kantei.go.jp/jp/105/statement/2026/0311tsuitou.html","confidence":"高","snippet":"震災発生から15年が経過し、今もなお行方不明の方がいらっしゃいます。4月から「第３期復興・創生期間」が始まり、次の5年間で課題解決に全力で取り組む方針を表明。防災庁の設置準備を加速させ、「災害に強い国づくり」を進めることを述べた。"},{"id":"2026-03-08-soc-002","category":"社会","title":"中東情勢悪化で原油先物が1バレル119ドルに急騰 灯油・LPガス不足懸念が全国に広がる","summary":"ホルムズ海峡の事実上の封鎖を受け、3月9日の原油先物（ブレント）は1バレル119ドルまで急騰した。これに伴い石油系燃料の供給不安が広がり、全国のガソリンスタンドや灯油販売店では一部で品薄・買い占めが報告された。政府は国家石油備蓄（約145日分）の一部放出の検討を開始。電力会社・ガス会社も緊急の代替調達を進めており、企業や家庭の光熱費負担が急速に増大している。日本の石油輸入の約9割を中東に依存しているため、危機長期化のシナリオが国民生活を直撃する深刻な懸念となっている。","date":"2026-03-09","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"中東情勢の急激な悪化により、原油先物相場は1バレル119ドルまで急騰。国内では灯油・ガスの品薄が報告され、政府は国家石油備蓄の放出を検討。"},{"id":"2026-03-08-soc-003","category":"社会","title":"ホルムズ危機で中東・欧州旅行のキャンセル急増 卒業旅行シーズンに影響","summary":"ホルムズ海峡危機に伴う航空路線の大幅変更・燃油サーチャージ引き上げを受け、3月の卒業・春休み旅行シーズンに中東・欧州方面の旅行キャンセルが相次いでいる。旅行各社によると中東方面の予約キャンセル率は8〜9割に達し、欧州方面も燃油サーチャージ急騰と迂回による運賃上昇でキャンセルが増加。一方、影響が少ない東南アジアや国内旅行への振り替え需要が高まっている。大学生の卒業旅行や企業の春季海外研修にも影響が広がった。","date":"2026-03-10","source":"https://www.nippon.com/ja/news/q202603/","confidence":"中"},{"id":"2026-03-08-spo-001","category":"スポーツ","title":"WBC2026 侍ジャパンがオーストラリアに4-3で辛勝・1次ラウンド3連勝（東京ドーム）","summary":"野球のWBC（ワールドベースボールクラシック）2026の1次ラウンド（プールC）が東京ドームで行われ、3月8日は日本がオーストラリアと対戦した。日本は4-3の僅差で辛勝し、開幕から3連勝（対チャイニーズ・タイペイ13-0、対韓国8-6に続く）。接戦での勝利に東京ドームが沸いた。","date":"2026-03-08","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"日本はPOOL Cで3月8日のオーストラリア戦を4-3で制し、3連勝。1次ラウンドを4戦全勝で首位通過し準々決勝へ進出した。"},{"id":"2026-03-08-spo-002","category":"スポーツ","title":"WBC2026 侍ジャパンがチェコに9-0の圧勝・1次ラウンド4戦全勝で首位通過","summary":"WBC2026の1次ラウンド最終戦（3月10日、東京ドーム）で日本はチェコを9-0と圧倒し、4戦全勝でプールCを首位通過した。合計スコアは4試合で35得点6失点の圧倒的な攻撃力と投手陣の安定感を示した。侍ジャパンは準々決勝に進出し、マイアミで行われる決勝トーナメントに臨む。","date":"2026-03-10","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"日本はPOOL C（東京）で4戦全勝し、準々決勝進出を決めた。チェコ戦は9-0の大勝で、1次ラウンドを35得点6失点で突破した。"},{"id":"2026-03-08-ent-001","category":"芸能・エンタメ・ゴシップ","title":"新劇場版「銀魂 -吉原大炎上-」公開4週目も好調・累計観客100万人超が射程圏に","summary":"2026年2月13日に公開された「新劇場版 銀魂 -吉原大炎上-」が公開4週目も好調な観客動員を維持し、3月上旬時点での累計観客動員数は80万人超、累計興行収入は12億円台に達した。週末ランキングでも上位をキープし、「銀魂」劇場版シリーズ歴代最高ペースで推移。公開から1ヶ月以上が経過してもロングランを続けており、3月末には100万人突破も視野に入った。","date":"2026-03-10","source":"https://mantan-web.jp/article/20260216dog00m200069000a.html","confidence":"中","snippet":"公開3日間で興収4億円・観客26万人超の好スタートを切った新劇場版銀魂は公開後も好調なペースを維持し、銀魂劇場版シリーズ歴代最高の成績で推移している。"},{"id":"2026-03-08-tec-001","category":"テクノロジー","title":"デジタル庁「源内」で国産LLM7モデルを選定 全府省庁18万人に展開・AI行政を本格化","summary":"デジタル庁は3月6日、全府省庁・外局等39機関の政府職員約18万人を対象とした生成AI利用環境「ガバメントAI（源内）」で試用する国産大規模言語モデル（LLM）7件の選定結果を発表した。選定されたのはNTTデータ「tsuzumi 2」、KDDI/ELYZA「Llama-3.1-ELYZA-JP-70B」、ソフトバンク「Sarashina2 mini」、NEC「cotomi v3」、富士通「Takane 32B」、Preferred Networks「PLaMo 2.0 Prime」、カスタマークラウド「CC Gov-LLM」の7モデル。2026年5月から大規模実証を開始し、2026年8月から試用開始、2027年4月に正式調達を検討する。外資系AIへの依存が経済安全保障上のリスクになりうるとの認識が背景にある。","date":"2026-03-06","source":"https://www.itmedia.co.jp/aiplus/articles/2603/06/news097.html","confidence":"高","snippet":"デジタル庁が全府省庁の約18万人を対象とした生成AI基盤「源内」で試用する国産LLMとして7モデルを選定。2026年8月から試用開始し、2027年1月に評価結果の一部を公表予定。"},{"id":"2026-03-08-int-001","category":"国際","title":"トランプ大統領が日本・英・仏・独・伊にホルムズ海峡への軍艦派遣を要求","summary":"米国のトランプ大統領は3月14日、日本・英国・フランス・ドイツ・イタリアの同盟5カ国に対し、ホルムズ海峡の航行自由確保のために軍艦を派遣するよう公式に要求した。イランとの戦闘が続く中、海峡の商船航行を確保するための多国間の海軍プレゼンスが必要と判断した。日本政府は憲法上の制約も踏まえ対応を検討。高市首相は「可能な限りで協力する」と述べるにとどまり、護衛艦派遣の可否について与野党間で論議となった。","date":"2026-03-14","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"米トランプ大統領が日本を含む5カ国にホルムズ海峡への軍艦派遣を要求。日本政府は憲法上の制約も踏まえ対応を検討。高市首相は「可能な限りで協力する」と述べた。"},{"id":"2026-03-01-pol-001","category":"政治","title":"カナダのカーニー首相が訪日・高市首相と会談 日加関係を「包括的戦略的パートナーシップ」に格上げ","summary":"カナダのマーク・カーニー首相が3月6〜7日に訪日し、高市早苗首相と首相官邸で約25分の首脳会談と75分のワーキングディナーを行った。両首脳は日カナダ外交関係樹立60周年を機に両国関係を「包括的戦略的パートナーシップ」に格上げすることで一致し、初の日加首脳共同声明に署名した。安全保障・サイバー協力・重要鉱物サプライチェーン・AI・量子技術・海洋安全保障など幅広い分野で協力文書3件を締結。ホルムズ海峡危機下でのカナダ産LNGの安定供給継続も確認された。","date":"2026-03-06","source":"https://www.kantei.go.jp/jp/105/actions/202603/06canada.html","confidence":"高","snippet":"高市首相とカーニー首相は、日カナダの協力関係が安全保障、経済安全保障を含む経済、文化・人物交流等あらゆる分野で広がっていることを踏まえ、両国関係を「包括的戦略的パートナーシップ」へ格上げすることで一致。初となる日加首脳共同声明に署名した。"},{"id":"2026-03-01-pol-002","category":"政治","title":"政府が核最終処分場の候補地として南鳥島への文献調査を申し入れ 国有地・無人島を活用","summary":"経済産業省と原子力発電環境整備機構（NUMO）は3月3日、高レベル放射性廃棄物（核のゴミ）の最終処分場の候補地として、東京から約1900km南東に位置する南鳥島（東京都小笠原村）に対する文献調査の申し入れを行った。同島は国有地で民間人は居住しておらず、地権者同意の問題が生じない利点がある。最終処分場選定は長年の懸案で、適地があれば国有地でも調査を推進する方針に転換したもの。過去には北海道寿都町・神恵内村のみが文献調査に応じていた。","date":"2026-03-03","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"国は核のゴミ最終処分場の候補地として、南鳥島での文献調査を申し入れた。同島は国有地で民間人は住んでいない。"},{"id":"2026-03-01-pol-003","category":"政治","title":"衆院予算委員会が省庁別審査を開始 中東情勢・エネルギー政策が論点に","summary":"衆議院予算委員会は3月4日から6日にかけて、2026年度予算案の省庁別審査（分科会審査）を実施した。先週に引き続き2026年度予算の最終審議段階で、3月9日の集中審議・3月13日の採決に向けた重要な局面。審議では直近の米・イスラエルによるイラン攻撃（2/28〜）に伴うホルムズ海峡危機やエネルギー政策・石油備蓄の対応を巡る質疑が相次いだ。","date":"2026-03-04","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"高","snippet":"2026年3月4日（水）〜6日（金）に衆院予算委員会の省庁別審査が実施。3月9日の集中審議を経て、3月13日に締めくくり質疑と採決が予定されていた。"},{"id":"2026-03-01-eco-001","category":"経済","title":"ニデック不適切会計問題で第三者委員会「最も責めを負うべきは永守重信氏」と報告書を公表","summary":"モーター大手のニデックは3月3日、不適切会計を巡る第三者委員会の調査報告書（全413ページ）を公表した。報告書は「会計不正を指示・主導した事実は発見されなかった」としながらも、創業者の永守重信氏について「一部の会計不正を容認したとの評価は免れない。最も責めを負うべきは永守氏と言わざるを得ない」と結論づけた。業績目標達成への「強すぎるプレッシャー」が不正の背景で、減損損失は2500億円規模に及ぶ見通し。永守氏は2025年12月に代表取締役を辞任し名誉会長に、2026年2月26日には名誉会長も辞任していた。","date":"2026-03-03","source":"https://www.nikkei.com/article/DGXZQOUF025J00S6A300C2000000/","confidence":"高","snippet":"ニデックは不適切会計に関する第三者委員会調査報告書を公表。「最も責めを負うべきなのは、永守氏であると言わざるを得ない」と報告書は結論づけた。減損損失は2500億円規模の見通し。"},{"id":"2026-03-01-eco-002","category":"経済","title":"米・イスラエルのイラン攻撃でホルムズ海峡が封鎖 日本の石油・LNG輸入に緊急事態","summary":"2月28日に開始した米国とイスラエルによるイランへの大規模軍事攻撃の影響で、ホルムズ海峡が事実上の封鎖状態となった。世界の原油供給の約20%とLNGの相当量が通過するこの海峡の閉鎖は、日本の石油輸入の約9割を中東に依存する日本経済に深刻な打撃を与えている。タンカーの海峡通過は当初70%減少し、150隻超が海峡外で投錨。経済産業省は3月初旬から国家石油備蓄（約145日分）の放出検討と代替調達の調整を開始。原油先物（ブレント）は1バレル100ドルを超え、週を追うごとに上昇した。","date":"2026-03-01","source":"https://www.jetro.go.jp/biznews/2026/03/700780f3729fbc18.html","confidence":"高","snippet":"米・イスラエルのイラン攻撃によりホルムズ海峡が封鎖。タンカー交通は当初約70%減少し、150隻以上が海峡外で投錨。世界の日量原油供給の約20%とLNGに影響。"},{"id":"2026-03-01-eco-003","category":"経済","title":"日加首脳会談でLNGカナダの安定供給継続を確認 中東危機の代替エネルギー源として注目","summary":"3月6日の日加首脳会談では、ホルムズ海峡危機を踏まえたエネルギー安全保障も主要議題となった。カーニー首相と高市首相はブリティッシュ・コロンビア州のLNGカナダプロジェクト（年産1400万トン）からの日本向け供給継続を確認。中東産LNGに代わる重要な調達源として位置づけられ、今後の増産検討でも連携していくことが合意された。また「G7初の小型モジュール炉（SMR）建設」プロジェクトの推進でも協力することが共同声明に盛り込まれた。","date":"2026-03-06","source":"https://www.jetro.go.jp/biznews/2026/03/298c7189f50f5e74.html","confidence":"高","snippet":"日加首脳会談でLNGカナダの生産継続とG7初の小型モジュール炉建設などの既存プロジェクト継続を確認。中東危機下でカナダ産LNGの安定調達が重要課題となっている。"},{"id":"2026-03-01-eco-004","category":"経済","title":"春闘2026 UAゼンセンなど主要産別が要求額を決定 物価高対応で昨年上回る賃上げ要求","summary":"2026年春闘において、UAゼンセン（流通・製造業）など主要産別が3月上旬までに組合要求額を正式決定した。ホルムズ危機に伴う物価高騰や昨年比での実質賃金低下を踏まえ、各産別は昨年を上回る賃上げ要求を掲げた。自動車・電機などの大手組合も交渉を本格化させており、3月18日の集中回答日に向けた交渉が続く。","date":"2026-03-03","source":"","confidence":"中"},{"id":"2026-03-01-soc-001","category":"社会","title":"旧統一教会の解散命令が確定 東京高裁が即時抗告を棄却 宗教法人格を正式喪失","summary":"東京高等裁判所は3月4日、世界平和統一家庭連合（旧統一教会）が宗教法人法に基づく解散命令に不服申し立てた即時抗告を棄却し、一審・東京地裁（2025年3月）の解散命令決定を維持した。高額献金を求める反社会的な宗教活動による民法上の不法行為で解散命令が確定するのは日本初。被害者は1500人以上・被害総額204億円以上と認定。宗教法人格を失い清算法人となったが、教団は直後に最高裁への特別抗告を申し立てた。日本弁護士連合会は「1980年代からの霊感商法・献金被害の根本的解決に向けた大きな一歩」と評価する会長談話を発表した。","date":"2026-03-04","source":"https://www.nichibenren.or.jp/document/statement/year/2026/260304.html","confidence":"高","snippet":"東京高裁は旧統一教会の解散を命じた地裁決定を支持し、即時抗告を退けた。民法上の不法行為を理由にした宗教法人解散は日本初。宗教法人格を喪失し清算手続きへ。"},{"id":"2026-03-01-soc-002","category":"社会","title":"ノーベル文学賞作家・大江健三郎の未発表小説2篇が死後に発見 東京大学が発表","summary":"東京大学文学部大江健三郎文庫は3月3日、2023年に89歳で逝去したノーベル文学賞作家・大江健三郎氏（1935〜2023年）の未発表小説2篇が発見されたと発表した。「暗い部屋からの旅行」（1955年5月執筆・原稿400字詰め82枚・現存最古作品）と「旅への試み」（1957年5月執筆・原稿42枚）で、東大在学中の下宿先の遺族が昨年11月に文庫に連絡し、筆跡鑑定と内容確認で真筆と確認された。デビュー作「死者の奢り」とほぼ同時期の作品で、後の代表作を想起させるモチーフが含まれているという。全文は3月6日発売の文芸誌「群像」2026年4月号に掲載される。","date":"2026-03-03","source":"https://www.jiji.com/jc/article?k=2026030300058&g=soc","confidence":"高","snippet":"東京大学が、大江健三郎氏の未発表小説2篇（「暗い部屋からの旅行」1955年執筆・現存最古、「旅への試み」1957年執筆）の発見を発表。東大在学中の下宿先の遺族が昨年11月に連絡し、真筆と確認された。"},{"id":"2026-03-01-soc-003","category":"社会","title":"ホルムズ海峡封鎖でガソリン・灯油が急騰 国内でエネルギー不安広がる","summary":"2月28日のホルムズ海峡事実上の封鎖を受け、国内のガソリン・灯油価格が急騰し始めた。石油元売り各社は週次の卸値を引き上げ、全国のガソリンスタンドではレギュラーガソリンが1リットル175〜180円台に達した（前週比5〜8円高）。一部地域では灯油の品薄も報告され、政府は石油備蓄の状況確認を急ぐとともに、補助金制度の緊急対応も検討。インフレ下での追い打ちとなるエネルギー価格高騰が家庭・産業界の懸念を高めた。","date":"2026-03-02","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"ホルムズ海峡封鎖を受け国内ガソリン・灯油価格が急騰。一部地域で品薄報告。政府は石油備蓄の確認と補助金の緊急対応を検討。"},{"id":"2026-03-01-spo-001","category":"スポーツ","title":"WBC2026開幕・侍ジャパンが初戦でチャイニーズ・タイペイに13-0の7回コールド圧勝","summary":"野球のワールドベースボールクラシック（WBC）2026が3月5日に開幕し、日本代表・侍ジャパンは6日、東京ドームでの1次ラウンド（プールC）初戦でチャイニーズ・タイペイと対戦した。日本は2回だけで10得点を挙げる猛攻を見せ、13-0の7回コールドゲームで圧勝した。大谷翔平は第1打席で満塁本塁打（グランドスラム）を放ち4打点。東京ドームの5万人超の観衆が沸いた。","date":"2026-03-06","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"WBC2026の日本初戦（3月6日）でチャイニーズ・タイペイを13-0で下した。大谷翔平が第1打席から満塁本塁打を放ち、2回だけで10点を奪う圧倒的な内容だった。"},{"id":"2026-03-01-spo-002","category":"スポーツ","title":"WBC2026 日韓戦・侍ジャパンが韓国に8-6で逆転勝利 東京ドームが大歓声","summary":"WBC2026の1次ラウンド第2戦（3月7日、東京ドーム）は日韓戦となり、日本が8-6で勝利し開幕2連勝を飾った。日本は序盤に2点リードされる苦しい展開となったが、中盤以降に打線が爆発して逆転。WBCで最大のライバルとされる韓国を下し、東京ドームが歓声に包まれた。","date":"2026-03-07","source":"https://baseballking.jp/ns/685432/","confidence":"高","snippet":"WBC2026の日本対韓国戦（3月7日）は8-6で日本が勝利。侍ジャパンは開幕2連勝となった。"},{"id":"2026-03-01-spo-003","category":"スポーツ","title":"高木美帆がスピードスケート世界選手権後の現役引退を表明 五輪女子最多の通算10メダル","summary":"スピードスケートの高木美帆選手（31歳、TOKIOインカラミ）は3月4日、Instagramでオランダ・ヘーレンフェインで3月5〜8日に開催されるISU世界オールラウンド・スプリントスピードスケート選手権大会を「私のスケート人生の一区切りにしようと思っている」と投稿し、現役引退の意向を表明した。夏季五輪も含めた日本女子最多となる五輪通算10個のメダル（金3・銀4・銅3、ミラノ冬季五輪では銅3個）を誇る日本スポーツ界のレジェンド。ワールドカップの通算38勝も男女通じて日本史上最多。","date":"2026-03-04","source":"https://www.nikkei.com/article/DGXZQOKC0409O0U6A300C2000000/","confidence":"高","snippet":"高木美帆選手（31）が3/4にインスタグラムで世界選手権（3/5〜8）後の引退を表明。五輪通算10個のメダルを誇り、夏季を含む日本女子最多。ワールドカップ通算38勝も日本史上最多。"},{"id":"2026-03-01-ent-001","category":"芸能・エンタメ・ゴシップ","title":"京都アニメーション社長・八田英明氏が76歳で死去 放火事件から会社再建に尽力","summary":"「けいおん！」「響け！ユーフォニアム」など数々のヒット作を生み出した京都アニメーション（京アニ）の創業者で社長の八田英明氏が2月に76歳で死去し、3月2日頃に報道された。1985年に設立した京アニを下請けから自社制作のアニメスタジオへ成長させ「日常系」というジャンルを切り開いた。2019年7月に36人が犠牲となった放火殺人事件後は、社員の生活保障と会社再建に全身全霊で取り組み、新作の公開や新スタジオ建設を進めてきた。後任社長は長男で共同代表取締役の八田真一郎氏が就任した。","date":"2026-03-02","source":"https://news.web.nhk/newsweb/na/na-k10015064191000","confidence":"高","snippet":"京都アニメーションの社長・八田英明さんが76歳で死去。事件後も新作映画やアニメを公開し、同社再興に尽くした。「けいおん！」「涼宮ハルヒの憂鬱」などのヒット作を送り出した。"},{"id":"2026-03-01-ent-002","category":"芸能・エンタメ・ゴシップ","title":"新劇場版「銀魂 -吉原大炎上-」公開3週で累計70万人・興収10億円超 シリーズ歴代最高ペース","summary":"2026年2月13日公開の「新劇場版 銀魂 -吉原大炎上-」が公開から約3週が経過した3月1日時点で、累計観客動員数70万人超・興行収入10億円超を達成した。公開初週末（3日間）で4億円・26万人という好スタートを切り、その後もロングランを続けている。銀魂劇場版シリーズ歴代最高ペースで推移しており、このままいけば3月末に100万人突破も視野に入ってきた。","date":"2026-03-01","source":"https://mantan-web.jp/article/20260216dog00m200069000a.html","confidence":"中","snippet":"2/13公開の新劇場版銀魂は公開3日間で興収4億円・観客26万人超の好スタート。シリーズ歴代最高ペースでのロングランが続いている。"},{"id":"2026-03-01-tec-001","category":"テクノロジー","title":"MWC 2026バルセロナ開幕 AIとモバイルの融合が最大テーマ・ロボットスマホや次世代通信を展示","summary":"世界最大のモバイル・テクノロジー見本市「MWC（Mobile World Congress）2026」がスペイン・バルセロナで3月2〜5日に開催された。AIとモバイルの融合が最大テーマで、Lenovo がThinkPadシリーズ6機種を一挙発表、Qualcommが最新モバイルチップを公開、Honorが人型ロボットとAIを融合した「Robot Phone（ロボットスマホ）」を披露した。日本からはNTTグループ・KDDI・ソフトバンク・楽天が出展し、AIデータセンターが支える次世代ネットワーク・宇宙通信・6Gを世界にアピールした。","date":"2026-03-02","source":"https://www.nikkei.com/article/DGXZQOGR231W40T20C26A2000000/","confidence":"高","snippet":"MWC 2026バルセロナにてAIとモバイルの融合が最大テーマに。Lenovo・Qualcomm・Honorが新製品を大量発表。NTTグループ・KDDI・ソフトバンク・楽天グループも出展。"},{"id":"2026-03-01-int-001","category":"国際","title":"米国とイスラエルがイランへの大規模軍事攻撃を開始 ハーメネイー師が死亡・ホルムズ海峡封鎖","summary":"米国とイスラエルは2026年2月28日、「エピック・フューリー作戦」などのコードネームでイランへの大規模軍事攻撃を開始した。イランの核施設・防空システム・軍事基地を標的とした攻撃の過程で、最高指導者アリー・ハーメネイー師が死亡した。イランは報復として湾岸諸国の米軍基地などにミサイル攻撃を実施。ホルムズ海峡では商船の航行が事実上禁止され、タンカー交通は70%減少した。世界エネルギー供給の約20%が通過するホルムズ封鎖は、1970年代のオイルショック以来の規模のエネルギー危機を引き起こした。","date":"2026-02-28","source":"https://www.jetro.go.jp/biznews/2026/03/700780f3729fbc18.html","confidence":"高","snippet":"米・イスラエルのイラン攻撃でホルムズ海峡が封鎖。タンカー交通は当初約70%減少し150隻以上が海峡外で投錨。世界の日量原油供給の約20%とLNGに影響。1970年代以来最大のエネルギー供給障害とされている。"},{"id":"2026-02-22-pol-001","category":"政治","title":"第221回特別国会で代表質問開始、野党が積極財政・憲法改正を論戦","summary":"高市早苗首相の施政方針演説を受け、2月24日から衆参両院で代表質問が始まった。野党・中道改革連合の小川淳也新代表が積極財政の財源確保策を問い、憲法改正への慎重姿勢を求めた。衆院選で躍進した参政党とチームみらいも初めて代表質問に立ち、衆院選後の新たな政治地図が反映された3日間の論戦となった。","date":"2026-02-24","source":"https://www.shugiin.go.jp/internet/itdb_annai.nsf/html/statics/topics/shitsugi221-1.html","confidence":"高","snippet":"与野党合意により24日から代表質問が始まり、3日間で衆参各党の代表が高市首相の施政方針に対して論戦を繰り広げた。"},{"id":"2026-02-22-eco-001","category":"経済","title":"ラピダス、民間32社から計1676億円調達—ホンダ・キヤノンなど、政府が筆頭株主に","summary":"国策半導体メーカー・ラピダスは2月27日、ホンダ、キヤノン、富士フイルムなど民間32社から計1676億円の出資を受けると発表した。政府も1000億円を出資し筆頭株主となり、「黄金株」による拒否権も保持。官民合計2676億円を調達し、2ナノメートル世代の先端半導体の国内量産を目指す。","date":"2026-02-27","source":"https://www.nikkei.com/article/DGXZQOUA270F80X20C26A2000000/","confidence":"高","snippet":"ラピダスへの民間出資は当初の想定を上回る1676億円となり、赤沢経産相が正式に発表した。政府が筆頭株主となり黄金株も保持する。"},{"id":"2026-02-22-eco-002","category":"経済","title":"みずほFGが事務職5000人分をAIで置き換え—10年かけて配置転換","summary":"みずほフィナンシャルグループは2月27日、今後10年間で全国約1万5000人の事務職の業務を最大5000人分削減し、AIに置き換えると発表した。口座開設書類の確認やデータ入力などをAIが担い、削減分の職員は個人向け営業などに配置転換する。三大メガバンクの中で最も大胆なAI転換策として注目されている。","date":"2026-02-27","source":"https://www.nikkei.com/article/DGXZQOUB270ZC0X20C26A2000000/","confidence":"高","snippet":"今後10年で全国に約1万5000人いる事務職の業務を最大5000人分減らし、解雇はせず個人向け営業など他部門に再配置する見通し。"},{"id":"2026-02-22-eco-003","category":"経済","title":"マンダム、TOB成立でMBO完了—5月に上場廃止へ","summary":"化粧品メーカーのマンダムは2月26日、CVC傘下のカロン・ホールディングスによるTOBが成立し、MBOが完了したと発表した。総額約1256億円で東証プライム市場から非公開化し、5月15日に上場廃止となる見通し。TOBは2025年9月から実施され、72%以上の株主が応募した。","date":"2026-02-26","source":"https://www.nihon-ma.co.jp/news/20260226_4917-11/","confidence":"高","snippet":"マンダムのTOBが成立し、CVC傘下で非公開化へ。5月15日に上場廃止となる予定。"},{"id":"2026-02-22-eco-004","category":"経済","title":"伊藤忠商事、サンフロンティア不動産に約320億円の資本参加—TOBで約20%取得","summary":"伊藤忠商事は2月25日、不動産会社サンフロンティア不動産に対してTOBを発表した。1株2800円（前日終値比約9%プレミアム）でTOBを実施し、第三者割当増資と合わせて約320億円を投じて株式の約20%を取得。上場は維持し、都市部オフィス再生やホテル・観光分野での事業シナジーを見込む。","date":"2026-02-25","source":"https://www.nihon-ma.co.jp/news/20260225_8001-156/","confidence":"高","snippet":"伊藤忠商事がサンフロンティア不動産にTOBを実施。1株2800円で約20%の株式を取得し、資本業務提携を通じて不動産・観光分野での事業拡大を目指す。"},{"id":"2026-02-22-soc-001","category":"社会","title":"日野町事件で再審開始確定—無期懲役確定後の死後再審は戦後初","summary":"1984年に滋賀県で起きた「日野町事件」で最高裁第2小法廷は2月24日、検察の特別抗告を棄却し、阪原弘さん（2011年獄中死）の再審開始を確定させた。無期懲役以上が確定した事件での死後再審は戦後初。捜査資料の写真のすり替えが決め手となり、大津地裁で行われる再審では無罪の公算が大きい。","date":"2026-02-24","source":"https://www.jiji.com/jc/article?k=2026022500554&g=soc","confidence":"高","snippet":"裁判官3人全員一致で高裁の再審開始決定を支持。無期懲役以上が確定した戦後事件で本人死亡後の再審開始は初めてのケースとなった。"},{"id":"2026-02-22-soc-002","category":"社会","title":"2025年の出生数70万5,809人—10年連続で過去最少を更新","summary":"厚生労働省は2月26日、2025年の出生数（速報値）が70万5,809人で、10年連続で過去最少を更新したと発表した。前年比でさらに落ち込みが続いており、少子化対策の抜本的な見直しを求める声が高まっている。高市内閣は4月からの教育無償化を公約しており、少子化への実効性が問われる。","date":"2026-02-26","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"厚生労働省の人口動態統計（速報値）で、2025年の出生数は70万5809人で、10年連続で過去最少を更新した。"},{"id":"2026-02-22-soc-003","category":"社会","title":"佐賀県警・元科捜研職員がDNA鑑定を不正繰り返す、在宅起訴","summary":"佐賀地検は2月27日、佐賀県警の科学捜査研究所（科捜研）の元職員・富永武浩被告（42）を、虚偽公文書作成・証拠隠滅の罪で在宅起訴した。2017年から約7年間、性犯罪などの9件のDNA型鑑定を行ったとする虚偽書類を作成するなど不正を繰り返していた。捜査や裁判への直接影響はないとされるが、科学鑑定の信頼性を揺るがす事件として波紋を呼んでいる。","date":"2026-02-27","source":"https://www.nikkei.com/article/DGXZQOUD2782A0X20C26A2000000/","confidence":"高","snippet":"九件のDNA型鑑定を行ったという虚偽のワークシートを作成するなど、2017年から7年以上にわたって不正を繰り返し、懲戒免職となっていた。"},{"id":"2026-02-22-spo-001","category":"スポーツ","title":"ミラノ冬季五輪が閉幕—日本は金5・銀7・銅12の計24個、冬季最多メダル","summary":"2026年ミラノ・コルティナ冬季オリンピックが2月22日に閉幕した（日本時間23日）。日本は金5・銀7・銅12の計24個のメダルを獲得し、冬季五輪史上最多を大幅に更新。スノーボードで9個（木村葵来・村瀬心椛・深田茉莉ら）、フィギュアスケートで6個（三浦璃来＆木原龍一ペア金など）を獲得。高木美帆はスピードスケートで3個の銅を加え夏冬通じた通算メダル数10個（日本女子最多）を達成した。","date":"2026-02-22","source":"https://www.nikkei.com/article/DGXZQODH221F80S6A220C2000000/","confidence":"高","snippet":"金5、銀7、銅12の計24個のメダルを獲得し、過去最多を大幅に更新。スノーボードで9個、フィギュアスケートで6個のメダルを獲得した。"},{"id":"2026-02-22-spo-002","category":"スポーツ","title":"王貞治ソフトバンク球団会長、台湾総統から野球交流の功績で勲章","summary":"王貞治ソフトバンクホークス球団会長が2月26日、台湾の頼清徳総統から野球を通じた日台交流への長年の貢献をたたえ、勲章を授与された。王会長は台湾系として日台の架け橋となってきた功績が評価された。","date":"2026-02-26","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"台湾の頼清徳総統は王貞治氏に、野球交流への貢献をたたえ勲章を授与した。"},{"id":"2026-02-22-ent-001","category":"芸能・エンタメ・ゴシップ","title":"LUNA SEA ドラマー・真矢が56歳で死去—脳腫瘍との闘病の末","summary":"ロックバンド「LUNA SEA」のドラマー・真矢（本名：山田真哉）が2月17日、56歳で死去した。2020年に大腸がんのステージ4と診断され7度の手術を経ながら活動を続け、2025年9月には脳腫瘍を公表していた。妻はモーニング娘。元メンバーの石黒彩。「35年以上刻んできたビートと音楽への深い愛は永遠に止まらない」とメンバーが声明を発表。訃報は2月23日に広く報道された。","date":"2026-02-17","source":"https://www.jiji.com/jc/article?k=2026022300336&g=soc","confidence":"高","snippet":"昨年9月には約5年間の闘病を告白していた真矢さんが、脳腫瘍のため2月17日に56歳で死去した。"},{"id":"2026-02-22-ent-002","category":"芸能・エンタメ・ゴシップ","title":"映画ドラえもん45作目「新・のび太の海底鬼岩城」公開3日間で初登場1位","summary":"「映画ドラえもん 新・のび太の海底鬼岩城」が2月27日に公開された。1983年の第4作目のリメイクで、シリーズ第45作目。公開3日間で観客動員62万1103人、興行収入7億7968万円を記録し、映画ランキングで初登場1位となった。監督は矢嶋哲生、脚本は村山功。","date":"2026-02-27","source":"https://dora-world.com/contents/4029","confidence":"高","snippet":"公開3日間で観客動員数62万1103人、興行収入7億7968万1350円を記録し、映画観客動員ランキングで初登場1位となった。"},{"id":"2026-02-22-ent-003","category":"芸能・エンタメ・ゴシップ","title":"ポケモン誕生30周年—「Pokémon Day」に公式特設サイトと記念映像を公開","summary":"1996年2月27日に初代「ポケットモンスター 赤・緑」が発売されてから30周年を迎えた「Pokémon Day」（2月27日）に、公式特設サイトがオープンし、記念映像がYouTubeで公開された。ANAや日本プロ野球12球団とのコラボ、LEGO×ポケモンの初コラボ商品なども発表。毎月テーマを変えて30周年を盛り上げる1年間の企画がスタートした。","date":"2026-02-27","source":"https://www.pokemon.co.jp/info/2026/02/260227_cm01.html","confidence":"高","snippet":"2月27日は「Pokémon Day」で、ポケモンが30周年を迎えた。公式サイトに特集ページがオープンし、30周年を彩るニュースが続々と発表されます。"},{"id":"2026-02-22-tec-001","category":"テクノロジー","title":"国交省、航空機内でのモバイルバッテリー使用・充電を禁止—4月から持ち込みも2個制限","summary":"国土交通省は2月27日、航空機内でのモバイルバッテリーへの充電・他機器への給電を原則禁止とし、持ち込みを1人2個（160Wh以下）に制限するルール改正案を発表した。2026年4月24日から全便に適用する。世界的にリチウム電池による機内火災が増加しており、ICAO（国際民間航空機関）の安全基準改正に基づく措置。JAL・ANAも順次対応する。","date":"2026-02-27","source":"https://news.web.nhk/newsweb/na/na-k10015054951000","confidence":"高","snippet":"リチウム電池関連の機内火災増加を受け、4月24日から航空機内でのモバイルバッテリーへの充電および他の電子機器への充電を禁止する。持ち込みは1人2個までに制限。"},{"id":"2026-02-22-int-001","category":"国際","title":"中国が日本防衛企業など20社に軍民両用品輸出禁止—三菱重工・川崎重工・JAXAなど対象","summary":"中国商務省は2月24日、三菱重工業傘下の三菱造船、川崎重工業、IHI、JAXAなど日本の企業・団体計20社に対して軍民両用製品の輸出を禁止すると発表した。さらに20社を「注視リスト」に追加し審査を厳格化した。日本政府は強く抗議し即時撤回を要請。中国が日本の防衛関連企業を輸出禁止対象にするのは初めてで、第2次高市内閣に対する圧力とも受け取られている。","date":"2026-02-24","source":"https://www.nikkei.com/article/DGXZQOGM241R80U6A220C2000000/","confidence":"高","snippet":"中国商務省は三菱造船など日本の20企業・団体を対象としたデュアルユース品目の輸出を禁止すると発表。日本政府は強く抗議し措置の撤回を要請した。"},{"id":"2026-05-28-政治-001","category":"政治","title":"高市首相 フィリピン大統領と会談し経済連携協定見直し検討へ","summary":"高市総理大臣とフィリピンのマルコス大統領が首脳会談を実施し、重要鉱物などのサプライチェーン強化を目的に経済連携協定（EPA）の見直しに向けた検討を進めることで合意する見通しとなった。マルコス大統領は5月26日から29日まで来日しており、戦略的パートナーシップの強化を両国で確認した。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133431000","confidence":"高","snippet":"重要鉱物などのサプライチェーンの強じん化を図るため、EPA＝経済連携協定の見直しに向けた検討を進めることで一致する見通しです。"},{"id":"2026-05-28-政治-002","category":"政治","title":"「国家情報局」設置法成立 「対外情報庁」など検討加速 政府","summary":"「国家情報局」を設置する法律が成立し、政府は治安・安全保障に関する情報収集と分析のさらなる強化を図る方針を示した。海外での情報収集活動を行う「対外情報庁」の創設など、情報機関の再編に向けた検討を加速させることにしている。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133391000","confidence":"高","snippet":"「国家情報局」を設置する法律の成立を受けて、政府は治安や安全保障に関する情報の収集と分析のさらなる強化を図る方針で、海外で情報収集活動を行う「対外情報庁」の創設などに向け検討を加速させることにしています。"},{"id":"2026-05-28-政治-003","category":"政治","title":"皇位継承 衆参議長らが会談 6月上旬にかけて各党と調整続く見通し","summary":"衆参両院の議長・副議長が安定的な皇位継承について会談し、取りまとめ案の作成に向けて「各党・各会派のできるだけ幅広い賛同を得る必要がある」との認識を共有した。6月上旬にかけて各党とのすり合わせを含めた調整が続く見通し。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133401000","confidence":"高","snippet":"衆参両院の議長・副議長はとりまとめ案の作成にあたりできるだけ幅広い賛同を得たい考えで、来月上旬にかけて各党などとのすり合わせも含めた調整が続く見通し"},{"id":"2026-05-28-経済-001","category":"経済","title":"経産省局長らがモスクワ訪問 日本企業同行し資産保全を要望","summary":"経済産業省の荒井勝喜通商政策局長と外務省の石川誠己欧州局審議官がモスクワを訪問し、ロシア政府関係者と面会した。日本企業も同行し、ウクライナ侵攻後もロシアに拠点を持つ100社以上の日本企業の資産保全について協議した。侵攻前と比べてロシア進出企業は約3分の2に減少している。","date":"2026年5月28日（木）","source":"https://www.jiji.com/jc/article?k=2026052800104&g=eco","confidence":"高","snippet":"経産省の荒井勝喜通商政策局長と外務省の石川誠己欧州局審議官がモスクワでロシア政府関係者らと面会。ウクライナへ侵攻したロシアに進出している日本企業の資産保全が目的"},{"id":"2026-05-28-経済-002","category":"経済","title":"ナフサ品薄・値上げ相次ぐ イラン攻撃から3か月、企業の不安拭えず","summary":"米国・イスラエルのイラン攻撃から3か月が経過し、ホルムズ海峡の封鎖に伴うナフサ（プラスチック・塗料の原料）の供給不足が続いている。イトーヨーカ堂が包装材変更、カルビーやカゴメがパッケージ簡素化で対応。大王製紙やユニ・チャームが紙おむつの値上げを発表するなど企業の影響は広範囲に及ぶ。政府は代替調達を推進しているが企業の不安は解消されていない。","date":"2026年5月28日（木）","source":"https://www.jiji.com/jc/article?k=2026052700940&g=eco","confidence":"高","snippet":"米イスラエルによるイラン攻撃から3ヶ月経過し、ホルムズ海峡の事実上の封鎖により、石油製品ナフサの供給混乱が発生。政府は年明けまでの必要量確保を強調しているが、商品の品薄や値上げが相次ぎ、企業の不安が払拭されていない。"},{"id":"2026-05-28-社会-001","category":"社会","title":"栃木強盗殺人 指示役の40代男、バール調達し成田から中国へ出国か","summary":"栃木県上三川町の民家で女性が殺害された強盗殺人事件で、指示役とされる40代男が竹前海斗容疑者（28）の逮捕後に成田空港から中国へ出国していたことが判明した。男は竹前容疑者と知人関係にあり、凶器のバールを調達していたことも明らかに。栃木県警は「空港を変えて海外逃亡を図った可能性」があるとみており、背後に匿名・流動型犯罪グループ（トクリュウ）の関与を疑い捜査を続けている。","date":"2026年5月28日（木）","source":"https://news.web.nhk/newsweb/na/na-k10015133461000","confidence":"高","snippet":"男は竹前容疑者と知人関係にあり、凶器のバールを調達していたことも判明した。栃木県警は、この男が「空港を変えて海外逃亡を図った可能性」があるとみており、背後に匿名・流動型犯罪グループ（トクリュウ）がいるとして捜査を続けています。"},{"id":"2026-05-28-社会-002","category":"社会","title":"防災気象情報が大幅見直し 5月28日から「レベル付き」警戒情報に移行","summary":"5月28日午後から日本の防災気象情報が全面的に見直され、種類と名称が変更された。河川氾濫・大雨・土砂災害・高潮の4種類に警戒レベル（1〜5）が付与され、従来の「大雨警報」は「レベル3大雨警報」に変更。また警報と特別警報の間に新たに「レベル4危険警報」が設けられ、「危険な場所から全員避難する目安」として機能する。「洪水」カテゴリは廃止され「氾濫」と「大雨」に整理された。","date":"2026年5月28日（木）","source":"https://tenki.jp/forecaster/gureweather/2026/05/27/39070.html","confidence":"高","snippet":"5月28日午後からこれまで運用されてきた防災気象情報が大きく見直され、種類や名前が変更になります。警報と特別警報の間に「レベル4危険警報」が新設されました。"},{"id":"2026-05-28-スポーツ-001","category":"スポーツ","title":"WRCラリージャパン2026開幕 名古屋城周辺でOPセレモニー 勝田貴元が地元V狙う","summary":"FIA世界ラリー選手権第7戦「フォーラムエイト・ラリージャパン2026」が5月28日に名古屋城周辺でのオープニングセレモニーで開幕した。17カ国64名のクルーが愛知・岐阜のステージで5月31日まで競う。今季2勝を挙げてドライバーズランキング2位につける勝田貴元（トヨタGRヤリス）が地元大会での悲願の優勝を目指す。WRC2クラスにはランチアが初参戦するなど見どころも多い。","date":"2026年5月28日（木）","source":"https://www.as-web.jp/rally/1319857","confidence":"高","snippet":"勝田貴元選手（トヨタGRヤリス・ラリー1）は既に今季2勝を挙げており、母国ラリージャパンでの優勝を期待される状況にあります。一方、WRC2クラスではランチアの初登場など、日本勢との戦いも注視される点として挙げられています。"},{"id":"2026-05-28-スポーツ-002","category":"スポーツ","title":"全仏オープン 青山修子・穂積絵莉の日本ペア2組が女子ダブルス2回戦進出","summary":"パリで開催中の全仏オープンテニス2026（5月24日〜6月7日）の女子ダブルスで、青山修子がE.S.リャンと組んで6-2・6-3で勝利し2回戦進出。穂積絵莉もF.H.ウーとペアを組み6-3・6-0の快勝で続いた。日本人ペア2組がそろって2回戦に駒を進めた。","date":"2026年5月28日（木）","source":"https://www.sportzorg24.tv/fo2026-japanese-player/","confidence":"中","snippet":"青山修子選手がE.S.リャン選手とペアを組み、「6-2, 6-3」で勝利し2回戦へ進出。穂積絵莉選手がF.H.ウー選手とのペアで「6-3, 6-0」で勝利し2回戦へ進出"},{"id":"2026-05-28-芸能-001","category":"芸能・エンタメ・ゴシップ","title":"阿部寛・木村拓哉・玉木宏が33年ぶり共演 秋ドラマ「あなたそばにいてくれますか」発表","summary":"阿部寛と木村拓哉（キムタク）が主演する新ドラマ「あなたそばにいてくれますか」が9月18日から放送開始されることが発表された。玉木宏も出演予定で、阿部寛とキムタクの共演は1993年の「君がいなくちゃ」以来約33年ぶり。当時は初回視聴率27.0%・最高31.9%を記録した社会現象級ドラマで、大物俳優の再共演に注目が集まっている。","date":"2026年5月28日（木）","source":"https://www.oricon.co.jp/news/2456958/","confidence":"高","snippet":"2人が一緒に出演するのは、1993年開始のドラマ「君がいなくちゃ」の約33年ぶり。当時の視聴率は初回27.0%、最高視聴率31.9%を記録した社会現象級のドラマでした。"},{"id":"2026-05-28-芸能-002","category":"芸能・エンタメ・ゴシップ","title":"是枝裕和監督「箱の中の羊」あす29日公開 カンヌでパルムドール候補・9分スタンディングオベーション","summary":"是枝裕和監督が綾瀬はるかと千鳥・大悟をW主演に迎えた映画「箱の中の羊」が5月29日に全国公開される。第79回カンヌ国際映画祭のコンペティション部門に正式出品され、公式上映後に9分間のスタンディングオベーションが起きてパルムドール（最高賞）候補として注目を集めた。亡き息子の姿をしたヒューマノイドを迎え入れる夫婦の物語を描いた近未来SF。","date":"2026年5月28日（木）","source":"https://press.moviewalker.jp/news/article/1398946/","confidence":"中","snippet":"是枝裕和監督、綾瀬はるか、千鳥・大悟らがカンヌへ！レッドカーペットから公式上映、会見までをレポート。カンヌ国際映画祭の公式上映後には長時間のスタンディングオベーションが起き、パルムドール候補として注目を集めた。"},{"id":"2026-05-28-テクノロジー-001","category":"テクノロジー","title":"MetaがFacebook・Instagram・WhatsAppにAIサブスク「Meta One」シリーズを発表","summary":"Metaは、Facebook、Instagram、WhatsAppを対象とした新しいサブスクリプションサービスを発表した。基本プランの「Plus」（各3.99〜2.99ドル）からAI機能を搭載した「Meta One Plus」（7.99〜49.99ドル）まで複数のティアで提供される。Say Hi機能を含むキャンペーン管理や高度なメッセージング機能のほか、AI連携でユーザー体験を強化する。","date":"2026年5月28日（木）","source":"https://www.itmedia.co.jp/news/articles/2605/28/news076.html","confidence":"高","snippet":"料金はInstagram PlusとFacebook Plusが各3.99ドル、WhatsApp Plusが2.99ドルで、AI機能搭載の「Meta One Plus」は7.99ドルから49.99ドルの範囲で設定されています。"},{"id":"2026-05-28-テクノロジー-002","category":"テクノロジー","title":"YouTubeがAI生成コンテンツに自動ラベル適用を開始 段階的に展開","summary":"YouTubeは、クリエイターがAI生成を報告したコンテンツに自動でラベルを表示する機能を2026年5月から段階的に展開すると発表した。YouTube自社のAIツール（Veo・Dream Screen）で作成したコンテンツや、C2PAメタデータで確認できるAI生成コンテンツにも自動ラベルが付与される。AI生成コンテンツの透明性向上と視聴者への正確な情報提供が目的。","date":"2026年5月28日（木）","source":"https://www.itmedia.co.jp/news/articles/2605/28/news074.html","confidence":"高","snippet":"クリエイターがコンテンツのいずれかにAI生成がされているとYouTubeに報告した場合、YouTube Studioのラベルステータスを変更できます。YouTubeが提供するVeoやDream Screenなどのツール使用、またはC2PAメタデータで確認できるAI生成コンテンツには自動ラベルが適用されます。"},{"id":"2026-05-28-テクノロジー-003","category":"テクノロジー","title":"Xiaomiが新スマートフォン「17T」シリーズを発表 日本でも予約受付開始","summary":"Xiaomiはウィーンで開催したグローバル発表会で新スマートフォン「Xiaomi 17T」シリーズを発表した。モバイルイメージング光学技術の大幅な進化を特徴とし、デザインとユーザー体験も刷新。日本市場でも5月28日から予約受付が開始された。","date":"2026年5月28日（木）","source":"https://www.mi.com/jp/event/2026/xiaomi-launch-may-2026/","confidence":"中"},{"id":"2026-05-28-国際-001","category":"国際","title":"米国・イラン合意案 「60日停戦後30日でホルムズ海峡開放」核協議も再開へ","summary":"中東外交筋によると、米国とイランの間で「60日間の停戦後、30日間かけてホルムズ海峡の機雷を除去して航行を再開する」合意案が浮上していることが明らかになった。2026年2月の米・イスラエルによるイラン攻撃以来続くホルムズ海峡の封鎖により世界のエネルギー輸送が深刻な打撃を受けており、合意成立への期待が高まっている。","date":"2026年5月28日（木）","source":"https://www.nikkei.com/article/DGXZQOGR25A970V20C26A5000000/","confidence":"中","snippet":"米国とイランの合意案は「60日停戦後30日でホルムズ海峡開放」という内容。Middle East diplomatic sources revealed these details on May 25, 2026, as the Strait of Hormuz remains effectively closed since the February military strikes."}];

var CC={"経済":"#2980b9","政治":"#8e44ad","芸能・エンタメ・ゴシップ":"#e91e8c","スポーツ":"#16a085","テクノロジー":"#2c3e50","社会":"#7f8c8d","国際":"#d35400"};
var CFC={"高":"#27ae60","中":"#f39c12","低":"#e74c3c","未検証":"#95a5a6"};
var st={fCat:"すべて",fYear:"すべて",fMonth:"すべて",sort:"desc",q:""};
function pd(l){if(!l)return null;var s=l.replace(/（.）/,"");var m0=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m0)return{y:m0[1],mo:String(Number(m0[2])),d:String(Number(m0[3]))};var m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);if(m)return{y:m[1],mo:m[2],d:m[3]};var m2=s.match(/(\d{4})年(\d{1,2})月(上旬|中旬|下旬)/);if(m2){var d2=m2[3]==="上旬"?"5":m2[3]==="中旬"?"15":"25";return{y:m2[1],mo:m2[2],d:d2};}var m3=s.match(/(\d{4})年(\d{1,2})月/);if(m3)return{y:m3[1],mo:m3[2],d:"15"};return null;}
function dn(l){var p=pd(l);if(!p)return 0;return Number(p.y)*10000+Number(p.mo)*100+Number(p.d);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function hl(t,q){if(!q||!q.trim())return esc(t);var kw=q.trim();var lo=t.toLowerCase();var lk=kw.toLowerCase();var o="",i=0,idx,n=0;while((idx=lo.indexOf(lk,i))!==-1&&n<50){if(idx>i)o+=esc(t.slice(i,idx));o+="<mark>"+esc(t.slice(idx,idx+kw.length))+"</mark>";i=idx+kw.length;n++;}if(i<t.length)o+=esc(t.slice(i));return o;}
function uniq(a){return Array.from(new Set(a));}
function filtered(){var qt=st.q.trim().toLowerCase();return DATA.filter(function(n){var p=pd(n.date);return(st.fCat==="すべて"||n.category===st.fCat)&&(st.fYear==="すべて"||(p&&p.y===st.fYear))&&(st.fMonth==="すべて"||(p&&p.mo===st.fMonth))&&(!qt||n.title.toLowerCase().indexOf(qt)>=0||n.summary.toLowerCase().indexOf(qt)>=0);}).sort(function(a,b){var c=st.sort==="desc"?dn(b.date)-dn(a.date):dn(a.date)-dn(b.date);return c!==0?c:a.category.localeCompare(b.category);});}
function render(){
  document.getElementById("totalNum").textContent=DATA.length;
  var years=uniq(DATA.map(function(n){var p=pd(n.date);return p?p.y:null;}).filter(Boolean)).sort(function(a,b){return b.localeCompare(a);});
  var months=uniq(DATA.filter(function(n){if(st.fYear==="すべて")return true;var p=pd(n.date);return p&&p.y===st.fYear;}).map(function(n){var p=pd(n.date);return p?p.mo:null;}).filter(Boolean)).sort(function(a,b){return Number(a)-Number(b);});
  var fCatEl=document.getElementById("fCat");
  fCatEl.innerHTML='<option value="すべて">カテゴリ</option>';
  CATS.forEach(function(c){fCatEl.innerHTML+='<option value="'+c+'"'+(st.fCat===c?" selected":"")+'>'+c+'</option>';});
  var fYearEl=document.getElementById("fYear");
  fYearEl.innerHTML='<option value="すべて">年</option>';
  years.forEach(function(y){fYearEl.innerHTML+='<option value="'+y+'"'+(st.fYear===y?" selected":"")+'>'+y+'年</option>';});
  var fMonthEl=document.getElementById("fMonth");
  fMonthEl.innerHTML='<option value="すべて">月</option>';
  months.forEach(function(m){fMonthEl.innerHTML+='<option value="'+m+'"'+(st.fMonth===m?" selected":"")+'>'+m+'月</option>';});
  document.getElementById("q").value=st.q;
  document.getElementById("sortBtn").textContent=st.sort==="desc"?"↓新しい順":"↑古い順";
  var f=filtered();
  document.getElementById("cnt").textContent=f.length+"件 / 全"+DATA.length+"件";
  var list=document.getElementById("list");
  if(f.length===0){list.innerHTML='<div class="empty">条件に一致するニュースがありません</div>';return;}
  var html="";
  f.forEach(function(item,idx){
    var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
    html+='<div class="card" data-idx="'+idx+'"><div class="bar" style="background:'+c+'"></div><div class="body"><div class="meta"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">'+esc((item.date||"").replace(/（.）/,""))+'</span><span class="cf" style="color:'+cfc+'"><span class="dot" style="background:'+cfc+'"></span>'+esc(cf)+'</span>'+(hasSrc?'<span style="color:#2980b9;font-size:10px">🔗</span>':"")+' </div><p class="tt">'+hl(item.title,st.q)+'</p><p class="sm">'+hl(item.summary,st.q)+'</p></div></div>';
  });
  list.innerHTML=html;
  Array.prototype.forEach.call(document.querySelectorAll(".card"),function(el){
    el.addEventListener("click",function(){openDetail(f[Number(el.getAttribute("data-idx"))]);});
  });
}
function openDetail(item){
  var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
  var dlg=document.getElementById("dlg");
  var hasSnip=item.snippet&&item.snippet.trim();
  dlg.innerHTML='<div class="top" style="background:'+c+'"></div><div class="pad"><div class="hd"><div class="meta2"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">📅 '+esc((item.date||"").replace(/（.）/,""))+'</span></div><button class="cls" id="closeBtn">×</button></div><h3>'+hl(item.title,st.q)+'</h3><div class="sm2">'+hl(item.summary,st.q)+'</div>'+(hasSrc?'<div class="src"><div style="font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600">📎 ソース</div><a href="'+esc(item.source)+'" target="_blank" rel="noopener noreferrer">'+esc(item.source)+'</a></div>':""  )+(hasSnip?'<div class="snip"><span style="font-size:10px;font-weight:600;color:var(--tx2);">🔍 取得時メモ</span><br>'+esc(item.snippet)+'</div>':"")+'<div class="ft"><button class="cp" id="cpBtn">📋 内容をコピー</button></div><p class="note">背景クリック または ×で閉じる</p></div>';
  document.getElementById("modal").classList.add("open");
  document.getElementById("closeBtn").addEventListener("click",closeDetail);
  document.getElementById("cpBtn").addEventListener("click",function(){
    var txt="【"+item.category+"】"+item.title+"\n"+(item.date||"")+"\n\n"+item.summary+(hasSrc?"\n\nソース: "+item.source:"");
    if(navigator.clipboard)navigator.clipboard.writeText(txt);
    var b=document.getElementById("cpBtn");b.textContent="コピー済み ✓";b.classList.add("done");
    setTimeout(function(){if(document.getElementById("cpBtn")){document.getElementById("cpBtn").textContent="📋 内容をコピー";document.getElementById("cpBtn").classList.remove("done");}},1800);
  });
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.getElementById("dlg").innerHTML="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeDetail();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDetail();});
document.getElementById("fCat").addEventListener("change",function(e){st.fCat=e.target.value;render();});
document.getElementById("fYear").addEventListener("change",function(e){st.fYear=e.target.value;st.fMonth="すべて";render();});
document.getElementById("fMonth").addEventListener("change",function(e){st.fMonth=e.target.value;render();});
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});
document.getElementById("sortBtn").addEventListener("click",function(){st.sort=st.sort==="desc"?"asc":"desc";render();});
document.getElementById("resetBtn").addEventListener("click",function(){st.fCat="すべて";st.fYear="すべて";st.fMonth="すべて";st.q="";render();});
render();
</script>
</body>
</html>
