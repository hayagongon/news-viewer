var DATA=[{"id":"国際-1779292623663-drtmi","category":"国際","title":"トランプ大統領が中国を訪問——習近平主席と首脳会談、大豆・牛肉購入や貿易委員会の設立を協議","summary":"ドナルド・トランプ米大統領は5月13日に北京に到着し、14〜15日の日程で習近平国家主席と首脳会談を行った。会談では貿易摩擦の解消策として中国による米国産大豆・牛肉・航空機の購入約束と、両国間の貿易委員会の設立が協議された。ルビオ国務長官、ベッセント財務長官、ヘグセス国防長官らが同行。大きな合意には至らなかったが米中関係の安定化を確認した。","date":"2026年5月14日（木）","source":"https://news.yahoo.co.jp/articles/affe3ef370dea4d2b1ea062443905a22126a11f8","confidence":"高"},{"id":"政治-1779292623666-811jg","category":"政治","title":"ベッセント米財務長官が訪日——高市首相・片山財務相・茂木外相らと米中首脳会談前に日米連携を確認","summary":"スコット・ベッセント米財務長官は5月11〜15日の日程で日本を訪れ、12日に高市早苗首相を表敬訪問した。片山さつき財務相、赤澤亮正経産相、茂木敏充外相とも相次いで会談し、日米投資プログラム・重要鉱物・サプライチェーン強靭化・AIサイバー脅威への対応などを協議。米中首脳会談（5/14〜15）を前に日米の緊密な連携を確認した。","date":"2026年5月12日（火）","source":"https://www.jetro.go.jp/biznews/2026/05/655bddeb59589e1f.html","confidence":"高"},{"id":"政治-1779292623666-tnmah","category":"政治","title":"国家情報会議創設法案が参院で本格審議入り——インテリジェンス機能の司令塔創設へ、4月に衆院通過","summary":"政府のインテリジェンス（情報収集・分析）機能を一元管理する司令塔「国家情報会議」を創設する法案が、4月23日の衆院通過に続き、5月8日から参院で審議入りした。高市内閣が今通常国会の重点法案に位置づけており、与野党が組織のあり方や文民統制のあり方をめぐって論戦を繰り広げた。","date":"2026年5月11日（月）","source":"https://www.policynews.jp/schedule/2026/005.html","confidence":"高"},{"id":"政治-1779292623666-psxox","category":"政治","title":"新潟県知事選が告示——5月31日投開票に向け、現職と新人が政策論争","summary":"任期満了に伴う新潟県知事選挙が5月14日に告示され、5月31日の投開票に向けて選挙戦がスタートした。エネルギー政策・農業振興・人口減少対策などを争点に、現職と新人候補が舌戦を繰り広げた。参院選を前に各党が力を入れる重要な地方選挙として全国から注目が集まった。","date":"2026年5月14日（木）","source":"https://www.policynews.jp/schedule/2026/005.html","confidence":"高"},{"id":"経済-1779292623666-d6n11","category":"経済","title":"第一三共が2026年3月期決算を発表——ADC供給計画見直しで約950億円の損失計上、税引前利益25.9%減","summary":"第一三共は5月11日に発表を延期していた2026年3月期連結決算を発表した。抗体薬物複合体（ADC）製品の供給計画見直しに伴い、製造委託先への損失補償引当金として約757億円、小田原工場のADC関連設備の減損・補償金として約193億円の合計約950億円を計上。税引前利益は前期比25.9%減の約2,634億円となり、市場予想を下回った。","date":"2026年5月11日（月）","source":"https://nk.jiho.jp/article/301961","confidence":"高"},{"id":"経済-1779292623666-y9qvt","category":"経済","title":"JX金属が東邦チタニウムを株式交換で完全子会社化——5月28日付で東証上場廃止","summary":"JX金属は連結子会社の東邦チタニウムを株式交換により完全子会社化することを決定し、東邦チタニウムの東証スタンダード市場への上場は5月28日付で廃止されることとなった。航空機・半導体向けなどチタン需要の高まりを背景に、グループとして製造・調達を一元管理し競争力を高める狙い。","date":"2026年5月中旬","source":"https://masouken.com/%E8%B2%B7%E5%8F%8E%E3%81%AE%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9","confidence":"中"},{"id":"経済-1779292623666-e09f9","category":"経済","title":"マブチモーターが食品機械メーカー・マスダックを完全子会社化——精密モーター技術を食品分野に応用","summary":"精密小型モーター大手のマブチモーターは、食品機械メーカーの株式会社マスダックの発行済み全株式を取得し完全子会社化することを決定した。モーター制御技術と食品機械製造の融合による高付加価値製品の開発を目指し、事業領域を広げる戦略的なM&Aとなる。","date":"2026年5月中旬","source":"https://masouken.com/%E8%B2%B7%E5%8F%8E%E3%81%AE%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9","confidence":"中"},{"id":"社会-1779292623666-0rklt","category":"社会","title":"辺野古沖転覆事故——海上保安庁が生徒撮影の動画を解析、事故直前の状況を分析","summary":"2026年3月16日に名護市辺野古沖で研修旅行中の同志社国際高校生らを乗せた船2隻が転覆し、女子生徒と船長が死亡した事故で、海上保安庁は5月16日、乗船していた生徒が撮影した動画を解析し事故直前の海況や船の状態を調査していることが明らかになった。波浪注意報が出ていた中での出港判断の妥当性が引き続き焦点となっている。","date":"2026年5月16日（土）","source":"https://www.qab.co.jp/news/20260415290427.html","confidence":"中"},{"id":"社会-1779292623666-a8wc2","category":"社会","title":"栃木・上三川の住宅で強盗殺人——指示役の28歳男性ら夫婦を逮捕","summary":"栃木県上三川町の住宅で69歳の女性が殺害された事件で、栃木県警は指示役とされる28歳の男性とその妻（25）を強盗殺人容疑で逮捕した。組織的な関与が疑われており、警察は共犯者の全容解明を進めている。高齢者をターゲットにした組織的犯罪への警戒が改めて強まっている。","date":"2026年5月中旬","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"社会-1779292623666-s2i46","category":"社会","title":"福島・磐越道でマイクロバス横転——高校生1人死亡、68歳運転手を自動車運転処罰法違反で逮捕","summary":"福島県郡山市内の磐越自動車道で生徒を乗せたマイクロバスが横転する事故が発生し、高校生1人が死亡した。福島県警は乗客の安全を怠ったとして68歳の男性運転手を自動車運転処罰法違反（過失致死）の容疑で逮捕した。部活動・学校行事でのバス移動における安全管理のあり方が問われている。","date":"2026年5月中旬","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"社会-1779292623666-dwji8","category":"社会","title":"水俣病の公式確認から70年——国・熊本県・チッソが参加する式典を開催","summary":"1956年5月1日に水俣病が公式に確認されてから2026年で70年の節目を迎えた。熊本県水俣市では5月1日を中心に政府・熊本県・原因企業チッソの代表が参加する慰霊式が開かれ、被害者団体への補償と地域の環境再生・教訓の継承について確認された。未認定患者問題など残る課題の解決も引き続き求められた。","date":"2026年5月11日（月）","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"スポーツ-1779292623666-f6rdd","category":"スポーツ","title":"サッカー日本代表が2026年W杯メンバー26人を発表——遠藤航・久保建英ら欧州組中心に選出","summary":"日本サッカー協会は5月15日、6月11日開幕のFIFAワールドカップ2026（北中米大会）に挑む日本代表メンバー26人を発表した。GK3人・DF9人・MF/FW14人の編成で、遠藤航（リバプール）・久保建英（レアル・ソシエダード）・冨安健洋（アヤックス）など欧州主要クラブで活躍する選手が大多数を占めた。大会は6月11日から7月19日まで行われる。","date":"2026年5月15日（金）","source":"https://www.jfa.jp/samuraiblue/news/00036338/","confidence":"高"},{"id":"スポーツ-1779292623666-2cw8i","category":"スポーツ","title":"大相撲夏場所が国技館で開幕——横綱・豊昇龍が綱の重みを背負い初日に登場","summary":"大相撲令和8年夏場所（5月10〜24日、両国国技館）が5月10日に初日を迎えた。1月の初場所で優勝し第74代横綱に昇進した豊昇龍が、横綱として初の東京本場所に臨む。前頭・大関陣との上位対決が見どころで、2場所連続優勝を目指す豊昇龍の横綱としての資質が問われる15日間となる。","date":"2026年5月10日（日）","source":"https://times.abema.tv/articles/-/10242099","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-8pav7","category":"芸能・エンタメ・ゴシップ","title":"声優・山崎和佳奈さんが死去——「名探偵コナン」毛利蘭役を約30年、4月18日逝去・61歳","summary":"「名探偵コナン」の毛利蘭役などで知られる声優の山崎和佳奈さんが4月18日に死去していたと、5月15日に所属事務所・青二プロダクションが発表した。61歳だった。病名は非公表。1996年のコナン放送開始から約30年にわたって毛利蘭を担当し、2月から病気療養中だった。同役は3月14日放送回より岡村明美が代役を務めている。","date":"2026年5月15日（金）","source":"https://www.nikkei.com/article/DGXZQOUD156SR0V10C26A5000000/","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-25p7e","category":"芸能・エンタメ・ゴシップ","title":"王林がモデル・佐藤ショーン玲央と熱愛——事務所も交際を否定せず、結婚の可能性も報道","summary":"タレントの王林（25）がモデルの佐藤ショーン玲央との交際が複数のメディアで報じられ、王林の所属事務所は「否定しない」との立場を示した。王林はバラエティでの活躍に加えSNSでも高い人気を誇り、熱愛報道に多くのファンが反応した。","date":"2026年5月15日（金）","source":"https://www.oricon.co.jp/entertainment/","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-9jx1e","category":"芸能・エンタメ・ゴシップ","title":"B'z・稲葉浩志の軽井沢別荘建設で近隣トラブル——週刊新潮が報道、警察が出動","summary":"週刊新潮は5月13日発売号で、ロックバンドB'zのボーカル稲葉浩志が軽井沢に建設中の約10億円とされる別荘をめぐり、工事の騒音・工期の問題で近隣住民とトラブルになったと報道。警察が現場に出動する事態となったとされる。稲葉側の公式なコメントは出ていない。","date":"2026年5月13日（水）","source":"","confidence":"中"},{"id":"テクノロジー-1779292623667-6at27","category":"テクノロジー","title":"Nintendo Switch 2が5月25日から59,980円に値上げ——半導体高騰・円安・関税で1万円アップ","summary":"任天堂は5月8日、Nintendo Switch 2（国内版）の価格を5月25日から現行の49,980円から59,980円へ1万円値上げすると発表した。理由は半導体メモリ価格の高騰・円安・関税によるコスト増（年間約1,000億円超）。Nintendo Switch Online料金も7月1日から値上げ。値上げ前の駆け込み購入が各店舗で相次いだ。","date":"2026年5月11日（月）","source":"https://www.nintendo.co.jp/corporate/release/en/2026/260508.html","confidence":"高"},{"id":"テクノロジー-1779292623667-qesfy","category":"テクノロジー","title":"デジタル庁が行政向け生成AI「ガバメントAI・源内」を開発——全省庁の業務効率化を目指す","summary":"デジタル庁は行政職員が業務で生成AIを安全に活用するため、AIアプリと連携した政府専用の生成AIシステム「ガバメントAI・源内」を開発した。文書作成・情報収集・法令照会などの業務効率化を目指し、全省庁での段階的な展開を進める。セキュリティとハルシネーション対策を重視した設計となっている。","date":"2026年5月中旬","source":"https://www.digital.go.jp/news/","confidence":"中"},{"id":"テクノロジー-1779292623667-exba0","category":"テクノロジー","title":"Anthropicが企業評価額9,000億ドル超での大型資金調達交渉——AI産業への投資が加速","summary":"Claude（クロード）を開発する米AI企業Anthropicが、企業評価額9,000億ドル（約140兆円）超での新規資金調達を目指して大手投資家と交渉中であることが報じられた。OpenAIのGPTと並ぶ高性能AIとして企業・行政で採用が拡大しており、AI産業全体への投資規模が急速に膨らんでいる実態が浮き彫りになった。","date":"2026年5月中旬","source":"https://note.com/yume_verse_/n/n349efe2d3521","confidence":"中"},{"id":"政治-1779320403677-hwb9s","category":"政治","title":"高市首相がベトナム・オーストラリア歴訪を終え帰国——重要鉱物・サプライチェーン確保で合意","summary":"高市早苗首相は5月1〜5日の日程でベトナムとオーストラリアを歴訪し、5日に帰国した。ベトナムではトー・ラム共産党書記長・レ・ミン・フン首相と、オーストラリアではアルバニージー首相と首脳会談を行い、エネルギー・レアアースなど重要鉱物のサプライチェーン拡大・確保で合意した。「自由で開かれたインド太平洋（FOIP）」の推進と安全保障連携の強化も確認された。2026年は日豪友好協力基本条約署名50周年の節目にあたる。","date":"2026年5月5日（火）","source":"https://www.nikkei.com/article/DGXZQOUA050980V00C26A5000000/","confidence":"高"},{"id":"政治-1779320403678-erixi","category":"政治","title":"日本とEUが第4回デジタルパートナーシップ閣僚会合——AI・半導体・量子技術・海底ケーブルで連携強化","summary":"5月5日にブリュッセルで開催された第4回日・EUデジタルパートナーシップ閣僚会合で、日本とEUはAI・半導体・量子技術・海底通信ケーブルの各分野での協力強化を発表した。信頼できるAIの原則整合や半導体サプライチェーンの強靱化が主要テーマとなり、欧州との経済安全保障協力を深める。","date":"2026年5月5日（火）","source":"","confidence":"中"},{"id":"政治-1779320403678-lzfor","category":"政治","title":"憲法施行79周年——改憲・護憲両派が各地で集会、参院選前に論議再燃","summary":"憲法施行79周年を迎えた5月3日の憲法記念日に、改憲推進派・護憲派それぞれが全国各地で集会を開催した。高市首相は記念日メッセージで憲法改正への強い意欲を示し、9条改定・緊急事態条項の新設をめぐる賛否が改めて問われた。7月の参院選を前に各党がスタンスを鮮明にしつつある。","date":"2026年5月3日（日）","source":"","confidence":"中"},{"id":"政治-1779320403678-k0j3w","category":"政治","title":"GW明けの通常国会が審議を再開——参院選まで約2か月、重要法案が本格審議へ","summary":"ゴールデンウィーク休会明けの5月7日、参院での通常国会審議が再開した。国家情報会議創設法案・AIガバナンス推進基本法案・エネルギー安全保障関連法案など今通常国会の重点法案の本格審議日程が組まれた。参院選（7月予定）まで約2か月となり、与野党の論戦が激しさを増している。","date":"2026年5月7日（木）","source":"","confidence":"中"},{"id":"経済-1779320403679-t6t0r","category":"経済","title":"携帯ショップ大手・トーシンHDが会社更生法申請——負債約160億円、日本初の「上場維持型」で再建","summary":"携帯電話ショップ運営などを手掛けるトーシンホールディングス（愛知県、東証スタンダード市場）は5月8日、東京地裁に会社更生法の適用を申請し、同日付で更生手続開始決定を受けた。負債総額は約160億円。2025年の不適切会計発覚後も上場を維持したまま更生手続を進める「上場維持型会社更生」は日本初の事例。三井住友銀行が7億円のDIPファイナンスを提供し、スポンサー探索を並行して進める。","date":"2026年5月8日（金）","source":"https://news.yahoo.co.jp/articles/2a3c9020c5636413c2b9619ac1823a2100c5c57d","confidence":"高"},{"id":"経済-1779320403681-enqiu","category":"経済","title":"アインホールディングスが連結子会社間の調剤薬局事業を再編——吸収分割・合併でグループ効率化","summary":"調剤薬局チェーン大手のアインホールディングスは5月1日付で、連結子会社間における調剤薬局事業の吸収分割および吸収合併を実施した。グループ内の重複機能を整理し、医薬品の集中調達と店舗運営の標準化でコスト削減と収益力向上を目指す戦略的な組織再編。","date":"2026年5月1日（金）","source":"","confidence":"中"},{"id":"経済-1779320403682-xdh3o","category":"経済","title":"中古車販売プラウドが破産申請——静岡地裁沼津支部に届け出","summary":"中古車の販売などを手掛ける株式会社プラウド（静岡県）は5月8日、静岡地裁沼津支部に破産手続き開始の申し立てを行った。中古車市場では価格高止まりと消費者の買い控えが続き、中小販売業者の経営圧迫が長期化している。","date":"2026年5月8日（金）","source":"","confidence":"中"},{"id":"経済-1779320403682-6yhia","category":"経済","title":"GW期間の訪日外国人が530万人超——過去最多水準、円安とインバウンド需要が後押し","summary":"政府観光局（JNTO）のまとめによると、ゴールデンウィーク期間（4月下旬〜5月6日）の訪日外国人旅行者は530万人超と過去最多水準に達した。円安の継続と国際線増便が欧米・アジアからの訪日客を後押しし、京都・大阪・東京などの主要観光地は大混雑となった。国内旅行者数も前年比約3%増となった。","date":"2026年5月6日（火）","source":"","confidence":"中"},{"id":"社会-1779320403683-6ij5e","category":"社会","title":"沖縄・北谷町で米海軍3等兵曹が路上暴行——男性2人を殴り現行犯逮捕","summary":"5月8日未明、沖縄県北谷町の路上で男性2人に暴行を加えたとして、沖縄県警は米海軍沖縄艦隊活動司令部所属の3等兵曹モーリシオ・ピネダ容疑者（21）を傷害容疑で現行犯逮捕した。被害者2人のうち1人が軽傷を負った。基地周辺での米軍人による事件が相次ぎ、県内外で批判の声が上がった。","date":"2026年5月8日（木）","source":"https://www.qab.co.jp/news/2026/05/09","confidence":"高"},{"id":"社会-1779320403683-w84t7","category":"社会","title":"GW最終日に首都高速で5台絡む事故——世田谷・3号渋谷線上りで渋滞","summary":"ゴールデンウィーク最終日の5月6日、東京・世田谷区内の首都高速3号渋谷線の上り線で乗用車5台が絡む玉突き事故が発生し、複数人が軽傷を負った。帰省ラッシュのUターン渋滞と重なって現場周辺の混雑が拡大した。GW中は各地の幹線道路でも事故が多発した。","date":"2026年5月6日（火）","source":"","confidence":"中"},{"id":"社会-1779320403683-pwgqi","category":"社会","title":"GW期間中の水難事故・山岳遭難が多発——消防・海保が全国で対応","summary":"ゴールデンウィーク期間中、全国各地の海水浴場・河川・山岳で水難事故や山岳遭難が相次いだ。消防庁・海上保安庁のまとめによると、GW中の水難救助出動件数は前年を上回り、特に伊豆半島・沖縄・北アルプスで複数件の遭難・救助活動が行われた。行楽客の急増と好天が重なり、無謀な行動による事故が増加した。","date":"2026年5月上旬","source":"","confidence":"中"},{"id":"スポーツ-1779320403684-w5eaq","category":"スポーツ","title":"楽天・早川隆久が対ソフトバンク戦で7回無失点の快投——今季2勝目、防御率1.23","summary":"プロ野球パ・リーグの楽天対ソフトバンク戦（5月3日）で、楽天の先発・早川隆久投手が7回9奪三振・無失点の力投を見せ、今季2勝目（防御率1.23）を記録した。チームは7対0でソフトバンクを下し、GW中の重要な1勝を挙げた。早川はエース格として安定したピッチングを続け、パ・リーグ屈指の左腕として存在感を示している。","date":"2026年5月3日（日）","source":"https://baseball.yahoo.co.jp/npb/game/2021038809/top","confidence":"高"},{"id":"スポーツ-1779320403684-9rmpl","category":"スポーツ","title":"大谷翔平がドジャース対ブレーブス戦でタイムリーヒット——チームの逆転勝利に貢献","summary":"米大リーグ（MLB）のドジャース対ブレーブス戦（5月9日、ドジャースタジアム）で、ドジャースが3対1で勝利した。大谷翔平は5回裏に初球を捉えてライトへのタイムリーヒットを放ち、チームが2対1とリードする得点を演出した。大谷は4打数1安打1打点と活躍。2026年シーズンは打者として安定した成績を残している。","date":"2026年5月9日（土）","source":"https://topics.smt.docomo.ne.jp/article/sdaa/sports/sdaa-sdaa.jp-article-59560","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779320403684-odazs","category":"芸能・エンタメ・ゴシップ","title":"気象予報士・吉田ジョージさんが死去——東海テレビ出演後に倒れ脳幹出血で56歳","summary":"東海テレビの情報番組『スイッチ！』などで活躍した気象予報士の吉田ジョージさんが5月3日、脳幹出血のため56歳で死去した。4月17日の番組出演後に倒れて意識不明となり、そのまま帰らぬ人となった。分かりやすくユーモアを交えた解説スタイルで東海地方の視聴者に親しまれ、訃報に多くのファンから追悼の声が寄せられた。","date":"2026年5月3日（日）","source":"https://geitopi.com/%E8%A8%83%E5%A0%B1/%E6%B0%97%E8%B1%A1%E4%BA%88%E5%A0%B1%E5%A3%AB%E3%83%BB%E5%90%89%E7%94%B0%E3%82%B8%E3%83%A7%E3%83%BC%E3%82%B8%E3%81%8C56%E6%AD%B3%E3%81%A7%E6%80%A5%E6%AD%BB%E3%80%81%E6%AD%BB%E5%9B%A0%E3%81%AE%E7%97%85/","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779320403685-x4ec5","category":"芸能・エンタメ・ゴシップ","title":"「名探偵コナン」劇場版が興行収入100億円を突破——シリーズ最速ペース","summary":"2026年春に公開された「名探偵コナン」の最新劇場版が5月7日、興行収入100億円の大台を突破した。シリーズ歴代でも最速の100億円達成ペースとなり、GW期間中の集客が大きく貢献した。コナン劇場版は近年、毎年100億円超えを続けており、国民的アニメとしての存在感を改めて示した。","date":"2026年5月7日（水）","source":"","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779320403685-sknrj","category":"芸能・エンタメ・ゴシップ","title":"陸上・小池祐貴選手がヴァイオリニストの高松亜衣さんと結婚を発表","summary":"東京五輪代表でもある陸上短距離の小池祐貴選手（29）は5月9日、ヴァイオリニストの高松亜衣さんとの結婚を自身のSNSで発表した。スポーツと音楽という異色の組み合わせのカップルとして話題を集め、多くのファンや競技仲間から祝福のメッセージが寄せられた。","date":"2026年5月9日（土）","source":"","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779320403685-09stc","category":"芸能・エンタメ・ゴシップ","title":"元AKB48・仁藤萌乃が結婚を発表——インスタグラムで報告","summary":"元AKB48メンバーの仁藤萌乃さんが5月4日、自身のインスタグラムを更新し結婚を発表した。相手の詳細は公表していないが、多くの元メンバーやファンから祝福のコメントが届いた。","date":"2026年5月4日（月）","source":"","confidence":"中"},{"id":"テクノロジー-1779320403685-saeb0","category":"テクノロジー","title":"OpenAIが1,220億ドルの資金調達——企業評価額8,520億ドルでAI投資競争が加速","summary":"ChatGPTを開発する米OpenAIが2026年5月上旬、1,220億ドル（約18兆円）の新規資金調達を完了し、企業評価額が8,520億ドル（約127兆円）に達した。調達資金は研究開発に加え、複数クラウドにまたがる大規模コンピュートインフラへの投資に充てられる。AGI（汎用人工知能）実現を目指した開発競争が一段と激しさを増している。","date":"2026年5月上旬","source":"https://amiko.consulting/en/ai-major-news-and-implications-for-manufacturing-for-the-week-of-may-3-may-9-2026/","confidence":"高"},{"id":"テクノロジー-1779320403685-hyzk9","category":"テクノロジー","title":"AnthropicがGoogleと5年間2,000億ドル超のクラウド契約——22万台GPUのアクセスも確保","summary":"Claude（クロード）を開発する米AI企業AnthropicがGoogle Cloudと5年間・2,000億ドル超の大型クラウドインフラ契約を締結した。さらにSpaceXのColossus 1データセンターを通じて22万台以上のNVIDIA GPUへのアクセスも確保した。大量の計算資源の確保が最先端AI開発の鍵となっており、AI企業間のインフラ獲得競争が激化している。","date":"2026年5月上旬","source":"","confidence":"中"},{"id":"テクノロジー-1779320403685-ofbbj","category":"テクノロジー","title":"日本企業の生成AI活用が「管理フェーズ」へ移行——経産省・総務省ガイドラインの実装が本格化","summary":"経産省・総務省が策定した生成AIガイドラインの運用段階が本格化し、日本企業の生成AI活用が「どう使うか」から「どう管理するか」へ移行している。社内問い合わせ対応や営業資料生成など業務単位で動くAIエージェントの設計が進み、製造業ではRAG（社内データ連携）を活用した設計ナレッジ検索や生産トラブル推定への応用が広がっている。","date":"2026年5月上旬","source":"https://note.com/dsg_id/n/nf87dcbc4be7d","confidence":"高"},{"id":"政治-1779323211602-qmvho","category":"政治","title":"防衛装備移転三原則を改定、殺傷能力ある武器の輸出を原則解禁","summary":"高市内閣は4月21日、防衛装備移転三原則の運用指針を大幅改定し、輸出目的を「救難・輸送・警戒・監視・掃海」の5用途に限定していた「5類型」を撤廃した。これにより、殺傷能力のある完成品兵器の輸出が原則可能となり、安全保障政策の大転換となった。2023年のライセンス品完成品輸出解禁、2024年の次期戦闘機GCAP第三国輸出解禁に続く段階的緩和の集大成。","date":"2026年4月21日（火）","source":"https://news.web.nhk/newsweb/na/na-k10015104291000","confidence":"高","snippet":"「防衛装備品移転三原則」5類型撤廃 武器移転原則可能に 安全保障政策の転換（NHKニュース）"},{"id":"政治-1779323211603-cd5xq","category":"政治","title":"改正旅券法が成立、パスポート手数料を最大44%引き下げ — 7月施行","summary":"4月24日の参院本会議で改正旅券法が全会一致で可決・成立した。有効期間10年のパスポート申請手数料を現行の約1万6,000円から約8,900円に引き下げ（約44%減）、7月1日から施行される。18歳以上の5年用旅券は廃止し、10年用に一本化。国際的に見て低い日本のパスポート保有率向上を目的としている。","date":"2026年4月24日（金）","source":"https://www.jiji.com/jc/article?k=2026042400113&g=pol","confidence":"高","snippet":"パスポート手数料、７月から９０００円 改正旅券法が成立（時事ドットコム）"},{"id":"政治-1779323211604-9pj4g","category":"政治","title":"安保3文書改定へ有識者会議が初会合 — AI・ドローン活用を軸に年秋に提言","summary":"政府は4月27日、安全保障に関する有識者会議（全15名）の初会合を開催した。ウクライナや中東紛争でAI・ドローンが戦局を変えた教訓を踏まえ、「非対称的防衛能力」の構築を議論。秋に提言をまとめ、12月に国家安全保障戦略・国家防衛戦略・防衛力整備計画の3文書を改定する方針。","date":"2026年4月27日（月）","source":"https://www.sbbit.jp/article/cont1/185220","confidence":"中"},{"id":"政治-1779323211605-l2r0l","category":"政治","title":"牧野フライス製作所の買収、MBKパートナーズが断念 — 外為法改正後初の中止勧告","summary":"政府は4月22日、アジア系投資ファンド「MBKパートナーズ」による工作機械大手・牧野フライス製作所の買収に対し、2017年外為法改正後初となる買収中止勧告を発動した。高精度の工作機械が武器製造にも転用可能で安全保障上の懸念があると判断。MBKは4月30日に買収計画の正式断念を発表した。","date":"2026年4月30日（木）","source":"https://www.nikkei.com/article/DGXZQOUC22BJY0S6A420C2000000/","confidence":"高","snippet":"2017年の外為法改正以後、初めての事例。牧野フライスは軍事転用の可能性が特に高い機微な貨物として輸出に経済産業大臣の許可が必要な高性能工作機械を製造。（日本経済新聞）"},{"id":"経済-1779323211611-m04vc","category":"経済","title":"大和証券グループ、オリックス銀行を3,700億円で完全子会社化 — グループ史上最大の買収","summary":"大和証券グループ本社は4月27日、オリックスが持つオリックス銀行の全株式を3,700億円で取得し完全子会社化すると発表した。傘下の大和ネクスト銀行を通じた買収で、将来的に両行を合併させインターネット銀行として楽天銀行に次ぐ規模を目指す。10月までの完了を予定し、証券顧客基盤を生かした銀行機能の拡充で金利収益の向上を狙う。","date":"2026年4月27日（月）","source":"https://www.nikkei.com/article/DGXZQOUB275NU0X20C26A4000000/","confidence":"高","snippet":"大和証券グループ本社がオリックスから「全株式を3700億円で取得」し、オリックス銀行を完全子会社化するとのこと。同グループにとって過去最大規模の買収となります。（日本経済新聞）"},{"id":"経済-1779323211611-42yg0","category":"経済","title":"FILCOブランドで知られるダイヤテックが破産 — 高級キーボード市場の縮小で44年の歴史に幕","summary":"パソコン用キーボード「FILCO」ブランドを展開するダイヤテック株式会社（東京都千代田区、1982年設立）が4月22日に事業を終了し、4月30日に東京地裁から破産手続き開始決定を受けた。2016年に14億円超あった売上高は2024年に約8億円まで落ち込んでいた。PC市場の変化とキーボード需要の多様化が背景。44年の歴史に幕を下ろした。","date":"2026年4月30日（木）","source":"https://news.yahoo.co.jp/articles/c59cf6490bd336c7e5261208cd40102ee8454af5","confidence":"高"},{"id":"経済-1779323211612-p8at4","category":"経済","title":"2026年4月のM&A件数が121件で過去最多 — 取引総額も1.2兆円超","summary":"2026年4月の国内M&A件数が121件（前年同月比18.4%増）と、統計開始以来の4月単月最多を記録した。取引総額は1兆2,115億円（同21.5%増）。大和証券によるオリックス銀行買収（3,700億円）など大型案件が相次いだほか、中堅・中小企業の事業承継・再編も増加。TOB中心から株式譲渡・会社分割型へのシフトも見られ、産業再編が加速している。","date":"2026年4月30日（木）","source":"https://prtimes.jp/main/html/rd/p/000000346.000034249.html","confidence":"中"},{"id":"社会-1779323211613-3pj0b","category":"社会","title":"岩手・大槌町山林火災が激甚災害に指定 — 1,633haが焼失、一部避難解除進む","summary":"4月22日に発生した岩手県大槌町の山林火災は、4月26日時点で焼損面積が約1,633ヘクタールに達し、平成以降で2番目の規模となった。最大1,558世帯・3,257人に避難指示が出され、4月28日には政府が激甚災害に指定。4月29日に吉里吉里・安渡・赤浜・沢山の4地区で避難指示が解除されたが、4月30日時点でも一部に熱源が残り鎮圧に至らなかった。","date":"2026年4月28日（火）","source":"https://news.web.nhk/newsweb/na/na-k10015108391000","confidence":"高"},{"id":"社会-1779323211614-23y25","category":"社会","title":"三陸沖M7.7地震、後発地震注意情報が終了 — 大きな続発地震なく","summary":"4月20日に三陸沖（深さ約20km）で発生したM7.7の地震（青森県で最大震度5強）を受け、気象庁と内閣府が発表していた「北海道・三陸沖後発地震注意情報」が4月27日午後5時をもって終了した。大規模な続発地震は発生せず、1週間の警戒期間を経て情報が解除された。この情報の発令は制度導入後2度目で、沿岸部の住民は引き続き日頃の備えが求められた。","date":"2026年4月27日（月）","source":"https://www.bousai.go.jp/pdf/260420.pdf","confidence":"中"},{"id":"社会-1779323211615-5n0xe","category":"社会","title":"水俣病公式確認から70年 — 熊本・水俣市で慰霊式、救済求める訴えは続く","summary":"1956年5月1日に水俣病が公式確認されてから70年となる5月1日、熊本県水俣市で犠牲者慰霊式が開催された。工場排水のメチル水銀による中毒性神経疾患で、「公害の原点」とされる。国・自治体・原因企業チッソへの責任追及は続き、現在も患者認定を求める申請や賠償訴訟が行われている。70年の節目に改めて教訓の継承が求められている。","date":"2026年5月1日（金）","source":"https://news.web.nhk/newsweb/na/na-k10015112221000","confidence":"高"},{"id":"スポーツ-1779323211615-8naz9","category":"スポーツ","title":"フィギュア「りくりゅう」ペアが引退会見 — 冬季五輪金メダルで有終の美","summary":"ミラノ・コルティナ冬季五輪のフィギュアスケートペアで日本勢初の金メダルを獲得した三浦璃来（24）・木原龍一（33）が4月28日、都内で引退会見を行った。4月17日のSNS発表に続く公式会見で、フリーで世界歴代最高点をマークした五輪での逆転優勝を最高の思い出として語った。三浦は「今シーズンの初めから引退する気持ちを持ちながら滑っていた」と明かした。","date":"2026年4月28日（火）","source":"https://www.jiji.com/jc/article?k=2026041700266&g=spo","confidence":"高","snippet":"「今シーズンの初めから引退をするかもしれない気持ちを持ちながら滑っていた」（三浦璃来、引退会見）"},{"id":"スポーツ-1779323211615-maos0","category":"スポーツ","title":"岡本和真（ブルージェイズ）が4月後半に本塁打を量産、打点でチームトップに","summary":"MLBトロント・ブルージェイズの岡本和真は4月後半から量産ペースで本塁打を重ね、5月初旬時点で9本塁打・22打点とチームトップに立った。2026年1月に4年6,000万ドルで契約した岡本は、メジャー1年目ながら中軸として存在感を示している。3試合連続弾を放つなど「覚醒」と評され、日本人選手の活躍が続く。","date":"2026年4月下旬","source":"https://www.tokyo-sports.co.jp/articles/-/386991","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779323211616-sgznc","category":"芸能・エンタメ・ゴシップ","title":"大野智（元嵐）、元女優と「10年越し」の密会を週刊文春が報道","summary":"週刊文春は4月29日、嵐リーダー・大野智（45）が2015年に交際報道のあった元女優A子と約10年ぶりに再会し、密会を重ねていると報道。嵐は5月31日の東京ドーム公演でラストライブを控えており、ツアー公演の翌日にも会合が確認されたという。旧ジャニーズ事務所に引き裂かれた2人の「運命の再会」と報じられ、退所後のゴールインに関心が集まる。","date":"2026年4月29日（水）","source":"https://bunshun.jp/articles/-/88239","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779323211616-k3g3n","category":"芸能・エンタメ・ゴシップ","title":"バナナマン・日村勇紀が体調不良で当面休養 — 今年に入り体調不良が続く","summary":"お笑いコンビ「バナナマン」の日村勇紀（53）の所属事務所・ホリプロコムは4月28日、日村が体調不良のため当面の間休養することを発表した。「今年に入ってから体調を崩すことが多く、医療機関を受診した結果、医師より休養が必要との判断に至りました」と説明。TBSラジオ「バナナムーンGOLD」を2週連続で欠席しており、心身の回復を最優先とする。","date":"2026年4月28日（火）","source":"https://www.chunichi.co.jp/article/1243952","confidence":"高","snippet":"「今年に入ってから体調を崩すことが多く、医療機関を受診した結果、医師より休養が必要との判断に至りました。これを受け、当面の間、休養に専念させていただきます」（ホリプロコム発表）"},{"id":"芸能・エンタメ・ゴシップ-1779323211617-17e2a","category":"芸能・エンタメ・ゴシップ","title":"女優・五十嵐淳子さんが急死 — 中村雅俊の妻、73歳","summary":"女優で中村雅俊の妻・五十嵐淳子さんが4月28日、急病のため73歳で逝去した。5月2日に所属事務所ノースプロダクションが発表。1977年に中村と結婚した「おしどり夫婦」として知られ、病名は非公表。中村雅俊は「俺の人生最大のラッキーは妻と出会ったことでした。その妻を亡くすことなど考えたことがなくて、今はその現実を受け止めることができません」とコメントした。","date":"2026年5月2日（土）","source":"https://geitopi.com/%E8%A8%83%E5%A0%B1/%E5%A5%B3%E5%84%AA%E3%83%BB%E4%BA%94%E5%8D%81%E5%B5%90%E6%B7%B3%E5%AD%90%E3%81%8C%E6%80%A5%E6%AD%BB%E3%80%82%E6%AD%BB%E5%9B%A0%E3%81%AE%E7%97%85%E5%90%8D%E9%9D%9E%E5%85%AC%E8%A1%A8%E3%82%82%E6%80%A5/","confidence":"高","snippet":"「俺の人生最大のラッキーは妻と出会ったことでした。その妻を亡くすことなど考えたことがなくて、今はその現実を受け止めることができません」（中村雅俊コメント）"},{"id":"テクノロジー-1779323211617-0xkn6","category":"テクノロジー","title":"OpenAI、「GPT-5.5」発表 — 複数タスクを自律実行するエージェントAIに大幅進化","summary":"OpenAIは4月23日、最新AIモデル「GPT-5.5」を発表した。マルチステップ作業をユーザーの継続的な指示なしに完遂する「エージェンティックAI」として設計され、コーディング・データ分析・文書作成を1ワークフローで処理する。100万トークンのコンテキストウィンドウを搭載し、企業向けに「Workspace Agents」機能も実装。ユーザーがオフライン中もクラウド上で自律動作を継続する。","date":"2026年4月23日（木）","source":"https://www.sbbit.jp/article/cont1/185117","confidence":"高","snippet":"「複雑な自律型タスクの遂行に特化」し、ユーザーから与えられた曖昧な目標を解釈し自ら必要なツールを選択して作業を進める。人間による監視を最小限に抑えながら、計画・実行・エラー修正までを単独で完結させるエージェント機能が最大の特徴。（ビジネス+IT）"},{"id":"テクノロジー-1779323211617-wllmo","category":"テクノロジー","title":"Google、AnthropicにAI覇権争いで最大400億ドル（約4兆円）の追加投資","summary":"Googleは4月24日、AI企業Anthropicへの最大400億ドル（約4兆円）の追加投資を発表した。即時100億ドルを出資し、業績目標達成に応じて最大300億ドルを追加。Google CloudがTPU 5GW規模のコンピュート（計算資源）を5年間供給する条件も付く。OpenAIへの対抗措置として、AI三強（OpenAI・Anthropic・Google）の資本関係が一段と複雑化している。","date":"2026年4月24日（金）","source":"https://gleamhub.net/media/0213-google-anthropic-40b-investment/","confidence":"高","snippet":"即時100億ドルを評価額350億ドルで出資し、業績マイルストーン達成時に追加300億ドルを段階投資。Google CloudからTPU+GPUを含む5ギガワット規模のコンピュートを5年間供給する契約も付随。（GH Media）"},{"id":"テクノロジー-1779323211617-tgzy4","category":"テクノロジー","title":"Microsoft Copilot、AnthropicのClaudeを選択可能に — 企業向けマルチモデル対応が本格始動","summary":"Microsoftは4月、企業向けAIアシスタント「Copilot」にAnthropicの「Claude」を統合し、GPTとClaudeを用途に応じて選択できるマルチモデル体制を整えた。企業向け新プランに合わせて長時間・複数ステップ作業を自律実行する「Copilot Cowork」も投入。AI各社がエコシステムを超えて連携する動きが加速している。","date":"2026年4月中旬","source":"https://techcommunity.microsoft.com/blog/microsoftmechanicsblog/claude--gpt--multi-model-intelligence-in-copilot/4509773","confidence":"中"},{"id":"政治-1779363493432-pm6ax","category":"政治","title":"国家情報局設置法案が衆院通過 — 首相を議長とする「国家情報会議」も創設","summary":"4月23日の衆院本会議で国家情報局設置法案が与党・中道改革連合・国民民主党の賛成多数で可決した。首相を議長とする「国家情報会議」（安保・テロ・外国影響工作を審議）と、事務局を担う「国家情報局」を設置する内容。現行の内閣情報官を格上げした情報局長を置く。プライバシー侵害懸念には付帯決議で配慮を明記。参院でも過半数の賛成が見込まれ今国会中の成立が有力。","date":"2026年4月23日（木）","source":"https://www.jiji.com/jc/article?k=2026042300112&g=pol","confidence":"高","snippet":"「首相を議長とする国家情報会議と、事務局を担う国家情報局を設置するもの。同会議は安全保障やテロリズムに関する「重要情報活動」の調査・審議を実施。外国勢力による影響工作への対処について基本方針を決定する。」（時事ドットコム）"},{"id":"政治-1779363493434-nr5bg","category":"政治","title":"衆議院憲法審査会、「緊急事態条項」で各党が集中審議 — 参院選前に改憲論議活発化","summary":"4月23日、衆議院憲法審査会が「緊急事態条項」をテーマに集中討議を実施した。自民・公明は積極的な憲法改正を主張、立憲民主は「国会が機能停止するケースは現行法で対応可能」と慎重論を展開。三陸沖地震（4/20）や能登の経験を踏まえ、改憲派は「有事に権限を集中させる緊急事態条項の必要性」を強調。7月の参院選を前に各党のスタンスが鮮明になっている。","date":"2026年4月23日（木）","source":"","confidence":"中"},{"id":"政治-1779363493438-gng7i","category":"政治","title":"玉城デニー知事が沖縄知事選への3選出馬を正式表明 — 辺野古移設阻止を掲げ","summary":"沖縄県の玉城デニー知事（66）が4月25日、9月13日投開票の知事選への3選出馬を正式表明した。2018年・2022年と辺野古移設反対を掲げて当選した実績を背景に「オール沖縄」勢力の支援を受けて挑む。対立候補として自民党系が擁立を検討しており事実上の一騎打ちとなる見通し。玉城氏は「辺野古ノー」「県民の負担軽減」を最大の争点とする方針。","date":"2026年4月25日（土）","source":"https://www.nikkei.com/article/DGXZQOJC212AR0R20C26A4000000/","confidence":"高","snippet":"「沖縄県知事選挙、玉城デニー氏が3選出馬を正式表明 辺野古移設に反対」（日本経済新聞）"},{"id":"経済-1779363493438-a9ofo","category":"経済","title":"2026年3月期決算シーズン開幕、上場企業5年連続最高益の見通し","summary":"4月下旬から3月期本決算の発表が本格化し始めた。日本経済新聞の集計では、上場企業の純利益は従来予想の前期比2%減から一転して1%増となり、5年連続で過去最高益を更新する見通し。AI投資関連需要の拡大・円安・内需回復が業績を下支え。ただし今後の為替動向や米中対立の行方が下半期の不確定要素として意識される。","date":"2026年4月下旬","source":"https://www.nikkei.com/article/DGXZQOUB092RK0Z00C26A2000000/","confidence":"中"},{"id":"スポーツ-1779363493439-049a9","category":"スポーツ","title":"TEAM JAPAN帰国感謝パレード — 日本橋に約5万人、冬季五輪・パラ史上初の開催","summary":"ミラノ・コルティナ2026冬季五輪・パラリンピックの日本代表選手115名が4月25日、東京・日本橋中央通り約700mで感謝パレードを実施した。金メダリストの三浦璃来・木原龍一（りくりゅう）ペア、フィギュア女王・坂本花織らが沿道に手を振り、約5万人の観衆が声援を送った。冬季五輪・パラリンピックとしての帰国パレードは史上初。","date":"2026年4月25日（土）","source":"https://www.joc.or.jp/news/20260409_01.html","confidence":"高","snippet":"「本イベントには、オリンピックメダリスト（23選手）・パラリンピックメダリスト（3選手）をはじめ、出場アスリート総勢115名が参加。日本橋中央通り約700mのパレードに約5万人が集まった。」（JOC）"},{"id":"スポーツ-1779363493439-ojoxa","category":"スポーツ","title":"鈴木誠也（カブス）2戦連続2号2ランの活躍、カブス3年ぶり8連勝","summary":"シカゴ・カブスの鈴木誠也（31）が4月22日のフィリーズ戦で2試合連続となる2号2ランを含む4打数2安打2打点の活躍。チームは7-2で快勝し3年ぶりとなる8連勝を達成し通算15勝9敗とした。今季打率.279で4番に定着し、チームの主砲として機能。カブスは地区4位から一気に上位浮上の勢いを見せている。","date":"2026年4月22日（水）","source":"https://www.tsp21.com/sports/mlb/news2026/0422.html","confidence":"高","snippet":"「鈴木誠也は4番ライトで出場し4度の打席で2本塁打2打点を記録。カブスは7-2でフィリーズに勝利し3年ぶり8試合連勝を達成（通算15勝9敗）。」（TSP SPORTS）"},{"id":"スポーツ-1779363493440-h6dbu","category":"スポーツ","title":"大谷翔平（ドジャース）6回無失点の好投も、53試合連続出塁記録が止まる","summary":"ロサンゼルス・ドジャースの大谷翔平（31）が4月23日のジャイアンツ戦（アウェー）で先発。6回を2安打7奪三振・無失点に抑える力投を見せた。しかし打者として3打数0安打に終わり、球団歴代2位となる53試合連続出塁記録がストップした。大谷は「記録より勝つことが大事」とコメント。4月を通じて投打二刀流で好成績を残し、NL月間MVP（3〜4月）の有力候補に名前が挙がっている。","date":"2026年4月23日（木）","source":"https://baseball.yahoo.co.jp/mlb/game/2026042314/score?index=0620100","confidence":"高","snippet":"「大谷翔平は6回無失点の好投を見せたが打者としては0安打に終わり、連続試合出塁記録「53」でストップした。」（スポーツナビ）"},{"id":"芸能・エンタメ・ゴシップ-1779363493441-6iutw","category":"芸能・エンタメ・ゴシップ","title":"元EXILE・黒木啓司が妻・宮崎麗果と離婚 — 約11年の婚姻に終止符","summary":"元EXILEメンバーの黒木啓司（40）と女優の宮崎麗果（37）が4月21日に離婚したと双方の所属事務所が発表した。2人は2015年に結婚し、約11年の結婚生活に終止符を打った。2014年にEXILEを卒業した黒木は2010年代前半に全国的な知名度を誇った。離婚理由は「互いの価値観の違い」とのみ説明され、詳細は非公表。","date":"2026年4月21日（火）","source":"https://geitopi.com/","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779363493442-ud3db","category":"芸能・エンタメ・ゴシップ","title":"バナナマン・日村勇紀が2週連続番組欠席 — 相方・設楽統が番組内で異変を告白","summary":"お笑いコンビ「バナナマン」の日村勇紀（53）が4月25日放送のTBSラジオ「バナナムーンGOLD」を2週連続で欠席した。相方の設楽統（52）が「体の調子が良くないようで」と番組内で現状を明かした。正式な休養発表は後日（4月28日）となり、「医師から休養が必要との判断」との理由が説明された。","date":"2026年4月25日（土）","source":"","confidence":"中"},{"id":"テクノロジー-1779363493442-j85l1","category":"テクノロジー","title":"Amazon・Anthropic、AI開発に向け長期の大規模クラウド利用契約を締結","summary":"Amazon Web Services（AWS）と生成AIスタートアップのAnthropicが、AI開発・運用インフラに関する長期の大規模クラウド利用契約を締結したことが明らかになった。AnthropicのClaudeモデルの学習・推論基盤を原則としてAWS上で稼働させることを約束するもの。Amazonはすでに出資関係にあるAnthropicの主要クラウドパートナーとして計算資源面での関係をさらに強化した。","date":"2026年4月第3週","source":"https://amiko.consulting/2026%E5%B9%B4-4%E6%9C%8819%E6%97%A5%EF%BD%9E4%E6%9C%8825%E6%97%A5-ai%E4%B8%BB%E8%A6%81%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9%E7%B7%8F%E3%81%BE%E3%81%A8%E3%82%81%E3%81%A8%E8%A3%BD%E9%80%A0%E6%A5%AD/","confidence":"中"},{"id":"社会-1779363493443-7ke08","category":"社会","title":"岩手・大槌町で山林火災が発生、乾燥と強風で急速に延焼拡大","summary":"4月22日13時53分、岩手県大槌町の小鎚地区で山林火災が発生。約2時間半後には隣接する吉里吉里地区にも延焼が確認された。強風と乾燥した気候条件が重なり火勢が衰えず、週内に焼損面積は1,370ヘクタールに達し、住民が避難を開始した。消防・防衛省ヘリなど全国から消火体制が組まれたが、鎮圧のめどは立っていない。","date":"2026年4月22日（水）","source":"https://arrows.peace-winds.org/journal/18491/","confidence":"高"},{"id":"社会-1779363493444-p14pm","category":"社会","title":"JR福知山線脱線事故から21年 — 兵庫・尼崎で追悼慰霊式、最後の生存者が初参列","summary":"2005年4月25日に乗客106人と運転士が死亡、562人が重軽傷を負ったJR福知山線脱線事故から21年となる4月25日、兵庫県尼崎市の慰霊施設「祈りの杜」で追悼慰霊式が行われた。JR西日本の幹部らが安全運行を誓い、遺族とともに犠牲者の冥福を祈った。今年の式典では事故当時最後に救出された生存者の男性が初めて参列し、語り継がれる記憶と風化防止の課題が改めて問われた。","date":"2026年4月25日（土）","source":"https://www.jiji.com/jc/article?k=2026042500129&g=soc","confidence":"高","snippet":"「脱線から２１年、冥福祈る 「風化させない」と思い新た―記憶継承が課題・福知山線事故」（時事ドットコム）"},{"id":"社会-1779363493445-uzkfx","category":"社会","title":"最高裁、「ストッケ」子ども椅子の著作権を否定 — 量産実用品の著作権保護に初判断","summary":"最高裁第2小法廷（岡村和美裁判長）は4月24日、ノルウェーの家具メーカー「ストッケ」社の子ども用椅子「トリップ・トラップ」（世界累計1,400万台）は著作権法で保護される著作物に当たらないとの判決を下した。量産実用品の著作権保護をめぐる最高裁初判断。「機能に由来する構成とは別に、思想・感情の創作的表現として把握できる場合のみ保護対象」との基準を示し、デザイン業界に影響を与える判決として注目される。","date":"2026年4月24日（金）","source":"https://www.jiji.com/jc/article?k=2026042401005&g=soc","confidence":"高","snippet":"「量産実用品に著作権が例外として認められるのは「機能に由来する構成とは別に、思想または感情の創作的な表現として把握できる場合」との判断基準を示した。」（時事ドットコム）"},{"id":"スポーツ-1779363493445-jn8a5","category":"スポーツ","title":"村上宗隆（ホワイトソックス）4月後半に本塁打を量産、ア・リーグ首位争いに絡む","summary":"シカゴ・ホワイトソックスの村上宗隆（26）が4月後半に本塁打を量産し、メジャー1年目ながら頭角を現している。4月下旬時点で7〜8号本塁打を放ちアメリカン・リーグの本塁打ランキング上位に進出。選球眼の良さも発揮し、指名打者として主軸に定着しつつある。2年契約でポスティング移籍し、NPBで通算実績を誇る主砲がMLBでも存在感を示している。","date":"2026年4月下旬","source":"https://baseballking.jp/ns/693300/","confidence":"中","snippet":"「村上宗隆、2戦連発の7号ソロ含む4出塁 ア・リーグ本塁打トップまで1本差」（BASEBALL KING）"},{"id":"テクノロジー-1779363493445-kzgfm","category":"テクノロジー","title":"TSMC、次世代AI向け半導体「A13」の2029年量産計画を公表","summary":"台湾の半導体受託製造大手TSMCが4月第3週、次世代AI向けプロセス「A13」を2029年に量産開始するロードマップを発表した。低コスト版の「N2U」も追加し、2028年までに大型チップ10個と高帯域メモリ20スタックを一体化できる先端パッケージングも実現する計画。AI向け半導体の需要増加を見越し、設計・製造ともに競争が激化している。","date":"2026年4月第3週","source":"https://amiko.consulting/2026%E5%B9%B4-4%E6%9C%8819%E6%97%A5%EF%BD%9E4%E6%9C%8825%E6%97%A5-ai%E4%B8%BB%E8%A6%81%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9%E7%B7%8F%E3%81%BE%E3%81%A8%E3%82%81%E3%81%A8%E8%A3%BD%E9%80%A0%E6%A5%AD/","confidence":"中"},{"id":"政治-1779364689988-e9rkd","category":"政治","title":"第93回自民党大会、高市首相「憲法改正発議のめどを2027年春までに」と演説","summary":"4月12日、グランドプリンスホテル新高輪で第93回自民党大会が開催された。高市早苗首相は結党70年の節目にあたり「時は来た。発議にめどが立った状態で来年の党大会を迎えたい」と述べ、2027年春までに憲法改正発議のめどをつけることへの強い意欲を表明した。党が策定した新ビジョンにも改憲が「死活的に求められている」と明記。7月参院選に向けて改憲論議の加速を高らかに宣言した形となった。","date":"2026年4月12日（日）","source":"https://www.nikkei.com/article/DGXZQOUA111B90R10C26A4000000/","confidence":"高","snippet":"「高市早苗首相は憲法改正に向けた発議のメドを2027年春までにつけることに意欲を示した。結党70年に合わせて策定した新ビジョンにも改憲が『死活的に求められている』と記した。」（日本経済新聞）"},{"id":"政治-1779364689989-k5iao","category":"政治","title":"南鳥島での核廃棄物最終処分場「文献調査」、小笠原村長が容認を表明","summary":"東京都小笠原村の渋谷正昭村長は4月13日、南鳥島（島全体が国有地・面積1.5km²）での高レベル放射性廃棄物の最終処分場選定に向けた第1段階「文献調査」について、「国の判断を尊重する」として容認する意向を表明した。地元自治体からの要請ではなく国主導で進める初の事例となる見通しで、文献調査が行われれば北海道の2町村・佐賀県玄海町に続き全国4例目。調査期間は約2年で地質図や論文をもとに安全性を評価する。","date":"2026年4月13日（月）","source":"https://www.jiji.com/jc/article?k=2026041300124&g=pol","confidence":"高","snippet":"「東京都小笠原村の渋谷正昭村長が2026年4月13日、南鳥島で高レベル放射性廃棄物の最終処分場選定の第1段階となる文献調査を容認する意向を表明した。地元の要請に基づかずに国が主導する初の事例となる。」（時事ドットコム）"},{"id":"政治-1779364689990-nnc29","category":"政治","title":"柏崎刈羽原発6号機、14年ぶりに営業運転を再開 — 東日本大震災後の東電原発として初","summary":"東京電力は4月16日、新潟県の柏崎刈羽原子力発電所6号機（135.6万kWe）の営業運転を再開した。東電の原発が営業運転するのは東日本大震災後初めてで、2012年3月以来14年ぶり。1月の再稼働後に発生したトラブルにより2度延期されていたが、安全対策完了を確認して稼働にこぎ着けた。経済産業大臣は「ホルムズ海峡経由のLNG輸入量を年間約3割節約できる効果がある」と述べ、エネルギー安全保障上の意義を強調した。","date":"2026年4月16日（木）","source":"https://www.jaif.or.jp/journal/japan/33350.html","confidence":"高","snippet":"「東京電力は2026年4月16日、柏崎刈羽原子力発電所6号機の営業運転を開始した。同機が営業運転に入るのは14年ぶり。」（原子力産業新聞）"},{"id":"政治-1779364689993-3oe56","category":"政治","title":"元運輸大臣・藤井孝男氏が急性心筋梗塞で死去 — 83歳、橋本内閣で閣僚歴任","summary":"橋本内閣（1997年）で運輸大臣を務めた自民党のベテラン政治家、藤井孝男氏が4月13日午前7時44分、急性心筋梗塞のため自宅で死去した。83歳。岐阜県白川町出身で衆院議員5期・参院議員4期を歴任し、大蔵政務次官・自民党岐阜県連会長なども務めた。地元・白川町から「政治家としての信念と行動力がある男だった」と惜しむ声が相次いだ。","date":"2026年4月13日（月）","source":"https://www.jiji.com/jc/article?k=2026041700008&g=pol","confidence":"高","snippet":"「橋本内閣で運輸大臣を務めた藤井孝男氏が4月13日午前7時44分、急性心筋梗塞のため自宅で死去した。83歳だった。衆院議員5期・参院議員4期を歴任した。」（時事ドットコム）"},{"id":"経済-1779364689993-9yn1m","category":"経済","title":"東宝、2026年2月期の純利益517億円で過去最高益 — 「鬼滅の刃」「国宝」映画が牽引","summary":"東宝（9602）が4月14日に発表した2026年2月期の連結決算で、純利益が前期比19%増の517億円となり2年ぶりに過去最高を更新した。東宝グループ国内年間興行収入も1605億円で過去最高。「劇場版『鬼滅の刃』無限城編 第一章」は全世界で日本映画初の1000億円を突破し、実写映画「国宝」は国内実写映画の興収記録を22年ぶりに更新した。「コナン」「チェンソーマン」も好調でIPビジネスの拡大が続く。","date":"2026年4月14日（火）","source":"https://www.nikkei.com/article/DGXZQOUB139950T10C26A4000000/","confidence":"高","snippet":"「東宝の2026年2月期の連結決算では、純利益が前期比19%増の517億円となり、2年ぶりに最高益を更新した。東宝配給作品の興行収入は1,399億円で歴代最高を更新し、劇場版『鬼滅の刃』や『国宝』のヒットが収益を押し上げた。」（日本経済新聞）"},{"id":"経済-1779364689994-h0kug","category":"経済","title":"JR東日本と伊藤忠商事、不動産子会社を10月に統合 — 「JR東日本伊藤忠不動産開発」を設立","summary":"JR東日本と伊藤忠商事は4月15日、それぞれの子会社であるJR東日本不動産と伊藤忠都市開発を合併し、JR東日本60%・伊藤忠40%出資の新会社「JR東日本伊藤忠不動産開発株式会社」を2026年10月1日付で設立すると発表した。JR東日本が持つ首都圏の社宅跡地約8万5000m²の開発と伊藤忠グループの住宅開発ノウハウを融合する。両社の合計売上高は約900億円（2026年3月期）で、5年間で2500億円規模への成長を目指す。","date":"2026年4月15日（水）","source":"https://www.itochu.co.jp/ja/news/press/2026/260415_2.html","confidence":"高","snippet":"「JR東日本が60%、伊藤忠商事が40%出資する『JR東日本伊藤忠不動産開発株式会社』を設立すると発表。今後5年間で売上2,500億円規模への飛躍的な成長を目指す。2026年10月1日の効力発生が予定されている。」（伊藤忠商事プレスリリース）"},{"id":"経済-1779364689995-ca1q8","category":"経済","title":"第一三共ヘルスケアをサントリーHDに2465億円で売却 — OTC医薬品事業を移管","summary":"第一三共（4568）は4月15日、連結子会社の第一三共ヘルスケア（ロキソニンSやガスター10などのOTC医薬品を手掛ける）の全株式をサントリーホールディングスに譲渡する契約を締結した。譲渡価額は2465億円。2026年6月に30%を先行取得、2027年6月に40%、2029年6月に残り30%を購入して完全子会社化する計画。第一三共は医療用医薬品（オンコロジー）への集中を加速させ、サントリーは健康・ウェルネス分野の強化を図る。","date":"2026年4月15日（水）","source":"https://www.nikkei.com/article/DGXZQOUC152O90V10C26A4000000/","confidence":"高","snippet":"「第一三共は連結子会社の第一三共ヘルスケアの全株式をサントリーホールディングスに譲渡する株式譲渡契約を締結、譲渡価額の合計は2465億円。完全子会社化は2029年6月までに完了させる予定。」（日本経済新聞）"},{"id":"社会-1779364689995-lasx7","category":"社会","title":"内閣府、2025年の「孤立死」が年間2万2222人と推計を初公表 — 3割近くが死後8日以上で発見","summary":"内閣府は4月14日、2025年に一人暮らしの自宅で死亡した約7万7000人のうち、「孤立死」（死後8日以上経過して発見）が2万2222人だったとする推計を初めて公表した。全体の約3割近くにあたる。85歳以上が最多で、男性が全体の約8割を占める。政府は「孤独・孤立対策推進法」に基づき実態把握を強化しており、今後の防止策検討に活用する方針。","date":"2026年4月14日（火）","source":"https://www.nippon.com/ja/japan-data/h02768/","confidence":"高","snippet":"「一人暮らしの自宅で死亡した7万6941人のうち、死後8日以上経過して発見された『孤立死』が全体の3割近い2万2222人だった。」（nippon.com）"},{"id":"社会-1779364689996-obc36","category":"社会","title":"熊本地震本震から10年 — 県と全市町村共催の追悼式、278人の犠牲者を悼む","summary":"2016年4月16日の熊本地震「本震」（M7.3）から4月16日で10年を迎えた。熊本県と県内全45市町村共催の追悼式が熊本城ホール（熊本市中央区）で開かれ、木原稔官房長官や遺族ら約250人が参列。犠牲者278人の冥福を祈り、1分間の黙とうをささげた。木村敬知事は「地震の記憶を決して風化させることなく、いつ起こるか分からない災害への備えとして確かな形で次の世代に伝えていく」と誓った。","date":"2026年4月16日（木）","source":"https://www.jiji.com/jc/article?k=2026041600144&g=soc","confidence":"高","snippet":"「2026年4月16日、熊本県と県内全45市町村の共催による追悼式が熊本城ホールで開催され、亡くなった278人の冥福を祈った。」（時事ドットコム）"},{"id":"社会-1779364689996-itnao","category":"社会","title":"長野県北部でM5.0震度5強・M5.1震度5弱が約90分で2度連続 — 8年ぶりの規模","summary":"4月18日午後1時20分頃、長野県北部を震源とするM5.0の地震が発生し、大町市で最大震度5強、長野市で震度5弱を観測。約90分後の午後2時54分頃にも同地域でM5.1の地震が発生し、最大震度5弱。津波の心配はなし。長野県北部での震度5強以上は2018年5月以来8年ぶり。糸魚川ー静岡構造線断層帯付近が震源で、長野市内の体育館では天井から鉄板が落下するなど家屋の一部損壊が100軒以上にのぼった。","date":"2026年4月18日（土）","source":"https://weathernews.jp/news/202604/190061/","confidence":"高","snippet":"「4月18日13時20分頃、長野県北部でM5.0の地震が発生し最大震度5強を観測。約90分後にもM5.1の地震が発生し最大震度5弱。長野県北部で震度5強以上は2018年5月以来8年ぶり。」（ウェザーニュース）"},{"id":"社会-1779364689997-t7jr9","category":"社会","title":"京都・南丹市の山林で11歳男児の遺体発見 — 父親を死体遺棄容疑で逮捕","summary":"4月13日、京都府南丹市園部町の山林で、3月23日から行方不明になっていた同小学校5年生の安達結希さん（11）の遺体が発見された。京都府警は4月15日、安達さんの父親（37、会社員）を死体遺棄の疑いで逮捕。父親は「私のやったことに間違いありません」と容疑を認めた。司法解剖の結果、死因は不詳で死亡推定日時は3月下旬頃。その後、府警は父親を殺人容疑でも再逮捕し「首を絞めて殺した」と供述した。","date":"2026年4月15日（水）","source":"https://www.jiji.com/jc/article?k=2026041501163&g=soc","confidence":"高","snippet":"「安達結希さん（11）の遺体の遺棄に関与したとして、府警が死体遺棄容疑で安達さんの30代の父親を逮捕した。容疑者は『私のやったことに間違いありません』と容疑を認めている。」（時事ドットコム）"},{"id":"スポーツ-1779364689997-5n91z","category":"スポーツ","title":"三浦璃来・木原龍一（りくりゅう）がSNSで現役引退を発表 — ミラノ五輪金メダル直後の決断","summary":"フィギュアスケートペア「りくりゅう」の三浦璃来（24）と木原龍一（33）が4月17日、所属先のSNSで今季限りでの現役引退を発表した。2月のミラノ・コルティナ冬季五輪でペア種目における日本勢初の金メダルを獲得し、さらにグランプリファイナル・四大陸・世界選手権のグランドスラムも達成した絶頂期での引退表明となった。2人は「これ以上の景色はない」とコメントし、4月28日に正式な引退会見を予定していると明かした。","date":"2026年4月17日（金）","source":"https://www.jiji.com/jc/article?k=2026041700266&g=spo","confidence":"高","snippet":"「三浦璃来（24）と木原龍一（33）が所属先のSNSで今季限りでの現役引退を発表した。同年2月のミラノ・コルティナ五輪でペア種目における日本勢初の金メダルを獲得した直後の決断である。」（時事ドットコム）"},{"id":"スポーツ-1779364689998-4so3r","category":"スポーツ","title":"なでしこジャパン、世界女王アメリカ女子代表に1-0勝利 — 浜野まいかの芸術的ゴールが決勝点","summary":"4月15日にシアトルのLumen Fieldで行われた国際親善試合の第2戦（全3戦）で、なでしこジャパンがFIFAランキング2位の米国女子代表を1-0で下した。前半26分にMF浜野まいかが鋭い切り返しから決勝ゴールを奪い完封勝利。AFC女子アジアカップ優勝後の強化試合として組まれた3連戦で、狩野監督代行体制での初白星となった。なお3連戦は1勝2敗（第1戦1-2敗、第3戦0-3敗）で終了した。","date":"2026年4月15日（水）","source":"https://web.gekisaka.jp/news/japan/detail/?449524-449524-fl=","confidence":"高","snippet":"「浜野まいかが個人技からゴールを決め、なでしこジャパンが世界女王アメリカ女子代表を1-0で完封。狩野監督代行体制での初白星となった。」（ゲキサカ）"},{"id":"芸能・エンタメ・ゴシップ-1779364689999-m8me0","category":"芸能・エンタメ・ゴシップ","title":"漫画家・エッセイストの東海林さだおさんが88歳で死去 — 「タンマ君」「丸かじりシリーズ」で知られる","summary":"「タンマ君」「アサッテ君」などの4コマ漫画と食エッセイ「丸かじりシリーズ」で知られる漫画家・エッセイストの東海林さだお（本名・荘司常雄）さんが4月5日、心不全のため死去した。88歳。4月15日に訃報が広く報じられた。毎日新聞朝刊で長年連載した「アサッテ君」は13,749回の連載回数で全国紙連載漫画の最多記録を樹立。1997年に菊池寛賞、2000年に紫綬褒章を受章するなど、サラリーマンの哀歓をユーモアで描いた作風で愛された。","date":"2026年4月15日（水）","source":"https://www.nikkei.com/article/DGXZQOUD152S30V10C26A4000000/","confidence":"高","snippet":"「漫画家の東海林さだお氏は、2026年4月5日に心不全のため88歳で逝去した。『タンマ君』や『アサッテ君』などの長期連載漫画で知られ、サラリーマンの日常と食文化をユーモアを交えて描く作風で活躍した。」（日本経済新聞）"},{"id":"テクノロジー-1779364689999-t4vb1","category":"テクノロジー","title":"Anthropic、Claude Opus 4.7を公開 — コーディングベンチマーク87.6%、画像解像度3倍超に向上","summary":"米Anthropicは4月16日、最新フラッグシップモデル「Claude Opus 4.7」を一般公開した。コーディングのベンチマーク「SWE-bench Verified」で87.6%のスコアを達成し、楽天グループの本番環境相当タスクでは解決数が従来比3倍に。ビジョン機能も刷新され、処理可能な最大画像解像度が従来の1.15MPから3.75MPへ拡大された。API料金は据え置きで実質的なコストパフォーマンス向上。Cursor・GitHub Copilotへの統合も同日発表された。","date":"2026年4月16日（木）","source":"https://www.sbbit.jp/article/cont1/184682","confidence":"高","snippet":"「Claude Opus 4.7はSWE-bench Verifiedで87.6%、SWE-bench Proで64.3%のスコアを達成。ビジョン機能も処理可能な画像解像度が従来の約1.15メガピクセルから3.75メガピクセルに拡大された。」（ビジネス+IT）"},{"id":"テクノロジー-1779364689999-bni80","category":"テクノロジー","title":"ソフトバンク、国産LLM「Sarashina」活用の生成AIサービスを法人向けに6月から提供","summary":"ソフトバンクは4月16日、SB Intuitionsが開発した国産LLM「Sarashina（さらしな）」を活用した生成AIサービスを、Oracleのクラウド基盤「Oracle Alloy」を採用した自社クラウド「Cloud PF Type A」上で2026年6月から法人向けに提供開始すると発表した。データが国内データセンターで完結する「ソブリン性」を確保しつつ、文章校正・レポート自動生成・プログラミング支援・マルチエージェントなど幅広い業務効率化に対応する。","date":"2026年4月16日（木）","source":"https://www.itmedia.co.jp/aiplus/articles/2604/17/news093.html","confidence":"高","snippet":"「ソフトバンクが国産LLM『Sarashina』の業務支援サービスを6月から順次提供開始。Oracleサービスを使い自社DCで構築し、データ主権確保を掲げる『ソブリン性確保』がキーワード。」（ITmedia AI+）"},{"id":"テクノロジー-1779364690003-br6p5","category":"テクノロジー","title":"Google、Gemini「パーソナルインテリジェンス」を日本で提供開始 — GmailやGoogleフォトを横断参照","summary":"Googleは4月14日、AI「Gemini」のパーソナライズ機能「Personal Intelligence」の日本提供を開始した。ユーザーの明示的な許可を前提に、Gmail・Googleフォト・検索履歴・YouTube視聴履歴などを横断的に参照して個人最適化された回答を生成する。「旅行の予定を教えて」と聞くとGmailから予約情報を整理してタイムラインを提示するなど、個人秘書的な活用が可能に。Google AI Plus（月額1200円）などの有料プランから順次提供が開始され、数週間以内に無料版にも拡大予定。","date":"2026年4月14日（火）","source":"https://www.watch.impress.co.jp/docs/news/2101706.html","confidence":"高","snippet":"「Googleが日本でもGeminiアプリの『パーソナルインテリジェンス』を提供開始。Gmail・Googleフォト・検索履歴などの個人データを基にGeminiが回答を最適化する。」（Impress Watch）"},{"id":"政治-1779366065960-73v3u","category":"政治","title":"令和8年度当初予算が参院で可決・成立 — 一般会計122.3兆円、11年ぶりの4月成立","summary":"4月7日の参議院本会議で令和8年度（2026年度）当初予算が自民・維新・日本保守党などの賛成多数で可決・成立した。一般会計総額は122兆3092億円と過去最大。暫定予算（3月30日成立）が先行したことで本予算の成立が4月にずれ込んだのは11年ぶり。高市政権が掲げる「責任ある積極財政」の下、防衛力強化・少子化対策・経済安全保障・AI投資への重点配分が特徴。防衛費は過去最大の8.9兆円規模となった。","date":"2026年4月7日（火）","source":"https://www.kantei.go.jp/jp/105/statement/2026/0407kaiken.html","confidence":"高","snippet":"「令和8年度予算は4月7日に参議院で可決・成立し、一般会計総額は122.3兆円と過去最大となった。責任ある積極財政の下、危機管理投資や成長投資に予算を増額した。」（首相官邸）"},{"id":"政治-1779366065961-wngx4","category":"政治","title":"京都府知事選で現職の西脇隆俊氏が3選 — 自民・立民・公明相乗り支持で圧勝","summary":"4月5日投開票の京都府知事選で、無所属現職の西脇隆俊氏（70）が3回目の当選を果たした。自民・立民・国民・公明から推薦を受ける「オールジャパン」体制で、無所属新人の大学名誉教授（69）と元参院議員（48）の2人を大差で退けた。投票率は37.43%（前回比0.15ポイント減）とやや低調だった。西脇氏は「誰一人取り残さない京都の実現」を公約に掲げ、3期目も府政運営にあたる。","date":"2026年4月5日（日）","source":"https://www.jiji.com/jc/article?k=2026040500370&g=pol","confidence":"高","snippet":"「無所属で現職の西脇隆俊氏が3回目の当選。自民・中道・国民・立民・公明から推薦を受け、2人の新人候補を破った。投票率は37.43%だった。」（時事ドットコム）"},{"id":"政治-1779366065961-pzeos","category":"政治","title":"天皇・皇后・愛子さまが福島県双葉町を訪問 — 震災15年、皇室として初の双葉町入り","summary":"天皇皇后両陛下と長女・愛子内親王は4月6日、東日本大震災・原発事故から15年の節目に福島県を訪問した。東京電力福島第1原発が立地する双葉町へは皇室として初めて訪問し、地元の復興状況を視察のうえ被災住民と懇談された。沿道には涙する県民の姿も見られ、天皇陛下は「震災の記憶と教訓を決して忘れることなく伝えていくことが大切」と述べられた。","date":"2026年4月6日（月）","source":"https://www.fukushima-tv.co.jp/localnews/2026/04/2026040600000019.html","confidence":"高","snippet":"「天皇皇后両陛下と愛子さまが福島県を訪問し、震災・原発事故から15年の復興状況を視察。双葉町は皇室として初めての訪問となり、沿道では涙する県民の姿も見られた。」（福島テレビ）"},{"id":"経済-1779366065961-c274v","category":"経済","title":"パン・パシフィック（ドン・キホーテ）がOlympicグループを株式交換で完全子会社化","summary":"ディスカウントストア「ドン・キホーテ」を運営するパン・パシフィック・インターナショナルホールディングス（7532）が、食品スーパー・総合スーパーを展開するOlympicグループ（8289）を株式交換方式で完全子会社化すると発表した。首都圏での店舗網拡大と商品原価の低減が狙いで、統合後は都市型の小売ネットワークをさらに強化する計画。Olympicの上場廃止は2026年9月頃を予定している。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"経済-1779366065962-xcvb5","category":"経済","title":"帝国データバンク：2025年度の企業倒産が1万425件 — コロナ融資返済本格化でサービス・小売業が最多","summary":"帝国データバンクが4月8日に発表した2025年度（2025年4月〜2026年3月）の企業倒産集計によると、倒産件数は1万425件に達した。サービス業が2677件、小売業が2233件で、いずれも2000年度以降で最多を記録。新型コロナウイルス禍の「ゼロゼロ融資」（実質無利子・無担保融資）の返済本格化に加え、物価高による経費増と人手不足が中小企業を直撃した。2025年度の倒産は前年度比約10%増で推移し、2026年度も高水準が続く見通し。","date":"2026年4月8日（水）","source":"https://www.tdb.co.jp/report/bankruptcy/aggregation/20260408-bankruptfy2025/","confidence":"高","snippet":"「2025年度の企業倒産件数は1万425件に達し、サービス業が2677件・小売業が2233件で、いずれも2000年度以降で最多を記録した。」（帝国データバンク）"},{"id":"経済-1779366065962-v8vb4","category":"経済","title":"大東建託がTHEグローバル社をTOBで完全子会社化 — 不動産開発事業を強化","summary":"賃貸住宅管理大手の大東建託（1878）が、都市型マンション開発を手がけるTHEグローバル社（3271）に対してTOB（株式公開買い付け）を実施し、完全子会社化することを発表した。買付価格はTHEグローバル社の株価に約30%のプレミアムを上乗せした水準。大東建託は賃貸住宅管理の強みと、THEグローバル社の都市型不動産開発力を組み合わせて事業拡大を図る。TOB成立後は上場廃止の予定。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"社会-1779366065963-2ntyw","category":"社会","title":"JFEスチール川崎工場でクレーン解体中に足場崩落 — 作業員3人死亡・1人行方不明","summary":"4月7日午後4時25分頃、川崎市川崎区扇島のJFEスチール東日本製鉄所敷地内で、クレーンの解体作業中に重さ約500トンのコンクリート製バランスウェイトが落下し、高さ約40メートルの足場が崩壊。5人の作業員が転落し、最終的に3人が死亡、1人が行方不明となった（海中への転落と見られる）。1人は命に別条なし。十代の若い作業員も含まれており、危険な高所作業に複数次請け業者が関与していた実態も明らかになった。","date":"2026年4月7日（火）","source":"https://www.nikkei.com/article/DGXZQOUD078X50X00C26A4000000/","confidence":"高","snippet":"「2026年4月7日午後4時25分ごろ、川崎市川崎区扇島のJFEスチール東日本製鉄所敷地内で高さ40メートル程度の足場が崩れ、クレーン解体作業中に約500トンの重りが落下し足場に接触。作業員5人が巻き込まれた。」（日本経済新聞）"},{"id":"社会-1779366065963-86f9r","category":"社会","title":"改正民法が施行、離婚後「共同親権」が日本で始動 — 全国の家庭裁判所で申立てが相次ぐ","summary":"4月1日に改正民法が施行され、離婚後も父母双方が親権者となる「共同親権」制度が日本でも導入された。これまでは単独親権のみだったが、今後は離婚時に協議で共同親権か単独親権かを選択できるようになる。選択できない場合は家庭裁判所が判断する。DVや虐待の恐れがある場合は単独親権が必須とされる。4月以降、各地の家庭裁判所には既離婚者からの親権変更申立ても相次いでいる。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"社会-1779366065963-8w8oi","category":"社会","title":"改正道路交通法施行、自転車の交通違反に「青切符」 — 12の主要違反が対象、全国で取り締まり開始","summary":"4月1日から改正道路交通法が施行され、自転車の交通違反に「反則金制度（青切符）」が導入された。信号無視・一時不停止・携帯電話使用など12の主要違反が対象で、違反者には1000〜1万2000円の反則金が課せられる。これまで刑事罰しかなかった自転車の交通違反に軽微な反則制度が設けられるのは初めて。警察庁によると施行後最初の2週間で全国合計3万件超の指導警告・取り締まりが行われた。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"社会-1779366065963-7r7b5","category":"社会","title":"「子ども・子育て支援金」の徴収が4月から開始 — 健康保険料に月額500円弱を上乗せ","summary":"少子化対策の安定財源を確保するため、4月1日から「子ども・子育て支援金」の徴収が開始された。健康保険料に上乗せする形で徴収され、2026年度は平均的な会社員で月額450円程度（労使折半）。公的保険を通じて全世代・全企業が広く薄く負担する仕組みで、集めた財源は育児休業給付の拡充や保育所整備などに充てられる。野党からは「事実上の増税」と批判が出ており、4月の国会審議でも引き続き論点となっている。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"スポーツ-1779366065963-knfut","category":"スポーツ","title":"大谷翔平が2026年シーズン開幕から二刀流フル稼働 — 投打ともに別格の成績で開幕序盤を席巻","summary":"ドジャースの大谷翔平が2026年シーズン開幕から打者・投手の二刀流でフル稼働している。投手としては開幕5先発すべてで「6イニング以上・被安打6未満・自責点1以下・本塁打ゼロ」という1913年以来メジャー史上初の快挙を達成し、防御率0.60は両リーグトップ。打者としても開幕7試合目に第1号3ランを放つなど本塁打量産ペースを維持。3・4月の投手部門月間MVPに選出された（5月発表）。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"スポーツ-1779366065964-q7evm","category":"スポーツ","title":"山本由伸がMLB開幕序盤に圧巻の投球 — 3・4月メジャー最低防御率でエース級の貢献","summary":"ドジャースの山本由伸が2026年シーズン開幕から圧倒的な投球を続けている。東京開幕シリーズ（3/13）では開幕投手を務め初戦勝利。4月上旬時点で先発5試合・防御率1.06はメジャー全体トップ水準を記録。昨季のワールドシリーズMVPの勢いそのままに2年目のさらなる成長を示しており、ドジャースの先発陣を牽引している。","date":"2026年4月上旬","source":"","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779366065965-kpz6r","category":"芸能・エンタメ・ゴシップ","title":"廣瀬智紀と川栄李奈が約7年の結婚生活にピリオド — それぞれのSNSで離婚を発表","summary":"俳優の廣瀬智紀（39）が4月10日、自身のインスタグラムのストーリーに離婚を報告する文章を掲載し、AKB48出身女優の川栄李奈との離婚を正式に発表した。2人は2019年5月に結婚を発表し、同年10月に第1子、2023年に第2子が誕生していた。廣瀬は「これまで人生を共に歩んできたことに心より感謝しています。今後は親として共に子どもたちを育てていきたい」とコメント。週刊誌各誌が一斉に報道した。","date":"2026年4月10日（金）","source":"https://www.oricon.co.jp/news/2447992/full/","confidence":"高","snippet":"「廣瀬智紀（39歳）が4月10日にInstagramで離婚を発表。『これからはパートナーとして子どもを育てていく』と親としての関係継続を強調した。」（Oricon）"},{"id":"テクノロジー-1779366065965-ozcvj","category":"テクノロジー","title":"Japan IT Week 春 2026 が東京ビッグサイトで開幕 — 生成AIが主役、国内最大のITイベント","summary":"国内最大級の総合ITイベント「Japan IT Week 春」が4月8日〜10日に東京ビッグサイトで開催された。今回は生成AI・AIエージェント活用ソリューションが一大テーマとなり、各社が業務自動化・RAG（検索拡張生成）・マルチエージェントを組み合わせた法人向けシステムを展示。OPTiMをはじめとする国内IT各社が生成AIとIoTを統合した業務改善ソリューションを出展し、製造業・医療・建設など各分野からの来場者が注目した。","date":"2026年4月8日（水）","source":"https://www.optim.co.jp/newsdetail/20260318-info-01","confidence":"高","snippet":"「Japan IT Week 春 2026（4月8〜10日、東京ビッグサイト）に、生成AI・IoTを活用した業務改善ソリューションを出展。」（OPTiMプレスリリース）"},{"id":"テクノロジー-1779366065965-aww46","category":"テクノロジー","title":"日本企業の生成AI導入率が3社に1社超え — 売上高1兆円超の大企業では8割が「導入済み」","summary":"日本ユーザー協会（JUAS）が4月に発表した「企業IT動向調査2026」速報によると、国内企業の3社に1社（34%）が生成AIを「導入済み」と回答し、「検討中」を含めると5割超に達した。特に売上高1兆円以上の大企業では8割超が「導入済み」と回答。活用場面はコーディング支援・文書作成・カスタマーサポートが上位。一方で「活用人材の育成」「セキュリティリスク」が引き続き課題として挙げられた。","date":"2026年4月上旬","source":"https://prtimes.jp/main/html/rd/p/000000013.000160762.html","confidence":"高","snippet":"「3社に1社が生成AIを『導入済み』、『検討中』を含むと5割超に。売上高1兆円以上の大企業では8割超が『導入済み』。」（PRTimes）"},{"id":"2026-03-29-pol-001","category":"政治","title":"2026年度暫定予算8.6兆円が成立、11年ぶりのつなぎ予算","summary":"政府・与党は2026年度予算案の年度内成立を断念し、4月1日〜11日の11日間分を賄う暫定予算（つなぎ予算）を3月30日に衆参両院で可決・成立させた。総額は約8.6兆円。暫定予算の編成は2015年以来11年ぶりで、年金・生活保護などの社会保障給付や地方交付税交付金の4月分支払いを確保した。本予算は4月11日に自然成立した。","date":"2026-03-30","source":"https://www.nikkei.com/article/DGXZQOUA264X70W6A320C2000000/","confidence":"高","snippet":"4月1〜11日の11日間に必要な経費を盛り込み、一般会計の総額がおよそ8.6兆円になった。"},{"id":"2026-03-29-pol-002","category":"政治","title":"第2次高市内閣の閣僚資産を公開、平均6591万円　最多は小泉進次郎防衛相","summary":"政府は4月3日、第2次高市内閣の高市首相と閣僚計19人の保有資産を公開した。平均は6591万円（前回比微減）。最多は小泉進次郎防衛相の2億6484万円（妻の滝川クリステルさん名義の国債・有価証券）、続いて茂木敏充外相（1億9397万円）、林芳正総務相（1億5088万円）。1億円超の閣僚は計5人。","date":"2026-04-03","source":"https://www.nikkei.com/article/DGXZQOUA032AI0T00C26A4000000/","confidence":"高","snippet":"平均は6641万円から6591万円に微減。最多の小泉進次郎防衛相（2億6484万円）。"},{"id":"2026-03-29-pol-003","category":"政治","title":"「国家情報会議」創設法案が衆院本会議で審議入り、情報活動一元化へ","summary":"内閣情報調査室（内調）を格上げした「国家情報局」と、首相をトップとした「国家情報会議」の創設を盛り込んだ法案が4月2日、衆院本会議で審議入りした。日本のインテリジェンス能力の強化が目的で、各省庁の情報を一元管理する体制を構築する。後に衆院内閣委員会でも可決され成立の公算となった。","date":"2026-04-02","source":"","confidence":"中"},{"id":"2026-03-29-eco-001","category":"経済","title":"パナソニックHD、子会社のパナソニックを吸収合併し新3社体制へ移行","summary":"パナソニックホールディングスは4月1日付で完全子会社のパナソニックを吸収合併し、事業を「パナソニック HVAC&CC（家電・空調）」「パナソニックエレクトリックワークス（電気設備）」「パナソニック（新：白物家電）」の3社に分割承継した。IT事業3社を統合した「パナソニック デジタル」も同日設立し、グループを大規模再編した。","date":"2026-04-01","source":"https://news.panasonic.com/uploads/tmg_block_page_image/file/34103/jn250730-4-1.pdf","confidence":"高"},{"id":"2026-03-29-eco-002","category":"経済","title":"萩原電気HD・佐鳥電機が経営統合、半導体商社の新持株会社「MIRAINI HD」が発足","summary":"半導体商社の萩原電気ホールディングスと佐鳥電機が4月1日付で株式移転による経営統合を実施し、共同持株会社「MIRAINIホールディングス（ミライニ）」が東証・名証に上場した。両社は3月30日に上場廃止。新社長には萩原電気の木村守孝氏が就任し、グローバル展開の加速を目指す。","date":"2026-04-01","source":"https://www.nikkei.com/article/DGXZQOFD2883E0Y5A720C2000000/","confidence":"高"},{"id":"2026-03-29-eco-003","category":"経済","title":"日鉄高炉セメント・日鉄セメントが4月1日付で経営統合","summary":"日本製鉄グループのセメント子会社2社、日鉄高炉セメントと日鉄セメントが4月1日付で経営統合した。グループ内でのセメント事業の重複を解消し、生産・販売の効率化を図る方針。","date":"2026-04-01","source":"","confidence":"中"},{"id":"2026-03-29-soc-001","category":"社会","title":"ハイパーカミオカンデ建設現場で事故、配管外れ作業員5人が重軽傷","summary":"3月31日午前10時15分ごろ、岐阜県飛騨市神岡町に建設中の次世代素粒子観測施設「ハイパーカミオカンデ」の坑道内で事故が発生した。排水用配管の漏れ検査中に空気を送り込んだところ配管が外れ、作業員5人（20代〜60代の男性）が吹き飛ばされた。2人が鎖骨骨折などの重傷、3人が軽傷を負ったが全員意識あり。ハイパーカミオカンデは地下約600メートルで2028年の観測開始を目指す大型装置。","date":"2026-03-31","source":"https://www.jiji.com/jc/article?k=2026033100977&g=soc","confidence":"高","snippet":"３１日午前１０時１５分ごろ、岐阜県飛騨市神岡町に建設中の次世代素粒子観測施設「ハイパーカミオカンデ」で事故があり、作業員５人が重軽傷を負った。新設中の排水用配管に漏れがないかを検査するため、空気を送り込んだところ管が外れて空気が吹き出し、作業員が飛ばされたとみられる。"},{"id":"2026-03-29-soc-002","category":"社会","title":"在職老齢年金の支給停止基準額を月62万円に引き上げ、働く高齢者の年金減額を緩和","summary":"年金制度改正法の施行により、在職老齢年金の支給停止基準額が月50万円から62万円に引き上げられた。これにより年金が減額・停止される対象者が大幅に減少し、「働くほど年金が減る」という不公平感が緩和。高齢者の就労を後押しする狙いで、支給停止の対象者は約30万人まで縮小する見込み。","date":"2026-04-01","source":"https://news.yahoo.co.jp/articles/9a63d19d73a4f1dd0ccdcb22bfee4cb795e84dc7","confidence":"高","snippet":"支給停止の基準額が62万円まで引き上げられることで、多くの人にとって老齢厚生年金が減額・停止されにくくなる。支給停止の対象となる人は大幅に減る見込みで、高齢者の就労意欲を後押しすると考えられます。"},{"id":"2026-03-29-soc-003","category":"社会","title":"政府の電気・ガス料金補助が3月末で終了、4月から光熱費が実質値上がり","summary":"2026年1〜3月使用分に適用されてきた政府の電気・ガス料金値引き支援が3月使用分で終了した。4月使用分（5月検針分）以降は補助なしとなり、月額で電気代が約3200円相当の実質値上がり。エネルギー価格の上昇と補助終了が重なり、家計への影響が懸念される。","date":"2026-04-01","source":"https://selectra.jp/energy/news/electricity-price-increase-2026","confidence":"中"},{"id":"2026-03-29-spo-001","category":"スポーツ","title":"サッカー日本代表、ウェンブリーでイングランドに1-0勝利　三笘薫が決勝ゴール","summary":"キリンワールドチャレンジ2026の一環で、サッカー日本代表はロンドンのウェンブリー・スタジアムでイングランドと対戦し、三笘薫の23分のゴール（鎌田大地のパスから）で1-0勝利を収めた。「サッカーの聖地」での歴史的白星で、3月28日のスコットランド戦（勝利）に続く連勝。W杯本番に向け弾みをつけた。","date":"2026-03-31","source":"https://www.jfa.jp/samuraiblue/news/00036199/","confidence":"高","snippet":"サッカーの聖地と言われるウェンブリー・スタジアムで、イングランドに歴史的な勝利を飾りました。"},{"id":"2026-03-29-ent-001","category":"芸能・エンタメ・ゴシップ","title":"NHK朝ドラ「風、薫る」がスタート、血縁なしのW主演は連続テレビ小説初","summary":"NHK連続テレビ小説（朝ドラ）2026年前期作品「風、薫る」の放送が3月30日に始まった。見上愛と上坂樹里がダブルヒロインを務め、血縁関係のない2人をW主演とする構成は朝ドラ史上初めて。春から夏にかけての清々しい物語が注目を集め、スタート週から話題となっている。","date":"2026-03-30","source":"https://www.crank-in.net/drama/spring2026","confidence":"高"},{"id":"2026-03-29-tec-001","category":"テクノロジー","title":"Google DeepMind、オープンモデル「Gemma 4」を公開　Apache 2.0で商用利用可","summary":"Google DeepMindは4月2日、オープンソースLLMシリーズの最新版「Gemma 4」を公開した。Apache 2.0ライセンスで商用利用が自由に可能。最大256Kのコンテキストウィンドウ、ネイティブの画像・音声入力、140言語以上に対応するマルチモーダルモデル。MoEアーキテクチャで少ないメモリで高性能を実現し、日本語能力も高く評価されている。","date":"2026-04-02","source":"https://cloud.google.com/blog/ja/products/ai-machine-learning/gemma-4-available-on-google-cloud?hl=ja","confidence":"高","snippet":"商用利用の自由度が高いApache 2.0ライセンスでリリースされたこれらのモデルは、最大256Kのコンテキストウィンドウ、ネイティブのビジョンと音声処理、140以上の言語での流暢な対応を実現しています。"},{"id":"2026-03-29-tec-002","category":"テクノロジー","title":"国立情報学研究所、国産LLM「LLM-jp-4」を公開　一部ベンチマークでGPT-4o超え","summary":"国立情報学研究所（NII）は4月3日、約12兆トークンのコーパスで学習した国産LLM「LLM-jp-4 8Bモデル」（約86億パラメータ）と「LLM-jp-4 32B-A3Bモデル」（約320億パラメータ、MoE）をオープンソースライセンスで公開した。日本語MT-Benchで8Bモデルが7.54点を達成しGPT-4oの7.29点を上回った。","date":"2026-04-03","source":"https://www.nii.ac.jp/news/release/2026/0403.html","confidence":"高","snippet":"約86億パラメータの「LLM-jp-4 8Bモデル」と約320億パラメータのMoEモデル「LLM-jp-4 32B-A3Bモデル」をオープンソースライセンスで一般公開しました。日本語MT-Benchで8Bモデルが7.54点を達成し、GPT-4oの7.29点を上回りました。"},{"id":"2026-03-29-int-001","category":"国際","title":"商船三井のLNG船がホルムズ海峡を通過、米・イスラエルのイラン攻撃後に日本関係船として初","summary":"商船三井のパナマ船籍LNG船「SOHAR LNG」が4月3日にホルムズ海峡を通過したことが確認された。2月28日の米国・イスラエルによるイラン攻撃以降、日本関係船舶がホルムズ海峡を通過したのは初とみられる。乗組員は無事で危険水域を脱している。日本は原油の約95%を中東に依存しており、海峡の安全確保が重要な課題となっている。","date":"2026-04-03","source":"https://www.okinawatimes.co.jp/articles/-/1809982","confidence":"高","snippet":"米国とイスラエルによるイラン攻撃以降、ホルムズ海峡を日本関係船舶が通過したのは初めてとみられる。"}];

  document.getElementById("cnt").textContent=f.length+"件 / 全"+DATA.length+"件";
  var list=document.getElementById("list");
  if(f.length===0){list.innerHTML='<div class="empty">条件に一致するニュースがありません</div>';return;}
  var html="";
  f.forEach(function(item,idx){
    var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
    html+='<div class="card" data-idx="'+idx+'"><div class="bar" style="background:'+c+'"></div><div class="body"><div class="meta"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">'+esc((item.date||"").replace(/（.）/,""))+'</span><span class="cf" style="color:'+cfc+'"><span class="dot" style="background:'+cfc+'"></span>'+esc(cf)+'</span>'+(hasSrc?'<span style="color:#2980b9;font-size:10px">🔗</span>':"")+' </div><p class="tt">'+hl(item.title,st.q)+'</p><p class="sm">'+hl(item.summary,st.q)+'</p></div></div>';
  });
  list.innerHTML=html;
  Array.prototype.forEach.call(document.querySelectorAll(".card"),function(el){
    el.addEventListener("click",function(){openDetail(f[Number(el.getAttribute("data-idx"))]);});
  });
}
function openDetail(item){
  var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
  var dlg=document.getElementById("dlg");
  var hasSnip=item.snippet&&item.snippet.trim();
  dlg.innerHTML='<div class="top" style="background:'+c+'"></div><div class="pad"><div class="hd"><div class="meta2"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">📅 '+esc((item.date||"").replace(/（.）/,""))+'</span></div><button class="cls" id="closeBtn">×</button></div><h3>'+hl(item.title,st.q)+'</h3><div class="sm2">'+hl(item.summary,st.q)+'</div>'+(hasSrc?'<div class="src"><div style="font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600">📎 ソース</div><a href="'+esc(item.source)+'" target="_blank" rel="noopener noreferrer">'+esc(item.source)+'</a></div>':""  )+(hasSnip?'<div class="snip"><span style="font-size:10px;font-weight:600;color:var(--tx2);">🔍 取得時メモ</span><br>'+esc(item.snippet)+'</div>':"")+'<div class="ft"><button class="cp" id="cpBtn">📋 内容をコピー</button></div><p class="note">背景クリック または ×で閉じる</p></div>';
  document.getElementById("modal").classList.add("open");
  document.getElementById("closeBtn").addEventListener("click",closeDetail);
  document.getElementById("cpBtn").addEventListener("click",function(){
    var txt="【"+item.category+"】"+item.title+"\n"+(item.date||"")+"\n\n"+item.summary+(hasSrc?"\n\nソース: "+item.source:"");
    if(navigator.clipboard)navigator.clipboard.writeText(txt);
    var b=document.getElementById("cpBtn");b.textContent="コピー済み ✓";b.classList.add("done");
    setTimeout(function(){if(document.getElementById("cpBtn")){document.getElementById("cpBtn").textContent="📋 内容をコピー";document.getElementById("cpBtn").classList.remove("done");}},1800);
  });
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.getElementById("dlg").innerHTML="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeDetail();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDetail();});
document.getElementById("fCat").addEventListener("change",function(e){st.fCat=e.target.value;render();});
document.getElementById("fYear").addEventListener("change",function(e){st.fYear=e.target.value;st.fMonth="すべて";render();});
document.getElementById("fMonth").addEventListener("change",function(e){st.fMonth=e.target.value;render();});
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});
document.getElementById("sortBtn").addEventListener("click",function(){st.sort=st.sort==="desc"?"asc":"desc";render();});
document.getElementById("resetBtn").addEventListener("click",function(){st.fCat="すべて";st.fYear="すべて";st.fMonth="すべて";st.q="";render();});
render();
</script>
</body>
</html>
