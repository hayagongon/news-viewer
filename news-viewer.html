var DATA=[{"id":"国際-1779292623663-drtmi","category":"国際","title":"トランプ大統領が中国を訪問——習近平主席と首脳会談、大豆・牛肉購入や貿易委員会の設立を協議","summary":"ドナルド・トランプ米大統領は5月13日に北京に到着し、14〜15日の日程で習近平国家主席と首脳会談を行った。会談では貿易摩擦の解消策として中国による米国産大豆・牛肉・航空機の購入約束と、両国間の貿易委員会の設立が協議された。ルビオ国務長官、ベッセント財務長官、ヘグセス国防長官らが同行。大きな合意には至らなかったが米中関係の安定化を確認した。","date":"2026年5月14日（木）","source":"https://news.yahoo.co.jp/articles/affe3ef370dea4d2b1ea062443905a22126a11f8","confidence":"高"},{"id":"政治-1779292623666-811jg","category":"政治","title":"ベッセント米財務長官が訪日——高市首相・片山財務相・茂木外相らと米中首脳会談前に日米連携を確認","summary":"スコット・ベッセント米財務長官は5月11〜15日の日程で日本を訪れ、12日に高市早苗首相を表敬訪問した。片山さつき財務相、赤澤亮正経産相、茂木敏充外相とも相次いで会談し、日米投資プログラム・重要鉱物・サプライチェーン強靭化・AIサイバー脅威への対応などを協議。米中首脳会談（5/14〜15）を前に日米の緊密な連携を確認した。","date":"2026年5月12日（火）","source":"https://www.jetro.go.jp/biznews/2026/05/655bddeb59589e1f.html","confidence":"高"},{"id":"政治-1779292623666-tnmah","category":"政治","title":"国家情報会議創設法案が参院で本格審議入り——インテリジェンス機能の司令塔創設へ、4月に衆院通過","summary":"政府のインテリジェンス（情報収集・分析）機能を一元管理する司令塔「国家情報会議」を創設する法案が、4月23日の衆院通過に続き、5月8日から参院で審議入りした。高市内閣が今通常国会の重点法案に位置づけており、与野党が組織のあり方や文民統制のあり方をめぐって論戦を繰り広げた。","date":"2026年5月11日（月）","source":"https://www.policynews.jp/schedule/2026/005.html","confidence":"高"},{"id":"政治-1779292623666-psxox","category":"政治","title":"新潟県知事選が告示——5月31日投開票に向け、現職と新人が政策論争","summary":"任期満了に伴う新潟県知事選挙が5月14日に告示され、5月31日の投開票に向けて選挙戦がスタートした。エネルギー政策・農業振興・人口減少対策などを争点に、現職と新人候補が舌戦を繰り広げた。参院選を前に各党が力を入れる重要な地方選挙として全国から注目が集まった。","date":"2026年5月14日（木）","source":"https://www.policynews.jp/schedule/2026/005.html","confidence":"高"},{"id":"経済-1779292623666-d6n11","category":"経済","title":"第一三共が2026年3月期決算を発表——ADC供給計画見直しで約950億円の損失計上、税引前利益25.9%減","summary":"第一三共は5月11日に発表を延期していた2026年3月期連結決算を発表した。抗体薬物複合体（ADC）製品の供給計画見直しに伴い、製造委託先への損失補償引当金として約757億円、小田原工場のADC関連設備の減損・補償金として約193億円の合計約950億円を計上。税引前利益は前期比25.9%減の約2,634億円となり、市場予想を下回った。","date":"2026年5月11日（月）","source":"https://nk.jiho.jp/article/301961","confidence":"高"},{"id":"経済-1779292623666-y9qvt","category":"経済","title":"JX金属が東邦チタニウムを株式交換で完全子会社化——5月28日付で東証上場廃止","summary":"JX金属は連結子会社の東邦チタニウムを株式交換により完全子会社化することを決定し、東邦チタニウムの東証スタンダード市場への上場は5月28日付で廃止されることとなった。航空機・半導体向けなどチタン需要の高まりを背景に、グループとして製造・調達を一元管理し競争力を高める狙い。","date":"2026年5月中旬","source":"https://masouken.com/%E8%B2%B7%E5%8F%8E%E3%81%AE%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9","confidence":"中"},{"id":"経済-1779292623666-e09f9","category":"経済","title":"マブチモーターが食品機械メーカー・マスダックを完全子会社化——精密モーター技術を食品分野に応用","summary":"精密小型モーター大手のマブチモーターは、食品機械メーカーの株式会社マスダックの発行済み全株式を取得し完全子会社化することを決定した。モーター制御技術と食品機械製造の融合による高付加価値製品の開発を目指し、事業領域を広げる戦略的なM&Aとなる。","date":"2026年5月中旬","source":"https://masouken.com/%E8%B2%B7%E5%8F%8E%E3%81%AE%E3%83%8B%E3%83%A5%E3%83%BC%E3%82%B9","confidence":"中"},{"id":"社会-1779292623666-0rklt","category":"社会","title":"辺野古沖転覆事故——海上保安庁が生徒撮影の動画を解析、事故直前の状況を分析","summary":"2026年3月16日に名護市辺野古沖で研修旅行中の同志社国際高校生らを乗せた船2隻が転覆し、女子生徒と船長が死亡した事故で、海上保安庁は5月16日、乗船していた生徒が撮影した動画を解析し事故直前の海況や船の状態を調査していることが明らかになった。波浪注意報が出ていた中での出港判断の妥当性が引き続き焦点となっている。","date":"2026年5月16日（土）","source":"https://www.qab.co.jp/news/20260415290427.html","confidence":"中"},{"id":"社会-1779292623666-a8wc2","category":"社会","title":"栃木・上三川の住宅で強盗殺人——指示役の28歳男性ら夫婦を逮捕","summary":"栃木県上三川町の住宅で69歳の女性が殺害された事件で、栃木県警は指示役とされる28歳の男性とその妻（25）を強盗殺人容疑で逮捕した。組織的な関与が疑われており、警察は共犯者の全容解明を進めている。高齢者をターゲットにした組織的犯罪への警戒が改めて強まっている。","date":"2026年5月中旬","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"社会-1779292623666-s2i46","category":"社会","title":"福島・磐越道でマイクロバス横転——高校生1人死亡、68歳運転手を自動車運転処罰法違反で逮捕","summary":"福島県郡山市内の磐越自動車道で生徒を乗せたマイクロバスが横転する事故が発生し、高校生1人が死亡した。福島県警は乗客の安全を怠ったとして68歳の男性運転手を自動車運転処罰法違反（過失致死）の容疑で逮捕した。部活動・学校行事でのバス移動における安全管理のあり方が問われている。","date":"2026年5月中旬","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"社会-1779292623666-dwji8","category":"社会","title":"水俣病の公式確認から70年——国・熊本県・チッソが参加する式典を開催","summary":"1956年5月1日に水俣病が公式に確認されてから2026年で70年の節目を迎えた。熊本県水俣市では5月1日を中心に政府・熊本県・原因企業チッソの代表が参加する慰霊式が開かれ、被害者団体への補償と地域の環境再生・教訓の継承について確認された。未認定患者問題など残る課題の解決も引き続き求められた。","date":"2026年5月11日（月）","source":"https://www.jiji.com/jc/archives?g=soc_archive_0","confidence":"中"},{"id":"スポーツ-1779292623666-f6rdd","category":"スポーツ","title":"サッカー日本代表が2026年W杯メンバー26人を発表——遠藤航・久保建英ら欧州組中心に選出","summary":"日本サッカー協会は5月15日、6月11日開幕のFIFAワールドカップ2026（北中米大会）に挑む日本代表メンバー26人を発表した。GK3人・DF9人・MF/FW14人の編成で、遠藤航（リバプール）・久保建英（レアル・ソシエダード）・冨安健洋（アヤックス）など欧州主要クラブで活躍する選手が大多数を占めた。大会は6月11日から7月19日まで行われる。","date":"2026年5月15日（金）","source":"https://www.jfa.jp/samuraiblue/news/00036338/","confidence":"高"},{"id":"スポーツ-1779292623666-2cw8i","category":"スポーツ","title":"大相撲夏場所が国技館で開幕——横綱・豊昇龍が綱の重みを背負い初日に登場","summary":"大相撲令和8年夏場所（5月10〜24日、両国国技館）が5月10日に初日を迎えた。1月の初場所で優勝し第74代横綱に昇進した豊昇龍が、横綱として初の東京本場所に臨む。前頭・大関陣との上位対決が見どころで、2場所連続優勝を目指す豊昇龍の横綱としての資質が問われる15日間となる。","date":"2026年5月10日（日）","source":"https://times.abema.tv/articles/-/10242099","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-8pav7","category":"芸能・エンタメ・ゴシップ","title":"声優・山崎和佳奈さんが死去——「名探偵コナン」毛利蘭役を約30年、4月18日逝去・61歳","summary":"「名探偵コナン」の毛利蘭役などで知られる声優の山崎和佳奈さんが4月18日に死去していたと、5月15日に所属事務所・青二プロダクションが発表した。61歳だった。病名は非公表。1996年のコナン放送開始から約30年にわたって毛利蘭を担当し、2月から病気療養中だった。同役は3月14日放送回より岡村明美が代役を務めている。","date":"2026年5月15日（金）","source":"https://www.nikkei.com/article/DGXZQOUD156SR0V10C26A5000000/","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-25p7e","category":"芸能・エンタメ・ゴシップ","title":"王林がモデル・佐藤ショーン玲央と熱愛——事務所も交際を否定せず、結婚の可能性も報道","summary":"タレントの王林（25）がモデルの佐藤ショーン玲央との交際が複数のメディアで報じられ、王林の所属事務所は「否定しない」との立場を示した。王林はバラエティでの活躍に加えSNSでも高い人気を誇り、熱愛報道に多くのファンが反応した。","date":"2026年5月15日（金）","source":"https://www.oricon.co.jp/entertainment/","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779292623667-9jx1e","category":"芸能・エンタメ・ゴシップ","title":"B'z・稲葉浩志の軽井沢別荘建設で近隣トラブル——週刊新潮が報道、警察が出動","summary":"週刊新潮は5月13日発売号で、ロックバンドB'zのボーカル稲葉浩志が軽井沢に建設中の約10億円とされる別荘をめぐり、工事の騒音・工期の問題で近隣住民とトラブルになったと報道。警察が現場に出動する事態となったとされる。稲葉側の公式なコメントは出ていない。","date":"2026年5月13日（水）","source":"","confidence":"中"},{"id":"テクノロジー-1779292623667-6at27","category":"テクノロジー","title":"Nintendo Switch 2が5月25日から59,980円に値上げ——半導体高騰・円安・関税で1万円アップ","summary":"任天堂は5月8日、Nintendo Switch 2（国内版）の価格を5月25日から現行の49,980円から59,980円へ1万円値上げすると発表した。理由は半導体メモリ価格の高騰・円安・関税によるコスト増（年間約1,000億円超）。Nintendo Switch Online料金も7月1日から値上げ。値上げ前の駆け込み購入が各店舗で相次いだ。","date":"2026年5月11日（月）","source":"https://www.nintendo.co.jp/corporate/release/en/2026/260508.html","confidence":"高"},{"id":"テクノロジー-1779292623667-qesfy","category":"テクノロジー","title":"デジタル庁が行政向け生成AI「ガバメントAI・源内」を開発——全省庁の業務効率化を目指す","summary":"デジタル庁は行政職員が業務で生成AIを安全に活用するため、AIアプリと連携した政府専用の生成AIシステム「ガバメントAI・源内」を開発した。文書作成・情報収集・法令照会などの業務効率化を目指し、全省庁での段階的な展開を進める。セキュリティとハルシネーション対策を重視した設計となっている。","date":"2026年5月中旬","source":"https://www.digital.go.jp/news/","confidence":"中"},{"id":"テクノロジー-1779292623667-exba0","category":"テクノロジー","title":"Anthropicが企業評価額9,000億ドル超での大型資金調達交渉——AI産業への投資が加速","summary":"Claude（クロード）を開発する米AI企業Anthropicが、企業評価額9,000億ドル（約140兆円）超での新規資金調達を目指して大手投資家と交渉中であることが報じられた。OpenAIのGPTと並ぶ高性能AIとして企業・行政で採用が拡大しており、AI産業全体への投資規模が急速に膨らんでいる実態が浮き彫りになった。","date":"2026年5月中旬","source":"https://note.com/yume_verse_/n/n349efe2d3521","confidence":"中"},{"id":"政治-1779320403677-hwb9s","category":"政治","title":"高市首相がベトナム・オーストラリア歴訪を終え帰国——重要鉱物・サプライチェーン確保で合意","summary":"高市早苗首相は5月1〜5日の日程でベトナムとオーストラリアを歴訪し、5日に帰国した。ベトナムではトー・ラム共産党書記長・レ・ミン・フン首相と、オーストラリアではアルバニージー首相と首脳会談を行い、エネルギー・レアアースなど重要鉱物のサプライチェーン拡大・確保で合意した。「自由で開かれたインド太平洋（FOIP）」の推進と安全保障連携の強化も確認された。2026年は日豪友好協力基本条約署名50周年の節目にあたる。","date":"2026年5月5日（火）","source":"https://www.nikkei.com/article/DGXZQOUA050980V00C26A5000000/","confidence":"高"},{"id":"政治-1779320403678-erixi","category":"政治","title":"日本とEUが第4回デジタルパートナーシップ閣僚会合——AI・半導体・量子技術・海底ケーブルで連携強化","summary":"5月5日にブリュッセルで開催された第4回日・EUデジタルパートナーシップ閣僚会合で、日本とEUはAI・半導体・量子技術・海底通信ケーブルの各分野での協力強化を発表した。信頼できるAIの原則整合や半導体サプライチェーンの強靱化が主要テーマとなり、欧州との経済安全保障協力を深める。","date":"2026年5月5日（火）","source":"","confidence":"中"},{"id":"政治-1779320403678-lzfor","category":"政治","title":"憲法施行79周年——改憲・護憲両派が各地で集会、参院選前に論議再燃","summary":"憲法施行79周年を迎えた5月3日の憲法記念日に、改憲推進派・護憲派それぞれが全国各地で集会を開催した。高市首相は記念日メッセージで憲法改正への強い意欲を示し、9条改定・緊急事態条項の新設をめぐる賛否が改めて問われた。7月の参院選を前に各党がスタンスを鮮明にしつつある。","date":"2026年5月3日（日）","source":"","confidence":"中"},{"id":"政治-1779320403678-k0j3w","category":"政治","title":"GW明けの通常国会が審議を再開——参院選まで約2か月、重要法案が本格審議へ","summary":"ゴールデンウィーク休会明けの5月7日、参院での通常国会審議が再開した。国家情報会議創設法案・AIガバナンス推進基本法案・エネルギー安全保障関連法案など今通常国会の重点法案の本格審議日程が組まれた。参院選（7月予定）まで約2か月となり、与野党の論戦が激しさを増している。","date":"2026年5月7日（木）","source":"","confidence":"中"},{"id":"経済-1779320403679-t6t0r","category":"経済","title":"携帯ショップ大手・トーシンHDが会社更生法申請——負債約160億円、日本初の「上場維持型」で再建","summary":"携帯電話ショップ運営などを手掛けるトーシンホールディングス（愛知県、東証スタンダード市場）は5月8日、東京地裁に会社更生法の適用を申請し、同日付で更生手続開始決定を受けた。負債総額は約160億円。2025年の不適切会計発覚後も上場を維持したまま更生手続を進める「上場維持型会社更生」は日本初の事例。三井住友銀行が7億円のDIPファイナンスを提供し、スポンサー探索を並行して進める。","date":"2026年5月8日（金）","source":"https://news.yahoo.co.jp/articles/2a3c9020c5636413c2b9619ac1823a2100c5c57d","confidence":"高"},{"id":"経済-1779320403681-enqiu","category":"経済","title":"アインホールディングスが連結子会社間の調剤薬局事業を再編——吸収分割・合併でグループ効率化","summary":"調剤薬局チェーン大手のアインホールディングスは5月1日付で、連結子会社間における調剤薬局事業の吸収分割および吸収合併を実施した。グループ内の重複機能を整理し、医薬品の集中調達と店舗運営の標準化でコスト削減と収益力向上を目指す戦略的な組織再編。","date":"2026年5月1日（金）","source":"","confidence":"中"},{"id":"経済-1779320403682-xdh3o","category":"経済","title":"中古車販売プラウドが破産申請——静岡地裁沼津支部に届け出","summary":"中古車の販売などを手掛ける株式会社プラウド（静岡県）は5月8日、静岡地裁沼津支部に破産手続き開始の申し立てを行った。中古車市場では価格高止まりと消費者の買い控えが続き、中小販売業者の経営圧迫が長期化している。","date":"2026年5月8日（金）","source":"","confidence":"中"},{"id":"経済-1779320403682-6yhia","category":"経済","title":"GW期間の訪日外国人が530万人超——過去最多水準、円安とインバウンド需要が後押し","summary":"政府観光局（JNTO）のまとめによると、ゴールデンウィーク期間（4月下旬〜5月6日）の訪日外国人旅行者は530万人超と過去最多水準に達した。円安の継続と国際線増便が欧米・アジアからの訪日客を後押しし、京都・大阪・東京などの主要観光地は大混雑となった。国内旅行者数も前年比約3%増となった。","date":"2026年5月6日（火）","source":"","confidence":"中"},{"id":"社会-1779320403683-6ij5e","category":"社会","title":"沖縄・北谷町で米海軍3等兵曹が路上暴行——男性2人を殴り現行犯逮捕","summary":"5月8日未明、沖縄県北谷町の路上で男性2人に暴行を加えたとして、沖縄県警は米海軍沖縄艦隊活動司令部所属の3等兵曹モーリシオ・ピネダ容疑者（21）を傷害容疑で現行犯逮捕した。被害者2人のうち1人が軽傷を負った。基地周辺での米軍人による事件が相次ぎ、県内外で批判の声が上がった。","date":"2026年5月8日（木）","source":"https://www.qab.co.jp/news/2026/05/09","confidence":"高"},{"id":"社会-1779320403683-w84t7","category":"社会","title":"GW最終日に首都高速で5台絡む事故——世田谷・3号渋谷線上りで渋滞","summary":"ゴールデンウィーク最終日の5月6日、東京・世田谷区内の首都高速3号渋谷線の上り線で乗用車5台が絡む玉突き事故が発生し、複数人が軽傷を負った。帰省ラッシュのUターン渋滞と重なって現場周辺の混雑が拡大した。GW中は各地の幹線道路でも事故が多発した。","date":"2026年5月6日（火）","source":"","confidence":"中"},{"id":"社会-1779320403683-pwgqi","category":"社会","title":"GW期間中の水難事故・山岳遭難が多発——消防・海保が全国で対応","summary":"ゴールデンウィーク期間中、全国各地の海水浴場・河川・山岳で水難事故や山岳遭難が相次いだ。消防庁・海上保安庁のまとめによると、GW中の水難救助出動件数は前年を上回り、特に伊豆半島・沖縄・北アルプスで複数件の遭難・救助活動が行われた。行楽客の急増と好天が重なり、無謀な行動による事故が増加した。","date":"2026年5月上旬","source":"","confidence":"中"},{"id":"スポーツ-1779320403684-w5eaq","category":"スポーツ","title":"楽天・早川隆久が対ソフトバンク戦で7回無失点の快投——今季2勝目、防御率1.23","summary":"プロ野球パ・リーグの楽天対ソフトバンク戦（5月3日）で、楽天の先発・早川隆久投手が7回9奪三振・無失点の力投を見せ、今季2勝目（防御率1.23）を記録した。チームは7対0でソフトバンクを下し、GW中の重要な1勝を挙げた。早川はエース格として安定したピッチングを続け、パ・リーグ屈指の左腕として存在感を示している。","date":"2026年5月3日（日）","source":"https://baseball.yahoo.co.jp/npb/game/2021038809/top","confidence":"高"},{"id":"スポーツ-1779320403684-9rmpl","category":"スポーツ","title":"大谷翔平がドジャース対ブレーブス戦でタイムリーヒット——チームの逆転勝利に貢献","summary":"米大リーグ（MLB）のドジャース対ブレーブス戦（5月9日、ドジャースタジアム）で、ドジャースが3対1で勝利した。大谷翔平は5回裏に初球を捉えてライトへのタイムリーヒットを放ち、チームが2対1とリードする得点を演出した。大谷は4打数1安打1打点と活躍。2026年シーズンは打者として安定した成績を残している。","date":"2026年5月9日（土）","source":"https://topics.smt.docomo.ne.jp/article/sdaa/sports/sdaa-sdaa.jp-article-59560","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779320403684-odazs","category":"芸能・エンタメ・ゴシップ","title":"気象予報士・吉田ジョージさんが死去——東海テレビ出演後に倒れ脳幹出血で56歳","summary":"東海テレビの情報番組『スイッチ！』などで活躍した気象予報士の吉田ジョージさんが5月3日、脳幹出血のため56歳で死去した。4月17日の番組出演後に倒れて意識不明となり、そのまま帰らぬ人となった。分かりやすくユーモアを交えた解説スタイルで東海地方の視聴者に親しまれ、訃報に多くのファンから追悼の声が寄せられた。","date":"2026年5月3日（日）","source":"https://geitopi.com/%E8%A8%83%E5%A0%B1/%E6%B0%97%E8%B1%A1%E4%BA%88%E5%A0%B1%E5%A3%AB%E3%83%BB%E5%90%89%E7%94%B0%E3%82%B8%E3%83%A7%E3%83%BC%E3%82%B8%E3%81%8C56%E6%AD%B3%E3%81%A7%E6%80%A5%E6%AD%BB%E3%80%81%E6%AD%BB%E5%9B%A0%E3%81%AE%E7%97%85/","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779320403685-x4ec5","category":"芸能・エンタメ・ゴシップ","title":"「名探偵コナン」劇場版が興行収入100億円を突破——シリーズ最速ペース","summary":"2026年春に公開された「名探偵コナン」の最新劇場版が5月7日、興行収入100億円の大台を突破した。シリーズ歴代でも最速の100億円達成ペースとなり、GW期間中の集客が大きく貢献した。コナン劇場版は近年、毎年100億円超えを続けており、国民的アニメとしての存在感を改めて示した。","date":"2026年5月7日（水）","source":"","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779320403685-sknrj","category":"芸能・エンタメ・ゴシップ","title":"陸上・小池祐貴選手がヴァイオリニストの高松亜衣さんと結婚を発表","summary":"東京五輪代表でもある陸上短距離の小池祐貴選手（29）は5月9日、ヴァイオリニストの高松亜衣さんとの結婚を自身のSNSで発表した。スポーツと音楽という異色の組み合わせのカップルとして話題を集め、多くのファンや競技仲間から祝福のメッセージが寄せられた。","date":"2026年5月9日（土）","source":"","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779320403685-09stc","category":"芸能・エンタメ・ゴシップ","title":"元AKB48・仁藤萌乃が結婚を発表——インスタグラムで報告","summary":"元AKB48メンバーの仁藤萌乃さんが5月4日、自身のインスタグラムを更新し結婚を発表した。相手の詳細は公表していないが、多くの元メンバーやファンから祝福のコメントが届いた。","date":"2026年5月4日（月）","source":"","confidence":"中"},{"id":"テクノロジー-1779320403685-saeb0","category":"テクノロジー","title":"OpenAIが1,220億ドルの資金調達——企業評価額8,520億ドルでAI投資競争が加速","summary":"ChatGPTを開発する米OpenAIが2026年5月上旬、1,220億ドル（約18兆円）の新規資金調達を完了し、企業評価額が8,520億ドル（約127兆円）に達した。調達資金は研究開発に加え、複数クラウドにまたがる大規模コンピュートインフラへの投資に充てられる。AGI（汎用人工知能）実現を目指した開発競争が一段と激しさを増している。","date":"2026年5月上旬","source":"https://amiko.consulting/en/ai-major-news-and-implications-for-manufacturing-for-the-week-of-may-3-may-9-2026/","confidence":"高"},{"id":"テクノロジー-1779320403685-hyzk9","category":"テクノロジー","title":"AnthropicがGoogleと5年間2,000億ドル超のクラウド契約——22万台GPUのアクセスも確保","summary":"Claude（クロード）を開発する米AI企業AnthropicがGoogle Cloudと5年間・2,000億ドル超の大型クラウドインフラ契約を締結した。さらにSpaceXのColossus 1データセンターを通じて22万台以上のNVIDIA GPUへのアクセスも確保した。大量の計算資源の確保が最先端AI開発の鍵となっており、AI企業間のインフラ獲得競争が激化している。","date":"2026年5月上旬","source":"","confidence":"中"},{"id":"テクノロジー-1779320403685-ofbbj","category":"テクノロジー","title":"日本企業の生成AI活用が「管理フェーズ」へ移行——経産省・総務省ガイドラインの実装が本格化","summary":"経産省・総務省が策定した生成AIガイドラインの運用段階が本格化し、日本企業の生成AI活用が「どう使うか」から「どう管理するか」へ移行している。社内問い合わせ対応や営業資料生成など業務単位で動くAIエージェントの設計が進み、製造業ではRAG（社内データ連携）を活用した設計ナレッジ検索や生産トラブル推定への応用が広がっている。","date":"2026年5月上旬","source":"https://note.com/dsg_id/n/nf87dcbc4be7d","confidence":"高"},{"id":"政治-1779323211602-qmvho","category":"政治","title":"防衛装備移転三原則を改定、殺傷能力ある武器の輸出を原則解禁","summary":"高市内閣は4月21日、防衛装備移転三原則の運用指針を大幅改定し、輸出目的を「救難・輸送・警戒・監視・掃海」の5用途に限定していた「5類型」を撤廃した。これにより、殺傷能力のある完成品兵器の輸出が原則可能となり、安全保障政策の大転換となった。2023年のライセンス品完成品輸出解禁、2024年の次期戦闘機GCAP第三国輸出解禁に続く段階的緩和の集大成。","date":"2026年4月21日（火）","source":"https://news.web.nhk/newsweb/na/na-k10015104291000","confidence":"高","snippet":"「防衛装備品移転三原則」5類型撤廃 武器移転原則可能に 安全保障政策の転換（NHKニュース）"},{"id":"政治-1779323211603-cd5xq","category":"政治","title":"改正旅券法が成立、パスポート手数料を最大44%引き下げ — 7月施行","summary":"4月24日の参院本会議で改正旅券法が全会一致で可決・成立した。有効期間10年のパスポート申請手数料を現行の約1万6,000円から約8,900円に引き下げ（約44%減）、7月1日から施行される。18歳以上の5年用旅券は廃止し、10年用に一本化。国際的に見て低い日本のパスポート保有率向上を目的としている。","date":"2026年4月24日（金）","source":"https://www.jiji.com/jc/article?k=2026042400113&g=pol","confidence":"高","snippet":"パスポート手数料、７月から９０００円 改正旅券法が成立（時事ドットコム）"},{"id":"政治-1779323211604-9pj4g","category":"政治","title":"安保3文書改定へ有識者会議が初会合 — AI・ドローン活用を軸に年秋に提言","summary":"政府は4月27日、安全保障に関する有識者会議（全15名）の初会合を開催した。ウクライナや中東紛争でAI・ドローンが戦局を変えた教訓を踏まえ、「非対称的防衛能力」の構築を議論。秋に提言をまとめ、12月に国家安全保障戦略・国家防衛戦略・防衛力整備計画の3文書を改定する方針。","date":"2026年4月27日（月）","source":"https://www.sbbit.jp/article/cont1/185220","confidence":"中"},{"id":"政治-1779323211605-l2r0l","category":"政治","title":"牧野フライス製作所の買収、MBKパートナーズが断念 — 外為法改正後初の中止勧告","summary":"政府は4月22日、アジア系投資ファンド「MBKパートナーズ」による工作機械大手・牧野フライス製作所の買収に対し、2017年外為法改正後初となる買収中止勧告を発動した。高精度の工作機械が武器製造にも転用可能で安全保障上の懸念があると判断。MBKは4月30日に買収計画の正式断念を発表した。","date":"2026年4月30日（木）","source":"https://www.nikkei.com/article/DGXZQOUC22BJY0S6A420C2000000/","confidence":"高","snippet":"2017年の外為法改正以後、初めての事例。牧野フライスは軍事転用の可能性が特に高い機微な貨物として輸出に経済産業大臣の許可が必要な高性能工作機械を製造。（日本経済新聞）"},{"id":"経済-1779323211611-m04vc","category":"経済","title":"大和証券グループ、オリックス銀行を3,700億円で完全子会社化 — グループ史上最大の買収","summary":"大和証券グループ本社は4月27日、オリックスが持つオリックス銀行の全株式を3,700億円で取得し完全子会社化すると発表した。傘下の大和ネクスト銀行を通じた買収で、将来的に両行を合併させインターネット銀行として楽天銀行に次ぐ規模を目指す。10月までの完了を予定し、証券顧客基盤を生かした銀行機能の拡充で金利収益の向上を狙う。","date":"2026年4月27日（月）","source":"https://www.nikkei.com/article/DGXZQOUB275NU0X20C26A4000000/","confidence":"高","snippet":"大和証券グループ本社がオリックスから「全株式を3700億円で取得」し、オリックス銀行を完全子会社化するとのこと。同グループにとって過去最大規模の買収となります。（日本経済新聞）"},{"id":"経済-1779323211611-42yg0","category":"経済","title":"FILCOブランドで知られるダイヤテックが破産 — 高級キーボード市場の縮小で44年の歴史に幕","summary":"パソコン用キーボード「FILCO」ブランドを展開するダイヤテック株式会社（東京都千代田区、1982年設立）が4月22日に事業を終了し、4月30日に東京地裁から破産手続き開始決定を受けた。2016年に14億円超あった売上高は2024年に約8億円まで落ち込んでいた。PC市場の変化とキーボード需要の多様化が背景。44年の歴史に幕を下ろした。","date":"2026年4月30日（木）","source":"https://news.yahoo.co.jp/articles/c59cf6490bd336c7e5261208cd40102ee8454af5","confidence":"高"},{"id":"経済-1779323211612-p8at4","category":"経済","title":"2026年4月のM&A件数が121件で過去最多 — 取引総額も1.2兆円超","summary":"2026年4月の国内M&A件数が121件（前年同月比18.4%増）と、統計開始以来の4月単月最多を記録した。取引総額は1兆2,115億円（同21.5%増）。大和証券によるオリックス銀行買収（3,700億円）など大型案件が相次いだほか、中堅・中小企業の事業承継・再編も増加。TOB中心から株式譲渡・会社分割型へのシフトも見られ、産業再編が加速している。","date":"2026年4月30日（木）","source":"https://prtimes.jp/main/html/rd/p/000000346.000034249.html","confidence":"中"},{"id":"社会-1779323211613-3pj0b","category":"社会","title":"岩手・大槌町山林火災が激甚災害に指定 — 1,633haが焼失、一部避難解除進む","summary":"4月22日に発生した岩手県大槌町の山林火災は、4月26日時点で焼損面積が約1,633ヘクタールに達し、平成以降で2番目の規模となった。最大1,558世帯・3,257人に避難指示が出され、4月28日には政府が激甚災害に指定。4月29日に吉里吉里・安渡・赤浜・沢山の4地区で避難指示が解除されたが、4月30日時点でも一部に熱源が残り鎮圧に至らなかった。","date":"2026年4月28日（火）","source":"https://news.web.nhk/newsweb/na/na-k10015108391000","confidence":"高"},{"id":"社会-1779323211614-23y25","category":"社会","title":"三陸沖M7.7地震、後発地震注意情報が終了 — 大きな続発地震なく","summary":"4月20日に三陸沖（深さ約20km）で発生したM7.7の地震（青森県で最大震度5強）を受け、気象庁と内閣府が発表していた「北海道・三陸沖後発地震注意情報」が4月27日午後5時をもって終了した。大規模な続発地震は発生せず、1週間の警戒期間を経て情報が解除された。この情報の発令は制度導入後2度目で、沿岸部の住民は引き続き日頃の備えが求められた。","date":"2026年4月27日（月）","source":"https://www.bousai.go.jp/pdf/260420.pdf","confidence":"中"},{"id":"社会-1779323211615-5n0xe","category":"社会","title":"水俣病公式確認から70年 — 熊本・水俣市で慰霊式、救済求める訴えは続く","summary":"1956年5月1日に水俣病が公式確認されてから70年となる5月1日、熊本県水俣市で犠牲者慰霊式が開催された。工場排水のメチル水銀による中毒性神経疾患で、「公害の原点」とされる。国・自治体・原因企業チッソへの責任追及は続き、現在も患者認定を求める申請や賠償訴訟が行われている。70年の節目に改めて教訓の継承が求められている。","date":"2026年5月1日（金）","source":"https://news.web.nhk/newsweb/na/na-k10015112221000","confidence":"高"},{"id":"スポーツ-1779323211615-8naz9","category":"スポーツ","title":"フィギュア「りくりゅう」ペアが引退会見 — 冬季五輪金メダルで有終の美","summary":"ミラノ・コルティナ冬季五輪のフィギュアスケートペアで日本勢初の金メダルを獲得した三浦璃来（24）・木原龍一（33）が4月28日、都内で引退会見を行った。4月17日のSNS発表に続く公式会見で、フリーで世界歴代最高点をマークした五輪での逆転優勝を最高の思い出として語った。三浦は「今シーズンの初めから引退する気持ちを持ちながら滑っていた」と明かした。","date":"2026年4月28日（火）","source":"https://www.jiji.com/jc/article?k=2026041700266&g=spo","confidence":"高","snippet":"「今シーズンの初めから引退をするかもしれない気持ちを持ちながら滑っていた」（三浦璃来、引退会見）"},{"id":"スポーツ-1779323211615-maos0","category":"スポーツ","title":"岡本和真（ブルージェイズ）が4月後半に本塁打を量産、打点でチームトップに","summary":"MLBトロント・ブルージェイズの岡本和真は4月後半から量産ペースで本塁打を重ね、5月初旬時点で9本塁打・22打点とチームトップに立った。2026年1月に4年6,000万ドルで契約した岡本は、メジャー1年目ながら中軸として存在感を示している。3試合連続弾を放つなど「覚醒」と評され、日本人選手の活躍が続く。","date":"2026年4月下旬","source":"https://www.tokyo-sports.co.jp/articles/-/386991","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779323211616-sgznc","category":"芸能・エンタメ・ゴシップ","title":"大野智（元嵐）、元女優と「10年越し」の密会を週刊文春が報道","summary":"週刊文春は4月29日、嵐リーダー・大野智（45）が2015年に交際報道のあった元女優A子と約10年ぶりに再会し、密会を重ねていると報道。嵐は5月31日の東京ドーム公演でラストライブを控えており、ツアー公演の翌日にも会合が確認されたという。旧ジャニーズ事務所に引き裂かれた2人の「運命の再会」と報じられ、退所後のゴールインに関心が集まる。","date":"2026年4月29日（水）","source":"https://bunshun.jp/articles/-/88239","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1779323211616-k3g3n","category":"芸能・エンタメ・ゴシップ","title":"バナナマン・日村勇紀が体調不良で当面休養 — 今年に入り体調不良が続く","summary":"お笑いコンビ「バナナマン」の日村勇紀（53）の所属事務所・ホリプロコムは4月28日、日村が体調不良のため当面の間休養することを発表した。「今年に入ってから体調を崩すことが多く、医療機関を受診した結果、医師より休養が必要との判断に至りました」と説明。TBSラジオ「バナナムーンGOLD」を2週連続で欠席しており、心身の回復を最優先とする。","date":"2026年4月28日（火）","source":"https://www.chunichi.co.jp/article/1243952","confidence":"高","snippet":"「今年に入ってから体調を崩すことが多く、医療機関を受診した結果、医師より休養が必要との判断に至りました。これを受け、当面の間、休養に専念させていただきます」（ホリプロコム発表）"},{"id":"芸能・エンタメ・ゴシップ-1779323211617-17e2a","category":"芸能・エンタメ・ゴシップ","title":"女優・五十嵐淳子さんが急死 — 中村雅俊の妻、73歳","summary":"女優で中村雅俊の妻・五十嵐淳子さんが4月28日、急病のため73歳で逝去した。5月2日に所属事務所ノースプロダクションが発表。1977年に中村と結婚した「おしどり夫婦」として知られ、病名は非公表。中村雅俊は「俺の人生最大のラッキーは妻と出会ったことでした。その妻を亡くすことなど考えたことがなくて、今はその現実を受け止めることができません」とコメントした。","date":"2026年5月2日（土）","source":"https://geitopi.com/%E8%A8%83%E5%A0%B1/%E5%A5%B3%E5%84%AA%E3%83%BB%E4%BA%94%E5%8D%81%E5%B5%90%E6%B7%B3%E5%AD%90%E3%81%8C%E6%80%A5%E6%AD%BB%E3%80%82%E6%AD%BB%E5%9B%A0%E3%81%AE%E7%97%85%E5%90%8D%E9%9D%9E%E5%85%AC%E8%A1%A8%E3%82%82%E6%80%A5/","confidence":"高","snippet":"「俺の人生最大のラッキーは妻と出会ったことでした。その妻を亡くすことなど考えたことがなくて、今はその現実を受け止めることができません」（中村雅俊コメント）"},{"id":"テクノロジー-1779323211617-0xkn6","category":"テクノロジー","title":"OpenAI、「GPT-5.5」発表 — 複数タスクを自律実行するエージェントAIに大幅進化","summary":"OpenAIは4月23日、最新AIモデル「GPT-5.5」を発表した。マルチステップ作業をユーザーの継続的な指示なしに完遂する「エージェンティックAI」として設計され、コーディング・データ分析・文書作成を1ワークフローで処理する。100万トークンのコンテキストウィンドウを搭載し、企業向けに「Workspace Agents」機能も実装。ユーザーがオフライン中もクラウド上で自律動作を継続する。","date":"2026年4月23日（木）","source":"https://www.sbbit.jp/article/cont1/185117","confidence":"高","snippet":"「複雑な自律型タスクの遂行に特化」し、ユーザーから与えられた曖昧な目標を解釈し自ら必要なツールを選択して作業を進める。人間による監視を最小限に抑えながら、計画・実行・エラー修正までを単独で完結させるエージェント機能が最大の特徴。（ビジネス+IT）"},{"id":"テクノロジー-1779323211617-wllmo","category":"テクノロジー","title":"Google、AnthropicにAI覇権争いで最大400億ドル（約4兆円）の追加投資","summary":"Googleは4月24日、AI企業Anthropicへの最大400億ドル（約4兆円）の追加投資を発表した。即時100億ドルを出資し、業績目標達成に応じて最大300億ドルを追加。Google CloudがTPU 5GW規模のコンピュート（計算資源）を5年間供給する条件も付く。OpenAIへの対抗措置として、AI三強（OpenAI・Anthropic・Google）の資本関係が一段と複雑化している。","date":"2026年4月24日（金）","source":"https://gleamhub.net/media/0213-google-anthropic-40b-investment/","confidence":"高","snippet":"即時100億ドルを評価額350億ドルで出資し、業績マイルストーン達成時に追加300億ドルを段階投資。Google CloudからTPU+GPUを含む5ギガワット規模のコンピュートを5年間供給する契約も付随。（GH Media）"},{"id":"テクノロジー-1779323211617-tgzy4","category":"テクノロジー","title":"Microsoft Copilot、AnthropicのClaudeを選択可能に — 企業向けマルチモデル対応が本格始動","summary":"Microsoftは4月、企業向けAIアシスタント「Copilot」にAnthropicの「Claude」を統合し、GPTとClaudeを用途に応じて選択できるマルチモデル体制を整えた。企業向け新プランに合わせて長時間・複数ステップ作業を自律実行する「Copilot Cowork」も投入。AI各社がエコシステムを超えて連携する動きが加速している。","date":"2026年4月中旬","source":"https://techcommunity.microsoft.com/blog/microsoftmechanicsblog/claude--gpt--multi-model-intelligence-in-copilot/4509773","confidence":"中"},{"id":"政治-1779363493432-pm6ax","category":"政治","title":"国家情報局設置法案が衆院通過 — 首相を議長とする「国家情報会議」も創設","summary":"4月23日の衆院本会議で国家情報局設置法案が与党・中道改革連合・国民民主党の賛成多数で可決した。首相を議長とする「国家情報会議」（安保・テロ・外国影響工作を審議）と、事務局を担う「国家情報局」を設置する内容。現行の内閣情報官を格上げした情報局長を置く。プライバシー侵害懸念には付帯決議で配慮を明記。参院でも過半数の賛成が見込まれ今国会中の成立が有力。","date":"2026年4月23日（木）","source":"https://www.jiji.com/jc/article?k=2026042300112&g=pol","confidence":"高","snippet":"「首相を議長とする国家情報会議と、事務局を担う国家情報局を設置するもの。同会議は安全保障やテロリズムに関する「重要情報活動」の調査・審議を実施。外国勢力による影響工作への対処について基本方針を決定する。」（時事ドットコム）"},{"id":"政治-1779363493434-nr5bg","category":"政治","title":"衆議院憲法審査会、「緊急事態条項」で各党が集中審議 — 参院選前に改憲論議活発化","summary":"4月23日、衆議院憲法審査会が「緊急事態条項」をテーマに集中討議を実施した。自民・公明は積極的な憲法改正を主張、立憲民主は「国会が機能停止するケースは現行法で対応可能」と慎重論を展開。三陸沖地震（4/20）や能登の経験を踏まえ、改憲派は「有事に権限を集中させる緊急事態条項の必要性」を強調。7月の参院選を前に各党のスタンスが鮮明になっている。","date":"2026年4月23日（木）","source":"","confidence":"中"},{"id":"政治-1779363493438-gng7i","category":"政治","title":"玉城デニー知事が沖縄知事選への3選出馬を正式表明 — 辺野古移設阻止を掲げ","summary":"沖縄県の玉城デニー知事（66）が4月25日、9月13日投開票の知事選への3選出馬を正式表明した。2018年・2022年と辺野古移設反対を掲げて当選した実績を背景に「オール沖縄」勢力の支援を受けて挑む。対立候補として自民党系が擁立を検討しており事実上の一騎打ちとなる見通し。玉城氏は「辺野古ノー」「県民の負担軽減」を最大の争点とする方針。","date":"2026年4月25日（土）","source":"https://www.nikkei.com/article/DGXZQOJC212AR0R20C26A4000000/","confidence":"高","snippet":"「沖縄県知事選挙、玉城デニー氏が3選出馬を正式表明 辺野古移設に反対」（日本経済新聞）"},{"id":"経済-1779363493438-a9ofo","category":"経済","title":"2026年3月期決算シーズン開幕、上場企業5年連続最高益の見通し","summary":"4月下旬から3月期本決算の発表が本格化し始めた。日本経済新聞の集計では、上場企業の純利益は従来予想の前期比2%減から一転して1%増となり、5年連続で過去最高益を更新する見通し。AI投資関連需要の拡大・円安・内需回復が業績を下支え。ただし今後の為替動向や米中対立の行方が下半期の不確定要素として意識される。","date":"2026年4月下旬","source":"https://www.nikkei.com/article/DGXZQOUB092RK0Z00C26A2000000/","confidence":"中"},{"id":"スポーツ-1779363493439-049a9","category":"スポーツ","title":"TEAM JAPAN帰国感謝パレード — 日本橋に約5万人、冬季五輪・パラ史上初の開催","summary":"ミラノ・コルティナ2026冬季五輪・パラリンピックの日本代表選手115名が4月25日、東京・日本橋中央通り約700mで感謝パレードを実施した。金メダリストの三浦璃来・木原龍一（りくりゅう）ペア、フィギュア女王・坂本花織らが沿道に手を振り、約5万人の観衆が声援を送った。冬季五輪・パラリンピックとしての帰国パレードは史上初。","date":"2026年4月25日（土）","source":"https://www.joc.or.jp/news/20260409_01.html","confidence":"高","snippet":"「本イベントには、オリンピックメダリスト（23選手）・パラリンピックメダリスト（3選手）をはじめ、出場アスリート総勢115名が参加。日本橋中央通り約700mのパレードに約5万人が集まった。」（JOC）"},{"id":"スポーツ-1779363493439-ojoxa","category":"スポーツ","title":"鈴木誠也（カブス）2戦連続2号2ランの活躍、カブス3年ぶり8連勝","summary":"シカゴ・カブスの鈴木誠也（31）が4月22日のフィリーズ戦で2試合連続となる2号2ランを含む4打数2安打2打点の活躍。チームは7-2で快勝し3年ぶりとなる8連勝を達成し通算15勝9敗とした。今季打率.279で4番に定着し、チームの主砲として機能。カブスは地区4位から一気に上位浮上の勢いを見せている。","date":"2026年4月22日（水）","source":"https://www.tsp21.com/sports/mlb/news2026/0422.html","confidence":"高","snippet":"「鈴木誠也は4番ライトで出場し4度の打席で2本塁打2打点を記録。カブスは7-2でフィリーズに勝利し3年ぶり8試合連勝を達成（通算15勝9敗）。」（TSP SPORTS）"},{"id":"スポーツ-1779363493440-h6dbu","category":"スポーツ","title":"大谷翔平（ドジャース）6回無失点の好投も、53試合連続出塁記録が止まる","summary":"ロサンゼルス・ドジャースの大谷翔平（31）が4月23日のジャイアンツ戦（アウェー）で先発。6回を2安打7奪三振・無失点に抑える力投を見せた。しかし打者として3打数0安打に終わり、球団歴代2位となる53試合連続出塁記録がストップした。大谷は「記録より勝つことが大事」とコメント。4月を通じて投打二刀流で好成績を残し、NL月間MVP（3〜4月）の有力候補に名前が挙がっている。","date":"2026年4月23日（木）","source":"https://baseball.yahoo.co.jp/mlb/game/2026042314/score?index=0620100","confidence":"高","snippet":"「大谷翔平は6回無失点の好投を見せたが打者としては0安打に終わり、連続試合出塁記録「53」でストップした。」（スポーツナビ）"},{"id":"芸能・エンタメ・ゴシップ-1779363493441-6iutw","category":"芸能・エンタメ・ゴシップ","title":"元EXILE・黒木啓司が妻・宮崎麗果と離婚 — 約11年の婚姻に終止符","summary":"元EXILEメンバーの黒木啓司（40）と女優の宮崎麗果（37）が4月21日に離婚したと双方の所属事務所が発表した。2人は2015年に結婚し、約11年の結婚生活に終止符を打った。2014年にEXILEを卒業した黒木は2010年代前半に全国的な知名度を誇った。離婚理由は「互いの価値観の違い」とのみ説明され、詳細は非公表。","date":"2026年4月21日（火）","source":"https://geitopi.com/","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-1779363493442-ud3db","category":"芸能・エンタメ・ゴシップ","title":"バナナマン・日村勇紀が2週連続番組欠席 — 相方・設楽統が番組内で異変を告白","summary":"お笑いコンビ「バナナマン」の日村勇紀（53）が4月25日放送のTBSラジオ「バナナムーンGOLD」を2週連続で欠席した。相方の設楽統（52）が「体の調子が良くないようで」と番組内で現状を明かした。正式な休養発表は後日（4月28日）となり、「医師から休養が必要との判断」との理由が説明された。","date":"2026年4月25日（土）","source":"","confidence":"中"},{"id":"テクノロジー-1779363493442-j85l1","category":"テクノロジー","title":"Amazon・Anthropic、AI開発に向け長期の大規模クラウド利用契約を締結","summary":"Amazon Web Services（AWS）と生成AIスタートアップのAnthropicが、AI開発・運用インフラに関する長期の大規模クラウド利用契約を締結したことが明らかになった。AnthropicのClaudeモデルの学習・推論基盤を原則としてAWS上で稼働させることを約束するもの。Amazonはすでに出資関係にあるAnthropicの主要クラウドパート     var txt="【"+item.category+"】"+item.title+"\n"+(item.date||"")+"\n\n"+item.summary+(hasSrc?"\n\nソース: "+item.source:"");
    if(navigator.clipboard)navigator.clipboard.writeText(txt);
    var b=document.getElementById("cpBtn");b.textContent="コピー済み ✓";b.classList.add("done");
    setTimeout(function(){if(document.getElementById("cpBtn")){document.getElementById("cpBtn").textContent="📋 内容をコピー";document.getElementById("cpBtn").classList.remove("done");}},1800);
  });
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.getElementById("dlg").innerHTML="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeDetail();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDetail();});
document.getElementById("fCat").addEventListener("change",function(e){st.fCat=e.target.value;render();});
document.getElementById("fYear").addEventListener("change",function(e){st.fYear=e.target.value;st.fMonth="すべて";render();});
document.getElementById("fMonth").addEventListener("change",function(e){st.fMonth=e.target.value;render();});
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});
document.getElementById("sortBtn").addEventListener("click",function(){st.sort=st.sort==="desc"?"asc":"desc";render();});
document.getElementById("resetBtn").addEventListener("click",function(){st.fCat="すべて";st.fYear="すべて";st.fMonth="すべて";st.q="";render();});
render();
</script>
</body>
