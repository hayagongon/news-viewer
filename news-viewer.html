tes":""},{"id":"政治-1780568282238-7d4p2","category":"政治","title":"ガソリン税・軽油引取税の暫定税率廃止法が参院本会議で成立","summary":"ガソリン税（1リットル当たり25.1円）と軽油引取税（同17.1円）の暫定税率を廃止する法律が11月28日、参院本会議で成立した。ガソリンの暫定税率は12月31日に、軽油は2026年4月1日に廃止となる。","date":"2025年11月28日（金）","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"ガソリン税と軽油引取税の暫定税率の廃止法が参院本会議で成立。","notes":""},{"id":"経済-1780568282240-5clk9","category":"経済","title":"アサヒビール、サイバー攻撃で顧客・従業員191万件の個人情報漏えいの恐れ","summary":"アサヒビールは11月27日、10月に受けたサイバー攻撃によるシステム障害の影響で、顧客および従業員の個人情報191万件が漏えいした可能性があると発表した。ビール出荷システムを含む社内ITシステムがダウンし、完全復旧は2026年2月を予定している。","date":"2025年11月27日（木）","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"サイバー攻撃によるシステム障害で191万件の個人情報が漏えいした恐れがあると発表。ビール出荷システムを含む社内ITシステムがダウン。","notes":""},{"id":"経済-1780568282241-fgim6","category":"経済","title":"エアバスA320型機のソフトウェア問題でANAの国内線95便が欠航、1万3200人に影響","summary":"全日本空輸（ANA）は11月29日、保有するエアバスA320・A321型機計34機にソフトウェアのアップデートが必要になったとして国内線95便を欠航した。太陽フレアの影響で飛行制御データが破損する恐れがあることが原因。約1万3200人の旅客に影響し、30日も6便の欠航が見込まれた。","date":"2025年11月29日（土）","source":"https://news.web.nhk/newsweb/na/na-k10014989561000","confidence":"高","snippet":"全日空は保有するエアバスのA320型機とA321型機の34機でソフトウエアのアップデート作業が必要となったため、29日国内線の95便が欠航した。","notes":""},{"id":"経済-1780568282241-e09nq","category":"経済","title":"北海道知事が泊原発3号機の再稼働に前向き姿勢を表明","summary":"北海道知事が11月28日、北海道電力・泊原発3号機の再稼働に前向きな姿勢を示唆した。泊原発は2012年から停止が続いており、再稼働が実現すれば北海道電力の収益改善と電力安定供給・料金安定化につながると期待されている。","date":"2025年11月28日（金）","source":"https://www.nippon.com/ja/news/q202511/","confidence":"中","snippet":"北海道知事が泊原発3号機の再稼働に前向きの姿勢を示唆。","notes":""},{"id":"社会-1780568282242-1hnlm","category":"社会","title":"沖縄本島で大規模断水、老朽化した水道管が破裂し17市町村37万世帯に影響","summary":"11月24日未明、沖縄本島北部の大宜味村で1967年に敷設された老朽化した導水管が破裂し、那覇市など中南部17市町村の約37万世帯が断水した。那覇空港の飲食店も一時全店休業。11月25日午後に概ね復旧した。","date":"2025年11月24日（月）","source":"https://www.jiji.com/jc/article?k=2025112400271&g=soc","confidence":"高","snippet":"水源から水を浄水場に送る導水管の破裂が確認された。老朽化による破裂とみられ、17市町村の約37万世帯が断水の影響を受けた。","notes":""},{"id":"社会-1780568282242-icnbg","category":"社会","title":"東京・足立区で盗難車が歩行者に突っ込み11人死傷、37歳男を逮捕","summary":"11月24日昼、東京都足立区梅島で盗難車が歩道に乗り上げ歩行者4人をひき逃げ後、トラックと衝突し合計11人（80代男性1人死亡、20代女性重体含む）が死傷した。近くの中古車販売店から盗んだとみられる車を運転していた37歳の男が逮捕された。","date":"2025年11月24日（月）","source":"https://www.jiji.com/jc/article?k=2025112400284&g=soc","confidence":"高","snippet":"車は約2時間前に近くの自動車販売店の駐車場から盗まれたとみられる。容疑者は「盗んでいない、試乗した」と供述している。","notes":""},{"id":"社会-1780568282243-j9nt5","category":"社会","title":"証券口座を乗っ取り株価を不正操作、中国籍の男2人を逮捕","summary":"警視庁などの合同捜査本部は11月28日、他人の証券口座に不正アクセスして株式を売買し株価をつり上げたとして、中国籍の男2人を不正アクセス禁止法違反および金融商品取引法違反（相場操縦）の疑いで逮捕した。被疑者らは約860万円の不正売却益を得たとみられる。","date":"2025年11月28日（金）","source":"https://www.nikkei.com/article/DGXZQOUD26B180W5A121C2000000/","confidence":"高","snippet":"証券口座乗っ取り、相場操縦疑いで中国籍2人逮捕。株価不正つり上げ。","notes":""},{"id":"スポーツ-1780568282243-5s0pa","category":"スポーツ","title":"東京2025デフリンピック閉幕、日本勢がメダル51個・過去最多を大幅更新","summary":"聴覚障害者の国際スポーツ大会「デフリンピック東京大会」が11月26日に閉幕した。日本勢は金16・銀12・銅23の計51個のメダルを獲得し、過去最多だった前回2022年大会の30個を大幅に上回った。日本初開催となる今大会は第25回夏季デフリンピックで、約70か国・地域から選手が参加した。","date":"2025年11月26日（水）","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"デフリンピック東京大会が閉幕。日本勢はメダル51個（金16、銀12、銅23）を獲得し、過去最多だった前回大会の30個を大幅に超えた。","notes":""},{"id":"スポーツ-1780568282245-1bwcq","category":"スポーツ","title":"競輪・佐藤水菜がガールズグランプリ連覇、男女通じて史上初の年間グランプリスラムを達成","summary":"11月29日に平塚競輪場で開催されたガールズグランプリ2025で、佐藤水菜（神奈川）が逃げ切りで2年ぶり2度目の優勝を果たした。年間のGI全4競走とグランプリを制覇する「年間グランプリスラム」を男女通じて史上初めて達成した。","date":"2025年11月29日（土）","source":"https://www.cyclowired.jp/news/node/391499","confidence":"高","snippet":"佐藤水菜が圧巻の逃げでガールズGPを制し、男女合わせて史上初の年間グランプリスラムを達成した。","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780568282245-ka2zp","category":"芸能・エンタメ・ゴシップ","title":"映画『国宝』が実写邦画22年ぶり歴代興行収入1位を更新、累計173億円突破","summary":"映画「国宝」の累計興行収入が11月24日時点で173億7739万円に達し、2003年公開の「踊る大捜査線 THE MOVIE 2」（173億5000万円）を抜き、実写邦画として22年ぶりに歴代1位を更新した。ロングランヒットを続ける同作品はその後も記録を伸ばしている。","date":"2025年11月24日（月）","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"映画「国宝」の興行収入が24日までに173億7739万円に達し、「踊る大捜査線 THE MOVIE 2」の173億5000万円を抜き、実写作品では22年ぶりに歴代1位を更新。","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780568282246-z9lo3","category":"芸能・エンタメ・ゴシップ","title":"Mrs. GREEN APPLEのデビュー10周年ドキュメンタリー映画が週末興行初登場1位","summary":"11月28日に公開されたMrs. GREEN APPLEのドキュメンタリー映画「MGA MAGICAL 10 YEARS DOCUMENTARY FILM THE ORIGIN」が初週末（11月28〜30日）に動員16万2200人・興収2億5100万円を記録し初登場1位となった。楽曲「Variety」が完成するまでの300日間に密着した作品。","date":"2025年11月28日（金）","source":"https://eiga.com/ranking/20251201/","confidence":"高","snippet":"Mrs. GREEN APPLEのドキュメンタリー映画が初日から3日間で動員16万2200人、興収2億5100万円をあげ、初登場1位に輝いた。","notes":""},{"id":"テクノロジー-1780568282246-frx1k","category":"テクノロジー","title":"JR東日本がQRコード決済「teppay」発表——Suica・PASMOアプリで個人間送金も可能に","summary":"JR東日本は11月25日、モバイルSuicaとモバイルPASMOのアプリ上でQRコード決済と個人間送金を可能にする新サービス「teppay（テッペイ）」を2026年秋から提供開始すると発表した。新たなアプリダウンロード不要で、コード決済・送金・オンライン決済・地域通貨（バリチケ）機能を提供する。","date":"2025年11月25日（火）","source":"https://news.mynavi.jp/article/20251125-3717206/","confidence":"高","snippet":"モバイルSuicaの新たなコード決済サービス「teppay（テッペイ）」を2026年秋より提供開始予定であることを発表した。","notes":""},{"id":"テクノロジー-1780568282247-2k3ij","category":"テクノロジー","title":"X（旧Twitter）がアカウント所在地の表示機能を開始、偽情報・なりすまし対策","summary":"X（旧Twitter）は11月下旬、ユーザープロフィールの「このアカウントについて」欄にアカウントの接続元国・地域を表示する機能の提供を開始した。IPアドレス等をもとに所在地を推定し、コンテンツの発信元を明示することで偽情報やなりすましを抑止する。日本では「Japan」または「East Asia & Pacific」と表示される。","date":"2025年11月25日（火）","source":"https://www.watch.impress.co.jp/docs/news/2065781.html","confidence":"中","snippet":"Xのプロダクト責任者は「コンテンツの信頼性をユーザーが判断できるようにすることが重要だ」と述べており、国や接続元といった情報は発信元を判断するための手がかりとして位置づけられている。","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460354-q1vwn","category":"芸能・エンタメ・ゴシップ","title":"中居正広、女性への性加害疑惑が週刊文春で報道→芸能界引退を発表","summary":"元SMAPの中居正広が週刊文春で女性への性加害疑惑を報じられ、芸能界引退を発表した。関係者への口止め料として約9000万円が支払われたとされ、フジテレビの対応も問題視された。","date":"2025年1月","source":"https://www.ktv.jp/news/feature/250123_-nakai1/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460355-xsl70","category":"芸能・エンタメ・ゴシップ","title":"フジテレビ・港浩一社長、中居正広性加害問題で10時間超の会見→辞任","summary":"中居正広の性加害問題をめぐりフジテレビの港浩一社長らが10時間超の記者会見を実施。スポンサーが相次いでCMを差し止める異例の事態となり、社長・会長ら経営陣が辞任した。","date":"2025年1月","source":"https://www.nikkei.com/article/DGXZQOUC273SF0X20C25A1000000/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460355-ifdlm","category":"芸能・エンタメ・ゴシップ","title":"フジテレビ第三者委員会「中居正広から性暴力を受けた」と認定、二次加害も指摘","summary":"フジテレビが設置した第三者委員会は「女性が中居氏から性暴力を受けた」と認定。フジテレビが被害者救済より中居氏の出演継続を優先したとして二次加害も指摘された。","date":"2025年3月","source":"https://www.jiji.com/jc/v8?id=202503FujiNakai-team","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460356-tjvt1","category":"芸能・エンタメ・ゴシップ","title":"生島ヒロシ、複数のハラスメントでTBSラジオ冠番組2本を緊急降板","summary":"TBSラジオはアナウンサーの生島ヒロシが複数の関係者へのハラスメントを行ったと発表し、冠番組2本を緊急降板させた。重大なコンプライアンス違反とされた。","date":"2025年1月","source":"https://news.biglobe.ne.jp/domestic/0127/kyo_250127_8217923990.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460360-uqhl3","category":"芸能・エンタメ・ゴシップ","title":"松本人志、週刊文春への名誉毀損訴訟を取り下げ—「ダウンタウン」の行方に注目","summary":"ダウンタウンの松本人志は週刊文春を相手取った名誉毀損裁判を取り下げた。活動休止から1年以上が経過し、相方・浜田雅功との「ダウンタウン」の存続も議論となった。","date":"2025年1月","source":"https://www.nikkei.com/article/DGXZQOUE083VA0Y4A101C2000000/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460360-nyknz","category":"芸能・エンタメ・ゴシップ","title":"ガイナックス（エヴァンゲリオン制作会社）が破産申立て—40年の歴史に幕","summary":"「新世紀エヴァンゲリオン」を世に送り出したアニメ制作会社・ガイナックスが2024年5月29日に破産を申し立て、6月5日に破産手続きが開始された。1984年設立から約40年、アニメ界に多大な影響を与えた会社の終焉にファンから惜しむ声が上がった。","date":"2024年5月","source":"https://www.nippon.com/ja/news/q202405/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460361-nbzbs","category":"芸能・エンタメ・ゴシップ","title":"永野芽郁×田中圭の不倫疑惑が報道→大河ドラマ・CM多数を降板","summary":"俳優の永野芽郁と田中圭の不倫疑惑が報じられた。事務所は否定したが、永野芽郁はNHK大河ドラマや複数のCMへの出演を降板することになり、業界に激震が走った。","date":"2025年4月","source":"https://www.nippon.com/ja/news/q202504/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460361-o06y5","category":"芸能・エンタメ・ゴシップ","title":"国分太一のコンプライアンス違反でTOKIO解散を発表—「再び信頼いただくのは難しい」","summary":"国分太一のコンプライアンス違反（セクハラ的言動）が発覚し無期限活動休止となり、城島茂・松岡昌宏・国分太一の3人体制のTOKIOが解散を発表した。「再び信頼・応援いただくのは難しいと判断」とコメント。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202506/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460362-9hztd","category":"芸能・エンタメ・ゴシップ","title":"地面師たち（Netflix）が国内外のドラマ賞を受賞、綾野剛・豊川悦司の怪演が再評価","summary":"2024年に配信されNetflixで大ヒットしたドラマ「地面師たち」が国内外のドラマ賞を受賞。綾野剛と豊川悦司の怪演が高く評価され、実際の積水ハウス地面師事件も改めて注目された。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202506/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460363-1qcb3","category":"芸能・エンタメ・ゴシップ","title":"映画「国宝」が興行収入173億円で邦画実写歴代1位を更新—22年ぶりに踊る大捜査線2を抜く","summary":"映画「国宝」が累計興行収入173億7739万円となり、2003年の「踊る大捜査線 THE MOVIE 2」を抜いて実写邦画歴代興行収入1位を22年ぶりに更新した。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460363-k18mt","category":"芸能・エンタメ・ゴシップ","title":"竹内涼真主演「じゃあ、あんたが作ってみろよ」放送直後にSNSトレンド独占—高視聴率継続","summary":"TBSドラマ「じゃあ、あんたが作ってみろよ」が放送直後にSNSでトレンド入りする現象が続き、竹内涼真の演技が高く評価された。最終回の継続視聴率も高水準を記録した。","date":"2025年10月","source":"https://www.nippon.com/ja/news/q202510/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460363-jlw91","category":"芸能・エンタメ・ゴシップ","title":"広末涼子、新東名高速で時速180km台の走行→過失運転致傷で書類送検","summary":"俳優の広末涼子（45）は2025年4月8日に病院の看護師への傷害容疑で現行犯逮捕（後に釈放）されており、さらに新東名高速道路で時速180km台の速度でトレーラーに追突し同乗者にけがを負わせたとして、静岡県警が2025年11月に自動車運転死傷行為処罰法違反容疑で書類送検した。","date":"2025年11月","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780572460363-kccu8","category":"芸能・エンタメ・ゴシップ","title":"TBSアナウンサー・安住紳一郎が結婚を発表—長年独身で通してきた「安住さん」に驚きの声","summary":"TBSの人気アナウンサー・安住紳一郎が結婚を発表した。長年独身で通してきたこともありファンや芸能界に驚きの声が広がった。","date":"2025年12月","source":"https://www.nippon.com/ja/news/q202512/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460363-tq7yj","category":"政治","title":"江藤農相「コメは自分で買ったことがない」発言で炎上—物価高で苦しむ国民感情に火","summary":"江藤農水大臣が農業関連の会合で「私はコメを自分で買ったことがない」と発言し炎上。コメ価格が高騰し家計が苦しむ中での発言として国民の怒りを買い、辞任を求める声が上がった。","date":"2025年5月","source":"https://www.jiji.com/jc/article?k=2025051900510&g=eco","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460363-7xynh","category":"政治","title":"参院選で自民・公明が過半数割れ、歴史的大敗—裏金問題が直撃","summary":"参院選で自民・公明は獲得議席47と歴史的な大敗を喫し、参院全体の過半数を失った。裏金問題の当事者議員が相次いで落選し、石破政権への打撃となった。","date":"2025年7月","source":"https://www.nippon.com/ja/news/l00376/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460363-63p7o","category":"政治","title":"石破茂首相が辞任表明—政権8カ月で幕、自民党総裁選へ","summary":"石破茂首相が辞任を表明した。参院選での大敗を受けて党内の批判が高まり、発足から約8カ月で退陣。自民党総裁選が行われ、高市早苗氏が勝利した。","date":"2025年9月","source":"https://www.nippon.com/ja/news/l00376/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460364-p2v8v","category":"政治","title":"高市早苗、日本初の女性首相に就任—自民×維新の連立政権発足","summary":"高市早苗氏が憲政史上初の女性首相に就任した。自民党は日本維新の会と連立政権を組み、公明党との連立は解消された。就任会見でのスピーチ「働いて働いて…」が後に流行語大賞を獲得した。","date":"2025年9月","source":"https://www.nippon.com/ja/news/l00376/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460364-z2aot","category":"政治","title":"安倍晋三元首相銃撃事件の裁判員裁判がついに開始—山上徹也被告の動機を法廷で審理","summary":"2022年7月に銃撃された安倍晋三元首相の暗殺事件で、山上徹也被告の裁判員裁判が開始された。旧統一教会への恨みを動機とする特異な事件の全容が法廷で明らかにされた。","date":"2025年10月","source":"https://www.nikkei.com/article/DGXZQOUF1550R0V11C25A0000000/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460364-vk3t7","category":"政治","title":"NHK党・立花孝志党首を逮捕—竹内元県議への名誉毀損容疑","summary":"NHK党の立花孝志党首が、2025年1月に死去した竹内英明元兵庫県議をデマで中傷したとして名誉毀損容疑で兵庫県警に逮捕された。SNS政治活動のあり方に議論が及んだ。","date":"2025年11月","source":"https://www.jiji.com/jc/article?k=2025111000289&g=soc","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460364-nd8q0","category":"政治","title":"能動的サイバー防御法が成立—平時から政府が通信を監視できる内容に賛否両論","summary":"平時から政府機関が国内の通信を監視・サイバー攻撃に先制対処できる「能動的サイバー防御法」が成立した。安全保障上の必要性を主張する与党と、プライバシー侵害を懸念する野党が対立した。","date":"2025年5月","source":"https://act1.co.jp/2025_05_20-1/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460364-rr8ew","category":"政治","title":"流行語大賞「働いて働いて働いて働いて働いてまいります」年間大賞—高市首相の就任会見発言","summary":"2025年の新語・流行語大賞の年間大賞に「働いて働いて働いて働いて働いてまいります／女性首相」が選ばれた。高市早苗首相の就任会見での力強い発言がSNSで拡散し、流行語となった。","date":"2025年12月","source":"https://www.nippon.com/ja/japan-data/h02599/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780572460364-cxds3","category":"政治","title":"斎藤元彦・兵庫県知事問題の余波—SNS選挙戦術やPR会社問題が全国的に議論に","summary":"2024年秋に再選した斎藤元彦兵庫県知事をめぐるパワハラ告発・PR会社問題が2025年も議論を呼んだ。SNSを駆使した選挙戦術や百条委員会の運営のあり方が全国的に注目された。","date":"2025年5月","source":"https://www.nippon.com/ja/news/q202505/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460364-adqx3","category":"経済","title":"三菱UFJ銀行元行員が顧客の貸金庫から13億円超を窃盗—懲役9年の判決","summary":"三菱UFJ銀行の元女性行員が長年にわたり顧客の貸金庫から現金や貴金属など13億円超を窃盗していたことが判明。東京地裁で懲役9年の判決が言い渡された。銀行の管理体制が根本から問われた。","date":"2025年1月","source":"https://www.jiji.com/jc/article?k=2025100600605&g=soc","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460365-3a9yo","category":"経済","title":"ホンダと日産自動車の経営統合協議が破談—交渉開始から2カ月で白紙撤回","summary":"2024年末に発表されたホンダと日産自動車の経営統合協議が白紙となった。交渉からわずか2カ月での破談で、自動車業界の合従連衡の難しさが改めて浮き彫りになった。","date":"2025年2月","source":"https://www.nikkei.com/article/DGXZQOUC233YQ0T20C25A1000000/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460365-h0hjp","category":"経済","title":"ソフトバンクグループ、OpenAIと合弁会社設立に合意—孫正義「知の結婚」","summary":"ソフトバンクグループがOpenAIと合弁会社「SB OpenAI Japan」設立に合意。孫正義会長は「知の結婚だ」と称し、日本のAIインフラ整備に積極投資する姿勢を示した。","date":"2025年2月","source":"https://www.softbank.jp/corp/news/press/sbkk/2025/20250203_01/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460365-rs6wj","category":"経済","title":"コメ価格高騰で5kg3000円超え、政府が備蓄米21万トンを緊急放出","summary":"2024年夏から続くコメ不足・価格高騰が2025年に入っても収まらず、5kgが3000円超えの水準に。政府は備蓄米21万トンの放出を決定したが、価格は高止まりした。「古古古米」などの新語も生まれた。","date":"2025年2月","source":"https://www.nippon.com/ja/news/q202502/","confidence":"中","snippet":"","notes":""},{"id":"経済-1780572460365-8zeu1","category":"経済","title":"日本製鉄によるUSスチール買収がバイデン政権の阻止を経てトランプ政権下で承認","summary":"バイデン大統領が安全保障を理由に一度は阻止した日本製鉄のUSスチール買収案が、トランプ政権下で条件付きで承認され141億ドルでの買収が完了した。","date":"2025年6月","source":"https://www.jetro.go.jp/biznews/2025/06/355b114b1a1c0119.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460366-ta6md","category":"経済","title":"三菱商事が洋上風力発電事業から撤退—建設コスト2倍以上で採算悪化「三菱商事ショック」","summary":"三菱商事が千葉・秋田沖など3海域の洋上風力発電事業からの撤退を正式発表した。建設費が入札時の2倍以上に膨らみ採算が見込めないためで、再生可能エネルギー政策への影響が懸念された。","date":"2025年8月","source":"https://www.nikkei.com/article/DGXZQOUC294K80Z20C25A8000000/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460366-pc6t1","category":"経済","title":"アサヒビール、ランサムウェア攻撃で191万件の個人情報漏えいの恐れ—出荷にも影響","summary":"アサヒビールがランサムウェア攻撃を受け、顧客・従業員の個人情報191万件が漏えいした可能性があると発表した。ビール出荷システムも影響を受け、完全復旧は2026年2月となった。","date":"2025年9月","source":"https://xtech.nikkei.com/atcl/nxt/news/24/02998/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780572460370-sp7n7","category":"経済","title":"日経平均株価が初の5万円台突入—バブル期最高値を大幅に更新する歴史的水準","summary":"日経平均株価が初めて5万円台を突破した。企業業績の好調と円安・AI投資への期待感が背景にあり、1989年のバブル期最高値（3万8957円）を大幅に更新する歴史的な水準となった。","date":"2025年10月","source":"https://indexes.nikkei.co.jp/atcl/2025/11/202510.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460370-9jt2e","category":"社会","title":"埼玉・八潮市の国道で大規模道路陥没—走行中のトラックが転落、運転手の遺体は5カ月後に発見","summary":"埼玉県八潮市の国道で老朽化した下水管が破裂し大規模な道路陥没が発生。走行中のトラックが転落し、行方不明となっていた運転手の遺体が数カ月後に地中で発見されるという衝撃的な展開となった。","date":"2025年1月","source":"https://www.jiji.com/jc/d4?p=skj128&d=d4_disaster","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460370-3kjy8","category":"社会","title":"阪神・淡路大震災から30年—6434人の犠牲者を悼む追悼式、記憶の継承が急務に","summary":"2025年1月17日、阪神・淡路大震災から30年を迎えた。神戸市などで追悼式が開かれ6434人の犠牲者を追悼。震災を知らない世代が増える中、記憶の風化防止と教訓継承が改めて訴えられた。","date":"2025年1月","source":"https://www.nikkei.com/article/DGXZQOUF166KE0W5A110C2000000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460370-98yrx","category":"社会","title":"能登半島地震から1年、1万人超が今もプレハブ仮設住宅で生活—復興の遅れが深刻","summary":"能登半島地震から1年を迎えたが、1万人以上の被災者が仮設住宅での生活を余儀なくされていた。道路整備や住宅再建の遅れが深刻で、政府の復興支援の不足が批判された。","date":"2025年1月","source":"https://www.nikkei.com/article/DGXZQOUE302UA0Q4A231C2000000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460375-7v4y5","category":"社会","title":"インフルエンザの患者数が過去最多を更新—全国の学校・職場で猛威、医療機関も逼迫","summary":"インフルエンザの患者数が統計開始以来の過去最多を更新した。全国の学校でインフルエンザによる学級閉鎖が相次ぎ、医療機関でも受診できない患者が続出するなど医療逼迫が深刻となった。","date":"2025年2月","source":"https://www.nikkei.com/article/DGXZQOUA095TP0Z00C25A1000000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460375-rx69f","category":"社会","title":"すき家の店舗でみそ汁にネズミが混入—店内カメラ映像がSNSに拡散し大炎上","summary":"牛丼チェーン「すき家」の店舗でみそ汁にネズミが混入する事件が発生。店内カメラの映像がSNSに拡散し衛生管理に批判が殺到した。不祥事ランキング2025で上位に選ばれた。","date":"2025年2月","source":"https://www.sukiya.jp/news/2025/03/20250322.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460376-q2xcw","category":"社会","title":"地下鉄サリン事件から30年—オウム真理教テロの記憶を語り継ぐ","summary":"2025年3月20日、1995年の地下鉄サリン事件から30年を迎えた。オウム真理教による無差別テロで13人が死亡し、6300人以上が被害を受けた事件を振り返り、各地で追悼行事が行われた。","date":"2025年3月","source":"https://www.nikkei.com/article/DGXZQOUE171AZ0X10C25A3000000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460376-hfvql","category":"社会","title":"お天気ダイヤル「177番」が123年の歴史に幕—スマホ普及で利用者激減し廃止","summary":"天気予報を音声で案内する「177番」サービスが2025年3月末をもって終了した。1902年の開始から123年間にわたり親しまれてきたが、スマートフォンの普及で利用者が激減し廃止された。","date":"2025年3月","source":"https://www.watch.impress.co.jp/docs/news/1611643.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460376-l5crk","category":"社会","title":"大阪・関西万博が開幕—「ミャクミャク」旋風で来場者2557万人、国内史上2番目の記録","summary":"大阪・関西万博が2025年4月13日に開幕し、10月13日まで184日間開催された。公式キャラクター「ミャクミャク」が大人気となりグッズが完売。最終的に2557万人が来場した。","date":"2025年4月","source":"https://www.expo2025.or.jp/overview/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460376-eev4q","category":"社会","title":"ジャングリア（沖縄北部テーマパーク）が開業—やんばるの自然を活かした大型施設","summary":"沖縄県本部町に大型テーマパーク「JUNGLIA（ジャングリア）」が開業した。本島北部のやんばる地域を活かした全天候型施設で、沖縄観光の新たなコンテンツとして注目を集めた。","date":"2025年7月","source":"https://prtimes.jp/main/html/rd/p/000000019.000148025.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460377-4lhs9","category":"社会","title":"兵庫・丹波市で国内観測史上最高気温41.2℃を記録—「二季」化の象徴に","summary":"兵庫県丹波市で国内気象観測史上最高となる41.2℃を記録した。全国的な記録的猛暑は「二季」（夏と冬しかない）という言葉を生み、気候変動の深刻さを示す象徴的な出来事となった。","date":"2025年7月","source":"https://www.nikkei.com/article/DGXZQOUD305BV0Q5A730C2000000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460377-z67v0","category":"社会","title":"戦後80年・昭和100年の節目—特攻隊・原爆の証言者が語り残す最後の機会","summary":"2025年は太平洋戦争終戦から80年、昭和元年から100年という節目の年。各メディアが特攻隊や原爆の生存者への取材を集中的に放送し、高齢となった証言者が語り残す最後の機会となった。","date":"2025年8月","source":"https://www.nikkei.com/article/DGXZQOUD1116J0R10C25A8000000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460377-eb60z","category":"社会","title":"東京・足立区で盗難車が歩道に突入、11人死傷—危険運転致死容疑で男を再逮捕","summary":"東京都足立区で中古車販売店から盗まれた車が歩道を暴走し11人が死傷した（80代男性1人死亡）。容疑者の37歳男は「試乗しただけ」と供述したが、後に危険運転致死容疑で再逮捕された。","date":"2025年11月","source":"https://www.jiji.com/jc/article?k=2025112400284&g=soc","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460378-o1wry","category":"社会","title":"赤坂の高級サウナ店で火災—扉のとっての脱落で脱出できず男女2名が死亡","summary":"東京・港区赤坂の会員制プライベートサウナ「SAUNATIGER」で火災が発生。サウナ室の扉内側の取っ手が脱落して脱出できなくなった男女2名が死亡した。月額39万円の高級施設での悲劇が衝撃を与えた。","date":"2025年12月","source":"https://www.city.minato.tokyo.jp/kankyoueiseishidou/akasakasaunakasai.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460378-0soso","category":"社会","title":"青森県東方沖でM7.5の大規模地震—東北沿岸に津波注意報が発令","summary":"青森県東方沖を震源とするマグニチュード7.5の大地震が発生した。東北沿岸各地に津波注意報が発令され住民が避難。東日本大震災の記憶を呼び起こし、防災意識が改めて高まった。","date":"2025年12月","source":"https://www.nippon.com/ja/news/q202512/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460378-oxn1b","category":"社会","title":"「エッホエッホ」TikTokブーム—メンフクロウのヒナが草むらを全力疾走する動画が世界的大ヒット","summary":"メンフクロウのヒナが草むらを懸命に走る動画に「エッホエッホ」と擬音をつけた投稿がTikTokでバズり、世界中に拡散。2025年の新語・流行語大賞トップ10に選出された。","date":"2025年4月","source":"https://www.nippon.com/ja/news/q202504/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460378-chvus","category":"社会","title":"「ラブブ（Labubu）」バブルマート製フィギュアが爆発的ブーム—行列・転売・争奪戦","summary":"中国のバブルマート社が展開する「ラブブ（Labubu）」フィギュアが大ブーム。K-POPアイドルとの親和性もあり若者を中心に人気が爆発し、発売日には行列・抽選が当たり前、転売価格も高騰した。","date":"2025年5月","source":"https://www.nippon.com/ja/news/q202505/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460378-ioupe","category":"社会","title":"「ぬい活」ブーム—ぬいぐるみを連れ歩き一緒に「旅行」させる文化が若者に定着","summary":"お気に入りのぬいぐるみをカバンにつけたり旅行先で写真を撮る「ぬい活」が若者を中心にブームに。ぬいぐるみ用の専用グッズや宿泊プランを用意するホテルも登場した。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202506/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460378-od3er","category":"社会","title":"「二季」化が話題—日本から春と秋が消え夏と冬だけに、と気象専門家が警告","summary":"記録的猛暑が続く中、「日本の気候が二季化している」という気象専門家の指摘が話題となった。「長袖をください」という切実な声も流行語候補になり、地球温暖化への危機感が高まった。","date":"2025年7月","source":"https://www.nippon.com/ja/news/q202507/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460379-tf2u2","category":"社会","title":"「オールドメディア」が新語・流行語大賞にノミネート—フジテレビ問題でテレビ不信が加速","summary":"フジテレビの性加害問題をきっかけにスポンサーが相次いでCMを差し止めた2025年。テレビ・新聞への不信感を表す「オールドメディア」が新語・流行語大賞のノミネート語となった。","date":"2025年11月","source":"https://www.nippon.com/ja/news/q202511/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460379-frjl0","category":"社会","title":"「古古古米（こここまい）」が流行語に—コメ不足に政府が古い備蓄米を放出","summary":"コメ不足・価格高騰が続く中、政府が「古古古米（3年以上前の備蓄米）」の放出を決めたことで「古古古米」が流行語に。スーパーでコメが品薄になる光景は「令和のコメ騒動」と呼ばれた。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202506/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460379-4de9m","category":"社会","title":"SNS型投資詐欺・「闇バイト」強盗が全国で多発—被害額数百億円規模","summary":"SNSを通じた投資詐欺と、闇バイトで集めた実行犯による強盗事件が全国で多発。被害総額は数百億円規模に上り、指示役が海外から遠隔操作する手口の巧妙化が問題となった。","date":"2025年2月","source":"https://www.nippon.com/ja/news/q202502/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460380-0e58y","category":"社会","title":"「平成女児」ブームがZ世代に逆輸入—2000年代のギャル・プリクラ・ガングロが若者に刺さる","summary":"2000年代に流行したギャルメイク・プリクラ・ガングロなど「平成女児」スタイルがZ世代の間でブームとなった。「昭和レトロ」に続く「平成レトロ」として、ファッション・音楽ともにリバイバルが加速した。","date":"2025年5月","source":"https://www.nippon.com/ja/news/q202505/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460380-o5we3","category":"社会","title":"「リカバリーウェア」ブーム—部屋着と外着の境界が消え、高機能パジャマで街に出る","summary":"疲労回復効果を謳う機能性ウェア「リカバリーウェア」がブームとなり、新語・流行語大賞のノミネート語に。在宅ワークの普及も相まって、部屋着と外出着の境界線が消えるライフスタイル変化を反映した。","date":"2025年9月","source":"https://www.nippon.com/ja/news/q202509/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460380-gnv3e","category":"社会","title":"「マヌルネコ」ブーム—那須どうぶつ王国の珍ネコが動画・グッズで大人気に","summary":"那須どうぶつ王国などで飼育される野生ネコ「マヌルネコ」がSNSを席巻。中央アジア原産の独特な顔立ちと表情が話題になり、グッズは即完売・関連動画は数百万再生を記録した。","date":"2025年3月","source":"https://www.nippon.com/ja/news/q202503/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460380-fc0w1","category":"社会","title":"訪日外国人客数が年間最多を更新—オーバーツーリズム問題が富士山・京都などで深刻化","summary":"訪日外国人客数が年間最多を更新した。富士山・京都・鎌倉などでのオーバーツーリズムが深刻化し、ゴミ問題・渋滞・マナー違反などへの対策として入場制限や観光税の導入が相次いだ。","date":"2025年10月","source":"https://www.nippon.com/ja/news/q202510/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460380-3ap1w","category":"社会","title":"全国でクマ被害が過去最多を更新—「緊急銃猟」制度を創設、警察官がクマを射殺","summary":"クマによる人身被害が全国で過去最多を更新した。市街地への出没も相次いだことで「緊急銃猟」制度が新設され、警察官がライフル銃でクマを駆除することが認められた。","date":"2025年7月","source":"https://www.nippon.com/ja/news/q202507/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780572460381-1qtw4","category":"社会","title":"新紙幣（渋沢栄一1万円札）流通から1年—旧札が使えない自販機・ATMトラブルが続出","summary":"2024年7月に発行された渋沢栄一1万円札などの新紙幣から1年が経過した2025年も、旧紙幣を受け付けない自動販売機やATMのトラブルが続出した。","date":"2025年7月","source":"https://www.nippon.com/ja/news/q202507/","confidence":"中","snippet":"","notes":""},{"id":"社会-1780572460381-8d8ir","category":"社会","title":"日本の出生数が70万人台前半に落ち込む—少子化が想定より速いペースで進行","summary":"公表された統計で日本の出生数が70万人台前半に落ち込み、政府の想定より少子化のペースが速いことが明らかになった。「2030年代には年間50万人を切る」との予測も出た。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202506/","confidence":"中","snippet":"","notes":""},{"id":"社会-1780572460381-6xm92","category":"社会","title":"上野動物園のシャオシャオ・レイレイが2026年1月に中国返還決定と発表","summary":"上野動物園が双子パンダのシャオシャオとレイレイを2026年1月下旬に中国へ返還すると発表した。2024年にリーリー・シンシンも返還されており、上野のパンダが全頭不在となることへの惜しむ声が広がった。","date":"2025年12月","source":"https://www.nippon.com/ja/news/q202512/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780572460381-wo7mv","category":"スポーツ","title":"イチロー、米野球殿堂入り—日本人・アジア人選手として史上初の快挙","summary":"イチロー氏が米国野球殿堂入りを果たした。日本人・アジア人選手として史上初。2019年の引退後わずか5年での選出で、7月の表彰式ではスタンディングオベーションが続いた。","date":"2025年1月","source":"https://www.nippon.com/ja/japan-data/h02275/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780572460381-b0ld8","category":"スポーツ","title":"箱根駅伝2025、青山学院大学が7回目の総合優勝—大会記録を更新","summary":"第101回箱根駅伝で青山学院大学が7回目の総合優勝を果たした。原晋監督の指導のもと安定した走りを見せ、大会記録を更新しての圧勝だった。","date":"2025年1月","source":"https://www.nippon.com/ja/news/q202501/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780572460382-gfo17","category":"スポーツ","title":"サッカー日本代表、W杯アジア最終予選を史上最速で突破—2026年W杯出場が確定","summary":"サッカー日本代表がW杯アジア最終予選を史上最速で突破し、2026年W杯（米加墨開催）への出場を確定させた。森保ジャパンの強さが証明され、W杯での上位進出への期待が高まった。","date":"2025年3月","source":"https://www.nippon.com/ja/news/q202503/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780572460382-pb9v5","category":"スポーツ","title":"長嶋茂雄さんが89歳で死去—「ミスタープロ野球」の訃報に野球界が悲しみに包まれる","summary":"元読売ジャイアンツの長嶋茂雄さんが89歳で死去した。読売ジャイアンツの象徴として長く「ミスタープロ野球」と呼ばれ、ON砲（王・長嶋）として日本野球界に多大な功績を残した。","date":"2025年6月","source":"https://www.nippon.com/ja/news/q202506/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780572460382-ts4sk","category":"スポーツ","title":"世界陸上選手権2025が東京で開催—日本選手が複数のメダルを獲得","summary":"世界陸上競技選手権が東京で開催された。日本選手が複数のメダルを獲得し、東京の夜空のもとで繰り広げられる世界最高峰の陸上競技を国内ファンが楽しんだ。","date":"2025年9月","source":"https://www.nippon.com/ja/news/q202509/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780572460383-kahc5","category":"スポーツ","title":"大谷翔平、ドジャースのWS2連覇に貢献—山本由伸がシリーズMVP、大谷は3年連続MVP（通算4度目）","summary":"ロサンゼルス・ドジャースがワールドシリーズ2連覇を達成。山本由伸がシリーズMVPを受賞し、大谷翔平はナ・リーグMVPを2年連続・通算4度目（2023年はア・リーグ）で受賞。日本人投打の二本柱で頂点に立った。","date": :"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-brrmf","category":"政治","title":"東京都知事選 小池百合子が3選—石丸伸二が165万票で2位、「名言が残せなかった」がミームに","summary":"2024年7月の東京都知事選で小池百合子が3選を果たした。元安芸高田市長の石丸伸二が165万票で2位に入り全国的に注目された。選挙後のインタビューで石丸が答えた「名言が残せなかった」という発言がSNSでミームとなった。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-atinp","category":"政治","title":"岸田文雄首相が退陣表明—自民党総裁選に不出馬、政権1年10カ月で幕","summary":"岸田文雄首相が2024年8月、自民党総裁選への不出馬と首相辞任を表明した。裏金問題への対応や支持率低迷が原因とされ、政権発足から約1年10カ月での退陣となった。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-z9psr","category":"政治","title":"石破茂が自民党総裁に選出→首相就任","summary":"2024年9月の自民党総裁選で石破茂が選出され、首相に就任した。かねてより安全保障・地方創生を訴えてきた石破氏だが、就任直後に衆院解散・総選挙に踏み切った。","date":"2024年9月","source":"https://www.jimin.jp/news/information/209085.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-1xa10","category":"政治","title":"衆院選で自民・公明が過半数割れ、自民191議席—裏金問題が直撃","summary":"2024年10月27日の衆院選で自民党は公示前から65議席減らして191議席となり、公明党と合わせても過半数（233議席）を割り込んだ。裏金問題への有権者の批判が議席に直結した。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-69gmx","category":"政治","title":"斎藤元彦・兵庫県知事へのパワハラ告発→百条委員会設置→不信任→失職→再選—SNS選挙戦術が論議に","summary":"2024年3月に内部告発されたパワハラ疑惑が百条委員会を設置するほどの大問題に発展。9月に県議会の不信任決議を受け失職した斎藤知事だが、11月の出直し選挙で再選。PR会社の選挙支援問題も浮上した。","date":"2024年5月","source":"https://www.nippon.com/ja/news/q202405/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-grecg","category":"政治","title":"共同親権法が成立—離婚後も共同で親権を持てる制度が77年ぶりに改正","summary":"2024年5月、離婚後は片方の親にしか親権がなかった民法が改正され、2026年施行を前提に共同親権が選べるようになった。DV被害者保護との兼ね合いで賛否が分かれた。","date":"2024年5月","source":"https://www.nippon.com/ja/news/q202405/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287191-rr324","category":"政治","title":"韓国・尹錫悦大統領が突然の戒厳令を宣言→国会が即日否決—民主化後初の戒厳令に衝撃","summary":"2024年12月3日夜、韓国の尹錫悦大統領が突然「非常戒厳」を宣言。しかし国会が即日否決し、6時間後に解除された。民主化後初の戒厳令という前代未聞の事態に韓国社会と国際社会が震撼した。","date":"2024年12月","source":"https://www.nippon.com/ja/news/q202412/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287192-vyegu","category":"社会","title":"能登半島地震（M7.6、最大震度7）—475人死亡、輪島・珠洲で甚大な被害","summary":"2024年元日の午後4時10分、石川県能登地方でM7.6・最大震度7の大地震が発生した。輪島市や珠洲市で建物の倒壊が相次ぎ475人が死亡（うち約半数が災害関連死）。半島の地形がゆえ道路寸断で孤立集落が続出した。","date":"2024年1月","source":"https://scienceportal.jst.go.jp/explore/review/20240104_e01/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287192-praay","category":"社会","title":"羽田空港で日航機と海上保安庁機が衝突炎上—JAL乗客乗員379人が奇跡の脱出","summary":"2024年1月2日、羽田空港の滑走路でJAL516便と海保機が衝突・炎上。海保乗員5名が死亡する一方、JAL機の乗客乗員379人全員が脱出・生還した。乗務員の冷静な誘導と18分間の脱出が「奇跡」として世界から称賛された。","date":"2024年1月","source":"https://www.nikkei.com/topics/24010200","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287192-6twkq","category":"社会","title":"連続企業爆破事件の逃亡犯・桐島聡容疑者と名乗る男が入院先で死亡—50年近くの指名手配に幕","summary":"1970年代の連続企業爆破事件で指名手配されていた桐島聡容疑者と名乗る男が神奈川県の病院に末期がんで入院し、2024年1月に死亡した。DNA鑑定で本人と確認され、約50年間の逃亡劇に終止符が打たれた。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287192-s64h1","category":"社会","title":"小林製薬「紅麹」サプリメント問題—健康被害が相次ぎ5人死亡、機能性表示食品制度に疑問","summary":"小林製薬が製造・販売する紅麹を含む健康食品（コレステヘルプなど）を摂取した人に腎臓疾患などの健康被害が相次ぎ、2024年3月に発覚。最終的に5人が死亡し、機能性表示食品制度の欠陥が問われた。","date":"2024年3月","source":"https://www.mhlw.go.jp/stf/seisakunitsuite/bunya/kenkou_iryou/shokuhin/daietto/index_00013.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287195-n3iab","category":"社会","title":"袴田巌さんの再審で無罪判決—68年越しの無罪、捜査機関による証拠の捏造を認定","summary":"1966年の静岡・一家4人殺害事件で死刑が確定していた袴田巌さんの再審が2024年9月に行われ、無罪判決が下された。裁判所は捜査機関による証拠捏造を認定し、88歳の袴田さんは事件発生から約58年越しに無罪となった。","date":"2024年9月","source":"https://www.tokyo-np.co.jp/article/356688","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287195-jne1s","category":"社会","title":"京都アニメーション放火殺人事件 青葉真司被告に死刑判決—36人が死亡した凄惨な事件に判決","summary":"2019年に36人が死亡した京都アニメーション放火殺人事件で、2024年1月25日に京都地方裁判所の裁判員裁判が青葉真司被告に死刑判決を言い渡した。その後被告は控訴したが2025年1月に取り下げ、死刑が確定した。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287195-r6k3z","category":"社会","title":"能登半島に記録的大雨が追い打ち—震災復興中の仮設住宅が浸水する「二重被災」","summary":"2024年9月21日、能登半島が記録的な大雨に見舞われた。1月の地震からの復興中にもかかわらず仮設住宅が浸水し、「二重被災」として被災地の窮状が改めて注目された。","date":"2024年9月","source":"https://www.nippon.com/ja/news/q202409/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287197-ihcv4","category":"社会","title":"「闇バイト」強盗事件が首都圏で相次ぐ—「ホワイト案件・高収入」の勧誘で実行犯を集める","summary":"SNSで「ホワイト案件」「高収入・単発」と偽って実行犯を集める闇バイト型強盗が2024年9〜10月に首都圏で多発。1都3県で19事件、46人が逮捕された。「ホワイト案件」は流行語大賞トップ10に入選。","date":"2024年9月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287197-1745h","category":"社会","title":"トヨタ・ホンダ・マツダなど5社で自動車型式指定の認証不正が発覚—国交省が立ち入り検査","summary":"国土交通省は2024年6月3日、トヨタ・ホンダ・マツダ・スズキ・ヤマハ発動機の5社で型式指定申請における認証試験の不正行為があったと発表。日本の「モノづくり」への信頼が揺らいだ。","date":"2024年6月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287198-h7hqi","category":"社会","title":"東京都がカスタマーハラスメント（カスハラ）防止条例を制定—全国で初","summary":"東京都は2024年10月、カスタマーハラスメントを防止・対処するための条例を全国で初めて制定した。カスハラが深刻化する中で事業者が労働者を守れる法的根拠ができた。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287198-n69hm","category":"社会","title":"流行語大賞「ふてほど」年間大賞—TBSドラマ「不適切にもほどがある！」の造語","summary":"2024年の新語・流行語大賞の年間大賞に「ふてほど」が選ばれた。TBSドラマ「不適切にもほどがある！」から生まれた略語で、コンプライアンス過剰社会への風刺が共感を呼んだ。","date":"2024年12月","source":"https://www.nippon.com/ja/news/q202412/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287198-t05gh","category":"社会","title":"「界隈（かいわい）」ブームが流行語大賞トップ10に—「○○界隈」という表現がSNSで爆発的に広まる","summary":"「量産型界隈」「コシカケ界隈」など「○○界隈」という言い方がSNSで拡散し、2024年の流行語大賞トップ10に選出された。サブカルチャーコミュニティの呼称として若者の日常語になった。","date":"2024年11月","source":"https://www.nippon.com/ja/news/q202412/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287198-r4edr","category":"経済","title":"日銀がマイナス金利を解除—17年ぶりの利上げ、日本の低金利時代が転換点に","summary":"日本銀行は2024年3月、2007年以来17年ぶりに政策金利をマイナスから引き上げた。長期間続いてきた「異次元の金融緩和」が転換点を迎え、住宅ローンや預金金利への影響が広がった。","date":"2024年3月","source":"https://www.bloomberg.com/jp/news/articles/2024-03-19/S7NFSZDWRGG000","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287198-iuoud","category":"経済","title":"円安が38年ぶりに1ドル160円台に突入—日米金利差が主な要因","summary":"2024年6月、円相場が1ドル=160円台に突入し、1986年以来約38年ぶりの円安水準となった。輸入物価の上昇を通じて国民生活を直撃し、政府・日銀の為替介入が繰り返された。","date":"2024年6月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287199-xzl2h","category":"経済","title":"新紙幣発行—渋沢栄一1万円札・北里柴三郎1000円札など20年ぶりの全面刷新","summary":"2024年7月3日、日本銀行は20年ぶりに紙幣を全面刷新した。1万円札の顔が福沢諭吉から渋沢栄一に変わり、1000円札は北里柴三郎に。3Dホログラム技術など最新の偽造防止技術が採用された。","date":"2024年7月","source":"https://www.gov-online.go.jp/article/202406/entry-6075.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287199-m3f1o","category":"経済","title":"ライドシェアが日本で始動—一般ドライバーが有償で乗客を送迎する新サービス","summary":"2024年4月から日本でもライドシェアが部分解禁された。タクシー会社が一般ドライバーを管理する形で運営が始まり、タクシー不足に悩む観光地や地方都市での活用が期待された。","date":"2024年4月","source":"https://www.nippon.com/ja/news/q202404/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287199-kisa3","category":"経済","title":"ホンダと日産自動車が経営統合協議を正式発表—世界3位の自動車グループ誕生なるか","summary":"ホンダと日産自動車は2024年12月18日、経営統合に向けた協議開始を正式に発表した。EV競争激化と中国市場の苦戦が背景にあり、三菱自動車も合流する見通しだった。翌年2月に破談となった。","date":"2024年12月","source":"https://www.nippon.com/ja/news/q202412/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287199-n8xsw","category":"経済","title":"新NISAが制度スタート—投資枠1800万円・非課税期間無期限で個人投資家が急増","summary":"2024年1月から「新NISA」制度がスタートした。年間投資枠が最大360万円、総枠1800万円、非課税期間が無期限となり、証券口座の開設が急増。若い世代を中心に「貯蓄から投資へ」の動きが加速した。","date":"2024年1月","source":"https://www.fsa.go.jp/policy/nisa2/know/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287199-hau7o","category":"スポーツ","title":"パリ五輪、日本がメダル45個・海外開催で過去最多—金メダルラッシュで列島沸く","summary":"2024年7〜8月開催のパリ五輪で日本は金20・銀12・銅13の計45個のメダルを獲得し、海外開催の五輪として史上最多となった。柔道・体操・レスリングを中心に多くの金メダルが生まれた。","date":"2024年7月","source":"https://www.nippon.com/ja/japan-data/h02088/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287199-urdno","category":"スポーツ","title":"体操男子「初老ジャパン」がパリ五輪で金メダル—平均年齢27歳をネタにした愛称が定着","summary":"パリ五輪体操男子団体で日本が金メダルを獲得。岡慎之助・橋本大輝・谷川翔ら20代後半の選手が中心のため「初老ジャパン」というネタ愛称が広まり、選手たちも笑顔で受け入れた。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287199-ron7a","category":"スポーツ","title":"パリ五輪でブレイキン（ブレイキングダンス）が五輪種目として初採用","summary":"パリ五輪からブレイキン（ブレイキングダンス）が正式競技として採用された。日本からはAmi・半井重幸らが出場。新しいスポーツカルチャーが五輪に組み込まれたことで議論も呼んだ。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287200-61u6n","category":"スポーツ","title":"阿部詩がパリ五輪柔道で敗れ号泣—兄・一二三が慰める場面が世界中で話題に","summary":"パリ五輪柔道52kg級の阿部詩が2回戦で敗退し畳の上で号泣。金メダルを決めた直後の兄・阿部一二三が妹を抱きしめて慰める姿が世界中のメディアに取り上げられた。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287200-51z3r","category":"スポーツ","title":"大谷翔平、MLB史上初の「50本塁打50盗塁（50-50）」を達成—9月19日に2つ同時達成","summary":"2024年9月19日、大谷翔平が1試合で本塁打と盗塁を量産してMLB史上初の「50-50」を達成した。この日は51本塁打・51盗塁まで伸ばし「51-51」の快挙。シーズン最終的に54本塁打・59盗塁となった。","date":"2024年9月","source":"https://www.nikkei.com/article/DGXZQODH124R40S4A910C2000000/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287200-zl4r2","category":"スポーツ","title":"DeNAベイスターズが26年ぶりに日本一—CSから下克上で頂点に","summary":"2024年の日本シリーズでDeNAベイスターズが4勝2敗でソフトバンクホークスを下し、1998年以来26年ぶりの日本一に輝いた（11月3日）。CSでシーズン3位から勝ち上がった「下克上」の達成に球界全体が驚いた。","date":"2024年11月","source":"https://www.nippon.com/ja/news/q202411/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287200-uocmv","category":"国際","title":"JAXA「SLIM」が月面着陸成功—日本初・世界5カ国目の快挙","summary":"2024年1月20日、JAXAの月面探査機「SLIM（スリム）」が月面への軟着陸に成功した。日本は宇宙大国の米ロ中印に次ぐ世界5番目の月面着陸成功国となった。目標着陸地点から100m以内という高精度が称賛された。","date":"2024年1月","source":"https://global.jaxa.jp/press/2024/01/20240120-1_e.html","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287200-4bdhk","category":"国際","title":"トランプが米大統領選に勝利—ハリスに完勝、再び「MAGA」が世界を揺らす","summary":"2024年11月の米大統領選で共和党のドナルド・トランプが民主党のカマラ・ハリスを大差で破り勝利した。トランプの返り咲きは「世界秩序の変容」と受け取られ、日本を含む同盟国が対応を急いだ。","date":"2024年11月","source":"https://www.nippon.com/ja/news/q202411/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287200-8bf6v","category":"国際","title":"スウェーデンがNATOに加盟—200年以上続いた軍事的中立政策を転換","summary":"スウェーデンは2024年3月、NATOに正式加盟した。1814年以来200年以上維持してきた軍事的中立政策を、ロシアのウクライナ侵攻を機に転換した。","date":"2024年3月","source":"https://www.nippon.com/ja/news/q202403/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287200-aq9ui","category":"国際","title":"台湾・頼清徳（ライ・チンドー）が総統に就任—中国との緊張が高まる","summary":"2024年5月、台湾独立志向が強いとされる民主進歩党（民進党）の頼清徳が総統に就任した。中国はこれを強く非難し、台湾周辺での軍事演習を実施。台湾海峡の緊張が高まった。","date":"2024年5月","source":"https://www.nippon.com/ja/news/q202405/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287200-t5k13","category":"国際","title":"日本被団協（原水爆被害者団体協議会）がノーベル平和賞を受賞—70年近くの核廃絶活動が評価","summary":"2024年のノーベル平和賞に日本被団協が選ばれた。1956年の設立以来、核兵器の廃絶を訴えてきた被爆者たちの約70年にわたる活動が国際的に認められた。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287200-mls9c","category":"芸能・エンタメ・ゴシップ","title":"「葬送のフリーレン」アニメが各世代に刺さり社会現象—「1000年後も残念なエルフ」ミーム大量発生","summary":"2023年秋から放送が始まったアニメ「葬送のフリーレン」が2024年初頭まで続き社会現象に。哲学的な世界観と主人公フリーレンの不思議な魅力が刺さり、多くのミームやパロディが生まれた。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287201-n969v","category":"芸能・エンタメ・ゴシップ","title":"NHK大河ドラマ「光る君へ」—吉高由里子が紫式部を演じ平安時代ブームに","summary":"2024年のNHK大河ドラマ「光る君へ」は吉高由里子主演で紫式部の生涯を描いた。「源氏物語」の世界観と平安時代への関心が高まり、関連書籍やゲームも売れた。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287201-6yi2t","category":"芸能・エンタメ・ゴシップ","title":"鬼滅の刃「柱稽古編」アニメが放送開始—大人気シリーズが佳境に","summary":"2024年4月から鬼滅の刃の「柱稽古編」アニメが放送を開始した。累計1億部を超える大人気漫画のアニメ化として多くの視聴者を獲得し、関連グッズも高い売り上げを記録した。","date":"2024年4月","source":"https://www.nippon.com/ja/news/q202404/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287201-vaaes","category":"芸能・エンタメ・ゴシップ","title":"映画「ルックバック」公開—押山清高監督の76分の傑作、SNSで激賞","summary":"押山清高監督による映画「ルックバック」が2024年6月に公開された。2人の少女の創作と友情を描いた76分の作品がSNSで「天才的な映画」と激賞され、公開直後から話題となった。","date":"2024年6月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287201-ce5k3","category":"芸能・エンタメ・ゴシップ","title":"藤井聡太が叡王戦で伊藤匠に敗れ初失冠—八冠から七冠に後退","summary":"2024年6月、将棋の藤井聡太竜王名人が叡王戦で伊藤匠七段に4連敗し、史上初の八冠を失冠した。初めてタイトル戦で敗退したことは将棋界のみならずスポーツニュースとしても大きく報道された。","date":"2024年6月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287201-2rd3c","category":"芸能・エンタメ・ゴシップ","title":"映画「侍タイムスリッパー」が口コミで大ヒット—自主制作映画が全国100館超に拡大する快挙","summary":"安田淳一監督が自己資金で制作した映画「侍タイムスリッパー」が口コミで話題となり、2024年8月17日の初日は池袋シネマ・ロサの1館のみの上映だったものが全国100館超に拡大する異例のヒットを記録した。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287201-k80iw","category":"芸能・エンタメ・ゴシップ","title":"漫画「呪術廻戦」が完結—累計1億部超の人気作、ファンの間で賛否が割れる最終回","summary":"週刊少年ジャンプで連載されていた「呪術廻戦」が2024年9月に完結した。累計発行部数1億部を超える人気作の最終回はSNSで賛否が割れ大きな話題となった。","date":"2024年9月","source":"https://www.nippon.com/ja/news/q202409/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287202-g1tst","category":"芸能・エンタメ・ゴシップ","title":"「ダンダダン」アニメが大ヒット—CreepyNutsの主題歌「Bling-Bang-Bang-Born」とのW旋風","summary":"2024年10月から放送開始のアニメ「ダンダダン」が大ヒット。主題歌のCreepy Nuts「Bling-Bang-Bang-Born」が既に世界的に有名になっており、相乗効果で国内外で大きな話題となった。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287202-9blii","category":"芸能・エンタメ・ゴシップ","title":"ラファエル・ナダルがテニス引退を発表—「クレーの王者」が20年超のキャリアに幕","summary":"スペインのテニス選手ラファエル・ナダルが2024年10月、現役引退を発表した。グランドスラム22勝、特に全仏オープン14勝を誇る「クレーの王者」が20年超のキャリアに幕を閉じた。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287202-nlx1v","category":"芸能・エンタメ・ゴシップ","title":"KAT-TUN・中丸雄一の不倫疑惑が報道—グループの存続問題に発展","summary":"KAT-TUNの中丸雄一が既婚者でありながら女性との不倫関係があったとして報道された。その後グループの活動休止が発表され、ファンに衝撃が走った。","date":"2024年11月","source":"https://www.nippon.com/ja/news/q202411/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287202-156is","category":"芸能・エンタメ・ゴシップ","title":"玉木雄一郎・国民民主党代表の不倫スキャンダル発覚—「103万円の壁」で国民的人気絶頂の矢先","summary":"衆院選で大躍進し「103万円の壁」撤廃を主張して一躍注目された国民民主党代表・玉木雄一郎の不倫スキャンダルが2024年11月に発覚。絶頂期での不倫発覚に「なぜこのタイミングで」と批判が殺到した。","date":"2024年11月","source":"https://www.nippon.com/ja/news/q202411/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780576287203-lzd57","category":"芸能・エンタメ・ゴシップ","title":"大谷翔平夫人・田中真美子の第1子妊娠を発表—2024年を締めくくる祝福ニュース","summary":"大谷翔平夫人の田中真美子が2024年12月、第1子を妊娠したことを公式Instagramで発表した。大谷翔平の50-50達成・WS優勝に続き、年末に届いた明るいニュースに日本中が沸いた。","date":"2024年12月","source":"https://www.nippon.com/ja/news/q202412/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287203-v6iiv","category":"政治","title":"国民民主党が衆院選で約4倍に躍進—「103万円の壁」撤廃主張が若者に刺さる","summary":"2024年の衆院選で国民民主党は28議席から約4倍の議席を獲得し大躍進した。「103万円の壁を178万円に引き上げ」という所得税非課税の政策が若い労働者の支持を集めた。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287203-w0e70","category":"政治","title":"旧優生保護法の強制不妊手術—最高裁が「違憲」と判断し国に賠償を命令","summary":"2024年7月3日、最高裁大法廷は旧優生保護法のもとで行われた強制不妊手術が憲法に違反すると判断し、国に賠償を命じた。除斥期間（20年）の経過を問わず訴えを認める画期的な判決となった。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287203-laest","category":"政治","title":"バイデン大統領が再選断念を表明→カマラ・ハリスが民主党候補に","summary":"2024年7月21日、バイデン米大統領が大統領選からの撤退を表明し、副大統領のカマラ・ハリスを後継候補として支持した。高齢による職務遂行能力への懸念が引退の主な要因とされた。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780576287203-47qu4","category":"政治","title":"北朝鮮がロシアに兵士1万人以上を派遣—ウクライナ戦争に「第三の国」が参戦","summary":"2024年10月、北朝鮮がウクライナと交戦中のロシアに1万人以上の兵士を派遣したことが明らかになった。NATO同盟国が強く非難し、北朝鮮の軍事的存在感が国際社会に改めて警戒された。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202510/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287204-cgaxm","category":"経済","title":"日経平均株価がバブル期を超え史上初の4万円台突入—34年ぶりの新記録","summary":"2024年3月4日、日経平均株価が史上初めて4万円の大台を突破した。1989年のバブル期最高値（3万8957円）を約34年ぶりに超え、企業業績の改善や外国人投資家の流入が背景にあった。","date":"2024年3月","source":"https://www.nippon.com/ja/news/q202403/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287204-uwm22","category":"経済","title":"セブン＆アイ・ホールディングスにカナダ大手から7兆円規模の買収提案—経営陣が拒否","summary":"2024年8月、カナダのコンビニ大手アリマンタシォン・クシュタールがセブン＆アイ・ホールディングスに対し約7兆円規模の買収提案を行った。セブン&アイは「企業価値に見合わない」として拒否した。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1780576287204-261pl","category":"テクノロジー","title":"OpenAI「Sora」発表—テキストから最大60秒の映像を自動生成するAIが世界を驚かせる","summary":"OpenAIが2024年2月、テキストの指示から最大60秒の動画を生成する「Sora」を発表した。映画のような映像を数秒で生成できる精度に世界が驚き、映像制作業界に激震が走った。","date":"2024年2月","source":"https://www.nippon.com/ja/news/q202402/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1780576287204-c4lbh","category":"テクノロジー","title":"ChatGPT-4oが発表—音声でリアルタイムに感情を込めて会話するAIが衝撃を与える","summary":"OpenAIが2024年5月に発表したChatGPT-4oは、テキスト・音声・画像をリアルタイムで処理できるマルチモーダルAI。特に感情を持つかのような音声会話が大きな反響を呼んだ。","date":"2024年5月","source":"https://www.nippon.com/ja/news/q202405/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1780576287204-98fxc","category":"テクノロジー","title":"Apple Vision Proが日本でも発売—59万8000円の「空間コンピュータ」に賛否","summary":"AppleのXRデバイス「Vision Pro」が2024年6月28日に日本でも発売された。価格は59万8000円からと高額で、画期的な「空間コンピュータ」としての可能性と実用性への疑問が議論された。","date":"2024年6月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287204-t9y2j","category":"経済","title":"日本のGDPがドイツに抜かれ世界4位に転落—円安でドル換算が低下","summary":"2024年2月に公表された統計で、2023年の日本の名目GDPがドイツを下回り世界3位から4位に転落したことが判明した。円安による円建てGDPのドル換算減少が主因とされた。","date":"2024年2月","source":"https://www.nippon.com/ja/news/q202402/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780576287204-g9dt8","category":"経済","title":"イトーヨーカドー・ダイエーなど老舗スーパーが相次いで閉店—「商店街・地域スーパー」が消える","summary":"イトーヨーカドーがグループのスーパーを大量閉店する方針を発表するなど、2024年は老舗スーパーの閉店ラッシュが相次いだ。地域の買い物の場が消えていく「買い物難民」問題が深刻化した。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"中","snippet":"","notes":""},{"id":"テクノロジー-1780576287205-ha6am","category":"テクノロジー","title":"「生成AI」が企業・学校に本格普及—文科省がガイドラインを整備、職場のAI利用が当たり前に","summary":"2024年、生成AIの業務活用が本格化した。文部科学省が学校でのAI利用ガイドラインを整備し、多くの企業でもChatGPT等の業務活用ルールが整備された。「AIに仕事を奪われる」議論が再燃した。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"中","snippet":"","notes":""},{"id":"社会-1780576287205-hggcb","category":"社会","title":"「令和の米騒動」—南海トラフ地震臨時情報の買い占めと猛暑の不作でコメがスーパーから消える","summary":"2024年8月、南海トラフ地震臨時情報による買い占めと猛暑による不作が重なり、スーパーからコメが消える「令和の米騒動」が発生した。5kgの米が2000〜3000円台に高騰した。","date":"2024年8月","source":"https://news.yahoo.co.jp/expert/articles/0f01a99a0faf2e912f8d33c6e2969703e2a7699e","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287205-4pthg","category":"社会","title":"南海トラフ地震臨時情報が初めて発令—日向灘地震受け「備えを強化」呼びかけ、防災グッズが品切れに","summary":"2024年8月8日の日向灘地震（M7.1）を受けて初めて「南海トラフ地震臨時情報（巨大地震注意）」が発令された。帰省シーズンの「備えを強化」呼びかけで防災用品が品切れになった。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287205-1mu0v","category":"社会","title":"渋谷ハロウィン規制強化—路上飲酒禁止・仮装禁止で閑散、「ハロウィン終了説」が広がる","summary":"2024年10月のハロウィン、渋谷区が路上飲酒禁止や特定エリアへの立ち入り制限を強化した結果、かつての大混雑が嘘のように閑散とした。SNSでは「渋谷ハロウィン終了」という声が上がった。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287205-1z80q","category":"社会","title":"訪日外国人が年間最多を更新—富士山・京都などでオーバーツーリズム問題が深刻化","summary":"2024年の訪日外国人数が年間最多を更新した。富士山の撮影スポットへの目隠し設置や、鎌倉・京都での入場制限など、オーバーツーリズムへの対策が各地で相次いだ。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202412/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287206-vc1wv","category":"社会","title":"外国人技能実習制度が廃止決定—「育成就労制度」へ移行し実習生の権利保護を強化","summary":"2024年、長年「現代の奴隷制度」と批判されてきた外国人技能実習制度が廃止され、新たな「育成就労制度」へ移行することが決まった。実習生の転籍（転職）の自由が一部認められた。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780576287206-fjs6z","category":"社会","title":"「推し活」が一大経済圏に—コンサート・グッズ・ぬい活に若者が惜しまず出費、新語にも","summary":"好きなアイドルや二次元キャラクターを応援する「推し活」が2024年に一大経済圏を形成した。ライブチケット・グッズ・遠征費など「推しへの投資」を惜しまない若者の消費行動が話題となった。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"中","snippet":"","notes":""},{"id":"社会-1780576287206-npw26","category":"社会","title":"「タテ型動画（縦型）」が主流化—TikTok・リールがテレビCMの尺を変え、広告業界も縦対応","summary":"スマートフォンを縦にして見る「タテ型動画」が2024年に広告・コンテンツの主流フォーマットになった。テレビCMよりも縦型ショート動画の方が若者への到達率が高くなったとする調査結果も相次いだ。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"中","snippet":"","notes":""},{"id":"社会-1780576287206-ugu4a","category":"社会","title":"「トクリュウ（匿名・流動型犯罪グループ）」が流行語大賞にノミネート—闇バイト強盗の背後組織","summary":"特定の組織に所属せず犯罪ごとにSNSで集結する「トクリュウ（匿名・流動型犯罪グループ）」という概念が2024年に警察が公式に定義し使い始めた。流行語大賞のノミネート語にもなった。","date":"2024年9月","source":"https://www.nippon.com/ja/news/q202410/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287206-wuo4v","category":"スポーツ","title":"パリ五輪 開会式がセーヌ川で史上初の川上開催—エッフェル塔を背景にした幻想的な演出","summary":"2024年パリ五輪の開会式は五輪史上初めてスタジアムではなくセーヌ川上で行われた。各国選手が船に乗って入場し、パリの街並みを舞台にした演出が世界中で絶賛された一方、演出内容に批判もあった。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287206-0si0w","category":"スポーツ","title":"パリ五輪 スポーツクライミング・森秋彩が金メダル—壁面をつかむ「人間離れ」した身体能力で頂点","summary":"2024年パリ五輪スポーツクライミング・複合種目で日本の森秋彩が金メダルを獲得した。難コースを次々と攻略する圧倒的な強さを見せ、五輪2大会連続のメダル獲得を達成した。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287206-0v7e7","category":"スポーツ","title":"パリ五輪 柔道・角田夏実が金メダル—「腕ひしぎ十字固め」の切れ味が世界トップに","summary":"2024年パリ五輪柔道60kg以下級で角田夏実が金メダルを獲得した。得意技の「腕ひしぎ十字固め」を次々と決める圧倒的な強さで頂点に立った。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287209-bvvji","category":"スポーツ","title":"パリ五輪 レスリング・藤波朱理が金メダル—全試合圧勝の無敗神話を継続","summary":"2024年パリ五輪レスリング女子62kg級で藤波朱理が金メダルを獲得した。国際大会での無敗記録を継続し、圧倒的な強さで頂点に立った。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780576287209-kvz5c","category":"スポーツ","title":"大谷翔平、ドジャースのワールドシリーズ優勝に貢献—フリーマンがシリーズMVP、大谷もポストシーズンで活躍","summary":"2024年10〜11月、ロサンゼルス・ドジャースがワールドシリーズを制覇した。シリーズMVPはフレディ・フリーマン。大谷翔平はポストシーズン全体を通じて打席・走塁ともに高い貢献を見せ、山本由伸もローテーションを守った。","date":"2024年10月","source":"https://www.nippon.com/ja/news/q202411/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287209-2d68g","category":"国際","title":"フランス議会選で左翼連合が第一勢力に—欧州各国で極右vs左翼の対立が激化","summary":"2024年7月のフランス議会選挙で極右の国民連合（RN）が第一党になることを阻止するための「共和国戦線」が機能し左翼連合が最多議席を獲得した。欧州各地で極右台頭と反極右の対立が深まった。","date":"2024年7月","source":"https://www.nippon.com/ja/news/q202407/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287209-wje9c","category":"国際","title":"中国の不動産大手・恒大集団が香港裁判所で強制清算命令—中国経済への打撃が深刻","summary":"2024年1月、経営危機に陥っていた中国不動産大手・中国恒大集団（Evergrande）が香港の裁判所から強制清算命令を受けた。中国の不動産バブル崩壊が世界経済へ与える影響への警戒が高まった。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780576287209-x704l","category":"国際","title":"ICCがイスラエルのネタニヤフ首相に逮捕 所属事務所がそれぞれコメントを出し、ファンに驚きと祝福の声が広がった。","date":"2024年6月","source":"https://mdpr.jp/news/4442762","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780586978703-jwimf","category":"芸能・エンタメ・ゴシップ","title":"岡田将生×高畑充希が電撃結婚発表—ドラマ「1122 いいふうふ」共演カップル","summary":"俳優の岡田将生と高畑充希が2024年11月19日に結婚を発表した。共演ドラマ「1122 いいふうふ」のタイトル通りに結婚したと話題になり、結婚ラッシュの2024年を締めくくる1件となった。","date":"2024年11月","source":"https://mezamashi.media/articles/-/1294","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780586978703-t1pqp","category":"芸能・エンタメ・ゴシップ","title":"フランスを代表する俳優アラン・ドロンが88歳で死去—「太陽がいっぱい」で世界を魅了した大スター","summary":"フランスが誇る世界的名優アラン・ドロンが2024年8月18日に88歳で死去した。1960年の映画「太陽がいっぱい」で世界的スターとなり、日本でも長く愛された。","date":"2024年8月","source":"https://www.nippon.com/ja/news/q202408/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780586978703-1ppqo","category":"政治","title":"自民党裏金問題で池田佳隆衆議院議員を逮捕—現職国会議員の逮捕は異例の衝撃","summary":"東京地検特捜部は2024年1月7日、自民党安倍派の裏金問題に絡み政治資金収支報告書の虚偽記載の疑いで池田佳隆衆議院議員を逮捕した。現職国会議員の逮捕は政界に衝撃を与えた。","date":"2024年1月","source":"https://www.nippon.com/ja/news/q202401/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780586978703-jyw4a","category":"政治","title":"愛子内親王が学習院大学を卒業—20歳のお茶の水女子大学大学院進学が話題に","summary":"天皇皇后両陛下の長女・愛子内親王が2024年3月20日に学習院大学を卒業した。卒業後はお茶の水女子大学大学院への進学が注目された。","date":"2024年3月","source":"https://www.nippon.com/ja/news/q202403/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780586978703-7yxs6","category":"社会","title":"所得税・住民税の定額減税が開始—1人あたり4万円、効果と経済への影響に議論","summary":"岸田政権が掲げた「定額減税」として、2024年6月から所得税3万円・住民税1万円の合計4万円が1人あたり減税される制度が始まった。給付との不公平感や手続きの複雑さに批判もあった。","date":"2024年6月","source":"https://www.nippon.com/ja/news/q202406/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780586978703-tafx6","category":"社会","title":"崇仁親王妃百合子さまが老衰で薨去（享年101歳）—戦前の皇族を知る最後の世代","summary":"三笠宮崇仁親王の妃・百合子さまが2024年11月15日に老衰のため薨去された。101歳という長寿で、戦前・戦中を知る皇族の最後の世代として多くの国民に惜しまれた。","date":"2024年11月","source":"https://www.nippon.com/ja/news/q202411/","confidence":"高","snippet":"","notes":""},{"id":"国際-1 255870/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078244-fnrdx","category":"芸能・エンタメ・ゴシップ","title":"広末涼子×「sio」鳥羽周作シェフのW不倫が週刊文春で報道—映画公開中止・無期限謹慎","summary":"女優の広末涼子と有名レストラン「sio」シェフ・鳥羽周作のダブル不倫が週刊文春（6月8日号）で報道された。広末の映画公開が中止となり無期限謹慎となった。","date":"2023年6月","source":"https://bunshun.jp/articles/-/68111","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078245-pq2mj","category":"芸能・エンタメ・ゴシップ","title":"4代目市川猿之助、両親が死亡する一家心中未遂→6月27日に逮捕—判決は懲役3年執行猶予5年","summary":"2023年5月18日、4代目市川猿之助と両親が自宅で倒れているのが発見され、父母が死亡した。猿之助本人は6月27日に自殺ほう助容疑で逮捕された。11月に懲役3年・執行猶予5年の判決が下された。","date":"2023年5月","source":"https://www.ktv.jp/news/feature/230627-suicide/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078247-1xh0w","category":"芸能・エンタメ・ゴシップ","title":"ガーシー（東谷義和）が帰国・逮捕—タレント脅迫などの罪で有罪判決","summary":"暴露系YouTuberで参議院議員だったガーシー（東谷義和）が2023年6月にドバイから帰国し逮捕された。俳優・綾野剛らへの脅迫などで暴力行為法違反等の罪に問われ有罪判決となった。","date":"2023年6月","source":"https://www.nippon.com/ja/news/q202306/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078247-s1xax","category":"芸能・エンタメ・ゴシップ","title":"ryuchell（りゅうちぇる）が死去（享年27歳）—自死と報じられ芸能界に衝撃","summary":"タレント・モデルのryuchell（りゅうちぇる）が2023年7月12日に享年27歳で死去した。「pecoとの離婚」や性自認についての発信が注目されていた矢先の訃報で、業界に大きな衝撃が走った。","date":"2023年7月","source":"https://www.nikkei.com/article/DGXZQOUF12B5U0S3A710C2000000/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078247-lfyng","category":"芸能・エンタメ・ゴシップ","title":"TBSドラマ「VIVANT」（堺雅人・阿部寛主演）が視聴率・話題ともに独走—「VIVANT旋風」","summary":"TBSの日曜劇場「VIVANT」が2023年7〜9月に放送され、モンゴルロケを敢行した壮大なスパイアクションと豪華キャストで大ヒット。視聴率・SNS話題ともに独走し「VIVANT旋風」と呼ばれた。","date":"2023年7月","source":"https://www.nippon.com/ja/news/q202307/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078247-ss8r0","category":"芸能・エンタメ・ゴシップ","title":"宝塚歌劇団の劇団員が急死—組織内のパワハラ問題が浮上し11月に報告書公表","summary":"宝塚歌劇団の劇団員が2023年9月に急死した。11月に劇団が調査報告書を公表したが当初はパワハラを否定し批判を浴びた。後に遺族との和解でパワハラを認めた。","date":"2023年9月","source":"https://www.nippon.com/ja/news/q202311/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078247-c8pst","category":"芸能・エンタメ・ゴシップ","title":"谷村新司が死去（享年74歳）—「昴」「チャンピオン」など数々のヒット曲を残した","summary":"歌手・谷村新司が2023年10月8日に享年74歳で死去した。アリスのメンバーとして「チャンピオン」「恋愛遊戯」などを大ヒットさせ、ソロでも「昴」「天の河」などを残した。","date":"2023年10月","source":"https://www.oricon.co.jp/news/2298788/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078248-rgo7n","category":"芸能・エンタメ・ゴシップ","title":"坂本龍一が死去（享年71歳）—「戦場のメリークリスマス」「ラストエンペラー」で世界的な評価","summary":"音楽家の坂本龍一が2023年3月28日に享年71歳で直腸がんのため死去した。YMOメンバーとして活躍し、映画「ラストエンペラー」や「戦場のメリークリスマス」などの世界的名作に携わった。","date":"2023年3月","source":"https://www.tokyo-np.co.jp/article/241712","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078248-1nh2u","category":"芸能・エンタメ・ゴシップ","title":"池田大作・創価学会名誉会長が死去（享年95歳）","summary":"創価学会第3代会長・名誉会長の池田大作が2023年11月15日、享年95歳で老衰のため死去した。公明党の生みの親として日本の政治にも多大な影響を与えた。","date":"2023年11月","source":"https://www.sokagakkai.jp/news/2528823.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078248-zs1he","category":"芸能・エンタメ・ゴシップ","title":"八代亜紀が死去（享年73歳）—「雨の慕情」「舟唄」の演歌界の大御所","summary":"演歌歌手の八代亜紀が2023年12月30日に享年73歳で死去した。「雨の慕情」「舟唄」など数々のヒット曲を持つ演歌界の大御所の突然の訃報に多くのファンが悼んだ。","date":"2023年12月","source":"https://www.nippon.com/ja/news/q202312/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078248-2l0y5","category":"芸能・エンタメ・ゴシップ","title":"松本零士が死去（享年85歳）—「銀河鉄道999」「宇宙戦艦ヤマト」の作者","summary":"漫画家の松本零士が2023年2月13日に享年85歳で急性心不全のため死去した。「銀河鉄道999」「宇宙戦艦ヤマト」「キャプテンハーロック」など日本のSFアニメを牽引した作家だった。","date":"2023年2月","source":"https://www.nikkei.com/article/DGKKZO68634090Q3A220C2CT0000/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780591078248-jtbik","category":"芸能・エンタメ・ゴシップ","title":"映画「怪物」が是枝裕和監督・脚本賞、役所広司が「PERFECT DAYS」で男優賞—カンヌ映画祭でW受賞","summary":"カンヌ国際映画祭で日本映画が二冠を達成。是枝裕和監督「怪物」（脚本：坂元裕二）が脚本賞を受賞。役所広司がヴィム・ヴェンダース監督の「PERFECT DAYS」でカンヌ男優賞を受賞した。","date":"2023年5月","source":"https://www.nippon.com/ja/news/q202305/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780591078249-l41z0","category":"政治","title":"自民党・安倍派の「裏金問題」発覚—パーティー収入キックバックの不記載が発覚、東京地検特捜部が捜査","summary":"自民党の安倍派（清和政策研究会）を中心に、政治資金パーティー収入をキックバックして政治資金収支報告書に記載しない「裏金」問題が発覚した。11月に特捜部が家宅捜索し、複数の議員が捜査を受けた。","date":"2023年10月","source":"https://www.nippon.com/ja/news/q202311/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780591078249-nx8km","category":"政治","title":"岸田首相が和歌山遊説中に爆発物を投げつけられる—24歳男を現行犯逮捕","summary":"岸田文雄首相が2023年4月15日に和歌山市の漁港で遊説中、男が筒型の爆発物を投げつけた。爆発物は離れた場所で爆発し、岸田首相は無事だった。24歳の男が現行犯逮捕された。","date":"2023年4月","source":"https://www.nippon.com/ja/news/q202304/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780591078249-btwlu","category":"政治","title":"旧統一教会（世界平和統一家庭連合）に解散命令請求—被害額204億円超","summary":"文化庁は2023年10月13日、旧統一教会に対する解散命令を東京地裁に請求した。違法な勧誘活動による被害者は約1550人、被害額は約204億円に上るとされた。","date":"2023年10月","source":"https://www.nikkei.com/article/DGXZQOUE12C6Y0S3A011C2000000/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780591078249-wyx1d","category":"政治","title":"神田憲次副財務相が税金滞納問題で辞任","summary":"神田憲次副財務相が自身の不動産への税金滞納問題が発覚し、2023年11月に辞任した。財務を所管する副財務相が税金を滞納していたという矛盾が批判を浴びた。","date":"2023年11月","source":"https://www.nippon.com/ja/news/q202311/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780591078249-n7w19","category":"社会","title":"スシロー「醤油ペロペロ」迷惑動画がSNSで拡散—株価急落し時価総額168億円消失、6700万円損害賠償請求","summary":"「スシロー」岐阜正木店で2023年1月3日、少年が醤油差しの注ぎ口をなめる等の迷惑行為を行い、1月29日にSNSで炎上した。スシロー親会社の株価が急落し時価総額が168億円消失。少年に6700万円の損害賠償を請求した。","date":"2023年1月","source":"https://www.inshokuten.com/foodist/article/7005/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780591078250-1v3u5","category":"社会","title":"新型コロナウイルスが「5類」に移行—マスク着用・行動制限がほぼ終わり日常が戻る","summary":"2023年5月8日、新型コロナウイルス感染症が感染症法上の「5類相当」に移行し、マスク着用の義務化や行動制限が事実上なくなった。飲食・旅行・イベントが一斉に再開され「コロナ禍の終わり」が実感された。","date":"2023年5月","source":"https://www.nippon.com/ja/news/q202305/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780591078250-ftdyn","category":"社会","title":"袴田巌さんの再審開始が東京高裁で決定—1966年の事件から57年、ついに再審へ","summary":"1966年の一家4人殺害事件で死刑が確定していた袴田巌さんの第二次再審請求で、東京高等裁判所は2023年3月13日に再審開始を認める決定をした。翌2024年9月に無罪判決が確定した。","date":"2023年3月","source":"https://www.nippon.com/ja/news/q202303/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780591078250-ub6oj","category":"社会","title":"インボイス制度が開始—フリーランス・個人事業主に税負担増の懸念、大規模な反対運動が起きる","summary":"消費税のインボイス（適格請求書）制度が2023年10月1日から開始された。免税事業者のフリーランスや個人事業主に実質的な税負担が生じるとして、制度開始前から大規模な反対運動が展開された。","date":"2023年10月","source":"https://www.gov-online.go.jp/article/202210/entry-10343.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780591078255-lkmwv","category":"スポーツ","title":"WBC、日本代表が14年ぶりに世界一—大谷翔平の「憧れるのをやめましょう」が名言に","summary":"第5回ワールド・ベースボール・クラシック（WBC）で侍ジャパンが2023年3月21日（現地時間）、決勝で米国を3-2で下し14年ぶり3回目の世界一に輝いた。大谷翔平の決勝前の「憧れるのをやめましょう」発言が名言として残った。","date":"2023年3月","source":"https://www.nippon.com/ja/japan-topics/today03210/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780591078255-azz1t","category":"スポーツ","title":"藤井聡太が最年少（20歳10カ月）で名人位を獲得し七冠達成","summary":"将棋の藤井聡太が2023年6月1日、名人戦七番勝負で渡辺明名人に勝利し名人位を獲得した。20歳10カ月での最年少名人は40年ぶりの記録更新。同時に七冠を達成した。","date":"2023年6月","source":"https://www.shogi.or.jp/news/2023/06/post_2301.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780591078255-b9jrb","category":"スポーツ","title":"藤井聡太が王座戦でも制し史上初の八冠独占達成","summary":"将棋の藤井聡太が2023年10月11日、王座戦五番勝負第4局で永瀬拓矢王座を破り王座を獲得。史上初の八大タイトル独占（八冠）という前人未到の快挙を達成した。","date":"2023年10月","source":"https://www.shogi.or.jp/news/2023/10/post_2364.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780591078255-xu01d","category":"スポーツ","title":"阪神タイガースが38年ぶりに日本一—「アレ（A.R.E.）」が流行語大賞を受賞","summary":"阪神タイガースが2023年11月5日のSMBC日本シリーズ第6戦でオリックス・バファローズを下し、1985年以来38年ぶりの日本一に輝いた。岡田彰布監督の「アレ（A.R.E.）」スローガンが流行語大賞の年間大賞を受賞した。","date":"2023年11月","source":"https://series.hanshintigers.jp/2023/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780591078256-ciau7","category":"スポーツ","title":"大谷翔平がア・リーグMVPを2年ぶり2度目・満票で受賞—満票2回はMLB史上初","summary":"大谷翔平が2023年MLBア・ },{"id":"芸能・エンタメ・ゴシップ-1780844358233-pb4ac","category":"芸能・エンタメ・ゴシップ","title":"チュートリアル・徳井義実の約1億2000万円の申告漏れが発覚→活動自粛","summary":"2019年10月、チュートリアルの徳井義実が東京国税局から3年分の所得約1億2000万円の申告漏れを指摘されていたことが発覚。吉本興業は活動自粛を発表し、レギュラー番組を降板した。","date":"2019年10月","source":"https://www.dailyshincho.jp/article/2019/10251103/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780844358234-lgjra","category":"芸能・エンタメ・ゴシップ","title":"「鬼滅の刃」アニメ放映後にコミックスが空前の大増刷→社会現象の前兆","summary":"2019年4月〜9月のアニメ放映後に「鬼滅の刃」（吾峠呼世晴）のコミックスが異例の大増刷。発行部数が急上昇し、2020年の映画・完結へと続く社会現象の起点となった。","date":"2019年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780844358235-mp9l8","category":"芸能・エンタメ・ゴシップ","title":"嵐の二宮和也が一般女性との結婚を電撃発表","summary":"2019年11月、嵐の二宮和也が一般女性との入籍を電撃発表。グループの活動休止（2020年末）を目前に控えての発表はファンに衝撃を与えた。","date":"2019年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780844358236-yswas","category":"芸能・エンタメ・ゴシップ","title":"元KARAのハラが28歳で死去→K-POPファンへの衝撃","summary":"元人気K-POPグループKARAのメンバー、ク・ハラが2019年11月24日にソウルの自宅で死亡しているのが発見された。28歳。リベンジポルノ被害問題を抱えていたことも明らかになった。","date":"2019年11月","source":"https://bunshun.jp/articles/-/16412","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780844358237-fsn2x","category":"芸能・エンタメ・ゴシップ","title":"M-1グランプリ2019でミルクボーイが史上最高得点で優勝","summary":"2019年12月22日開催のM-1グランプリ2019で、ミルクボーイが第1ラウンドで「コーンフレーク」ネタにより史上最高得点681点を獲得して優勝。松本人志が絶賛したことでも話題を呼んだ。","date":"2019年12月","source":"https://www.oricon.co.jp/news/2151598/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780844358238-hbhkq","category":"芸能・エンタメ・ゴシップ","title":"中村哲医師がアフガニスタンで銃撃されて死去（73歳）","summary":"2019年12月4日、アフガニスタンで30年以上にわたり医療・農業支援活動を続けてきたペシャワール会代表の中村哲医師（73歳）が、移動中の車に武装集団が銃撃し死去。日本中が悼んだ。","date":"2019年12月","source":"https://www.nikkei.com/article/DGXMZO52949440U9A201C1MM8000/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1780844358239-1jdk0","category":"テクノロジー","title":"はやぶさ2が小惑星リュウグウへの着陸・サンプル採取に成功","summary":"2019年2月22日、JAXAの小惑星探査機「はやぶさ2」が小惑星リュウグウへの1回目の着陸とサンプル採取に成功。7月には2回目の着陸で地下物質の採取にも成功した。","date":"2019年2月","source":"https://www.astroarts.co.jp/article/hl/a/10476_hayabusa2","confidence":"高","snippet":"","notes":""},{"id":"国際-1780844358240-bdjlb","category":"国際","title":"ノートルダム大聖堂が火災で尖塔が崩落→世界的衝撃","summary":"2019年4月15日、パリのノートルダム大聖堂が火災に見舞われ、19世紀に建てられた尖塔が崩落。フランスを代表する歴史的建造物の炎上は世界中に衝撃を与え、各国から復興支援が集まった。","date":"2019年4月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1780844358241-c6d9s","category":"国際","title":"香港で逃亡犯条例改正案に反対する大規模デモ→100万人超が参加・長期化","summary":"2019年6月、香港で逃亡犯条例改正案に反対する100万人超のデモが勃発。デモは年末まで長期化し、「五大要求」を掲げた市民と警察の衝突が繰り返され、国際的な人権問題として注目された。","date":"2019年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1780850756702-frstd","category":"政治","title":"眞子さまと小室圭さんの婚約関係の儀式を延期発表","summary":"宮内庁が2018年2月6日、秋篠宮家の長女・眞子さまと小室圭さんとのご結婚に関する儀式を2020年まで延期すると発表。小室家の金銭トラブル報道が背景にあるとされ、皇室問題として大きく報じられた。","date":"2018年2月","source":"https://www.nikkei.com/article/DGXMZO26593660W8A200C1I00000/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780850756703-rshi7","category":"政治","title":"働き方改革関連法が成立→残業上限規制を初めて法定化","summary":"2018年6月29日、参院本会議で働き方改革関連法が成立。残業時間の上限を月100時間未満・年720時間とする罰則付き規制が初めて法制化され、1947年の労働基準法制定以来最大の改正とされた。","date":"2018年6月","source":"https://www.nikkei.com/article/DGKKZO60823530W0A620C2EAC000/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780850756704-idvuu","category":"政治","title":"杉田水脈議員「LGBTに生産性ない」寄稿→新潮45が休刊","summary":"2018年7月、自民党の杉田水脈衆院議員が「新潮45」に「LGBTは子供を作らない、つまり生産性がない」と主張する寄稿文を掲載。大炎上を受け、新潮社は同年9月25日に「新潮45」の休刊を発表した。","date":"2018年7月","source":"https://www.nikkei.com/article/DGXMZO35725940V20C18A9000000/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780850756705-sfg3j","category":"政治","title":"片山さつき参院議員に国税局への100万円口利き疑惑","summary":"2018年10月18日号の週刊文春が、片山さつき参院議員の私設秘書が国税局への口利きの見返りに100万円を受け取ったと報道。片山氏は当時内閣府特命担当相に就任したばかりで、国会で追及を受けた。","date":"2018年10月","source":"https://news.livedoor.com/article/detail/15457502/","confidence":"高","snippet":"","notes":""},{"id":"政治-1780850756706-cgple","category":"政治","title":"改正入管法が成立→外国人労働者受け入れを大幅拡大","summary":"2018年12月8日、改正出入国管理法が成立。新たな在留資格「特定技能1号・2号」を創設し、介護・建設・農業など14分野で外国人労働者の受け入れを拡大。野党が強行採決と批判し国会が紛糾した。","date":"2018年12月","source":"https://www.nikkei.com/article/DGKKZO67067610X01C20A2EAC000/","confidence":"高","snippet":"","notes":""},{"id":"経済-1780850756707-g8orj","category":"経済","title":"コインチェックから仮想通貨NEM約580億円が不正流出","summary":"2018年1月26日、仮想通貨交換業者コインチェックから約580億円相当のNEM（ネム）が不正送金された。暗号資産史上最大規模の被害で、セキュリティの甘さが批判された。同社は被害者約26万人に約463億円を返金。","date":"2018年1月","source":"https://www.tsr-net.co.jp/data/detail/1188986_1527.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1780850756708-trsl4","category":"経済","title":"前澤友作ZOZOがSpaceXで月旅行者に決定→「dearMoon」プロジェクト発表","summary":"2018年9月18日、ZOZOTOWNを運営するスタートトゥデイ（当時）の前澤友作CEOが、イーロン・マスク率いるSpaceXの宇宙船「BFR」で月周回旅行を行う民間人初の乗客に決定したと発表。アーティスト招待プロジェクト「#dearMoon」を構想。","date":"2018年9月","source":"https://corp.zozo.com/news/20180918-5666/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780850756709-7mkzm","category":"社会","title":"大阪府北部地震（震度6弱）→通学中の女子小学生も犠牲に6人死亡","summary":"2018年6月18日午前7時58分、大阪府北部を震源とするM6.1の地震が発生。最大震度6弱を観測し、ブロック塀が倒壊して通学中の小学4年生の女児が下敷きになるなど6人が死亡、443人が負傷した。","date":"2018年6月","source":"https://www.nikkei.com/article/DGKKZO60446450X10C20A6EAC000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780850756710-tjrrd","category":"社会","title":"東海道新幹線のぞみ車内で男が刃物を振り回し乗客殺傷→1人死亡2人重傷","summary":"2018年6月9日、走行中の東海道新幹線のぞみ265号の車内で、22歳の男が女性を助けようとした乗客の男性を鉈で切りつけ死亡させた。「無期懲役を狙った」と動機を語り、判決時に万歳三唱する異常な行動も注目を集めた。","date":"2018年6月","source":"https://bunshun.jp/articles/-/48894","confidence":"高","snippet":"","notes":""},{"id":"社会-1780850756711-aifn9","category":"社会","title":"タイの洞窟に閉じ込められた少年サッカーチーム13人が17日後に全員救出","summary":"2018年6月23日、タイ北部の洞窟に入った少年サッカーチーム12人とコーチ1人が豪雨で出口を失い閉じ込められた。世界中が固唾を飲む中、7月10日に13人全員が奇跡的に救出された。","date":"2018年7月","source":"https://www.newsweekjapan.jp/stories/world/2018/07/post-10556.php","confidence":"高","snippet":"","notes":""},{"id":"社会-1780850756712-7pmhb","category":"社会","title":"オウム真理教・麻原彰晃ら13人の死刑を一斉執行→地下鉄サリン事件から23年","summary":"2018年7月6日に麻原彰晃ら7人、同26日に残る6人の死刑が執行され、オウム真理教の死刑囚13人全員の刑が執行された。1995年の地下鉄サリン事件など多くの無差別テロ事件の終章となった。","date":"2018年7月","source":"https://www.nippon.com/ja/currents/d00425/","confidence":"高","snippet":"","notes":""},{"id":"社会-1780850756713-8s97f","category":"社会","title":"猛暑で熊谷市が国内観測史上最高気温41.1℃を記録→熱中症死者多数","summary":"2018年7月23日、埼玉県熊谷市で気温が41.1℃に達し、当時の国内観測史上最高気温を更新。連日40℃超の猛暑が各地を覆い、熱中症による死者が相次ぎ「命に関わる危険な暑さ」と社会に強い警戒を促した。","date":"2018年7月","source":"https://www.nippon.com/ja/japan-topics/today07230/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756714-2gpyd","category":"スポーツ","title":"小平奈緒が平昌五輪スピードスケート500mで金メダル（五輪新記録）","summary":"2018年2月18日、平昌冬季五輪のスピードスケート女子500mで小平奈緒が36秒94の五輪新記録で金メダルを獲得。スピードスケート日本女子初の金メダル。レース後、銀メダルの韓国・李相花選手を抱擁する場面も感動を呼んだ。","date":"2018年2月","source":"https://www.nippon.com/ja/japan-topics/today02180/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756715-x60oa","category":"スポーツ","title":"カーリング女子・LS北見が平昌五輪で銅メダル→「そだねー」「もぐもぐタイム」が流行語に","summary":"2018年平昌冬季五輪のカーリング女子で、北海道・LS北見が銅メダルを獲得。試合中の「そだねー」という北海道弁や、ハーフタイムに軽食を取る「もぐもぐタイム」がSNSで大拡散し、「そだねー」は年末の流行語大賞を受賞した。","date":"2018年2月","source":"https://www.nippon.com/ja/features/c03812/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756716-aextx","category":"スポーツ","title":"大谷翔平がMLBエンゼルスでデビュー→二刀流で活躍し新人王を満票に近い得票で受賞","summary":"2018年3月にMLBデビューした大谷翔平は、投手として4勝・防御率3.31、打者として22本塁打・打率.285を記録。ベーブ・ルース以来とされる「二刀流」を現代野球で体現し、ア・リーグ新人王を獲得した。","date":"2018年3月","source":"https://full-count.jp/2018/11/13/post247401/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756717-cxlsr","category":"スポーツ","title":"レスリング・栄和人強化本部長のパワハラ問題→伊調馨選手代理人が告発・パワハラ認定後に辞任","summary":"2018年1月に伊調馨選手の代理人弁護士が内閣府に告発状を提出。3月に週刊誌が報道し大きな問題に。4月に第三者委員会がパワハラを一部認定し、栄和人強化本部長が辞任。スポーツ界の指導者問題として注目された。","date":"2018年4月","source":"https://news.livedoor.com/article/detail/14397804/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756718-ewi18","category":"スポーツ","title":"ハリルホジッチ監督がW杯直前に電撃解任→西野朗が緊急就任","summary":"2018年4月9日、日本サッカー協会がヴァヒド・ハリルホジッチ監督をW杯2ヶ月前に解任。田嶋会長は「選手との信頼関係の薄れ」を理由に挙げた。後任の西野朗監督は就任わずか2ヶ月で本番に臨んだ。","date":"2018年4月","source":"https://www.afpbb.com/articles/-/3170558","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756719-ocvhx","category":"スポーツ","title":"サッカーW杯ロシア大会→日本がベスト16進出もベルギーに2-3で逆転負け","summary":"2018年ロシアW杯で日本代表はグループステージを突破しベスト16進出。7月3日のベルギー戦では2-0とリードしたが後半に逆転を許し2-3で敗退。後半アディショナルタイムの逆転弾「ロストフの14秒」が語り草に。","date":"2018年7月","source":"https://www.jfa.jp/samuraiblue/worldcup_2018/news/00017982/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756720-0dkqb","category":"スポーツ","title":"ボクシング・山根明会長の助成金流用・不正問題が発覚→会長と全理事が辞任","summary":"2018年7月、日本ボクシング連盟に333人から助成金不正流用・審判不正などを告発する告発状が提出された。山根明会長は8月8日に辞任し、全理事も辞任。長年にわたる不正が明らかになった。","date":"2018年8月","source":"https://www.nikkei.com/article/DGXMZO33959410Y8A800C1CR8000/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756721-06km6","category":"スポーツ","title":"体操・塚原夫妻による宮川紗江選手へのパワハラ告発→スポーツ界全体に波紋","summary":"2018年8月29日、体操女子の宮川紗江選手が記者会見を開き、塚原千恵子女子強化部長と夫の光男副会長から「このままでは五輪に出られなくなる」などの高圧的な言葉を受けたとパワハラを告発。日本スポーツ界全体の問題として波紋を広げた。","date":"2018年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756722-pefj2","category":"スポーツ","title":"金足農業・吉田輝星が甲子園で旋風→秋田県勢103年ぶりの決勝進出（準優勝）","summary":"2018年夏の甲子園で、秋田県の金足農業高校が2年生エース吉田輝星のほぼ一人投げで決勝まで勝ち進み、秋田県勢103年ぶりの決勝進出を果たした。決勝で大阪桐蔭に0-13で敗れたが「金農旋風」として大きな話題に。","date":"2018年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1780850756723-wblzg","category":"スポーツ","title":"大坂なおみが全米オープン初優勝→日本選手初の四大大会シングルス制覇","summary":"2018年9月8日、テニスの全米オープン女子シングルス決勝で大坂なおみがセリーナ・ウィリアムズを6-2、6-4で下し優勝。日本人として男女を通じ史上初のグランドスラムシングルス制覇を達成した。","date":"2018年9月","source":"https://www.afpbb.com/articles/-/3188073","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780850756724-g34sd","category":"芸能・エンタメ・ゴシップ","title":"小泉今日子と豊原功補が公式サイトで不倫関係を公表→異例の形で話題","summary":"2018年2月1日、女優・小泉今日子が公式サイトで所属事務所からの独立と同時に、既婚者の俳優・豊原功補との交際を告白。「豊原氏にはご家庭があります」と自ら不倫を認める異例の発表が大きな話題を呼んだ。","date":"2018年2月","source":"https://wezz-y.com/archives/52022","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780850756725-wdrpn","category":"芸能・エンタメ・ゴシップ","title":"米津玄師「Lemon」がドラマ「アンナチュラル」主題歌として大ヒット","summary":"2018年3月14日にリリースされた米津玄師のシングル「Lemon」は、TBSドラマ「アンナチュラル」の主題歌として話題に。累計1億ダウンロードを超える空前の大ヒットとなり、年間チャートで最多再生を記録した。","date":"2018年3月","source":"https://tower.jp/article/feature_item/2018/01/19/0705","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780850756726-fwupn","category":"芸能・エンタメ・ゴシップ","title":"ドラマ「おっさんずラブ」（田中圭主演）がSNSで大爆発→2018年の代表ドラマに","summary":"2018年4月期にテレビ朝日で放送された田中圭主演のドラマ「おっさんずラブ」が、男性同士の純愛を描いたストーリーでSNSを中心に大ヒット。田中圭は「2018年の顔」と称されるほどの大ブレークを果たした。","date":"2018年4月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780850756727-a3hq6","category":"芸能・エンタメ・ゴシップ","title":"AKB48総選挙→松井珠理奈が体調不良で欠席のまま1位→その後休養発表","summary":"2018年6月16日に名古屋ドームで開催された第10回AKB48世界選抜総選挙で、SKE48の松井珠理奈が体調不良で舞台挨拶を欠席したまま1位を獲得。その後、体調不良を理由に活動休養を発表し、センター楽曲も本人不在で発売された。","date":"2018年6月","source":"https://www.oricon.co.jp/news/2115122/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780850756728-6rjvf","category":"芸能・エンタメ・ゴシップ","title":"映画「カメラを止めるな！」が製作費300万円から興収30億円超の異例の大ヒット","summary":"2018年6月に都内2館で限定公開された低予算映画「カメラを止めるな！」が口コミで爆発的に広がり、全国350館以上に拡大上映。最終興行収入30億円超という前代未聞の快挙を達成し、映画界に衝撃を与えた。","date":"2018年6月","source":"https://president.jp/articles/-/25909","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1780850756729-aaoi1","category":"芸能・エンタメ・ゴシップ","title":"関ジャニ∞・錦戸亮の人妻との不倫がFRIDAYで報道→謝罪会見","summary":"2018年8月3日発売のFRIDAY（講談社）が、関ジャニ∞の錦戸亮が関西在住の20代既婚女性と数年にわたり不倫関係を続けていたと報道。さらに別の女性との関係も発覚し、騒動が拡大した。","date":"2018年8月","source":"https://friday.kodansha.co.jp/article/17319","confidence":"高","snippet":"","notes":""},{"id":"国際-1780850756730-lp28p","category":"国際","title":"南北朝鮮首脳が板門店で会談→「板門店宣言」に署名・11年ぶりの歴史的会談","summary":"2018年4月27日、韓国の文在寅大統領と北朝鮮の金正恩国務委員長が板門店で首脳会談を実施。北朝鮮の首脳が軍事境界線を越えて韓国側に入るのは史上初。「完全な非核化」を盛り込んだ板門店宣言に署名した。","date":"2018年4月","source":"https://www.nikkei.com/article/DGXMZO29946230X20C18A4000000/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780850756731-1svzt","category":"国際","title":"トランプ・金正恩がシンガポールで史上初の米朝首脳会談","summary":"2018年6月12日、シンガポールのセントーサ島でトランプ米大統領と北朝鮮の金正恩国務委員長が朝鮮戦争以来初めて直接会談。「朝鮮半島の完全な非核化に取り組む」とする共同声明に署名した。","date":"2018年6月","source":"https://www.nikkei.com/article/DGXMZO31689760S8A610C1910M00/","confidence":"高","snippet":"","notes":""},{"id":"国際-1780850756732-d4qit","category":"国際","title":"ジャーナリスト・カショギがトルコのサウジ領事館内で殺害→王室関与が疑われ国際問題に","summary":"2018年10月2日、ワシントン・ポスト記者のジャマル・カショギがトルコ・イスタンブールのサウジアラビア総領事館を訪問後に行方不明となり、トルコ当局が館内での殺害を確認。ムハンマド・ビン・サルマン皇太子の関与が疑われ、国際社会から強い批判を浴びた。","date":"2018年10月","source":"https://www.afpbb.com/articles/-/3192438","confidence":"高","snippet":"","notes":""},{"id":"政治-1781175815664-iimn8","category":"政治","title":"森友学園問題 — 国有地格安売却が発覚、籠池泰典理事長が証人喚問に","summary":"大阪・豊中市の国有地が学校法人「森友学園」に鑑定価格の約1割（約1億3400万円）で売却されていたことが発覚。籠池泰典理事長が2017年3月23日に衆参両院の予算委員会で証人喚問に立ち、安倍昭恵夫人から100万円の寄付を受け取ったと証言。財務省による公文書改ざんも後に発覚し、安倍政権を長期間揺るがした。","date":"2017年3月","source":"https://www.buzzfeed.com/jp/kotahatachi/what-is-mizuhonokuni23","confidence":"高","snippet":"","notes":""},{"id":"政治-1781175815665-ope64","category":"政治","title":"稲田朋美防衛相が南スーダン日報隠蔽問題で引責辞任","summary":"南スーダンPKOに派遣された陸自の活動日報が「廃棄済み」として不開示とされていたが電子データで保管されていたことが判明。組織的な隠蔽が認定され、2017年7月28日に稲田防衛相が引責辞任。防衛事務次官・陸上幕僚長も同日辞任した。","date":"2017年7月","source":"https://www.nikkei.com/article/DGXLASFS27H3N_X20C17A7MM8000/","confidence":"高","snippet":"","notes":""},{"id":"政治-1781175815669-avgk3","category":"政治","title":"山尾志桜里議員の不倫疑惑 — 民進党幹事長就任直前に週刊文春がスクープ","summary":"民進党の幹事長就任が噂されていた山尾志桜里衆院議員と9歳年下の倉持麟太郎弁護士とのW不倫疑惑を週刊文春が2017年9月6日に配信。山尾氏は男女関係を否定したが会見を一方的に打ち切る対応が批判を招き民進党を離党した。","date":"2017年9月","source":"https://bunshun.jp/articles/-/79135","confidence":"高","snippet":"","notes":""},{"id":"政治-1781175815670-59b2v","category":"政治","title":"衆院選2017 — 小池百合子「排除します」が裏目に、立憲民主党が躍進・自民大勝","summary":"2017年10月22日投開票の第48回衆院選。民進党が希望の党・立憲民主党に分裂し、小池百合子代表が民進合流組を「排除します」と発言したことが失言となり希望の党が大失速。自民・公明が313議席を確保する圧勝。枝野幸男が立ち上げた立憲民主党は55議席を獲得し躍進した。","date":"2017年10月","source":"https://go2senkyo.com/articles/2017/10/23/33222.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1781175815672-3yeku","category":"経済","title":"格安旅行会社「てるみくらぶ」が突然破産 — 海外滞在中の旅行者が帰国できず大混乱","summary":"格安ツアーで人気だった旅行会社「てるみくらぶ」が2017年3月27日に突然の破産申請。約9万件のツアー契約が一斉キャンセルとなり、当時海外に滞在中だった旅行者が帰国費用を捻出できず在外公館が対応に追われた。","date":"2017年3月","source":"https://nostaly.net/15278.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1781175815673-zjik9","category":"経済","title":"タカタが民事再生法申請 — エアバッグ欠陥問題で製造業戦後最大の経営破綻","summary":"エアバッグのガス発生装置欠陥問題で世界規模のリコールが拡大した自動車部品大手・タカタが2017年6月26日に民事再生法の適用を東京地裁へ申請。申請時の負債は約3800億円で、メーカーが肩代わりしたリコール費用を含めると1兆円超に達し、製造業として戦後最大規模の経営破綻となった。","date":"2017年6月","source":"https://www.nikkei.com/article/DGXLASDZ23I9L_W7A620C1MM0000/","confidence":"高","snippet":"","notes":""},{"id":"経済-1781175815674-91zdf","category":"経済","title":"日産・SUBARU で完成検査不正が発覚 — 無資格者が最終検査を長年実施","summary":"日産自動車で無資格の社員が完成検査を行っていたことが2017年9月に発覚し国内全工場で出荷を停止。10月には富士重工業（SUBARU）でも同様の問題が判明し、群馬工場で30年以上にわたり無資格検査が常態化していたと発表。国内の車検制度への信頼が大きく揺らいだ。","date":"2017年9月","source":"https://wedge.ismedia.jp/articles/-/11483","confidence":"高","snippet":"","notes":""},{"id":"経済-1781175815678-3rjj2","category":"経済","title":"神戸製鋼所がアルミ・銅製品の品質データを長年改ざん","summary":"鉄鋼大手・神戸製鋼所が、アルミ・銅製品の強度・寸法に関する品質データを顧客との取決め値に合わせて改ざんしていたことが2017年10月に発覚。対象製品は自動車・航空機・新幹線など幅広く、納入先は国内外約500社に及んだ。改ざんは少なくとも10年以上前から続いていた。","date":"2017年10月","source":"https://bizgate.nikkei.com/article/DGXMZO2842869022032018000000","confidence":"高","snippet":"","notes":""},{"id":"社会-1781175815679-zvlmh","category":"社会","title":"「プレミアムフライデー」開始 — 月末金曜15時退社を政府が推進、定着せず失速","summary":"政府と経済界が主導し、毎月末の金曜日に午後3時を目途に仕事を終えて消費を促す「プレミアムフライデー」が2017年2月24日にスタート。大企業を中心に一部が対応したが中小企業では普及せず「定時すら帰れないのに」と批判が相次ぎ、半年も経たずに形骸化した。","date":"2017年2月","source":"https://www.keidanren.or.jp/journal/times/2017/0302_01.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1781175815680-i69a0","category":"社会","title":"猛毒アリ「ヒアリ」が国内初確認 — 神戸港のコンテナヤードで発見","summary":"刺されると強烈な痛みや死亡例もある特定外来生物「ヒアリ（Solenopsis invicta）」が2017年5〜6月、兵庫県の神戸・尼崎のコンテナヤードで国内初確認。環境省が2017年6月9日に正式発表。その後も全国の港湾施設で相次いで発見され、緊急防除対策が講じられた。","date":"2017年6月","source":"https://www.env.go.jp/press/104185.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1781175815681-oldoc","category":"社会","title":"天皇退位特例法が成立 — 約200年ぶりの生前退位が決定","summary":"2016年8月の天皇陛下（明仁）の生前退位意向表明を受け、2017年6月9日に「天皇の退位等に関する皇室典範特例法」が成立。江戸時代の光格天皇以来約200年ぶりとなる生前退位が法的に認められ、2019年4月30日の退位・5月1日の新天皇即位が決定した。","date":"2017年6月","source":"https://www.nippon.com/ja/behind/l00197/","confidence":"高","snippet":"","notes":""},{"id":"社会-1781175815682-mlcel","category":"社会","title":"九州北部豪雨 — 福岡・大分で死者40人、朝倉市などに土石流が直撃","summary":"2017年7月5〜6日、福岡県朝倉市・東峰村や大分県日田市などで発生した記録的豪雨。線状降水帯が停滞し土石流・河川氾濫が多発。死者40人・行方不明2人の計42人が犠牲となった。住宅・農地への甚大な被害が生じ、復旧に長期間を要した。","date":"2017年7月","source":"https://www.bousai.go.jp/kohou/kouhoubousai/h29/88/disaster.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1781175815683-tcw62","category":"スポーツ","title":"WBC 日本代表 準決勝でアメリカに1-2で惜敗","summary":"2017年3月22日、ロサンゼルスのドジャー・スタジアムで行われた第4回WBCの準決勝で、侍ジャパンはアメリカに1-2で敗れ2大会連続優勝が阻まれた。菊池涼介のホームランで先制したが逆転負け。2次ラウンド全勝で乗り込んだだけに衝撃の敗戦となった。","date":"2017年3月","source":"https://npb.jp/wbc/2017/score_jpn7.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1781175815684-vtgro","category":"スポーツ","title":"将棋・藤井聡太四段が29連勝で史上最多連勝記録を更新","summary":"中学3年生・14歳でプロ棋士（四段）に昇段した藤井聡太が2017年6月26日の竜王戦で勝利し公式戦29連勝を達成。従来の神谷広志八段が持っていた28連勝（1987年）の記録を約30年ぶりに塗り替えた。後に30連勝まで記録を伸ばし「天才少年棋士」として社会現象になった。","date":"2017年6月","source":"https://www.shogi.or.jp/match_news/2017/06/29.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1781175815685-m5oi4","category":"スポーツ","title":"桐生祥秀が日本人初の100m9秒台（9秒98）を達成","summary":"2017年9月9日、日本インカレ100m決勝で東洋大学の桐生祥秀が9秒98をマークし、日本人として史上初めて100m走で9秒台を記録。長年「日本人の壁」とされてきた10秒の壁をついに破り、日本中が沸いた。","date":"2017年9月","source":"https://www.olympics.com/ja/news/%E6%A1%90%E7%94%9F%E7%A5%A5%E7%A7%80-%E6%97%A5%E6%9C%AC%E4%BA%BA%E5%8F%B2%E4%B8%8A%E5%88%9D%E3%81%AE9%E7%A7%92%E5%8F%B0%E3%82%92%E8%A8%98%E9%8C%B2","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1781175815686-4qock","category":"スポーツ","title":"大谷翔平がロサンゼルス・エンゼルスへ — 「二刀流」でメジャー挑戦","summary":"北海道日本ハムファイターズで投打「二刀流」として活躍した大谷翔平が2017年11月にポスティングシステムによるMLB移籍を表明。12月9日にロサンゼルス・エンゼルスとの契約合意が発表された。翌2018年からMLBデビューを果たし世界的なスーパースターへ飛躍する起点となった。","date":"2017年12月","source":"https://full-count.jp/2017/11/22/post94276/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1781175815687-dag7q","category":"芸能・エンタメ・ゴシップ","title":"アニメ「けものフレンズ」が低予算ながら社会現象に","summary":"2017年1月よりテレビ東京系で放送されたアニメ「けものフレンズ」が予想外の大ヒット。動物擬人化キャラクターのゆるいかわいさとほのぼのストーリーがTwitterを中心に熱狂的な支持を集め「すごい！たのしい！」など独特の台詞がネットミームに。低予算3DCGアニメが大人のファンを大量獲得する異例の快挙となった。","date":"2017年1月","source":"","confidence":"中","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1781175815688-oausd","category":"芸能・エンタメ・ゴシップ","title":"渡辺謙の不倫報道 — 妻・南果歩の乳がん闘病中に海外でデート","summary":"国際俳優の渡辺謙と36歳のジュエリーデザイナーとの不倫関係を週刊文春が2017年3月に報道。妻・南果歩が乳がんの闘病中であったことから批判が殺到。同年7月に謝罪会見を開いて不倫を認め、翌2018年5月に離婚が成立した。","date":"2017年3月","source":"https://www.oricon.co.jp/news/2094205/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1781175815689-e68tc","category":"芸能・エンタメ・ゴシップ","title":"Nintendo Switch 発売 — 「家庭用＋携帯ゲーム機」の新形態で大ヒット","summary":"任天堂が2017年3月3日に発売した「Nintendo Switch」が世界的なヒット商品に。テレビ接続の据え置き機と持ち運べる携帯機の2形態を実現した斬新な設計が話題を呼び、前作「Wii U」の低迷から一転して任天堂が復活。同時発売の「ゼルダの伝説 ブレス オブ ザ ワイルド」も高評価を得た。","date":"2017年3月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1781175815690-422oo","category":"芸能・エンタメ・ゴシップ","title":"宮迫博之のかけもち不倫疑惑 — 週刊文春が2人の女性との交際を報道","summary":"お笑いコンビ「雨上がり決死隊」の宮迫博之と2人の女性（モデル・美容系ライター）との同時進行不倫を週刊文春が2017年8月9日号で報道。宮迫は「一線は越えていない」とフジテレビ「バイキング」で生釈明したが複数番組を降板した。","date":"2017年8月","source":"https://www.oricon.co.jp/news/2095388/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1781175815691-0jm
