<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="robots" content="noindex, nofollow">
<title>📰 ニュースデータベース閲覧</title>
<style>
:root{--bg:#fff;--bg2:#f7f8fa;--bg3:#eef0f3;--tx:#1a1a1a;--tx2:#6e7782;--bd:#d8dade;--bd2:#e8e9eb;--ac:#2980b9;}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;margin:0;padding:0;background:var(--bg);color:var(--tx);font-size:14px;line-height:1.5;}
.wrap{max-width:720px;margin:0 auto;padding:12px;}
h1{font-size:18px;font-weight:600;margin:0 0 12px;letter-spacing:-0.01em;}
.stat{padding:10px 14px;border-radius:8px;background:linear-gradient(135deg,#2980b9 0%,#3498db 100%);color:#fff;margin-bottom:12px;display:flex;align-items:baseline;gap:8px;}
.stat .num{font-size:24px;font-weight:700;letter-spacing:-0.02em;}
.stat .lbl{font-size:11px;opacity:0.9;}
.fl{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;align-items:center;}
.fl select,.fl input[type=text]{padding:5px 8px;border-radius:6px;border:0.5px solid var(--bd);background:var(--bg);color:var(--tx);font-size:12px;font-family:inherit;}
.fl input[type=text]{flex:1;min-width:120px;}
.fl button.sort{padding:5px 10px;border-radius:6px;border:0.5px solid var(--bd);background:var(--bg);color:var(--tx2);cursor:pointer;font-size:12px;}
.cnt{font-size:11px;color:var(--tx2);margin-left:auto;}
.list{display:flex;flex-direction:column;gap:8px;margin-top:8px;}
.card{display:flex;background:var(--bg);border:0.5px solid var(--bd2);border-radius:9px;overflow:hidden;box-shadow:0 2px 6px rgba(0,0,0,0.07);cursor:pointer;}
.bar{width:4px;flex-shrink:0;}
.body{flex:1;padding:10px 12px;min-width:0;}
.meta{display:flex;gap:8px;margin-bottom:5px;flex-wrap:wrap;align-items:center;}
.tag{font-size:11px;font-weight:600;padding:2px 8px;border-radius:20px;white-space:nowrap;}
.dt{font-size:11px;color:var(--tx2);}
.cf{font-size:10px;display:inline-flex;align-items:center;gap:3px;font-weight:500;}
.cf .dot{width:7px;height:7px;border-radius:50%;}
.tt{margin:0 0 4px;font-weight:600;line-height:1.45;font-size:14px;}
.sm{margin:0;font-size:12px;color:var(--tx2);line-height:1.65;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.empty{text-align:center;padding:40px 20px;color:var(--tx2);}
mark{background:#fef08a;color:inherit;padding:0 1px;border-radius:2px;}
.modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.55);display:none;align-items:center;justify-content:center;padding:16px;z-index:9999;}
.modal.open{display:flex;}
.dlg{background:var(--bg);border-radius:14px;max-width:620px;width:100%;max-height:88vh;overflow:auto;box-shadow:0 25px 70px rgba(0,0,0,0.4);}
.dlg .top{height:6px;}
.dlg .pad{padding:22px 24px 26px;}
.dlg .hd{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;margin-bottom:14px;}
.dlg .meta2{display:flex;gap:8px;flex-wrap:wrap;}
.dlg .cls{background:none;border:none;cursor:pointer;font-size:24px;color:var(--tx2);padding:0 6px;line-height:1;}
.dlg h3{font-size:18px;font-weight:700;margin:0 0 14px;line-height:1.45;}
.dlg .sm2{font-size:14px;line-height:1.85;margin:0;}
.dlg .src{margin-top:14px;padding:8px 12px;border-radius:7px;background:var(--bg2);border:0.5px solid var(--bd2);}
.dlg .src a{font-size:12px;color:var(--ac);word-break:break-all;}
.dlg .ft{display:flex;gap:8px;margin-top:18px;padding-top:16px;border-top:0.5px solid var(--bd2);}
.dlg .cp{padding:7px 16px;border-radius:7px;border:1px solid var(--ac);background:transparent;color:var(--ac);cursor:pointer;font-size:13px;font-weight:500;}
.dlg .cp.done{background:#27ae60;border-color:#27ae60;color:#fff;}
.note{font-size:10px;color:var(--tx2);text-align:center;margin:10px 0 0;}
@media (prefers-color-scheme: dark){:root{--bg:#1c1c1e;--bg2:#2c2c2e;--bg3:#3a3a3c;--tx:#fff;--tx2:#9ea0a5;--bd:#3a3a3c;--bd2:#2c2c2e;}}
</style>
</head>
<body>
<div class="wrap">
<h1>📰 ニュースデータベース</h1>
<div class="stat"><span class="num" id="totalNum">0</span><span class="lbl">件 (2026-05-20 書き出し)</span></div>
<div class="fl">
<select id="fCat"></select>
<select id="fYear"></select>
<select id="fMonth"></select>
</div>
<div class="fl">
<input type="text" id="q" placeholder="キーワード検索...">
<button class="sort" id="sortBtn">↓新しい順</button>
<span class="cnt" id="cnt"></span>
</div>
<div id="list" class="list"></div>
</div>
<div class="modal" id="modal"><div class="dlg" id="dlg"></div></div>
<script>
var DATA=[];
var CATS=["経済","政治","芸能・エンタメ・ゴシップ","スポーツ","テクノロジー","社会","国際"];
var CC={"経済":"#2980b9","政治":"#8e44ad","芸能・エンタメ・ゴシップ":"#e91e8c","スポーツ":"#16a085","テクノロジー":"#2c3e50","社会":"#7f8c8d","国際":"#d35400"};
var CFC={"高":"#27ae60","中":"#f39c12","低":"#e74c3c","未検証":"#95a5a6"};
var st={fCat:"すべて",fYear:"すべて",fMonth:"すべて",sort:"desc",q:""};
function pd(l){if(!l)return null;var s=l.replace(/（.）/,"");var m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);if(!m)return null;return{y:m[1],mo:m[2],d:m[3]};}
function dn(l){var p=pd(l);if(!p)return 0;return Number(p.y)*10000+Number(p.mo)*100+Number(p.d);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function hl(t,q){if(!q||!q.trim())return esc(t);var kw=q.trim();var lo=t.toLowerCase();var lk=kw.toLowerCase();var o="",i=0,idx,n=0;while((idx=lo.indexOf(lk,i))!==-1&&n<50){if(idx>i)o+=esc(t.slice(i,idx));o+="<mark>"+esc(t.slice(idx,idx+kw.length))+"</mark>";i=idx+kw.length;n++;}if(i<t.length)o+=esc(t.slice(i));return o;}
function uniq(a){return Array.from(new Set(a));}
function filtered(){var qt=st.q.trim().toLowerCase();return DATA.filter(function(n){var p=pd(n.date);return(st.fCat==="すべて"||n.category===st.fCat)&&(st.fYear==="すべて"||(p&&p.y===st.fYear))&&(st.fMonth==="すべて"||(p&&p.mo===st.fMonth))&&(!qt||n.title.toLowerCase().indexOf(qt)>=0||n.summary.toLowerCase().indexOf(qt)>=0);}).sort(function(a,b){var c=st.sort==="desc"?dn(b.date)-dn(a.date):dn(a.date)-dn(b.date);return c!==0?c:a.category.localeCompare(b.category);});}
function render(){
  document.getElementById("totalNum").textContent=DATA.length;
  var years=uniq(DATA.map(function(n){var p=pd(n.date);return p?p.y:null;}).filter(Boolean)).sort(function(a,b){return b.localeCompare(a);});
  var months=uniq(DATA.filter(function(n){if(st.fYear==="すべて")return true;var p=pd(n.date);return p&&p.y===st.fYear;}).map(function(n){var p=pd(n.date);return p?p.mo:null;}).filter(Boolean)).sort(function(a,b){return Number(a)-Number(b);});
  var fCatEl=document.getElementById("fCat");
  fCatEl.innerHTML='<option value="すべて">カテゴリ</option>';
  CATS.forEach(function(c){fCatEl.innerHTML+='<option value="'+c+'"'+(st.fCat===c?" selected":"")+'>'+c+'</option>';});
  var fYearEl=document.getElementById("fYear");
  fYearEl.innerHTML='<option value="すべて">年</option>';
  years.forEach(function(y){fYearEl.innerHTML+='<option value="'+y+'"'+(st.fYear===y?" selected":"")+'>'+y+'年</option>';});
  var fMonthEl=document.getElementById("fMonth");
  fMonthEl.innerHTML='<option value="すべて">月</option>';
  months.forEach(function(m){fMonthEl.innerHTML+='<option value="'+m+'"'+(st.fMonth===m?" selected":"")+'>'+m+'月</option>';});
  document.getElementById("q").value=st.q;
  document.getElementById("sortBtn").textContent=st.sort==="desc"?"↓新しい順":"↑古い順";
  var f=filtered();
  document.getElementById("cnt").textContent=f.length+"件 / 全"+DATA.length+"件";
  var list=document.getElementById("list");
  if(f.length===0){list.innerHTML='<div class="empty">条件に一致するニュースがありません</div>';return;}
  var html="";
  f.forEach(function(item,idx){
    var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
    html+='<div class="card" data-idx="'+idx+'"><div class="bar" style="background:'+c+'"></div><div class="body"><div class="meta"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">'+esc((item.date||"").replace(/（.）/,""))+'</span><span class="cf" style="color:'+cfc+'"><span class="dot" style="background:'+cfc+'"></span>'+esc(cf)+'</span>'+(hasSrc?'<span style="color:#2980b9;font-size:10px">🔗</span>':"")+' </div><p class="tt">'+hl(item.title,st.q)+'</p><p class="sm">'+hl(item.summary,st.q)+'</p></div></div>';
  });
  list.innerHTML=html;
  Array.prototype.forEach.call(document.querySelectorAll(".card"),function(el){
    el.addEventListener("click",function(){openDetail(f[Number(el.getAttribute("data-idx"))]);});
  });
}
function openDetail(item){
  var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
  var dlg=document.getElementById("dlg");
  dlg.innerHTML='<div class="top" style="background:'+c+'"></div><div class="pad"><div class="hd"><div class="meta2"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">📅 '+esc((item.date||"").replace(/（.）/,""))+'</span></div><button class="cls" id="closeBtn">×</button></div><h3>'+hl(item.title,st.q)+'</h3><div class="sm2">'+hl(item.summary,st.q)+'</div>'+(hasSrc?'<div class="src"><div style="font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600">📎 ソース</div><a href="'+esc(item.source)+'" target="_blank" rel="noopener noreferrer">'+esc(item.source)+'</a></div>':"")+' <div class="ft"><button class="cp" id="cpBtn">📋 内容をコピー</button></div><p class="note">背景クリック または ×で閉じる</p></div>';
  document.getElementById("modal").classList.add("open");
  document.getElementById("closeBtn").addEventListener("click",closeDetail);
  document.getElementById("cpBtn").addEventListener("click",function(){
    var txt="【"+item.category+"】"+item.title+"\n"+(item.date||"")+"\n\n"+item.summary+(hasSrc?"\n\nソース: "+item.source:"");
    if(navigator.clipboard)navigator.clipboard.writeText(txt);
    var b=document.getElementById("cpBtn");b.textContent="コピー済み ✓";b.classList.add("done");
    setTimeout(function(){if(document.getElementById("cpBtn")){document.getElementById("cpBtn").textContent="📋 内容をコピー";document.getElementById("cpBtn").classList.remove("done");}},1800);
  });
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.getElementById("dlg").innerHTML="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeDetail();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDetail();});
document.getElementById("fCat").addEventListener("change",function(e){st.fCat=e.target.value;render();});
document.getElementById("fYear").addEventListener("change",function(e){st.fYear=e.target.value;st.fMonth="すべて";render();});
document.getElementById("fMonth").addEventListener("change",function(e){st.fMonth=e.target.value;render();});
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});
document.getElementById("sortBtn").addEventListener("click",function(){st.sort=st.sort==="desc"?"asc":"desc";render();});
render();
</script>
</body>
</html>
