火）","source":"https://www.jiji.com/jc/archives?g=soc_archive_1","confidence":"高"},{"id":"社会-6-1778463394004","category":"社会","title":"環境省、2024年度の温室ガス排出量が過去最少——製造業の生産減が主因","summary":"環境省は2024年度（令和6年度）の日本の温室ガス排出量が統計開始以来で過去最少を記録したと発表した。製造業の生産活動の減少が主な要因とされ、脱炭素目標との関係でも注目された。","date":"2026年4月14日（火）","source":"https://www.jiji.com/jc/archives?g=soc_archive_1","confidence":"高"},{"id":"社会-7-1778463394004","category":"社会","title":"気象庁・国交省、「氾濫特別警報」を5月29日新設——レベル4「危険警報」も追加","summary":"気象庁と国土交通省は、河川が実際に氾濫している状況を伝える「氾濫特別警報」を5月29日から新設すると発表した。あわせて、水位がさらに危険な段階に達した際に発令するレベル4相当の「危険警報」も導入し、住民避難の迅速化を図る。","date":"2026年4月14日（火）","source":"https://www.jiji.com/jc/archives?g=soc_archive_1","confidence":"高"},{"id":"社会-8-1778463394004","category":"社会","title":"国交省、機内モバイルバッテリー持ち込み規制を4月24日から強化——違反に罰則","summary":"国土交通省は、航空機への機内持ち込み手荷物に関する規制を強化し、モバイルバッテリーの持ち込み上限や種類を制限する新たなルールを4月24日から適用すると発表した。発火リスクへの対応で、違反した場合の罰則規定も盛り込まれた。","date":"2026年4月14日（火）","source":"https://www.jiji.com/jc/archives?g=soc_archive_1","confidence":"高"},{"id":"経済-9-1778463394004","category":"経済","title":"東電・柏崎刈羽原発6号機が14年ぶりに営業運転再開——中東情勢でLNG節約効果に期待","summary":"東京電力は4月16日16時、柏崎刈羽原子力発電所（新潟県）6号機の営業運転を再開した。2012年3月の停止以来14年ぶり、福島第一原発事故後の東電初の営業運転。イラン情勢による中東エネルギー供給の制約を背景に、年間約1千億円の収支改善とLNG調達量約3割節約効果が見込まれる。","date":"2026年4月16日（木）","source":"https://www.bloomberg.com/jp/news/articles/2026-04-16/TDKKU7T96OSJ00","confidence":"高"},{"id":"社会-10-1778463394004","category":"社会","title":"熊本地震本震から10年——観測史上初の「2度の震度7」で278人犠牲、各地で追悼","summary":"2016年4月16日の熊本地震本震（M7.3、最大震度7）から10年。観測史上初めて同一地点で2度の最大震度7を記録し、計278人が犠牲となった地震の節目に、熊本県内外で追悼式典が行われ、被害の記憶と防災の備えの重要性が語られた。","date":"2026年4月16日（木）","source":"https://www.nippon.com/ja/news/q202604/","confidence":"高"},{"id":"政治-11-1778463394004","category":"政治","title":"海上自衛隊の艦艇が台湾海峡を通過——中国軍が「強く抗議」と声明","summary":"海上自衛隊の艦艇が台湾海峡を通過した。これに対し中国軍が「強く抗議する」と声明を発表。日本の自衛艦が台湾海峡を通過するのは異例の動きとして注目され、中国が日本側に外交的抗議を行う対応に発展した。","date":"2026年4月17日（金）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"高"},{"id":"スポーツ-12-1778463394004","category":"スポーツ","title":"「りくりゅう」三浦璃来・木原龍一組が現役引退を電撃発表——ミラノ五輪金メダル後に決断","summary":"2026年ミラノ・コルティナ冬季五輪のフィギュアスケート・ペアで金メダルを獲得した三浦璃来・木原龍一組（通称「りくりゅう」）が4月17日、SNSで現役引退を発表した。「やり切ったという気持ちでいっぱい」とのコメントを発表。4月28日に都内で引退会見も行った。","date":"2026年4月17日（金）","source":"https://www.chunichi.co.jp/article/1238603","confidence":"高"},{"id":"政治-0-1778465469739","category":"政治","title":"国民民主党大会開催、玉木代表「政策実現は曲がり角」——地力強化を誓う","summary":"国民民主党が党大会を開催。玉木雄一郎代表は「（政策実現は）曲がり角に来ている」と述べ、地力をつけていく方針を示した。2026年度予算成立後の国会運営や、ホルムズ海峡問題への対応を念頭に置いた発言として注目された。","date":"2026年4月5日（日）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"政治-1-1778465469739","category":"政治","title":"政府が武器輸出「5類型」を撤廃——殺傷能力ある兵器の輸出を事実上全面解禁","summary":"政府は防衛装備移転三原則の運用指針を改定し、輸出目的を「救難・輸送・警戒・監視・掃海」に限っていた「5類型」を撤廃することを閣議で決定。殺傷能力のある兵器の輸出が原則解禁される歴史的転換となった。国会への事後通知制度を設ける方針も示した。","date":"2026年4月6日（月）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"政治-2-1778465469739","category":"政治","title":"社民党大会で福島瑞穂代表が再選——13年ぶり選挙戦も勝利し続投","summary":"社民党大会で代表選が行われ、現職の福島瑞穂代表が再選された。代表選が実施されるのは13年ぶりで、対立候補が出る選挙戦は党内の路線対立を反映したものだったが、福島氏が勝利した。","date":"2026年4月6日（月）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"社会-3-1778465469739","category":"社会","title":"ナフサ供給不足の報道は誤り——木原官房長官がSNSで拡散する情報を否定","summary":"NHKなどが報じたプラスチック原料ナフサの「6月にも供給不足」という報道・SNS投稿について、木原稔官房長官が記者会見で「現時点で4か月分は確保しており、誤り」と否定。高市首相もSNSで供給不足を否定した。ホルムズ封鎖によるエネルギー不安の中での情報混乱に政府が対応した。","date":"2026年4月6日（月）","source":"https://news-database.com/2026-04/","confidence":"高"},{"id":"政治-4-1778465469739","category":"政治","title":"茂木外相、イラン外相と電話会談——ホルムズ海峡での安全な船舶航行の確保を要請","summary":"茂木敏充外相はイラン外相と電話会談を行い、ホルムズ海峡における船舶の安全航行の確保を強く訴えた。日本がエネルギー輸入の大半を依存する中東航路の安全を巡り、外交チャンネルを活用して直接働きかけた。","date":"2026年4月6日（月）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"経済-5-1778465469739","category":"経済","title":"2026年度予算が参院で可決・成立——過去最大の122.3兆円、11年ぶり4月成立","summary":"2026年度当初予算が参院本会議で可決・成立した。総額122兆3092億円と過去最大を更新。予算成立が4月にずれ込んだのは2015年度以来11年ぶり。ホルムズ情勢対応を含むエネルギー・防衛費が膨らんだ。高市首相は補正予算編成を否定した。","date":"2026年4月7日（火）","source":"https://www.policynews.jp/schedule/2026/4.html","confidence":"高"},{"id":"社会-6-1778465469739","category":"社会","title":"川崎・JFEスチール敷地内でクレーン解体中に足場崩落——3人死亡・1人行方不明","summary":"川崎市川崎区のJFEスチール東日本製鉄所敷地内でクレーンの解体作業中、約400トンの重りが落下し高さ約40メートルの足場が崩落。男性作業員5人が転落し、3人が死亡、1人が海中に転落して行方不明となった。当時、川崎市には強風注意報が発令されていた。","date":"2026年4月7日（火）","source":"https://www.jiji.com/jc/article?k=2026040800196&g=soc","confidence":"高"},{"id":"社会-7-1778465469739","category":"社会","title":"東京大学が医学部附属病院を本部直轄化——相次ぐ汚職受けガバナンス改革を発表","summary":"東京大学は医師による汚職事件が相次いだ医学部附属病院を、医学部から切り離し大学本部直轄の「大学附属病院」へ移行する組織改革案を公表した。独立監査の導入や民間出身のCRO（最高リスク責任者）設置も盛り込み、6月末をめどに改称する方針。藤井総長は「不退転の決意で改革断行」と述べた。","date":"2026年4月8日（水）","source":"https://news.web.nhk/newsweb/na/na-k10015095101000","confidence":"高"},{"id":"国際-9-1778465469739","category":"国際","title":"米国とイランが2週間の停戦で合意——ホルムズ「安全航行可能」とイラン外相","summary":"米国とイランが2週間の停戦に合意。イラン外相は「ホルムズ海峡は安全に航行可能」と表明した。日本の石油・LNG輸入に直結するホルムズ封鎖問題が一時的に緩和される見通しとなり、国内エネルギー価格への影響が注目された。パキスタンが仲介し、10日以降に和平交渉開始を目指す方針。","date":"2026年4月8日（水）","source":"https://www.jiji.com/jc/archives?g=int_archive_0","confidence":"高"},{"id":"エンタメ・芸能-10-1778465469739","category":"芸能・エンタメ・ゴシップ","title":"鬼滅の刃「無限城編 第一章」が終映——世界興収1179億円、日本映画初の1000億超え","summary":"2025年7月から上映していた映画「鬼滅の刃 無限城編 第一章」が9日付で終映。最終的な世界興行収入は1179億円となり、日本で制作された映画の世界興収1000億円超えは史上初。国内興行収入は402億円で「無限列車編」（407億円）に次ぐ歴代2位を記録した。","date":"2026年4月9日（木）","source":"https://news-database.com/2026-04/","confidence":"高"},{"id":"政治-11-1778465469739","category":"政治","title":"外交青書2026を閣議配布——中国との関係を「最も重要」から「重要な隣国」へ表現変更","summary":"外務省が「令和8年版外交青書」を閣議配布した。最大の変化として、中国との関係を「最も重要な二国間関係」から「重要な隣国」に変更し、表現上の格下げが行われた。同青書内の竹島の記述をめぐって韓国側が抗議し、中国外務省も「高市首相発言が原因」と批判した。","date":"2026年4月10日（金）","source":"https://www.mofa.go.jp/mofaj/gaiko/bluebook/","confidence":"高"},{"id":"エンタメ・芸能-12-1778465469739","category":"芸能・エンタメ・ゴシップ","title":"英ロック伝説「ディープ・パープル」が高市首相を首相官邸に表敬訪問——大ファンの首相が大興奮","summary":"来日公演（11日武道館）を控えた英ロックバンド「ディープ・パープル」のメンバー5人が首相官邸を表敬訪問し、大ファンを公言する高市首相と面会。首相は「ロックの歴史をつくった」と興奮を抑えられない様子で、小学生時代にアルバムを買ったエピソードを披露し、日本製ドラムスティックをプレゼントした。","date":"2026年4月10日（金）","source":"https://www.tokyo-np.co.jp/article/481021","confidence":"高"},{"id":"経済-0-1778466892146","category":"経済","title":"円安が160円台に加速——原油高騰で為替介入警戒水準に到達","summary":"ホルムズ海峡封鎖に伴う原油急騰を背景に、円安が加速し1ドル160円台に突入した。政府・日銀が「警戒水準」と位置づける水準に到達したことで、為替介入への思惑も高まった。中東情勢の長期化で輸入コストが跳ね上がっており、家計・企業双方への打撃が懸念される。","date":"2026年3月29日（日）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"政治-1-1778466892146","category":"政治","title":"立憲民主党が独自活動方針を確認——中道改革連合への合流論は後退","summary":"立憲民主党は執行部会合で、中道改革連合への合流を事実上断念し、独自路線で活動する方針を確認した。与党との連携を模索する中道と、野党としての独自性を重視する立憲が路線対立を深める形となり、野党再編の動きは当面停滞する見通し。","date":"2026年3月29日（日）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"経済-2-1778466892146","category":"経済","title":"東京株が5万1000円割れ、一時2800円超安——原油高騰で年度末に急落","summary":"東京株式市場は30日、日経平均株価が一時2800円超安と急落し、5万1000円を下回った。ホルムズ海峡封鎖長期化による原油高騰と景気後退への懸念が売りを誘った。年度末の最終営業日を前に機関投資家のリスク回避姿勢が強まり、売りが加速した。","date":"2026年3月30日（月）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"政治-3-1778466892146","category":"政治","title":"2026年度暫定予算が成立——年度内成立断念で11年ぶりの異例事態","summary":"政府・与党は2026年度当初予算案の年度内成立を断念し、「つなぎ」となる暫定予算が衆参両院で可決・成立した。暫定予算の成立は2015年度以来11年ぶり。中東情勢をめぐる参院での集中審議が長引いたことが主因。本予算は4月以降の参院審議で7日に成立した。","date":"2026年3月30日（月）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"経済-4-1778466892146","category":"経済","title":"JR東日本の運賃値上げで東京〜熱海間が実質「別路線」化——割高区間に","summary":"JR東日本の運賃値上げが3月末に実施され、東海道線の東京〜熱海間では経路によって料金に大きな差が生じ、実質的に「別路線」と呼べる状況になると報じられた。都市部での10%超の値上がりを中心に広範な値上げとなり、通勤・通学利用者への影響が注目された。","date":"2026年3月30日（月）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"社会-5-1778466892146","category":"社会","title":"静岡・伊東市の田久保元市長を在宅起訴——学歴詐称疑惑が刑事事件に発展","summary":"学歴を詐称して当選したとされる静岡県伊東市の田久保元市長が在宅起訴された。議員時代から指摘されていた学歴詐称疑惑が捜査の末に刑事立件に至ったもので、地方政治における公職者の信頼性問題として全国的に注目を集めた。","date":"2026年3月30日（月）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"テクノロジー-6-1778466892146","category":"テクノロジー","title":"NTTドコモが3Gサービスを終了——日本国内の3G回線が完全停波","summary":"NTTドコモは3月31日をもって3G（FOMA）サービスを終了し、日本国内の3G回線が完全に停波した。国内では4G・5Gへの完全移行が完了。3Gのみに対応した旧端末は使用不可となり、移行を済ませていない一部ユーザーへの影響が出た。","date":"2026年3月31日（火）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"経済-7-1778466892146","category":"経済","title":"KDDIが広告事業から撤退——子会社売り上げの99.7%が架空取引と判明","summary":"KDDIは傘下の広告子会社の売り上げの99.7%が架空取引だったと判明したことを受け、広告事業から完全撤退すると発表した。長期にわたって不正な取引が行われていたことが明らかになり、同社のガバナンス体制への批判が高まった。","date":"2026年3月31日（火）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"社会-8-1778466892146","category":"社会","title":"千葉大病院の看護師がSNSで不適切投稿を繰り返し炎上——匿名で職場内の問題行為を公開","summary":"千葉大学医学部附属病院の看護師が、匿名アカウントを使ってSNS上で問題行為を繰り返し投稿していたことが判明し、炎上した。医療従事者としての倫理的問題とともに、患者情報の漏洩リスクが懸念され、病院側は調査と対応を迫られた。","date":"2026年3月31日（火）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"政治-9-1778466892146","category":"政治","title":"改正民法施行、離婚後の「共同親権」が導入——1948年以来の民法大改正","summary":"4月1日、改正民法が施行され、離婚後も父母双方が親権を持てる「共同親権」制度が導入された。1948年の家制度廃止以来、約78年ぶりとなる親権制度の大転換。離婚協議がまとまらない場合は家庭裁判所が判断し、DV・虐待がある場合は単独親権となる規定も設けられた。","date":"2026年4月1日（水）","source":"https://www.policynews.jp/schedule/2026/4.html","confidence":"高"},{"id":"社会-10-1778466892146","category":"社会","title":"自転車の交通違反に「青切符」制度導入——16歳以上を対象に反則金を徴収","summary":"改正道路交通法が施行され、16歳以上の自転車運転者による信号無視やながらスマホなど113種類の交通違反に対して「青切符」（交通反則通告制度）が適用されるようになった。ながらスマホには最大1万2000円の反則金が課される。これまで刑事手続きが必要だった違反処理が簡略化される。","date":"2026年4月1日（水）","source":"https://www.npa.go.jp/bureau/traffic/bicycle/portal/system.html","confidence":"高"},{"id":"社会-11-1778466892146","category":"社会","title":"私立高校授業料が全国で実質無償化、公立小の給食費も無償化——4月から新制度が一斉スタート","summary":"4月1日から、私立を含めた高校の授業料が全国で実質無償化（所得制限なし）となり、公立小学校の給食費も実質無償化された。子ども・子育て支援金の徴収も開始され、公的医療保険料に月数百円単位の上乗せが始まった。「こども誰でも通園制度」や「35人学級」の段階的導入もスタートした。","date":"2026年4月1日（水）","source":"https://news-database.com/2026-04/","confidence":"高"},{"id":"政治-12-1778466892146","category":"政治","title":"サイバー通信情報監理委員会が設置——能動的防御の運用チェック機能が始動","summary":"サイバー攻撃への能動的防御（ACD）制度の実施を監視・チェックするための独立機関「サイバー通信情報監理委員会」が4月1日に設置・発足した。昨年末に成立した能動的防御関連法に基づく機関で、政府や自衛隊によるサイバー作戦が適法に行われているかを監督する。","date":"2026年4月1日（水）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"政治-13-1778466892146","category":"政治","title":"第2次高市内閣の閣僚資産公開——平均6591万円、小泉防衛相がトップ維持","summary":"第2次高市内閣の閣僚資産が公開され、閣僚の平均資産は約6591万円だった。最多は小泉進次郎防衛相で、第1次内閣に続きトップを維持した。資産公開制度は閣僚の利益相反を防ぐための透明性確保措置で、不動産や株式の保有状況が明らかになった。","date":"2026年4月3日（金）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"政治-14-1778466892146","category":"政治","title":"食糧法改正案・犯収法改正案・民法改正案が閣議決定——4月3日に3法案まとめて決定","summary":"政府は4月3日の閣議で3本の法案を決定した。①食糧法改正案：コメの生産を「需要に応じた量」に改め備蓄方針も見直す。②犯収法改正案：「偽口座」制度の導入と送金バイト規制の強化。③民法改正案：成年後見制度を途中で終了できる仕組みと「デジタル遺言」制度を導入。いずれも今国会での成立を目指す。","date":"2026年4月3日（金）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"社会-15-1778466892146","category":"社会","title":"はしか感染増加で全国に注意呼び掛け——厚労相が警戒を強調","summary":"上野厚生労働相は全国的にはしか（麻疹）の感染者が増加傾向にあるとして、ワクチン接種の確認や海外渡航前の予防接種を広く呼びかけた。感染力が極めて強いはしかについて、ワクチン未接種者への感染拡大が懸念されており、医療機関に受診時の感染対策徹底を求めた。","date":"2026年4月3日（金）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"政治-16-1778466892146","category":"政治","title":"中道改革連合・小川代表が「女性天皇」発言を撤回——「不用意な一言だった」","summary":"中道改革連合の小川淳也代表は、女性天皇の容認を示唆する発言について「不用意な一言だった」として撤回した。皇位継承問題については政府・与党との調整が必要なデリケートな課題であり、党内外から批判を受けての撤回となった。党の安定した政策運営を優先する判断とみられる。","date":"2026年4月3日（金）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"エンタメ・芸能-17-1778466892146","category":"芸能・エンタメ・ゴシップ","title":"堺雅人主演「VIVANT」続編が7月から2クール連続放送——異例の大型展開へ","summary":"TBS系で放送された大ヒットドラマ「VIVANT」の続編が7月から2クール（約半年）にわたって連続放送されることが発表された。主演の堺雅人ら主要キャストが続投し、「新章」の開幕を告げる記念映像も公開された。一作で2クール連続放送は国内ドラマとして異例の試みとなる。","date":"2026年4月3日（金）","source":"https://eiga.com/news/20260313/35/","confidence":"中"},{"id":"政治-18-1778466892146","category":"政治","title":"2026年度予算案、参院可決の公算——与党が多数派工作にめど、7日にも正式成立","summary":"2026年度当初予算案について、与党が参院で可決に必要な多数派工作にめどをつけた。早ければ7日にも参院本会議で可決・成立する見通しとなった。暫定予算での運営を余儀なくされていた国政が正常化に向かう。予算総額は過去最大の122兆3092億円。","date":"2026年4月4日（土）","source":"https://www.jiji.com/jc/archives?g=pol_archive_0","confidence":"高"},{"id":"スポーツ-0-1778511985716","category":"スポーツ","title":"大相撲・霧島が春場所優勝パレード 大阪市内で沿道を埋めたファンが歓声","summary":"前日21日に大阪・大相撲春場所で14場所ぶり3度目の幕内最高優勝を決めた関脇霧島（モンゴル出身、音羽山部屋）が22日、大阪市内で優勝パレードを行った。昨年11月の九州場所から3場所合計34勝を挙げ、夏場所からの大関復帰も確実となった。","date":"2026年3月22日（日）","source":"https://www.jiji.com/","confidence":"高"},{"id":"スポーツ-1-1778511985716","category":"スポーツ","title":"WBC決勝 ベネズエラがアメリカを3-2で下し悲願の初優勝 日本は初の8強敗退","summary":"ワールド・ベースボール・クラシック（WBC）決勝が米フロリダ州マイアミのローンデポパークで行われ（日本時間18日）、ベネズエラがアメリカを3-2で下し6大会目にして悲願の初優勝を果たした。日本は準々決勝でベネズエラに5-8で逆転負けし、史上初の8強敗退となった。WBCはNetflixが日本独占配信したことも話題となった。","date":"2026年3月22日（日）","source":"https://www.mlb.com/ja/news/venezuela-wins-world-baseball-classic-2026","confidence":"高"},{"id":"社会-2-1778511985716","category":"社会","title":"新名神高速・野登トンネルで大型トラック追突の多重事故 6人死亡","summary":"三重県亀山市内の新名神高速道路野登トンネル内で、大型トラックが乗用車に追突した後に多重事故となり、6人が死亡した。トンネル内の交通規制が長時間にわたり、高速道路各社が迂回路の利用を呼びかけた。","date":"2026年3月22日（日）","source":"https://www.jiji.com/","confidence":"中"},{"id":"スポーツ-3-1778511985716","category":"スポーツ","title":"侍ジャパン帰国 WBC初の8強敗退を総括 指揮官「選手は全力を尽くした」","summary":"WBC準々決勝でベネズエラに敗れた侍ジャパンが帰国した。大谷翔平は「悔しい結果だが学びがあった」とコメント。今大会はNetflixの独占配信により地上波での試合放送がなく、国民的盛り上がりが欠けたとの指摘が相次いだ。","date":"2026年3月23日（月）","source":"https://www.nikkei.com/","confidence":"中"},{"id":"経済-4-1778511985716","category":"経済","title":"石油備蓄放出後も高水準続くガソリン価格 全国平均170円台前半で推移","summary":"高市首相が3月11日に表明した政府の石油備蓄放出により、全国平均レギュラーガソリン価格は史上最高値の190.8円（16日時点）から170円台前半に下落。ただし世界的な原油高（1バレル110ドル台）が継続しており、さらなる上昇への警戒も続いている。","date":"2026年3月23日（月）","source":"https://www.enecho.meti.go.jp/","confidence":"中"},{"id":"政治-5-1778511985716","category":"政治","title":"国会でホルムズ海峡対応めぐる審議 自衛隊の機雷除去「法制上想定できず」高市首相答弁","summary":"衆参両院で日米首脳会談（3月19日）の結果をめぐる審議が続いた。野党はホルムズ海峡における自衛隊の役割拡大を追及。高市首相は「法制上の制約がある、自衛隊による機雷除去は想定できない」と重ねて答弁し、トランプ大統領への対応は「可能な範囲での協力」にとどまると説明した。","date":"2026年3月23日（月）","source":"https://www.sangiin.go.jp/","confidence":"中"},{"id":"経済-6-1778511985716","category":"経済","title":"日米首脳会談の11兆円対米投資合意 国会で詳細審議 アラスカ原油確保も焦点","summary":"3月19日の日米首脳会談で合意した11兆円規模の対米投融資について、国会で内容の審議が続いた。米国アラスカ産原油の生産拡大と日本の備蓄確保、小型原発建設への協力といった具体的な内容が焦点となった。エネルギー安全保障と対米外交のバランスを問う声が野党から相次いだ。","date":"2026年3月24日（火）","source":"https://www.bloomberg.co.jp/","confidence":"中"},{"id":"社会-7-1778511985716","category":"社会","title":"青森県三沢市沖で貨物船と漁船が衝突 4人が死亡・行方不明","summary":"青森県三沢市沖の太平洋で貨物船と漁船が衝突し、漁船の乗組員4人が死亡または行方不明となった。第2管区海上保安本部が捜索救助活動を行い、事故原因の調査を開始した。","date":"2026年3月24日（火）","source":"https://www.jiji.com/","confidence":"中"},{"id":"テクノロジー-8-1778511985716","category":"テクノロジー","title":"ソニー・ホンダモビリティ、EV「アフィーラ」2車種の開発・発売中止を発表","summary":"ソニーグループとホンダの合弁会社ソニー・ホンダモビリティは3月25日、2026年内の米国投入を予定していたEV「AFEELA（アフィーラ）1」と、2028年以降予定の「アフィーラ2」の計2車種の開発・発売中止を発表した。米トランプ政権のEV推進策撤廃による市場縮小とホンダのEV戦略見直しが直接の原因。ホンダは3月12日に上場以来初の最大6900億円の赤字転落見通しを発表しており、EV路線の全面的な見直しが続いている。","date":"2026年3月25日（水）","source":"https://xtech.nikkei.com/atcl/nxt/mag/at/18/00006/00869/","confidence":"高"},{"id":"経済-9-1778511985716","category":"経済","title":"ホンダ、EV3車種に加えソニーとの合弁事業も中止 EV戦略を全面撤退へ","summary":"ホンダはEV3車種の開発中止（3月12日発表）に続き、ソニーとの合弁会社ソニー・ホンダモビリティのEV事業中止（3月25日）により、米国EV市場からの実質的な全面撤退が明らかとなった。トランプ政権の規制緩和と市場縮小が主因で、EVから水素・ハイブリッドへの回帰が進んでいる。","date":"2026年3月25日（水）","source":"https://www.nikkei.com/","confidence":"高"},{"id":"政治-10-1778511985716","category":"政治","title":"南鳥島での核廃棄物最終処分場 文献調査の受け入れを小笠原村が検討へ","summary":"高レベル放射性廃棄物（核のゴミ）の最終処分場候補として国が申し入れた東京都小笠原村・南鳥島での文献調査について、小笠原村が受け入れを検討する姿勢を示した。南鳥島は国有地で民間人が居住しておらず、漁業権の問題も比較的少ないとして注目されている。","date":"2026年3月25日（水）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"中"},{"id":"社会-11-1778511985716","category":"社会","title":"旭川いじめ自殺事件 遺族と市が和解成立 賠償金7000万円を市が支払い","summary":"北海道旭川市で2021年に中学2年生の女子生徒がいじめを苦 。","date":"2026年3月28日（土）","source":"https://www.jma.go.jp/","confidence":"中"},{"id":"エンタメ・芸能-19-1778511985716","category":"芸能・エンタメ・ゴシップ","title":"スピードスケート・高木美帆が世界選手権後に現役引退 五輪最多10メダルで幕","summary":"ミラノ・コルティナ冬季五輪など日本女子最多の10個のメダルを獲得したスピードスケートの高木美帆選手（31）が、3月に行われた世界選手権を最後に現役引退することを発表した。引退会見では「競技生活に悔いはない」と語り、ファンからの惜別の声が相次いでいる。","date":"2026年3月22日（日）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"エンタメ・芸能-20-1778511985716","category":"芸能・エンタメ・ゴシップ","title":"ノーベル文学賞作家・大江健三郎の未発表小説2編が発見 学生時代の下宿先で保管","summary":"2023年に他界したノーベル文学賞作家・大江健三郎氏の未発表小説2編が発見されたことが週内に話題となった。大江氏が学生時代に下宿していた大家の自宅に長年保管されていたもので、文学界から大きな注目が集まった。","date":"2026年3月23日（月）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"中"},{"id":"エンタメ・芸能-21-1778511985716","category":"芸能・エンタメ・ゴシップ","title":"WBCのNetflix独占配信に批判続く「大谷を見るなら有料で」スポーツ中継のあり方が議論に","summary":"2026年WBCがNetflixの独占配信となり地上波での試合放送が一切なかったことへの批判が週内も続いた。国民的盛り上がりに欠けたとして「大谷翔平を見るには有料契約が必要」と問題視する声が相次ぎ、スポーツ中継の公共性をめぐる論争が広がった。","date":"2026年3月24日（火）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"エンタメ・芸能-22-1778511985716","category":"芸能・エンタメ・ゴシップ","title":"小学館、漫画サイトで性加害者の別名義起用 問題が発覚し謝罪","summary":"小学館は、週刊少年ジャンプで性加害事件（2020年）により打ち切りとなった漫画「アクタージュ」の原作者・マツキタツヤ氏を別名義で自社漫画サイト「マンガワン」に起用していたことが判明し謝罪した。また元従業員が取引先に性的行為を要求していた問題も重なり、小学館の企業体制への批判が続いた。","date":"2026年3月25日（水）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"政治-23-1778511985716","category":"政治","title":"旧統一教会 最高裁に特別抗告 東京高裁の解散命令受け不服申し立て継続中","summary":"3月4日に東京高裁から宗教法人解散命令が出された世界平和統一家庭連合（旧統一教会）が最高裁に特別抗告したことを受け、週内も国会や世論で教団財産の清算手続きと被害者救済のあり方をめぐる議論が続いた。高裁決定で清算手続きは進行しており、法人格剥奪に向けた手続きが本格化した。","date":"2026年3月23日（月）","source":"https://www.jiji.com/jc/v7?id=unificationchurch","confidence":"高"},{"id":"政治-24-1778511985716","category":"政治","title":"高市首相の訪米「無難に終えたが最大の成果」各紙が評価 ホルムズ対応で課題残す","summary":"3月19日の日米首脳会談について、nippon.comやBloombergなど主要メディアが週内に詳細分析を公表した。「無難さが最大の成果」との評価が多く、トランプ大統領の軍艦派遣要求を自衛隊派遣の確約なしで切り抜けたことが注目された一方、ホルムズ海峡対応をめぐる日米間の「貢献」要求への ympics.com/ja/news/wbc2026-japan-venezuela-live","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-1-1778724038053","category":"芸能・エンタメ・ゴシップ","title":"元大関・若嶋津六夫さんが肺炎で死去——69歳、妻・高田みづえさんが心境を吐露","summary":"「南海の黒ひょう」の異名を持ち昭和の大相撲を沸かせた元大関・若嶋津六夫さんが、千葉県の病院で肺炎のため死去した。69歳だった。前年夏より体調を崩し入院生活を続けていた。妻で元アイドル歌手・高田みづえさんは「私の愛情をたっぷり受けて天国に逝きました」とコメントした。","date":"2026年3月15日（日）","source":"https://ja.wikipedia.org/wiki/%E8%8B%A5%E5%B6%8B%E6%B4%A5%E5%85%AD%E5%A4%AB","confidence":"高"},{"id":"経済-2-1778724038053","category":"経済","title":"日米など18カ国が重要鉱物の供給途絶回避へ連携声明——都内の国際会議で合意","summary":"東京都内で開かれた国際会議で、日本・米国など18カ国がホルムズ封鎖によるエネルギー危機を受け、重要鉱物の供給途絶回避に向けた連携強化を盛り込んだ共同声明を発表した。EV・半導体に不可欠なレアアースや半導体材料の中国依存脱却に向けた取り組みを加速する。","date":"2026年3月15日（日）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"政治-3-1778724038053","category":"政治","title":"政府が石油備蓄の放出を開始——過去最大規模、ホルムズ封鎖への緊急対応","summary":"政府は16日、ホルムズ海峡封鎖長期化によるエネルギー危機への対応として、国家備蓄1カ月分・民間備蓄15日分の石油放出を開始した。過去最大規模の備蓄放出で、合わせてガソリン元売各社への補助金制度の再開も発動。19日以降にガソリン小売価格を1リットル170円程度に抑える目標を示した。","date":"2026年3月16日（月）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"経済-4-1778724038053","category":"経済","title":"ガソリン1リットル190.8円で史上最高値——ホルムズ封鎖で原油急騰","summary":"資源エネルギー庁の調査（16日時点）で、レギュラーガソリンの全国平均小売価格が1リットル190.8円となり、現在の調査方法になってから過去最高値を更新した。前週比29.0円の急騰。ホルムズ海峡封鎖に伴う原油高が直撃しており、政府は備蓄放出と補助金再開で価格抑制を図る。","date":"2026年3月16日（月）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"経済-5-1778724038053","category":"経済","title":"シャープ本社が大阪市に10年ぶり再移転——堺市から旧本拠地へ復帰","summary":"シャープは、2016年に移転した堺市から大阪市へ本社を10年ぶりに戻すと発表した。台湾・鴻海（ホンハイ）精密工業による経営再建を経てブランド力を回復しつつある中での原点回帰。大阪での存在感を高め、グループの一体感強化を図る狙いがある。","date":"2026年3月16日（月）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"経済-6-1778724038053","category":"経済","title":"電機春闘2026、ベア1万2000円以上の妥結下限を正式決定——前年超えの高水準","summary":"電機連合（電機・電子・情報通信産業労働組合連合会）は2026年春季賃上げ交渉（春闘）で、基本給を一律で上げるベースアップ（ベア）の妥結最低基準を「1万2000円以上」と正式決定した。原油高・インフレを背景に前年実績を上回る水準で、電機各社の妥結動向が注目 で追悼式、約2万3000人が今なお避難","summary":"2011年の東日本大震災と福島第一原子力発電所事故から15年を迎えた。岩手・宮城・福島の3県の被災地では追悼行事が行われ、遺族らが犠牲者に祈りを捧げた。福島では原発事故により今なお約2万3000人が県内外に避難生活を続けており、完全復興への道のりは依然として長い。","date":"2026年3月11日（水）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"政治-7-1778759014439","category":"政治","title":"高市首相が石油備蓄放出を表明——ガソリン小売価格を全国平均1リットル170円程度に抑制","summary":"高市早苗首相はホルムズ海峡封鎖に伴う原油価格急騰への対応として、国家備蓄1カ月分・民間備蓄15日分の石油を放出すると表明した。合わせてガソリン元売各社への補助金制度の再開も発表し、全国平均小売価格を1リットル当たり170円程度に抑える方針も明らかにした。","date":"2026年3月11日（水）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"社会-8-1778759014439","category":"社会","title":"小学館の元従業員が過去に性的トラブル——小学館が報道を認めて謝罪","summary":"小学館の漫画サイト「マンガワン」で原作者問題が浮上していた（3/2）矢先、同社の元従業員が過去に複数の性的トラブルを起こしていたことが報じられた。小学館は報道を認め謝罪を発表。出版業界を揺るがす問題として全国紙・週刊誌で広く報道された。","date":"2026年3月11日（水）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"経済-9-1778759014439","category":"経済","title":"ホンダが2026年3月期に最大6900億円の赤字見通しを発表——上場以来初の最終赤字","summary":"ホンダは2026年3月期の純損益が最大6900億円の赤字になる見通しを発表した。赤字転落は上場以来初めて。米トランプ政権がEV推進策を撤回し環境規制も大幅に緩和したことでEV市場が急縮小、EV3車種の開発中止も合わせて表明した。ソニーとの合弁会社ソニー・ホンダモビリティもEV開発・発売の中止を検討するとした。","date":"2026年3月12日（木）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"政治-10-1778759014439","category":"政治","title":"高市首相が「自衛隊による機雷除去は想定していない」と国会で答弁——ホルムズ対応を明確化","summary":"高市早苗首相は参院予算委員会で、ホルムズ海峡封鎖への対応として自衛隊が機雷除去を行うことは「想定していない」と明言した。トランプ大統領から軍艦派遣への貢献を求められる中、憲法・法制上の制約を踏まえた日本の姿勢を明確にした答弁として注目された。","date":"2026年3月12日（木）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"政治-11-1778759014439","category":"政治","title":"社会保障国民会議の実務者会議が初会合——自民・維新・国民民主・チームみらいが参加","summary":"政府・与野党による社会保障国民会議の実務者会議が初会合を開いた。自由民主党、日本維新の会、国民民主党、チームみらいの4党・会派が参加し、急速な少子高齢化に対応した社会保障制度の見直しに向けて協議を本格化させる。エネルギー危機のさなかにも内政課題への対応が動き出した。","date":"2026年3月12日（木）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%81%AE%E6%97%A5%E6%9C%AC","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-12-1778759014439","category":"芸能・エンタメ・ゴシップ","title":"第49回日本アカデミー賞授賞式で「国宝」が最多10冠——吉沢亮が主演男優賞、倍賞千恵子が主演女優賞","summary":"第49回日本アカデミー賞の授賞式がグランドプリンスホテル新高輪で行われ、歌舞伎界の愛憎を描いた「国宝」が作品賞・監督賞（李相日）・主演男優賞（吉沢亮）など最多10冠に輝いた。主演女優賞には「TOKYOタクシー」の倍賞千恵子が受賞。邦画実写の歴代興行収入1位を記録した「国宝」が映画賞でも席巻した。","date":"2026年3月13日（金）","source":"https://natalie.mu/eiga/news/663573","confidence":"高"},{"id":"政治-13-1778759014439","category":"政治","title":"2026年度予算案が衆院本会議で可決——11年ぶりに4月成立見込みの異例の展開","summary":"2026年度当初予算案（総額122兆3092億円）が衆院本会議で可決され、参議院での審議に移行した。ホルムズ海峡封鎖をめぐる安全保障・エネルギー対策費が膨らんだ過去最大の予算で、審議が長引いたため衆院通過が3月となり、最終成立は4月にずれ込むことが確実となった。","date":"2026年3月13日（金）","source":"https://www.policynews.jp/schedule/2026/3.html","confidence":"高"},{"id":"政治-14-1778759014439","category":"政治","title":"中道改革連合が政治資金パーティーを容認・奨励する見解を発表——立憲時代の禁止路線から転換","summary":"旧立憲民主党と旧公明党が合流して発足した中道改革連合が、政治資金パーティーの開催を容認・奨励する方針を発表した。立憲民主党時代に「禁止」を掲げてきた路線からの大転換として、党内外から賛否両論が巻き起こった。","date":"2026年3月13日（金）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"テクノロジー-15-1778759014439","category":"テクノロジー","title":"ポケモン新作ゲームが異例の大ヒット——任天堂の株価が急騰","summary":"任天堂が発売したポケットモンスター最新作が発売直後から異例のヒットを記録し、任天堂の株価が急騰した。Switch向けの最新タイトルとして注目を集め、初動販売本数が歴代シリーズでもトップクラスとなったことが市場に好感された。","date":"2026年3月13日（金）","source":"https://news-database.com/2026-03/","confidence":"高"},{"id":"スポーツ-16-1778759014439","category":"スポーツ","title":"ミラノ・コルティナ冬季パラリンピックが閉幕——日本は銀3・銅1の計4個、金メダルなし","summary":"ミラノ・コルティナ冬季パラリンピックが閉幕した。史上最多となる611選手が参加し、日本は銀メダル3個（村岡桃佳2個・小栗大地1個）、銅メダル1個（鈴木猛史）の計4個を獲得した。金メダルなしは2002年ソルトレークシティー大会以来で、メダルの内訳は前回に比べ苦しい結果となった。","date":"2026年3月14日（土）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"経済-18-1778759014439","category":"経済","title":"日韓財務対話で円・ウォン安に「深刻な懸念」を共有——中東緊迫化でエネルギー供給も連携","summary":"日本と韓国の財務当局が財務対話を実施し、ホルムズ海峡封鎖による原油高を背景とした円安・ウォン安の急速な進行について「深刻な懸念」を共有した。あわせて中東情勢の緊迫化を受けたエネルギー供給の安定確保に向けて日韓両国が連携強化を確認した。","date":"2026年3月14日（土）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"経済-0-1778759882304","category":"経済","title":"日本の海運大手3社がホルムズ海峡航行を停止——日本航空もドーハ線を欠航", 304","category":"経済","title":"大手海上保険会社が「戦争リスク保険」の引き受けを一斉停止——ホルムズ封鎖が実質化","summary":"ホルムズ海峡の情勢悪化を受け、大手海上保険会社が一斉に戦争リスク保険の引き受けを停止した。保険なしでは船主はリスクを負えないため、世界大手4海運会社および日本郵船・川崎汽船も相次いで海峡通過を停止。経済的封鎖が完全に現実のものとなった。","date":"2026年3月5日（木）","source":"https://f-p.jp/media/article/report-on-the-surge-in-crude-oil-prices/","confidence":"高"},{"id":"スポーツ-13-1778759882304","category":"スポーツ","title":"第6回WBCが4都市で開幕——侍ジャパンは6日の東京ドームで2連覇へ向け始動","summary":"第6回ワールド・ベースボール・クラシック（WBC）が東京・プエルトリコ・ヒューストン・マイアミの4会場で開幕した。日本代表「侍ジャパン」（井端弘和監督）はプールC組として翌6日に東京ドームで台湾との初戦に臨む。全試合がNetflixで独占配信され地上波放送は行われない。","date":"2026年3月5日（木）","source":"https://www.2026wbc.jp/","confidence":"高"},{"id":"経済-14-1778759882304","category":"経済","title":"東京株が急反発——一時2300円超高、イラン攻撃直後の急落からの反動","summary":"東京株式市場の日経平均株価は、ホルムズ海峡封鎖への警戒から前週に急落した反動で一時2300円超の大幅高となった。ただし戦況の見通しが不透明なため、その後も乱高下が続いた。","date":"2026年3月5日（木）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"スポーツ-15-1778759882304","category":"スポーツ","title":"WBC初戦・日本が台湾を13-0で7回コールド圧勝——大谷翔平が満塁弾含む5打点の大活躍","summary":"WBC1次ラウンドC組の第1戦が東京ドームで行われ、日本は台湾に13-0で7回コールド勝ちを収めた。大谷翔平選手が2回に満塁本塁打を放つなど5打席3安打5打点の圧巻の内容で試合を支配。山本由伸が先発し3回無安打の完璧な投球を見せた。","date":"2026年3月6日（金）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"政治-16-1778759882304","category":"政治","title":"カナダのカーニー首相が来日し高市首相と会談——経済安保対話・サイバー政策対話の新設で一致","summary":"新首相就任後初の外遊先として日本を選んだカナダのマーク・カーニー首相が来日し、高市早苗首相と首相官邸で会談した。両国は経済安全保障対話とサイバー政策対話を新設することで一致。ホルムズ海峡危機を受けたエネルギー安定供給の確保や重要鉱物サプライチェーンでの連携強化も確認した。","date":"2026年3月6日（金）","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高"},{"id":"経済-17-1778759882304","category":"経済","title":"産業競争力強化法改正案を閣議決定——国内投資促進へ法人税減税、脱中国供給網を後押し","summary":"政府は、ホルムズ海峡危機による中東依存リスクが高まる中、国内投資促進に向けた産業競争力強化法の改正案を閣議決定した。法人税の特別控除を拡充するなど企業の国内生産シフトを促す内容で、重要物資のサプライチェーン強靱化を急ぐ。","date":"2026年3月6日（金）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"経済-18-1778759882304","category":"経済","title":"デンソーがロームに買収提案——パワー半導体業界の再編加速か","summary":"トヨタグループの部品大手デンソーが、パワー半導体大手ロームへの買収提案を行っていることが明らかになった。EV普及の減速で市場が揺らぐ中、日本のパワー半導体業界の再編を加速させる可能性がある動きとして注目を集めた。","date":"2026年3月6日（金）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"経済-19-1778759882304","category":"経済","title":"「サナエトークン」発行中止——片山金融相が「適切に対応」と答弁","summary":"高市早苗首相の名を冠した暗号資産「サナエトークン」の発行計画が中止された。片山さつき金融相は国会で「適切に対応した」と答弁し、保有者への補償措置も講じられる方針が示された。政治家の名前を利用した暗号資産への規制・監督の在り方が問われた。","date":"2026年3月6日（金）","source":"https://www.jiji.com/jc/archives?g=eco_archive_1","confidence":"高"},{"id":"スポーツ-20-1778759882304","category":"スポーツ","title":"WBC第2戦・日本が韓国を8-6で下す——鈴木誠也が2本塁打4打点の殊勲","summary":"WBC1次ラウンドC組第2戦が東京ドームで行われ、日本は韓国に8-6で逆転勝利を収めた。1回に3点の先制を許す苦しい立ち上がりだったが、3回に大谷翔平のソロ本塁打などで逆転。鈴木誠也が2本の本塁打を含む4打点と大活躍し、2連勝でプールC突破に大きく前進した。","date":"2026年3月7日（土）","source":"https://www.showcase-tv.com/entertainment/wbc-2026-japan-results/","confidence":"高"},{"id":"スポーツ-0-1779069968854","category":"スポーツ","title":"ミラノ・コルティナ冬季五輪が閉幕 日本は金4・銀2・銅3で過去最多9個メダル獲得","summary":"2月6日から開催されていたミラノ・コルティナ冬季オリンピックが2月22日に閉幕した。日本は金メダル4個・銀メダル2個・銅メダル3個の計9個と過去最多のメダルを獲得。特にスノーボードでは戸塚優斗（HP金）、村瀬心椛（ビッグエア金）、深田茉莉（スロープスタイル金）、木村葵来など若手中心に活躍が目立った。","date":"2026年2月22日（日）","source":"https://www.olympics.com/ja/milano-cortina-2026/news/team-japan-five-gold-medal-moments-milano-cortina-2026","confidence":"高"},{"id":"スポーツ-1-1779069968854","category":"スポーツ","title":"ミラノ五輪フィギュア・エキシビションでりくりゅう・坂本花織らが演技披露 日本時間早朝に放送","summary":"ミラノ・コルティナ五輪の閉幕日に行われたフィギュアスケート・エキシビションガラに、ペア金メダルの三浦璃来・木原龍一組（りくりゅう）、坂本花織、中井亜美、鍵山優真、佐藤駿らが出演。日本時間2月22日早朝3時30分からテレビ東京系列・NHK BSで放送され、五輪期間の有終の美となった。","date":"2026年2月22日（日）","source":"https://www.olympics.com/ja/milano-cortina-2026/","confidence":"中"},{"id":"社会-2-1779069968854","category":"社会","title":"天皇誕生日 皇居で一般参賀 天皇皇后両陛下らがお出まし","summary":"2月23日は天皇誕生日で皇居では一般参賀が行われた。天皇皇后両陛下らが宮殿のベランダにお出ましになり、集まった一般参賀者から祝意が示された。今年で天皇陛下は66歳を迎えられた。","date":"2026年2月23日（月）","source":"https://www.kunaicho.go.jp/event/sanga.html","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-3-1779069968854","category":"芸能・エンタメ・ゴシップ","title":"LUNA SEAドラマー・真矢さんが死去 56歳 大腸がん・脳腫瘍で闘病中急変","summary":"ロックバンド「LUNA SEA」のドラマー・真矢さんが2月23日に死去した。56歳。2020年にステージ4の大腸がん、その後脳腫瘍でも闘病していた。バンド公式サイトは「懸命なリハビリを続け3月のライヴではドラムを叩くことを目指していた中、容体が急変し、あまりにも早い旅立ちでした」と伝えた。葬儀・告別式は近親者のみで済ませており、後日お別れ会を予定。","date":"2026年2月23日（月）","source":"https://barks.jp/news/1046337/","confidence":"高"},{"id":"政治-4-1779069968854","category":"政治","title":"高市首相が衆院代表質問で「非核三原則の堅持」を表明 官邸幹部の核保有発言に対応","summary":"高市早苗首相は2月24日の衆院本会議の代表質問で、安全保障政策担当の官邸幹部が昨年末に「核を持つべきだと思う」と発言したことを受け、「官邸筋から核保有に関する提言を受けたことはない」と否定。非核三原則の堅持も改めて表明した。施政方針演説（2月20日）に続く国会論戦の重要な答弁となった。","date":"2026年2月24日（火）","source":"https://www.tokyo-np.co.jp/article/472665","confidence":"高"},{"id":"経済-5-1779069968854","category":"経済","title":"国の借金 2025年末時点で1342兆円超 過去最大を更新 財務省発表","summary":"財務省は2月下旬、国債や借入金、政府短期証券を合計した「国の借金」が2025年末時点で1342兆1720億円になったと発表した。前年末から24兆5355億円増え過去最大を更新。国民1人当たりの借金額は約1080万円と試算される。高市政権の積極財政路線下で更なる増加が懸念されている。","date":"2026年2月24日（火）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高"},{"id":"経済-6-1779069968854","category":"経済","title":"海洋研究開発機構、南鳥島沖でレアアース泥の試掘に成功 水深5700mから回収","summary":"海洋研究開発機構（JAMSTEC）などが、東京都・南鳥島沖でのレアアース（希土類）を含む泥の試掘で、地球深部探査船「ちきゅう」による水深約5700メートルの海底から泥の回収に成功した。中国によるレアアース支配からの脱却を目指す経済安全保障上の重要なマイルストーン。商業生産の可能性が現実味を帯びる。","date":"2026年2月25日（水）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高"},{"id":"社会-7-1779069968854","category":"社会","title":"緊急避妊薬「ノルレボ」が市販薬に 全国約7000店の薬局で購入可能に 1錠7480円","summary":"望まない妊娠を防ぐために性交後に服用する緊急避妊薬「ノルレボ」が、市販薬として全国約7000店の薬局やドラッグストアで購入できるようになった。希望小売価格は1錠7480円。これまで医師の処方箋が必要だったが、女性の自己決定権を守る観点から長年議論されてきた市販化が実現した。","date":"2026年2月25日（水）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高"},{"id":"社会-8-1779069968854","category":"社会","title":"警察庁が2025年犯罪情勢を公表 刑法犯77万件で4年連続増加 特殊詐欺・SNS型詐欺急増","summary":"警察庁が公表した2025年の犯罪情勢統計によると、刑法犯認知件数は前年比4.9%増の77万4142件と4年連続で前年を上回った。特に特殊詐欺やSNS型投資・ロマンス詐欺の増加が著しく、被害額は前年の約1.6倍となった。デジタル犯罪への対応強化が課題として浮き彫りとなった。","date":"2026年2月26日（木）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高"},{"id":"スポーツ-9-1779069968854","category":"スポーツ","title":"卓球・張本美和が全日本選手権で史上初の4冠達成 ダブルス女子・混合で優勝","summary":"卓球の張本美和が全日本選手権で史上初の4冠を達成した。1月にシングルスの一般とジュニアを制していたが、2月にダブルスの女子と混合でも優勝。日本卓球界の新たな歴史を刻んだ。同選手は今後の世界選手権でも注目株となっている。","date":"2026年2月26日（木）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"中"},{"id":"政治-10-1779069968854","category":"政治","title":"中道改革連合の野田・斉藤共同代表が引責辞任 新代表に小川淳也氏選出","summary":"立憲民主党と公明党の衆院議員で結成された中道改革連合の野田佳彦と斉藤鉄夫の両共同代表が、2月8日の衆院選惨敗（公示前172議席から49議席に激減）の引責で辞任した。新代表に小川淳也氏が選出され、「中道」の旗を掲げ保守色の強い高市政権と対じする考えを示した。","date":"2026年2月26日（木）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高"},{"id":"経済-11-1779069968854","category":"経済","title":"消費減税より賃上げが重要 高市政権下の「成長と分配の好循環」課題 日本総研レポート","summary":"日本総合研究所が2月27日に公表した経済レポートで、高市政権の経済政策において「消費減税にかき消される賃上げの重要性」を指摘。「強い経済」実現のためには公約の食料品消費税ゼロより、実質賃金の安定的なプラス転換が優先課題と提言した。日銀の追加利上げ可能性にも言及。","date":"2026年2月27日（金）","source":"https://www.jri.co.jp/report/year/","confidence":"高"},{"id":"経済-12-1779069968854","category":"経済","title":"ビットコイン価格が下落・停滞局面入り ボラティリティの高さが改めて認識","summary":"日本総合研究所のエコノミスト・コラムによると、ビットコイン価格が下落・停滞局面に入った。過去数年の急騰局面から一転、価格変動性（ボラティリティ）の高さが投資家に改めて認識される展開。暗号資産規制をめぐる議論にも影響を与える可能性がある。","date":"2026年2月26日（木）","source":"https://www.jri.co.jp/report/year/","confidence":"中"},{"id":"テクノロジー-13-1779069968854","category":"テクノロジー","title":"米国の「雇用なき成長」の裏にAIの影 ホワイトカラー業種で既に雇用減少","summary":"日本総合研究所のリサーチ・アイ（2月25日公表）によると、米国経済では実質GDP成長率が堅調を維持する一方、AIによる効率化で雇用は伸び悩む「雇用なき成長」現象が顕在化。特にホワイトカラー業種では既に雇用減少が始まっている。日本企業の経営戦略にも示唆を与える分析として注目された。","date":"2026年2月25日（水）","source":"https://www.jri.co.jp/report/year/","confidence":"中"},{"id":"国際-14-1779069968854","category":"国際","title":"米国とイスラエルがイランを攻撃 ハメネイ師ら高官多数死亡 ホルムズ海峡封鎖へ","summary":"2026年2月28日（土）、イスラエルと米国がイランの核関連施設・革命防衛隊司令部・弾道ミサイル製造拠点などへの大規模な軍事攻撃作戦（コードネーム「獅子の雄たけび」「エピック・フューリー作戦」「ユダの盾作戦」）を開始した。攻撃でイラン最高指導者ハメネイ師ら高官が多数死亡。イラン側は対抗措置として、イスラエル・ドバイ・アブダビ等米軍基地などを報復攻撃し、ホルムズ海峡の封鎖を発表した。","date":"2026年2月28日（土）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%82%A4%E3%82%B9%E3%83%A9%E3%82%A8%E3%83%AB%E3%81%A8%E3%82%A2%E3%83%A1%E3%83%AA%E3%82%AB%E5%90%88%E8%A1%86%E5%9B%BD%E3%81%AB%E3%82%88%E3%82%8B%E3%82%A4%E3%83%A9%E3%83%B3%E6%94%BB%E6%92%83","confidence":"高"},{"id":"政治-15-1779069968854","category":"政治","title":"高市首相がイラン情勢で官邸に情報連絡室設置 国家安全保障会議を緊急開催","summary":"米イスラエルによるイラン攻撃の第一報を受け、高市首相は2月28日16時に官邸にイラン情勢に関する情報連絡室を設置。関係省庁に情報収集の徹底と現地邦人の安全確保を指示した。同夜には関係閣僚による国家安全保障会議の臨時会合を開催。茂木外相を本部長とする外務省対策本部も立ち上げ、邦人退避の準備を進めるとした。","date":"2026年2月28日（土）","source":"https://www.kantei.go.jp/jp/105/statement/2026/0228kaiken.html","confidence":"高"},{"id":"政治-16-1779069968854","category":"政治","title":"高市首相がイラン攻撃発生時に石川県馳浩氏応援演説 急遽羽田に戻り官邸対応","summary":"イラン攻撃発生の2月28日、高市首相は石川県知事選の候補者・馳浩氏の応援演説のため羽田空港から民間機で金沢に移動していた。攻撃の第一報を受けて急遽予定を切り上げ、官邸に戻って記者会見を行い、情報連絡室設置を発表。緊急時の総理動静をめぐり議論を呼んだ。","date":"2026年2月28日（土）","source":"https://www.tokyo-np.co.jp/article/472665","confidence":"高"},{"id":"国際-17-1779069968854","category":"国際","title":"外務省が中東地域への渡航注意喚起 米軍施設等への接近を控えるよう呼びかけ","summary":"外務省は2月28日付で海外安全ホームページに「イランへの攻撃に伴う注意喚起」を発出。現地滞在中の邦人に「複数の情報源から最新情報を収集し、米国の軍事施設等に近づかない等、自らの安全確保に努める」よう呼びかけた。米本土を含む中東地域外でも不測の事態への警戒を求めた。","date":"2026年2月28日（土）","source":"https://www.anzen.mofa.go.jp/info/pcwideareaspecificinfo_2026C017.html","confidence":"高"},{"id":"経済-18-1779069968854","category":"経済","title":"イラン攻撃でホルムズ海峡実質航行不能 日本経済への影響懸念 電気・ガス料金補助の拡充も視野","summary":"野村証券チーフ・マーケット・エコノミストの岡崎康平氏の分析によれば、ホルムズ海峡の実質航行不能化は中東依存度の高い日本経済に一定の影響が見込まれる。エネルギー価格高騰への懸念から、2026年1-3月使用分に適用されている電気・ガス料金補助金の拡充・延長が政府で議論される可能性。2025年度予算予備費約8,600億円が財源として残っている。","date":"2026年2月28日（土）","source":"https://www.nomura.co.jp/wealthstyle/article/0625/","confidence":"高"},{"id":"政治-19-1779069968854","category":"政治","title":"茂木外相を本部長とする外務省対策本部が立ち上げ 邦人保護に万全期す","summary":"イラン攻撃を受け、外務省は2月28日に茂木敏充外相を本部長とする対策本部を立ち上げた。高市首相からの指示を踏まえ、関係国等とも緊密に意思疎通を行って情報収集を徹底し、関係省庁とも連携の上、邦人保護に万全を期す方針。深夜から未明にかけて関係省庁による継続的な対応が続いた。","date":"2026年2月28日（土）","source":"https://j-defense.ikaros.jp/docs/mod/004742.html","confidence":"高"},{"id":"スポーツ-20-1779069968854","category":"スポーツ","title":"村瀬心椛のビッグエア金メダル 日本女子スノーボード初の快挙","summary":"ミラノ・コルティナ五輪閉幕直前に達成された村瀬心椛（ここも）のビッグエア金メダルが、改めて評価された。日本女子スノーボード史上初の金メダルで、前回北京五輪での銅から大幅な飛躍。閉幕後も特集記事が相次ぎ、若手育成と競技人気の象徴的な成果として位置づけられた。","date":"2026年2月22日（日）","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高"},{"id":"スポーツ-21-1779069968854","category":"スポーツ","title":"スノボ女子スロープスタイルで深田茉莉が金メダル 村瀬心椛も銅で表彰台2人","summary":"ミラノ・コルティナ五輪女子スノーボード・スロープスタイル決勝で、深田茉莉が前回優勝者のゾイ・サドウスキ＝シノット（NZ）を僅差で破り金メダルを獲得した。ビッグエア金メダリストの村瀬心椛も銅メダルとなり、日本人選手2人が表彰台に上がるダブル快挙となった。","date":"2026年2月22日（日）","source":"https://www.olympics.com/ja/milano-cortina-2026/news/team-japan-five-gold-medal-moments-milano-cortina-2026","confidence":"高"},{"id":"テクノロジー-22-1779069968854","category":"テクノロジー","title":"高市政権が日本成長戦略で17の戦略分野を提示 量子・航空宇宙・コンテンツ・創薬など","summary":"高市首相は2月20日の施政方針演説で「日本成長戦略」を提示。量子、航空・宇宙、コンテンツ、創薬など17の戦略分野について、大胆な投資促進・国際展開支援・人材育成・研究開発・産学連携・国際標準化・規制改革といった総合支援策を講じる方針を示した。週内は具体施策が議論された。","date":"2026年2月25日（水）","source":"https://www.kantei.go.jp/jp/105/statement/2026/0220shiseihoshin.html","confidence":"中"},{"id":"社会-23-1779069968854","category":"社会","title":"夫婦別姓・皇室典範改正など 国会で議論加速 高市首相が施政方針で表明","summary":"高市首相は施政方針演説で「皇室典範の改正に向け、安定的な皇位継承等の在り方に関する議論が深まることを期待」と表明。週内の代表質問では選択的夫婦別姓制度を含む家族法制の見直しに関しても各党が論戦を展開。社会保守色の強い高市政権下での議論進展が注目される。","date":"2026年2月24日（火）","source":"https://www.kantei.go.jp/jp/105/statement/2026/0220shiseihoshin.html","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-24-1779069968854","category":"芸能・エンタメ・ゴシップ","title":"りくりゅう・三浦璃来・木原龍一組の金メダル余韻続く SP5位から逆転V「阿吽の呼吸が少しずれて」","summary":"ミラノ・コルティナ五輪フィギュアスケート・ペアで金メダルを獲得した三浦璃来・木原龍一組（りくりゅう）の話題が継続的に注目された。SP5位の悔しさからフリーで歴代最高得点更新の大逆転優勝。週末のエキシビションでも演技を披露。リフトのミスから巻き返した姿に多くのファンが感動した。","date":"2026年2月22日（日）","source":"https://www.olympics.com/ja/milano-cortina-2026/news/team-japan-five-gold-medal-moments-milano-cortina-2026","confidence":"高"},{"id":"芸能・エンタメ・ゴシップ-25-1779069968854","category":"芸能・エンタメ・ゴシップ","title":"声優・前田ゆきえさん（52）が2月末で芸能界引退を発表 「ぷよぷよ」フェーリ役など","summary":"声優の前田ゆきえさん（52）が2026年2月末をもって芸能界引退を発表した。代表作はゲーム「ぷよぷよ」のフェーリ役、アニメ「超ロボット生命体トランスフォーマー マイクロン伝説」のカルロス・アーシー役など。長年にわたって活動してきた声優の引退は、ファンに大きな反響を呼んでいる。","date":"2026年2月28日（土）","source":"https://ami-gonag50.hatenablog.com/entry/2026/01/11/065623","confidence":"中"},{"id":"芸能・エンタメ・ゴシップ-26-1779069968854","category":"芸能・エンタメ・ゴシップ","title":"声優・神谷明（79）が山崎和佳奈さんを追悼ブログで言及 4月の発表前に交流","summary":"声優の神谷明（79）が2月中旬に自身のブログを更新し、共演者である声優について複数言及した。週内はベテラン声優の動向が芸能ファンの間で話題に。LUNA SEA真矢の訃報と合わせて、業界の世代交代が改めて意識される展開となった。","date":"2026年2月25日（水）","source":"https://www.oricon.co.jp/entertainment/","confidence":"中"},{"id":"経済-27-1779069968855","category":"経済","title":"銀行部門の国債保有減少で預金減少圧力強まる 日本総研リサーチ・アイ","summary":"日本総合研究所の大嶋秀雄氏が2月24日公表のリサーチ・アイで、銀行部門の国債保有減少により預金減少圧力が強まると指摘。「銀行では安定的な預金獲得と資産負債管理（ALM）が重要になる」と分析。低金利環境からの脱却過程で銀行業界の経営戦略変更が求められている状況を解説した。","date":"2026年2月24日（火）","source":"https://www.jri.co.jp/report/year/","confidence":"中"},{"id":"国際-28-1779069968855","category":"国際","title":"イラン報復で中東諸国で被害 米軍基地や民間施設にミサイル イスラエル・ドバイ・アブダビでも被害","summary":"2月28日の米イスラエルによる攻撃を受け、イラン側は対抗措置として中東各地の米軍駐留基地や民間施設をミサイル攻撃した。イスラエル各地、ドバイ、アブダビなどで被害が報じられたほか、シリアではイランのミサイルにより4名が死亡。事態は周辺国を巻き込む形で急速に拡大した。","date":"2026年2月28日（土）","source":"https://ja.wikipedia.org/wiki/2026%E5%B9%B4%E3%82%A4%E3%82%B9%E3%83%A9%E3%82%A8%E3%83%AB%E3%81%A8%E3%82%A2%E3%83%A1%E3%83%AA%E3%82%AB%E5%90%88%E8%A1%86%E5%9B%BD%E3%81%AB%E3%82%88%E3%82%8B%E3%82%A4%E3%83%A9%E3%83%B3%E6%94%BB%E6%92%83","confidence":"高"},{"id":"社会-29-1779069968855","category":"社会","title":"全国の桜前線予測 ウェザーニュース等が2026年春の開花予報を発表","summary":"ウェザーニュースなど各社が2月下旬に全国の2026年春の桜開花予報を発表した。東京は3月下旬の平年並み、各地で平年並みからやや早い開花が予想される。インバウンド観光業界や花見イベント関係者にとって重要な指標となる予報で、メディアで広く報じられた。","date":"2026年2月26日（木）","source":"https://weathernews.jp/","confidence":"中"}];
var CATS=["経済","政治","芸能・エンタメ・ゴシップ","スポーツ","テクノロジー","社会","国際"];
var CC={"経済":"#2980b9","政治":"#8e44ad","芸能・エンタメ・ゴシップ":"#e91e8c","スポーツ":"#16a085","テクノロジー":"#2c3e50","社会":"#7f8c8d","国際":"#d35400"};
var CFC={"高":"#27ae60","中":"#f39c12","低":"#e74c3c","未検証":"#95a5a6"};
var st={fCat:"すべて",fConf:"すべて",fYear:"すべて",fMonth:"すべて",sort:"desc",q:""};
function pd(l){if(!l)return null;var s=l.replace(/（.）/,"");var m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);if(!m)return null;return{y:m[1],mo:m[2],d:m[3]};}
function dn(l){var p=pd(l);if(!p)return 0;return Number(p.y)*10000+Number(p.mo)*100+Number(p.d);}
function esc(s){return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function hl(t,q){if(!q||!q.trim())return esc(t);var kw=q.trim();var lo=t.toLowerCase();var lk=kw.toLowerCase();var o="",i=0,idx,n=0;while((idx=lo.indexOf(lk,i))!==-1&&n<50){if(idx>i)o+=esc(t.slice(i,idx));o+="<mark>"+esc(t.slice(idx,idx+kw.length))+"</mark>";i=idx+kw.length;n++;}if(i<t.length)o+=esc(t.slice(i));return o;}
function uniq(a){return Array.from(new Set(a));}
function filtered(){var qt=st.q.trim().toLowerCase();return DATA.filter(function(n){var p=pd(n.date);var cf=n.confidence||"未検証";return(st.fCat==="すべて"||n.category===st.fCat)&&(st.fConf==="すべて"||cf===st.fConf)&&(st.fYear==="すべて"||(p&&p.y===st.fYear))&&(st.fMonth==="すべて"||(p&&p.mo===st.fMonth))&&(!qt||n.title.toLowerCase().indexOf(qt)>=0||n.summary.toLowerCase().indexOf(qt)>=0);}).sort(function(a,b){var c=st.sort==="desc"?dn(b.date)-dn(a.date):dn(a.date)-dn(b.date);return c!==0?c:a.category.localeCompare(b.category);});}
function render(){
  document.getElementById("totalNum").textContent=DATA.length;
  var years=uniq(DATA.map(function(n){var p=pd(n.date);return p?p.y:null;}).filter(Boolean)).sort(function(a,b){return b.localeCompare(a);});
  var months=uniq(DATA.filter(function(n){if(st.fYear==="すべて")return true;var p=pd(n.date);return p&&p.y===st.fYear;}).map(function(n){var p=pd(n.date);return p?p.mo:null;}).filter(Boolean)).sort(function(a,b){return Number(a)-Number(b);});
  var fCatEl=document.getElementById("fCat");
  fCatEl.innerHTML='<option value="すべて">カテゴリ</option>';
  CATS.forEach(function(c){fCatEl.innerHTML+='<option value="'+c+'"'+(st.fCat===c?" selected":"")+'>'+c+'</option>';});
  var fYearEl=document.getElementById("fYear");
  fYearEl.innerHTML='<option value="すべて">年</option>';
  years.forEach(function(y){fYearEl.innerHTML+='<option value="'+y+'"'+(st.fYear===y?" selected":"")+'>'+y+'年</option>';});
  var fMonthEl=document.getElementById("fMonth");
  fMonthEl.innerHTML='<option value="すべて">月</option>';
  months.forEach(function(m){fMonthEl.innerHTML+='<option value="'+m+'"'+(st.fMonth===m?" selected":"")+'>'+m+'月</option>';});
  document.getElementById("q").value=st.q;
  document.getElementById("sortBtn").textContent=st.sort==="desc"?"↓新しい順":"↑古い順";
  var f=filtered();
  document.getElementById("cnt").textContent=f.length+"件 / 全"+DATA.length+"件";
  var list=document.getElementById("list");
  if(f.length===0){list.innerHTML='<div class="empty">条件に一致するニュースがありません</div>';return;}
  var html="";
  f.forEach(function(item,idx){
    var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
    html+='<div class="card" data-idx="'+idx+'"><div class="bar" style="background:'+c+'"></div><div class="body"><div class="meta"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">'+esc((item.date||"").replace(/（.）/,""))+'</span><span class="cf" style="color:'+cfc+'"><span class="dot" style="background:'+cfc+'"></span>'+esc(cf)+'</span>'+(hasSrc?'<span style="color:#2980b9;font-size:10px">🔗</span>':"")+' </div><p class="tt">'+hl(item.title,st.q)+'</p><p class="sm">'+hl(item.summary,st.q)+'</p></div></div>';
  });
  list.innerHTML=html;
  Array.prototype.forEach.call(document.querySelectorAll(".card"),function(el){
    el.addEventListener("click",function(){openDetail(f[Number(el.getAttribute("data-idx"))]);});
  });
}
function openDetail(item){
  var c=CC[item.category]||"#555";var cf=item.confidence||"未検証";var cfc=CFC[cf]||"#95a5a6";var hasSrc=item.source&&item.source.trim();
  var dlg=document.getElementById("dlg");
  dlg.innerHTML='<div class="top" style="background:'+c+'"></div><div class="pad"><div class="hd"><div class="meta2"><span class="tag" style="background:'+c+'18;color:'+c+'">'+esc(item.category)+'</span><span class="dt">📅 '+esc((item.date||"").replace(/（.）/,""))+'</span></div><button class="cls" id="closeBtn">×</button></div><h3>'+hl(item.title,st.q)+'</h3><div class="sm2">'+hl(item.summary,st.q)+'</div>'+(hasSrc?'<div class="src"><div style="font-size:10px;color:var(--tx2);margin-bottom:3px;font-weight:600">📎 ソース</div><a href="'+esc(item.source)+'" target="_blank" rel="noopener noreferrer">'+esc(item.source)+'</a></div>':"")+' <div class="ft"><button class="cp" id="cpBtn">📋 内容をコピー</button></div><p class="note">背景クリック または ×で閉じる</p></div>';
  document.getElementById("modal").classList.add("open");
  document.getElementById("closeBtn").addEventListener("click",closeDetail);
  document.getElementById("cpBtn").addEventListener("click",function(){
    var txt="【"+item.category+"】"+item.title+"\n"+(item.date||"")+"\n\n"+item.summary+(hasSrc?"\n\nソース: "+item.source:"");
    if(navigator.clipboard)navigator.clipboard.writeText(txt);
    var b=document.getElementById("cpBtn");b.textContent="コピー済み ✓";b.classList.add("done");
    setTimeout(function(){if(document.getElementById("cpBtn")){document.getElementById("cpBtn").textContent="📋 内容をコピー";document.getElementById("cpBtn").classList.remove("done");}},1800);
  });
}
function closeDetail(){document.getElementById("modal").classList.remove("open");document.getElementById("dlg").innerHTML="";}
document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeDetail();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeDetail();});
document.getElementById("fCat").addEventListener("change",function(e){st.fCat=e.target.value;render();});
document.getElementById("fConf").addEventListener("change",function(e){st.fConf=e.target.value;render();});
document.getElementById("fYear").addEventListener("change",function(e){st.fYear=e.target.value;st.fMonth="すべて";render();});
document.getElementById("fMonth").addEventListener("change",function(e){st.fMonth=e.target.value;render();});
document.getElementById("q").addEventListener("input",function(e){st.q=e.target.value;render();});
document.getElementById("sortBtn").addEventListener("click",function(){st.sort=st.sort==="desc"?"asc":"desc";render();});
render();
</script>
</body>
</html>
