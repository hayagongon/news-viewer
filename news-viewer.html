p/news/71192/full/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000010-b9c0d","category":"社会","title":"新型インフルエンザ（H1N1）が日本上陸、兵庫・大阪の高校生に国内初感染","summary":"2009年5月16日、兵庫県神戸市の高校生に国内初の新型インフルエンザ（H1N1、豚インフルエンザ）感染が確認され、大阪・兵庫を中心に急速拡大。学校閉鎖・マスク品薄が社会問題に。WHOは6月11日にパンデミックを宣言した。","date":"2009年5月","source":"https://www.caicm.go.jp/houdou/article/feature/backnumber/kako_05.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000011-e1f2g","category":"社会","title":"裁判員制度スタート、市民が刑事裁判に参加","summary":"2009年5月21日、裁判員制度が施行された。一般市民が刑事裁判の審理・評決に参加する制度で、同年8月3日に東京地裁で初の裁判員裁判が開かれた。市民参加型司法の始まりとして注目を集めた。","date":"2009年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000012-h3i4j","category":"国際","title":"北朝鮮が第2回核実験・弾道ミサイルを連続発射、国連が制裁決議","summary":"2009年5月25日、北朝鮮が咸鏡北道豊渓里で第2回目の地下核実験を実施。同日には弾道ミサイル3発も発射した。国連安全保障理事会は決議1874で新たな制裁を採択。東アジアの安全保障環境を揺るがした。","date":"2009年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000013-k5l6m","category":"社会","title":"足利事件・菅家利和が約19年ぶりに釈放、DNA再鑑定で冤罪と判明","summary":"2009年6月4日、栃木県足利市で1990年に発生した幼女殺害事件で服役していた菅家利和さんが約19年ぶりに釈放された。DNA再鑑定で犯人のものと一致しないことが判明。同年6月23日に東京高裁が再審開始を決定し、後に無罪が確定した。","date":"2009年6月","source":"https://www.afpbb.com/articles/-/2608873","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000014-n7o8p","category":"芸能・エンタメ・ゴシップ","title":"マイケル・ジャクソン死去、50歳　急性プロポフォール中毒","summary":"2009年6月25日、「キング・オブ・ポップ」マイケル・ジャクソンがロサンゼルスの自宅で急死。50歳。主治医による麻酔薬プロポフォールの過剰投与が直接の死因と判明。世界中がその死を悼み、日本でも追悼イベントが相次いだ。","date":"2009年6月","source":"https://www.afpbb.com/articles/-/2635316","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000015-q9r0s","category":"芸能・エンタメ・ゴシップ","title":"AKB48第1回選抜総選挙、前田敦子が1位　ファン投票型イベントが話題に","summary":"2009年7月8日、AKB48の第1回選抜総選挙が開票。前田敦子が1位（16,356票）を獲得した。シングルの選抜メンバーをファンの投票で決める斬新な仕組みが話題を呼び、以後毎年恒例のイベントとなってAKB人気を加速させた。","date":"2009年7月","source":"","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751200000016-t1u2v","category":"テクノロジー","title":"国際宇宙ステーション「きぼう」が完成、日本の宇宙実験棟","summary":"2009年7月、国際宇宙ステーション（ISS）に設置された日本実験棟「きぼう」が完成した。1985年の計画決定から約24年越しの完成で、日本の宇宙開発における一大マイルストーンとなった。","date":"2009年7月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000017-w3x4y","category":"社会","title":"皆既日食、21世紀最長の6分超　トカラ列島に観測客が殺到","summary":"2009年7月22日、21世紀で最も継続時間の長い皆既日食が観測された（日食帯最長約6分44秒）。鹿児島県のトカラ列島・悪石島などが観測スポットとなり、全国からファンが詰めかけた。日本列島では日食ブームが起き、観測グッズが飛ぶように売れた。","date":"2009年7月","source":"https://www.nao.ac.jp/phenomena/20090722/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000018-z5a6b","category":"芸能・エンタメ・ゴシップ","title":"押尾学、六本木ヒルズで女性死亡の事件　麻薬使用で逮捕","summary":"2009年8月2日、俳優・押尾学が六本木ヒルズのマンションで合成麻薬MDMAを使用し、同席した女性（田中香織さん、30歳）が死亡。翌3日に麻薬及び向精神薬取締法違反で逮捕された。後の裁判で保護責任者遺棄罪による実刑判決が確定した。","date":"2009年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000019-c7d8e","category":"芸能・エンタメ・ゴシップ","title":"酒井法子、覚醒剤所持で逮捕　夫の逮捕後に6日間行方不明","summary":"2009年8月3日に夫・高相祐一が覚醒剤所持で逮捕された後、酒井法子が6日間行方不明に。8月8日夜に警察に出頭し覚せい剤取締法違反（所持・使用）容疑で逮捕。「のりピー」の転落は「のり押し事件」と呼ばれ2009年最大の芸能スキャンダルとなった。","date":"2009年8月","source":"https://www.afpbb.com/articles/-/2628848","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751200000020-f9g0h","category":"スポーツ","title":"イチロー、9年連続200本安打の大リーグ新記録　ウィリー・キーラーの8年連続を更新","summary":"2009年9月14日（現地）、シアトル・マリナーズのイチロー選手がテキサス・レンジャーズ戦で大リーグ移籍後9年連続のシーズン200本安打を達成。ウィリー・キーラーの8年連続という大リーグ記録を更新した前人未到の快挙。","date":"2009年9月","source":"https://www.ninomiyasports.com/archives/3416","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000021-i1j2k","category":"政治","title":"衆院選で民主党が308議席の歴史的大勝、55年体制以来の本格的政権交代","summary":"2009年8月30日の第45回衆議院議員総選挙で民主党が308議席を獲得し圧勝。自民党は公示前の300議席から119議席に激減し野党に転落。1955年以来続いた自民党長期政権が終わり、戦後2例目の本格政権交代が実現した。","date":"2009年8月","source":"https://news.livedoor.com/article/detail/4525511/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000022-l3m4n","category":"政治","title":"鳩山由紀夫内閣発足、「友愛」掲げた民主党政権がスタート","summary":"2009年9月16日、民主・社民・国民新の3党連立による鳩山由紀夫内閣が発足。「友愛」「脱官僚」をスローガンに掲げ、子ども手当や高速道路無料化などを打ち出したが、普天間問題などで迷走し翌年6月に退陣した。","date":"2009年9月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000023-o5p6q","category":"政治","title":"中川昭一元財務相が急死、衆院選落選の34日後に自宅で","summary":"2009年10月3日夜（4日朝に発見）、8月の衆院選に落選していた中川昭一元財務相が東京の自宅で死亡しているのを発見された。56歳。死因は循環器系の異常とされたが特定されず、泥酔会見、選挙落選から急逝という転落ぶりが衝撃を与えた。","date":"2009年10月","source":"https://www.afpbb.com/articles/-/2649269","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000024-r7s8t","category":"国際","title":"オバマ大統領がノーベル平和賞受賞、就任9ヶ月での異例の受賞","summary":"2009年10月9日、就任からわずか9ヶ月のバラク・オバマ米大統領にノーベル平和賞が贈られた。「核兵器のない世界」を掲げた外交姿勢が評価されたが、アフガン増派中の受賞に「時期尚早」との批判も相次いだ。","date":"2009年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000025-u9v0w","category":"芸能・エンタメ・ゴシップ","title":"ドラマ「JIN-仁-」が大ヒット、最終回平均視聴率25.3%","summary":"2009年10月11日〜12月20日放送のTBSドラマ「JIN-仁-」（大沢たかお主演）が高視聴率を記録。現代外科医が江戸時代にタイムスリップする物語が話題を集め、最終回の平均視聴率は25.3%と民放2009年度最高を記録。2011年に完結編も放送された。","date":"2009年10月","source":"https://doraman.net/sp/200910/jin1.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000026-x1y2z","category":"政治","title":"事業仕分け・蓮舫「2位じゃダメなんですか」でスパコン予算を事実上凍結","summary":"2009年11月11日の行政刷新会議による「事業仕分け」で、蓮舫議員がスーパーコンピューター開発予算の審議中に「世界1位でなければいけないのか、2位じゃダメなんですか」と発言。「廃止」判定（後に折衷案）となり、研究者から猛反発が起きた。","date":"2009年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000027-a3b4c","category":"社会","title":"「草食男子」「歴女」「派遣切り」が流行語大賞　年間大賞は「政権交代」","summary":"2009年の新語・流行語大賞（年間大賞は「政権交代」）のトップテンに「草食男子」「歴女」「派遣切り」「新型インフルエンザ」「こども店長」などが選出。若者の恋愛観の変化、歴史ブーム、雇用問題など2009年の社会の断面を映した言葉が並んだ。","date":"2009年12月","source":"https://www.oricon.co.jp/news/71192/full/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000028-d5e6f","category":"社会","title":"ファストファッションブーム、FOREVER21原宿に旗艦店オープン","summary":"2009年10月、FOREVER21が原宿に日本最大の旗艦店をオープン。H&M（2008年銀座出店）とともに格安ファッションブームを牽引し、デフレ下でも「オシャレを楽しみたい」というニーズを取り込んだ。「ファストファッション」が流行語大賞にも選出された。","date":"2009年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751200000029-g7h8i","category":"テクノロジー","title":"Twitterが日本で急成長、有名人参加でフォロワー争いが話題に","summary":"2009年、Twitterが日本で急速に普及。芸能人・政治家が続々とアカウントを開設し、フォロワー数が話題になった。携帯電話からの利用も広がり、2010年には国内利用者が1000万人を超えた。翌年の「〜なう」文化の下地となった。","date":"2009年","source":"https://markezine.jp/article/detail/7384","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000001-a8k2p","category":"政治","title":"ガソリン暫定税率が3月末に失効、1ヶ月後に衆院再可決で復活","summary":"2008年3月31日、道路財源に上乗せされていたガソリン暫定税率（1リットル約25円）が34年ぶりに失効。4月から値下がりしたが、4月30日に自民・公明が衆院3分の2以上の賛成で再可決し、5月1日に値上がり。ガソリンスタンドの価格表示が1日で変わるなど混乱が続いた。","date":"2008年3月","source":"https://crd.ndl.go.jp/reference/entry/index.php?page=ref_view&id=1000043864","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000002-b3m7q","category":"政治","title":"橋下徹が大阪府知事選に当選、38歳タレント弁護士から府政へ","summary":"2008年1月27日、タレント弁護士の橋下徹が大阪府知事選で圧勝し、38歳での就任。府財政の立て直しを掲げ、職員基本条例や大阪都構想の原点となる改革を打ち出した。後の政界再編につながる転換点となった。","date":"2008年1月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000003-c5n9r","category":"政治","title":"福田康夫首相が突然辞任、「あなたとは違うんです」が話題に","summary":"2008年9月1日夜、福田康夫首相が突然の辞意表明記者会見。批判的な記者に対し「あなたとは違うんです」と言い放ったセリフが話題を呼んだ。後期高齢者医療制度への批判や「ねじれ国会」を乗り切れず、就任約1年での退陣となった。","date":"2008年9月","source":"https://www.pressnet.or.jp/publication/view/080916_180.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000004-d7p1s","category":"政治","title":"麻生太郎内閣発足、「漢字が読めない」発言で支持率急落","summary":"2008年9月24日、麻生太郎が第92代内閣総理大臣に就任。クイズ番組風の演出で人気を集めたが、漢字の誤読やホテルのバー通いが批判を浴び支持率が急落。翌年の衆院選で民主党に歴史的大敗を喫した。","date":"2008年9月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751200000005-e9q3t","category":"政治","title":"洞爺湖サミット（G8）、地球温暖化・食料・エネルギー問題を議論","summary":"2008年7月7〜9日、北海道洞爺湖で第34回G8サミットが開催。地球温暖化対策、食料・エネルギー価格高騰、アフリカ開発が主議題となった。福田康夫首相の議長国での最後の主要外交舞台となった。","date":"2008年7月","source":"https://www.mofa.go.jp/policy/economy/summit/2008/news/summary.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1751200000006-f2r5u","category":"経済","title":"原油が史上最高値バレル147ドル超、ガソリン・食料品が軒並み値上がり","summary":"2008年7月、原油先物価格がバレル147ドルを超える史上最高値を記録。ガソリン代・食料品・電気代など生活コストが急騰し、漁業者のストライキや運送業の値上げ要求が続出。秋以降にリーマンショックで急落した。","date":"2008年7月","source":"","confidence":"高","snippet":"","notes":""},{"id":"経済-1751200000007-g4s7v","category":"経済","title":"リーマン・ブラザーズが経営破綻、「100年に一度」の世界金融危機","summary":"2008年9月15日、米大手投資銀行リーマン・ブラザーズが連邦破産法を申請し経営破綻。世界的な金融危機「リーマンショック」が勃発し、日本でも株価が急落、輸出産業が打撃を受けた。非正規雇用の「派遣切り」が急増するなど実体経済にも波及した。","date":"2008年9月","source":"https://www.matsui.co.jp/money-satellite/column/beginner/us/cl-lehman-shock.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000008-h6t9w","category":"社会","title":"中国産冷凍餃子に農薬混入、日中食品安全問題が浮上","summary":"2008年1月、「ジェイティフーズ」（JT子会社）が販売した中国産冷凍餃子を食べた千葉・兵庫の家庭で10人が農薬メタミドホスの中毒症状を訴えた。中国製食品への不信が広がり、スーパーから冷凍餃子が消えた。犯人（中国人元従業員）の逮捕は2010年。","date":"2008年1月","source":"https://www.mhlw.go.jp/topics/bukyoku/iyaku/syoku-anzen/china-gyoza/dl/01.pdf","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000009-i8u1x","category":"社会","title":"マクドナルド店長「名ばかり管理職」訴訟で東京地裁が残業代支払い命令","summary":"2008年1月28日、東京地裁が日本マクドナルドの直営店店長を「管理職に当たらない」と認定し、約755万円の残業代支払いを命じる判決。「名ばかり管理職」という言葉が流行語となり、飲食・小売・サービス業全般で同様の問題が噴出した。","date":"2008年1月","source":"https://morisaki2024.com/?p=1834","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000010-j1v3y","category":"社会","title":"後期高齢者医療制度スタート、「姥捨て山」批判で大混乱","summary":"2008年4月、75歳以上を別の医療保険制度に区分けする後期高齢者医療制度が施行。「高齢者差別」「姥捨て山」と批判が殺到し、参院で廃止法案が可決されるなど政治問題化。福田内閣の支持率低下に直結した。","date":"2008年4月","source":"https://medical.nikkeibp.co.jp/leaf/mem/pub/blog/takenaka/200804/506192.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000011-k3w5z","category":"社会","title":"光市母子殺害事件の差し戻し審で死刑判決、「母性への回帰」弁護が大批判","summary":"2008年4月22日、広島高裁の差し戻し審で死刑判決（確定は2012年最高裁）。弁護団の「ドラえもん」「母性への回帰」論を展開した弁護戦略が視聴者の猛反発を招き、弁護士への懲戒請求運動が起きた。","date":"2008年4月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000012-l5x7a","category":"社会","title":"タスポ（たばこ自販機成人識別カード）全国導入、コンビニたばこが急増","summary":"2008年7月1日から全国でタスポ（TASPO）が導入され、自販機でのたばこ購入に成人認証カードが必須となった。申請が面倒なためコンビニへの流入が急増。セブン-イレブンのたばこ売上が急伸した。","date":"2008年7月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000013-m7y9b","category":"社会","title":"秋葉原通り魔事件、加藤智大がトラックで突入後にナイフで7人殺害","summary":"2008年6月8日（日曜）、歩行者天国の秋葉原に加藤智大が2トントラックで突入し、その後ナイフで通行人を次々と刺した。死者7人・重軽傷10人。犯人は「社会への復讐」をネット掲示板に書き込んでいた。死刑確定は2015年。","date":"2008年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000014-n9z1c","category":"社会","title":"岩手・宮城内陸地震（M7.2）、土砂崩れで死者・行方不明者23人","summary":"2008年6月14日、岩手・宮城県境付近でM7.2の地震が発生。大規模な土砂崩れが各地で起き、死者・行方不明者が23人に上った。宮城県栗原市の温泉施設が孤立するなどの被害も出た。","date":"2008年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000015-o2a3d","category":"社会","title":"H&M 銀座に日本1号店オープン、5000人以上が行列","summary":"2008年9月13日、スウェーデン発ファストファッション「H&M」が銀座に日本初上陸。開店前に5000人以上が行列を作り、ファストファッションブームの象徴となった。ZARAに続く欧州ブランドの大型上陸として注目された。","date":"2008年9月","source":"https://ginza.keizai.biz/headline/768/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000016-p4b5e","category":"社会","title":"三笠フーズが事故米を食用に不正転売、食の安全への不信が再燃","summary":"2008年9月5日、農薬・カビに汚染された「事故米」を大阪の三笠フーズが食用として転売していたことが農水省の調査で発覚。菓子・焼酎メーカーにも流通しており、各社の回収騒動に発展した。","date":"2008年9月","source":"https://www.j-cast.com/2008/09/10026673.html?p=all","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000017-q6c7f","category":"社会","title":"「ロス疑惑」三浦和義がサイパンで電撃逮捕、LA拘置所で死亡","summary":"2008年2月22日、日本では無罪確定済みの「ロス疑惑」事件について三浦和義が米当局にサイパンで逮捕され外交問題となった。ロサンゼルスに移送後、10月10日（現地時間）に拘置所で死亡が確認された（自殺として発表）。","date":"2008年2月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000018-r8d9g","category":"社会","title":"「蟹工船」が80年後にブレイク、派遣・ワーキングプアの若者が共感","summary":"2008年、小林多喜二が1929年に書いたプロレタリア文学「蟹工船」が若者を中心にベストセラーに。リーマンショック後の格差社会・非正規雇用問題を背景に、過酷な労働環境への共感が広がった。","date":"2008年","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000019-s1e2h","category":"社会","title":"「ゲリラ豪雨」が多発、局地的大雨が夏の新たな脅威に","summary":"2008年夏、突然の激しい局地的豪雨が都市部を中心に相次ぎ「ゲリラ豪雨」という言葉が定着。気象庁も「局地的大雨」として注意を促した。流行語大賞にもノミネートされた。","date":"2008年夏","source":"https://www.nippon.com/ja/features/h00064/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751200000020-t3f4i","category":"社会","title":"年越し派遣村、日比谷公園に約500人が集結、「派遣切り」が社会問題化","summary":"2008年12月31日〜2009年1月5日、リーマンショック後の派遣切りで仕事と住居を同時に失った労働者約499人が日比谷公園の「年越し派遣村」に集結。格差・貧困が可視化され、政府は公的施設を緊急開放した。","date":"2008年12月","source":"https://www.jcp.or.jp/akahata/aik07/2008-12-30/2008123001_01_0.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751200000021-u5g6j","category":"スポーツ","title":"北京オリンピック、北島康介が2大会連続2冠「何も言えねぇ」","summary":"2008年8月8〜24日の北京五輪で、北島康介が100m・200m平泳ぎを連覇し、史上初の平泳ぎ2大会連続2種目制覇を達成。100m優勝後の「何も言えねぇ」という言葉が日本中に響いた。日本は金9・銀6・銅10のメダルを獲得した。","date":"2008年8月","source":"https://www.joc.or.jp/games/olympic/beijing/sports/swimming/team/kitajimakosuke.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751200000022-v7h8k","category":"スポーツ","title":"石川遼、16歳でプロ転向・ツアー初優勝「はにかみ王子」フィーバー","summary":"2008年1月にゴルフ界史上最年少16歳でプロ転向を表明した石川遼が、11月2日のマイナビABCチャンピオンシップで公式ツアー初優勝。「はにかみ王子」の愛称でバラエティ・広告業界にも旋風を巻き起こした。","date":"2008年11月","source":"https://www.nippon.com/ja/japan-topics/today11020/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000023-w9i1l","category":"芸能・エンタメ・ゴシップ","title":"宮崎駿「崖の上のポニョ」公開、大橋のぞみ（8歳）の主題歌が大ヒット","summary":"2008年7月19日公開のスタジオジブリ映画。当時8歳の大橋のぞみが歌う主題歌が口ずさみやすいと大ヒットし、NHK紅白歌合戦にも出場。興行収入は155億円を超え、その年の国内映画興収第1位となった。","date":"2008年7月","source":"https://www.ghibli.jp/works/ponyo/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000024-x2j3m","category":"芸能・エンタメ・ゴシップ","title":"ドラマ「CHANGE」「コード・ブルー」が高視聴率、2008年フジ2大ドラマ","summary":"2008年上半期は木村拓哉主演「CHANGE」（5〜7月放送、最終回瞬間最高31.2%）、下半期は山下智久主演「コード・ブルー」（7〜9月放送）がフジテレビで相次いでヒット。医療ドラマの人気を確立し、シリーズ化された。","date":"2008年","source":"https://doraman.net/sp/200804/change.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000025-y4k5n","category":"芸能・エンタメ・ゴシップ","title":"エド・はるみ「グ〜！」で社会現象、流行語大賞を受賞","summary":"2008年、お笑い芸人エド・はるみの「グ〜！」ポーズがバラエティを席巻。2008年の新語・流行語大賞の年間大賞（「アラフォー」と並んで）を受賞した。一発屋的なブームも話題を呼んだ。","date":"2008年","source":"https://www.oricon.co.jp/news/60651/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000026-z6l7o","category":"芸能・エンタメ・ゴシップ","title":"「アラフォー」が流行語大賞、40歳前後女性を描くドラマがヒット","summary":"2008年、TBSドラマ「Around40」の影響で「アラフォー」（around forty）が流行語大賞年間大賞を受賞。40歳前後の女性を指す言葉として定着し、この世代に向けたCD・ファッション・旅行商品が相次いでヒットした。","date":"2008年","source":"https://www.oricon.co.jp/news/60651/full/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000027-a8m9p","category":"芸能・エンタメ・ゴシップ","title":"小室哲哉、楽曲著作権を偽り5億円詐取で逮捕","summary":"2008年11月4日、90年代J-POPを席巻した音楽プロデューサー小室哲哉が、所有権のない自作楽曲の著作権を譲渡すると偽って兵庫県の個人投資家から5億円を詐取した疑いで大阪地検に逮捕された。時代の寵児の転落ぶりが衝撃を与えた。","date":"2008年11月","source":"https://natalie.mu/music/news/10678","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751200000028-b1n2q","category":"芸能・エンタメ・ゴシップ","title":"飯島愛が自宅で死去、享年36歳","summary":"2008年12月17日、元グラビアアイドル・タレントの飯島愛が自宅で死亡しているのが発見された。享年36歳。死因は急性肺炎とされた。自伝的小説「プラトニック・セックス」がベストセラーとなった人物の早すぎる死が衝撃を与えた。","date":"2008年12月","source":"","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751200000029-c3o4r","category":"テクノロジー","title":"初音ミク・ニコニコ動画ブームが本格化、ボカロ文化が確立","summary":"2008年、ニコニコ動画でのボーカロイド楽曲投稿が爆発的に増加。supercellの「ワールドイズマイン」「ブラック★ロックシューター」などが人気を博し、ネット発の音楽・創作文化として確立した。初音ミクはキャラクターとしてフィギュア化も開始。","date":"2008年","source":"","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751200000030-d5p6s","category":"テクノロジー","title":"iPhone 3G がソフトバンクから日本発売、スマートフォン元年","summary":"2008年7月11日、ソフトバンクモバイルが日本初のiPhone「iPhone 3G」を発売。各地のソフトバンクショップに数百人規模の行列ができた。フルブラウザ・AppStoreの登場でモバイルインターネットの使い方が激変し、後のスマホ普及の転換点となった。","date":"2008年7月","source":"https://www.softbank.jp/corp/group/sbm/news/press/2008/20080610_01/","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000031-e7q8t","category":"国際","title":"ミャンマー・サイクロン「ナルギス」が直撃、死者13万人超","summary":"2008年5月2日、大型サイクロン「ナルギス」がミャンマー南部を直撃。イラワジデルタを高潮が40kmにわたって遡上し、死者・行方不明者は13万人以上に。軍事政権が国際的な支援の受け入れを拒否したことが世界的な批判を浴びた。","date":"2008年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000032-f9r1u","category":"国際","title":"中国・四川大地震（M8.0）、死者・行方不明者約9万人","summary":"2008年5月12日、中国四川省でM8.0の大地震が発生。死者・行方不明者は合計約9万人に上り、校舎の倒壊で多数の子どもが犠牲となった「豆腐渣工程」（手抜き工事）問題も表面化した。","date":"2008年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000033-g2s3v","category":"国際","title":"バラク・オバマが米大統領選に当選、史上初の黒人大統領へ","summary":"2008年11月4日、民主党のバラク・オバマが共和党マケインを破り第44代米大統領に当選。「Change we can believe in」のスローガンが世界に広がり、史上初の黒人大統領の誕生は日本でも大きく報じられた。","date":"2008年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"国際-1751200000034-h4t5w","category":"国際","title":"ロシア・グルジア軍事衝突、北京五輪開幕と同日に紛争勃発","summary":"2008年8月8日、北京五輪の開会式と同日にグルジア（現ジョージア）軍が南オセチアに侵攻し、ロシア軍が反撃して全面衝突に発展。5日間の戦闘で多数の死傷者が出た。ロシアの軍事的拡張への国際的警戒感が高まった。","date":"2008年8月","source":"https://imidas.jp/jijikaitai/d-40-038-08-11-g042","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000001-a2k8p","category":"政治","title":"菅義偉元首相が政界引退を表明","summary":"2026年1月17日、第99代内閣総理大臣を務めた菅義偉氏（77）が政界引退の意向を表明。携帯料金値下げやコロナワクチン接種加速などを主導した菅政権の幕引きとなった。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000002-b4m1q","category":"政治","title":"山上徹也被告に無期懲役判決、安倍元首相銃撃事件の裁判員裁判","summary":"2026年1月21日、奈良地裁の裁判員裁判で、安倍晋三元首相を銃撃して死亡させた山上徹也被告に求刑通り無期懲役の判決が言い渡された。旧統一教会（世界平和統一家庭連合）への恨みが動機とされた。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000003-c6n3r","category":"政治","title":"高市早苗首相が電撃的に衆院解散を表明、2月8日投開票へ","summary":"2026年1月19日、高市早苗首相が通常国会召集後すぐに衆院解散を表明。1月27日公示・2月8日投開票の衆院選で自民党が圧勝した。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000004-d8p5s","category":"政治","title":"衆院選で自民党が316議席を獲得し圧勝、連立で3分の2超","summary":"2026年2月8日の衆院選で自民党が単独過半数を大幅に超える316議席を獲得。旧民主系の中道改革連合は公示前の167議席から49議席に激減し壊滅的敗北を喫した。","date":"2026年2月","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000005-e1q7t","category":"政治","title":"第2次高市内閣が発足、高市首相が第105代首相に再選","summary":"2026年2月18日、衆院選圧勝を受けて第2次高市内閣が発足。高市早苗氏が第105代内閣総理大臣に選出された。","date":"2026年2月","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000006-f3r9u","category":"政治","title":"防衛装備移転三原則を改定、殺傷武器輸出を全面解禁","summary":"2026年4月21日、政府が防衛装備移転三原則の運用指針を改定し、殺傷能力を持つ武器の輸出を全面的に解禁した。従来の「5類型」制限を撤廃する戦後安保政策の大転換となった。","date":"2026年4月","source":"https://www.nippon.com/ja/news/q202604/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751300000007-g5s2v","category":"政治","title":"世界平和統一家庭連合（旧統一教会）の宗教法人解散が確定","summary":"2026年3月、裁判所命令により世界平和統一家庭連合が宗教法人格を失い解散が確定した。安倍元首相銃撃事件をきっかけに噴出した政界との癒着問題が司法決着を迎えた。","date":"2026年3月","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"","notes":""},{"id":"経済-1751300000008-h7t4w","category":"経済","title":"豊洲市場初競りでクロマグロが5億1030万円の史上最高値","summary":"2026年1月5日、豊洲市場の新年初競りで青森県大間産のクロマグロ（242kg）が5億1030万円の史上最高値で競り落とされた。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"経済-1751300000009-i9u6x","category":"経済","title":"プルデンシャル生命保険で社員100人超が顧客から約31億円を着服、社長辞任","summary":"2026年1月16日、プルデンシャル生命保険で社員ら100人超が顧客約500人から計約31億円を着服していたことが判明し、社長が引責辞任。生命保険業界への信頼を揺るがす大型着服事件となった。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"経済-1751300000010-j2v8y","category":"経済","title":"ガソリン価格が1リットル190.8円で史上最高値を記録","summary":"2026年3月、原油高騰を受け全国平均のガソリン店頭価格が1リットル190.8円を記録し、史上最高値を更新。家計・物流・漁業への打撃が社会問題化した。","date":"2026年3月","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"","notes":""},{"id":"経済-1751300000011-k4w1z","category":"経済","title":"ホンダが上場以来初の最終赤字、EV関連損失が計1兆5778億円","summary":"2026年5月14日、ホンダの2026年3月期決算で最終赤字4239億円（上場以来初）が確定。EV3車種の開発・販売中止により製造設備の減損など計1兆5778億円のEV関連損失を計上した。","date":"2026年5月","source":"https://car.watch.impress.co.jp/docs/news/2108657.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1751300000012-l6x3a","category":"経済","title":"日経平均株価が史上初の6万円台を突破","summary":"2026年4月23日、日経平均株価が終値で初めて6万円台に乗せ歴史的な節目を達成。好業績や海外資金流入が株高を支えた。","date":"2026年4月","source":"https://www.nippon.com/ja/news/q202604/","confidence":"高","snippet":"","notes":""},{"id":"経済-1751300000013-m8y5b","category":"経済","title":"トヨタが国内企業初の売上高50兆円超えを達成","summary":"2026年5月8日、トヨタ自動車の2026年3月期連結決算で売上高が国内企業として初めて50兆円を超えた。HV（ハイブリッド車）の世界的な需要増が貢献した。","date":"2026年5月","source":"https://www.nippon.com/ja/news/q202605/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000014-n1z7c","category":"社会","title":"柏崎刈羽原発6号機が約14年ぶりに再稼働、翌日停止","summary":"2026年1月21日、東京電力の柏崎刈羽原発6号機が約14年ぶりに再稼働。しかし翌日に制御棒引き抜き作業中に警報が鳴り、再び原子炉が停止した。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000015-o3a9d","category":"社会","title":"上野動物園の双子パンダ「シャオシャオ・レイレイ」が中国に返還","summary":"2026年1月27日、上野動物園で生まれた双子のジャイアントパンダ「シャオシャオ（暁暁）」「レイレイ（蕾蕾）」が中国に返還。別れを惜しむファンが連日詰めかけた。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000016-p5b2e","category":"社会","title":"緊急避妊薬「ノルレボ」が全国7000店で市販解禁、1錠7480円","summary":"2026年2月2日、緊急避妊薬「ノルレボ」が医師の処方箋なしに全国約7000の薬局・ドラッグストアで購入可能となった。価格は1錠7480円。アクセスの改善を歓迎する声と慎重論の両方が上がった。","date":"2026年2月","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000017-q7c4f","category":"社会","title":"2025年出生数が70万5809人で10年連続最少を更新","summary":"2026年2月26日発表の人口動態統計で、2025年の出生数が70万5809人と前年を下回り10年連続で過去最少を更新した。少子化に歯止めがかからない深刻な状況が改めて明らかになった。","date":"2026年2月","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000018-r9d6g","category":"社会","title":"日野町事件の再審開始が確定、戦後初の「死後に再審が認められた」死刑囚","summary":"2026年2月24日、1984年に滋賀県日野町で起きた強盗殺人事件の死刑囚・阪原弘さん（服役中に死亡）の再審開始が確定した。死亡した死刑囚の再審認定は戦後日本で初の事例となった。","date":"2026年2月","source":"https://www.nippon.com/ja/news/q202602/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000019-s2e8h","category":"社会","title":"京都アニメーション放火事件、青葉真司死刑囚の死刑が確定","summary":"2026年3月、36人が死亡した京都アニメーション放火殺人事件で、青葉真司死刑囚の上告が棄却され死刑が確定した。2019年7月18日に発生した戦後最悪級の放火殺人事件に司法的な決着がついた。","date":"2026年3月","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000020-t4f1i","category":"社会","title":"栃木県上三川町でトクリュウが強盗殺人、高校生4人と夫婦を逮捕","summary":"2026年5月14日、栃木県上三川町の民家に複数人が押し入り、女性を殺害・2人に暴行した強盗殺人事件が発生。「匿名・流動型犯罪グループ（トクリュウ）」による犯行とみられ、実行犯の16歳高校生4人と指示役の20代夫婦が逮捕された。","date":"2026年5月","source":"https://www.nippon.com/ja/news/q202605/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000021-u6g3j","category":"社会","title":"岩手県大槌町で大規模山林火災、1633ヘクタールが焼損","summary":"2026年4月22日、岩手県大槌町で山林火災が発生し、焼損面積は約1633ヘクタールに拡大。平成以降では2番目の規模となり、住民避難や自衛隊による消火活動が行われた。","date":"2026年4月","source":"https://www.nippon.com/ja/news/q202604/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751300000022-v8h5k","category":"スポーツ","title":"ミラノ・コルティナ冬季五輪で日本が冬季最多24個のメダルを獲得","summary":"2026年2月6〜22日のミラノ・コルティナ冬季五輪で日本は金5・銀7・銅12の計24個を獲得し冬季最多を大幅更新。スノーボードで木村葵来（男子ビッグエア）・村瀬心椛（女子ビッグエア）・戸塚優斗（男子ハーフパイプ）・深田茉莉（女子スロープスタイル）が金、フィギュアスケートペアで三浦璃来・木原龍一組が金メダルを獲得した。","date":"2026年2月","source":"https://www.nikkei.com/article/DGXZQODH221F80S6A220C2000000/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751300000023-w1i7l","category":"スポーツ","title":"WBC2026で日本がベネズエラに5-8で逆転負け、初の準々決勝敗退","summary":"2026年3月15日、WBC準々決勝でベネズエラに5-8と逆転負けし、連覇を目指した日本代表が初の8強止まりに終わった。ベネズエラはその後初優勝を飾った。","date":"2026年3月","source":"https://www.nikkei.com/article/DGXZQODH13ALW0T10C26A3000000/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751300000024-x3j9m","category":"スポーツ","title":"坂本花織がフィギュアスケート世界選手権で4度目の優勝","summary":"2026年3月、坂本花織がフィギュアスケート世界選手権で優勝し、4度目の世界女王となった。その後5月に引退と結婚を発表した。","date":"2026年3月","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751300000025-y5k2n","category":"スポーツ","title":"「りくりゅう」三浦璃来・木原龍一組が現役引退、冬季五輪金メダル約2ヶ月後","summary":"2026年4月17日、ミラノ冬季五輪でフィギュアスケートペアの金メダルを獲得した三浦璃来・木原龍一組（りくりゅう）が現役引退を発表。金メダルから約2ヶ月での電撃引退に惜しむ声が上がった。","date":"2026年4月","source":"https://www.nippon.com/ja/news/q202604/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751300000026-z7l4o","category":"スポーツ","title":"錦織圭がプロテニス引退を発表","summary":"2026年5月1日、全米オープン準優勝・世界ランキング4位を誇った日本男子テニス界の第一人者・錦織圭が今季限りでの引退を発表。度重なる怪我に苦しみながらも日本テニス界の歴史を塗り替えた名選手の現役生活に幕が下りた。","date":"2026年5月","source":"https://www.nippon.com/ja/news/q202605/","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751300000027-a9m6p","category":"スポーツ","title":"W杯北中米大会の日本代表26人発表、三笘薫はケガで落選・長友は5度目","summary":"2026年5月15日、サッカーW杯北中米大会に臨む日本代表26人が発表。怪我の三笘薫は落選し、長友佑都が5度目のW杯出場を決めた。","date":"2026年5月","source":"https://www.nippon.com/ja/news/q202605/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751300000028-b2n8q","category":"芸能・エンタメ・ゴシップ","title":"「鬼滅の刃 無限城編 第一章」が日本映画史上初の世界興収1000億円超、1179億円","summary":"2026年4月9日に終映した「鬼滅の刃 無限城編 第一章」の世界興行収入が1179億円に達し、日本映画として史上初めて1000億円を突破した。","date":"2026年4月","source":"https://www.nippon.com/ja/news/q202604/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751300000029-c4o1r","category":"芸能・エンタメ・ゴシップ","title":"坂本花織が引退記者会見で結婚を発表、ファンを驚かせる","summary":"2026年5月13日、フィギュアスケートの坂本花織が引退記者会見を開き、現役引退と同時に結婚を発表。世界女王4度の実績を持つトップ選手の電撃発表にファンが沸いた。","date":"2026年5月","source":"https://www.nippon.com/ja/news/q202605/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751300000030-d6p3s","category":"芸能・エンタメ・ゴシップ","title":"岡本多緒が第79回カンヌ映画祭で日本人女優初の女優賞を受賞","summary":"2026年5月24日、第79回カンヌ国際映画祭の授賞式で、濱口竜介監督の映画「急に具合が悪くなる」に主演した岡本多緒が女優賞を受賞。日本人女優としてカンヌで女優賞を獲得したのは史上初となった。","date":"2026年5月","source":"https://www.jiji.com/jc/article?k=2026052400075&g=soc","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751300000031-e8q5t","category":"芸能・エンタメ・ゴシップ","title":"巨人・阿部慎之助監督が娘への暴行容疑で逮捕、翌日辞任","summary":"2026年5月25日、読売ジャイアンツの阿部慎之助監督が18歳の長女への暴行容疑で逮捕（翌日釈放）。5月26日に涙の辞任会見を開いた。球団の79年ぶりの途中交代となった。","date":"2026年5月","source":"https://www.nikkei.com/article/DGXZQODH25AT90V20C26A5000000/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751300000032-f1r7u","category":"芸能・エンタメ・ゴシップ","title":"フリーアナウンサー久米宏死去、享年81歳","summary":"2026年1月13日、「ニュースステーション」を1985年から23年間担当したフリーアナウンサーの久米宏が死去、享年81歳。独自の切り口で政治家に鋭く切り込むキャスタースタイルを確立した。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751300000033-g3s9v","category":"芸能・エンタメ・ゴシップ","title":"将棋・加藤一二三（ひふみん）九段が死去、享年86歳","summary":"2026年1月22日、将棋の永世名人資格保持者で「ひふみん」の愛称で親しまれた加藤一二三九段が死去、享年86歳。中学生でプロ入りし、バラエティ番組でも人気を博した国民的棋士だった。","date":"2026年1月","source":"https://www.nippon.com/ja/news/q202601/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751300000034-h5t2w","category":"社会","title":"東日本大震災から15年","summary":"2026年3月11日、死者・行方不明者2万2000人超を出した東日本大震災から15年の節目を迎えた。能登半島地震（2024年1月）からの復旧も続く中、各地で追悼式典が行われた。","date":"2026年3月","source":"https://www.nippon.com/ja/news/q202603/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751400000001-a3k7p","category":"政治","title":"そのまんま東（東国原英夫）が宮崎県知事に当選、「どげんかせんといかん」が流行語に","summary":"2007年1月、前知事の官製談合スキャンダルを受け実施された宮崎県知事選で、タレント・元衆院議員のそのまんま東氏（東国原英夫）が初当選。就任後の「どげんかせんといかん」という言葉がブームになり、宮崎牛・マンゴーなど県産品のPRに奔走した。","date":"2007年1月","source":"https://www.nippon.com/ja/features/h00086/","confidence":"高","snippet":"","notes":""},{"id":"政治-1751400000002-b5m9q","category":"政治","title":"松岡利勝農水相が政治資金疑惑の渦中に議員宿舎で自殺","summary":"2007年5月28日、事務所費の不正計上を追及されていた松岡利勝農水相（62）が東京・赤坂の議員宿舎で首をつり死亡。現職大臣の自殺という前例のない事態に国会が揺れた。「政治とカネ」問題を語らないまま亡くなった。","date":"2007年5月","source":"https://www.jcp.or.jp/akahata/aik07/2007-05-29/2007052901_01_0.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751400000003-c7n2r","category":"政治","title":"「消えた年金」5000万件問題が発覚、参院選の最大争点に","summary":"2007年5月、社会保険庁が管理する年金記録のうち約5000万件が誰のものか特定できない「消えた年金」問題が浮上。老後の生活に直結する問題に国民の怒りが爆発し、参院選での自民惨敗の最大要因となった。","date":"2007年5月","source":"https://www.diamondv.jp/article/sDXLfnwcPho6wkhLfXrpQp","confidence":"高","snippet":"","notes":""},{"id":"政治-1751400000004-d9p4s","category":"政治","title":"参院選で自民党が歴史的惨敗、民主党が参院第1党を奪取","summary":"2007年7月29日投開票の第21回参院選で自民党が37議席と歴史的惨敗。党創立以来守ってきた参議院第1党の座を民主党に明け渡し、「ねじれ国会」が始まった。消えた年金問題や閣僚スキャンダルが直撃した。","date":"2007年7月","source":"https://www.jcp.or.jp/akahata/aik07/2007-09-13/2007091301_03_0.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751400000005-e2q6t","category":"政治","title":"安倍晋三首相が国会冒頭で突然辞任、「政権投げ出し」と批判殺到","summary":"2007年9月12日、各党代表質問当日に安倍晋三首相が突然辞意を表明。前代未聞のタイミングに与野党から強い批判が集まった。健康悪化（潰瘍性大腸炎）が真の理由とされた。","date":"2007年9月","source":"https://www.jcp.or.jp/akahata/aik07/2007-09-13/2007091301_03_0.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751400000006-f4r8u","category":"政治","title":"福田康夫内閣が発足、日本初の親子首相誕生","summary":"2007年9月26日、福田康夫が第91代内閣総理大臣に就任し福田内閣が発足。父・赳夫元首相に続く日本憲政史上初の親子での首相誕生となった。","date":"2007年9月","source":"https://www.gov-online.go.jp/prg/prg1416.html","confidence":"高","snippet":"","notes":""},{"id":"経済-1751400000007-g6s1v","category":"経済","title":"介護大手コムスンが不正請求で全国事業所廃止命令、グッドウィルグループ解体へ","summary":"2007年6月、グッドウィルグループ傘下の訪問介護大手コムスンが組織的な介護報酬の不正請求を行っていたとして、厚労省が全国事業所の廃止を命令。介護市場を席巻していた大手の突然の退場に業界が揺れた。","date":"2007年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000008-h8t3w","category":"社会","title":"「あるある大事典II」が納豆ダイエットのデータを捏造、関西テレビが番組打ち切り","summary":"2007年1月、関西テレビ制作の人気健康番組「発掘！あるある大事典II」が納豆ダイエット効果を示すデータを捏造していたことが発覚。放送直後に全国のスーパーで納豆が品切れになっていただけに、国民の怒りは爆発した。番組は即打ち切りとなった。","date":"2007年1月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000009-i1u5x","category":"社会","title":"不二家が賞味期限切れ原料使用問題で販売停止、老舗ブランドが存続危機","summary":"2007年1月、製菓大手・不二家が賞味期限切れの牛乳を洋菓子製造に使用していたことが内部告発で発覚。全店舗が一時閉鎖に追い込まれ、「ペコちゃん」ブランドへの信頼が大きく傷ついた。","date":"2007年1月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000010-j3v7y","category":"社会","title":"赤ちゃんポスト「こうのとりのゆりかご」が熊本・慈恵病院で運用開始","summary":"2007年5月10日、育てられない赤ちゃんを匿名で預けられる「こうのとりのゆりかご（赤ちゃんポスト）」が熊本市の慈恵病院に国内で初めて設置・運用開始。命を救う取り組みとして評価される一方、匿名性や親の責任をめぐり賛否の議論が起きた。","date":"2007年5月","source":"https://president.jp/articles/-/83097","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000011-k5w9z","category":"社会","title":"ミートホープが牛ミンチに豚・鶏肉を混入して偽装販売、食品偽装ブームの口火に","summary":"2007年6月、北海道苫小牧市の食肉加工会社・ミートホープが牛ミンチと表示した製品に豚肉・鶏肉・羊肉などを大量混入して販売していたことが発覚。この事件を皮切りに、白い恋人・赤福・船場吉兆と食品偽装が相次いで発覚した。","date":"2007年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000012-l7x2a","category":"社会","title":"ネットカフェ難民が社会問題化、格差社会の象徴として流行語入り","summary":"2007年、住む場所を持てず漫画喫茶やネットカフェを転々とする「ネットカフェ難民」の実態が厚労省の調査で明らかに。全国で約5400人が毎晩ネットカフェで寝泊まりしていると推計され、新たなホームレス問題として社会に衝撃を与えた。","date":"2007年","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000013-m9y4b","category":"社会","title":"新潟県中越沖地震（M6.8）、柏崎刈羽原発から放射性物質が漏洩","summary":"2007年7月16日発生、M6.8。死者15人・負傷者2300人以上。東京電力の柏崎刈羽原子力発電所が被災し変圧器火災が発生、少量の放射性物質を含む水が日本海に漏出したことで国内外に衝撃を与えた。","date":"2007年7月","source":"https://www.nikkei.com/article/DGKKZO61527610V10C20A7EAC000/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000014-n2z6c","category":"社会","title":"国内最高気温を74年ぶり更新、熊谷・多治見で40.9度を記録","summary":"2007年8月16日、埼玉県熊谷市と岐阜県多治見市で気温が40.9度まで上昇し、1933年に山形市で観測した40.8度の記録を74年ぶりに塗り替えた。「猛暑日」という言葉が流行語入り。","date":"2007年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000015-o4a8d","category":"社会","title":"闇サイト殺人事件、名古屋の女性がネット経由で集まった男3人に拉致・殺害","summary":"2007年8月、愛知県でインターネットの「闇の職業安定所」と呼ばれる闇サイトで知り合った面識のない男3人が会社員女性（31歳）を拉致して殺害。「闇バイト」による凶悪犯罪の原型として後の議論の出発点となった。","date":"2007年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000016-p6b1e","category":"社会","title":"白い恋人（石屋製菓）が賞味期限改ざん発覚、北海道の定番土産が販売停止","summary":"2007年8月、北海道の定番土産「白い恋人」の製造元・石屋製菓が賞味期限の改ざんを行っていたことが発覚。販売が一時停止された。同年の食品偽装ラッシュの代表例となった。","date":"2007年8月","source":"https://data-max.co.jp/2007/12/1_9.html","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000017-q8c3f","category":"社会","title":"赤福が製造日・消費期限偽装で販売停止、三重の老舗が炎上","summary":"2007年10月、伊勢の名物和菓子「赤福」の製造元が、売れ残りを冷凍保存して製造日・消費期限を書き換えて再販する行為を長年続けていたことが発覚。全販売店で一斉に販売が停止された。","date":"2007年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751400000018-r1d5g","category":"社会","title":"船場吉兆が食材産地偽装・食べ残し使い回しで廃業","summary":"2007年11月、大阪の高級料亭・船場吉兆が牛肉の産地偽装や菓子の消費期限改ざんを行っていたことが発覚。翌2008年には客の食べ残しを使い回していたことも明らかになり廃業に追い込まれた。","date":"2007年11月","source":"https://data-max.co.jp/2007/12/1_9.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751400000019-s3e7h","category":"スポーツ","title":"亀田大毅vs内藤大助、反則の嵐で亀田史郎のライセンス無期限停止","summary":"2007年10月11日、WBC世界フライ級タイトルマッチで挑戦者・亀田大毅が王者・内藤大助に反則を連発。セコンドの父・亀田史郎氏がコーナーから反則を指示していたとして無期限ライセンス停止処分、大毅も1年間のライセンス停止。内藤は3-0の判定で初防衛に成功。","date":"2007年10月","source":"https://www.asagei.com/excerpt/306126","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000020-t5f9i","category":"芸能・エンタメ・ゴシップ","title":"第1回東京マラソン開催、3万人が都心を駆け抜ける","summary":"2007年2月18日、国際的な市民マラソン「東京マラソン」が初開催。抽選倍率は約10倍で当選した約3万人が新宿から浜松町まで東京の名所を駆け抜けた。以後、東京の春の風物詩となった。","date":"2007年2月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000021-u7g2j","category":"芸能・エンタメ・ゴシップ","title":"藤原紀香と陣内智則が生田神社で豪華結婚、「格差婚」と話題に","summary":"2007年2月17日、女優・藤原紀香とお笑い芸人・陣内智則が神戸・生田神社で結婚式。トップ女優と若手芸人の「格差婚」として話題を呼んだが、翌2009年に陣内の浮気が発覚し離婚。","date":"2007年2月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000022-v9h4k","category":"芸能・エンタメ・ゴシップ","title":"東京ミッドタウン（六本木）が開業、都市型複合施設の新時代","summary":"2007年3月30日、六本木に東京ミッドタウンがオープン。ザ・リッツ・カールトン東京・サントリー美術館・商業施設などが一体となった大型再開発が話題を呼び、六本木の街の再生を象徴した。","date":"2007年3月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000023-w2i6l","category":"芸能・エンタメ・ゴシップ","title":"ZARDの坂井泉水が入院中に転落死、享年40歳","summary":"2007年5月27日、「負けないで」「揺れる思い」などのヒット曲で知られるZARDのボーカル・坂井泉水が、入院先の慶応大学病院で転落して死亡。享年40歳。子宮頸がんの治療中だったことが明かされ、ファンに衝撃を与えた。","date":"2007年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000024-x4j8m","category":"芸能・エンタメ・ゴシップ","title":"ドラマ「華麗なる一族」が最終回で視聴率30.4%を記録","summary":"2007年1〜3月放送のTBS「日曜劇場」、木村拓哉主演の「華麗なる一族」が全話平均24.3%、最終回30.4%（関東）を記録。山崎豊子原作の財閥ドラマとして話題を呼び、その年の民放ドラマ視聴率首位となった。","date":"2007年1月","source":"https://doraman.net/sp/200701/kareinaru_ichizoku.html","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751400000025-y6k1n","category":"テクノロジー","title":"iPhone（初代）がアメリカで発売、スティーブ・ジョブズが「電話を再定義」","summary":"2007年6月29日、アップルが米国でiPhone初代を発売。マルチタッチパネルを用いたスマートフォンの元祖として携帯市場を一変させた。日本発売は翌年（iPhone 3G）。ジョブズの「iPod・電話・インターネット端末が1台に」という発表が伝説のプレゼンとなった。","date":"2007年6月","source":"https://reinforz.co.jp/bizmedia/66571/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751400000026-z8l3o","category":"テクノロジー","title":"初音ミク発売、ニコニコ動画ブームと合わさり爆発的普及","summary":"2007年8月31日、クリプトン・フューチャー・メディアがVOCALOID「初音ミク」を発売。同年ブレイクしたニコニコ動画との相乗効果で「みくみくにしてあげる」などが大流行し、ネット発のクリエイター文化が誕生した。","date":"2007年8月","source":"https://internet.watch.impress.co.jp/docs/special/30th/2096502.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000027-a1m5p","category":"芸能・エンタメ・ゴシップ","title":"オネエブームがバラエティを席巻、IKKOの「どんだけ～」が流行語大賞","summary":"2007年、IKKO・マツコ・デラックス・カルーセル麻紀らオネエキャラがバラエティ番組に相次いで登場。IKKOの「どんだけ～」が流行語大賞に選ばれ、お茶の間を席巻した。","date":"2007年","source":"https://www.jiyu.co.jp/singo/index.php?eid=00024","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000028-b3n7q","category":"芸能・エンタメ・ゴシップ","title":"沢尻エリカが映画舞台挨拶で「別に・・」発言、大バッシングを浴びる","summary":"2007年9月、映画「クローズド・ノート」（行定勲監督）の舞台挨拶で、共演者の挨拶中も不機嫌な態度を崩さなかった沢尻エリカの「別に・・」発言が大問題に。仕事が激減し、翌年には所属事務所との契約解除へ。","date":"2007年9月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000029-c5o9r","category":"芸能・エンタメ・ゴシップ","title":"「そんなの関係ねぇ」も流行語大賞ノミネート、お笑いブームが絶頂","summary":"2007年、小島よしおの「そんなの関係ねぇ」、エド・はるみの「グ〜！」（翌年大賞）など、ギャグが次々と社会現象化。「どんだけ～」と並んで流行語大賞のトップ10入りし、バラエティ全盛時代の頂点を示した。","date":"2007年","source":"https://www.jiyu.co.jp/singo/index.php?eid=00024","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751400000030-d7p2s","category":"芸能・エンタメ・ゴシップ","title":"B'zがハリウッド・ロック・ウォークに日本・アジア人初として殿堂入り","summary":"2007年11月19日、B'z（稲葉浩志・松本孝弘）がハリウッドのギター・センター「ハリウッド・ロック・ウォーク」に日本・アジア人として初めて殿堂入り。結成20周年の記念すべき年に手形が刻まれた。","date":"2007年11月","source":"https://www.barks.jp/news/?id=1000034374","confidence":"高","snippet":"","notes":""},{"id":"政治-1751410000001-a2k6p","category":"政治","title":"ライブドアに東京地検が強制捜査・「ライブドアショック」で株式市場が大混乱、堀江貴文逮捕","summary":"2006年1月16日に東京地検特捜部がライブドア本社に強制捜査。翌週1月23日に堀江貴文社長が証券取引法違反容疑で逮捕。報道を受けたライブドア株の売り注文が他銘柄にも波及し、東証のシステムが取引停止に追い込まれる「ライブドアショック」が起きた。","date":"2006年1月","source":"https://ja.wikinews.org/wiki/%E3%83%A9%E3%82%A4%E3%83%96%E3%83%89%E3%82%A2%E5%A0%80%E6%B1%9F%E7%A4%BE%E9%95%B7%E3%82%89%E3%80%81%E8%A8%BC%E5%88%B8%E5%8F%96%E5%BC%95%E6%B3%95%E9%81%95%E5%8F%8D%E3%81%AB%E3%82%88%E3%82%8A%E9%80%AE%E6%8D%95","confidence":"高","snippet":"","notes":""},{"id":"政治-1751410000002-b4m8q","category":"政治","title":"村上ファンド代表・村上世彰がインサイダー取引容疑で逮捕、「やっぱり儲かると思った」","summary":"2006年6月5日、ライブドアによるニッポン放送株買い占めに関連しインサイダー取引を行ったとして、村上ファンド代表・村上世彰が証券取引法違反容疑で逮捕。記者会見で発した「やっぱり儲かると思った」という言葉が大きく報じられた。","date":"2006年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751410000003-c6n1r","category":"政治","title":"小泉純一郎が首相退任、後継に安倍晋三が就任（第90代・52歳で戦後最年少）","summary":"2006年9月26日、「郵政民営化」を成し遂げた小泉純一郎が5年5ヶ月ぶりに退任し、安倍晋三が第90代内閣総理大臣に就任。当時52歳で戦後最年少の首相誕生となった。「美しい国、日本」をスローガンに掲げた。","date":"2006年9月","source":"https://www.gov-online.go.jp/prg/prg753.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751410000004-d8p3s","category":"政治","title":"北朝鮮が地下核実験を強行、国連安保理が制裁決議を採択","summary":"2006年10月9日、北朝鮮が地下核実験を実施し核保有を宣言。国際社会に衝撃を与え、国連安保理が経済制裁を盛り込んだ決議1718を全会一致で採択。日本政府も独自制裁を発動した。","date":"2006年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"経済-1751410000005-e1q5t","category":"経済","title":"パロマ工業の瞬間湯沸かし器で死者21人の被害が判明、不正改造への対策怠りが問題化","summary":"2006年7月、パロマ工業製の屋内設置型瞬間湯沸かし器による一酸化炭素中毒事故が相次いでいたことが発覚。国への事故報告義務を果たしておらず、最終的に死者21人・重軽傷19人の被害が明らかになった。修理業者による不正改造への対策を長年怠っていたことが批判された。","date":"2006年7月","source":"https://gentosha-go.com/articles/-/27823","confidence":"高","snippet":"","notes":""},{"id":"社会-1751410000006-f3r7u","category":"社会","title":"秋田連続児童殺害事件、畠山鈴香被告が自分の娘と近所の男児を殺害","summary":"2006年4〜5月、秋田県藤里町で33歳の女性（畠山鈴香）が自分の娘（小学4年・9歳）を川に突き落として溺死させ、さらに近所の小学1年生男児（7歳）を絞殺して川に遺棄。子どもを守るべき母親による連続殺人という衝撃的な事件に全国が震撼した。","date":"2006年4月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751410000007-g5s9v","category":"社会","title":"表参道ヒルズが開業、安藤忠雄設計の大型複合施設として話題に","summary":"2006年2月11日、安藤忠雄設計による「表参道ヒルズ」が東京・表参道に開業。同潤会アパートの外観を保存した都市型複合施設として注目を集め、オープン初日から大勢の来客で賑わった。","date":"2006年2月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751410000008-h7t2w","category":"社会","title":"福岡・筑前町の中学2年生がいじめを苦に自殺、元担任の関与が発覚","summary":"2006年10月11日、福岡県筑前町立三輪中学校2年の男子生徒（13歳）がいじめを苦にした遺書を残して自殺。調査でいじめのきっかけが元担任教師による不適切な言動だったことが判明し、教師のいじめへの関与が社会問題となった。","date":"2006年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751410000009-i9u4x","category":"社会","title":"全国でいじめ自殺が社会問題化、文科省に生徒から大量の「自殺予告文」届く","summary":"2006年秋、いじめ自殺の報道が相次ぐ中、文部科学大臣宛に「いじめにより自殺する」という予告文が数百通届く事態に発展。政府がいじめ対策緊急会議を設置し、学校・教育委員会の対応を問う声が高まった。","date":"2006年秋","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751410000010-j2v6y","category":"社会","title":"「格差社会」「ワーキングプア」が流行語に、NHKドキュメンタリーが話題","summary":"2006年、NHKスペシャル「ワーキングプア〜働いても働いても豊かになれない〜」が大きな反響を呼び、「格差社会」「ワーキングプア」が流行語大賞にノミネート。正規・非正規の賃金格差が社会問題として広く認識された年だった。","date":"2006年","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751410000011-k4w8z","category":"スポーツ","title":"荒川静香がトリノ冬季五輪フィギュアスケートで日本女性初の金メダル、「イナバウアー」が流行語大賞","summary":"2006年2月23日、荒川静香がイタリア・トリノの冬季五輪フィギュアスケート女子シングルで金メダルを獲得。曲中に披露した「イナバウアー」（体を反らせながら両足で滑る技）が日本中で話題となり、流行語大賞を受賞した。","date":"2006年2月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751410000012-l6x1a","category":"スポーツ","title":"第1回WBCで日本が初優勝、松坂大輔がMVP・イチローの「神の右手」も話題に","summary":"2006年3月21日、第1回ワールド・ベースボール・クラシック（WBC）決勝でキューバを10-6で下し日本が初代王者に。松坂大輔がMVP（3勝0敗）を獲得し、イチローが土壇場の9回に決勝打を放つ際の本塁突入「神の右手」も語り継がれる名場面となった。","date":"2006年3月","source":"https://npb.jp/wbc/2006/score_jpn8.html","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751410000013-m8y3b","category":"スポーツ","title":"サッカーW杯ドイツ大会、日本はGL3戦全敗で敗退（ジーコ監督）","summary":"2006年6〜7月のFIFAワールドカップ（ドイツ大会）で、日本代表はグループリーグでオーストラリア・クロアチア・ブラジルに1分2敗（勝ち点1）でグループリーグ敗退。期待された「黄金世代」の最後の大会は惨敗で幕を閉じた。","date":"2006年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751410000014-n1z5c","category":"スポーツ","title":"「ハンカチ王子」斎藤佑樹vs「マー君」田中将大が甲子園決勝で延長引き分け再試合","summary":"2006年8月20〜21日の第88回全国高校野球選手権大会決勝、早稲田実業・斎藤佑樹と駒大苫小牧・田中将大が激突。20日は15回引き分け（37年ぶり）、翌21日の再試合でも斎藤が完投し早実が初優勝。ハンカチで汗を拭う斎藤の姿が話題を呼んだ。","date":"2006年8月","source":"https://column.sp.baseball.findfriends.jp/?pid=column_detail&id=097-20190726-11","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751410000015-o3a7d","category":"スポーツ","title":"亀田興毅（19歳）がWBA世界ライトフライ級王座決定戦に勝ち、10代での世界王者誕生","summary":"2006年8月2日、横浜アリーナでのWBA世界ライトフライ級王座決定戦でファン・ランダエタ（ベネズエラ）を2-1の判定で下し、19歳の亀田興毅が世界チャンピオンに就任。採点の妥当性をめぐり疑問も呈された。","date":"2006年8月","source":"https://ja.wikinews.org/wiki/%E4%BA%80%E7%94%B0%E8%88%88%E6%AF%85%E9%81%B8%E6%89%8B%E3%80%81%E4%B8%96%E7%95%8C%E3%83%A9%E3%82%A4%E3%83%88%E3%83%95%E3%83%A9%E3%82%A4%E7%B4%9A%E7%8E%8B%E8%80%85%E3%81%AB%E5%B0%B1%E3%81%8F","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000016-p5b9e","category":"芸能・エンタメ・ゴシップ","title":"押尾学と矢田亜希子が電撃結婚、「格差婚」として話題に","summary":"2006年2月、俳優・押尾学と女優・矢田亜希子が結婚を発表。芸能界でも知名度の差が大きい2人の結婚として「格差婚」と呼ばれ話題を集めた。後に押尾の薬物使用問題（2009年）が発覚し離婚へ。","date":"2006年2月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000017-q7c2f","category":"芸能・エンタメ・ゴシップ","title":"赤西仁（KAT-TUN）がジャニーズ活動休止・アメリカ留学を発表、ファン騒然","summary":"2006年5月、KAT-TUNメンバーの赤西仁がジャニーズ事務所の活動を休止し、アメリカへ単身留学すると発表。CDデビューから間もないアイドルの突然の休止宣言に女性ファンが大騒ぎとなった。","date":"2006年5月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000018-r9d4g","category":"芸能・エンタメ・ゴシップ","title":"極楽とんぼ・山本圭壱が未成年女性との不祥事で吉本退社、相方・加藤浩次が生放送で号泣謝罪","summary":"2006年7月19日、極楽とんぼ・山本圭壱が未成年女性との性的スキャンダルにより吉本興業を退社。翌20日の日本テレビ「スッキリ!!」生放送で相方・加藤浩次が涙ながらに謝罪する姿が話題を集めた。","date":"2006年7月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000019-s2e6h","category":"芸能・エンタメ・ゴシップ","title":"「脳トレ」ブーム、任天堂DS「脳を鍛える大人のDSトレーニング」が世代を超えてヒット","summary":"2006年前後、東北大学・川島隆太教授監修のニンテンドーDS用ソフト「脳を鍛える大人のDSトレーニング」シリーズが大ヒット。「脳トレ」という言葉が定着し、子どもだけでなく高齢者や働き世代にもゲームが普及するきっかけとなった。","date":"2006年","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000020-t4f8i","category":"芸能・エンタメ・ゴシップ","title":"「国家の品格」（藤原正彦著）が200万部超のベストセラー、「品格」が流行語大賞受賞","summary":"2006年、数学者・藤原正彦による新書「国家の品格」（新潮新書）が200万部を超えるベストセラーに。「武士道」や「情緒」の大切さを説いた内容が共感を呼び、「品格」が流行語大賞を受賞した。","date":"2006年","source":"https://www.jiyu.co.jp/singo/index.php?eid=00023","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000021-u6g1j","category":"芸能・エンタメ・ゴシップ","title":"倖田來未「エロカッコイイ」が流行語ノミネート、セクシー路線で大ブレイク","summary":"2006年、倖田來未が連続12枚シングル「12 Single Collection ～spin the disc～」リリースなどでブレイク。「エロカッコイイ」という言葉が流行語大賞にノミネートされ、セクシーなスタイルとダンスで女性にも支持された（2008年には羊水発言で炎上）。","date":"2006年","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000022-v8h3k","category":"芸能・エンタメ・ゴシップ","title":"映画「時をかける少女」（細田守監督）がシネコン単館から口コミで爆発的ヒット","summary":"2006年7月公開、細田守監督のアニメ映画「時をかける少女」が、限られた劇場数から口コミで評判が広まり異例のロングランヒット。日本アニメーター・演出家協会でアニメ映画部門1位を獲得し、細田守を一躍注目監督に押し上げた。","date":"2006年7月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000023-w1i5l","category":"芸能・エンタメ・ゴシップ","title":"映画「DEATH NOTE デスノート」前後編が公開、藤原竜也主演で大ヒット","summary":"2006年6月17日に前編、11月3日に後編「デスノート the Last name」（金子修介監督）が公開。藤原竜也（夜神月）・松山ケンイチ（L）の演技が評判を呼び、漫画原作の邦画実写化として記録的なヒットとなった。","date":"2006年6月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000024-x3j7m","category":"芸能・エンタメ・ゴシップ","title":"フジテレビ「西遊記」（香取慎吾主演）が最高視聴率29.2%を記録","summary":"2006年1〜3月放送のフジテレビ月9ドラマ「西遊記」（香取慎吾主演、深キョン・内村光良ら共演）が平均視聴率23.0%、初回最高視聴率29.2%を記録。月9枠で久々の全話20%越えを達成した。","date":"2006年1月","source":"https://doraman.net/sp/200601/saiyuki.html","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000025-y5k9n","category":"芸能・エンタメ・ゴシップ","title":"クリスピー・クリーム・ドーナツが日本初上陸（新宿サザンテラス）、連日100人超の行列が社会現象に","summary":"2006年12月15日、アメリカのドーナツチェーン「クリスピー・クリーム・ドーナツ」の日本1号店が東京・新宿サザンテラスに開業。ガラス越しにドーナツ製造が見えるユニークな店舗が話題を呼び、平日でも1時間以上の行列が続き社会現象となった。","date":"2006年12月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751410000026-z7l2o","category":"芸能・エンタメ・ゴシップ","title":"「たらこ・たらこ・たらこ」（キューピーCMソング）がオリコン初登場2位の大ヒット","summary":"2006年9月、キューピーのCMで使われていた「たらこ・たらこ・たらこ」（キグルミ歌唱）がシングルCD発売。オリコン初登場2位のヒットとなり、史上最年少（平均10.5歳）のトップ10入り記録を樹立。曲と「たらこキューピー」のキャラクターが大ブームになった。","date":"2006年9月","source":"https://www.oricon.co.jp/news/35275/full/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751410000027-a9m4p","category":"テクノロジー","title":"ニコニコ動画がサービス開始、動画にコメントが流れる新感覚サービスとして急拡大","summary":"2006年12月12日、ドワンゴ子会社・ニワンゴが「ニコニコ動画（仮）」のサービスを開始。再生中の動画上にコメントが流れるという斬新な仕組みが口コミで広まり、翌2007年に一般公開後は爆発的にユーザーを獲得した。","date":"2006年12月","source":"","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751410000028-b2n6q","category":"テクノロジー","title":"SNS「mixi」が東証マザーズに上場、初値が公開価格の約2倍・SNSブーム本格化","summary":"2006年9月14日、株式会社ミクシィが東証マザーズに上場。公開価格155万円に対し初値は約295万円と約2倍の人気。miimiのユーザー数も急増し、日本版SNSの代名詞として全盛期を迎えた。","date":"2006年9月","source":"https://xtech.nikkei.com/it/pc/article/NPC/20061221/257589/","confidence":"高","snippet":"","notes":""},{"id":"テクノロジー-1751410000029-c4o8r","category":"テクノロジー","title":"任天堂Wiiが日本発売、体感型コントローラーが大ヒット・品切れ続出","summary":"2006年12月2日、任天堂のゲーム機「Wii」が25,000円で日本発売。本体を振るだけで操作できるWiiリモコンが「ゲームをしない人」にも受け入れられ爆発的ヒットとなり、全国で品切れが続出。「Wii Sports」が体感ゲームの代名詞となった。","date":"2006年12月","source":"https://www.nintendo.co.jp/corporate/release/2006/060914.html","confidence":"高","snippet":"","notes":""},{"id":"国際-1751410000030-d6p1s","category":"国際","title":"ドキュメンタリー映画「不都合な真実」公開、アル・ゴアが地球温暖化問題を世界に訴える","summary":"2006年、アメリカのアル・ゴア元副大統領が出演した地球温暖化を訴えるドキュメンタリー映画「An Inconvenient Truth（不都合な真実）」が世界公開。翌2007年にアカデミー賞長編ドキュメンタリー賞を受賞し、ゴアはノーベル平和賞も受賞。環境問題への世界的関心を高めた。","date":"2006年","source":"","confidence":"高","snippet":"","notes":""},{"id":"政治-1751420000001-a3k7p","category":"政治","title":"ライブドア・堀江貴文がニッポン放送株を大量取得、「メディア買収合戦」で日本中が騒然","summary":"2005年2月、ライブドアがフジテレビの親会社・ニッポン放送の株式35%を市場外取引で取得し筆頭株主に。フジテレビとの法廷闘争に発展し「M&A」「ポイズンピル」などの言葉が一般に広まった。最終的にはフジテレビがニッポン放送を子会社化し決着。","date":"2005年2月","source":"https://www.rieti.go.jp/jp/columns/a01_0169.html","confidence":"高","snippet":"","notes":""},{"id":"政治-1751420000002-b5m9q","category":"政治","title":"小泉純一郎が「郵政解散」断行・「刺客」作戦で自民が296議席の歴史的大勝","summary":"2005年8月8日、参院で郵政民営化法案が否決されると小泉首相は即日衆議院を解散（「郵政解散」）。反対派の選挙区に「刺客」候補を送り込む手法が話題を呼び、自民党が296議席を獲得。「小泉劇場」「刺客」「想定内（外）」が流行語大賞を受賞した。","date":"2005年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"経済-1751420000003-c7n2r","category":"経済","title":"楽天・三木谷社長がTBS株を大量取得し経営統合を提案、「インターネットvsテレビ」が激突","summary":"2005年10月、楽天がTBS株の約15%を取得し経営統合を提案。TBS側は拒否しポイズンピルの発動を検討。ライブドア事件に続いてネット企業によるメディア買収の波が起き、日本の放送・通信の在り方が問われた。","date":"2005年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000004-d9p4s","category":"社会","title":"JR福知山線脱線事故、死者107人・負傷者562人——JR史上最悪の大惨事","summary":"2005年4月25日午前9時18分、JR西日本・福知山線の塚口〜尼崎駅間でオーバースピードの快速電車が脱線。マンションに激突し107人（乗客106人・運転士1人）が死亡、562人が負傷。「日勤教育」と呼ばれる体罰的制裁と過密ダイヤがもたらした構造的問題として長く議論された。","date":"2005年4月","source":"https://www.westjr.co.jp/fukuchiyama/outline/","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000005-e2q6t","category":"社会","title":"愛知万博「愛・地球博」が開催、来場者2205万人で当初目標を大幅超過","summary":"2005年3月25日〜9月25日、愛知県で「愛・地球博」（愛知万博）を開催。185日間で来場者2205万人を集め目標（1500万人）を大幅超過。マンモスの展示が大行列を呼び、「モリゾーとキッコロ」のキャラクターが人気を博した。","date":"2005年3月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000006-f4r8u","category":"社会","title":"アスベスト（石綿）健康被害が社会問題化、旧クボタ工場周辺住民の中皮腫死亡が次々と発覚","summary":"2005年夏、旧クボタ尼崎工場の元従業員や近隣住民にアスベスト（石綿）による中皮腫・肺がんの被害が相次いでいたことが判明。各地の建設現場や工場でも被害が拡大し、国が緊急対策に乗り出す「クボタショック」が日本中に衝撃を与えた。","date":"2005年夏","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000007-g6s1v","category":"社会","title":"つくばエクスプレスが開業、秋葉原〜つくばを最速45分で結び沿線開発が加速","summary":"2005年8月24日、首都圏新都市鉄道つくばエクスプレスが開業。秋葉原〜つくば（58.3km）を最速45分で結び、慢性的な渋滞に悩んでいた沿線の都市開発を大きく前進させた。","date":"2005年8月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000008-h8t3w","category":"社会","title":"「クールビズ」が環境省主導で本格スタート、ノーネクタイが官公庁・企業に広まる","summary":"2005年、環境省が地球温暖化対策として夏のクールビズ（ノーネクタイ・ノー上着）を呼びかけ。官庁・企業で一斉に実施され「クールビズ」が流行語大賞を受賞。京都議定書の発効（2月16日）と相まって環境意識が高まった。","date":"2005年","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000009-i9u4x","category":"社会","title":"耐震強度偽装問題（姉歯建築士）が発覚、分譲マンション住民が退去を迫られる","summary":"2005年11月17日、千葉・姉歯建築設計事務所が構造計算書を偽装し、震度5程度で倒壊の恐れがあるマンションを多数設計していたことが発覚。ヒューザー社などのデベロッパーも関与し、入居者が突然退去を迫られる前代未聞の事態となった。","date":"2005年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"社会-1751420000010-j2v6y","category":"社会","title":"広島・栃木で小学1年生女児が連続して誘拐殺害、子どもの安全を問う社会的議論が高まる","summary":"2005年11月22日に広島市で小学1年生女児（7歳）が、12月1日に栃木県今市市で小学1年生女児（7歳）が下校中に行方不明となり遺体で発見。立て続けに起きた幼女誘拐殺人に保護者・学校が「見守り活動」を強化し、防犯カメラや「子ども110番の家」が普及するきっかけとなった。","date":"2005年11月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751420000011-k4w8z","category":"スポーツ","title":"浅田真央（15歳）がGPファイナルで初優勝、スルツカヤを下し日本人2人目の快挙","summary":"2005年12月、フィギュアスケートのISUグランプリファイナルで浅田真央（当時15歳）が初優勝。トリノ五輪金メダル候補だったイリナ・スルツカヤ（ロシア）を下し、村主章枝に次ぐ日本人2人目の優勝。年齢制限でトリノ五輪には出場できなかったが、一躍スターに。","date":"2005年12月","source":"","confidence":"高","snippet":"","notes":""},{"id":"スポーツ-1751420000012-l6x1a","category":"スポーツ","title":"ロッテが日本シリーズで阪神を4連勝で下し31年ぶりの日本一（バレンタイン監督）","summary":"2005年10月、千葉ロッテマリーンズがパ・リーグを制し、日本シリーズで阪神タイガースを4連勝で破り31年ぶりの日本一（1974年以来）を達成。ボビー・バレンタイン監督とマリーンズナインの優勝パレードが千葉で行われた。","date":"2005年10月","source":"","confidence":"高","snippet":"","notes":""},{"id":"芸能・エンタメ・ゴシップ-1751420000013-m8y3b","category":"芸能・エンタメ・ゴシップ","title":"「電 var deletedIds=new Set();

// PAT
var PAT={
  get:function(){return localStorage.getItem("nv_pat")||"";},
  set:function(v){localStorage.setItem("nv_pat",v.trim());},
  clear:function(){localStorage.removeItem("nv_pat");}
};

// GitHub API
function ghHeaders(w){var h={"Accept":"application/vnd.github+json"};var p=PAT.get();if(p)h["Authorization"]="Bearer "+p;if(w)h["Content-Type"]="application/json";return h;}
function ghGet(p){return fetch(API_BASE+"/"+p,{headers:ghHeaders()}).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d};});}).catch(function(){return{ok:false,data:null};});}
function ghPut(p,content,sha,msg){
  var pat=PAT.get();if(!pat)return Promise.resolve({ok:false});
  var body={message:msg,content:btoa(unescape(encodeURIComponent(content))),branch:BRANCH};
  if(sha)body.sha=sha;
  return fetch(API_BASE+"/"+p,{method:"PUT",headers:ghHeaders(true),body:JSON.stringify(body)}).then(function(r){return r.json().then(function(d){return{ok:r.ok,data:d};});}).catch(function(){return{ok:false,data:null};});
}
function ghDecode(content){
  var raw=atob(content.replace(/\n/g,""));
  var bytes=new Uint8Array(raw.split("").map(function(c){return c.charCodeAt(0);}));
  return new TextDecoder("utf-8").decode(bytes);
}

// Deleted sync
function loadLocalDel(){try{return JSON.parse(localStorage.getItem("nv_deleted")||"[]");}catch{return[];}}
function saveDel(ids){localStorage.setItem("nv_deleted",JSON.stringify([...ids]));}
function loadDeletedAt(){try{return JSON.parse(localStorage.getItem("nv_deletedAt")||"{}");}catch{return{};}}
function saveDeletedAt(m){localStorage.setItem("nv_deletedAt",JSON.stringify(m));}
function markDeletedAt(id){deletedAtMap[id]=Date.now();saveDeletedAt(deletedAtMap);}
function clearDeletedAt(id){delete deletedAtMap[id];saveDeletedAt(deletedAtMap);}
function loadRemoteDel(){
  return ghGet("deleted-ids.json").then(function(r){
    if(!r.ok||!r.data||!r.data.content)return{ids:[],sha:null};
    try{var ids=JSON.parse(ghDecode(r.data.content));return{ids:Array.isArray(ids)?ids:[],sha:r.data.sha};}
    catch{return{ids:[],sha:null};}
  });
}
function syncDel(){
  if(!PAT.get())return;
  loadRemoteDel().then(function(r){
    r.ids.forEach(function(id){deletedIds.add(id);});
    saveDel(deletedIds);
    return ghPut("deleted-ids.json",JSON.stringify([...deletedIds],null,2),r.sha,"🗑 deleted-ids ("+deletedIds.size+"件)");
  }).then(function(r){if(r&&!r.ok)showToast("⚠️ GitHub同期失敗");}).catch(function(e){showToast("⚠️ 同期失敗: "+e.message);});
}

// Manual articles (📌)
function loadLocalManual(){try{return JSON.parse(localStorage.getItem("nv_manual")||"[]");}catch{return[];}}
function saveManual(items){localStorage.setItem("nv_manual",JSON.stringify(items));}
function loadRemoteManual(){
  return ghGet("manual-articles.json").then(function(r){
    if(!r.ok||!r.data||!r.data.content)return{items:[],sha:null};
    try{var items=JSON.parse(ghDecode(r.data.content));return{items:Array.isArray(items)?items:[],sha:r.data.sha};}
    catch{return{items:[],sha:null};}
  });
}
function mergeRemoteManual(remoteItems){
  var map={},order=[];
  manualItems.forEach(function(i){if(!(i.id in map))order.push(i.id);map[i.id]=i;});
  remoteItems.forEach(function(i){if(!(i.id in map))order.push(i.id);map[i.id]=i;});
  manualItems=order.map(function(id){return map[id];});
}
function mergeManualIntoData(){
  var idx={};
  DATA.forEach(function(d,i){idx[d.id]=i;});
  var toAdd=[];
  manualItems.forEach(function(m){
    if(m.id in idx)DATA[idx[m.id]]=m;
    else toAdd.push(m);
  });
  toAdd.forEach(function(m){DATA.unshift(m);});
}
function syncManual(){
  if(!PAT.get())return;
  loadRemoteManual().then(function(r){
    mergeRemoteManual(r.items);
    saveManual(manualItems);
    return ghPut("manual-articles.json",JSON.stringify(manualItems,null,2),r.sha,"📌 manual-articles ("+manualItems.length+"件)");
  }).then(function(r){if(r&&!r.ok)showToast("⚠️ GitHub同期失敗");}).catch(function(e){showToast("⚠️ 同期失敗: "+e.message);});
}

// Tabs
function buildTabs(){
  document.getElementById("tabs").innerHTML=TABS.map(function(t){
    return '<button class="tab'+(st.cat===t.c?" on":"")+'" onclick="setCat(\''+t.c+'\')">'+t.l+'</button>';
  }).join("");
}
function updateTabs(){document.querySelectorAll(".tab").forEach(function(t,i){t.classList.toggle("on",st.cat===TABS[i].c);});}

// Filters
function pd(l){if(!l)return null;var s=l.replace(/（.）/,"");var m0=s.match(/^(\d{4})-(\d{2})-(\d{2})$/);if(m0)return{y:m0[1],mo:String(Number(m0[2])),d:String(Number(m0[3]))};var m=s.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);if(m)return{y:m[1],mo:m[2],d:m[3]};var m2=s.match(/(\d{4})年(\d{1,2})月(上旬|中旬|下旬)/);if(m2){var d2=m2[3]==="上旬"?"5":m2[3]==="中旬"?"15":"25";return{y:m2[1],mo:m2[2],d:d2};}var m3=s.match(/(\d{4})年(\d{1,2})月/);if(m3)return{y:m3[1],mo:m3[2],d:"15"};return null;}
function dn(l){var p=pd(l);if(!p)return 0;return Number(p.y)*10000+Number(p.mo)*100+Number(p.d);}
function getFiltered(){
  var qt=st.q.trim().toLowerCase();
  return DATA.filter(function(n){
    if(deletedIds.has(n.id))return false;
    var p=pd(n.date);
    return(st.cat==="全て"||n.category===st.cat)&&(st.year==="全て"||(p&&p.y===st.year))&&(st.month==="全て"||(p&&p.mo===st.month))&&(!qt||n.title.toLowerCase().indexOf(qt)>=0||(n.summary||"").toLowerCase().indexOf(qt)>=0);
  }).sort(function(a,b){var c=st.sort==="desc"?dn(b.date)-dn(a.date):dn(a.date)-dn(b.date);return c!==0?c:a.category.localeCompare(b.category);});
}
function getDeleted(){
  var arr=DATA.filter(function(n){return deletedIds.has(n.id);});
  if(trashSort==="deletedAt")arr.sort(function(a,b){return(deletedAtMap[b.id]||0)-(deletedAtMap[a.id]||0);});
  else arr.sort(function(a,b){return dn(b.date)-dn(a.date);});
  return arr;
}

function setCat(c){st.cat=c;selectedIds.clear();updateTabs();renderCards();updateHdr();}
function setYear(v){st.year=v;st.month="全て";renderCards();updateHdr();}
function setMonth(v){st.month=v;renderCards();updateHdr();}

function updateSearchClear(){var q=document.getElementById("q"),b=document.getElementById("sClear");if(q&&b)b.classList.toggle("show",!!q.value);}
function clearSearch(){var q=document.getElementById("q");if(!q)return;q.value="";setQ("");q.focus();}
function toggleSort(){st.sort=st.sort==="desc"?"asc":"desc";document.getElementById("sortLbl").textContent=st.sort==="desc"?"新しい順":"古い順";renderCards();}
function updateSelects(){
  var years=[...new Set(DATA.filter(function(n){return!deletedIds.has(n.id);}).map(function(n){var p=pd(n.date);return p?p.y:null;}).filter(Boolean))].sort(function(a,b){return b.localeCompare(a);});
  var fy=document.getElementById("fYear");fy.innerHTML='<option value="全て">年</option>';
  years.forEach(function(y){fy.innerHTML+='<option value="'+y+'"'+(st.year===y?" selected":"")+'>'+y+'年</option>';});
  var months=[...new Set(DATA.filter(function(n){if(deletedIds.has(n.id))return false;if(st.year==="全て")return true;var p=pd(n.date);return p&&p.y===st.year;}).map(function(n){var p=pd(n.date);return p?p.mo:null;}).filter(Boolean))].sort(function(a,b){return Number(a)-Number(b);});
  var fm=document.getElementById("fMonth");fm.innerHTML='<option value="全て">月</option>';
  months.forEach(function(m){fm.innerHTML+='<option value="'+m+'"'+(st.month===m?" selected":"")+'>'+m+'月</option>';});
}

  selectedIds.clear();saveDel(deletedIds);
  exitSel();renderCards();updateHdr();updateTrashCnt();
  showToast(count+"件を削除しました");syncDel();
}
function deleteOne(id){
  var w=document.getElementById("rw-"+id);
  if(w)w.classList.add("del");

  },230);
}
function restore(id){
  deletedIds.delete(id);clearDeletedAt(id);saveDel(deletedIds);
  renderCards();updateHdr();updateTrashCnt();renderTrashSheet();
  if(getDeleted().length===0)closeTrash();
  showToast("記事を復元しました");syncDel();
}

// Render
function esc(s){return String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");}
function hl(t,q){if(!q||!q.trim())return esc(t);var kw=q.trim(),lo=t.toLowerCase(),lk=kw.toLowerCase(),o="",i=0,idx,n=0;while((idx=lo.indexOf(lk,i))!==-1&&n<50){if(idx>i)o+=esc(t.slice(i,idx));o+="<mark>"+esc(t.slice(idx,idx+kw.length))+"</mark>";i=idx+kw.length;n++;}if(i<t.length)o+=esc(t.slice(i));return o;}

var DZONE_SVG='<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg><span class="dzone-lbl">削除</span>';

// Swipe (左右両方向・方向ロック付き)
function attachSwipe(row,id){
  var sx=0,sy=0,cx=0,drag=false,moved=false,lockDir=null,TH=76;
  function start(x,y){sx=x;sy=y;cx=0;drag=true;moved=false;lockDir=null;row.classList.add("sw");}
  function move(x,y){
    if(!drag)return;
    var dx=x-sx,dy=y-sy;
    if(!lockDir){
      if(Math.abs(dx)>7||Math.abs(dy)>7)lockDir=Math.abs(dx)>=Math.abs(dy)?'h':'v';
      else return;
    }
    if(lockDir==='v')return;
    cx=Math.max(Math.min(dx,TH+24),-(TH+24));
    moved=Math.abs(cx)>5;
    row.style.transform="translateX("+cx+"px)";
    var dzl=document.getElementById("dzl-"+id),dzr=document.getElementById("dzr-"+id);
    var prog=Math.min(1,Math.abs(cx)/TH),past=Math.abs(cx)>TH;
    if(cx>0){if(dzl){dzl.style.opacity=prog;dzl.classList.toggle("past",past);}if(dzr)dzr.style.opacity=0;}
    else if(cx<0){if(dzr){dzr.style.opacity=prog;dzr.classList.toggle("past",past);}if(dzl)dzl.style.opacity=0;}
    else{if(dzl)dzl.style.opacity=0;if(dzr)dzr.style.opacity=0;}
  }
  function end(){
    if(!drag)return;drag=false;row.classList.remove("sw");
    row._sw=moved&&Math.abs(cx)>10;
    if(Math.abs(cx)>TH){
      row.style.transform="translateX("+(cx<0?"-100%":"100%")+")";
      deleteOne(id);
    }else{
      row.style.transform="";
      var dzl=document.getElementById("dzl-"+id),dzr=document.getElementById("dzr-"+id);
      if(dzl)dzl.style.opacity=0;if(dzr)dzr.style.opacity=0;
      setTimeout(function(){row._sw=false;},60);
    }
    cx=0;lockDir=null;
  }
  row.addEventListener("touchstart",function(e){start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  row.addEventListener("touchmove",function(e){move(e.touches[0].clientX,e.touches[0].clientY);if(lockDir==='h')e.preventDefault();},{passive:false});
  row.addEventListener("touchend",end);
  row.addEventListener("mousedown",function(e){start(e.clientX,e.clientY);});
  row.addEventListener("mousemove",function(e){if(drag)move(e.clientX,e.clientY);});
  row.addEventListener("mouseup",end);
  row.addEventListener("mouseleave",end);
}

// Pin sheet (手動記事追加)
function openPin(){
  if(document.getElementById("pinOv"))return;
  var catOptions='<option value="" disabled selected>選択してください</option>'+TABS.filter(function(t){return t.c!=="全て";}).map(function(t){return '<option value="'+esc(t.c)+'">'+esc(t.l)+'</option>';}).join("");
  var ov=document.createElement("div");ov.className="sov";ov.id="pinOv";
  ov.addEventListener("click",function(e){if(e.target===ov)closePin();});
  ov.innerHTML='<div class="pnsheet"><div class="shandle"><div class="shandle-bar"></div></div>'+
    '<div class="pnhdr"><div class="pnhdr-left"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#4a8fff" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 1 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg><span class="pntitle">記事を手動追加</span></div>'+
    '<button class="dclose" onclick="closePin()">✕</button></div>'+
    '<div class="pnbody">'+
      '<div class="pnfield"><label class="pnlbl">記事URL</label>'+
        '<div class="pnfetch-row"><input class="pnin" id="pinUrl" placeholder="https://example.com/article"><button class="pnfetch-btn" id="pinFetchBtn" onclick="fetchPinMeta()">取得</button></div>'+
      '</div>'+
      '<div class="pnhint">「取得」でタイトル・日付・概要を自動入力（うまくいかない場合は手動で入力してください）</div>'+
      '<div class="pnfield"><label class="pnlbl">タイトル<span class="pnreq">必須</span></label><input class="pnin" id="pinTitle" placeholder="記事タイトルを入力"></div>'+
      '<div class="pnfield"><label class="pnlbl">概要</label><textarea class="pnin" id="pinSummary" placeholder="記事の概要・本文（任意）" rows="3"></textarea></div>'+
      '<div class="pnrow">'+
        '<div class="pnfield" style="flex:1"><label class="pnlbl">カテゴリ<span class="pnreq">必須</span></label><select class="pnin" id="pinCat">'+catOptions+'</select></div>'+
        '<div class="pnfield" style="flex:1"><label class="pnlbl">日付<span class="pnreq">必須</span></label><input class="pnin" id="pinDate" placeholder="例: 2020年7月"></div>'+
      '</div>'+
    '</div>'+
    '<div class="pnfoot"><button class="pnsave" id="pinSaveBtn" onclick="savePinArticle()">GitHubに保存して追加</button></div>'+
    '</div>';
  document.getElementById("app").appendChild(ov);
  document.getElementById("pinTitle").addEventListener("input",updatePinSaveState);
  document.getElementById("pinCat").addEventListener("change",updatePinSaveState);
  document.getElementById("pinDate").addEventListener("input",updatePinSaveState);

}
function closePin(){var el=document.getElementById("pinOv");if(el)el.remove();}
function extractPinTitle(text){
  var m=text.match(/^Title:\s*(.+)$/m);
  return m?m[1].trim():"";
}
function extractPinDate(text){
  var idx=text.indexOf("Markdown Content:");
  var body=idx>=0?text.slice(idx,idx+3000):text.slice(0,3000);
  var mt=body.match(/(\d{4})[-\/年](\d{1,2})[-\/月]\d{1,2}\D{0,3}\d{1,2}:\d{2}/);
  if(mt)return mt[1]+"年"+Number(mt[2])+"月";
  var m=body.slice(0,400).match(/(\d{4})[-\/年](\d{1,2})[-\/月]\d{1,2}/);
  return m?m[1]+"年"+Number(m[2])+"月":"";
}
function extractPinSummary(text){
  var idx=text.indexOf("Markdown Content:");
  var body=idx>=0?text.slice(idx+17):text;
  var lines=body.split("\n").map(function(l){return l.trim();})
    .filter(function(l){return l&&l[0]!=="#";})
    .map(function(l){
      return l.replace(/!\[[^\]]*\]\([^)]*\)/g,"").replace(/\[([^\]]*)\]\([^)]*\)/g,"$1").replace(/[#*_>\`]/g,"").trim();
    }).filter(function(l){return l.length>=40;});
  if(!lines.length)return "";
  var s=lines[0];
  return s.length>220?s.slice(0,220)+"…":s;
}
function fetchPinMeta(){
  var urlEl=document.getElementById("pinUrl"),btn=document.getElementById("pinFetchBtn");
  var url=urlEl.value.trim();
  if(!/^https?:\/\//.test(url)){showToast("URLを入力してください");return;}
  btn.disabled=true;btn.textContent="取得中...";
  var timeout=new Promise(function(_,rej){setTimeout(function(){rej(new Error("timeout"));},15000);});
  Promise.race([fetch("https://r.jina.ai/"+url),timeout])
    .then(function(r){if(!r.ok)throw new Error("ng");return r.text();})
    .then(function(text){
      var title=extractPinTitle(text),date=extractPinDate(text),summary=extractPinSummary(text),filled=[];
      if(title){document.getElementById("pinTitle").value=title;filled.push("タイトル");}
      if(date){document.getElementById("pinDate").value=date;filled.push("日付");}
      if(summary){document.getElementById("pinSummary").value=summary;filled.push("概要");}
      updatePinSaveState();
      showToast(filled.length?filled.join("・")+"を自動取得しました（内容を確認してください）":"自動取得できませんでした。手動で入力してください。");
    })
    .catch(function(){showToast("自動取得できませんでした。手動で入力してください。");})
    .then(function(){btn.disabled=false;btn.textContent="取得";});
}
function updatePinSaveState(){
  var title=document.getElementById("pinTitle"),cat=document.getElementById("pinCat"),date=document.getElementById("pinDate"),btn=document.getElementById("pinSaveBtn");
  if(!title||!cat||!date||!btn)return;
  btn.classList.toggle("on",!!(title.value.trim()&&cat.value&&date.value.trim()));
}
function savePinArticle(){
  var title=document.getElementById("pinTitle").value.trim();
  var cat=document.getElementById("pinCat").value;
  var date=document.getElementById("pinDate").value.trim();
  var url=document.getElementById("pinUrl").value.trim();
  var summary=document.getElementById("pinSummary").value.trim();
  if(!title||!cat||!date)return;
  var item={
    id:"manual-"+Date.now()+"-"+Math.random().toString(36).slice(2,7),
    category:cat,
    date:date,
    title:title,
    summary:summary,
    source:url
  };
  DATA.unshift(item);
  manualItems.unshift(item);
  saveManual(manualItems);
  closePin();
  render();
  showToast("記事を追加しました");
  syncManual();
}
